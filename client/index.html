      // Launch aura: 6" (Fighters/Bombers/Fire Ships/Torpedoes from a Dropsite feature).
      const hasLaunch = (ds.features || []).some((fk, fi) => !(ds.destroyedFeatures||[]).includes(fi) && FEATURES[fk] && FEATURES[fk].launch && FEATURES[fk].launch.length);
      const launchIn = hasLaunch ? 6 : 0;
      if (scanIn > 0) {
        const sPx = scanIn * INCH;
        html += `<circle cx="${dsx}" cy="${dsy}" r="${sPx}" fill="none" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>`;
        html += `<text x="${dsx}" y="${dsy - sPx - 4}" font-family="var(--mono)" font-size="8" font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">SCAN ${scanIn}"</text>`;
      }
      if (launchIn > 0 && launchIn !== scanIn) {
        const lPx = launchIn * INCH;
        html += `<circle cx="${dsx}" cy="${dsy}" r="${lPx}" fill="none" stroke="${acol}" stroke-width="1" stroke-dasharray="5 3" opacity="0.7"/>`;
        html += `<text x="${dsx}" y="${dsy + lPx + 11}" font-family="var(--mono)" font-size="8" font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">LAUNCH ${launchIn}"</text>`;
      } else if (launchIn > 0 && launchIn === scanIn) {
        // Same radius — label the single ring as both.
        const lPx = launchIn * INCH;
        html += `<text x="${dsx}" y="${dsy + lPx + 11}" font-family="var(--mono)" font-size="8" font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">LAUNCH ${launchIn}"</text>`;
      }
    }
  }

  // Launched fighter/bomber/fireship asset markers.
  const assetMoveMode = state.assetPhase && state.assetPhase.step === 'assets';
  (state.launchedAssets || []).forEach((a, ai) => {
    const col = a.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    const s = 6;
    const lbl = a.kind === 'bomber' ? 'BMR' : a.kind === 'fighter' ? 'FTR' : a.kind === 'fireship' ? 'FIRE' : a.kind === 'torpedo' ? 'TORP' : a.kind === 'mine' ? 'MINE' : 'F/B';
    const cnt = a.count || 1;
    const isSel = state.assetMove && state.assetMove.id === a.id;
    // In Asset Combat, show the selected asset's move range.
    if (assetMoveMode && isSel) {
      const thrPx = (a._t2tRange ? a._t2tRange : assetThrust(a)) * INCH;
      html += `<circle cx="${a.x}" cy="${a.y}" r="${thrPx}" fill="rgba(255,255,255,0.03)"
                stroke="${col}" stroke-width="1" stroke-dasharray="5 4"/>`;
    }
    html += `<g data-asset="${ai}" data-asset-id="${a.id}" style="cursor:pointer;">
      <polygon points="${a.x},${a.y-s} ${a.x+s},${a.y} ${a.x},${a.y+s} ${a.x-s},${a.y}"
        fill="${a.side==='ucm'?'rgba(74,214,255,0.15)':'rgba(212,166,71,0.15)'}" stroke="${col}" stroke-width="${isSel?2:1}"
        ${a.moved && assetMoveMode ? 'opacity="0.5"' : ''}/>
      <text x="${a.x}" y="${a.y+1.5}" font-family="var(--mono)" font-size="7" font-weight="700"
        fill="${col}" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${cnt}</text>
      <text x="${a.x}" y="${a.y+s+9}" font-family="var(--mono)" font-size="6.5" font-weight="700"
        fill="${col}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke"
        pointer-events="none">${lbl}</text>
    </g>`;
    // Locked bomber-attack line to its target ship.
    if (a.bomberTarget) {
      const tg = state.groups[a.bomberTarget.gid];
      const ts = tg && tg.ships[a.bomberTarget.si];
      if (ts && !ts.destroyed && !ts.offTable) {
        html += `<line x1="${a.x}" y1="${a.y}" x2="${ts.x}" y2="${ts.y}" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="2 2" opacity="0.8"/>
          <circle cx="${ts.x}" cy="${ts.y}" r="9" fill="none" stroke="var(--hull-crit)" stroke-width="1.2" opacity="0.85"/>`;
      }
    }
  });

  // Weapon target lines — red dotted lines from a ship to its locked targets.
  Object.keys(state.groups).forEach(gid => {
    const grp = state.groups[gid];
    grp.ships.forEach(s => {
      if (s.destroyed || s.offTable || !s.weaponTargets) return;
      Object.keys(s.weaponTargets).forEach(wi => {
        const t = s.weaponTargets[wi];
        const tg = state.groups[t.gid];
        const ts = tg && tg.ships[t.si];
        if (!ts || ts.destroyed || ts.offTable) return;
        html += `<line x1="${s.x}" y1="${s.y}" x2="${ts.x}" y2="${ts.y}" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="3 3" opacity="0.75"/>
          <circle cx="${ts.x}" cy="${ts.y}" r="8" fill="none" stroke="var(--hull-crit)" stroke-width="1.2" opacity="0.8"/>`;
      });
    });
  });
  // Active targeting: highlight valid enemy targets for the chosen weapon.
  if (state.targeting) {
    const t = state.targeting;
    const aGrp = state.groups[t.gid];
    const aShip = aGrp && aGrp.ships[t.si];
    const aDef = getDef(t.gid);
    const w = aDef && aDef.weapons[t.wi];
    if (aShip && w) {
      // Group fire is measured from the LEAD ship.
      const originShip = firingOriginShip(aDef, aGrp, t.si);
      // Highlight the measuring origin so the player sees what arcs/ranges are from.
      if (originShip && originShip !== aShip) {
        html += `<circle cx="${originShip.x}" cy="${originShip.y}" r="${shipBaseRadiusPx(aDef)+3}" fill="none" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>`;
      }
      Object.keys(state.groups).forEach(gid => {
        const def = getDef(gid);
        if (!def || def.side === aDef.side) return;
        state.groups[gid].ships.forEach((s, si) => {
          if (s.destroyed || s.offTable || s.attachedTo) return;
          if (weaponCanTarget(aDef, originShip, w, def, s, state.groups[gid])) {
            html += `<circle cx="${s.x}" cy="${s.y}" r="9" fill="none" stroke="var(--hull-crit)" stroke-width="1.5" stroke-dasharray="2 2"/>`;
          }
        });
      });
    }
  }

  // Payload DETACH: 3" placement aura around the Porter + ghost ship at cursor.
  if (state.payloadDetach) {
    const pd = state.payloadDetach;
    const porter = state.groups[pd.porterGid] && state.groups[pd.porterGid].ships[pd.porterSi];
    const payDef = getDef(pd.gid);
    if (porter) {
      const r = 3 * INCH;
      html += `<circle cx="${porter.x}" cy="${porter.y}" r="${r}" fill="rgba(74,214,255,0.06)" stroke="var(--ucm)" stroke-width="1" stroke-dasharray="4 3"/>`;
      if (state.hoverPoint) {
        const within = Math.hypot(state.hoverPoint.x - porter.x, state.hoverPoint.y - porter.y) <= r + 2;
        const gcol = within ? (payDef.side==='ucm'?'var(--ucm)':'var(--shal)') : 'var(--hull-crit)';
        html += `<circle cx="${state.hoverPoint.x}" cy="${state.hoverPoint.y}" r="5" fill="none" stroke="${gcol}" stroke-width="1.5" opacity="0.85"/>`;
        html += `<line x1="${porter.x}" y1="${porter.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}" stroke="${gcol}" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.6"/>`;
      }
    }
  }
  // Payload REATTACH: 3" aura + highlight eligible detached payloads.
  if (state.payloadReattach) {
    const pr = state.payloadReattach;
    const porter = state.groups[pr.porterGid] && state.groups[pr.porterGid].ships[pr.porterSi];
    const pdef = getDef(pr.porterGid);
    if (porter) {
      const r = 3 * INCH;
      html += `<circle cx="${porter.x}" cy="${porter.y}" r="${r}" fill="rgba(212,166,71,0.06)" stroke="var(--shal)" stroke-width="1" stroke-dasharray="4 3"/>`;
      detachedReattachCandidates(pdef.side, porter, pdef.porter.size).forEach(c => {
        html += `<circle cx="${c.ship.x}" cy="${c.ship.y}" r="7" fill="none" stroke="var(--shal)" stroke-width="1.5"/>`;
      });
    }
  }

  // Clip everything to the playable 48"×48" board so arcs/auras/lines that
  // extend past the edge are not drawn outside the map area.
  svg.innerHTML = `<defs><clipPath id="board-clip"><rect x="0" y="0" width="${BOARD_PX}" height="${BOARD_PX}"/></clipPath></defs>`
    + `<g clip-path="url(#board-clip)">${html}</g>`;
}

/* Render scan range + arcs for a ship (called for selected group ships) */
function renderShipOverlays(def, ship, isSelected) {
  const scanR = (def.scan + def.sig) * INCH; // not exact — Scan + target's Sig but Sig varies; show own Scan + 6 as approximation
  // Actually Scan is base range. The +Sig is per-target. Show Scan as the base.
  const baseScanR = def.scan * INCH;
  const opacity = isSelected ? 0.6 : 0.2;
  const color = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
  let html = `<g class="ship-overlays">`;
  // Scan range — dashed circle
  html += `<circle cx="${ship.x}" cy="${ship.y}" r="${baseScanR}"
            fill="none" stroke="${color}" stroke-width="0.5"
            stroke-dasharray="3 4" opacity="${opacity * 0.7}"/>`;
  if (!isSelected) return html + '</g>';

  // Weapon arcs — show ALL weapon arcs of the SELECTED ship
  if (def.weapons) {
    def.weapons.forEach(w => {
      if (w.arc === 'LoS' || w.arc === '—' || !w.arc) return;
      html += renderWeaponArc(ship, def, w);
    });
  }
  html += `</g>`;
  return html;
}

/* Render a single weapon arc as a translucent wedge.
   Arc range = Scan (we don't know target Sig, so show base Scan).
   F = 90° front, S = 90° each side, R = 90° rear,
   FN = 22° narrow front, RN = 22° narrow rear, B = side left+right combined.
   For F/S, F/S/R combos: draw each component as a separate wedge. */
function renderWeaponArc(ship, def, w) {
  const r = def.scan * INCH;
  const cx = ship.x, cy = ship.y;
  const h = ship.heading;
  let html = '';
  // Parse arc — could be "F", "F/S", "F/S/R", "FN", "RN", "B", "S"
  const components = w.arc.split('/').map(s => s.trim());

  // map arc names to centre-angle relative to heading and half-width
  function wedge(centreOffset, halfWidth, fill, stroke) {
    const a1 = (h + centreOffset - halfWidth) * Math.PI / 180;
    const a2 = (h + centreOffset + halfWidth) * Math.PI / 180;
    const x1 = cx + Math.cos(a1) * r;
    const y1 = cy + Math.sin(a1) * r;
    const x2 = cx + Math.cos(a2) * r;
    const y2 = cy + Math.sin(a2) * r;
    const largeArc = (halfWidth * 2) > 180 ? 1 : 0;
    return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z"
              fill="${fill}" stroke="${stroke}" stroke-width="0.4" opacity="0.6"/>`;
  }
  components.forEach(c => {
    if (c === 'F') html += wedge(0, 45, 'rgba(74,214,255,0.18)', 'var(--ucm-dim)');
    else if (c === 'R') html += wedge(180, 45, 'rgba(122,138,148,0.12)', 'var(--text-mute)');
    else if (c === 'S') {
      // both sides
      html += wedge(90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
      html += wedge(-90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
    }
    else if (c === 'FN') html += wedge(0, 11, 'rgba(255,181,71,0.30)', 'var(--hull-warn)');
    else if (c === 'RN') html += wedge(180, 11, 'rgba(255,181,71,0.30)', 'var(--hull-warn)');
    else if (c === 'B') {
      html += wedge(90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
      html += wedge(-90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
    }
  });
  return html;
}


/* Build the attack from the firing ship's locked weapons, grouped by target. */
function openAttackModal(gid, si) {
  const aDef = getDef(gid);
  const grp = state.groups[gid];
  if (!grp) return;
  // Gather locked weapons from EVERY ship in the Group (the whole group fires together).
  // Combine identical weapon systems firing at the same target into one pooled-Att shot.
  const combined = {}; // key: weaponName|targetGid|targetSi → shot
  grp.ships.forEach((ship, sIdx) => {
    if (ship.destroyed || ship.offTable || !ship.weaponTargets) return;
    const shipEO = effectiveOrder(aDef, grp, sIdx); // this ship's effective Order
    Object.keys(ship.weaponTargets).forEach(wi => {
      const t = ship.weaponTargets[wi];
      const tg = state.groups[t.gid];
      const ts = tg && tg.ships[t.si];
      if (!ts || ts.destroyed || ts.offTable) return;
      const w = aDef.weapons[parseInt(wi)];
      const sp = parseWeaponSpecials(w);
      // Fusillade-X: +X Attack for THIS ship while it is on Weapons Free. Applied per
      // contributing ship so pooled group fire sums each ship's boosted Attack.
      const shipAtt = w.att + ((sp.fusillade && shipEO === 'WF') ? sp.fusillade : 0);
      const reps = sp.volley > 1 ? sp.volley : 1;
      for (let r = 0; r < reps; r++) {
        const key = w.name + '|' + t.gid + '|' + t.si + (reps > 1 ? '|v' + r : '');
        if (combined[key]) {
          combined[key].w = { ...combined[key].w, att: combined[key].w.att + shipAtt }; // pool Att
        } else {
          combined[key] = { wi: parseInt(wi), w: { ...w, att: shipAtt }, targetGid: t.gid, targetSi: t.si,
            volleyIdx: reps > 1 ? r + 1 : 0, volleyOf: reps, fusilladeBaked: true };
        }
      }
    });
  });
  const shots = Object.values(combined);
  if (!shots.length) { flashLaunchMsg('No valid targets'); return; }
  // Group fire is measured from the LEAD ship — use it as the attacker origin so the
  // hit step's range/scenery/layer effects measure from the correct point.
  const individual = aDef.openNetwork || onIndividualOrders(aDef, grp);
  let originSi = si;
  if (!individual) {
    const li = grp.leadShipIdx || 0;
    const lead = grp.ships[li];
    if (lead && !lead.destroyed && !lead.offTable) originSi = li;
  }
  state.attackModal = {
    attackerGid: gid, attackerSi: originSi,
    groupFire: true,
    shots,
    step: 'intro',       // intro → hit → save → crippling → explosion → done
    shotIdx: 0,
    shieldsUp: {},        // {targetKey: bool}
    log: [],
    pendingDamage: {},    // {targetKey: damage} accumulated
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}


/* Open the attack modal for an asset attack (bomber / fireship / torpedo).
   Bombers & Fire Ships in `assetIds` combine into ONE roll; a Torpedo attacks alone.
   Uses the side's faction profile for that asset kind. */
function openBomberAttackModal(assetIds, targetGid, targetSi, side, kind) {
  kind = kind || 'bomber';
  const movers = state.launchedAssets.filter(a => assetIds.includes(a.id) && a.kind === kind);
  const total = movers.reduce((n, a) => n + a.count, 0);
  if (!total) { flashLaunchMsg('No asset in contact'); return; }
  const tg = state.groups[targetGid];
  const ts = tg && tg.ships[targetSi];
  if (!ts) { flashLaunchMsg('Invalid target'); return; }
  const prof = assetProfile(side, kind);
  const totalDice = total * (prof.att || 1);
  // Saturation Fire (bombers/fire ships): −1 save die per asset above 6.
  const saturation = (kind === 'torpedo') ? 0 : Math.max(0, total - 6);
  // Scourge Crippling-Fire on bombers (2 if 7+).
  const cripplingFire = (prof.special || '').includes('Crippling-Fire') ? (total >= 7 ? 2 : 1) : 0;
  const kindLabel = kind === 'torpedo' ? 'Torpedo' : kind === 'fireship' ? 'Fire Ship Wing' : 'Bomber Wing';
  const w = { name: `${kindLabel} ×${total}`, arc: '—', att: totalDice, lock: prof.lock, dmg: prof.dmg, type: prof.type,
    special: [prof.special || '', saturation ? `Saturation −${saturation}` : ''].filter(Boolean).join(', ') };
  state.attackModal = {
    bomber: true, bomberKind: kind, bomberAssetIds: assetIds, bomberSide: side, saturation, cripplingFire,
    attackerName: `${kindLabel} ×${total}`,
    attackerGid: null, attackerSi: null,
    shots: [{ wi: 0, w, targetGid, targetSi }],
    step: 'intro', shotIdx: 0, shieldsUp: {}, log: [], pendingDamage: {},
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}

/* Any launched assets currently locked onto a ship target (awaiting pooled attack)?
   Optionally restricted to a side and a stage type. */
function anyPendingBomberAttacks(side, type) {
  const kinds = type ? kindsForAssetType(type) : null;
  return (state.launchedAssets || []).some(a => a.bomberTarget && (!side || a.side === side) && (!kinds || kinds.includes(a.kind)));
}

/* Resolve the NEXT pending pooled attack (optionally scoped to a side + stage type).
   All assets of the SAME kind & side locked onto the SAME target ship combine into one
   attack. Chains via finishAttack → resolvePendingBomberAttacks until none remain for
   the scope. When a stage-scoped run finishes, the asset stage advances. */
function resolvePendingBomberAttacks(side, type) {
  // Remember the scope so finishAttack can continue / hand back to the stage machine.
  state._bomberResolveSide = side || null;
  state._bomberResolveType = type || null;
  const kinds = type ? kindsForAssetType(type) : null;
  const inScope = a => a.bomberTarget && (!side || a.side === side) && (!kinds || kinds.includes(a.kind));
  const locked = (state.launchedAssets || []).filter(inScope);
  if (!locked.length) {
    // No (more) attacks for this scope. If we were resolving for a stage, advance it.
    if (side) { state._bomberResolveSide = null; state._bomberResolveType = null; advanceAssetStage({ type: type || 'bomber', side }); }
    return false;
  }
  const first = locked[0];
  const key = a => `${a.kind}|${a.side}|${a.bomberTarget.gid}|${a.bomberTarget.si}`;
  const k0 = key(first);
  const pool = locked.filter(a => key(a) === k0);
  const tg = state.groups[first.bomberTarget.gid];
  const ts = tg && tg.ships[first.bomberTarget.si];
  if (!ts || ts.destroyed || ts.offTable) {
    pool.forEach(a => { a.bomberTarget = null; });
    return resolvePendingBomberAttacks(side, type);
  }
  openBomberAttackModal(pool.map(a => a.id), first.bomberTarget.gid, first.bomberTarget.si, first.side, first.kind);
  return true;
}

/* Open the attack modal for a Dropsite Feature weapon (Missile Halo, Orbital Gun).
   Treated like a bomber-style single-weapon attack from the dropsite. */
function openFeatureAttackModal(ds, fi, targetGid, targetSi, side) {
  const f = FEATURES[ds.features[fi]];
  const wp = f.weapon;
  const w = { name: `${f.name}: ${wp.name}`, arc: '—', att: wp.att, lock: wp.lock, dmg: wp.dmg, type: wp.type, special: wp.special || '' };
  state.attackModal = {
    bomber: true, bomberKind: 'feature', bomberAssetIds: [], bomberSide: side, saturation: 0, cripplingFire: 0,
    attackerName: `${f.name}: ${wp.name}`,
    attackerGid: null, attackerSi: null,
    shots: [{ wi: 0, w, targetGid, targetSi }],
    step: 'intro', shotIdx: 0, shieldsUp: {}, log: [], pendingDamage: {},
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}

function renderAttackModal() {
  let overlay = document.getElementById('attack-overlay');
  if (overlay) overlay.remove();
  const M = state.attackModal;
  if (!M) return;
  // Explosion step is handled by renderDetail (board-view panel), not the overlay.
  if (M.step === 'explosion') return;
  const aDef = M.bomber ? { name: M.attackerName || 'Bombers', side: M.bomberSide } : getDef(M.attackerGid);
  const aShip = M.bomber ? null : state.groups[M.attackerGid].ships[M.attackerSi];
  const sideClass = aDef.side === 'ucm' ? 'ucm' : 'shal';

  let body = '';
  let footer = '';

  if (M.step === 'intro') {
    // Show shields-up toggles for any targets that have shields.
    const targetsWithShields = [];
    M.shots.forEach(s => {
      const td = getDef(s.targetGid);
      const k = targetKey(s.targetGid, s.targetSi);
      if (hasShields(td) && !targetsWithShields.find(x => x.k === k)) targetsWithShields.push({ k, name: td.name, sv: shieldSaveVal(td) });
    });
    body = `<div class="am-line">Firing <b>${aDef.name}</b> — ${M.shots.length} weapon${M.shots.length>1?'s':''} locked.</div>`;
    M.shots.forEach(s => {
      const td = getDef(s.targetGid);
      let scNote = '';
      if (!M.bomber && M.attackerGid) {
        const ash = state.groups[M.attackerGid].ships[M.attackerSi];
        const ts = state.groups[s.targetGid].ships[s.targetSi];
        if (ash && ts) {
          const eff = sceneryAttackEffects(ash.x, ash.y, ts.x, ts.y, ash, ts);
          const tags = [eff.ignoreSig ? 'ignore Sig+Spikes' : eff.ignoreSpikes ? 'ignore Spikes' : ''].filter(Boolean);
          if (tags.length) scNote = ` <span style="color:var(--hull-warn);font-size:9px;">⌖ ${tags.join(', ')} (scenery)</span>`;
        }
      }
      body += `<div class="am-shot">${s.w.name} <span style="color:var(--text-mute)">(${s.w.arc}, Att ${s.w.att}, Lock ${s.w.lock}, Dmg ${s.w.dmg}, ${s.w.type})</span> ▶ <b>${td.name}</b>${scNote}</div>`;
    });
    if (targetsWithShields.length) {
      body += `<div class="am-line" style="margin-top:8px;"><b>Shields:</b></div>`;
      targetsWithShields.forEach(t => {
        body += `<label class="am-toggle"><input type="checkbox" data-shield-toggle="${t.k}" ${M.shieldsUp[t.k]?'checked':''}/> Raise shields on ${t.name} (Shield ${t.sv}+ vs E/K/C, ignores save mods; +1 Spike)</label>`;
      });
    }
    // Escort (§15.6): a friendly H/C target within 6" of a coherent Escort Group may
    // have non-Focused hits redirected to the Escort. Offer per eligible shot.
    if (!M.bomber) {
      M.shots.forEach((s, idx) => {
        const sp = parseWeaponSpecials(s.w);
        if (sp.focused) return; // Focused weapons can't be Escorted
        if (s.escortedTo) {
          body += `<div class="am-line" style="color:#7fd6a0;font-size:10px;">↪ ${s.w.name} redirected to Escort: ${getDef(s.escortedTo.gid).name}</div>`;
          return;
        }
        const esc = eligibleEscort(s.targetGid, s.targetSi);
        if (esc) {
          body += `<div class="am-line" style="margin-top:4px;"><button class="btn" data-escort="${idx}" style="font-size:10px;color:#7fd6a0;border-color:#7fd6a0;">🛡 Escort ${s.w.name} → ${esc.name}</button></div>`;
        }
      });
    }
    if (!M.bomber) {
      const ocWeapons = [];
      M.shots.forEach(s => { const sp = parseWeaponSpecials(s.w); if (sp.overcharge && !ocWeapons.find(x=>x.wi===s.wi)) ocWeapons.push({ wi: s.wi, name: s.w.name }); });
      if (ocWeapons.length) {
        body += `<div class="am-line" style="margin-top:8px;"><b>Overcharge:</b></div>`;
        ocWeapons.forEach(o => {
          body += `<label class="am-toggle"><input type="checkbox" data-overcharge="${o.wi}" ${M.overcharge&&M.overcharge[o.wi]?'checked':''}/> Overcharge ${o.name} (×2 Dmg; 6s self-damage)</label>`;
        });
      }
    }
    footer = `<button class="btn" data-am-cancel="1">Cancel</button>
      <button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="hit">Roll to Hit ▸</button>`;
  }

  else if (M.step === 'hit') {
    const s = M.shots[M.shotIdx];
    const td = getDef(s.targetGid);
    const ts = state.groups[s.targetGid].ships[s.targetSi];
    const sp = parseWeaponSpecials(s.w);
    const hr = M.hitResult;
    const effNote = [
      sp.mauler ? `Mauler (Lock=${hr.lock}+)` : '',
      sp.calibre && sp.calibre.toUpperCase().includes(td.tonnage) ? 'Calibre +1' : '',
      sp.scald ? `Scald-${sp.scald}` : '', sp.reave ? `Reave-${sp.reave}` : '',
      sp.burnthrough ? `Burnthrough-${sp.burnthrough}` : '', sp.penetrator ? 'Penetrator' : '',
      sp.critical ? `Critical-${sp.critical}` : ''
    ].filter(Boolean).join(' · ');
    body = `<div class="am-step-head">Shot ${M.shotIdx+1}/${M.shots.length} · Roll to Hit</div>
      <div class="am-line"><b>${s.w.name}</b>${s.volleyOf>1?` <span style="color:var(--hull-warn);font-size:9px;">Volley ${s.volleyIdx}/${s.volleyOf}</span>`:''} ▶ ${td.name} · ${hr.forceSix?'<span style="color:var(--hull-warn)">Atmosphere: hits 6+ only, no crit</span>':`Lock ${hr.lock}+ (${s.w.type})`}</div>
      ${effNote?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">${effNote}</div>`:''}
      <div class="am-dice">${hr.dice.map(d => `<span class="am-die ${d.isCrit?'crit':d.isHit?'hit':'miss'}">${d.r}</span>`).join('')}</div>
      <div class="am-line"><b>${hr.hits}</b> hit${hr.hits!==1?'s':''}${hr.crits?` · <span style="color:var(--hull-warn)">${hr.crits} critical</span>`:''}</div>`;
    {
      const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
      const missCount = hr.dice.filter(d => !d.isHit).length;
      if (!hr.rerolled && atkSide && state.planning && state.planning.ap[atkSide] >= 1 && missCount > 0) {
        const maxRR = Math.min(missCount, state.planning.ap[atkSide]);
        const n = Math.min(M.rerollN || maxRR, maxRR);
        body += `<div class="am-line" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:10px;">Re-roll</span>
          <button class="btn" data-rr-adj="-1" style="font-size:11px;padding:1px 7px;">−</button>
          <b style="font-size:11px;">${n}</b>
          <button class="btn" data-rr-adj="1" style="font-size:11px;padding:1px 7px;">+</button>
          <span style="font-size:9px;color:var(--text-mute);">of ${missCount} miss${missCount>1?'es':''} · max ${maxRR} AP</span>
          <button class="btn" data-am-reroll="hit" style="font-size:10px;">↻ Re-roll ${n} (${n} AP)</button>
        </div>`;
      }
    }
    footer = `<button class="btn" data-am-cancel="1">Abort</button>
      <button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="save">${hr.hits>0?'Roll Saves ▸':'No hits — Continue ▸'}</button>`;
  }

  else if (M.step === 'save') {
    const s = M.shots[M.shotIdx];
    const td = getDef(s.targetGid);
    const ts = state.groups[s.targetGid].ships[s.targetSi];
    const sp = parseWeaponSpecials(s.w);
    const sr = M.saveResult;
    const typeLabel = (t) => t === 'E' ? 'ES' : t === 'K' ? 'KS' : 'Shield/Core';
    const primFailedNow = sr.hitsList.filter(h => !h.saved && h.sv != null && !h.noSaveDie).length;
    body = `<div class="am-step-head">Shot ${M.shotIdx+1}/${M.shots.length} · ${sr.backupRolled ? 'Saves' : 'ES / KS Saves'}</div>
      <div class="am-line">${td.name} — ${sr.hitsList.length} hit${sr.hitsList.length!==1?'s':''}${sr.penetrator?' (criticals → Core)':''}</div>
      ${sr.primDice.length?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">Primary saves (vs each hit's modified save):</div>
        <div class="am-dice">${sr.primDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}" title="vs ${d.sv}+${d.crit?' (crit)':''}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled && sr.backDice.length?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">Backup saves (${td.bs}):</div>
        <div class="am-dice">${sr.backDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled && sr.aegisDice && sr.aegisDice.length?`<div class="am-line" style="font-size:9px;color:#4ad6ff">Aegis-${sr.aegisY} save dice:</div>
        <div class="am-dice">${sr.aegisDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled
        ? `<div class="am-line"><b>${sr.unsaved}</b> unsaved → <b style="color:var(--hull-crit)">${sr.dmg} damage</b>${sr.flash?` · <span style="color:var(--hull-warn)">Flash-${sr.flash} (${sr.dmg>0?'+'+sr.flash+' spike':'no dmg'})</span>`:''}${sr.crippling&&sr.critDamaged?` · <span style="color:var(--hull-warn)">Crippling!</span>`:''}</div>`
        : `<div class="am-line" style="color:var(--text-mute);font-size:10px;"><b>${primFailedNow}</b> hit${primFailedNow!==1?'s':''} unsaved so far${sr.backupVal != null ? ` — Backup (${td.bs}) still to roll` : (sr.isBomberAtk || sr.isCloseAction) ? ' — Aegis still to roll' : ''}</div>`}`;
    if (!sr.backupRolled) {
      const failed = sr.primDice.filter(d => !d.ok).length;
      if (!sr.rerolled && td.side && state.planning && state.planning.ap[td.side] >= 1 && failed > 0) {
        const maxRR = Math.min(failed, state.planning.ap[td.side]);
        const n = Math.min(M.rerollN || maxRR, maxRR);
        body += `<div class="am-line" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:10px;">Re-roll</span>
          <button class="btn" data-rr-adj="-1" style="font-size:11px;padding:1px 7px;">−</button>
          <b style="font-size:11px;">${n}</b>
          <button class="btn" data-rr-adj="1" style="font-size:11px;padding:1px 7px;">+</button>
          <span style="font-size:9px;color:var(--text-mute);">of ${failed} failed · max ${maxRR} AP</span>
          <button class="btn" data-am-reroll="save" style="font-size:10px;">↻ Re-roll ${n} (${n} AP)</button>
        </div>`;
      }
      // ── CLOSE PROTECTION (Fighters) ──
      // Vs Close Action / Bomber / Fire-Ship attacks, the defender may re-roll failed
      // PRIMARY saves using friendly Fighters within Fighter Thrust range (before Backup).
      {
        const isBomberAtk = M.bomber && (M.bomberKind === 'bomber' || M.bomberKind === 'fireship');
        const isCloseAction = parseWeaponSpecials(s.w).closeAction || /Close Action/i.test(s.w.special || '');
        if ((isBomberAtk || isCloseAction) && failed > 0 && td.side && !sr.fighterRerolled) {
          const wings = friendlyFightersInRange(td.side, ts.x, ts.y);
          const avail = wings.reduce((a, w) => a + w.count, 0);
          if (avail > 0) {
            M.fighterSpend = M.fighterSpend || {};
            const spendTotal = wings.reduce((a, w) => a + (M.fighterSpend[w.id] || 0), 0);
            const cap = Math.min(failed, avail);
            body += `<div class="am-line" style="border-top:1px dashed var(--border);margin-top:6px;padding-top:6px;">
              <div style="font-size:10px;color:#7fd6a0;margin-bottom:3px;">🛡 Close Protection — re-roll failed saves with Fighters (1 fighter each, max ${cap}):</div>`;
            wings.forEach((w, i) => {
              const cur = M.fighterSpend[w.id] || 0;
              body += `<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin:2px 0;">
                <span style="flex:1;">Fighter Wing ${i + 1} <span style="color:var(--text-mute)">(${w.count} craft)</span></span>
                <button class="btn" data-fp-adj="${w.id}|-1" style="font-size:11px;padding:1px 7px;">−</button>
                <b>${cur}</b>
                <button class="btn" data-fp-adj="${w.id}|1" style="font-size:11px;padding:1px 7px;">+</button>
              </div>`;
            });
            body += `<button class="btn" data-am-fighter-reroll="1" style="font-size:10px;margin-top:3px;color:#7fd6a0;border-color:#7fd6a0;" ${spendTotal>0?'':'disabled'}>↻ Re-roll ${spendTotal} save${spendTotal!==1?'s':''} (spend ${spendTotal} fighter${spendTotal!==1?'s':''})</button>
            </div>`;
          }
        }
      }
    }
    // Footer: if Backup/Aegis are still to roll and hits remain unsaved → roll them
    // (after re-rolls); otherwise apply damage.
    const needBackup = !sr.backupRolled && sr.hitsList.some(h => !h.saved && h.sv != null) &&
      (sr.backupVal != null || ((sr.isBomberAtk || sr.isCloseAction) && !M.aegisUsed && aegisValueForGroup(sr.targetGid) > 0));
    if (needBackup) {
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="rollbackup">Roll Backup Saves ▸</button>`;
    } else {
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="apply">Apply Damage ▸</button>`;
    }
  }

  else if (M.step === 'crippling') {
    const c = M.crippleQueue[0];
    const defSide = getDef(c.gid) ? getDef(c.gid).side : null;
    const canBrace = defSide && state.planning && state.planning.ap[defSide] >= 2 && !c.braced;
    if (!c.rolled) {
      // PRE-ROLL: declare Brace for Impact (set result to 4) BEFORE rolling.
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull.</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 2D6 for the effect.</div>
        ${canBrace?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-brace="1" style="font-size:10px;">⚙ Brace for Impact (2 AP → set result to 4, no roll)</button></div>`
          : c.braced?`<div class="am-line" style="color:var(--hull-warn)">Bracing for Impact — result will be 4.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-roll">${c.braced?'Apply (4) ▸':'Roll 2D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull${c.braced?' · <span style="color:var(--hull-warn)">Braced</span>':''}:</div>
        <div class="am-dice">${c.d1!=null?`<span class="am-die">${c.d1}</span><span class="am-die">${c.d2}</span> = `:''}<b>${c.total}</b></div>
        <div class="am-line" style="color:var(--hull-warn)"><b>${c.effectName}</b></div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${c.effectDesc}</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-next">Apply ▸</button>`;
    }
  }

  else if (M.step === 'explosion') {
    const ex = M.explodeQueue[0];
    const defSide = getDef(ex.gid) ? getDef(ex.gid).side : null;
    const canContain = defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained;
    if (!ex.rolled) {
      // PRE-ROLL: declare Contain Reactor (set result to 2) BEFORE rolling.
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed — explosion imminent (range ${ex.rangeIn}").</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 1D6${ex.mod?` (+${ex.mod} tonnage)`:''}. The radius is shown on the map.</div>
        ${canContain?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-contain="1" style="font-size:10px;">⚙ Contain Reactor (2 AP → set result to 2, no roll)</button></div>`
          : ex.contained?`<div class="am-line" style="color:var(--hull-crit)">Containing Reactor — result will be 2.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-roll">${ex.contained?'Resolve (2) ▸':'Roll 1D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed${ex.contained?' · <span style="color:var(--hull-crit)">Contained</span>':''}:</div>
        <div class="am-dice">${ex.d1!=null?`<span class="am-die">${ex.d1}</span>`:''}${ex.mod?` + ${ex.mod} = <b>${ex.total}</b>`:''}</div>
        <div class="am-line" style="color:var(--hull-crit)"><b>${ex.effectName}</b> (range ${ex.rangeIn}"${ex.effKind==='spike2x'?' ×2':''})</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${ex.effectDesc}</div>
        <div class="am-line" style="font-size:9px;color:var(--text-mute)">Applied to ships${ex.effAssets?' & assets':''} in range on the ${ex.layer} layer.</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-next">Resolve ▸</button>`;
    }
  }

  else if (M.step === 'impel') {
    const q = M.impelQueue[0];
    const tdef = getDef(q.gid);
    body = `<div class="am-step-head">Impel-${q.x}</div>
      <div class="am-line"><b>${tdef.name}</b> was struck by ${q.big?`≥${q.x*2}`:`≥${q.x}`} criticals. Attacker chooses:</div>
      <div class="am-line" style="margin-top:6px;">
        <button class="btn" data-impel="turn" style="font-size:10px;margin-right:6px;">↻ Turn ${q.big?'90°':'45°'}</button>
        <button class="btn" data-impel="move" style="font-size:10px;">→ Move forward up to ${q.x*2}"</button>
      </div>
      <div class="am-line" style="font-size:9px;color:var(--text-mute)">Turn rotates all ships in place; Move shifts them straight forward (auto, clamped to the table).</div>`;
    footer = '';
  }

  else if (M.step === 'done') {
    body = `<div class="am-step-head">Attack Resolved</div>
      ${M.log.map(l => `<div class="am-line" style="font-size:10px;">${l}</div>`).join('')}`;
    footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-close="1">Done</button>`;
  }

  overlay = document.createElement('div');
  overlay.id = 'attack-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '300';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--hull-crit)">⚔ ATTACK</h2></div>
    <div class="setup-body">${body}</div>
    <div class="setup-footer">${footer}</div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelectorAll('[data-shield-toggle]').forEach(cb => {
    cb.addEventListener('change', () => dispatch({ type: 'attackDeclare', what: 'shield', key: cb.dataset.shieldToggle, value: cb.checked }));
  });
  overlay.querySelectorAll('[data-overcharge]').forEach(cb => {
    cb.addEventListener('change', () => dispatch({ type: 'attackDeclare', what: 'overcharge', wi: cb.dataset.overcharge, value: cb.checked }));
  });
  overlay.querySelectorAll('[data-escort]').forEach(btn => {
    btn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'escort', idx: parseInt(btn.dataset.escort) }));
  });
  const cancelBtn = overlay.querySelector('[data-am-cancel]');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { state.attackModal = null; renderAll(); });
  const closeBtn = overlay.querySelector('[data-am-close]');
  if (closeBtn) closeBtn.addEventListener('click', () => { finishAttack(); });
  const nextBtn = overlay.querySelector('[data-am-next]');
  if (nextBtn) nextBtn.addEventListener('click', () => advanceAttack(nextBtn.dataset.amNext));
  const braceBtn = overlay.querySelector('[data-am-brace]');
  if (braceBtn) braceBtn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'brace' }));
  const containBtn = overlay.querySelector('[data-am-contain]');
  if (containBtn) containBtn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'contain' }));
  overlay.querySelectorAll('[data-impel]').forEach(btn => {
    btn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'impel', choice: btn.dataset.impel }));
  });
  overlay.querySelectorAll('[data-rr-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.rrAdj);
      // Compute the current max from whichever step we're in.
      let maxRR = 1;
      if (M.step === 'hit' && M.hitResult) {
        const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
        const miss = M.hitResult.dice.filter(d => !d.isHit).length;
        maxRR = Math.min(miss, (state.planning && state.planning.ap[atkSide]) || 0);
      } else if (M.step === 'save' && M.saveResult) {
        const td = getDef(M.shots[M.shotIdx].targetGid);
        const failed = M.saveResult.primDice.filter(d => !d.ok).length;
        maxRR = Math.min(failed, (state.planning && state.planning.ap[td.side]) || 0);
      }
      const cur = Math.min(M.rerollN || maxRR, maxRR);
      M.rerollN = Math.max(1, Math.min(maxRR, cur + delta));
      renderAll();
    });
  });
  // Close Protection: per-Wing fighter spend stepper.
  overlay.querySelectorAll('[data-fp-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [wingId, deltaStr] = btn.dataset.fpAdj.split('|');
      const delta = parseInt(deltaStr);
      const sr = M.saveResult; if (!sr) return;
      const s = M.shots[M.shotIdx]; const td = getDef(s.targetGid);
      const ts = state.groups[s.targetGid].ships[s.targetSi];
      const failed = sr.primDice.filter(d => !d.ok).length;
      const wings = friendlyFightersInRange(td.side, ts.x, ts.y);
      const avail = wings.reduce((a, w) => a + w.count, 0);
      const cap = Math.min(failed, avail);
      M.fighterSpend = M.fighterSpend || {};
      const wing = wings.find(w => w.id === wingId);
      if (!wing) return;
      const curWing = M.fighterSpend[wingId] || 0;
      const otherSpend = Object.keys(M.fighterSpend).reduce((a, k) => a + (k === wingId ? 0 : (M.fighterSpend[k] || 0)), 0);
      const room = Math.max(0, cap - otherSpend); // total cap minus what other wings already spend
      M.fighterSpend[wingId] = Math.max(0, Math.min(wing.count, room, curWing + delta));
      renderAll();
    });
  });
  // Close Protection: re-roll failed saves, spending the selected fighters.
  const fpRerollBtn = overlay.querySelector('[data-am-fighter-reroll]');
  if (fpRerollBtn) fpRerollBtn.addEventListener('click', () => dispatch({ type: 'attackFighterReroll' }));
  const rerollBtn = overlay.querySelector('[data-am-reroll]');
  if (rerollBtn) rerollBtn.addEventListener('click', () => dispatch({ type: 'attackReroll', which: rerollBtn.dataset.amReroll }));
}

/* Advance the attack state machine. */
/* Attack step machine — dispatched as a server-authoritative intent (so the
   server rolls the dice with the room's seeded rng); hotseat applies locally. */
function advanceAttack(to) { if (state.attackModal) dispatch({ type: 'attackStep', to }); }
function nextShotOrResolve() { _nextShotOrResolve(state, rng, state.attackModal); }

/* Per-ship points value (group points divided by group size). */

/* Apply pending damage + queue crippling/explosions — engine resolution. */
function resolveAccumulatedDamage() { _resolveAttackDamage(state, state.attackModal); }

function proceedQueues() { _proceedQueues(state.attackModal); }

const CRIPPLE_LABEL = { energy:'Energy Surge', structural:'Struct.', fire:'Fire', defence:'Def. Offline', scanners:'Scan Offline', weapons:'Wpn Offline', navigation:'Nav Offline', decay:'Orbital Decay' };
// Crippling/explosion resolvers now live in src/engine/mutators.js (shared with
// the server). makeCrippleRoll / makeExplosionRoll are imported directly; the
// rng-driven rolls are shimmed to inject the active rng.
function rollCrippleEffect(c, forced) { return _rollCrippleEffect(rng, c, forced); }
function applyCrippling() { _applyCripplingNext(state, state.attackModal); renderAll(); }
function rollExplosionEffect(ex, forced) { return _rollExplosionEffect(rng, ex, forced); }
function applyExplosion() { _applyExplosionNext(state, rng, state.attackModal); renderAll(); }

function applyExplosionEffect(ex, M) { return _applyExplosionEffect(state, rng, ex, M); }
/* Roll Backup saves (and Aegis save dice) on hits still unsaved AFTER primary ES/KS
   saves and any re-rolls have been applied. Mutates sr in place and recomputes damage.
   Called when the player advances past the primary-save sub-step. */
function rollDeferredBackupSaves(M) { _rollDeferredBackupSaves(state, rng, M); }

/* Commit a resolved attack. Group fire goes through the server-authoritative
   intent; a bomber attack commits via the engine then runs the asset-phase
   continuation (re-opening the next pooled attack / advancing the stage) here,
   since that orchestration re-opens client modals. */
function finishAttack() {
  const M = state.attackModal;
  if (!M) return;
  if (!M.bomber) { dispatch({ type: 'finishAttack' }); return; }
  const hint = _finishAttack(state, M);
  if (hint && hint.bomber) {
    const { scope, scopeType } = hint;
    if (anyPendingBomberAttacks(scope, scopeType)) { resolvePendingBomberAttacks(scope, scopeType); renderAll(); return; }
    if (scope) { state._bomberResolveSide = null; state._bomberResolveType = null; advanceAssetStage({ type: scopeType || 'bomber', side: scope }); }
  }
  renderAll();
}

/* ── END-PHASE REPAIR ──
   Repairable crippling effects (Energy Surge & Structural Damage are one-shot,
   not repairable). Orbital Decay needs 6+; others 4+. DC order = 2D6 per effect. */
const REPAIRABLE = ['fire', 'defence', 'scanners', 'weapons', 'navigation', 'decay'];

/* Are there any Fire tokens or repairable crippling effects on the table? */
function anyRepairWork() {
  return Object.keys(state.groups).some(gid =>
    state.groups[gid].ships.some(s =>
      !s.destroyed && !s.offTable &&
      ((s.fireTokens > 0) || (s.crippling && s.crippling.some(c => REPAIRABLE.includes(c))))
    )
  );
}

/* Begin the End-Phase repair: first apply Fire damage, then build repair rolls. */
function openRepairPhase() {
  // Step 1: Fire tokens deal 1 damage each, before repair. Track destructions.
  const fireLog = [];
  const explosions = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.fireTokens) return;
      const dmg = s.fireTokens;
      s.hull = Math.max(0, s.hull - dmg);
      fireLog.push(`${def.name} takes ${dmg} Fire damage (${s.hull}/${s.maxHull})`);
      if (s.hull <= 0) {
        s.destroyed = true;
        if (isCapital(def)) explosions.push(makeExplosionRoll(gid, si, def, s));
      }
    });
  });
  // Resolve any Fire-death explosions' area effects (chained explosions included).
  while (explosions.length) {
    const ex = explosions.shift();
    fireLog.push(`${ex.name} exploded: ${ex.effectName}`);
    applyExplosionEffect(ex, { explodeQueue: explosions });
  }
  // Step 2: build repair targets — ships with repairable crippling effects.
  const targets = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.crippling) return;
      const eff = s.crippling.filter(c => REPAIRABLE.includes(c));
      if (eff.length) targets.push({ gid, si, name: def.name, effects: eff.slice(), dc: !!s.dcThisRound, rolled: null });
    });
  });
  state.repairPhase = { step: fireLog.length ? 'fire' : 'repair', fireLog, explosions: [], targets, idx: 0, log: [] };
  renderAll();
}
