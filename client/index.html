    const asteroid = new THREE.Mesh(
      new THREE.SphereGeometry(r, segs, Math.round(segs * 0.7)),
      new THREE.MeshLambertMaterial({ color: 0x707070 })
    );
    asteroid.position.set(wx, _3D_LAYER_Y.orbit, wz);

    // Craters — deterministic directions, facing upper hemisphere so they're visible from above
    const seed = Math.round(Math.abs(wx * 11 + wz * 7)) % 97;
    const pseudo = (i) => ((seed * 31 + i * 17) % 97) / 97;
    const craterCount = 4 + (seed % 3);
    for (let i = 0; i < craterCount; i++) {
      // Bias craters toward the top hemisphere (phi 0–0.6π) so camera sees them
      const theta = pseudo(i) * Math.PI * 2;
      const phi   = pseudo(i + 10) * Math.PI * 0.55;
      const dir   = new THREE.Vector3(
        Math.sin(phi) * Math.cos(theta),
        Math.cos(phi),
        Math.sin(phi) * Math.sin(theta)
      ).normalize();
      const cr = r * (0.12 + pseudo(i + 20) * 0.14);
      const surfacePos = (scale) => dir.clone().multiplyScalar(r * scale);
      const faceDir = new THREE.Vector3(0, 0, 1);

      // Concentric depth-shaded discs with polygon offset to prevent z-fighting
      [
        { s: 1.00, pFactor: -2,  color: 0x555555 },
        { s: 0.68, pFactor: -5,  color: 0x333333 },
        { s: 0.35, pFactor: -9,  color: 0x181818 },
      ].forEach(({ s, pFactor, color }) => {
        const disc = new THREE.Mesh(
          new THREE.CircleGeometry(cr * s, 16),
          new THREE.MeshLambertMaterial({ color, polygonOffset: true, polygonOffsetFactor: pFactor, polygonOffsetUnits: -1 })
        );
        disc.position.copy(surfacePos(1.001));
        disc.quaternion.setFromUnitVectors(faceDir, dir);
        asteroid.add(disc);
      });

      // Raised rim torus
      const rimGeo = new THREE.TorusGeometry(cr * 1.05, cr * 0.04, 4, 20);
      const rim = new THREE.Mesh(rimGeo, new THREE.MeshLambertMaterial({
        color: 0x909090, polygonOffset: true, polygonOffsetFactor: -12, polygonOffsetUnits: -1
      }));
      rim.position.copy(surfacePos(1.001));
      rim.quaternion.setFromUnitVectors(faceDir, dir);
      asteroid.add(rim);
    }

    group.add(asteroid);
    // Tether down to board
    group.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(wx, 1, wz), new THREE.Vector3(wx, _3D_LAYER_Y.orbit - r, wz)]),
      new THREE.LineBasicMaterial({ color: 0x505050, transparent: true, opacity: 0.25 })
    ));
  });

  // Dropsites — cities get building clusters, stations get disc shapes
  (sd.dropsites || []).forEach(ds => {
    const wx = ds.x * INCH - 288, wz = ds.y * INCH - 288;
    const sk = dropsiteSizeKey(ds);
    const dead = ds.damage >= ds.maxHull;
    const isCity = (ds.type || '').includes('city');

    if (isCity) {
      _add3dCity(group, wx, wz, sk, dead, ds);
    } else {
      _add3dStation(group, wx, wz, sk, dead);
    }
  });

  // Placed scenery clouds — float between atmosphere (60) and orbit (120) layers, centred at y=90
  const _CLOUD_Y = (_3D_LAYER_Y.orbit + _3D_LAYER_Y.atmosphere) / 2; // 90
  (sd.placedScenery || []).forEach(sc => {
    const wx = sc.x * INCH - 288, wz = sc.y * INCH - 288;
    const dense = sc.type === 'dense';
    const baseCol = dense ? 0x4a3a1a : 0x1a2a4a;
    const count = dense ? 5 : 7;
    for (let i = 0; i < count; i++) {
      const r = dense ? 7 + i * 3 : 5 + i * 4;
      const ang = (i / count) * Math.PI * 2 + (sc.angle || 0) * Math.PI / 180;
      const spread = dense ? 14 : 22;
      // Vertical offset staggers puffs across ±12 units around the midpoint
      const yOff = ((i / count) - 0.5) * 24;
      const geo = new THREE.SphereGeometry(r, 6, 4);
      const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({
        color: baseCol, transparent: true, opacity: dense ? 0.65 : 0.78, depthWrite: false
      }));
      mesh.renderOrder = 1;
      mesh.position.set(wx + Math.cos(ang) * spread, _CLOUD_Y + yOff, wz + Math.sin(ang) * spread);
      group.add(mesh);
    }
  });

}

// Dynamic scenery: only the in-progress placement ghost (pending + hover preview).
// Called every sync because it tracks mouse position and angle in real time.
function _sync3dSceneryDynamic(group) {
  // Scenery placement ghost — pending position (with live angle) and hover preview.
  if (state.phase === 'scenery' && state.sceneryPlace) {
    const _gsp = state.sceneryPlace;
    const _gdense = _gsp.type === 'dense';
    const _gcount = _gdense ? 5 : 7;
    const _gspread = _gdense ? 14 : 22;

    const _CLOUD_Y = (_3D_LAYER_Y.orbit + _3D_LAYER_Y.atmosphere) / 2;
    const _addGhostCloud = (wx, wz, angleRad, opacity, col) => {
      for (let i = 0; i < _gcount; i++) {
        const r = _gdense ? 7 + i * 3 : 5 + i * 4;
        const ang = (i / _gcount) * Math.PI * 2 + angleRad;
        const yOff = ((i / _gcount) - 0.5) * 24;
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(r, 6, 4),
          new THREE.MeshLambertMaterial({ color: col, transparent: true, opacity, depthWrite: false })
        );
        mesh.renderOrder = 2;
        mesh.position.set(wx + Math.cos(ang) * _gspread, _CLOUD_Y + yOff, wz + Math.sin(ang) * _gspread);
        group.add(mesh);
      }
    };

    if (_gsp.pending) {
      // Piece is placed — show solid ghost + dashed direction line while aiming.
      const wx = _gsp.pending.x - 288, wz = _gsp.pending.y - 288;
      const baseCol = _gdense ? 0x4a3a1a : 0x1a2a4a;
      _addGhostCloud(wx, wz, (_gsp.angle || 0) * Math.PI / 180, 0.85, baseCol);
      const aRad = (_gsp.angle || 0) * Math.PI / 180;
      const lineLen = _gspread + 18;
      const aimLine = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(wx, _CLOUD_Y, wz),
          new THREE.Vector3(wx + Math.sin(aRad) * lineLen, _CLOUD_Y, wz + Math.cos(aRad) * lineLen),
        ]),
        new THREE.LineDashedMaterial({ color: 0x4ad6ff, transparent: true, opacity: 0.75, dashSize: 5, gapSize: 3 })
      );
      aimLine.computeLineDistances();
      group.add(aimLine);
    } else if (state.hoverPoint) {
      // Hovering — show transparent ghost coloured by validity.
      const xIn = state.hoverPoint.x / INCH, yIn = state.hoverPoint.y / INCH;
      const valid = sceneryValid(_gsp.type, xIn, yIn);
      const col = valid.ok ? (_gdense ? 0x4a3a1a : 0x1a2a4a) : 0x6b1a1a;
      _addGhostCloud(state.hoverPoint.x - 288, state.hoverPoint.y - 288, 0, 0.38, col);
    }
  }
}

// City dropsite
function _add3dCity(group, wx, wz, sk, dead, ds) {
  const tmpl = _glbCities[sk];
  if (tmpl) {
    const clone = tmpl.clone(true);
    _tintGlbScenery(clone, dead);
    const locator = new THREE.Group();
    locator.position.set(wx, 0, wz);
    locator.add(clone);
    group.add(locator);
    // Ground-pin: compute precise world-space min Y (precise:true iterates actual
    // vertex positions, not cached geometry.boundingBox) and zero it.
    // Must run after adding to the scene so the full matrixWorld chain is live.
    _3d.scene.updateMatrixWorld(true);
    const _cityBbox = new THREE.Box3().setFromObject(locator, true);
    if (isFinite(_cityBbox.min.y) && Math.abs(_cityBbox.min.y) > 0.01) {
      locator.position.y -= _cityBbox.min.y;
    }
  } else {
    // Procedural fallback — deterministic layout seeded from position
    const seed   = Math.round(Math.abs(wx * 7 + wz * 13)) % 97;
    const pseudo = (i) => ((seed * 31 + i * 17) % 97) / 97;
    const cfg = {
      L: { count: 24, maxH: 42, minH: 8, spread: 22, wRange: [4, 10] },
      M: { count: 14, maxH: 28, minH: 6, spread: 14, wRange: [3,  8] },
      S: { count:  7, maxH: 16, minH: 5, spread:  8, wRange: [3,  6] },
    }[sk] || { count: 7, maxH: 16, minH: 5, spread: 8, wRange: [3, 6] };
    const buildCol  = dead ? 0x2a1a10 : 0x909090;
    const emissCol  = dead ? 0x000000 : 0x080808;
    const accentCol = dead ? 0x4a1a08 : 0xc0c0c0;
    for (let i = 0; i < cfg.count; i++) {
      const angle = (i / cfg.count) * Math.PI * 2 + pseudo(i) * 0.8;
      const dist  = pseudo(i + 10) * cfg.spread;
      const bx    = wx + Math.cos(angle) * dist;
      const bz    = wz + Math.sin(angle) * dist;
      const bh    = cfg.minH + pseudo(i + 20) * (cfg.maxH - cfg.minH);
      const bw    = cfg.wRange[0] + pseudo(i + 30) * (cfg.wRange[1] - cfg.wRange[0]);
      const bd    = cfg.wRange[0] + pseudo(i + 40) * (cfg.wRange[1] - cfg.wRange[0]);
      const bMesh = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), new THREE.MeshLambertMaterial({ color: buildCol, emissive: emissCol }));
      bMesh.position.set(bx, bh / 2, bz);
      group.add(bMesh);
      if (bh > cfg.maxH * 0.65) {
        const stripeMesh = new THREE.Mesh(new THREE.BoxGeometry(bw + 0.4, 1.2, bd + 0.4), new THREE.MeshBasicMaterial({ color: accentCol }));
        stripeMesh.position.set(bx, bh * 0.75, bz);
        group.add(stripeMesh);
      }
    }
  }

  // City glow — light blue point light (red if dead/burning)
  const cityGlowIntensity = sk === 'L' ? 180 : sk === 'M' ? 100 : 55;
  const cityGlowDist      = sk === 'L' ? 160 : sk === 'M' ? 110 : 70;
  const cityLight = new THREE.PointLight(dead ? 0xff4400 : 0x44aaff, cityGlowIntensity, cityGlowDist);
  cityLight.position.set(wx, sk === 'L' ? 22 : sk === 'M' ? 14 : 8, wz);
  group.add(cityLight);
}

// Station dropsite
function _add3dStation(group, wx, wz, sk, dead) {
  const wy     = _3D_LAYER_Y.orbit;
  const glowCol = dead ? 0xff3300 : 0x60c8ff;

  if (_glbStation) {
    // Scale factors relative to the normalised L template (L=1.0, M=0.68, S=0.45)
    const scaleF = sk === 'L' ? 1.0 : sk === 'M' ? 0.68 : 0.45;
    const clone  = _glbStation.clone(true);
    clone.scale.multiplyScalar(scaleF);
    clone.position.multiplyScalar(scaleF);
    _tintGlbScenery(clone, dead);
    // Lower so the disc body intersects the orbital plane rather than floating above it.
    const locator = new THREE.Group();
    locator.position.set(wx, wy - _3D_STATION_Y_DROP * scaleF, wz);
    locator.add(clone);
    group.add(locator);
  } else {
    // Procedural fallback — saucer + spine + aux modules
    const sc = sk === 'L' ? 0.22 : sk === 'M' ? 0.15 : 0.10;
    const B  = 18 * sc;
    const bodyCol   = dead ? 0x3a2820 : 0x8090a0;
    const darkCol   = dead ? 0x1a1008 : 0x2a3038;
    const accentCol = dead ? 0x6a3820 : 0xc0d8e8;
    const bodyMat   = () => new THREE.MeshLambertMaterial({ color: bodyCol });
    const darkMat   = () => new THREE.MeshLambertMaterial({ color: darkCol });
    const accentMat = () => new THREE.MeshLambertMaterial({ color: accentCol });
    const discR = B * 2.6, discH = B * 0.32;
    group.add(new THREE.Mesh(new THREE.CylinderGeometry(discR, discR * 1.08, discH, 32), bodyMat())
      .translateX(wx).translateY(wy).translateZ(wz));
    const platR = discR * 0.52, platH = discH * 1.7;
    group.add(new THREE.Mesh(new THREE.CylinderGeometry(platR, platR * 1.05, platH, 20), darkMat())
      .translateX(wx).translateY(wy + (discH + platH) * 0.5).translateZ(wz));
    const wRingGeo = new THREE.TorusGeometry(discR * 0.94, B * 0.11, 4, 32);
    wRingGeo.rotateX(Math.PI / 2);
    group.add(new THREE.Mesh(wRingGeo, darkMat()).translateX(wx).translateY(wy).translateZ(wz));
    const domeGeo = new THREE.SphereGeometry(B * 0.62, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    group.add(new THREE.Mesh(domeGeo, accentMat())
      .translateX(wx).translateY(wy + discH * 0.5 + platH).translateZ(wz));
    const auxCount = sk === 'L' ? 4 : sk === 'M' ? 2 : 0;
    const auxR = discR * 0.28, auxH = discH * 0.7, armLen = discR * 1.25;
    for (let i = 0; i < auxCount; i++) {
      const ang = (i / auxCount) * Math.PI * 2;
      const ax = wx + Math.cos(ang) * armLen, az = wz + Math.sin(ang) * armLen;
      const armMesh = new THREE.Mesh(new THREE.CylinderGeometry(B * 0.09, B * 0.09, armLen - discR * 0.9, 5), darkMat());
      armMesh.rotation.z = Math.PI / 2; armMesh.rotation.y = ang;
      armMesh.position.set(wx + Math.cos(ang) * (discR * 0.85 + (armLen - discR * 0.9) * 0.5), wy,
                           wz + Math.sin(ang) * (discR * 0.85 + (armLen - discR * 0.9) * 0.5));
      group.add(armMesh);
      group.add(new THREE.Mesh(new THREE.CylinderGeometry(auxR, auxR * 1.06, auxH, 20), bodyMat())
        .translateX(ax).translateY(wy).translateZ(az));
      const auxRingGeo = new THREE.TorusGeometry(auxR * 0.92, B * 0.07, 4, 20);
      auxRingGeo.rotateX(Math.PI / 2);
      group.add(new THREE.Mesh(auxRingGeo, darkMat()).translateX(ax).translateY(wy).translateZ(az));
      group.add(new THREE.Mesh(new THREE.SphereGeometry(B * 0.18, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), accentMat())
        .translateX(ax).translateY(wy + auxH * 0.5).translateZ(az));
    }
    const spineR = B * 0.45, spineH = B * 6;
    group.add(new THREE.Mesh(new THREE.CylinderGeometry(spineR * 0.75, spineR, spineH, 8), darkMat())
      .translateX(wx).translateY(wy - spineH * 0.5).translateZ(wz));
    const nSegs = sk === 'L' ? 4 : 3;
    for (let i = 0; i < nSegs; i++) {
      group.add(new THREE.Mesh(new THREE.CylinderGeometry(spineR * 1.8, spineR * 1.8, B * 0.10, 8), accentMat())
        .translateX(wx).translateY(wy - (i + 0.8) * (spineH / (nSegs + 1))).translateZ(wz));
    }
    const lrY = wy - spineH * 0.52, lrR = discR * 0.48;
    group.add(new THREE.Mesh(new THREE.CylinderGeometry(lrR * 0.88, lrR, B * 0.20, 20), bodyMat())
      .translateX(wx).translateY(lrY).translateZ(wz));
    const lrTorusGeo = new THREE.TorusGeometry(lrR * 0.84, B * 0.07, 4, 20);
    lrTorusGeo.rotateX(Math.PI / 2);
    group.add(new THREE.Mesh(lrTorusGeo, darkMat()).translateX(wx).translateY(lrY).translateZ(wz));
    group.add(new THREE.Mesh(new THREE.SphereGeometry(B * 0.42, 10, 8), bodyMat())
      .translateX(wx).translateY(wy - spineH + B * 0.42).translateZ(wz));
  }

  const light = new THREE.PointLight(glowCol, sk === 'L' ? 120 : sk === 'M' ? 70 : 40,
                                              sk === 'L' ? 140 : sk === 'M' ? 90 : 55);
  light.position.set(wx, wy, wz);
  group.add(light);
}

// Read faction colour from the player's chosen colour (player1 / player2)
function _3dSideColor(side) {
  const entry = side === 'player1' ? player1Color() : side === 'player2' ? player2Color() : null;
  if (entry) return parseInt(entry.hex.slice(1), 16);
  return 0x888888;
}

function _3dDimColor(hex, f) {
  return (Math.round(((hex >> 16) & 0xff) * f) << 16) |
         (Math.round(((hex >> 8)  & 0xff) * f) << 8)  |
          Math.round((hex & 0xff) * f);
}

function _sync3dShips(group) {
  _3dShipMeshes = []; // reset selectable mesh list
  // Build a lookup of all deployed ship positions for targeting lines
  const shipPos = {};
  Object.entries(state.groups || {}).forEach(([gid, grp]) => {
    grp.ships.forEach((ship, si) => {
      if (!ship.destroyed && !ship.offTable)
        shipPos[`${gid}:${si}`] = { x: ship.x - 288, y: _3D_LAYER_Y[ship.layer] ?? 120, z: ship.y - 288 };
    });
  });

  Object.entries(state.groups || {}).forEach(([gid, grp]) => {
    const def    = grp.def;
    const faction    = def.faction || def.id.split(':')[1] || 'generic'; // faction key e.g. 'ucm', 'scourge'
    const playerSide = def.side;                                         // 'player1' | 'player2'
    const baseCol = _3dSideColor(playerSide);
    const isSel  = state.selectedGroupId === gid;
    const tonnage = def.tonnage || 'L';
    const isWing  = typeof def.tonnage === 'string' && (def.role === 'fighter' || def.role === 'bomber'
                    || (def.special || '').toLowerCase().includes('fighter')
                    || (def.special || '').toLowerCase().includes('bomber'));

    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      const wx = ship.x - 288, wz = ship.y - 288;
      const wy = _3D_LAYER_Y[ship.layer] ?? 120;
      const rotY = _3dShipRotY(ship.heading || 0);
      const damageFrac = def.hull > 0 ? (def.hull - ship.hull) / def.hull : 0;
      const shipCol = damageFrac > 0 ? _3dDimColor(baseCol, damageFrac > 0.5 ? 0.45 : 0.7) : baseCol;

      // Ship mesh (oriented along -Z = forward)
      const mesh = isWing ? _buildWingMesh3d(def, shipCol, faction) : _buildShipMesh3d(tonnage, shipCol, faction, def.role);
      mesh.position.set(wx, wy, wz);
      mesh.rotation.y = rotY;
      mesh.userData = { type: 'ship', gid, si: String(si) };
      mesh.traverse(c => { if (c !== mesh) c.userData = { type: 'ship', gid, si: String(si) }; });
      _3dShipMeshes.push({ mesh, gid, si });
      group.add(mesh);

      // Selection: flat torus ring on the layer plane around the ship
      if (isSel) {
        const [len] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
        const selGeo = new THREE.TorusGeometry(len * 0.65, 0.7, 3, 20);
        selGeo.rotateX(Math.PI / 2);
        const selMesh = new THREE.Mesh(selGeo, new THREE.MeshBasicMaterial({
          color: 0xffffff, transparent: true, opacity: 0.55
        }));
        selMesh.position.set(wx, wy, wz);
        group.add(selMesh);
      }

      // Crippling indicator — dashed amber ring around the ship when effects are active.
      if (ship.crippling && ship.crippling.length > 0) {
        const [criLen] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
        group.add(_3dDashedCircle(wx, wz, criLen * 0.9, wy, 0xff6600, 0.85, 3, 2));
      }

      // Tether
      group.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(wx, 1, wz), new THREE.Vector3(wx, wy - 2, wz)]),
        new THREE.LineBasicMaterial({ color: baseCol, transparent: true, opacity: 0.2 })
      ));

      // Movement trail — each waypoint uses its own layer height so ascend/descend is visible
      const trail = _view3dTrails ? (grp.moveTrail || []).filter(t => t.si === si) : [];
      if (trail.length) {
        const pts = [
          ...trail.map(t => new THREE.Vector3(t.x - 288, _3D_LAYER_Y[t.layer] ?? wy, t.y - 288)),
          new THREE.Vector3(wx, wy, wz)
        ];
        group.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({ color: baseCol, transparent: true, opacity: 0.4 })
        ));
      }

      // Weapon targeting lines (red dotted) — ship targets and bombardment dropsite targets
      Object.values(ship.weaponTargets || {}).forEach(tgt => {
        const redMat = new THREE.LineDashedMaterial({ color: 0xff3030, transparent: true, opacity: 0.65, dashSize: 4, gapSize: 3 });
        if (tgt.dsId) {
          // Targeting line from ship to dropsite — drawn at the dropsite's actual layer height
          const ds = state.scenarioData && state.scenarioData.dropsites &&
                     state.scenarioData.dropsites.find(d => d.id === tgt.dsId);
          if (!ds) return;
          const dsx = ds.x * INCH - 288, dsz = ds.y * INCH - 288;
          const dsy = DROPSITE_BASE[ds.type]?.category === 'station' ? _3D_LAYER_Y.orbit - _3D_STATION_Y_DROP : 0;
          const _wl1 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(wx, wy, wz), new THREE.Vector3(dsx, dsy, dsz)
          ]), redMat);
          _wl1.computeLineDistances(); group.add(_wl1);
        } else {
          // Ship-to-ship
          const tp = shipPos[`${tgt.gid}:${tgt.si}`];
          if (!tp) return;
          const _wl2 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(wx, wy, wz), new THREE.Vector3(tp.x, tp.y, tp.z)
          ]), redMat);
          _wl2.computeLineDistances(); group.add(_wl2);
        }
      });
    });
  });

  // ── Movement cone + hover ghost for selected ship ──────────────────────────
  const selGid = state.selectedGroupId;
  const selSi  = state.selectedShipIdx;
  if (selGid !== null && selSi !== null) {
    const selGrp = state.groups[selGid];
    const selDef = getDef(selGid);
    if (selGrp && selDef) {
      const selShip = selGrp.ships[selSi];
      const ordKey  = effectiveOrder(selDef, selGrp, selSi);
      const canMove = selShip && !selShip.destroyed && !selShip.offTable
        && ordKey && ORDERS[ordKey] && ORDERS[ordKey].moveMax > 0
        && !selShip.movedThisRound && !selGrp.activated;
      if (canMove) {
        const _moveTargetLayer = state.layerToggle
          ? (selShip.layer === 'orbit' ? 'atmosphere' : 'orbit')
          : (selShip.layer || 'orbit');
        const wy      = _3D_LAYER_Y[_moveTargetLayer] ?? 120;
        const o       = ORDERS[ordKey];
        const lm      = layerMove(effectiveMaxMovePx(selDef, selShip, ordKey), selShip, state.layerToggle);
        const maxR    = lm.maxPx;
        let   minR    = o.moveMin * selDef.thrust * INCH;
        if (minR > maxR) minR = 0;
        const turnDeg = o.turnLimit || 0;

        if (maxR > 0) {
          const headRad   = selShip.heading * Math.PI / 180;
          const halfAngle = turnDeg > 0 ? turnDeg * Math.PI / 180 : 0.04;
          const startA    = headRad - halfAngle;
          const endA      = headRad + halfAngle;
          const steps     = Math.max(8, Math.ceil(Math.abs(endA - startA) * 20));
          const coneCol   = selDef.side === 'player1' ? 0x4488ff : 0xff8844;
          const swx = selShip.x - 288, swz = selShip.y - 288;

          // Filled wedge — cache by (ship, order, layer, heading) key so the
          // expensive ShapeGeometry triangulation runs once per position change,
          // not on every mousemove while the cursor is hovering.
          const coneKey = `${selGid}:${selSi}:${ordKey}:${_moveTargetLayer}:${selShip.heading}:${maxR.toFixed(1)}:${minR.toFixed(1)}`;
          if (!_3dConeGeoCache || _3dConeGeoCache.key !== coneKey) {
            const shape = new THREE.Shape();
            shape.moveTo(Math.cos(startA) * maxR, Math.sin(startA) * maxR);
            for (let i = 1; i <= steps; i++) {
              const a = startA + (endA - startA) * i / steps;
              shape.lineTo(Math.cos(a) * maxR, Math.sin(a) * maxR);
            }
            for (let i = steps; i >= 0; i--) {
              const a = startA + (endA - startA) * i / steps;
              shape.lineTo(Math.cos(a) * minR, Math.sin(a) * minR);
            }
            shape.closePath();
            const fillGeo = new THREE.ShapeGeometry(shape, steps);
            fillGeo.rotateX(Math.PI / 2);
            const outPts = [];
            for (let i = 0; i <= steps; i++) {
              const a = startA + (endA - startA) * i / steps;
              outPts.push(new THREE.Vector3(Math.cos(a) * maxR, 0, Math.sin(a) * maxR));
            }
            for (let i = steps; i >= 0; i--) {
              const a = startA + (endA - startA) * i / steps;
              outPts.push(new THREE.Vector3(Math.cos(a) * minR, 0, Math.sin(a) * minR));
            }
            outPts.push(outPts[0].clone());
            const outGeo = new THREE.BufferGeometry().setFromPoints(outPts);
            if (_3dConeGeoCache) { _3dConeGeoCache.fillGeo.dispose(); _3dConeGeoCache.outGeo.dispose(); }
            _3dConeGeoCache = { key: coneKey, fillGeo, outGeo };
          }
          const { fillGeo, outGeo } = _3dConeGeoCache;
          const coneFill = new THREE.Mesh(fillGeo, new THREE.MeshBasicMaterial({
            color: coneCol, transparent: true, opacity: 0.1, side: THREE.DoubleSide, depthWrite: false
          }));
          coneFill.position.set(swx, wy, swz);
          group.add(coneFill);
          const coneOut = new THREE.Line(outGeo, new THREE.LineBasicMaterial({ color: coneCol, transparent: true, opacity: 0.45 }));
          coneOut.position.set(swx, wy, swz);
          group.add(coneOut);

          // Hover ghost
          if (state.hoverPoint) {
            const dx = state.hoverPoint.x - selShip.x, dy = state.hoverPoint.y - selShip.y;
            const dist = Math.hypot(dx, dy);
            const fwd  = headingVec(selShip.heading);
            const cosA = (fwd.x * dx + fwd.y * dy) / Math.max(0.0001, dist);
            const angDeg = Math.acos(Math.max(-1, Math.min(1, cosA))) * 180 / Math.PI;
            const inRange = dist >= minR - 1 && dist <= maxR + 1;
            const inCone  = turnDeg === 0 ? angDeg <= 20 : angDeg <= turnDeg + 0.5;
            const finalOk = inRange && inCone;
            const travelH = Math.atan2(dy, dx) * 180 / Math.PI;
            const gwx = state.hoverPoint.x - 288, gwz = state.hoverPoint.y - 288;
            const okCol = finalOk ? coneCol : 0xff3030;

            // Dashed line
            const dashLine = new THREE.Line(
              new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(swx, wy, swz), new THREE.Vector3(gwx, wy, gwz)
              ]),
              new THREE.LineDashedMaterial({ color: okCol, transparent: true, opacity: 0.75, dashSize: 4, gapSize: 3 })
            );
            dashLine.computeLineDistances();
            group.add(dashLine);

            // Ghost ship mesh — use cached transparent material, no per-frame clone.
            const gFaction = selDef.faction || selDef.id.split(':')[1] || 'generic';
            const ghostMesh = _buildShipMesh3d(selDef.tonnage || 'L', okCol, gFaction, selDef.role);
            ghostMesh.position.set(gwx, wy, gwz);
            ghostMesh.rotation.y = _3dShipRotY(finalOk ? travelH : selShip.heading);
            ghostMesh.traverse(c => { if (c.isMesh) c.material = _getGhostMat(okCol, 0.38); });
            group.add(ghostMesh);
          }
        }
      }
    }
  }

  // Deploy / arrival hover ghost — preview of the next ship to be placed, follows cursor.
  if ((state.phase === 'deploy' || state.phase === 'play') && state.hoverPoint && state.selectedGroupId && !state.aiming) {
    const _dgDef = getDef(state.selectedGroupId);
    const _dgGrp = state.groups[state.selectedGroupId];
    const _dgIdx = _dgDef ? nextUndeployedShipIdx(state.selectedGroupId) : -1;
    const _dgElig = state.phase === 'deploy'
      ? (_dgDef && deploySideAllowed(_dgDef.side))
      : (_dgGrp && !_dgGrp.activated && canActivateOffTable(_dgDef)?.eligible);
    if (_dgDef && _dgIdx >= 0 && _dgElig) {
      const dep = DEPLOYMENTS[state.scenario?.deployment];
      const zoneName = state.deployZone?.[_dgDef.side] || (_dgDef.side === 'player1' ? 'south' : 'north');
      const zone = dep?.zones?.[zoneName];
      const xIn = state.hoverPoint.x / INCH, yIn = state.hoverPoint.y / INCH;
      const inZone = !zone || isInZone(xIn, yIn, zone);
      const col = inZone ? _3dSideColor(_dgDef.side) : 0xff3333;
      const wy = _3D_LAYER_Y.orbit;
      const gwx = state.hoverPoint.x - 288, gwz = state.hoverPoint.y - 288;
      const gFac = _dgDef.faction || _dgDef.id.split(':')[1] || 'generic';
      const gMesh = _buildShipMesh3d(_dgDef.tonnage || 'L', col, gFac, _dgDef.role);
      gMesh.position.set(gwx, wy, gwz);
      gMesh.rotation.y = _3dShipRotY(_dgDef.side === 'player1' ? -90 : 90);
      gMesh.traverse(c => { if (c.isMesh) c.material = _getGhostMat(col, inZone ? 0.45 : 0.25); });
      group.add(gMesh);
    }
  }
}

function _sync3dAssets(group) {
  (state.launchedAssets || []).forEach(a => {
    const wx = a.x - 288, wz = a.y - 288;
    // Fighters/bombers/fireships fly at orbital layer; torpedoes/mines stay just above ground
    const wy = (a.kind === 'torpedo' || a.kind === 'mine') ? 8 : _3D_LAYER_Y.orbit;
    const col = _3dSideColor(a.side);
    const isTorp = a.kind === 'torpedo' || a.kind === 'mine';
    const isFireship = a.kind === 'fireship';
    const count = a.count || 1;

    // Derive facing from launch direction (ship → asset), fallback to 0
    let assetRotY = 0;
    {
      const fromGrp = a.fromGid && state.groups[a.fromGid];
      const fromShip = fromGrp && fromGrp.ships[a.fromSi];
      if (fromShip && !fromShip.destroyed && !fromShip.offTable) {
        const dx = a.x - fromShip.x, dz = a.y - fromShip.y;
        if (Math.abs(dx) > 0.5 || Math.abs(dz) > 0.5) assetRotY = Math.atan2(-dx, -dz);
      }
    }

    if (isTorp) {
      // Torpedo/mine: small glowing cylinder
      const geo = new THREE.CylinderGeometry(1.2, 0.6, 4, 5);
      geo.rotateX(Math.PI / 2);
      const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({
        color: col, emissive: col, emissiveIntensity: 0.6
      }));
      mesh.position.set(wx, wy, wz);
      mesh.rotation.y = assetRotY;
      group.add(mesh);
    } else {
      // Fighters/bombers/fireships: small wing shapes in a loose cluster, all facing launch direction
      const spread = count > 1 ? 4 : 0;
      for (let i = 0; i < Math.min(count, 6); i++) {
        const offX = count > 1 ? (Math.cos(i * Math.PI * 2 / count) * spread * 0.5) : 0;
        const offZ = count > 1 ? (Math.sin(i * Math.PI * 2 / count) * spread * 0.5) : 0;
        const mesh = _buildAssetWing3d(col, a.kind, a.side);
        mesh.position.set(wx + offX, wy, wz + offZ);
        mesh.rotation.y = assetRotY;
        group.add(mesh);
      }
    }

    // Launch line from parent ship to asset token
    if (a.fromGid) {
      const fromGrp = state.groups[a.fromGid];
      const fromShip = fromGrp && fromGrp.ships[a.fromSi];
      if (fromShip && !fromShip.destroyed && !fromShip.offTable) {
        const shipY = _3D_LAYER_Y[fromShip.layer] ?? 120;
        const _alLine = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(fromShip.x - 288, shipY, fromShip.y - 288),
            new THREE.Vector3(wx, wy, wz),
          ]),
          new THREE.LineDashedMaterial({ color: col, transparent: true, opacity: 0.45, dashSize: 5, gapSize: 3 })
        );
        _alLine.computeLineDistances();
        group.add(_alLine);
      }
    }

    // Bomber attack line to target
    if (a.bomberTarget) {
      const tg = state.groups[a.bomberTarget.gid];
      const ts = tg && tg.ships[a.bomberTarget.si];
      if (ts && !ts.destroyed && !ts.offTable) {
        const twy = _3D_LAYER_Y[ts.layer] ?? 120;
        const _blLine = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(wx, wy, wz),
            new THREE.Vector3(ts.x - 288, twy, ts.y - 288),
          ]),
          new THREE.LineDashedMaterial({ color: 0xff3030, transparent: true, opacity: 0.7, dashSize: 4, gapSize: 3 })
        );
        _blLine.computeLineDistances();
        group.add(_blLine);
      }
    }
  });

}

function _buildAssetWing3d(color, kind, side) {
  const obj = new THREE.Object3D();
  const engCol = side === 'ucm' ? 0xff8800 : 0x00dfff;
  const mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.35 });
  const scale = kind === 'fireship' ? 1.5 : 1.0;

  // Flat delta body
  const bodyGeo = new THREE.BufferGeometry();
  const s = scale;
  const verts = new Float32Array([
     0, 0,  -3*s,   // nose
    -3*s, 0,  2*s,  // left wing tip
     3*s, 0,  2*s,  // right wing tip
     0, 0.4*s, 0,   // centre raised
  ]);
  bodyGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  bodyGeo.setIndex([0,1,3, 0,3,2, 1,2,3, 0,2,1]);
  bodyGeo.computeVertexNormals();
  obj.add(new THREE.Mesh(bodyGeo, mat));

  // Engine glow nub
  const eng = new THREE.Mesh(
    new THREE.SphereGeometry(0.5 * scale, 4, 3),
    new THREE.MeshLambertMaterial({ color: engCol, emissive: engCol, emissiveIntensity: 1.2 })
  );
  eng.position.set(0, 0, 2 * scale);
  obj.add(eng);

  return obj;
}

function _buildShipMesh3d(tonnage, color, faction, role) {
  // Bioficer cells (role 'Cell' / 'Cells') get their own model
  if (faction === 'bioficer' && role && /^cells?$/i.test(role)) {
    if (_glbBioCell)           return _cloneGlbShip(_glbBioCell,        tonnage, color);
  }
  // L-tonnage ships use the frigate model
  if (tonnage === 'L') {
    if (_glbFrigates[faction]) return _cloneGlbShip(_glbFrigates[faction], tonnage, color);
  }
  // M / H / SH use the cruiser model; fall through to procedural while loading
  if (_glbModels[faction])     return _cloneGlbShip(_glbModels[faction],  tonnage, color);
  if (faction === 'ucm')       return _buildUCMShipMesh3d(tonnage, color);
  if (faction === 'scourge')   return _buildScourgeShipMesh3d(tonnage, color);
  if (faction === 'shaltari')  return _buildShaltariShipMesh3d(tonnage, color);
  if (faction === 'phr')       return _buildPHRShipMesh3d(tonnage, color);
  if (faction === 'bioficer')  return _buildBioficerShipMesh3d(tonnage, color);
  if (faction === 'resistance') return _buildResistanceShipMesh3d(tonnage, color);
  return _buildGenericShipMesh3d(tonnage, color);
}

// ── Shared material helpers ────────────────────────────────────────────────────
function _shipMats(color, engCol) {
  const bodyCol = _3dDimColor(color, 0.35);
  return {
    hull:   () => new THREE.MeshLambertMaterial({ color: bodyCol, emissive: bodyCol, emissiveIntensity: 0.2 }),
    dark:   () => new THREE.MeshLambertMaterial({ color: 0x282828 }),
    accent: () => new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.6 }),
    eng:    () => new THREE.MeshLambertMaterial({ color: engCol, emissive: engCol, emissiveIntensity: 1.1 }),
  };
}

// ── UCM: twin parallel hulls, pointed bows, dorsal superstructure ──────────────
// ── UCM: upper + lower hull slabs stacked vertically, connector at the rear ────
function _buildUCMShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, dark, accent, eng } = _shipMats(color, 0xff8800);
  const hW = wid * 0.55;
  const uH = ht * 0.30, lH = ht * 0.22; // upper/lower slab heights
  const sep = ht * 0.55;                 // vertical separation centre-to-centre

  // Upper hull — longer, extends further forward
  obj.add(_box(hW, uH, len * 0.88, 0,  sep * 0.5, 0, hull()));
  // Upper bow taper
  const ubLen = len * 0.20;
  obj.add(_box(hW * 0.22, uH * 0.35, ubLen, 0, sep * 0.5, -(len * 0.44 + ubLen * 0.5), hull()));

  // Lower hull — slightly shorter, sits below
  obj.add(_box(hW * 0.80, lH, len * 0.72, 0, -sep * 0.5, len * 0.04, hull()));
  // Lower bow taper
  const lbLen = len * 0.16;
  obj.add(_box(hW * 0.18, lH * 0.35, lbLen, 0, -sep * 0.5, -(len * 0.32 + lbLen * 0.5), hull()));

  // Rear connector block — joins the two hulls at the aft
  obj.add(_box(hW * 0.55, sep + (uH + lH) * 0.5, len * 0.22, 0, 0, len * 0.30, dark()));

  // Dorsal superstructure on upper hull (bridge / command)
  const brgH = ht * 0.38, brgLen = len * 0.30;
  obj.add(_box(hW * 0.42, brgH, brgLen, 0, sep * 0.5 + uH * 0.5 + brgH * 0.5, -(len * 0.10), accent()));

  // Dorsal fin
  if (tonnage !== 'L') {
    const finH = ht * 0.45;
    obj.add(_box(hW * 0.10, finH, len * 0.18, 0, sep * 0.5 + uH * 0.5 + brgH + finH * 0.5, -(len * 0.08), accent()));
  }

  // Twin engine pods on the lower-rear
  const pR = hW * 0.13, pLen = len * 0.20;
  [-1, 1].forEach(s => {
    const pGeo = new THREE.CylinderGeometry(pR * 0.8, pR, pLen, 8);
    pGeo.rotateX(Math.PI / 2);
    const pod = new THREE.Mesh(pGeo, accent());
    pod.position.set(s * hW * 0.28, -sep * 0.5, len * 0.38 + pLen * 0.35);
    obj.add(pod);
    const eR = pR * 0.60;
    const eGeo = new THREE.CylinderGeometry(eR, eR * 0.85, pLen * 0.12, 8);
    eGeo.rotateX(Math.PI / 2);
    const eg = new THREE.Mesh(eGeo, eng());
    eg.position.set(s * hW * 0.28, -sep * 0.5, len * 0.38 + pLen * 0.85);
    obj.add(eg);
  });

  // Ventral weapon batteries (H/SH) under lower hull
  if (tonnage === 'H' || tonnage === 'SH') {
    [-1, 1].forEach(s =>
      obj.add(_box(hW * 0.22, lH * 0.55, len * 0.30, s * hW * 0.28, -sep * 0.5 - lH * 0.5 - lH * 0.28, -(len * 0.05), dark()))
    );
  }
  return obj;
}

// ── Scourge: compact body, multiple swept-back organic spines ──────────────────
function _buildScourgeShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, accent, eng } = _shipMats(color, 0x00dfff);
  const bW = wid * 0.32, bH = ht * 0.58, bLen = len * 0.22;
  // Body
  obj.add(_box(bW, bH, bLen, 0, 0, -(len * 0.16), hull()));
  // Pointed nose
  obj.add(_box(bW * 0.28, bH * 0.40, len * 0.14, 0, 0, -(len * 0.16 + bLen * 0.5 + len * 0.07), accent()));
  // Engine glow at rear
  const eg = new THREE.Mesh(new THREE.SphereGeometry(bW * 0.30, 6, 4), eng());
  eg.position.set(0, 0, -(len * 0.16) + bLen * 0.48);
  obj.add(eg);

  // Swept-back spines
  const nSpines = tonnage === 'SH' ? 5 : tonnage === 'H' ? 4 : tonnage === 'M' ? 3 : 2;
  for (let i = 0; i < nSpines; i++) {
    const t = nSpines > 1 ? i / (nSpines - 1) : 0.5;
    const hAng = (14 + t * 58) * Math.PI / 180;
    const vTilt = t * 18 * Math.PI / 180;
    const sLen = len * (0.88 - t * 0.30);
    const sH   = ht * (0.22 - t * 0.08);
    [-1, 1].forEach(side => {
      const pivot = new THREE.Object3D();
      const geo = new THREE.BoxGeometry(0.85, sH, sLen);
      geo.translate(0, 0, sLen * 0.5);
      pivot.add(new THREE.Mesh(geo, hull()));
      pivot.rotation.y = -side * hAng;
      pivot.rotation.x = -vTilt;
      obj.add(pivot);
    });
  }
  return obj;
}

// ── Shaltari: diamond/leaf hull, serrated spike fins fore and aft ──────────────
function _buildShaltariShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, accent, eng } = _shipMats(color, 0x80ffcc);
  // Diamond-shaped main hull (two tapered boxes)
  const hW = wid * 0.55, hH = ht * 0.38;
  obj.add(_box(hW, hH, len * 0.45, 0, 0, 0, hull()));
  obj.add(_box(hW * 0.30, hH * 0.55, len * 0.30, 0, 0, -(len * 0.375), hull())); // forward taper
  obj.add(_box(hW * 0.22, hH * 0.45, len * 0.22, 0, 0,  len * 0.335, hull())); // aft taper
  // Central glowing accent node
  obj.add(_box(hW * 0.35, ht * 0.55, len * 0.16, 0, 0, -(len * 0.06), accent()));

  // Serrated spike fins along edges — forward-swept (fore) and backward-swept (aft)
  const nSpikes = tonnage === 'SH' ? 5 : tonnage === 'H' ? 4 : 3;
  for (let i = 0; i < nSpikes; i++) {
    const t = i / (nSpikes - 1 || 1);
    const sLen = len * (0.18 + t * 0.08);
    const sz = -(len * 0.28) + t * len * 0.40; // spread fore to aft
    [-1, 1].forEach(s => {
      // Outward spike
      const spike = _box(sLen, hH * 0.30, hH * 0.30, s * (hW * 0.5 + sLen * 0.5), 0, sz, accent());
      spike.rotation.z = -s * 12 * Math.PI / 180;
      obj.add(spike);
    });
  }
  // Dorsal/ventral fin blades
  obj.add(_box(hW * 0.12, ht * 0.60, len * 0.35, 0,  ht * 0.48, -(len * 0.04), accent()));
  obj.add(_box(hW * 0.10, ht * 0.40, len * 0.25, 0, -ht * 0.38, -(len * 0.02), hull()));
  // Engine glow
  const eg = new THREE.Mesh(new THREE.SphereGeometry(hW * 0.20, 6, 4), eng());
  eg.position.set(0, 0, len * 0.34);
  obj.add(eg);
  return obj;
}

// ── PHR: smooth elongated hull, cluster of dorsal weapon nacelles ──────────────
function _buildPHRShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const bodyCol = _3dDimColor(color, 0.75); // PHR hull is near-white
  const hullM  = () => new THREE.MeshLambertMaterial({ color: bodyCol, emissive: bodyCol, emissiveIntensity: 0.15 });
  const darkM  = () => new THREE.MeshLambertMaterial({ color: 0x1a1a2a });
  const accentM = () => new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.7 });
  const engM   = () => new THREE.MeshLambertMaterial({ color: 0x60c8ff, emissive: 0x60c8ff, emissiveIntensity: 1.2 });

  // Smooth main hull — wide teardrop
  const hH = ht * 0.55, hW = wid * 0.60;
  obj.add(_box(hW, hH, len * 0.82, 0, 0, 0, hullM()));
  // Pointed bow
  obj.add(_box(hW * 0.22, hH * 0.35, len * 0.20, 0, -hH * 0.08, -(len * 0.41 + len * 0.10), hullM()));
  // Dark mechanical spine along underside
  obj.add(_box(hW * 0.30, hH * 0.20, len * 0.78, 0, -(hH * 0.5 + hH * 0.10), 0, darkM()));

  // Dorsal nacelle cluster — 2 or 4 thin pointed cylinders on top
  const nNac = tonnage === 'SH' ? 4 : tonnage === 'H' ? 3 : 2;
  const nacR = hW * 0.09, nacLen = len * (0.48 + (nNac - 2) * 0.06);
  for (let i = 0; i < nNac; i++) {
    const t = nNac > 1 ? i / (nNac - 1) : 0.5;
    const nx = (t - 0.5) * hW * 0.70;
    const nGeo = new THREE.CylinderGeometry(nacR * 0.4, nacR, nacLen, 6);
    nGeo.rotateX(Math.PI / 2);
    const nac = new THREE.Mesh(nGeo, accentM());
    nac.position.set(nx, hH * 0.5 + nacR * 1.2, -(len * 0.08));
    obj.add(nac);
    // Glowing tip
    const tipGeo = new THREE.CylinderGeometry(0, nacR * 0.4, nacLen * 0.14, 5);
    tipGeo.rotateX(Math.PI / 2);
    const tip = new THREE.Mesh(tipGeo, engM());
    tip.position.set(nx, hH * 0.5 + nacR * 1.2, -(len * 0.08 + nacLen * 0.57));
    obj.add(tip);
  }
  // Engine glow at stern
  const eg = new THREE.Mesh(new THREE.SphereGeometry(hW * 0.18, 6, 4), engM());
  eg.position.set(0, 0, len * 0.40);
  obj.add(eg);
  return obj;
}

// ── Bioficer / Resistance: blocky industrial hull, large angled rear fin ───────
function _buildBioficerShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, dark, accent, eng } = _shipMats(color, 0xff6600);
  const hW = wid * 0.55, hH = ht * 0.65;
  // Main blocky rectangular hull
  obj.add(_box(hW, hH, len * 0.75, 0, 0, 0, hull()));
  // Blunt reinforced bow
  obj.add(_box(hW * 0.85, hH * 0.90, len * 0.14, 0, 0, -(len * 0.445), dark()));
  // Open prow framework (two forward prongs)
  [-1, 1].forEach(s => {
    obj.add(_box(hW * 0.14, hH * 0.35, len * 0.22, s * hW * 0.32, -hH * 0.10, -(len * 0.485), dark()));
  });
  // Large flat triangular rear fin — approximate with two angled boxes
  const finH = ht * 1.10, finLen = len * 0.40, finThick = hW * 0.06;
  const fin = _box(finThick, finH, finLen, 0, finH * 0.35, len * 0.22, accent());
  fin.rotation.x = 18 * Math.PI / 180;
  obj.add(fin);
  // Second smaller fin offset
  if (tonnage === 'H' || tonnage === 'SH') {
    const fin2 = _box(hW * 0.65, finH * 0.55, finThick, 0, -finH * 0.15, len * 0.28, dark());
    fin2.rotation.z = 90 * Math.PI / 180;
    obj.add(fin2);
  }
  // Engine block at stern
  obj.add(_box(hW * 0.70, hH * 0.55, len * 0.14, 0, 0, len * 0.42, dark()));
  // Engine glow
  const eg = new THREE.Mesh(new THREE.SphereGeometry(hW * 0.22, 6, 4), eng());
  eg.position.set(0, 0, len * 0.47);
  obj.add(eg);
  // Accent stripe along hull
  obj.add(_box(hW * 0.85, hH * 0.10, len * 0.65, 0, hH * 0.30, 0, accent()));
  return obj;
}

// ── Resistance: wide flat converted-freighter hull, layered strakes, blunt prow ─
function _buildResistanceShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, dark, accent, eng } = _shipMats(color, 0x40b0ff);
  const hW = wid * 0.75, hH = ht * 0.40; // wide and flat

  // Main upper deck — wide flat slab
  obj.add(_box(hW, hH, len * 0.72, 0, hH * 0.20, 0, hull()));
  // Lower hull — slightly wider, shallower
  obj.add(_box(hW * 1.10, hH * 0.38, len * 0.65, 0, -hH * 0.28, 0, dark()));

  // Blunt reinforced prow
  obj.add(_box(hW * 0.80, hH * 0.88, len * 0.12, 0, 0, -(len * 0.42), dark()));
  // Forward ram/drive strut
  obj.add(_box(hW * 0.18, hH * 0.35, len * 0.20, 0, -hH * 0.10, -(len * 0.50), accent()));

  // Layered side strakes — overlapping hull plates along the mid-section
  const nStrakes = tonnage === 'SH' ? 6 : tonnage === 'H' ? 5 : 4;
  for (let i = 0; i < nStrakes; i++) {
    const t = i / (nStrakes - 1 || 1);
    const sz = -(len * 0.28) + t * len * 0.44;
    const strakeH = hH * 0.32, strakeD = len * 0.10;
    [-1, 1].forEach(s => {
      const strake = _box(hW * 0.10, strakeH, strakeD, s * (hW * 0.55), -hH * 0.10, sz, accent());
      strake.rotation.z = s * 8 * Math.PI / 180;
      obj.add(strake);
    });
  }

  // Raised superstructure block on top (forward of centre)
  obj.add(_box(hW * 0.55, hH * 0.55, len * 0.28, 0, hH * 0.68, -(len * 0.12), hull()));

  // Twin stern exhaust pods
  const pR = hW * 0.12, pLen = len * 0.20;
  [-1, 1].forEach(s => {
    const pGeo = new THREE.CylinderGeometry(pR * 0.85, pR, pLen, 8);
    pGeo.rotateX(Math.PI / 2);
    const pod = new THREE.Mesh(pGeo, dark());
    pod.position.set(s * hW * 0.30, -hH * 0.08, len * 0.40);
    obj.add(pod);
    const eR = pR * 0.55;
    const eGeo = new THREE.CylinderGeometry(eR, eR * 0.85, pLen * 0.12, 8);
    eGeo.rotateX(Math.PI / 2);
    const eg = new THREE.Mesh(eGeo, eng());
    eg.position.set(s * hW * 0.30, -hH * 0.08, len * 0.40 + pLen * 0.54);
    obj.add(eg);
  });

  return obj;
}

// ── Generic fallback for other factions ───────────────────────────────────────
function _buildGenericShipMesh3d(tonnage, color) {
  const obj = new THREE.Object3D();
  const [len, ht, wid] = _3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['L'];
  const { hull, dark, accent, eng } = _shipMats(color, 0x00dfff);
  const spineW = wid * 0.28, spineH = ht * 0.55;
  obj.add(_box(spineW, spineH, len * 0.85, 0, 0, 0, hull()));
  const noseLen = len * 0.18;
  obj.add(_box(spineW * 0.5, spineH * 0.5, noseLen, 0, 0, -(len * 0.425 + noseLen * 0.5), hull()));
  const brgW = spineW * 1.3, brgH = ht * 0.45, brgLen = len * 0.18;
  obj.add(_box(brgW, brgH, brgLen, 0, (spineH + brgH) * 0.5, -(len * 0.18), accent()));
  const pylonReach = wid * (tonnage === 'SH' ? 1.0 : tonnage === 'H' ? 0.8 : tonnage === 'M' ? 0.55 : 0.35);
  const pylonZ = len * 0.10;
  [-1, 1].forEach(s => {
    const px = s * (spineW * 0.5 + pylonReach * 0.5);
    obj.add(_box(pylonReach, spineH * 0.28, spineW * 0.9, px, 0, pylonZ, dark()));
    const podR = spineW * (tonnage === 'SH' ? 0.75 : 0.55);
    const podLen = len * (tonnage === 'SH' ? 0.38 : 0.30);
    const podGeo = new THREE.CylinderGeometry(podR * 0.8, podR, podLen, 8);
    podGeo.rotateX(Math.PI / 2);
    const pod = new THREE.Mesh(podGeo, accent());
    pod.position.set(s * (spineW * 0.5 + pylonReach), 0, pylonZ);
    obj.add(pod);
    const engR = podR * 0.65;
    const engGeo = new THREE.CylinderGeometry(engR, engR * 0.85, podLen * 0.12, 8);
    engGeo.rotateX(Math.PI / 2);
    const egm = new THREE.Mesh(engGeo, eng());
    egm.position.set(s * (spineW * 0.5 + pylonReach), 0, pylonZ + podLen * 0.5);
    obj.add(egm);
  });
  if (tonnage !== 'L') {
    const finH = ht * 0.55, finLen = len * 0.28;
    obj.add(_box(spineW * 0.22, finH, finLen, 0, (spineH + finH) * 0.5 + brgH * 0.1, len * 0.10, accent()));
  }
  return obj;
}

function _box(w, h, d, x, y, z, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  return m;
}

function _buildWingMesh3d(def, color, side) {
  const obj = new THREE.Object3D();
  const mat = () => new THREE.MeshLambertMaterial({ color: 0x505050 });
  const engCol = side === 'ucm' ? 0xff8800 : 0x00dfff;
  // Flat delta-wing body
  const body = new THREE.Mesh(new THREE.BoxGeometry(10, 0.8, 6), mat());
  obj.add(body);
  // Swept leading edges
  [-1, 1].forEach(s => {
    const le = new THREE.Mesh(new THREE.BoxGeometry(4, 0.6, 4), mat());
    le.position.set(s * 5.5, 0, -1.5);
    le.rotation.y = s * 0.45;
    obj.add(le);
  });
  // Engine nub
  const eng = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 2, 6),
    new THREE.MeshLambertMaterial({ color: engCol, emissive: engCol, emissiveIntensity: 1.2 }));
  eng.rotation.x = Math.PI / 2;
  eng.position.z = 3.5;
  obj.add(eng);
  return obj;
}

function toggle3d() {
  _view3d = !_view3d;
  document.getElementById('board').style.display    = _view3d ? 'none'  : 'block';
  document.getElementById('board3d').style.display  = _view3d ? 'block' : 'none';
  document.getElementById('btn-3d-toggle').classList.toggle('active', _view3d);
  if (_view3d) {
    if (!_3d) { try { init3d(); } catch(e) { console.error('[3D init]', e); _view3d = false; toggle3d(); } }
    else sync3d();
  }
}

/* Floating hint shown during aim / vectored-second-move states. */
function renderAimHint() {
  const board = document.querySelector('.board-wrap');
  let el = document.getElementById('aim-hint');
  if (el) el.remove();
  let msg = '';
  if (state.aiming) {
    if (state.aiming.mode === 'deploy') msg = 'Move mouse to aim · click to set facing (any angle)';
    else if (state.aiming.mode === 'vectored') msg = 'Vectored pivot — aim (±45°) · click to set, then move again';
    else if (state.aiming.mode === 'course_change') msg = 'Course Change — bonus turn (±45°) · click to set facing';
  } else if (state.vectoredSecondMove) {
    msg = 'Vectored — click ahead to move with remaining thrust (no further turn) · right-click or press Esc to skip';
  }
  if (!msg) return;
  el = document.createElement('div');
  el.id = 'aim-hint';
  el.className = 'deploy-hint';
  el.style.bottom = '12px';
  el.innerHTML = `<span><b>${msg}</b></span>`;
  board.appendChild(el);
}

function renderFeatureAttackHUD() {
  const existing = document.getElementById('feature-attack-hud');
  if (existing) existing.remove();
  if (!state.featureAttack) return;
  const fa = state.featureAttack;
  const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === fa.dsId);
  const f = ds && FEATURES[ds.features[fa.fi]];
  if (!ds || !f || !f.weapon) return;
  const sideKey = fa.side === 'player1' ? 'ucm' : 'shal';
  const el = document.createElement('div');
  el.id = 'feature-attack-hud';
  el.className = 'hud-item';
  el.style.cssText = 'pointer-events:auto; line-height:1.6;';
  el.innerHTML = `<b style="color:var(--${sideKey})">${f.name}</b>: ${f.weapon.name}<br>
    <span style="color:var(--text-mute);font-size:9px;">Click enemy ship · right-click cancels</span><br>
    <button id="fa-hud-cancel" class="hud-btn" style="margin-top:4px;padding:2px 8px;font-size:9px;">CANCEL</button>`;
  document.querySelector('.board-hud').appendChild(el);
  document.getElementById('fa-hud-cancel').addEventListener('click', () => {
    state.featureAttack = null;
    flashLaunchMsg('Targeting cancelled');
    renderAll(true);
  });
}

function updateHUD() {
  const hud = document.getElementById('hud-active');
  const turnHud = document.getElementById('hud-turn-info');
  if (!state.selectedGroupId) {
    if (state.phase === 'play' && state.activeSide) {
      const an = playerNameForSide(state.activeSide);
      const col = state.activeSide === 'player1' ? 'var(--ucm)' : 'var(--shal)';
      hud.innerHTML = `<b style="color:${col}">${an}</b> TO ACTIVATE →`;
    } else {
      hud.innerHTML = 'SELECT A GROUP →';
    }
    turnHud.style.display = 'none';
  } else {
    const def = getDef(state.selectedGroupId);
    const grp = getGroup(state.selectedGroupId);
    const sideCol = def.side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
    const hudOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    hud.innerHTML = `<b style="color:${sideCol}">${def.name}</b> · ${hudOrd || 'no order'}${state.selectedShipIdx !== null ? ' · ship #' + (state.selectedShipIdx+1) : ''}`;
    if (state.selectedShipIdx !== null && hudOrd && ORDERS[hudOrd].moveMax > 0) {
      const o = ORDERS[hudOrd];
      turnHud.style.display = 'block';
      turnHud.innerHTML = `MOVE <b>${(o.moveMin*def.thrust).toFixed(1)}"–${(o.moveMax*def.thrust).toFixed(1)}"</b> · TURN <b>±${o.turnLimit}°</b>`;
    } else {
      turnHud.style.display = 'none';
    }
  }
}

/* ==========================================================================
   EVENT WIRING
   ========================================================================== */
document.addEventListener('click', (e) => {
  // Group card click handled inline
  // Arc view mode toggle (local only — affects board overlays for selected ship)
  if (e.target.matches('[data-arcview]')) {
    arcViewMode = parseInt(e.target.dataset.arcview, 10);
    renderAll(true); return;
  }
  // Movement trails toggle — persisted, applies to both 2D and 3D views
  if (e.target.matches('#btn-trails-toggle')) {
    _view3dTrails = !_view3dTrails;
    localStorage.setItem('dfc_showTrails', _view3dTrails);
    renderAll(true); return;
  }
  // Spike controls
  if (e.target.matches('[data-spike-u]')) {
    const gid = e.target.dataset.spikeU;
    const grp = state.groups[gid];
    if (grp.spikes < 4) { grp.spikes++; logEvent(`${(grp.def&&grp.def.name)||gid} spike +1 → ${grp.spikes}`); }
    renderAll(); netAfterRender(); return;
  }
  if (e.target.matches('[data-spike-d]')) {
    const gid = e.target.dataset.spikeD;
    const grp = state.groups[gid];
    if (grp.spikes > 0) { grp.spikes--; logEvent(`${(grp.def&&grp.def.name)||gid} spike −1 → ${grp.spikes}`); }
    renderAll(); netAfterRender(); return;
  }
  // Dropsite damage controls
  if (e.target.matches('[data-ds-damage-u]')) {
    const did = e.target.dataset.dsDamageU;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage < ds.maxHull) ds.damage++;
    renderAll(); return;
  }
  if (e.target.matches('[data-ds-damage-d]')) {
    const did = e.target.dataset.dsDamageD;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage > 0) ds.damage--;
    renderAll(); return;
  }
  // HP controls
  if (e.target.matches('[data-hpu]')) {
    const [gid, si] = e.target.dataset.hpu.split('|');
    const grp = state.groups[gid];
    const ship = grp.ships[si];
    const shipLabel = (grp.def&&grp.def.name)||gid;
    if (ship.hull < ship.maxHull) {
      ship.hull++;
      if (ship.destroyed && ship.hull > 0) ship.destroyed = false;
      logEvent(`${shipLabel} HP +1 → ${ship.hull}/${ship.maxHull}`);
    }
    renderAll(); netAfterRender(); return;
  }
  if (e.target.matches('[data-hpd]')) {
    const [gid, si] = e.target.dataset.hpd.split('|');
    const grp = state.groups[gid];
    const ship = grp.ships[si];
    const shipLabel = (grp.def&&grp.def.name)||gid;
    if (ship.hull > 0) {
      ship.hull--;
      if (ship.hull <= 0) ship.destroyed = true;
      logEvent(`${shipLabel} HP −1 → ${ship.hull}/${ship.maxHull}${ship.destroyed?' (destroyed)':''}`);
    }
    // If the destroyed ship was the nominated lead, clear the nomination.
    const g = state.groups[gid];
    if (g.leadShipIdx != null && g.ships[g.leadShipIdx] && g.ships[g.leadShipIdx].destroyed) {
      g.leadShipIdx = null;
    }
    renderAll(); netAfterRender(); return;
  }
  if (e.target.matches('[data-bat-cancel]')) {
    if (state.pendingGroundLaunch) {
      state.pendingGroundLaunch = null;
      state.selectedDropsiteId = null;
      renderAll(true);
    } else {
      const dep = state.battalionDeploy;
      if (dep && dep.fromGid != null) {
        state.selectedDropsiteId = null;
        state.selectedGroupId = dep.fromGid;
        state.selectedShipIdx = dep.fromSi;
      }
      state.battalionDeploy = null;
      renderAll();
    }
    return;
  }
  // Battalion manual adjust.
  if (e.target.matches('[data-bat-adj]')) {
    const [dsId, key, side, delta] = e.target.dataset.batAdj.split('|');
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds) {
      const b = dsBattalions(ds);
      if (b[key]) b[key][side] = Math.max(0, (b[key][side] || 0) + parseInt(delta));
    }
    renderAll(); return;
  }
  // Battalion deploy — land the launched battalions at the chosen location.
  if (e.target.closest && e.target.closest('[data-bat-deploy]')) {
    const el = e.target.closest('[data-bat-deploy]');
    const [dsId, key] = el.dataset.batDeploy.split('|');
    const pg = state.pendingGroundLaunch;
    if (pg && pg.dsId === dsId) {
      // Intent path: fire the server-authoritative intent with the chosen location.
      state.pendingGroundLaunch = null;
      dispatch({ type: 'launchGroundAsset', gid: pg.gid, si: pg.si, li: pg.li,
                 dsId: pg.dsId, count: pg.count, locationKey: key,
                 ...(pg.gateSel ? { gateSel: pg.gateSel } : {}) });
      // Reselect the launching ship for the next action.
      state.selectedGroupId = pg.gid;
      state.selectedShipIdx = pg.si;
      state.selectedDropsiteId = null;
      renderAll(true);
    } else {
      // Relay path (gate_dropship via Voidgate): mutate locally + relay.
      const dep = state.battalionDeploy;
      if (dep && dep.dsId === dsId) {
        const ds = state.scenarioData.dropsites.find(d => d.id === dsId);
        if (ds) {
          const b = dsBattalions(ds);
          if (b[key]) b[key][dep.side] = (b[key][dep.side] || 0) + dep.count;
        }
        if (dep.fromGid != null) {
          state.selectedDropsiteId = null;
          state.selectedGroupId = dep.fromGid;
          state.selectedShipIdx = dep.fromSi;
        }
        state.battalionDeploy = null;
      }
      renderAll();
    }
    return;
  }
  // Layer toggle (orbit ↔ atmosphere) for the selected ship's next move.
  // Fighter/Bomber counter adjust (must run BEFORE the data-launch toggle,
  // since the counter sits inside the launch row).
  if (e.target.matches('[data-fb-adj]')) {
    const [which, delta] = e.target.dataset.fbAdj.split('|');
    if (state.launching) {
      const d = parseInt(delta);
      const cur = state.launching[which] || 0;
      const next = Math.max(0, cur + d);
      // Enforce mutual exclusivity: only one of fighters/bombers may be > 0.
      const other = which === 'fighters' ? 'bombers' : 'fighters';
      if (next > 0 && (state.launching[other] || 0) > 0) { /* blocked */ }
      else state.launching[which] = next;
    }
    renderAll(true); return;
  }
  if (e.target.matches('[data-fs-adj]')) {
    const d = parseInt(e.target.dataset.fsAdj);
    if (state.launching) {
      state.launching.fireships = Math.max(0, (state.launching.fireships || 0) + d);
    }
    renderAll(true); return;
  }
  if (e.target.matches('[data-launch-cancel]')) {
    state.launching = null;
    renderAll(true); return;
  }
  // Payload: begin detaching a payload — enter board placement (within 3").
  if (e.target.matches('[data-payload-detach]') || (e.target.closest && e.target.closest('[data-payload-detach]'))) {
    const btn = e.target.matches('[data-payload-detach]') ? e.target : e.target.closest('[data-payload-detach]');
    const [pgid, psi] = btn.dataset.payloadDetach.split('|');
    const porter = state.groups[state.selectedGroupId];
    state.payloadDetach = {
      gid: pgid, si: parseInt(psi),
      porterGid: state.selectedGroupId, porterSi: state.selectedShipIdx
    };
    state.launching = null;
    flashLaunchMsg('Click within 3" of the Porter to place the detached Payload');
    renderAll(true); return;
  }
  // Payload: begin reattaching — click a detached payload within 3" of the Porter.
  if (e.target.matches('[data-payload-reattach]') || (e.target.closest && e.target.closest('[data-payload-reattach]'))) {
    const btn = e.target.matches('[data-payload-reattach]') ? e.target : e.target.closest('[data-payload-reattach]');
    const [pgid, psi] = btn.dataset.payloadReattach.split('|');
    state.payloadReattach = { porterGid: pgid, porterSi: parseInt(psi) };
    state.payloadDetach = null;
    state.launching = null;
    flashLaunchMsg('Click a detached Payload within 3" to reattach');
    renderAll(); return;
  }
  // Weapon targeting — click a weapon to enter target-assignment mode.
  const wtEl = e.target.closest && e.target.closest('[data-weapon-target]');
  if (wtEl) {
    const [gid, si, wi] = wtEl.dataset.weaponTarget.split('|');
    const sIdx = parseInt(si), wIdx = parseInt(wi);
    if (state.targeting && state.targeting.gid === gid && state.targeting.si === sIdx && state.targeting.wi === wIdx) {
      state.targeting = null; // toggle off
    } else {
      state.targeting = { gid, si: sIdx, wi: wIdx };
      state.launching = null;
      flashLaunchMsg('Click an enemy ship in arc & range to lock the target');
    }
    renderAll(true); return;
  }
  // Clear a locked weapon target.
  if (e.target.matches('[data-weapon-unlock]')) {
    const [gid, si, wi] = e.target.dataset.weaponUnlock.split('|');
    dispatch({ type: 'unlockWeapon', gid, si: parseInt(si), wi: parseInt(wi) });
    return;
  }
  // Anti-Wing: toggle the wing-targeting mode.
  if (e.target.matches('[data-antiwing]') || (e.target.closest && e.target.closest('[data-antiwing]'))) {
    const btn = e.target.matches('[data-antiwing]') ? e.target : e.target.closest('[data-antiwing]');
    const [gid, si, wi] = btn.dataset.antiwing.split('|');
    if (state.antiWing && state.antiWing.gid === gid && state.antiWing.si === parseInt(si) && state.antiWing.wi === parseInt(wi)) {
      state.antiWing = null;
    } else {
      state.antiWing = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy Wing (fighter/bomber) in arc & range', true);
    }
    renderAll(true); return;
  }
  // Detector: toggle the LoS-targeting mode (forgoes the weapon to place Spikes).
  if (e.target.matches('[data-detector]') || (e.target.closest && e.target.closest('[data-detector]'))) {
    const btn = e.target.matches('[data-detector]') ? e.target : e.target.closest('[data-detector]');
    const [gid, si, wi] = btn.dataset.detector.split('|');
    if (state.detector && state.detector.gid === gid && state.detector.si === parseInt(si) && state.detector.wi === parseInt(wi)) {
      state.detector = null; // toggle off
    } else {
      state.detector = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy ship in Line of Sight', true);
    }
    renderAll(true); return;
  }
  // FIRE — open the attack resolution modal for all locked weapons.
  if (e.target.matches('[data-fire]') || (e.target.closest && e.target.closest('[data-fire]'))) {
    const btn = e.target.matches('[data-fire]') ? e.target : e.target.closest('[data-fire]');
    const [gid, si] = btn.dataset.fire.split('|');
    dispatch({ type: 'fireWeapons', gid, si: parseInt(si) });
    return;
  }
  if (e.target.matches('[data-survey]') || (e.target.closest && e.target.closest('[data-survey]'))) {
    const btn = e.target.matches('[data-survey]') ? e.target : e.target.closest('[data-survey]');
    const [gid, si, dsId] = btn.dataset.survey.split('|');
    const def = getDef(gid);
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds) flashLaunchMsg(`${def.name} surveyed ${ds.base ? ds.base.name : dsId}`, true);
    dispatch({ type: 'surveySite', gid, si: parseInt(si), dsId });
    renderAll(); return;
  }
  if (e.target.closest && e.target.closest('[data-extract-start]')) {
    const [gid, si] = e.target.closest('[data-extract-start]').dataset.extractStart.split('|');
    // Toggle extract-targeting mode for this ship.
    if (state.extracting && state.extracting.gid === gid && state.extracting.si === parseInt(si)) {
      state.extracting = null;
