    ${objExpanded ? `<div style="font-size:10px;color:var(--text-dim);line-height:1.5;margin:-6px 0 12px;padding:0 4px;">
      ${obj.desc}${obj.bonus ? `<div style="margin-top:6px;color:var(--hull-good,#6ec97a);">▸ ${obj.bonus}</div>` : ''}
    </div>` : ''}` : '';
  overlay = document.createElement('div');
  overlay.id = 'vpbreak-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '310';
  overlay.innerHTML = `<div class="setup-card" style="max-width:480px;">
    <div class="setup-header"><h2 class="setup-title">VICTORY POINTS</h2>
      <div class="setup-sub">Round ${state.round} / 6 · VP decides the game (Kill Points break ties)</div></div>
    <div class="setup-body">
      ${objBlock}
      <div style="display:flex;gap:18px;">${sideBlock('ucm')}${sideBlock('shal')}</div>
    </div>
    <div class="setup-footer"><button class="btn-primary" id="vpbreak-close" style="width:100%;">CLOSE</button></div>
  </div>`;
  document.body.appendChild(overlay);
  const objToggle = overlay.querySelector('#vp-obj-toggle');
  if (objToggle) objToggle.addEventListener('click', () => { state.vpObjOpen = !state.vpObjOpen; renderAll(); });
  overlay.querySelector('#vpbreak-close').addEventListener('click', () => { state.vpBreakdownOpen = false; state.vpObjOpen = false; renderAll(); });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { state.vpBreakdownOpen = false; state.vpObjOpen = false; renderAll(); } });
}

/* End-of-game summary modal. */
function renderGameOver() {
  let overlay = document.getElementById('gameover-overlay');
  if (overlay) overlay.remove();
  if (!state.gameOver) return;
  const G = state.gameOver;
  const u = state.score.ucm, s = state.score.shal;
  const winLabel = G.winner === 'draw' ? 'DRAW' : `${factionName(G.winner)} WINS`;
  const winCol = G.winner === 'draw' ? 'var(--text)' : `var(--${G.winner})`;
  overlay = document.createElement('div');
  overlay.id = 'gameover-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '320';
  overlay.innerHTML = `<div class="setup-card" style="max-width:400px;">
    <div class="setup-header"><h2 class="setup-title" style="color:${winCol}">${winLabel}</h2>
      <div class="setup-sub">After 6 Rounds</div></div>
    <div class="setup-body">
      <div class="init-grid">
        <div class="init-slot"><div class="init-name" style="color:var(--ucm)">${factionName('ucm')}</div>
          <div style="font-size:22px;font-weight:700;color:var(--ucm)">${u.vp}</div>
          <div style="font-size:9px;color:var(--text-mute)">VP · ${u.kp} KP</div></div>
        <div class="init-vs">vs</div>
        <div class="init-slot"><div class="init-name" style="color:var(--shal)">${factionName('shal')}</div>
          <div style="font-size:22px;font-weight:700;color:var(--shal)">${s.vp}</div>
          <div style="font-size:9px;color:var(--text-mute)">VP · ${s.kp} KP</div></div>
      </div>
      ${u.vp === s.vp ? `<div class="init-result" style="font-size:10px;color:var(--text-mute)">VP tied — broken by Kill Points</div>` : ''}
      ${(G.scoreLog||[]).map(l => `<div class="am-line" style="font-size:10px;">${l}</div>`).join('')}
    </div>
    <div class="setup-footer">
      <button class="btn-primary" id="gameover-reset">NEW GAME →</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#gameover-reset').addEventListener('click', () => {
    state.gameOver = null; state.score = { ucm:{vp:0,kp:0}, shal:{vp:0,kp:0} }; state.scoredRounds = []; state.scoreLog = []; state.lastScoring = null; state.captured = {ucm:0,shal:0}; state.admiralKilled = {ucm:false,shal:false};
    state.secondaryNominations = { ucm:{}, shal:{} }; state.shipReconOps = {}; state.reconKills = { ucm:0, shal:0 }; state.nominationPhase = false;
    state.protectNom = { ucm:null, shal:null }; state.breakthroughFlyoff = { ucm:0, shal:0 };
    state.phase = 'setup'; state.scenario = null; state.scenarioData = null; state.groups = {};
    state.selectedGroupId = null; state.selectedShipIdx = null; state.round = 1;
    rebuildFleets(); renderAll();
  });
}

/* Initiative roll modal — shown at the start of each round. */
function renderInitiative() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('init-overlay');
  if (overlay) overlay.remove();
  if (!state.initiative) return;
  const I = state.initiative;
  const redName = FACTIONS[state.factions.ucm] ? FACTIONS[state.factions.ucm].name : 'Red';
  const blueName = FACTIONS[state.factions.shal] ? FACTIONS[state.factions.shal].name : 'Blue';
  const winName = I.winner === 'ucm' ? redName : blueName;
  const die = (raw, bonus, col) => `<div class="init-die" style="border-color:${col};color:${col}">${raw}${bonus?`<span style="font-size:9px;"> +${bonus}</span>`:''}</div>`;
  const P = state.planning || { ap:{ucm:1,shal:1}, passTokens:{ucm:0,shal:0} };

  overlay = document.createElement('div');
  overlay.id = 'init-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:400px;">
      <div class="setup-header">
        <h2 class="setup-title">PLANNING PHASE</h2>
        <div class="setup-sub">Round ${I.round} · Initiative roll-off</div>
      </div>
      <div class="setup-body">
        <div class="init-grid">
          <div class="init-slot">
            <div class="init-name" style="color:var(--ucm)">${redName}</div>
            ${die(I.rRaw, I.redBonus, 'var(--ucm)')}
            <div style="font-size:9px;color:var(--text-mute);margin-top:4px;">AP ${P.ap.ucm}${P.passTokens.ucm?` · ${P.passTokens.ucm} Pass`:''}</div>
          </div>
          <div class="init-vs">vs</div>
          <div class="init-slot">
            <div class="init-name" style="color:var(--shal)">${blueName}</div>
            ${die(I.bRaw, I.blueBonus, 'var(--shal)')}
            <div style="font-size:9px;color:var(--text-mute);margin-top:4px;">AP ${P.ap.shal}${P.passTokens.shal?` · ${P.passTokens.shal} Pass`:''}</div>
          </div>
        </div>
        ${(I.redBonus||I.blueBonus)?`<div style="font-size:9px;color:var(--text-mute);text-align:center;margin-top:-6px;">+1 from highest Admiral Level</div>`:''}
        <div class="init-result" style="color:var(--${I.winner})">
          ${winName} won the roll
        </div>
        <div class="init-choice">
          <div class="init-choice-lbl">${winName} takes 1st initiative, or may give it to the opponent (reverse order):</div>
          <div class="init-choice-btns">
            <button class="btn ${I.holder === I.winner ? 'btn-primary' : ''}" data-init-give="${I.winner}">${(I.winner==='ucm'?redName:blueName)} takes 1st</button>
            <button class="btn ${I.holder !== I.winner ? 'btn-primary' : ''}" data-init-give="${I.winner==='ucm'?'shal':'ucm'}">${(I.winner==='ucm'?blueName:redName)} takes 1st</button>
          </div>
        </div>
      </div>
      <div class="setup-footer">
        <button class="btn" id="init-reroll">↻ REROLL</button>
        <button class="btn-primary" id="init-confirm">BEGIN ACTIVATION →</button>
      </div>
    </div>
  `;
  board.appendChild(overlay);
  overlay.querySelector('#init-reroll').addEventListener('click', () => { rollInitiative(); renderInitiative(); });
  overlay.querySelectorAll('[data-init-give]').forEach(btn => {
    btn.addEventListener('click', () => { state.initiative.holder = btn.dataset.initGive; renderInitiative(); });
  });
  overlay.querySelector('#init-confirm').addEventListener('click', () => {
    // The holder of initiative activates first this round.
    state.activeSide = state.initiative.holder;
    state.initiativeHolder = state.initiative.holder; // persists for the round (battalion combat order)
    state.initiative = null;
    renderAll();
  });
}

/* Two dropdowns to choose up to 2 Secondary Objectives for a fleet slot. */
function secondaryPickers(slot) {
  const chosen = state.secondaryChoice[slot] || [];
  const opt = (idx) => {
    const cur = chosen[idx] || '';
    const others = chosen.filter((_, i) => i !== idx);
    return `<select class="fleet-dropdown" data-secondary="${slot}|${idx}" style="margin-top:4px;font-size:9.5px;">
      <option value="">— Secondary ${idx+1} —</option>
      ${Object.keys(SECONDARY_OBJECTIVES).map(k => `<option value="${k}" ${cur===k?'selected':''} ${others.includes(k)?'disabled':''}>${SECONDARY_OBJECTIVES[k].name}</option>`).join('')}
    </select>`;
  };
  return opt(0) + opt(1);
}

/* Nomination editor: lets each side confirm/override its position-based Secondary
   nominations (Key Site, Priority Target, Long Shot, Objectives Beyond) before play. */
function renderNominationModal() {
  let overlay = document.getElementById('nomination-overlay');
  if (overlay) overlay.remove();
  if (!state.nominationPhase) return;
  const rows = [];
  ['ucm','shal'].forEach(side => {
    (state.secondaries[side] || []).forEach(key => {
      const def = SECONDARY_OBJECTIVES[key];
      if (!def || !def.nominate) return;
      const cands = secondaryCandidates(side, key);
      if (!cands.length) return;
      const cur = state.secondaryNominations[side][key];
      const curStr = JSON.stringify(cur);
      rows.push(`<div class="nom-row" style="margin:8px 0;padding:8px;border:1px solid var(--${side});border-radius:6px;">
        <div style="font-size:11px;color:var(--${side});font-weight:600;">${factionName(side)} — ${def.name}</div>
        <div style="font-size:9px;color:var(--text-mute);margin:2px 0 5px;">${def.desc}</div>
        <select class="fleet-dropdown" data-nom="${side}|${key}" style="font-size:10px;">
          ${cands.map(c => `<option value='${JSON.stringify(c.nom)}' ${JSON.stringify(c.nom)===curStr?'selected':''}>${c.label}</option>`).join('')}
        </select>
      </div>`);
    });
  });
  overlay = document.createElement('div');
  overlay.id = 'nomination-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `<div class="setup-panel" style="max-width:440px;">
    <div class="setup-title">Nominate Secondary Objectives</div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;">Declared before the first Planning Phase. Defaults are pre-selected; adjust if you wish.</div>
    ${rows.join('')}
    <div class="setup-footer"><button class="btn-primary" id="nom-confirm">CONFIRM →</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-nom]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [side, key] = sel.dataset.nom.split('|');
      try { state.secondaryNominations[side][key] = JSON.parse(sel.value); } catch (e) {}
    });
  });
  overlay.querySelector('#nom-confirm').addEventListener('click', () => {
    state.nominationPhase = false;
    renderAll();
  });
}

function renderSetupOverlay() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('setup-overlay');
  if (overlay) overlay.remove();
  if (state.phase !== 'setup') return;

  if (!state.scenario) state.scenario = { deployment: null, approach: null, layout: null, variant: null, objective: null };
  const scen = state.scenario;
  const vrn = scen.variant ? VARIANTS[scen.variant] : null;
  const obj = scen.objective ? OBJECTIVES[scen.objective] : null;
  // Scenario setup is locked until BOTH fleets are chosen and (for Bioficer)
  // all Payloads are assigned to Porters.
  const bothFleetsSelected = !!state.fleetChoices.f1 && !!state.fleetChoices.f2;
  const payloadsLocked = !bothFleetsSelected || !allPayloadsReady();

  // Build a summary line per option for each table — what shows in the picker list.
  const summarisers = {
    deployment: (k, v) => v.short || v.desc,
    approach:   (k, v) => `${FACTIONS[state.factions.shal].name}: ${APPROACH_BEHAVIOURS[v.blue].short} · ${FACTIONS[state.factions.ucm].name}: ${APPROACH_BEHAVIOURS[v.red].short}`,
    layout:     (k, v) => `${v.dropsites.length} dropsites · ${v.scenery.micrometeor} micrometeor · ${v.scenery.dense} dense${v.rings.length?' · '+v.rings.length+' ring'+(v.rings.length>1?'s':''):''}${v.largeObjects.length?' · '+v.largeObjects.length+' large obj':''}`,
    variant:    (k, v) => v.short || '',
    objective:  (k, v) => v.short || ''
  };

  // Card-summary functions (the small text shown on the card's collapsed view)
  const cardSummary = {
    deployment: () => { if (!scen.deployment) return ''; const d = DEPLOYMENTS[scen.deployment]; return d.short || d.desc; },
    approach:   () => { if (!scen.approach) return ''; const a = APPROACHES[scen.approach]; return `<b style="color:var(--shal)">${FACTIONS[state.factions.shal].name}:</b> ${APPROACH_BEHAVIOURS[a.blue].short} · <b style="color:var(--ucm)">${FACTIONS[state.factions.ucm].name}:</b> ${APPROACH_BEHAVIOURS[a.red].short}`; },
    layout:     () => { if (!scen.layout) return ''; const l = LAYOUTS[scen.layout]; return summarisers.layout('', l); },
    variant:    () => vrn ? (vrn.short || '') : '',
    objective:  () => obj ? `${obj.short}${obj.bonus?'<br><span style="color:var(--text-mute)">'+obj.bonus+'</span>':''}` : ''
  };

  const HELPER_TEXT = {
    deployment: 'Where each fleet starts on the board.',
    approach:   'How each side arrives: Direct, Close, or Distant reserves.',
    layout:     'Dropsite positions and how much scenery to place.',
    variant:    'Optional battlefield twist applied to the game.',
    objective:  'How victory is scored this game.'
  };

  const makeCard = (key, label, table, currentKey, fullWidth = false) => {
    const cur = currentKey ? table[currentKey] : null;
    const d6Display = !cur ? '?' : (cur.d6 === 0 ? '—' : cur.d6);
    const d6Cls = !cur || cur.d6 === 0 ? 'none' : '';
    let html = `<div class="scen-row ${fullWidth?'full-width':''}">
      <div class="scen-roll ${d6Cls}">${d6Display}</div>
      <div class="scen-label">${label}</div>
      <div class="scen-helper">${HELPER_TEXT[key] || ''}</div>
      <div class="scen-name">${cur ? cur.name : '<span style="color:var(--text-mute)">— not selected —</span>'}</div>
      <div class="scen-short">${cardSummary[key]()}</div>
      <div class="scen-controls">
        <select class="scen-dropdown" data-scen-select="${key}">
          <option value="" ${!currentKey?'selected':''}>— select —</option>
          ${Object.keys(table).map(optKey => {
            const opt = table[optKey];
            const d6 = opt.d6 === 0 ? '—' : opt.d6;
            return `<option value="${optKey}" ${optKey===currentKey?'selected':''}>${d6==='—'?'':'['+d6+'] '}${opt.name}</option>`;
          }).join('')}
        </select>
        <button class="reroll-btn" data-reroll="${key}" title="Randomise this row">↻</button>
      </div>`;
    html += `</div>`;
    return html;
  };

  overlay = document.createElement('div');
  overlay.id = 'setup-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card">
      <div class="setup-header">
        <h2 class="setup-title">SCENARIO SETUP</h2>
        <div class="setup-sub">D6 · 6-Round Game</div>
      </div>
      <div class="setup-body">
        <div class="faction-select">
          <div class="faction-slot">
            <div class="faction-lbl">FLEET 1</div>
            <select class="fleet-dropdown" data-fleet-choice="f1">
              <option value="" ${!state.fleetChoices.f1?'selected':''}>— select fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f1===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-admiral-choice="f1" style="margin-top:5px;font-size:10px;">
              ${[0,1,2,3,4].map(l => `<option value="${l}" ${state.admiralChoice.f1===l?'selected':''}>${l===0?'No Admiral':'Admiral Lv '+l}</option>`).join('')}
            </select>
            ${secondaryPickers('f1')}
            ${fleetHasPayloads(state.fleetChoices.f1) ? `<button class="btn ${payloadsReady('f1')?'':'btn-primary'}" data-payload-open="f1" style="width:100%;margin-top:5px;font-size:10px;">${payloadsReady('f1')?'✓ PAYLOADS ASSIGNED':'⊕ ASSIGN PAYLOADS'}</button>` : ''}
          </div>
          <div class="faction-slot">
            <div class="faction-lbl">FLEET 2</div>
            <select class="fleet-dropdown" data-fleet-choice="f2">
              <option value="" ${!state.fleetChoices.f2?'selected':''}>— select fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f2===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-admiral-choice="f2" style="margin-top:5px;font-size:10px;">
              ${[0,1,2,3,4].map(l => `<option value="${l}" ${state.admiralChoice.f2===l?'selected':''}>${l===0?'No Admiral':'Admiral Lv '+l}</option>`).join('')}
            </select>
            ${secondaryPickers('f2')}
            ${fleetHasPayloads(state.fleetChoices.f2) ? `<button class="btn ${payloadsReady('f2')?'':'btn-primary'}" data-payload-open="f2" style="width:100%;margin-top:5px;font-size:10px;">${payloadsReady('f2')?'✓ PAYLOADS ASSIGNED':'⊕ ASSIGN PAYLOADS'}</button>` : ''}
          </div>
        </div>
        <div style="font-size:9px;color:var(--text-mute);margin:-4px 0 10px;text-align:center;">Red/Blue sides are randomised when you confirm.</div>
        ${payloadsLocked ? `<div class="scen-extra-note" style="background:rgba(255,181,71,0.08);border-left-color:var(--hull-warn);color:var(--hull-warn);text-align:center;">
          ${!bothFleetsSelected
            ? 'Select <b>both fleets</b> above before choosing a scenario.'
            : 'Assign all Bioficer Payloads to Porter ships before choosing a scenario. Use <b>⊕ ASSIGN PAYLOADS</b> above.'}
        </div>` : ''}
        <div class="setup-grid" style="${payloadsLocked ? 'opacity:0.4;pointer-events:none;filter:grayscale(0.6);' : ''}">
          ${makeCard('deployment','Deployment Type', DEPLOYMENTS, scen.deployment)}
          ${makeCard('approach',  'Approach',        APPROACHES,  scen.approach)}
          ${makeCard('layout',    'Layout',          LAYOUTS,     scen.layout)}
          ${makeCard('variant',   'Variant',         VARIANTS,    scen.variant)}
          ${makeCard('objective', 'Scoring Objective', OBJECTIVES, scen.objective, true)}
        </div>
        ${vrn && vrn.d6 > 0 ? `<div class="scen-extra-note">
          <b>${vrn.name}:</b> ${vrn.desc}
        </div>` : ''}
        ${obj && obj.d6 > 0 ? `<div class="scen-extra-note" style="background:rgba(74,214,255,0.05);border-left-color:var(--ucm);color:var(--ucm)">
          <b>${obj.name}:</b> ${obj.desc}
        </div>` : ''}
      </div>
      <div class="setup-footer">
        <button class="btn" id="test-setup" title="UCM vs Scourge · no admirals/secondaries · Line / Close Enough / Diagonal / Guarded Sectors / Standard">⚡ TEST SETUP</button>
        <button class="btn" data-reroll="all" ${payloadsLocked ? 'disabled' : ''}>⚄ RANDOMISE ALL</button>
        <button class="btn-primary" id="commit-scenario" ${payloadsLocked ? 'disabled' : ''}>CONFIRM SCENARIO →</button>
      </div>
    </div>
  `;
  board.appendChild(overlay);

  // Reroll buttons: 'all' randomises every row; a single key randomises just that row.
  const SCEN_TABLES = { deployment: DEPLOYMENTS, approach: APPROACHES, layout: LAYOUTS, variant: VARIANTS, objective: OBJECTIVES };
  overlay.querySelectorAll('[data-reroll]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.reroll;
      if (key === 'all') {
        state.scenario = generateScenario();
      } else {
        // Randomise only this row.
        const keys = Object.keys(SCEN_TABLES[key]);
        state.scenario = { ...state.scenario, [key]: keys[Math.floor(Math.random() * keys.length)] };
      }
      renderSetupOverlay();
    });
  });
  // Picker dropdown — change (or clear) the chosen option for a scenario row.
  overlay.querySelectorAll('[data-scen-select]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const key = sel.dataset.scenSelect;
      state.scenario = { ...state.scenario, [key]: sel.value || null };
      renderSetupOverlay();
    });
  });
  // Fleet selection (dropdowns). Red/Blue sides are randomised at commit.
  overlay.querySelectorAll('[data-fleet-choice]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const which = sel.dataset.fleetChoice; // 'f1' | 'f2'
      state.fleetChoices[which] = sel.value || null;
      state.payloadLinks[which] = {}; // changing the fleet clears its payload assignments
      renderSetupOverlay();           // refresh so ASSIGN PAYLOADS button appears/hides
    });
  });
  overlay.querySelectorAll('[data-admiral-choice]').forEach(sel => {
    sel.addEventListener('change', () => { state.admiralChoice[sel.dataset.admiralChoice] = parseInt(sel.value) || 0; });
  });
  overlay.querySelectorAll('[data-secondary]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [slot, idx] = sel.dataset.secondary.split('|');
      state.secondaryChoice[slot] = state.secondaryChoice[slot] || [];
      state.secondaryChoice[slot][parseInt(idx)] = sel.value || undefined;
      state.secondaryChoice[slot] = state.secondaryChoice[slot].filter(Boolean);
      renderSetupOverlay();
    });
  });
  // Open the Payload→Porter assignment modal for a fleet slot.
  overlay.querySelectorAll('[data-payload-open]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.payloadAssign = { slot: btn.dataset.payloadOpen };
      renderPayloadAssign();
    });
  });
  overlay.querySelector('#commit-scenario').addEventListener('click', commitScenario);
  const testBtn = overlay.querySelector('#test-setup');
  if (testBtn) testBtn.addEventListener('click', () => {
    // Quick deterministic test game: UCM vs Scourge, no admirals/secondaries,
    // Line deployment · Close Enough approach · Diagonal layout · Guarded Sectors
    // variant · Standard scoring. Then commit straight to play.
    state.fleetChoices = { f1: 'ucm', f2: 'scourge' };
    state.admiralChoice = { f1: 0, f2: 0 };
    state.secondaryChoice = { f1: [], f2: [] };
    state.scenario = {
      deployment: 'line', approach: 'close_enough', layout: 'diagonal',
      variant: 'guarded_sectors', objective: 'standard'
    };
    commitScenario();
  });
}

function renderDeployHint() {
  const board = document.querySelector('.board-wrap');
  let hint = document.getElementById('deploy-hint');
  if (hint) hint.remove();
  if (state.phase !== 'deploy') return;
  hint = document.createElement('div');
  hint.id = 'deploy-hint';
  hint.className = 'deploy-hint';

  // Status text varies depending on selection.
  let status = '';
  if (state.selectedGroupId) {
    const def = getDef(state.selectedGroupId);
    const grp = state.groups[state.selectedGroupId];
    if (!canDeployNow(def)) {
      const app = approachFor(def.side);
      status = `<b>${def.name}</b> · <span style="color:var(--text-mute)">Reserve (${app === 'close' ? 'Close' : 'Distant'}) — arrives via off-table activation in play</span>`;
    } else if (!deploySideAllowed(def.side)) {
      status = `<b>${def.name}</b> · <span style="color:var(--hull-warn)">${factionName('ucm')} (Red) deploys first — finish all Red Direct/Vanguard Groups before placing Blue</span>`;
    } else {
      const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
      const total = grp.ships.filter(s => !s.destroyed).length;
      const placed = total - (grp.ships.filter(s => !s.destroyed && s.offTable).length);
      if (undeployedIdx >= 0) {
        status = `<b>${def.name}</b> · click in zone to place ship <b>${placed + 1}</b> of <b>${total}</b>`;
      } else {
        status = `<b>${def.name}</b> · all ships placed · click to fine-tune`;
      }
    }
  } else {
    // Show Direct-deployment progress per side, and whose turn it is.
    const ucmStat = directDeploymentStatus('ucm');
    const shalStat = directDeploymentStatus('shal');
    const parts = [];
    if (ucmStat)  parts.push(`<span style="color:var(--ucm)">${factionName('ucm')} ${ucmStat.placed}/${ucmStat.required} req</span>`);
    if (shalStat) parts.push(`<span style="color:var(--shal)">${factionName('shal')} ${shalStat.placed}/${shalStat.required} req</span>`);
    let order;
    if (!state.deployDone.ucm) order = `<span style="color:var(--ucm)">${factionName('ucm')} (Red) deploying — finish, then signal done</span>`;
    else if (!state.deployDone.shal) order = `<span style="color:var(--shal)">${factionName('shal')} (Blue) deploying</span>`;
    else order = `Both sides ready — begin play`;
    status = parts.length ? `Direct minimums: ${parts.join(' · ')} · ${order}` : order;
  }

  // Footer button: hand off between sides, then BEGIN PLAY once both are done.
  let footerBtn;
  const bothDone = state.deployDone.ucm && state.deployDone.shal;
  if (state.aiming) {
    footerBtn = '';
  } else if (!state.deployDone.ucm) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-red" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${factionName('ucm')} (RED) DEPLOYMENT DONE ▸</button>`;
  } else if (!state.deployDone.shal) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-blue" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${factionName('shal')} (BLUE) DEPLOYMENT DONE ▸</button>`;
  } else {
    footerBtn = `<button class="btn-primary" id="commit-deploy" style="padding:5px 14px;font-size:11px;">BEGIN PLAY →</button>`;
  }

  hint.innerHTML = `<span>${status}</span>${footerBtn}`;
  board.appendChild(hint);
  const cd = hint.querySelector('#commit-deploy');
  if (cd) cd.addEventListener('click', commitDeployment);
  const ddr = hint.querySelector('#deploy-done-red');
  if (ddr) ddr.addEventListener('click', () => {
    const left = undeployedDeployableCount('ucm');
    const stat = directDeploymentStatus('ucm');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${factionName('ucm')} must place its Direct minimum first`); return; }
    if (left > 0 && !confirm(`${factionName('ucm')} still has ${left} deployable Group(s) off-table. Finish deploying Red and hand over to Blue?`)) return;
    state.deployDone.ucm = true;
    state.selectedGroupId = null; state.selectedShipIdx = null;
    renderAll();
  });
  const ddb = hint.querySelector('#deploy-done-blue');
  if (ddb) ddb.addEventListener('click', () => {
    const left = undeployedDeployableCount('shal');
    const stat = directDeploymentStatus('shal');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${factionName('shal')} must place its Direct minimum first`); return; }
    if (left > 0 && !confirm(`${factionName('shal')} still has ${left} deployable Group(s) off-table. Finish deploying Blue?`)) return;
    state.deployDone.shal = true;
    state.selectedGroupId = null; state.selectedShipIdx = null;
    renderAll();
  });
}

function renderScenBanner() {
  const board = document.querySelector('.board-wrap');
  let bn = document.getElementById('scen-banner');
  if (bn) bn.remove();
  if (state.phase !== 'play' || !state.scenario) return;
  const lay = LAYOUTS[state.scenario.layout];
  const obj = OBJECTIVES[state.scenario.objective];
  bn = document.createElement('div');
  bn.id = 'scen-banner';
  bn.className = 'scen-banner';
  bn.innerHTML = `
    <span class="scen-title-mini">${lay.name}</span>
    <b>${obj.name}</b> · Rd <b>${state.round}</b>/6
  `;
  board.appendChild(bn);
}

function renderPhaseNav() {
  const nav = document.getElementById('phase-nav');
  if (nav && state.phase === 'play' && state.score) {
    // During play, the phase steps are replaced by a clickable VP counter that opens
    // the full Victory-Point breakdown.
    const u = state.score.ucm, s = state.score.shal;
    nav.innerHTML = `<button id="vp-counter" title="Click for the full Victory Point breakdown"
      style="display:flex;align-items:center;gap:10px;background:rgba(10,14,13,0.6);border:1px solid var(--border-bright);border-radius:6px;padding:5px 14px;cursor:pointer;font-family:var(--display);">
      <span style="font-size:9px;letter-spacing:0.15em;color:var(--text-mute);">VP</span>
      <span style="color:var(--ucm);font-weight:700;font-size:16px;">${u.vp}</span>
      <span style="font-size:9px;color:var(--text-mute);">${factionName('ucm')}</span>
      <span style="color:var(--text-mute);">·</span>
      <span style="font-size:9px;color:var(--text-mute);">${factionName('shal')}</span>
      <span style="color:var(--shal);font-weight:700;font-size:16px;">${s.vp}</span>
      <span style="font-size:10px;color:var(--text-mute);margin-left:4px;">⊕</span>
    </button>`;
    const btn = nav.querySelector('#vp-counter');
    if (btn) btn.addEventListener('click', () => { state.vpBreakdownOpen = true; renderAll(); });
    return;
  }
  // Setup/scenery/deploy: restore the phase-step breadcrumb if it was replaced.
  if (nav && !nav.querySelector('.phase-step')) {
    nav.innerHTML = `<span class="phase-step" data-phase="setup">1 · SETUP</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="scenery">2 · SCENERY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="deploy">3 · DEPLOY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="play">4 · PLAY</span>`;
  }
  document.querySelectorAll('.phase-step').forEach(el => {
    el.classList.toggle('active', el.dataset.phase === state.phase);
    const phases = ['setup','scenery','deploy','play'];
    const curIdx = phases.indexOf(state.phase);
    const elIdx = phases.indexOf(el.dataset.phase);
    el.classList.toggle('done', elIdx < curIdx);
  });
}

function renderTopbarControls() {
  const ctrl = document.getElementById('topbar-controls');
  if (!ctrl) return;
  if (state.phase === 'setup') {
    ctrl.innerHTML = `<button class="btn" id="reset-game" title="Reset all">↻ RESET</button>`;
  } else if (state.phase === 'scenery') {
    ctrl.innerHTML = `
      <button class="btn" id="back-to-setup">← SETUP</button>
      <button class="btn-primary" id="commit-scenery-top" style="padding:6px 14px;font-size:11px;">SCENERY COMPLETE →</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  } else if (state.phase === 'deploy') {
    ctrl.innerHTML = `
      <button class="btn" id="back-to-setup">← SETUP</button>
      <button class="btn-primary" id="commit-deploy-top" style="padding:6px 14px;font-size:11px;">DEPLOYMENT COMPLETE →</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  } else { // play
    const P = state.planning;
    const canPass = P && state.activeSide && P.passTokens[state.activeSide] > 0;
    const waitingBanner = (_netSide && state.activeSide && _netSide !== state.activeSide)
      ? `<span style="font-size:10px;color:var(--text-mute);font-family:var(--mono);margin-right:4px;">⏳ OPPONENT'S TURN</span>`
      : '';
    ctrl.innerHTML = `
      ${waitingBanner}
      <div class="round-display">RND <b id="round-num">${state.round}</b> / 6</div>
      ${canPass ? `<button class="btn" id="pass-activation" title="Spend a Pass Token to pass">⏭ PASS (${P.passTokens[state.activeSide]})</button>` : ''}
      <button class="btn" id="end-round">END ROUND ▸</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  }
}



function renderAll() {
  syncPayloads();
  renderPhaseNav();
  renderTopbarControls();
  renderPanels();
  renderDetail();
  renderBoard();
  renderSetupOverlay();
  renderNominationModal();
  renderDropsiteActivation();
  renderPayloadAssign();
  renderAttackModal();
  renderRepairPhase();
  renderBattalionDeployModal();
  renderDogfightModal();
  renderScoreboard();
  renderEventLog();
  renderApEditModal();
  renderScoringModal();
  renderVPBreakdown();
  renderGameOver();
  renderSceneryPlacement();
  renderAssetPhase();
  renderInitiative();
  renderDeployHint();
  renderScenBanner();
  updateHUD();
  renderAimHint();
  netAfterRender();
  // Cursor: crosshair when the player is about to place / aim / second-move.
  const board = document.getElementById('board');
  if (board) {
    let showCrosshair = false;
    if (state.aiming || state.vectoredSecondMove || state.launching || (state.assetPhase && state.assetPhase.step === 'assets') || (state.phase === 'scenery' && state.sceneryPlace)) {
      showCrosshair = true;
    } else if (state.selectedGroupId) {
      const def = getDef(state.selectedGroupId);
      const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
      if (def && undeployedIdx >= 0) {
        if (state.phase === 'deploy' && canDeployNow(def) && deploySideAllowed(def.side)) {
          showCrosshair = true;
        } else if (state.phase === 'play') {
          const grp = state.groups[state.selectedGroupId];
          if (!grp.activated && canActivateOffTable(def).eligible) showCrosshair = true;
        }
      }
    }
    board.style.cursor = showCrosshair ? 'crosshair' : 'default';
  }
}

/* Floating hint shown during aim / vectored-second-move states. */
function renderAimHint() {
  const board = document.querySelector('.board-wrap');
  let el = document.getElementById('aim-hint');
  if (el) el.remove();
  let msg = '';
  if (state.aiming) {
    if (state.aiming.mode === 'deploy') msg = 'Move mouse to aim · click to set facing (any angle)';
    else if (state.aiming.mode === 'vectored') msg = 'Vectored pivot — aim (±45°) · click to set, then move again';
    else if (state.aiming.mode === 'course_change') msg = 'Course Change — bonus turn (±45°) · click to set facing';
  } else if (state.vectoredSecondMove) {
    msg = 'Vectored — click ahead to move with remaining thrust (no further turn) · right-click or press Esc to skip';
  }
  if (!msg) return;
  el = document.createElement('div');
  el.id = 'aim-hint';
  el.className = 'deploy-hint';
  el.style.bottom = '12px';
  el.innerHTML = `<span><b>${msg}</b></span>`;
  board.appendChild(el);
}

function updateHUD() {
  const hud = document.getElementById('hud-active');
  const turnHud = document.getElementById('hud-turn-info');
  if (!state.selectedGroupId) {
    if (state.phase === 'play' && state.activeSide) {
      const an = FACTIONS[state.factions[state.activeSide]].name;
      const col = state.activeSide === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      hud.innerHTML = `<b style="color:${col}">${an}</b> TO ACTIVATE →`;
    } else {
      hud.innerHTML = 'SELECT A GROUP →';
    }
    turnHud.style.display = 'none';
  } else {
    const def = getDef(state.selectedGroupId);
    const grp = getGroup(state.selectedGroupId);
    const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    const hudOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    hud.innerHTML = `<b style="color:${sideCol}">${def.name}</b> · ${hudOrd || 'no order'}${state.selectedShipIdx !== null ? ' · ship #' + (state.selectedShipIdx+1) : ''}`;
    if (state.selectedShipIdx !== null && hudOrd && ORDERS[hudOrd].moveMax > 0) {
      const o = ORDERS[hudOrd];
      turnHud.style.display = 'block';
      turnHud.innerHTML = `MOVE <b>${(o.moveMin*def.thrust).toFixed(1)}"–${(o.moveMax*def.thrust).toFixed(1)}"</b> · TURN <b>±${o.turnLimit}°</b>`;
    } else {
      turnHud.style.display = 'none';
    }
  }
}

/* ==========================================================================
   EVENT WIRING
   ========================================================================== */
document.addEventListener('click', (e) => {
  // Group card click handled inline
  // Spike controls
  if (e.target.matches('[data-spike-u]')) {
    const gid = e.target.dataset.spikeU;
    if (state.groups[gid].spikes < 4) state.groups[gid].spikes++;
    renderAll(); return;
  }
  if (e.target.matches('[data-spike-d]')) {
    const gid = e.target.dataset.spikeD;
    if (state.groups[gid].spikes > 0) state.groups[gid].spikes--;
    renderAll(); return;
  }
  // Dropsite damage controls
  if (e.target.matches('[data-ds-damage-u]')) {
    const did = e.target.dataset.dsDamageU;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage < ds.maxHull) ds.damage++;
    renderAll(); return;
  }
  if (e.target.matches('[data-ds-damage-d]')) {
    const did = e.target.dataset.dsDamageD;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage > 0) ds.damage--;
    renderAll(); return;
  }
  // HP controls
  if (e.target.matches('[data-hpu]')) {
    const [gid, si] = e.target.dataset.hpu.split('|');
    const ship = state.groups[gid].ships[si];
    if (ship.hull < ship.maxHull) ship.hull++;
    if (ship.destroyed && ship.hull > 0) ship.destroyed = false;
    renderAll(); return;
  }
  if (e.target.matches('[data-hpd]')) {
    const [gid, si] = e.target.dataset.hpd.split('|');
    const ship = state.groups[gid].ships[si];
    if (ship.hull > 0) {
      ship.hull--;
      if (ship.hull <= 0) ship.destroyed = true;
    }
    // If the destroyed ship was the lead, hand lead to the first alive ship.
    const g = state.groups[gid];
    if (g.ships[g.leadShipIdx || 0] && g.ships[g.leadShipIdx || 0].destroyed) {
      const firstAlive = g.ships.findIndex(s => !s.destroyed && !s.offTable);
      g.leadShipIdx = firstAlive >= 0 ? firstAlive : 0;
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-bat-cancel]')) {
    const dep = state.battalionDeploy;
    if (dep && dep.fromGid != null) {
      state.selectedDropsiteId = null;
      state.selectedGroupId = dep.fromGid;
      state.selectedShipIdx = dep.fromSi;
    }
    state.battalionDeploy = null;
    renderAll(); return;
  }
  // Battalion manual adjust.
  if (e.target.matches('[data-bat-adj]')) {
    const [dsId, key, side, delta] = e.target.dataset.batAdj.split('|');
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds) {
      const b = dsBattalions(ds);
      if (b[key]) b[key][side] = Math.max(0, (b[key][side] || 0) + parseInt(delta));
    }
    renderAll(); return;
  }
  // Battalion deploy — land the launched battalions at the chosen location.
  if (e.target.closest && e.target.closest('[data-bat-deploy]')) {
    const el = e.target.closest('[data-bat-deploy]');
    const [dsId, key] = el.dataset.batDeploy.split('|');
    const dep = state.battalionDeploy;
    if (dep && dep.dsId === dsId) {
      const ds = state.scenarioData.dropsites.find(d => d.id === dsId);
      if (ds) {
        const b = dsBattalions(ds);
        if (b[key]) b[key][dep.side] = (b[key][dep.side] || 0) + dep.count;
      }
      // Reselect the launching ship so the player can continue its activation.
      if (dep.fromGid != null) {
        state.selectedDropsiteId = null;
        state.selectedGroupId = dep.fromGid;
        state.selectedShipIdx = dep.fromSi;
      }
      state.battalionDeploy = null;
    }
    renderAll(); return;
  }
  // Layer toggle (orbit ↔ atmosphere) for the selected ship's next move.
  // Fighter/Bomber counter adjust (must run BEFORE the data-launch toggle,
  // since the counter sits inside the launch row).
  if (e.target.matches('[data-fb-adj]')) {
    const [which, delta] = e.target.dataset.fbAdj.split('|');
    if (state.launching) {
      const d = parseInt(delta);
      const cur = state.launching[which] || 0;
      const next = Math.max(0, cur + d);
      // Enforce mutual exclusivity: only one of fighters/bombers may be > 0.
      const other = which === 'fighters' ? 'bombers' : 'fighters';
      if (next > 0 && (state.launching[other] || 0) > 0) { /* blocked */ }
      else state.launching[which] = next;
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-fs-adj]')) {
    const d = parseInt(e.target.dataset.fsAdj);
    if (state.launching) {
      state.launching.fireships = Math.max(0, (state.launching.fireships || 0) + d);
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-launch-cancel]')) {
    state.launching = null;
    renderAll(); return;
  }
  // Payload: begin detaching a payload — enter board placement (within 3").
  if (e.target.matches('[data-payload-detach]') || (e.target.closest && e.target.closest('[data-payload-detach]'))) {
    const btn = e.target.matches('[data-payload-detach]') ? e.target : e.target.closest('[data-payload-detach]');
    const [pgid, psi] = btn.dataset.payloadDetach.split('|');
    const porter = state.groups[state.selectedGroupId];
    state.payloadDetach = {
      gid: pgid, si: parseInt(psi),
      porterGid: state.selectedGroupId, porterSi: state.selectedShipIdx
    };
    state.launching = null;
    flashLaunchMsg('Click within 3" of the Porter to place the detached Payload');
    renderAll(); return;
  }
  // Payload: begin reattaching — click a detached payload within 3" of the Porter.
  if (e.target.matches('[data-payload-reattach]') || (e.target.closest && e.target.closest('[data-payload-reattach]'))) {
    const btn = e.target.matches('[data-payload-reattach]') ? e.target : e.target.closest('[data-payload-reattach]');
    const [pgid, psi] = btn.dataset.payloadReattach.split('|');
    state.payloadReattach = { porterGid: pgid, porterSi: parseInt(psi) };
    state.payloadDetach = null;
    state.launching = null;
    flashLaunchMsg('Click a detached Payload within 3" to reattach');
    renderAll(); return;
  }
  // Weapon targeting — click a weapon to enter target-assignment mode.
  const wtEl = e.target.closest && e.target.closest('[data-weapon-target]');
  if (wtEl) {
    const [gid, si, wi] = wtEl.dataset.weaponTarget.split('|');
    const sIdx = parseInt(si), wIdx = parseInt(wi);
    if (state.targeting && state.targeting.gid === gid && state.targeting.si === sIdx && state.targeting.wi === wIdx) {
      state.targeting = null; // toggle off
    } else {
      state.targeting = { gid, si: sIdx, wi: wIdx };
      state.launching = null;
      flashLaunchMsg('Click an enemy ship in arc & range to lock the target');
    }
    renderAll(); return;
  }
  // Clear a locked weapon target.
  if (e.target.matches('[data-weapon-unlock]')) {
    const [gid, si, wi] = e.target.dataset.weaponUnlock.split('|');
    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && ship.weaponTargets) { delete ship.weaponTargets[parseInt(wi)]; }
    renderAll(); return;
  }
  // Anti-Wing: toggle the wing-targeting mode.
  if (e.target.matches('[data-antiwing]') || (e.target.closest && e.target.closest('[data-antiwing]'))) {
    const btn = e.target.matches('[data-antiwing]') ? e.target : e.target.closest('[data-antiwing]');
    const [gid, si, wi] = btn.dataset.antiwing.split('|');
    if (state.antiWing && state.antiWing.gid === gid && state.antiWing.si === parseInt(si) && state.antiWing.wi === parseInt(wi)) {
      state.antiWing = null;
    } else {
      state.antiWing = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy Wing (fighter/bomber) in arc & range', true);
    }
    renderAll(); return;
  }
  // Detector: toggle the LoS-targeting mode (forgoes the weapon to place Spikes).
  if (e.target.matches('[data-detector]') || (e.target.closest && e.target.closest('[data-detector]'))) {
    const btn = e.target.matches('[data-detector]') ? e.target : e.target.closest('[data-detector]');
    const [gid, si, wi] = btn.dataset.detector.split('|');
    if (state.detector && state.detector.gid === gid && state.detector.si === parseInt(si) && state.detector.wi === parseInt(wi)) {
      state.detector = null; // toggle off
    } else {
      state.detector = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy ship in Line of Sight', true);
    }
    renderAll(); return;
  }
  // FIRE — open the attack resolution modal for all locked weapons.
  if (e.target.matches('[data-fire]') || (e.target.closest && e.target.closest('[data-fire]'))) {
    const btn = e.target.matches('[data-fire]') ? e.target : e.target.closest('[data-fire]');
    const [gid, si] = btn.dataset.fire.split('|');
    openAttackModal(gid, parseInt(si));
    return;
  }
  if (e.target.matches('[data-survey]') || (e.target.closest && e.target.closest('[data-survey]'))) {
    const btn = e.target.matches('[data-survey]') ? e.target : e.target.closest('[data-survey]');
    const [gid, si, dsId] = btn.dataset.survey.split('|');
    const def = getDef(gid), ship = state.groups[gid].ships[parseInt(si)];
    const ds = state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds && ship) {
      ds.surveyedBy = ds.surveyedBy || [];
      if (!ds.surveyedBy.includes(def.side)) ds.surveyedBy.push(def.side);
      // Surveying forgoes attacking/launching: mark the ship as having fired+launched.
      ship.firedThisActivation = true; ship.launchedThisRound = 999;
      flashLaunchMsg(`${def.name} surveyed ${ds.base.name}`, true);
    }
    renderAll(); return;
  }
  if (e.target.closest && e.target.closest('[data-extract-start]')) {
    const [gid, si] = e.target.closest('[data-extract-start]').dataset.extractStart.split('|');
    // Toggle extract-targeting mode for this ship.
    if (state.extracting && state.extracting.gid === gid && state.extracting.si === parseInt(si)) {
      state.extracting = null;
    } else {
      state.extracting = { gid, si: parseInt(si) };

    const sIdx = parseInt(si), li = parseInt(liStr);
    // Toggle off if already targeting this exact launch entry.
    if (state.launching && state.launching.gid === gid && state.launching.si === sIdx
        && state.launching.type === type && state.launching.li === li) {
      state.launching = null;
    } else {
      const meta = launchMeta(type);
      const def = getDef(gid);
      const entry = (def.launch || [])[li] || {};
      state.launching = { gid, si: sIdx, type, li, name: meta.label, auraIn: meta.auraIn, link: entry.link, fighters: 0, bombers: 0, fireships: 0 };

  if (e.target.matches('[data-lead]')) {

    const sIdx = parseInt(si);
    const ship = grp.ships[sIdx];
    if (!ship || grp.activated) return;
    // Alternating activation gate.
    if (state.phase === 'play' && state.activeSide && def.side !== state.activeSide) {

      return;
    }

        ship.hull = Math.min(ship.maxHull, ship.hull + rec);

    if (ship && objectivesBeyondEligible(gid, parseInt(si))) {

  }

    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && breakthroughFlyoffEligible(gid, parseInt(si))) {

      ship.flewOff = true; ship.offTable = true;

      grp.moveTrail.push({ si: parseInt(si), x: ship.x, y: ship.y, heading: ship.heading, hold: true });

  }

    if (cs && (cs.firedThisActivation || cs.detectorUsed || (cs.launchedThisRound > 0))) {

      return;

        grp.ships[si].y = prev.y;
        grp.ships[si].heading = prev.heading;

    const stillHasTrail = (grp.moveTrail || []).some(t => t.si === parseInt(si));

        `Each ship must move once per round. Finish activation anyway?`

    const orbitalComplex = variantKey === 'orbital_complex';
    const ord = onIndividualOrders(fdef, grp) ? null : grp.order;
    const endDmgLog = [];
    grp.ships.forEach((s, si) => {
      if (s.destroyed || s.offTable) return;
      let dmg = 0;
      const is2D3 = fdef.tonnage === 'C';

        endDmgLog.push(`${fdef.name}: ${a} (atmosphere)`);

      if (orbitalComplex && s.crippling && s.crippling.includes('decay')) {

    const f = FEATURES[ds.features[parseInt(fi)]];

    state.launching = {

    };

    state.battalionCombat.stage = 'init';
    renderAll(); return;

  if (e.target.matches('[data-bc-feat]')) {
    const bc = state.battalionCombat;
    const ds = state.scenarioData.dropsites.find(d => d.id === bc.dsId);

    const r = assignGroundToFeature(ds, actor, e.target.dataset.bcFeat);

  if (e.target.matches('#bc-skip-assign')) {

    const ds = state.scenarioData.dropsites.find(d => d.id === bc.dsId);

    const a = state.assetMove && state.launchedAssets.find(x => x.id === state.assetMove.id);
