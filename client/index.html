<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0d">
<title>DFC BATTLEMAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0d; --bg-elev: #11171a; --bg-card: #161e22;
    --bg-card-2: #1a242a;
    --border: #233038; --border-bright: #2f4250;
    --text: #d8e3e8; --text-dim: #7a8a94; --text-mute: #4a5862;
    --ucm: #4ad6ff; --ucm-dim: #1f6e8c; --ucm-glow: rgba(74,214,255,0.25);
    --shal: #d4a647; --shal-dim: #7a5e1f; --shal-glow: rgba(212,166,71,0.30);
    --hull-good: #4ad6ff; --hull-warn: #ffb547; --hull-crit: #ff5252;
    --grid-line: rgba(74,214,255,0.07);
    --grid-line-shal: rgba(212,166,71,0.07);
    --table-bg: #08100f;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Oswald', 'Impact', sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 12px; line-height: 1.4;
    background-image:
      radial-gradient(ellipse at top, rgba(74,214,255,0.04), transparent 60%),
      linear-gradient(to bottom, var(--bg), #060a0c);
    user-select: none;
  }

  /* ============== LAYOUT ============== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
  }
  /* During Setup the side panels are hidden; collapse their columns so the board
     area (and the centred scenario overlay) spans the full width. Panels keep
     visibility:hidden (not display:none) so the board stays in its centre track. */
  .app.panels-hidden { grid-template-columns: 0 1fr 0; }
  .app.panels-hidden .panel { visibility: hidden; }
  .topbar {
    grid-column: 1 / -1;
    background: linear-gradient(180deg, #0e1518 0%, #0a1014 100%);
    border-bottom: 1px solid var(--border-bright);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .brand {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .brand .vs { color: var(--text-mute); font-size: 11px; }
  .brand .shal-name { color: var(--shal); }
  .topbar-controls { display: flex; align-items: center; gap: 10px; }
  .btn {
    background: linear-gradient(180deg, #1a242a 0%, #11181c 100%);
    border: 1px solid var(--border-bright);
    color: var(--text); padding: 6px 12px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--ucm-dim); color: var(--ucm); }
  .btn:active { transform: scale(0.96); }
  .btn.shal:hover { border-color: var(--shal-dim); color: var(--shal); }
  .btn-icon {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; border-radius: 3px;
    font-size: 14px;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--border-bright); }
  .round-display {
    font-family: var(--display); font-size: 14px;
    color: var(--text-dim); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .round-display b { color: var(--text); font-weight: 700; }

  /* ============== PHASE NAV ============== */
  .phase-nav {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--display); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .phase-step {
    color: var(--text-mute);
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .phase-step.active {
    color: var(--ucm);
    border-color: var(--ucm-dim);
    background: rgba(74,214,255,0.06);
  }
  .phase-step.done { color: var(--text-dim); }
  .phase-arrow { color: var(--text-mute); font-size: 10px; }
  @media (max-width: 1100px) {
    .phase-nav { font-size: 10px; gap: 4px; }
    .phase-step { padding: 3px 5px; }
  }
  @media (max-width: 860px) {
    .phase-nav { display: none; }
  }

  /* ============== SETUP OVERLAY ============== */
  .setup-overlay {
    position: absolute; inset: 0;
    background: rgba(8,16,15,0.93);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; overflow-y: auto; padding: 20px;
  }
  .setup-card {
    width: 100%; max-width: 760px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    margin: auto;
  }
  .setup-header {
    padding: 12px 18px;
    background: linear-gradient(180deg, #142028 0%, #0d171c 100%);
    border-bottom: 1px solid var(--border-bright);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .setup-title {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    margin: 0;
  }
  .setup-sub {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .setup-body { padding: 14px 18px; }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .faction-select {
    display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  @media (min-width: 600px) { .faction-select { grid-template-columns: 1fr 1fr; } }
  .faction-slot .faction-lbl { font-family: var(--display); font-size: 10px; letter-spacing: 2px; margin-bottom: 5px; }
  .faction-opts { display: flex; flex-wrap: wrap; gap: 4px; }
  .faction-btn {
    flex: 1 1 auto; padding: 6px 8px; font-size: 10px; font-family: var(--mono);
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; border-radius: 3px; letter-spacing: 1px;
  }
  .faction-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .faction-btn.sel.ucm { color: var(--ucm); border-color: var(--ucm); background: rgba(74,214,255,0.08); }
  .faction-btn.sel.shal { color: var(--shal); border-color: var(--shal); background: rgba(212,166,71,0.08); }
  .fleet-dropdown {
    width: 100%; padding: 8px 10px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border-bright); border-radius: 4px; font-family: var(--mono);
    font-size: 12px; cursor: pointer;
    color-scheme: dark;
  }
  .fleet-dropdown:hover { border-color: var(--text); }
  /* Theme the native popup list (the selectable items) to match the dark UI. */
  .fleet-dropdown option, .scen-dropdown option {
    background: var(--bg-elev); color: var(--text);
    font-family: var(--mono); font-size: 12px;
  }
  .fleet-dropdown option:checked, .scen-dropdown option:checked {
    background: var(--ucm-dim); color: var(--text);
  }
  .fleet-dropdown option:disabled, .scen-dropdown option:disabled {
    color: var(--text-mute);
  }
  .pl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pl-row .pl-name { flex: 0 0 45%; font-size: 11px; }
  .pl-row .pl-select { flex: 1 1 55%; }
  .ap-section { margin-bottom: 10px; }
  .ap-title { font-family: var(--display); font-size: 11px; letter-spacing: 1px; margin-bottom: 5px; color: var(--text); }
  .ap-ds { margin-bottom: 6px; }
  .ap-ds-name { font-size: 10px; color: var(--text-dim); font-weight: 700; }
  .ap-loc { display: flex; justify-content: space-between; font-size: 10px; padding: 1px 0 1px 8px; font-family: var(--mono); }
  .ap-log { font-size: 10px; color: var(--text-dim); padding: 2px 0; font-family: var(--mono); }
  .init-grid { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 8px 0 14px; }
  .init-slot { text-align: center; }
  .init-name { font-family: var(--display); font-size: 11px; letter-spacing: 1px; margin-bottom: 8px; }
  .init-die { width: 56px; height: 56px; border: 2px solid; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-family: var(--mono); font-size: 28px; font-weight: 700;
    background: var(--bg-elev); }
  .init-vs { color: var(--text-mute); font-size: 11px; font-family: var(--display); letter-spacing: 1px; }
  .init-result { text-align: center; font-family: var(--display); font-size: 14px; letter-spacing: 1px; font-weight: 700; }
  .init-choice { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .init-choice-lbl { font-size: 10px; color: var(--text-dim); text-align: center; margin-bottom: 6px; }
  .init-choice-btns { display: flex; gap: 6px; }
  .init-choice-btns .btn { flex: 1; font-size: 10px; }
  @media (min-width: 600px) {
    .setup-grid { grid-template-columns: 1fr 1fr; }
    .setup-grid .full-width { grid-column: 1 / -1; }
  }
  .scen-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ucm-dim);
    border-radius: 2px;
    padding: 9px 11px 9px 12px;
    position: relative;
    min-height: 96px;
  }
  .scen-row .scen-label {
    font-family: var(--display);
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--text-mute); text-transform: uppercase;
    margin-bottom: 3px;
  }
  .scen-row .scen-helper {
    font-size: 9px; color: var(--text-mute);
    line-height: 1.35; margin-bottom: 6px; font-style: italic;
  }
  .scen-row .scen-name {
    font-family: var(--display);
    font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
    padding-right: 38px;
  }
  .scen-row .scen-short {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px; line-height: 1.4;
  }
  .scen-row .scen-roll {
    position: absolute; top: 8px; right: 10px;
    font-family: var(--display); font-weight: 700;
    font-size: 16px; color: var(--ucm);
    width: 24px; height: 24px;
    display: grid; place-items: center;
    border: 1px solid var(--ucm-dim);
    border-radius: 50%;
    background: rgba(74,214,255,0.07);
  }
  .scen-row .scen-roll.none { color: var(--text-mute); border-color: var(--border); background: transparent; }
  .scen-row .reroll-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    margin-top: 8px;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .reroll-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .scen-controls {
    display: flex; gap: 6px;
    margin-top: 8px;
    align-items: stretch;
  }
  .scen-row .scen-controls .scen-dropdown { flex: 0 0 75%; }
  .scen-row .scen-controls .reroll-btn { flex: 1 1 25%; margin-top: 0; }
  .scen-row .scen-dropdown {
    background: var(--panel); border: 1px solid var(--border-bright);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer; width: 100%;
    color-scheme: dark;
  }
  .scen-row .scen-dropdown:hover { border-color: var(--text); }
  .scen-row .picker-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .picker-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .picker-btn.expanded { color: var(--ucm); border-color: var(--ucm-dim); background: rgba(74,214,255,0.05); }

  .scen-picker {
    margin-top: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
  }
  .scen-pick-opt {
    padding: 8px 11px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.08s;
  }
  .scen-pick-opt:last-child { border-bottom: none; }
  .scen-pick-opt:hover { background: var(--bg-card-2); }
  .scen-pick-opt.selected { background: rgba(74,214,255,0.06); }
  .scen-pick-opt .pick-d6 {
    font-family: var(--display); font-weight: 700;
    font-size: 13px; color: var(--text-dim);
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .scen-pick-opt.selected .pick-d6 { color: var(--ucm); }
  .scen-pick-opt .pick-d6.none { color: var(--text-mute); }
  .scen-pick-opt .pick-body { flex: 1; min-width: 0; }
  .scen-pick-opt .pick-name {
    font-family: var(--display);
    font-size: 12px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.15;
  }
  .scen-pick-opt.selected .pick-name { color: var(--ucm); }
  .scen-pick-opt .pick-desc {
    font-size: 9.5px; color: var(--text-dim);
    margin-top: 3px; line-height: 1.4;
  }

  .setup-footer {
    padding: 12px 18px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--ucm) 0%, var(--ucm-dim) 100%);
    border: 1px solid var(--ucm);
    color: #021018;
    padding: 8px 20px;
    font-family: var(--display); font-weight: 700;
    font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-finish-act {
    width: 100%; margin-top: 6px;
    background: linear-gradient(180deg, var(--hull-warn) 0%, #b87d1f 100%);
    border: 1px solid var(--hull-warn);
    color: #1a1108;
    padding: 10px 20px;
    font-family: var(--display); font-weight: 700;
    font-size: 13px; letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-finish-act:hover { filter: brightness(1.12); }
  .btn-finish-act:active { transform: scale(0.99); }
  .am-line { font-size: 12px; margin: 6px 0; line-height: 1.4; }
  .am-shot { font-size: 10px; color: var(--text-dim); margin: 3px 0; padding-left: 6px; border-left: 2px solid var(--hull-crit); }
  .am-step-head { font-family: var(--display); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hull-crit); margin-bottom: 6px; }
  .am-toggle { display: block; font-size: 11px; margin: 4px 0; cursor: pointer; }
  .am-dice { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin: 6px 0; font-size: 13px; }
  .am-die {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 4px; font-family: var(--mono);
    font-weight: 700; font-size: 12px; border: 1px solid var(--border-bright);
    background: var(--bg-card); color: var(--text-mute);
  }
  .am-die.hit { background: rgba(74,214,255,0.18); border-color: var(--ucm); color: var(--ucm); }
  .am-die.crit { background: rgba(255,181,71,0.22); border-color: var(--hull-warn); color: var(--hull-warn); }
  .am-die.miss { opacity: 0.5; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary.shal {
    background: linear-gradient(180deg, var(--shal) 0%, var(--shal-dim) 100%);
    border-color: var(--shal); color: #1a1108;
  }
  .scen-extra-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(255,181,71,0.05);
    border-left: 2px solid var(--hull-warn);
    color: var(--hull-warn);
    font-size: 10px;
    border-radius: 0 2px 2px 0;
  }

  /* ============== DEPLOY HINT BAR ============== */
  .deploy-hint {
    position: absolute; bottom: 12px;
    left: 50%; transform: translateX(-50%);
    background: rgba(8,16,15,0.92);
    border: 1px solid var(--border-bright);
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-align: center;
    backdrop-filter: blur(4px);
    z-index: 10;
    display: flex; align-items: center; gap: 12px;
  }
  .deploy-hint b { color: var(--text); }

  /* ============== SCENARIO MINI-BANNER (PLAY phase) ============== */
  .scen-banner {
    position: absolute; top: 8px; right: 8px;
    background: rgba(8,16,15,0.78);
    border: 1px solid var(--border);
    padding: 5px 9px;
    border-radius: 2px;
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    backdrop-filter: blur(4px);
    max-width: 240px;
    line-height: 1.5;
  }
  .scen-banner b { color: var(--text); }
  .scen-banner .scen-title-mini {
    font-family: var(--display); font-size: 11px;
    color: var(--ucm); letter-spacing: 0.14em;
    text-transform: uppercase;
    display: block; margin-bottom: 2px;
  }

  /* ============== SIDE PANELS ============== */
  .panel {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  .panel.right {
    border-right: none; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; padding: 0;
  }
  .panel.right #detail-panel {
    flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 8px 0;
  }
  #event-log-dock {
    flex: 0 0 auto;
    border-top: 1px solid var(--border-bright);
    background: rgba(8,12,11,0.6);
  }
  .panel-section {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--display);
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-dim); font-weight: 600;
    text-transform: uppercase;
    margin: 0 0 8px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title .count {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-mute);
  }
  .panel-title.ucm { color: var(--ucm); }
  .panel-title.shal { color: var(--shal); }

  /* Group cards in the side panels */
  .ap-chip {
    display: flex; align-items: center; gap: 6px;
    width: calc(100% - 16px);
    margin: 0 8px 8px 8px;
    padding: 6px 10px;
    background: rgba(10,14,13,0.6);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.1s;
  }
  .ap-chip:hover { border-color: var(--text); background: var(--bg-card-2); }
  .group-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 7px 9px;
    margin: 0 8px 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }
  .group-card.ucm { border-left-color: var(--ucm-dim); }
  .group-card.shal { border-left-color: var(--shal-dim); }
  .group-card:hover { background: var(--bg-card-2); }
  .group-card.active { background: #1f2d35; }
  .group-card.active.ucm { border-left-color: var(--ucm); box-shadow: inset 4px 0 12px -8px var(--ucm-glow); }
  .group-card.active.shal { border-left-color: var(--shal); box-shadow: inset 4px 0 12px -8px var(--shal-glow); }
  .group-card.activated { opacity: 0.5; }
  .group-card.off-turn { opacity: 0.4; }
  .group-card.off-turn::after { content: 'WAIT'; position: absolute; top: 4px; right: 6px; font-size: 7px; letter-spacing: 1px; color: var(--text-mute); font-family: var(--mono); }
  .group-card.activation-locked { opacity: 0.35; pointer-events: none; }

function renderEventLog() {
  const dock = document.getElementById('event-log-dock');
  if (!dock) return;
  if (state.phase !== 'play') { dock.innerHTML = ''; dock.style.display = 'none'; return; }
  dock.style.display = '';
  const log = state.eventLog || [];
  const expanded = !!state.logExpanded;
  const shown = expanded ? log.slice().reverse() : log.slice(-3).reverse();
  const rows = shown.length
    ? shown.map(e => `<div style="padding:3px 11px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:7px;font-size:9.5px;font-family:var(--mono);">
        <span style="color:var(--text-mute);flex-shrink:0;">R${e.round}</span>
        <span style="color:var(--text-dim);">${e.text}</span></div>`).join('')
    : `<div style="padding:6px 11px;color:var(--text-mute);font-size:9.5px;font-family:var(--mono);">No events yet.</div>`;
  dock.innerHTML = `
    <button id="event-log-toggle" style="display:flex;align-items:center;gap:6px;width:100%;text-align:left;
      background:rgba(255,255,255,0.03);border:none;border-bottom:1px solid var(--border);padding:6px 11px;cursor:pointer;font-family:var(--mono);">
      <span style="font-size:8px;letter-spacing:0.14em;color:var(--text-mute);">EVENT LOG</span>
      <span style="color:var(--text-mute);font-size:8px;">${log.length}</span>
      <span style="margin-left:auto;color:var(--text-mute);font-size:10px;">${expanded ? '▾ collapse' : '▴ expand'}</span>
    </button>
    <div id="event-log-body" style="${expanded ? 'max-height:240px;' : 'max-height:none;'}overflow-y:auto;">${rows}</div>`;
  const toggle = dock.querySelector('#event-log-toggle');
  if (toggle) toggle.addEventListener('click', () => { state.logExpanded = !state.logExpanded; renderEventLog(); });
  const body = dock.querySelector('#event-log-body');
  if (expanded && body) body.scrollTop = 0;
}

/* Transient VP-award toast, stacked at top-centre of the board. */
function notifyVP(side, vp, reason) {
  const board = document.querySelector('.board-wrap');
  if (!board) return;
  let tray = document.getElementById('vp-toasts');
  if (!tray) {
    tray = document.createElement('div');
    tray.id = 'vp-toasts';
    tray.style.cssText = 'position:absolute;top:46px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;';
    board.appendChild(tray);
  }
  const t = document.createElement('div');
  t.style.cssText = `background:rgba(10,14,13,0.94);border:1px solid var(--${side});border-left:4px solid var(--${side});border-radius:5px;padding:7px 13px;font-family:var(--mono);font-size:11px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.5);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;`;
  t.innerHTML = `<b style="color:var(--${side})">${factionName(side)}</b> <b style="color:${vp>=0?'var(--hull-good,#6ec97a)':'var(--hull-crit)'}">${vp>=0?'+':''}${vp} VP</b> <span style="color:var(--text-mute)">· ${reason}</span>`;
  tray.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateY(0)'; });
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-6px)'; setTimeout(() => t.remove(), 250); }, 3400);
}

function renderDropsite(d) {
  const cx = inchToPx(d.x), cy = inchToPx(d.y);
  const base = d.base;
  const isStation = base.category === 'station';
  const stationDiaIn = { small: 30/25.4, medium: 40/25.4, large: 50/25.4 };
  const citySizeMap  = { small: INCH * 1.0, medium: INCH * 1.25, large: INCH * 1.5 };
  const r = isStation
    ? (stationDiaIn[base.size] * INCH) / 2
    : citySizeMap[base.size];
  const ringCol = isStation ? '#a8b4bc' : '#7ec8ff';
  const fillCol = isStation ? 'rgba(168,180,188,0.10)' : 'rgba(126,200,255,0.10)';
  let html = `<g class="dropsite" data-dropsite="${d.id}" style="cursor:pointer;">`;
  if (isStation) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
  } else {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.6}" fill="none" stroke="${ringCol}" stroke-width="0.6" opacity="0.6"/>`;
  }
  if (state.selectedDropsiteId === d.id) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r + 4}" fill="none"
              stroke="${ringCol}" stroke-width="1.4" stroke-dasharray="3 2"/>`;
  }
  const sizeLetter = base.size === 'small' ? 'S' : base.size === 'medium' ? 'M' : 'L';
  html += `<text x="${cx}" y="${cy + 1}" font-family="var(--display)" font-size="${r * 0.7}"
            font-weight="700" fill="${ringCol}" text-anchor="middle" dominant-baseline="middle"
            pointer-events="none">${sizeLetter}</text>`;
  if (d.surveyedBy && d.surveyedBy.length) {
    d.surveyedBy.forEach((sd, i) => {
      html += `<text x="${cx - 6 + i*12}" y="${cy - r - 4}" font-size="9" fill="var(--${sd})" text-anchor="middle" pointer-events="none">⌖</text>`;
    });
  }
  if (d.reconOps > 0) {
    html += `<text x="${cx}" y="${cy + r + 11}" font-size="9" fill="#b59ad6" text-anchor="middle" pointer-events="none">⬆${d.reconOps}</text>`;
  }
  if (state.secondaryNominations) {
    ['ucm','shal'].forEach((sd, idx) => {
      const noms = state.secondaryNominations[sd] || {};
      const targetsThis = Object.keys(noms).some(k => noms[k] && noms[k].dsId === d.id);
      if (targetsThis) html += `<text x="${cx - 5 + idx*10}" y="${cy - r - 13}" font-size="9" fill="var(--${sd})" text-anchor="middle" pointer-events="none">★</text>`;
    });
  }
  if (state.protectNom) {
    ['ucm','shal'].forEach((sd, idx) => {
      if (state.protectNom[sd] === d.id) html += `<text x="${cx - 5 + idx*10}" y="${cy + r + 22}" font-size="10" fill="var(--${sd})" text-anchor="middle" pointer-events="none">🛡</text>`;
    });
  }
  const daActive = state.dropsiteActivation && state.dropsiteActivation.dsId === d.id && !state.launching && !state.featureAttack;
  if (d.features && d.features.length) {
    d.features.forEach((fkey, fi) => {
      const f = FEATURES[fkey];
      const angle = (Math.PI * 2 / d.features.length) * fi - Math.PI / 2;
      const fr = r + 8;
      const fx = cx + Math.cos(angle) * fr;
      const fy = cy + Math.sin(angle) * fr;
      const fcol = f.color || ringCol;
      const dead = (d.destroyedFeatures || []).includes(fi);
      const usable = daActive && !dead && (f.weapon || (f.launch && f.launch.length));
      const fired = f.weapon && (d.firedFeatures || []).includes(fi);
      if (usable) {
        html += `<circle data-da-feat="${d.id}|${fi}" cx="${fx}" cy="${fy}" r="9"
          fill="rgba(255,255,255,0.04)" stroke="${fired?'var(--text-mute)':fcol}" stroke-width="1"
          stroke-dasharray="${fired?'2 2':'none'}" style="cursor:pointer;${fired?'opacity:0.5;':''}"/>`;
        html += `<text x="${fx + 7}" y="${fy - 6}" font-size="7" fill="${f.weapon?'var(--hull-crit)':fcol}" text-anchor="middle" pointer-events="none">${f.weapon?(fired?'✓':'⚔'):'⊕'}</text>`;
      }
      html += `<text x="${fx}" y="${fy + 1}" font-family="var(--mono)" font-size="9" font-weight="700"
                fill="${dead?'var(--text-mute)':fcol}" text-anchor="middle" dominant-baseline="middle"
                pointer-events="none" ${dead?'opacity="0.4"':''}>${f.glyph}</text>`;
    });
  }
  if (d.damage > 0 && d.damage < d.maxHull) {
    const pct = (d.maxHull - d.damage) / d.maxHull;
    const barCol = pct <= 0.5 ? 'var(--hull-warn)' : 'var(--hull-good)';
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2}" height="2" fill="var(--bg)" opacity="0.6"/>`;
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2*pct}" height="2" fill="${barCol}"/>`;
  }
  html += `</g>`;
  return html;
}

function renderStaticScenery() {
  if (!state.scenarioData) return '';
  let html = '';
  (state.scenarioData.rings || []).forEach(ring => {
    if (ring.axis === 'horizontal') {
      const y = inchToPx(ring.y);
      html += `<line x1="0" y1="${y}" x2="${BOARD_PX}" y2="${y}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="6" y="${y - 3}" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    } else {
      const x = inchToPx(ring.x);
      html += `<line x1="${x}" y1="0" x2="${x}" y2="${BOARD_PX}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="${x + 4}" y="14" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    }
  });
  (state.scenarioData.largeObjects || []).forEach(obj => {
    const cx = inchToPx(obj.x), cy = inchToPx(obj.y), r = inchToPx(obj.diameter / 2);
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#4a5560"
              stroke="#7a8a94" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.4}" fill="#5a6670"/>`;
  });
  const sceneryPiece = (s, ghost) => {
    const cx = inchToPx(s.x), cy = inchToPx(s.y);
    const w = inchToPx(6), h = inchToPx(3);
    const angle = s.angle || 0;
    const isMicro = s.type === 'micrometeor';
    const fill = isMicro ? 'rgba(120,180,230,0.16)' : 'rgba(225,120,90,0.16)';
    const stroke = isMicro ? 'rgba(150,200,240,0.8)' : 'rgba(235,140,100,0.85)';
    const op = ghost ? 0.5 : 1;
    const label = isMicro ? 'MICROMETEOR' : 'DENSE FIELD';
    let g = `<g transform="translate(${cx},${cy}) rotate(${angle})" opacity="${op}" ${ghost?'pointer-events="none"':`data-scenery-idx="${s._idx}" style="cursor:pointer;"`}>
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="${h*0.4}"
        fill="${fill}" stroke="${stroke}" stroke-width="1.2" stroke-dasharray="${isMicro?'':'4 3'}"/>`;
    for (let i = 0; i < 7; i++) {
      const dx = (Math.sin(i*2.3)*0.42)*w, dy = (Math.cos(i*1.7)*0.34)*h;
      g += `<circle cx="${dx}" cy="${dy}" r="${isMicro?1.5:2}" fill="${stroke}" opacity="0.5"/>`;
    }
    g += `<text x="0" y="${-h/2 - 3}" font-family="var(--mono)" font-size="6.5" font-weight="700"
            fill="${stroke}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke">${label}</text>`;
    g += `</g>`;
    return g;
  };
  (state.scenarioData.placedScenery || []).forEach((s, i) => {
    html += sceneryPiece(Object.assign({ _idx: i }, s), false);
  });
  if (state.phase === 'scenery' && state.sceneryPlace) {
    const sp = state.sceneryPlace;
    if (sp.pending) {
      html += sceneryPiece({ type: sp.type, x: sp.pending.x / INCH, y: sp.pending.y / INCH, angle: sp.angle || 0 }, true);
      const cx = sp.pending.x, cy = sp.pending.y;
      const v = headingVec(sp.angle || 0);
      html += `<line x1="${cx}" y1="${cy}" x2="${cx + v.x*inchToPx(5)}" y2="${cy + v.y*inchToPx(5)}" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="3 3"/>`;
    } else if (state.hoverPoint) {
      const v = sceneryValid(sp.type, state.hoverPoint.x / INCH, state.hoverPoint.y / INCH);
      const piece = sceneryPiece({ type: sp.type, x: state.hoverPoint.x / INCH, y: state.hoverPoint.y / INCH, angle: 0 }, true);
      html += v.ok ? piece : piece.replace('opacity="0.5"', 'opacity="0.35"') +
        `<circle cx="${state.hoverPoint.x}" cy="${state.hoverPoint.y}" r="5" fill="none" stroke="var(--hull-crit)" stroke-width="1.5"/>`;
    }
  }
  return html;
}

/* Render deployment zones on the board (always-on after setup) */
function renderDeploymentZones() {
  if (!state.scenario) return '';
  const dep = DEPLOYMENTS[state.scenario.deployment];
  let html = `<g class="deploy-zones">`;
  html += renderZone(dep.zones.blue, 'rgba(212,166,71,0.10)', 'rgba(212,166,71,0.55)');
  html += renderZone(dep.zones.red,  'rgba(74,214,255,0.10)', 'rgba(74,214,255,0.55)');
  html += `</g>`;
  return html;
}

function renderAssetPhase() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('asset-overlay');
  if (overlay) overlay.remove();
  let banner = document.getElementById('asset-move-banner');
  if (banner) banner.remove();
  if (!state.assetPhase) return;

  const ap = state.assetPhase;
  const sideName = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();

  if (ap.step === 'assets') {
    banner = document.createElement('div');
    banner.id = 'asset-move-banner';
    banner.className = 'deploy-hint';
    const typeLabel = { fighter: 'Fighters', bomber: 'Bombers & Fire Ships', torpedo: 'Torpedoes' }[ap.assetType] || 'Assets';
    let msg, footer;
    if (!state.assetActiveSide) {
      msg = `<span><b>Asset Combat complete</b> — all Fighters, Bombers and Torpedoes have activated.</span>`;
      footer = `<button class="btn-primary" id="asset-move-done" style="padding:5px 14px;font-size:11px;">DONE →</button>`;
    } else if (state.assetMove) {
      const a = state.launchedAssets.find(x => x.id === state.assetMove.id);
      const thr = a ? (a.t2t && a._t2tRange ? a._t2tRange : assetThrust(a)) : 0;
      let hint;
      if (a && !a.moved) {
        if (a.kind === 'fighter') hint = `click a destination ≤<b>${thr}"</b> · move onto an enemy Wing to dogfight`;
        else if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') hint = `click a destination ≤<b>${thr}"</b> · click an enemy ship to fly in & lock it`;
        else hint = `click a destination ≤<b>${thr}"</b>`;
      } else hint = 'use the right panel';
      msg = `<span><b style="color:var(--${a?a.side:'ucm'})">${a?a.kind:''}</b> selected — ${hint} →</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} (${sideName(state.assetActiveSide)}) →</button>`;
    } else {
      msg = `<span><b style="color:var(--${state.assetActiveSide})">${sideName(state.assetActiveSide)}</b> activates <b>${typeLabel}</b> · click one on the board to move it.</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} (${sideName(state.assetActiveSide)}) →</button>`;
    }
    banner.innerHTML = `${msg}${footer}`;
    board.appendChild(banner);
    const fb = banner.querySelector('#asset-finish-stage');
    if (fb) fb.addEventListener('click', () => {
      const side = state.assetActiveSide, type = ap.assetType;
      (state.launchedAssets || []).forEach(a => { if (a.side === side && kindsForAssetType(type).includes(a.kind)) a.moved = true; });
      state.assetMove = null;
      const cur = { type, side };
      const res = advanceAssetStage(cur);
      if (res.resolveAttacksFor) resolvePendingBomberAttacks(res.resolveAttacksFor, res.resolveType);
      renderAll();
    });
    const db = banner.querySelector('#asset-move-done');
    if (db) db.addEventListener('click', () => {
      if (anyPendingBomberAttacks()) { state.assetMove = null; resolvePendingBomberAttacks(); renderAll(); return; }
      state.assetMove = null;
      state.assetPhase = { resolved: true, log: ap.log, step: 'battalion_done' };
      renderAll();
    });
    return;
  }

  const bc = state.battalionCombat;
  const initSide = state.initiativeHolder || 'ucm';
  const otherSide = initSide === 'ucm' ? 'shal' : 'ucm';

  const battSummaryFor = (hlId) => {
    let h = '';
    if (state.scenarioData && state.scenarioData.dropsites) {
      state.scenarioData.dropsites.forEach(ds => {
        const b = dsBattalions(ds);
        const rows = Object.keys(b).filter(k => (b[k].ucm||0)+(b[k].shal||0) > 0);
        if (!rows.length) return;
        const hl = ds.id === hlId ? ' style="outline:1px solid var(--ucm);border-radius:3px;padding:3px;"' : '';
        h += `<div class="ap-ds"${hl}><div class="ap-ds-name">${ds.base.name}${dropsiteContested(ds)?' <span style="color:var(--hull-warn);font-size:8px;">CONTESTED</span>':''}</div>`;
        rows.forEach(k => {
          const loc = b[k];
          h += `<div class="ap-loc"><span>${locDisplayName(ds, k)}</span>
            <span><b style="color:var(--ucm)">${loc.ucm||0}</b> · <b style="color:var(--shal)">${loc.shal||0}</b></span></div>`;
        });
        h += `</div>`;
      });
    }
    return h || `<div style="color:var(--text-mute);font-style:italic;font-size:10px;">No battalions on any dropsite.</div>`;
  };

  if (bc) {
    const ds = bc.dsId ? state.scenarioData.dropsites.find(d => d.id === bc.dsId) : null;
    let bodyHTML = '', footerHTML = '';
    const logHTML = (bc.log && bc.log.length)
      ? `<div class="ap-section"><div class="ap-log" style="color:var(--text-dim)">${bc.log.slice(-5).join('<br>')}</div></div>` : '';

    if (bc.stage === 'pick') {
      const contested = contestedDropsites();
      if (!contested.length) {
        bodyHTML = `<div class="ap-section"><div class="ap-log" style="color:var(--text-mute)">No more contested dropsites — Battalion Combat complete.</div></div>`;
        footerHTML = `<button class="btn-primary" id="bc-to-destroy">CONTINUE →</button>`;
      } else {
        bodyHTML = `<div class="ap-section"><div class="ap-title">${sideName(initSide)} (1st initiative) — pick a contested dropsite</div>` +
          contested.map(d => `<button class="btn" data-bc-pick="${d.id}" style="width:100%;margin-bottom:3px;">
            ${d.base.name} <span style="color:var(--text-mute)">(${sideName('ucm')} ${dsSideBattalions(d,'ucm')} · ${sideName('shal')} ${dsSideBattalions(d,'shal')})</span></button>`).join('') +
          `</div>`;
        footerHTML = `<button class="btn" id="bc-to-destroy">SKIP REMAINING →</button>`;
      }
    } else if (bc.stage === 'init' || bc.stage === 'other') {
      const actor = bc.stage === 'init' ? initSide : otherSide;
      const enemy = actor === 'ucm' ? 'shal' : 'ucm';
      const feats = enemyFeatures(ds, actor);
      const myGround = dsBattalions(ds).ground[actor] || 0;
      bodyHTML = `<div class="ap-section">
        <div class="ap-title">${ds.base.name} — ${sideName(actor)} assigns ground battalions</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">
          ${sideName(actor)} has <b style="color:var(--${actor})">${myGround}</b> battalion${myGround!==1?'s':''} on the dropsite ground.
          ${(myGround>0 && feats.length) ? 'Pick one enemy-held Feature to attack (1-for-1), or skip.' : (myGround<=0 ? 'No ground battalions to assign.' : 'No enemy-held Features.')}
        </div>`;
      if (myGround > 0 && feats.length) {
        bodyHTML += feats.map(fk => `<button class="btn" data-bc-feat="${fk}" style="width:100%;margin-bottom:3px;">
          Attack ${locDisplayName(ds, fk)} <span style="color:var(--text-mute)">(enemy ${dsBattalions(ds)[fk][enemy]})</span></button>`).join('');
      }
      bodyHTML += `</div>`;
      footerHTML = `<button class="btn-primary" id="bc-skip-assign">${bc.stage === 'init' ? 'NEXT PLAYER →' : 'RESOLVE DROPSITE →'}</button>`;
    } else if (bc.stage === 'destroy') {
      const destroyOpts = featureDestroyOptions();
      bodyHTML = `<div class="ap-section">
        <div class="ap-title">Destroy Features <span style="color:var(--text-mute);font-weight:400;font-size:8.5px;">(4+ battalions, no enemy)</span></div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">${destroyOpts.length ? 'Optional — remove all those battalions to destroy the Feature.' : 'No eligible Features.'}</div>`;
      bodyHTML += destroyOpts.map(o => `<button class="btn" data-destroy-feature="${o.dsId}|${o.key}" style="width:100%;margin-bottom:3px;">
        Destroy ${o.name} <span style="color:var(--${o.side})">(${sideName(o.side)})</span></button>`).join('');
      bodyHTML += `</div>`;
      footerHTML = `<button class="btn-primary" id="bc-finish">FINISH COMBAT →</button>`;
    }

    overlay = document.createElement('div');
    overlay.id = 'asset-overlay';
    overlay.className = 'setup-overlay';
    overlay.innerHTML = `
      <div class="setup-card" style="max-width:440px;">
        <div class="setup-header">
          <h2 class="setup-title">BATTALION COMBAT</h2>
          <div class="setup-sub">Round ${state.round} · ${sideName(initSide)} has initiative</div>
        </div>
        <div class="setup-body">
          ${bodyHTML}
          ${logHTML}
          <div class="ap-section"><div class="ap-title">Battalions <span style="color:var(--text-mute);font-weight:400;">(${sideName('ucm')} · ${sideName('shal')})</span></div>${battSummaryFor(bc.dsId)}</div>
        </div>
        <div class="setup-footer">${footerHTML}</div>
      </div>
    `;
    board.appendChild(overlay);
    return;
  }

  overlay = document.createElement('div');
  overlay.id = 'asset-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:440px;">
      <div class="setup-header">
        <h2 class="setup-title">ASSET PHASE</h2>
        <div class="setup-sub">Round ${state.round} · ${sideName(initSide)} has initiative</div>
      </div>
      <div class="setup-body">
        <div class="ap-section">
          <div class="ap-title">Battalions <span style="color:var(--text-mute);font-weight:400;">(${sideName('ucm')} · ${sideName('shal')})</span></div>
          ${battSummaryFor(null)}
        </div>
        ${ap.resolved ? `<div class="ap-section"><div class="ap-log" style="color:var(--hull-good)">Battalion Combat resolved.</div></div>` : ''}
        ${ap.boardingResolved ? `<div class="ap-section"><div class="ap-log" style="color:var(--hull-good)">Boarding Actions resolved.${ap.boardingLog&&ap.boardingLog.length?'<br>'+ap.boardingLog.join('<br>'):''}</div></div>` : ''}
        <div class="scen-extra-note" style="font-size:9.5px;">
          <b>Sequence:</b> Battalion Combat → Boarding Actions → Asset Combat. Boarding Actions are resolved manually; Battalion Combat & Asset movement are guided.
        </div>
      </div>
      <div class="setup-footer">
        ${!ap.resolved ? `<button class="btn-primary" id="asset-start-battalions">BATTALION COMBAT →</button>` : ''}
        ${ap.resolved && !ap.boardingResolved && anyShipBattalions() ? `<button class="btn-primary" id="asset-boarding">BOARDING ACTIONS →</button>` : ''}
        ${ap.resolved && (ap.boardingResolved || !anyShipBattalions()) ? `<button class="btn-primary" id="asset-move-assets">MOVE LAUNCH ASSETS →</button>` : ''}
        <button class="btn" id="asset-advance-round">${state.round >= 6 ? 'END GAME → R1' : 'NEXT ROUND →'}</button>
      </div>
    </div>
  `;
  board.appendChild(overlay);
}

/* ==========================================================================
   RENDERING — SIDE PANELS
   ========================================================================== */
function renderPanels() {
  // Hide both side panels during Setup (the scenario overlay is the focus). Collapse
  // their grid columns via a class so the board stays centred and full-width; show them
  // for every other phase.
  const app = document.querySelector('.app');
  if (app) app.classList.toggle('panels-hidden', state.phase === 'setup');

  const ucmDiv = document.getElementById('ucm-groups');
  const shalDiv = document.getElementById('shal-groups');
  ucmDiv.innerHTML = '';
  shalDiv.innerHTML = '';

  // During SETUP, fleets/sides aren't finalised yet (sides randomise at commit),
  // so the ship list is empty until the scenario is confirmed.
  if (state.phase === 'setup') {
    const ucmTitleEl = document.getElementById('ucm-title');
    const shalTitleEl = document.getElementById('shal-title');
    if (ucmTitleEl) ucmTitleEl.childNodes[0].nodeValue = 'FLEET ';
    if (shalTitleEl) shalTitleEl.childNodes[0].nodeValue = 'FLEET ';
    const c1 = document.getElementById('ucm-count'); if (c1) c1.textContent = '';
    const c2 = document.getElementById('shal-count'); if (c2) c2.textContent = '';
    const bRed = document.getElementById('brand-red'); if (bRed) bRed.textContent = 'DFC';
    const bBlue = document.getElementById('brand-blue'); if (bBlue) bBlue.textContent = 'BATTLEMAT';
    return;
  }

  let ucmPts = 0, shalPts = 0;
  const rf = redFleet(), bf = blueFleet();
  const renderSide = (fleet, container, side) => {
    let pts = 0, grpCount = 0;
    // Non-payload groups render as normal individual cards.
    fleet.filter(def => !def.payload).forEach(def => {
      pts += def.pts;
      grpCount++;
      container.appendChild(makeGroupCard(def));
    });
    // Payload (Bioficer Cell) groups: collapse into ONE "Cells" card, and only
    // show it once at least one Cell has been detached onto the table. Attached
    // (riding) Cells stay hidden until deployed from their Porter.
    const payloadDefs = fleet.filter(def => def.payload);
    if (payloadDefs.length) {
      payloadDefs.forEach(def => { pts += def.pts; });
      const anyDetached = payloadDefs.some(def => {
        const g = state.groups[def.id];
        return g && g.ships.some(s => !s.destroyed && !s.offTable && !s.attachedTo);
      });
      if (anyDetached) {
        grpCount++;
        container.appendChild(makeCellsCard(side, payloadDefs));
      }
    }
    return { pts, grpCount };
  };
  const rStat = renderSide(rf, ucmDiv, 'ucm');
  const bStat = renderSide(bf, shalDiv, 'shal');
  // AP chip at the top of each fleet list (play phase) — click to adjust that side's AP.
  if (state.phase === 'play' && state.planning) {
    const P = state.planning;
    const apChip = (side, container) => {
      const chip = document.createElement('button');
      chip.className = 'ap-chip';
      chip.dataset.apOpen = side;
      chip.title = 'Ability Points — click to adjust';
      chip.innerHTML = `<span style="font-size:8px;letter-spacing:0.12em;color:var(--text-mute);">AP</span>
        <b style="color:var(--${side});font-size:15px;">${P.ap[side]}</b>
        ${P.passTokens[side] ? `<span style="font-size:8px;color:var(--text-mute);">· ${P.passTokens[side]} PASS</span>` : ''}
        <span style="font-size:9px;color:var(--text-mute);margin-left:auto;">⊕</span>`;
      chip.addEventListener('click', () => { state.apEditOpen = side; renderAll(); });
      container.insertBefore(chip, container.firstChild);
    };
    apChip('ucm', ucmDiv);
    apChip('shal', shalDiv);
  }
  ucmPts = rStat.pts; shalPts = bStat.pts;
  const redName = factionName('ucm');
  const blueName = factionName('shal');
  document.getElementById('ucm-count').textContent = `${rStat.grpCount} GRPS · ${ucmPts} PTS`;
  document.getElementById('shal-count').textContent = `${bStat.grpCount} GRPS · ${shalPts} PTS`;
  // Faction names in the panel titles + topbar brand.
  const ucmTitle = document.getElementById('ucm-title');
  const shalTitle = document.getElementById('shal-title');
  if (ucmTitle) ucmTitle.childNodes[0].nodeValue = redName.toUpperCase() + ' ';
  if (shalTitle) shalTitle.childNodes[0].nodeValue = blueName.toUpperCase() + ' ';
  const bRed = document.getElementById('brand-red'); if (bRed) bRed.textContent = redName.toUpperCase();
  const bBlue = document.getElementById('brand-blue'); if (bBlue) bBlue.textContent = blueName.toUpperCase();
}

function makeGroupCard(def) {
  const grp = getGroup(def.id);
  const card = document.createElement('div');
  card.className = `group-card ${def.side}`;
  if (state.selectedGroupId === def.id) card.classList.add('active');
  if (grp.activated) card.classList.add('activated');
  // Alternating activation: dim the faction that isn't up this round.
  if (state.phase === 'play' && state.activeSide && def.side !== state.activeSide && !grp.activated) {
    card.classList.add('off-turn');
  }
  // Activation lock: once a group on this side has started activating (order set or
  // acted), all OTHER same-side groups are locked until FINISH ACTIVATION is pressed.
  const activatingGid = state.phase === 'play' ? activeGroupIdForSide(def.side) : null;
  if (activatingGid && activatingGid !== def.id && !grp.activated) {
    card.classList.add('activation-locked');
  }
  card.dataset.gid = def.id;

  const alive = grp.ships.filter(s => !s.destroyed).length;
  const total = grp.ships.length;
  const onTable = grp.ships.filter(s => !s.destroyed && !s.offTable).length;
  const undeployedCount = alive - onTable;
  // Payload ships still riding inside a Porter (not yet detached).
  const attachedCount = def.payload ? grp.ships.filter(s => !s.destroyed && s.attachedTo).length : 0;
  const sideApproach = state.scenario ? approachFor(def.side) : null;
  const isDirect = sideApproach === 'directly_deploy';
  const deployable = state.scenario ? canDeployNow(def) : false;
  // A non-Vanguard Group on a Close/Distant side waits for off-table activation.
  const isReserve = state.scenario && !deployable;

  // Play-phase activation eligibility (for undeployed Groups in play)
  let playBadgeHTML = '';
  if (state.phase === 'play' && undeployedCount > 0) {
    const elig = canActivateOffTable(def);
    if (elig.eligible) {
      // Eligible to deploy + activate this round — green/amber call to action.
      const label = undeployedCount === total ? 'DEPLOY NOW' : `${undeployedCount} TO PLACE`;
      playBadgeHTML = `<span class="gc-badge ready">${label}</span>`;
    } else {
      // Not yet eligible — show round when available.
      // Extract round number from the reason if present, else show generic.
      const m = elig.reason && elig.reason.match(/Round (\d)/);
      const lbl = m ? `AVAIL R${m[1]}` : 'OFF-TABLE';
      playBadgeHTML = `<span class="gc-badge undeployed">${lbl}</span>`;
    }
  }

  // Badge logic:
  //  - VANGUARD-X" if the Group has Vanguard (always)
  //  - In setup/deploy phase: DIRECT/RESERVE + UNDEPLOYED count
  //  - In play phase: round-aware DEPLOY-NOW / AVAIL-RX badge
  const inNetwork = def.openNetwork && grp.ships.some(s => shipInNetwork(def, s));
  const displayName = inNetwork ? 'Voidgate Network' : def.name;
  card.innerHTML = `
    <div class="gc-name">${displayName}</div>
    <div class="gc-role">${inNetwork ? 'Open Network · ' + def.pts + 'pts' : def.role + ' · ' + def.tonnage + ' · ' + def.pts + 'pts'}</div>
    <div class="gc-badges">
      ${def.vanguard && state.phase !== 'play' ? `<span class="gc-badge vanguard">VANGUARD-${def.vanguard}"</span>` : ''}
      ${state.phase !== 'play' && isDirect ? `<span class="gc-badge direct">DIRECT</span>` : ''}
      ${state.phase !== 'play' && isReserve ? `<span class="gc-badge reserve">RESERVE · ${sideApproach === 'close' ? 'CLOSE' : 'DISTANT'}</span>` : ''}
      ${state.phase === 'deploy' && deployable && undeployedCount > 0 && !deploySideAllowed(def.side) ? `<span class="gc-badge reserve">WAIT · RED FIRST</span>` : (state.phase === 'deploy' && deployable && undeployedCount > 0 ? `<span class="gc-badge undeployed">${undeployedCount === total ? 'UNDEPLOYED' : undeployedCount + ' OFF-TABLE'}</span>` : '')}
      ${playBadgeHTML}
      ${attachedCount > 0 ? `<span class="gc-badge reserve">${attachedCount} ATTACHED</span>` : ''}
    </div>
    <div class="gc-stats">
      <span><b>T</b>${def.thrust}"</span>
      <span><b>SC</b>${def.scan}"</span>
      <span><b>SIG</b>${(() => {
        const sil = grp.ships.some(s => !s.destroyed && s.sigSilent);
        const spk = grp.spikes || 0;
        const eff = (sil ? 0 : def.sig) + 3 * spk;
        return sil ? `<span style="color:var(--ucm)">${eff}"</span>` : eff + '"';
      })()}</span>
      <span><b>HP</b>${alive}/${total} ship${total>1?'s':''}</span>
      ${grp.order ? `<span style="color:var(--${def.side === 'ucm' ? 'ucm' : 'shal'})">${grp.order}</span>` : ''}
      ${grp.spikes > 0 ? `<span style="color:var(--hull-warn)">SPK ${grp.spikes}</span>` : ''}
    </div>
  `;
  card.addEventListener('click', () => {
    // In online mode only interact with your own side's groups.
    if (!netIsMySide(def.side)) return;
    selectGroup(def.id);
  });
  return card;
}

/* Combined "Cells" card for Bioficer Payload groups. Represents all detached
   Cells (which from R2 count as a single Group). Clicking selects the first
   detached Cell's group so its detail/orders show. */
function makeCellsCard(side, payloadDefs) {
  const card = document.createElement('div');
  card.className = `group-card ${side}`;
  // Collect ONLY detached (deployed, on-table) cells. Attached cells are not
  // shown here — they activate as part of their Porter's activation.
  const detached = [];
  payloadDefs.forEach(def => {
    const g = state.groups[def.id];
    if (!g) return;
    g.ships.forEach((s, si) => { if (!s.destroyed && !s.offTable && !s.attachedTo) detached.push({ def, si, ship: s }); });
  });
  const first = detached.length ? detached[0] : null;
  if (first && state.selectedGroupId === first.def.id) card.classList.add('active');
  // Points reflect only the deployed cells.
  const deployedPts = detached.reduce((a, d) => a + d.def.pts, 0);
  card.innerHTML = `
    <div class="gc-name">Cells</div>
    <div class="gc-role">Detached Payload Group · ${deployedPts}pts</div>
    <div class="gc-badges">
      <span class="gc-badge reserve">${detached.length} DEPLOYED</span>
      ${state.round >= 2 ? `<span class="gc-badge vanguard">SINGLE GROUP</span>` : ''}
    </div>
    <div class="gc-stats">
      <span><b>FOLLOW</b> GQ</span>
      <span style="color:var(--text-mute)">ignore coherency</span>
    </div>
  `;
  if (first) {
    card.addEventListener('click', () => {
      selectGroup(first.def.id);
      state.selectedShipIdx = first.si; // target a real on-table cell
      renderAll();
    });
  }
  return card;
}

function selectGroup(gid) {
  if (state.selectedGroupId === gid) {
    state.selectedGroupId = null;
    state.selectedShipIdx = null;
  } else {
    state.selectedGroupId = gid;
    state.selectedShipIdx = null;
  }
  state.selectedDropsiteId = null;
  state.hoverPoint = null;
  state.layerToggle = false;
  state.launching = null;
  renderAll();
}

function turnLimitText(o) {
