/* Modal to choose WHERE to land launched Battalions: on the Dropsite itself, or on
   one of its Features. Appears once a Dropship/Bulk Lander/Drop Pod has targeted a
   Dropsite (state.battalionDeploy). */
function renderBattalionDeployModal() {
  let overlay = document.getElementById('bat-deploy-overlay');
  if (overlay) overlay.remove();
  const dep = state.battalionDeploy;
  if (!dep) return;
  const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dep.dsId);
  if (!ds) return;
  const side = dep.side;
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const b = dsBattalions(ds);
  const remainingHull = Math.max(0, (ds.maxHull || 0) - (ds.damage || 0));
  const ruined = ds.maxHull && (remainingHull / ds.maxHull) < 0.5 && remainingHull > 0;
  const destroyed = remainingHull === 0 && ds.maxHull;
  // Per-location row showing the label plus BOTH sides' current battalion counts.
  const optRow = (key, label, glyph, col) => {
    const cur = (b[key] && b[key][side]) || 0;
    const foe = (b[key] && b[key][enemy]) || 0;
    return `<button class="btn" data-bat-deploy="${ds.id}|${key}" style="display:block;width:100%;text-align:left;margin-bottom:5px;border-left:3px solid ${col};">
      <div style="color:${col};font-weight:600;">${glyph ? glyph + ' ' : ''}${label}</div>
      <div style="font-size:9px;margin-top:2px;display:flex;gap:10px;">
        <span style="color:var(--${side});">${factionName(side)}: <b>${cur}</b></span>
        <span style="color:var(--${enemy});">${factionName(enemy)}: <b>${foe}</b></span>
      </div>
    </button>`;
  };
  let opts = optRow('ground', ds.base.name + ' (Dropsite)', '◎', 'var(--' + side + ')');
  (ds.features || []).forEach((fk, fi) => {
    if ((ds.destroyedFeatures || []).includes(fi)) return;
    const f = FEATURES[fk] || { name: fk };
    opts += optRow('feat' + fi, f.name, f.glyph, f.color || 'var(--text)');
  });
  // Header: dropsite name, layer, and current Hull / state.
  const hullStr = ds.maxHull
    ? `Hull ${remainingHull}/${ds.maxHull}${destroyed ? ' · <span style="color:var(--hull-crit)">LEVELLED</span>' : ruined ? ' · <span style="color:var(--hull-warn)">RUINED</span>' : ''}`
    : '';
  overlay = document.createElement('div');
  overlay.id = 'bat-deploy-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `<div class="setup-panel" style="max-width:340px;">
    <div class="setup-title" style="color:var(--${side});">Land ${dep.count} ${dep.asset} Battalion${dep.count>1?'s':''}</div>
    <div style="font-size:10px;color:var(--text-dim);margin:4px 0 2px;">On <b>${ds.base.name}</b>${ds.base.layer ? ` · ${ds.base.layer}` : ''}</div>
    ${hullStr ? `<div style="font-size:11px;font-family:var(--mono);margin:0 0 9px;">${hullStr}</div>` : '<div style="margin-bottom:9px;"></div>'}
    <div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Choose a location:</div>
    ${opts}
    <div class="setup-footer"><button class="btn" id="bat-deploy-cancel">CANCEL</button></div>
  </div>`;
  document.body.appendChild(overlay);
  // The deploy buttons reuse the existing [data-bat-deploy] click handler.
  overlay.querySelector('#bat-deploy-cancel').addEventListener('click', () => {
    if (dep.fromGid != null) { state.selectedDropsiteId = null; state.selectedGroupId = dep.fromGid; state.selectedShipIdx = dep.fromSi; }
    state.battalionDeploy = null;
    renderAll();
  });
}

function renderRepairPhase() {
  let overlay = document.getElementById('repair-overlay');
  if (overlay) overlay.remove();
  const R = state.repairPhase;
  if (!R) return;
  let body = '', footer = '';

  if (R.step === 'fire') {
    body = `<div class="am-step-head">🔥 Fire Damage</div>
      <div class="am-line" style="font-size:10px;color:var(--text-dim)">At the start of the End Phase, each Fire Token deals 1 damage before repairs.</div>
      ${R.fireLog.length ? R.fireLog.map(l => `<div class="am-line" style="font-size:11px;">${l}</div>`).join('') : '<div class="am-line">No Fire damage.</div>'}
      ${R.explosions.length ? `<div class="am-line" style="color:var(--hull-crit)">${R.explosions.length} ship(s) destroyed by Fire — explosions resolve.</div>` : ''}`;
    footer = `<button class="btn-primary" data-rp-next="repair">Continue ▸</button>`;
  }

  else if (R.step === 'repair') {
    if (!R.targets.length) {
      body = `<div class="am-step-head">🔧 Repair</div><div class="am-line">No repairable Crippling Effects.</div>`;
      footer = `<button class="btn-primary" data-rp-close="1">End Round ▸</button>`;
    } else {
      const t = R.targets[R.idx];
      const ship = state.groups[t.gid].ships[t.si];
      // Roll once per effect when first shown.
      if (!t.rolled) {
        t.rolled = t.effects.map(eff => {
          const dice = t.dc ? [rollDie(), rollDie()] : [rollDie()];
          const need = eff === 'decay' ? 6 : 4;
          const success = dice.some(d => d >= need);
          return { eff, dice, need, success };
        });
        // Apply: remove each effect that succeeded (player's choice is moot —
        // each effect rolls its own dice here for clarity).
        t.rolled.forEach(r => {
          if (r.success && ship.crippling) {
            const i = ship.crippling.indexOf(r.eff);
            if (i >= 0) ship.crippling.splice(i, 1);
            if (r.eff === 'fire') ship.fireTokens = 0;
            R.log.push(`${t.name}: repaired ${CRIPPLE_LABEL[r.eff]}`);
          }
        });
      }
      body = `<div class="am-step-head">🔧 Repair — ${t.name}${t.dc?' <span style="color:var(--ucm);font-size:9px;">DC: 2D6</span>':''}</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${t.dc?'2D6':'1D6'} per repairable effect · 4+ removes (Orbital Decay 6+).</div>
        ${t.rolled.map(r => `<div class="am-line">
          <b>${CRIPPLE_LABEL[r.eff]}</b> (need ${r.need}+):
          <span class="am-dice" style="display:inline-flex;">${r.dice.map(d=>`<span class="am-die ${d>=r.need?'hit':'miss'}">${d}</span>`).join('')}</span>
          ${r.success?'<span style="color:var(--hull-good)">✓ repaired</span>':'<span style="color:var(--text-mute)">remains</span>'}
        </div>`).join('')}`;
      const last = R.idx >= R.targets.length - 1;
      footer = `<button class="btn-primary" data-rp-next="${last?'done':'next'}">${last?'End Round ▸':'Next Ship ▸'}</button>`;
    }
  }

  overlay = document.createElement('div');
  overlay.id = 'repair-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '300';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--hull-warn)">⚙ END PHASE · REPAIR</h2></div>
    <div class="setup-body">${body}</div>
    <div class="setup-footer">${footer}</div>
  </div>`;
  document.body.appendChild(overlay);
  const nb = overlay.querySelector('[data-rp-next]');
  if (nb) nb.addEventListener('click', () => {
    const to = nb.dataset.rpNext;
    if (to === 'repair') R.step = 'repair';
    else if (to === 'next') R.idx++;
    else if (to === 'done') { finishRepairPhase(); return; }
    renderAll();
  });
  const cb = overlay.querySelector('[data-rp-close]');
  if (cb) cb.addEventListener('click', () => finishRepairPhase());
}

/* Close the repair phase and actually advance the round. */
function finishRepairPhase() {
  state.repairPhase = null;
  advanceRoundNow();
  renderAll();
}

/* Advance to the next round: reset per-round flags, roll new initiative. */
function advanceRoundNow() {
  // Status tokens are automatically removed at the start of the End Phase.
  Object.values(state.groups).forEach(g => g.ships.forEach(s => {
    if (s.statusToken) {
      s.statusToken = false;
      if (s.crippling) { const i = s.crippling.indexOf('scanners'); if (i >= 0) s.crippling.splice(i, 1); }
    }
  }));
  state.assetPhase = null;
  state.assetMove = null;
  state.battalionCombat = null;
  state.dropsiteActivation = null;
  // Victory Point scoring for the round just completed (before advancing).
  const completedRound = state.round;
  const scoreLog = runScoring(completedRound);
  if (completedRound >= 6) {
    // End of game — show summary; do not advance.
    const u = state.score.ucm, s = state.score.shal;
    let winner;
    if (u.vp !== s.vp) winner = u.vp > s.vp ? 'ucm' : 'shal';
    else if (u.kp !== s.kp) winner = u.kp > s.kp ? 'ucm' : 'shal';
    else winner = 'draw';
    state.gameOver = { winner, scoreLog };
    return;
  }
  // Standard scoring happened this round (R4) — show the breakdown modal before advancing.
  if (state.lastScoring) state.scoringModal = { ...state.lastScoring, log: scoreLog };
  state.round = state.round + 1;
  logEvent(`── Round ${state.round} begins ──`);
  Object.values(state.groups).forEach(g => {
    g.activated = false;
    g.order = null;
    // Sustained Fire: this round's hit-by record becomes last round's; reset for new round.
    g.hitByLastRound = g.hitByThisRound || [];
    g.hitByThisRound = [];
    g.ships.forEach(s => { s.movedThisRound = false; s.justArrived = false; s.launchedThisRound = 0; s.usedLinks = {}; s.gateRemaining = undefined; s.order = null; s.firedThisActivation = false; s.weaponTargets = {}; s.dcRepaired = false; s.dcThisRound = false; s.detectorUsed = false; s.arrestedThisRound = false; s.usedVectoredSecondMove = false; });
    g.moveTrail = [];
  });
  state.selectedShipIdx = null;
  // Reset per-round dropsite feature firing.
  ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => { ds.firedFeatures = []; });
  if (scoreLog.length) state._lastScoreLog = scoreLog;
  rollInitiative();
}

/* Render the legal move cone — annular wedge between minR and maxR,
   centred on ship's facing, half-angle = turnDeg.
   If turnDeg = 0, this collapses to a line; we still draw a thin wedge for visibility. */
function renderMoveCone(cx, cy, headingDeg, minR, maxR, turnDeg, color) {
  const half = Math.max(0.5, turnDeg); // even no-turn shows a thin sliver
  const a1 = (headingDeg - half) * Math.PI / 180;
  const a2 = (headingDeg + half) * Math.PI / 180;
  // Outer arc points
  const ox1 = cx + Math.cos(a1) * maxR;
  const oy1 = cy + Math.sin(a1) * maxR;
  const ox2 = cx + Math.cos(a2) * maxR;
  const oy2 = cy + Math.sin(a2) * maxR;
  // Inner arc points (if minR > 0)
  const ix1 = cx + Math.cos(a1) * minR;
  const iy1 = cy + Math.sin(a1) * minR;
  const ix2 = cx + Math.cos(a2) * minR;
  const iy2 = cy + Math.sin(a2) * minR;
  const largeArc = (half * 2) > 180 ? 1 : 0;

  let html = '';
  if (minR > 0) {
    // annular wedge
    html += `<path d="M ${ix1} ${iy1} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2}
                     L ${ix2} ${iy2}
                     A ${minR} ${minR} 0 ${largeArc} 0 ${ix1} ${iy1} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  } else {
    // pie wedge
    html += `<path d="M ${cx} ${cy} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  }
  // Facing centre line (subtle)
  const fwdLen = maxR + 4;
  const fwd = headingVec(headingDeg);
  html += `<line x1="${cx}" y1="${cy}" x2="${cx + fwd.x * fwdLen}" y2="${cy + fwd.y * fwdLen}"
            stroke="${color}" stroke-width="0.5" stroke-opacity="0.35"
            stroke-dasharray="1 4"/>`;
  return html;
}

/* Render a ship marker on the board */
function renderShipMarker(def, ship, isGhost, ghostValid = true, isSelected = false, isInSelGroup = false, shipIdx = 0) {
  const color = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
  const colorDim = def.side === 'ucm' ? 'var(--ucm-dim)' : 'var(--shal-dim)';
  // Base diameter by tonnage — actual physical mm-base sizes at 25.4mm = 1".
  // L=30mm, M=40mm, H=50mm, C=60mm  →  inches → pixels (INCH = 12 px/").
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  const r = (diameterIn * INCH) / 2;
  const x = ship.x, y = ship.y, h = ship.heading;

  // Heading vector for the arrow tip (points from centre along facing direction).
  const hr = h * Math.PI / 180;
  const dirX = Math.cos(hr), dirY = Math.sin(hr);
  // Arrow geometry: nose at the base edge; tail two points just inside the base.
  const noseX = x + dirX * r;
  const noseY = y + dirY * r;
  const arrowLen = r * 0.65;          // length of the arrow from nose backward
  const arrowHalf = r * 0.35;          // half-width at the tail
  // Tail centre (just inside the nose direction)
  const tailCx = x + dirX * (r - arrowLen);
  const tailCy = y + dirY * (r - arrowLen);
  // Perpendicular to heading for tail spread
  const perpX = -dirY, perpY = dirX;
  const tailLx = tailCx + perpX * arrowHalf;
  const tailLy = tailCy + perpY * arrowHalf;
  const tailRx = tailCx - perpX * arrowHalf;
  const tailRy = tailCy - perpY * arrowHalf;

  const fillCol = isGhost ? (ghostValid ? colorDim : 'rgba(255,82,82,0.25)') : 'rgba(0,0,0,0)';
  const strokeCol = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  const dataAttrs = isGhost ? '' : `data-ship="${def.id}|${shipIdx}" style="cursor:pointer;"`;
  const opacity = isGhost ? 0.55 : 1;
  // Faint translucent base fill in the faction's literal colour (rgba so opacity blends).
  const baseFactionHex = def.side === 'ucm' ? '#4ad6ff' : '#d4a647';
  const baseFill = isGhost
    ? (ghostValid ? hexToRgba(baseFactionHex, 0.12) : 'rgba(255,82,82,0.12)')
    : hexToRgba(baseFactionHex, 0.10);

  let html = `<g opacity="${opacity}" ${dataAttrs}>`;
  // Base circle — translucent fill in the faction colour, coloured outline.
  html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${baseFill}"
            stroke="${strokeCol}" stroke-width="${isSelected ? 1.6 : 1}"/>`;
  // Facing arrow (filled triangle) inside the base.
  const arrowFill = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  html += `<polygon points="${noseX},${noseY} ${tailLx},${tailLy} ${tailRx},${tailRy}"
            fill="${arrowFill}" stroke="${arrowFill}" stroke-width="0.5"
            stroke-linejoin="round"/>`;
  // Selection ring
  if (isSelected && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 3}" fill="none" stroke="${color}" stroke-width="1" stroke-dasharray="2 2"/>`;
  } else if (isInSelGroup && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 2}" fill="none" stroke="${colorDim}" stroke-width="0.7" opacity="0.6"/>`;
  }
  // "moved this round" badge
  if (!isGhost && isInSelGroup && ship.movedThisRound) {
    const bx = x + r * 0.72, by = y - r * 0.72;
    html += `<circle cx="${bx}" cy="${by}" r="3.5" fill="var(--bg-elev)" stroke="${color}" stroke-width="0.7"/>`;
    html += `<text x="${bx}" y="${by + 2}" font-family="var(--mono)" font-size="5" font-weight="700"
              fill="${color}" text-anchor="middle" pointer-events="none">✓</text>`;
  }
  // name label
  if (!isGhost) {
    const grp = getGroup(def.id);
    const nm = def.name.replace(/ [αβγ]$/, '');
    const showName = isInSelGroup || isSelected;
    if (showName) {
      const labelY = y + r + 10;
      html += `<text x="${x}" y="${labelY}" font-family="var(--mono)" font-size="8"
                fill="${color}" text-anchor="middle" pointer-events="none">${nm}${grp.ships.length > 1 ? ' '+(shipIdx+1) : ''}</text>`;
    }
    // health pip — small bar under ship
    const pct = ship.hull / ship.maxHull;
    if (pct < 1) {
      const barW = r * 2;
      const barX = x - r;
      const barY = y + r + 1;
      const barCol = pct <= 0.34 ? 'var(--hull-crit)' : pct <= 0.6 ? 'var(--hull-warn)' : 'var(--hull-good)';
      html += `<rect x="${barX}" y="${barY}" width="${barW}" height="1.5" fill="var(--bg)" opacity="0.6"/>`;
      html += `<rect x="${barX}" y="${barY}" width="${barW * pct}" height="1.5" fill="${barCol}"/>`;
    }
  }
  // Carried Recon Operatives badge (Extract objective) — ⬆N above the ship.
  if (!isGhost && state.shipReconOps) {
    const carried = state.shipReconOps[def.id + '#' + shipIdx] || 0;
    if (carried > 0) {
      html += `<text x="${x}" y="${y - r - 5}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">⬆${carried}</text>`;
    }
  }
  html += `</g>`;
  return html;
}

/* ==========================================================================
   INTERACTION
   ========================================================================== */
/* ==========================================================================
   PHASE MANAGEMENT
   ========================================================================== */

function inchToPx(v) { return v * INCH; }

/* Ship base radius in pixels, by tonnage (mm bases at 25.4mm = 1"). */
function shipBaseRadiusPx(def) {
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  return (diameterIn * INCH) / 2;
}

/* ==========================================================================
   GROUP FORMATIONS (coherency)
   - Light groups: ships within 3" of each other.  Medium+ groups: within 6".
   - Single-ship groups (or down to one alive ship) ignore coherency.
   - Groups of 2–3: each ship within coherency of ≥1 other ship.
   - Groups of 4+: each ship within coherency of ≥2 other ships.
   ========================================================================== */

/* Coherency distance (inches) for a group, by its tonnage. */
function coherencyInches(def) { return _coherencyInches(def); }

/* Open Network ships pick orders individually from the round AFTER they deploy.
   We approximate the deploy round as round 1 (Voidgates have Descent), so
   individual orders apply from round 2 onwards. */
/* A Voidgate (Open Network) ship joins the Network the round AFTER it deploys.
   The round it deploys, it activates with its deploying Group under a single
   Group Order; from the next round it's part of the Network with its own Order. */
function shipInNetwork(def, ship) { return _shipInNetwork(state, def, ship); }
/* Does a Group currently use individual (per-ship) Orders?
   - Open Network: true if ANY of its ships are already in the Network. (Newly
     deployed gates still use the Group Order; networked gates use their own.)
   - Detached Payloads: single Group from R2, individual GQ orders. */
/* Ships that ignore Coherency, have no Lead, and gain no Formation Benefits:
   Open Network gateships and Payload ships. */
function noFormation(def) { return !!(def.openNetwork || def.payload); }

function onIndividualOrders(def, grp) { return _onIndividualOrders(state, def, grp); }

/* Effective Order for a given ship — its own Order if it's on individual orders
   (networked Voidgate / detached Payload), otherwise the Group Order. */
/* Movement-before-firing: a Group must finish ALL its movement before any ship fires
   or launches. Returns true when every on-table, non-destroyed ship whose effective
   Order permits movement has already moved this activation. Ships on individual orders
   are judged per-ship by the caller; this is the group gate. */
function groupMovementComplete(def, grp) {
  if (!grp || !grp.order) return false; // no order yet → not moved
  return grp.ships.every((s, i) => {
    if (!s || s.destroyed || s.offTable) return true;
    const eo = effectiveOrder(def, grp, i);
    const ord = eo && ORDERS[eo];
    if (!ord || ord.moveMax === 0) return true; // this ship has no movement to complete
    return !!s.movedThisRound;
  });
}

/* The ship from which a weapon's arc & range are measured. For group fire (multi-ship
   group not on individual orders), all measurements are taken from the LEAD ship; for
   individual orders / single ships, from the firing ship itself. */
function firingOriginShip(def, grp, shipIdx) {
  if (!grp) return null;
  const individual = def.openNetwork || onIndividualOrders(def, grp);
  if (!individual) {
    const li = grp.leadShipIdx || 0;
    const lead = grp.ships[li];
    if (lead && !lead.destroyed && !lead.offTable) return lead;
  }
  return grp.ships[shipIdx];
}

function effectiveOrder(def, grp, shipIdx) { return _effectiveOrder(state, def, grp, shipIdx); }

/* Returns a Set of ship indices that are OUT of formation for the given group.
   Empty set = everyone in formation (or rule doesn't apply). */
function outOfFormationSet(def) { return _outOfFormationSet(state, def); }

/* Whole group in formation? */
function groupInFormation(def) { return _groupInFormation(state, def); }

/* Launch asset metadata: aura range (inches) and what it can target. */
const LAUNCH_TYPES = {
  dropship:       { auraIn: 3, target: 'dropsite_same_layer', label: 'Dropships' },
  gate_dropship:  { auraIn: 3, target: 'dropsite_via_gate',   label: 'Dropships (Voidgate)' },
  bulk_lander:    { auraIn: 6, target: 'dropsite_any_layer',  label: 'Bulk Landers' },
  drop_pod:       { auraIn: 3, target: 'city',                label: 'Drop Pods' },
  boarding_pod:   { auraIn: 3, target: 'ship_or_station',     label: 'Boarding Pods' },
  fighter_bomber: { auraIn: 6, target: 'point',               label: 'Fighters & Bombers' },
  fireship:       { auraIn: 6, target: 'point',               label: 'Fire Ships' },
  torpedo:        { auraIn: 6, target: 'point',               label: 'Torpedoes' },
  mine:           { auraIn: 6, target: 'point',               label: 'Mines' },
  feature_deploy: { auraIn: 6, target: 'dropsite',            label: 'Deploy Feature' }
};
function launchMeta(type) { return LAUNCH_TYPES[type] || { auraIn: 3, target: 'point', label: 'Asset' }; }

/* Movement value (inches) for a placed asset, by faction and asset kind. */
/* Faction-specific Fighter / Bomber / Fire Ship profiles.
   fighter: {thrust, rerolls}; bomber/fireship: {thrust, att, lock, dmg, type, special}.
   `att` is the attack dice PER asset (combined across the wing at attack time). */
/* Returns {x, y} in px, or null if the zone isn't an edge-line zone. */
function snapToEdgeLineTangent(zone, ptPx, def) {
  if (!zone || !zone.edgeLines || !zone.edgeLines.length) return null;
  const r = shipBaseRadiusPx(def);
  // Find the nearest segment (work in px).
  let best = null, bestD = Infinity;
  zone.edgeLines.forEach(seg => {
    const x1 = inchToPx(seg.x1), y1 = inchToPx(seg.y1);
    const x2 = inchToPx(seg.x2), y2 = inchToPx(seg.y2);
    const vx = x2 - x1, vy = y2 - y1;
    const len2 = vx*vx + vy*vy || 1;
    let t = ((ptPx.x - x1)*vx + (ptPx.y - y1)*vy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t*vx, cy = y1 + t*vy;
    const d = Math.hypot(ptPx.x - cx, ptPx.y - cy);
    if (d < bestD) { bestD = d; best = { cx, cy, x1, y1, x2, y2 }; }
  });
  if (!best) return null;
  // Inward normal: direction from the table edge toward the board interior.
  // The segment lies on a board edge; push the center r inward perpendicular to it.
  let nx = 0, ny = 0;
  const onTop    = best.cy <= 1;
  const onBottom = best.cy >= BOARD_PX - 1;
  const onLeft   = best.cx <= 1;
  const onRight  = best.cx >= BOARD_PX - 1;
  if (onTop)    ny = 1;
  else if (onBottom) ny = -1;
  else if (onLeft)   nx = 1;
  else if (onRight)  nx = -1;
  else {
    // Segment not exactly on an edge — derive inward normal from segment direction,
    // pointing toward board center.
    const dx = best.x2 - best.x1, dy = best.y2 - best.y1;
    const len = Math.hypot(dx, dy) || 1;
    let pnx = -dy/len, pny = dx/len;
    const toCenterX = BOARD_PX/2 - best.cx, toCenterY = BOARD_PX/2 - best.cy;
    if (pnx*toCenterX + pny*toCenterY < 0) { pnx = -pnx; pny = -pny; }
    nx = pnx; ny = pny;
  }
  return { x: best.cx + nx * r, y: best.cy + ny * r };
}

/* Convert a #rrggbb hex colour to rgba(r,g,b,a). */
function hexToRgba(hex, alpha) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!m) return hex; // pass-through for CSS vars or unparseable strings
  const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Convert a zone polygon (inch coords) to SVG path string */
function zonePolygonPath(polygon) {
  return polygon.map((p,i) => (i===0?'M':'L') + ' ' + inchToPx(p.x) + ' ' + inchToPx(p.y)).join(' ') + ' Z';
}

/* Render a deployment zone (any geometry: polygon, circle, circleQuad, edgeSemicircle, corners) */
function renderZone(zone, fillCol, strokeCol) {
  let html = '';
  const stroke = `stroke="${strokeCol}" stroke-width="0.8" stroke-dasharray="4 3"`;
  const fill = `fill="${fillCol}"`;
  if (zone.polygon) {
    html += `<path d="${zonePolygonPath(zone.polygon)}" ${fill} ${stroke}/>`;
  }
  if (zone.circle) {
    const c = zone.circle;
    html += `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r)}" ${fill} ${stroke}/>`;
  }
  if (zone.circleQuad) {
    // Quarter-circle of radius r centred on (cx,cy). 'quad' indicates which quadrant
    // the slice occupies relative to (cx,cy). The arc bulges AWAY from (cx,cy) — convex.
    const c = zone.circleQuad;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
    if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    // Sweep flag chosen so the arc passes through the OUTER corner of the quadrant
    // (convex slice). In SVG y-down: br/tl use CW (sweep=1); tr/bl use CCW (sweep=0).
    const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
    html += `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.edgeSemicircle) {
    // Semicircle of radius r centred on (cx,cy) — bulges INTO the board, not off-edge.
    const c = zone.edgeSemicircle;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x, p1y, p2x, p2y;
    if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy;     }
    if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy;     }
    if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
    if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
    // Sweep=0 (CCW) makes the arc bulge into the board for all four edges given the
    // p1/p2 ordering above.
    html += `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.corners) {
    zone.corners.forEach(c => {
      html += renderZone({ circleQuad: c }, fillCol, strokeCol);
    });
  }
  if (zone.edgeLines) {
    // Edge-only DZ: render each segment as a thick solid line on the table edge.
    zone.edgeLines.forEach(seg => {
      html += `<line x1="${inchToPx(seg.x1)}" y1="${inchToPx(seg.y1)}"
                     x2="${inchToPx(seg.x2)}" y2="${inchToPx(seg.y2)}"
                     stroke="${strokeCol}" stroke-width="3.5"
                     stroke-linecap="round" stroke-opacity="0.9"/>`;
    });
  }
  return html;
}

/* Sample a random point inside a zone (best-effort; uses bounding-box rejection). */
function pointInZone(zone) {
  // Edge-only zones: random sampling would never hit a 1D line. Pick a random
  // point along one of the segments (slightly off the edge so the ship marker
  // doesn't render clipped).
  if (zone.edgeLines && zone.edgeLines.length) {
    const seg = zone.edgeLines[Math.floor(Math.random() * zone.edgeLines.length)];
    const t = Math.random();
    const xIn = seg.x1 + (seg.x2 - seg.x1) * t;
    const yIn = seg.y1 + (seg.y2 - seg.y1) * t;
    // Nudge ~0.6" inward from the table edge so circular ship bases aren't clipped.
    const nudge = 0.6;
    let nx = xIn, ny = yIn;
    if (yIn <= 0.5)        ny += nudge;
    if (yIn >= BOARD_IN - 0.5) ny -= nudge;
    if (xIn <= 0.5)        nx += nudge;
    if (xIn >= BOARD_IN - 0.5) nx -= nudge;
    return { x: inchToPx(nx), y: inchToPx(ny) };
  }
  for (let i = 0; i < 200; i++) {
    const tx = Math.random() * BOARD_IN;
    const ty = Math.random() * BOARD_IN;
    if (isInZone(tx, ty, zone)) return { x: inchToPx(tx), y: inchToPx(ty) };
  }
  return null;
}
/* Phase transition: setup → scenery. Build dropsites + scenery state; the player
   then places Micrometeor Clouds and Dense Fields before deployment. */
function commitScenario() {
  if (!state.scenario) return;
  // Both fleets must be chosen first.
  if (!state.fleetChoices.f1 || !state.fleetChoices.f2) {
    alert('Select both fleets before confirming the scenario.');
    return;
  }
  // Bioficer Payloads must be assigned to Porters first.
  if (!allPayloadsReady()) {
    alert('Assign all Bioficer Payloads to Porter ships before confirming the scenario.');
    return;
  }
  // Require all scenario rows to be chosen (or randomised) before proceeding.
  const missing = ['deployment','approach','layout','variant','objective'].filter(k => !state.scenario[k]);
  if (missing.length) {
    alert('Please select or randomise all scenario options first:\n• ' + missing.join('\n• '));
    return;
  }
  // Randomise which chosen fleet takes the red (south) vs blue (north) slot.
  const f1 = state.fleetChoices.f1, f2 = state.fleetChoices.f2;
  let slotForSide; // maps 'ucm'/'shal' → 'f1'/'f2'
  if (Math.random() < 0.5) { state.factions.ucm = f1; state.factions.shal = f2; slotForSide = { ucm:'f1', shal:'f2' }; }
  else { state.factions.ucm = f2; state.factions.shal = f1; slotForSide = { ucm:'f2', shal:'f1' }; }
  rebuildFleets();
  applyPayloadLinks(slotForSide);
  // Admiral Levels follow their fleet slot to the assigned side.
  state.admiralLevel = { ucm: state.admiralChoice[slotForSide.ucm] || 0, shal: state.admiralChoice[slotForSide.shal] || 0 };
  state.secondaries = { ucm: (state.secondaryChoice[slotForSide.ucm] || []).slice(), shal: (state.secondaryChoice[slotForSide.shal] || []).slice() };
  state.captured = { ucm: 0, shal: 0 };
  state.admiralKilled = { ucm: false, shal: false };
  const scenData = buildScenarioState(state.scenario);
  state.scenarioData = scenData;
  // Extract objective: seed Recon Operative tokens on each Dropsite (1/2/3 by size).
  if (state.scenario.objective === 'extract') {
    scenData.dropsites.forEach(ds => {
      const k = dropsiteSizeKey(ds);
      ds.reconOps = k === 'L' ? 3 : k === 'M' ? 2 : 1;
    });
  }
  state.shipReconOps = {}; state.reconKills = { ucm:0, shal:0 }; state.nominationPhase = false; // ship key → Recon Operatives carried
  // Breakthrough: track points flown off the opponent's table edge (Red = ucm slot).
  state.breakthroughFlyoff = { ucm: 0, shal: 0 };
  state.scoreLog = []; state.lastScoring = null; state.scoredRounds = [];
  state.eventLog = []; state.logExpanded = false;
  // Protect: each side nominates a unique Dropsite to defend. Auto-nominate the
  // highest-value Dropsite nearest each side's own Zone (the player may re-nominate).
  state.protectNom = { ucm: null, shal: null };
  if (state.scenario.objective === 'protect') {
    const dss = scenData.dropsites.slice();
    ['ucm','shal'].forEach(side => {
      const cands = dss.filter(ds => !Object.values(state.protectNom).includes(ds.id));
      cands.sort((a,b) => {
        const va = (DROPSITE_VP[dropsiteSizeKey(a)]||DROPSITE_VP.M).control;
        const vb = (DROPSITE_VP[dropsiteSizeKey(b)]||DROPSITE_VP.M).control;
        if (vb !== va) return vb - va;                         // highest value first
        return distFromZoneIn(side, inchToPx(a.y)) - distFromZoneIn(side, inchToPx(b.y)); // then nearest own zone
      });
      if (cands.length) state.protectNom[side] = cands[0].id;
    });
  }
  // Position-based Secondary nominations (declared before the 1st Planning Phase).
  // Auto-nominate a valid default; the player may override via the nomination editor.
  state.secondaryNominations = { ucm: {}, shal: {} };
  let needsNomination = false;
  ['ucm','shal'].forEach(side => {
    (state.secondaries[side] || []).forEach(key => {
      const def = SECONDARY_OBJECTIVES[key];
      if (!def || !def.nominate) return;
      const nom = nominateForSecondary(side, key);
      if (nom) { state.secondaryNominations[side][key] = nom; needsNomination = true; }
    });
  });
  state.nominationPhase = needsNomination;
  initShipsOffTable();
  // If there's variable scenery to place, enter the scenery phase first.
  const t = scenData.sceneryTargets || {};
  if ((t.micrometeor || 0) + (t.dense || 0) > 0) {
    state.phase = 'scenery';
  } else if (!anyoneNeedsDeployPhase()) {
    state.phase = 'play';
  } else {
    state.deployDone = { ucm: false, shal: false };
    state.phase = 'deploy';
  }
  renderAll();
}

/* Apply stored Payload→Porter links (per fleet slot) to the rebuilt ship objects.
   slotForSide maps a colour slot ('ucm'/'shal') to a fleet slot ('f1'/'f2'). */
function applyPayloadLinks(slotForSide) {
  ['ucm', 'shal'].forEach(side => {
    const slot = slotForSide[side];
    const links = (state.payloadLinks && state.payloadLinks[slot]) || {};
    Object.keys(links).forEach(payKey => {
      const [payBase, paySi] = payKey.split(':');
      const [porBase, porSi] = links[payKey].split(':');
      const payGrp = state.groups[side + ':' + payBase];
      if (!payGrp) return;
      const payShip = payGrp.ships[parseInt(paySi)];
      if (!payShip) return;
      payShip.attachedTo = { gid: side + ':' + porBase, si: parseInt(porSi) };
    });
  });
}

/* Phase transition: scenery → deploy (or play). */
function commitScenery() {
  state.sceneryPlace = null;
  state.deployDone = { ucm: false, shal: false };
  if (!anyoneNeedsDeployPhase()) {
    state.phase = 'play';
    rollInitiative();
  } else {
    state.phase = 'deploy';
  }
  renderAll();
}

function commitDeployment() {
  // Direct sides must deploy ≥50% of non-Vanguard Groups before Round 1.
  // Vanguard groups don't count. Warn the player if either Direct side is short.
  const warnings = [];
  ['ucm', 'shal'].forEach(side => {
    const stat = directDeploymentStatus(side);
    if (stat && stat.placed < stat.required) {
      warnings.push(`${factionName(side)} (${side === 'ucm' ? 'Red' : 'Blue'}) has ${stat.placed}/${stat.required} required Direct Groups deployed`);
    }
  });
  if (warnings.length) {
    const ok = confirm(
      `Direct Deployment requires ≥50% of non-Vanguard Groups to be on-table before Round 1.\n\n` +
      warnings.join('\n') +
      `\n\nProceed to play anyway?`
    );
    if (!ok) return;
  }
  state.phase = 'play';
  state.selectedShipIdx = null;
  logEvent(`── Round 1 begins ──`);
  rollInitiative(); // Round 1 initiative roll
  renderAll();
}

function goToPhase(phase) {
  state.phase = phase;
  renderAll();
}

/* Approach behaviour for a side ('ucm' = red, 'shal' = blue). */
/* Can this Group be deployed in the deploy phase?
   Direct approach: yes (any group of a Direct side; Vanguard counts as extra).
   Close/Distant approach: only if the Group has Vanguard.
   Non-deployable Groups arrive later via off-table activation. */
function expandZone(zone, extraIn) {
  const out = {};
  if (zone.polygon) {
    out.polygon = zone.polygon.map(p => {
      // A vertex is "on edge" if it sits within 1.6" of a board edge.
      const onLeft   = p.x <= 1.6;
      const onRight  = p.x >= BOARD_IN - 1.6;
      const onTop    = p.y <= 1.6;
      const onBottom = p.y >= BOARD_IN - 1.6;
      let nx = p.x, ny = p.y;
      // Push x inward only if not on a vertical edge
      if (!onLeft && !onRight) {
        // Direction depends on which side the polygon hangs from. Look at the
        // polygon centroid to decide which way is "inward".
        const cx = zone.polygon.reduce((s,v)=>s+v.x,0) / zone.polygon.length;
        nx = (cx < BOARD_IN/2) ? p.x + extraIn : p.x - extraIn;
      }
      // Push y inward only if not on a horizontal edge
      if (!onTop && !onBottom) {
        const cy = zone.polygon.reduce((s,v)=>s+v.y,0) / zone.polygon.length;
        ny = (cy < BOARD_IN/2) ? p.y + extraIn : p.y - extraIn;
      }
      return { x: nx, y: ny };
    });
  }
  if (zone.circle) out.circle = { ...zone.circle, r: zone.circle.r + extraIn };
  if (zone.circleQuad) out.circleQuad = { ...zone.circleQuad, r: zone.circleQuad.r + extraIn };
  if (zone.edgeSemicircle) out.edgeSemicircle = { ...zone.edgeSemicircle, r: zone.edgeSemicircle.r + extraIn };
  if (zone.corners) out.corners = zone.corners.map(c => ({ ...c, r: c.r + extraIn }));
  return out;
}

/* Render the Vanguard halo for the selected ship if applicable. */
/* Render the Vanguard halo for the selected ship if applicable.
   Each deployment type needs slightly different geometry — strip DZs extend
   inward parallel to the edge; L-shapes extend with arc caps at the L's tips;
   radial DZs just grow their radius. */
function renderVanguardHalo() {
  if (!state.selectedGroupId) return '';
  if (!state.scenario) return '';
  const def = getDef(state.selectedGroupId);
  if (!def || !def.vanguard) return '';
  // Vanguard deployment is a DEPLOY-PHASE benefit only. A Vanguard ship that
  // arrives off-table during play deploys in the normal DZ like any other ship.
  if (state.phase !== 'deploy') return '';
  const depKey = state.scenario.deployment;
  const dep = DEPLOYMENTS[depKey];
  const side = def.side === 'ucm' ? 'red' : 'blue';
  const zone = dep.zones[side];
  const X = def.vanguard;

  // Each branch returns a single SVG path string for the Vanguard outline.
  let html = '';
  if (depKey === 'line') {
    // Both zones are edge lines. Build a strip polygon from the (single) edge segment.
    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
  } else if (depKey === 'attacker_defender') {
    // Red is edge-line, Blue is a 12"-deep polygon strip.
    if (zone.edgeLines)    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
    else if (zone.polygon) html += vanguardStripPath(zone.polygon, X);
  } else if (depKey === 'table_corners') {
    html += vanguardTableCornerPath(side, X);
  } else if (depKey === 'midboard') {
    // Semicircle expanded radially by X.
    const c = zone.edgeSemicircle;
    html += vanguardEdgeSemicirclePath(c, X);
  } else if (depKey === 'from_corners') {
    // Quarter disc expanded radially by X.
    const c = zone.circleQuad;
    html += vanguardCircleQuadPath(c, X);
  } else if (depKey === 'encirclement') {
    // Blue centre circle grows; Red corners each grow.
    if (zone.circle) html += vanguardCirclePath(zone.circle, X);
    if (zone.corners) zone.corners.forEach(c => { html += vanguardCircleQuadPath(c, X); });
  }
  return html;
}

/* Common Vanguard styling — bright red, dashed fill + thick outline */
function vanguardStyle() {
  return {
    fill: 'rgba(255,90,82,0.10)',
    stroke: 'var(--hull-crit)',
    sw: 1.8
  };
}

/* Vanguard for an edge-only DZ (single segment on a table edge).
   Builds an X"-deep strip extending perpendicular from the edge into the board,
   spanning the segment's full length. */
function vanguardStripFromEdgeLine(seg, X) {
  // Determine which edge this segment lies on, and which way "into the board" is.
  let polygon;
  const onTop    = seg.y1 <= 0.5 && seg.y2 <= 0.5;
  const onBottom = seg.y1 >= BOARD_IN - 0.5 && seg.y2 >= BOARD_IN - 0.5;
  const onLeft   = seg.x1 <= 0.5 && seg.x2 <= 0.5;
  const onRight  = seg.x1 >= BOARD_IN - 0.5 && seg.x2 >= BOARD_IN - 0.5;
  if (onTop) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:0},{x:x2,y:0},{x:x2,y:X},{x:x1,y:X}];
  } else if (onBottom) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:BOARD_IN},{x:x2,y:BOARD_IN},{x:x2,y:BOARD_IN-X},{x:x1,y:BOARD_IN-X}];
  } else if (onLeft) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:0,y:y1},{x:0,y:y2},{x:X,y:y2},{x:X,y:y1}];
  } else if (onRight) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:BOARD_IN,y:y1},{x:BOARD_IN,y:y2},{x:BOARD_IN-X,y:y2},{x:BOARD_IN-X,y:y1}];
  } else {
    return ''; // segment not on any edge — shouldn't happen
  }
  const s = vanguardStyle();
  const d = zonePolygonPath(polygon);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Strip-style Vanguard: expand the inner edge of an axis-aligned strip polygon
   into the board by X inches. Detects which edge is on the board boundary and
   pushes the opposite edge inward. */
function vanguardStripPath(polygon, X) {
  // For each vertex, push inward only if not on a board edge — same logic as
  // expandZone, but render with thicker red stroke.
  const cxAvg = polygon.reduce((s,p)=>s+p.x,0)/polygon.length;
  const cyAvg = polygon.reduce((s,p)=>s+p.y,0)/polygon.length;
  const expanded = polygon.map(p => {
    const onLeft   = p.x <= 1.6;
    const onRight  = p.x >= BOARD_IN - 1.6;
    const onTop    = p.y <= 1.6;
    const onBottom = p.y >= BOARD_IN - 1.6;
    let nx = p.x, ny = p.y;
    if (!onLeft && !onRight)  nx = (cxAvg < BOARD_IN/2) ? p.x + X : p.x - X;
    if (!onTop  && !onBottom) ny = (cyAvg < BOARD_IN/2) ? p.y + X : p.y - X;
    return { x: nx, y: ny };
  });
  const s = vanguardStyle();
  const d = zonePolygonPath(expanded);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Table Corners Vanguard: L-shape with rounded outer corners at each 12" tip.
   side = 'blue' (top-left) or 'red' (bottom-right). The original L is the DZ;
   Vanguard extends each arm's inner edge X inward, and at each outer arm-tip
   we add a quarter-arc rounded corner that bulges into the region outside the L.
   The corner-of-the-L (where the two arms meet on the table edges) stays sharp. */
function vanguardTableCornerPath(side, X) {
  const s = vanguardStyle();
  const L = 12; // arm length
  let path = '';
  if (side === 'blue') {
    // Corner at (0,0). Walk outline clockwise:
    //   (0,0) → (L,0)         top table edge, full L length
    //   arc cap at top-arm tip (L,0): centred (L,0) radius X,
    //     from (L,0)... wait, the cap is at the OUTER tip of the arm. The
    //     tip's "outer" face is the small edge at x=L, y∈[0,X]. We replace
    //     that small edge with a quarter-arc that bulges OUT (to x > L, in
    //     the region beyond the arm's 12" mark) — but no, the rule says the
    //     cap bulges INTO the area outside the L. For Blue's top arm at
    //     (L,0): "outside the L" is the region x > L, y ∈ [0, X]. So arc
    //     centred at (L, 0) of radius X goes from (L+X, 0) on the table
    //     edge to (L, X) on the arm's inner edge.
    //
    //   So:  L (L+X, 0) along top table edge past the tip by X
    //        arc to (L, X), centred at (L, 0), radius X
    //        L (X, X) inner corner of the L
    //        L (X, L) inner edge of left arm
    //        arc cap at left-arm tip (0, L), centred (0, L) radius X
    //        L (0, L+X) along left table edge past the tip by X
    //        L (0, 0) up the table edge to corner
    const p = {
      a: inchPair(0, 0),
      b: inchPair(L + X, 0),
      c: inchPair(L, X),
      d: inchPair(X, X),
      e: inchPair(X, L),
      f: inchPair(0, L + X)
    };
    const r = X * INCH;
    // First arc (top): from (L+X, 0) to (L, X), centred (L, 0). In SVG y-down,
    //   (L+X, 0) is at angle 0°; (L, X) is at angle 90°. Going CCW (sweep=0)
    //   would pass through 270° = above the centre. Going CW (sweep=1) passes
    //   through 45° = bottom-right of (L,0). That's the region we want (inside
    //   the board). So sweep=1.
    // Second arc (left): from (0, L+X) wait — let me re-check direction. After
    //   the first L lines, we're at (X, L), moving down the left arm's inner
    //   edge. Then arc to (0, L+X). Centre (0, L), radius X. Start at (X, L)
    //   = angle 0°, end at (0, L+X) = angle 90°. Same sweep=1 (CW = through
    //   the bottom-right quadrant of centre (0,L), which lies inside the board).
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 1 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 1 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  } else { // red — corner at (48, 48)
    // Right arm tip at (48, 48-L); bottom arm tip at (48-L, 48).
    // Walk CW from corner (48,48):
    //   L (48, 48-L-X) up the right table edge past the tip by X
    //   arc to (48-X, 48-L), centred (48, 48-L) radius X, bulging into board
    //   L (48-X, 48-X) inner corner
    //   L (48-L, 48-X) inner edge of bottom arm
    //   arc to (48-L-X, 48), centred (48-L, 48) radius X
    //   L (48, 48) along bottom table edge back to corner
    const p = {
      a: inchPair(48, 48),
      b: inchPair(48, 48 - L - X),
      c: inchPair(48 - X, 48 - L),
      d: inchPair(48 - X, 48 - X),
      e: inchPair(48 - L, 48 - X),
      f: inchPair(48 - L - X, 48)
    };
    const r = X * INCH;
    // First arc: (48, 48-L-X) → (48-X, 48-L), centred (48, 48-L). Start angle
    //   270° (above centre), end angle 180° (left of centre). Going CCW = sweep=0
    //   passes through 225° = upper-left of centre — that's inside the board.
    // Second arc: (48-L, 48-X) → (48-L-X, 48), centred (48-L, 48). Start angle
    //   270° (above centre), end angle 180° (left). CCW = sweep=0 passes
    //   through upper-left = inside the board.
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 0 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 0 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  }
  return `<path d="${path}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

function inchPair(xIn, yIn) { return { x: inchToPx(xIn), y: inchToPx(yIn) }; }

/* Radial Vanguard helpers — each emits a single styled path. */
function vanguardCirclePath(c, X) {
  const s = vanguardStyle();
  return `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r + X)}"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardCircleQuadPath(c, X) {
  const s = vanguardStyle();
  // Reuse renderZone, but with thicker stroke. Easier to inline:
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
  if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
  return `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardEdgeSemicirclePath(c, X) {
  const s = vanguardStyle();
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x, p1y, p2x, p2y;
  if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy; }
  if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy; }
  if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
  if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
  return `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}



/* Scenery placement banner — shown during the 'scenery' phase. Lets the player
   pick a piece type, see remaining counts, rotate, and click the board to place.
   Existing pieces can be clicked to remove. */
/* Payload→Porter assignment modal (Bioficer, setup-time, per chosen fleet slot).
   Works on the faction's fleet DEFS (before sides are assigned), enumerating
   ship-slots from each group's size. Stores links in state.payloadLinks[slot]. */
function renderPayloadAssign() {
  let overlay = document.getElementById('payload-overlay');
  if (overlay) overlay.remove();
  if (!state.payloadAssign) return;
  const slot = state.payloadAssign.slot;            // 'f1' | 'f2'
  const fk = state.fleetChoices[slot];
  const fleet = FACTIONS[fk] && FACTIONS[fk].fleet;
  if (!fleet) { state.payloadAssign = null; return; }
  const links = state.payloadLinks[slot] || (state.payloadLinks[slot] = {});

  // Enumerate ship-slots.
  const porters = [], payloads = [];
  fleet.forEach(def => {
    const n = def.groupSize || 1;
    for (let si = 0; si < n; si++) {
      if (def.porter) porters.push({ def, si, key: `${def.id}:${si}` });
      if (def.payload) payloads.push({ def, si, key: `${def.id}:${si}` });
    }
  });
  // Capacity used per porter (from links).
  const portUsed = {};
  porters.forEach(p => portUsed[p.key] = 0);
  Object.values(links).forEach(pk => { if (portUsed[pk] != null) portUsed[pk]++; });

  const porterLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };
  const payloadLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };

  const rows = payloads.map(pl => {
    const cur = links[pl.key] || '';
    const opts = porters.map(po => {
      const cap = po.def.porter.cap || 1;
      const totalUsed = portUsed[po.key];                    // includes this payload if assigned here
      const usedByOthers = totalUsed - (cur === po.key ? 1 : 0);
      const full = usedByOthers >= cap;                      // no room for THIS payload
      const sizeOk = po.def.porter.size === pl.def.payload.size;
      const disabled = (full || !sizeOk) && cur !== po.key;
      return `<option value="${po.key}" ${cur===po.key?'selected':''} ${disabled?'disabled':''}>
        ${porterLabel(po)} (${totalUsed}/${cap})${!sizeOk?' — size mismatch':''}</option>`;
    }).join('');
    return `<div class="pl-row">
      <div class="pl-name">${payloadLabel(pl)} <span style="color:var(--text-mute);font-size:9px;">S-payload</span></div>
      <select class="fleet-dropdown pl-select" data-pl-assign="${slot}|${pl.key}">
        <option value="" ${!cur?'selected':''}>— unassigned —</option>
        ${opts}
      </select>
    </div>`;
  }).join('');

  overlay = document.createElement('div');
  overlay.id = 'payload-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '200';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:460px;">
      <div class="setup-header">
        <h2 class="setup-title">ASSIGN PAYLOADS</h2>
        <div class="setup-sub">${FACTIONS[fk].name} · attach Payload Cells to Porter ships</div>
      </div>
      <div class="setup-body">
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">
          Each Payload (S) must be assigned to a Porter (S) with available capacity. Unassigned Payloads are left out of the fleet.
        </div>
        ${rows || '<div style="color:var(--text-mute);font-style:italic;">No Payload ships in this fleet.</div>'}
      </div>
      <div class="setup-footer">
        <button class="btn-primary" id="payload-done">DONE →</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-pl-assign]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [sl, pk] = sel.dataset.plAssign.split('|');
      if (sel.value) state.payloadLinks[sl][pk] = sel.value;
      else delete state.payloadLinks[sl][pk];
      renderPayloadAssign();
    });
  });
  overlay.querySelector('#payload-done').addEventListener('click', () => {
    state.payloadAssign = null;
    renderPayloadAssign();   // remove the modal
    renderSetupOverlay();    // refresh setup so the scenario lock updates immediately
  });
}

        <span>· click ≤${L.auraIn}" to place</span>
        <button class="btn" id="da-launch-cancel" style="padding:4px 10px;font-size:10px;">CANCEL</button>`;
    }
    document.querySelector('.board-wrap').appendChild(lb);
    return;
  }
  let lbOld = document.getElementById('da-launch-banner');

  const da = state.dropsiteActivation;
  const sideName = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();
  const otherSide = da.side === 'ucm' ? 'shal' : 'ucm';

  // Dropsites this side Controls (not contested) and hasn't activated yet.
  const controlled = (state.scenarioData ? state.scenarioData.dropsites : [])
    .filter(d => dropsiteController(d) === da.side && !da.done.includes(d.id));
  const otherControlled = (state.scenarioData ? state.scenarioData.dropsites : [])
    .filter(d => dropsiteController(d) === otherSide && !da.done.includes(d.id));

  const ds = da.dsId ? state.scenarioData.dropsites.find(d => d.id === da.dsId) : null;

  // ── ACTIVATING A SPECIFIC DROPSITE ──
  // Controls now live in the right detail panel (renderDropsiteDetail). The board stays
  // fully usable for targeting weapons / placing launched assets; no bottom banner.
  if (ds) {
    let banner = document.getElementById('da-ds-banner');
    if (banner) banner.remove();
    return; // panel-driven; board remains usable
  }
  let dsBan = document.getElementById('da-ds-banner');

  let bodyHTML = '', footerHTML = '';

      <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">In initiative order, alternate activating Dropsites you Control (not Contest).</div>`;
    if (controlled.length) {
      bodyHTML += controlled.map(d => `<button class="btn" data-da-pick="${d.id}" style="width:100%;margin-bottom:3px;">
        ${d.base.name} <span style="color:var(--text-mute)">Controlled</span></button>`).join('');
    } else {
      bodyHTML += `<div class="ap-log" style="color:var(--text-mute)">${sideName(da.side)} controls no further Dropsites.</div>`;
    }
    bodyHTML += `</div>`;
    // Footer: pass to other side if they have controlled dropsites, else done.
    footerHTML = otherControlled.length
      ? `<button class="btn" id="da-next-side">${sideName(otherSide)}'S TURN →</button>`
      : '';
    footerHTML += `<button class="btn-primary" id="da-done">PROCEED TO ASSET PHASE →</button>`;
  }

  overlay = document.createElement('div');
  overlay.id = 'da-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `

      <div class="setup-header">

      </div>
      <div class="setup-body">${bodyHTML}</div>
      <div class="setup-footer">${footerHTML}</div>
    </div>
  `;
  board.appendChild(overlay);
}
