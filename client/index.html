        <div class="setup-body" style="padding:24px;display:flex;flex-direction:column;gap:14px;">
          <div>
            <div style="font-size:10px;color:var(--text-mute);font-family:var(--mono);margin-bottom:5px;">ROOM CODE</div>
            <input id="ms-code" type="text" maxlength="4" placeholder="XXXX"
              style="width:100%;box-sizing:border-box;padding:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:20px;letter-spacing:6px;text-transform:uppercase;border-radius:4px;text-align:center;"/>
          </div>
          <div>
            <div style="font-size:10px;color:var(--text-mute);font-family:var(--mono);margin-bottom:5px;">YOUR SIDE</div>
            <div style="display:flex;gap:8px;">
              <button class="btn ms-side" data-side="player1" style="flex:1;padding:10px;">Player 1 (Red)</button>
              <button class="btn ms-side" data-side="player2" style="flex:1;padding:10px;">Player 2 (Blue)</button>
            </div>
          </div>
          <div id="ms-join-err" style="color:var(--hull-crit);font-size:10px;display:none;"></div>
          <button class="btn-primary" id="ms-join-go" disabled style="padding:12px;">JOIN ▸</button>
        </div>
        <div class="setup-footer"><button class="btn" id="ms-back">← Back</button></div>
      </div>`;
    } else if (view === 'hosting') {
      html = `<div class="setup-card" style="max-width:360px;">
        <div class="setup-header"><h2 class="setup-title">CREATING ROOM…</h2></div>
        <div class="setup-body" style="padding:24px;text-align:center;">
          <div id="ms-host-msg" style="color:var(--text-dim);font-size:12px;">Contacting server…</div>
        </div>
      </div>`;
    }
    overlay.innerHTML = html;
    wire(view);
  }

  function wire(view) {
    if (view === 'main') {
      overlay.querySelector('#ms-hotseat').onclick = () => overlay.remove();
      overlay.querySelector('#ms-host').onclick  = () => { render('hosting'); doHost(); };
      overlay.querySelector('#ms-join').onclick   = () => render('join');
    }
    if (view === 'join') {
      let chosenSide = null;
      const codeEl  = overlay.querySelector('#ms-code');
      const goBtn   = overlay.querySelector('#ms-join-go');
      const errEl   = overlay.querySelector('#ms-join-err');
      const check   = () => { goBtn.disabled = !(codeEl.value.length === 4 && chosenSide); };
      codeEl.oninput = () => { codeEl.value = codeEl.value.toUpperCase(); check(); };
      overlay.querySelectorAll('.ms-side').forEach(btn => {
        btn.onclick = () => {
          chosenSide = btn.dataset.side;
          overlay.querySelectorAll('.ms-side').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          check();
        };
      });
      goBtn.onclick = () => {
        const code = codeEl.value.trim();
        errEl.style.display = 'none';
        fetch(`/api/rooms/${code}`)
          .then(r => r.json())
          .then(d => {
            if (d.error) { errEl.textContent = d.error; errEl.style.display = 'block'; return; }
            if (d.sides[chosenSide]) { errEl.textContent = `That side is already taken.`; errEl.style.display = 'block'; return; }
            location.href = `${location.pathname}?room=${code}&side=${chosenSide}`;
          })
          .catch(() => { errEl.textContent = 'Could not reach server.'; errEl.style.display = 'block'; });
      };
      overlay.querySelector('#ms-back').onclick = () => render('main');
    }
  }

  async function doHost() {
    const msgEl = () => document.getElementById('ms-host-msg');
    try {
      const res  = await fetch('/api/rooms', { method: 'POST' });
      const data = await res.json();
      const id   = data.roomId;
      const link = `${location.origin}${location.pathname}?room=${id}&side=player2`;
      overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
        <div class="setup-header"><h2 class="setup-title">ROOM ${id}</h2></div>
        <div class="setup-body" style="padding:24px;display:flex;flex-direction:column;gap:14px;">
          <div style="font-size:11px;color:var(--text-dim);">Share this link with Player 2:</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <input readonly id="ms-link" value="${link}"
              style="flex:1;min-width:0;padding:7px 8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);font-family:var(--mono);font-size:9px;border-radius:4px;"/>
            <button class="btn" id="ms-copy" style="padding:7px 11px;white-space:nowrap;">📋 Copy</button>
          </div>
        </div>
        <div class="setup-footer">
          <button class="btn-primary" id="ms-play-ucm" style="padding:12px 28px;">▶ Play ▸</button>
        </div>
      </div>`;
      document.getElementById('ms-copy').onclick = () => {
        navigator.clipboard.writeText(link).then(() => {
          const b = document.getElementById('ms-copy');
          if (b) { b.textContent = '✓ Copied'; setTimeout(() => { if (document.getElementById('ms-copy')) b.textContent = '📋 Copy'; }, 1500); }
        });
      };
      document.getElementById('ms-play-ucm').onclick = () => {
        location.href = `${location.pathname}?room=${id}&side=player1`;
      };
    } catch {
      if (msgEl()) msgEl().textContent = 'Could not reach server. Is it running on port 3000?';
    }
  }

  render('main');
  document.body.appendChild(overlay);
}

document.getElementById('btn-3d-toggle').addEventListener('click', toggle3d);

// ---------------------------------------------------------------------------
// Initialise networking (online) or show mode selector (local/first load)
// ---------------------------------------------------------------------------

if (_netRoom && (_netSide === 'player1' || _netSide === 'player2')) {
  // Online mode: connect — room/status badge is shown in the event log header.
  _netConnect();
} else if (!_netRoom) {
  // No URL params: show the mode selector before the game starts.
  showModeSelector();
}

/* ==========================================================================
   INITIAL RENDER
   ========================================================================== */
renderAll();

</script>
</body></html>
