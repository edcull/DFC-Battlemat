/* Board click — handle ship click (select) and board click (move) */
const board = document.getElementById('board');

/* Convert a pointer event's client coordinates to the SVG viewBox coordinate space.
   Using getScreenCTM().inverse() correctly handles letterboxing from
   preserveAspectRatio (xMidYMid meet) when the rendered SVG isn't square. */
function svgPointFromEvent(e) {
  const pt = board.createSVGPoint();
  pt.x = e.clientX;
  pt.y = e.clientY;
  const ctm = board.getScreenCTM();
  if (!ctm) {
    // Fallback (e.g. SVG not yet laid out): naive linear mapping
    const rect = board.getBoundingClientRect();
    return {
      x: ((e.clientX - rect.left) / rect.width) * BOARD_PX,
      y: ((e.clientY - rect.top) / rect.height) * BOARD_PX
    };
  }
  const local = pt.matrixTransform(ctm.inverse());
  return { x: local.x, y: local.y };
}

/* Resolve a click while in launch-targeting mode. Returns true if the launch
   was completed (or explicitly cancelled), false to keep targeting. */
function resolveLaunchClick(e) {
  const L = state.launching;
  // Dropsite-origin launch (Activate Dropsites): launch from the dropsite point.
  if (L.fromDropsite) {
    const pt = svgPointFromEvent(e);
    const auraPx = L.auraIn * INCH;
    if (Math.hypot(pt.x - L.x, pt.y - L.y) > auraPx + 2) { flashLaunchMsg('Out of range'); return false; }
    const meta = launchMeta(L.type);
    if (meta.target === 'point') {
      let count, kind, kindLabel;
      if (L.type === 'fireship') { count = L.fireships||0; kind='fireship'; kindLabel='Fire Ship'; }
      else if (L.type === 'torpedo' || L.type === 'mine') { count = L.assetCount || 1; kind = L.type; kindLabel = L.type === 'torpedo' ? 'Torpedo' : 'Mine'; }
      else { const f=L.fighters||0, b=L.bombers||0; count=f>0?f:b; kind=f>0?'fighter':(b>0?'bomber':null); kindLabel=kind==='fighter'?'Fighter':'Bomber'; }
      if (!kind || count <= 0) { flashLaunchMsg('Set Fighters or Bombers first'); return false; }
      flashLaunchMsg(`Dropsite launched ${count} ${kindLabel}${count>1?'s':''}`, true);
      dispatch({ type: 'launchDropsiteAsset', kind, count, x: pt.x, y: pt.y, fromDropsite: L.fromDropsite, fromFeature: L.fromFeature ?? null });
      return true;
    }
    // (Other dropsite launch types could be added here.)
    state.launching = null; return true;
  }
  const grp = state.groups[L.gid];
  const def = getDef(L.gid);
  const ship = grp && grp.ships[L.si];
  if (!ship || ship.destroyed || ship.offTable) { state.launching = null; renderAll(); return true; }
  const pt = svgPointFromEvent(e);
  const auraPx = L.auraIn * INCH;
  const inAura = (x, y) => Math.hypot(x - ship.x, y - ship.y) <= auraPx + 2;
  const meta = launchMeta(L.type);

  // POINT target (fighters/bombers/fire ships): dispatch as an intent.
  if (meta.target === 'point') {
    let count, kind, kindLabel;
    if (L.type === 'fireship') {
      count = L.fireships || 0; kind = 'fireship'; kindLabel = 'Fire Ship';
      if (count <= 0) { flashLaunchMsg('Set Fire Ships first'); return false; }
    } else if (L.type === 'torpedo' || L.type === 'mine') {
      count = L.assetCount || 1; kind = L.type; kindLabel = L.type === 'torpedo' ? 'Torpedo' : 'Mine';
    } else {
      const f = L.fighters || 0, b = L.bombers || 0;
      count = f > 0 ? f : b;
      kind = f > 0 ? 'fighter' : (b > 0 ? 'bomber' : null);
      kindLabel = kind === 'fighter' ? 'Fighter' : 'Bomber';
      if (!kind || count <= 0) { flashLaunchMsg('Set Fighters or Bombers first'); return false; }
    }
    if (!inAura(pt.x, pt.y)) { flashLaunchMsg('Out of range'); return false; }
    flashLaunchMsg(`Launched ${count} ${kindLabel}${count>1?'s':''}`, true);
    dispatch({ type: 'launchAsset', gid: L.gid, si: L.si, li: L.li, kind, count, x: pt.x, y: pt.y });
    return true;
  }

  // GATE DROPSHIP (Shaltari Mothership): two-click — select a chained Voidgate
  // (within 3" of a same-layer dropsite, with remaining Gateship value), then a
  // dropsite within 3" of it on the same layer. Battalions = Voidgate's gateship
  // value, capped by the Mothership's remaining dropship value. Both decrement.
  if (meta.target === 'dropsite_via_gate') {
    const launchEntry = (def.launch || []).find(x => x.type === L.type);
    const cap = launchEntry ? launchEntry.n : 0;
    const motherRemaining = cap - (ship.launchedThisRound || 0);
    if (motherRemaining <= 0) { flashLaunchMsg('Mothership has no Dropships left'); state.launching = null; renderAll(); return true; }
    const gates = connectedGateships(def.side, ship.x, ship.y);
    if (!gates.length) { flashLaunchMsg('No Voidgate within 18" chain of Mothership'); return false; }
    const GATE_REACH = 3 * INCH;

    // STEP 1 — no Voidgate chosen yet: clicking selects a Voidgate.
    if (!L.gateSel) {
      // Find the nearest connected Voidgate to the click that is eligible.
      let best = null, bestD = Infinity;
      gates.forEach(g => {
        const d = Math.hypot(g.x - pt.x, g.y - pt.y);
        if (d < bestD && d <= shipBaseRadiusPx(g.def) + 8) { bestD = d; best = g; }
      });
      if (!best) { flashLaunchMsg('Click a chained Voidgate'); return false; }
      if (gateRemaining(best.ship, best.def) <= 0) { flashLaunchMsg('That Voidgate has no Gateship value left'); return false; }
      // Must be within 3" of at least one same-layer dropsite.
      const gLayer = best.ship.layer || 'orbit';
      const reachable = (state.scenarioData.dropsites || []).some(d => {
        const dl = d.base.layer === 'Atmosphere' ? 'atmosphere' : 'orbit';
        return dl === gLayer && Math.hypot(inchToPx(d.x) - best.x, inchToPx(d.y) - best.y) <= GATE_REACH + 2;
      });
      if (!reachable) { flashLaunchMsg('No same-layer dropsite within 3" of that Voidgate'); return false; }
      state.launching.gateSel = { x: best.x, y: best.y, si: best.si, gid: best.def.id, layer: gLayer };
      flashLaunchMsg('Voidgate selected — now click a dropsite within 3"');
      renderAll(true);
      return true;
    }

    // STEP 2 — Voidgate chosen: clicking selects the dropsite within 3" same layer.
    const gsel = L.gateSel;
    const gship = state.groups[gsel.gid] && state.groups[gsel.gid].ships[gsel.si];
    if (!gship || gship.destroyed) { state.launching.gateSel = null; flashLaunchMsg('Voidgate lost'); renderAll(true); return true; }
    const ds = nearestDropsite(pt);
    if (!ds) { flashLaunchMsg('Click a dropsite within 3" of the Voidgate'); return false; }
    const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
    const dsLayer = ds.base.layer === 'Atmosphere' ? 'atmosphere' : 'orbit';
    if (dsLayer !== gsel.layer) { flashLaunchMsg('Dropsite must be on the Voidgate\'s orbital layer'); return false; }
    if (Math.hypot(dx - gsel.x, dy - gsel.y) > GATE_REACH + 2) { flashLaunchMsg('Dropsite must be within 3" of the Voidgate'); return false; }
    // Count = Voidgate gateship value, capped by Voidgate remaining and Mothership remaining.
    const gateLeft = gateRemaining(gship, getDef(gsel.gid));
    const count = Math.min(gateLeft, motherRemaining);
    if (count <= 0) { flashLaunchMsg('No capacity left'); return false; }
    // Dropsite selected locally; mutations happen at intent time (location chosen).
    state.selectedDropsiteId = ds.id;
    state.launching = null;
    // Auto-select ground if the dropsite has no active features.
    const _gateActiveFeats = (ds.features || []).filter((fk, fi) => !(ds.destroyedFeatures || []).includes(fi));
    if (_gateActiveFeats.length === 0) {
      dispatch({ type: 'launchGroundAsset', gid: L.gid, si: L.si, li: L.li, dsId: ds.id, count, locationKey: 'ground', gateSel: gsel });
      flashLaunchMsg(`${count} battalion${count>1?'s':''} → ${ds.base.name}`, true);
    } else {
      state.pendingGroundLaunch = { gid: L.gid, si: L.si, li: L.li, dsId: ds.id, count, assetLabel: 'Dropship', type: L.type, gateSel: gsel };
      flashLaunchMsg(`${count} battalion${count>1?'s':''} via Voidgate → ${ds.base.name} — choose a location`, true);
      renderAll(true);
    }
    return true;
  }

  // FEATURE DEPLOY: place a carried Feature onto a Dropsite within 6" (any layer).
  if (meta.target === 'dropsite') {
    const ds = nearestDropsite(pt);
    if (!ds) { flashLaunchMsg('Click a Dropsite'); return false; }
    const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
    if (!inAura(dx, dy)) { flashLaunchMsg('Dropsite out of range (6")'); return false; }
    const launchEntry = (def.launch || []).find(x => x.type === L.type);
    const fkey = launchEntry && launchEntry.feature;
    if (!fkey) { flashLaunchMsg('No feature to deploy'); return false; }
    if (ship.deployedFeatures && ship.deployedFeatures.includes(fkey)) { flashLaunchMsg('Already deployed'); return false; }
    ds.features = ds.features || [];
    ds.features.push(fkey);
    ship.deployedFeatures = ship.deployedFeatures || [];
    ship.deployedFeatures.push(fkey);
    ship.launchedThisRound = (ship.launchedThisRound || 0) + 1;
    flashLaunchMsg(`${FEATURES[fkey].name} deployed → ${ds.base.name}`, true);
    state.launching = null;
    state.selectedDropsiteId = ds.id;
    renderAll();
    return true;
  }

  // DROPSITE / CITY targets: hit-test dropsites.
  if (meta.target === 'dropsite_same_layer' || meta.target === 'dropsite_any_layer'
      || meta.target === 'city') {
    const ds = nearestDropsite(pt);
    if (!ds) { flashLaunchMsg('Click a target'); return false; }
    const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
    if (!inAura(dx, dy)) { flashLaunchMsg('Target out of range'); return false; }
    if (meta.target === 'city' && ds.base.category !== 'city') { flashLaunchMsg('Drop Pods target cities'); return false; }
    if (meta.target === 'dropsite_same_layer') {
      const dsLayer = ds.base.layer === 'Atmosphere' ? 'atmosphere' : 'orbit';
      const shipLayer = ship.layer || 'orbit';
      if (dsLayer !== shipLayer) { flashLaunchMsg('Dropships need same orbital layer'); return false; }
    }
    const launchEntry = (def.launch || []).find(x => x.type === L.type);
    let count = launchEntry ? launchEntry.n : 1;
    let halved = false;
    if (L.type === 'bulk_lander' && dsEnemyBattalions(ds, def.side) > 0) {
      count = Math.floor(count / 2);
      halved = true;
    }
    if (count <= 0) { flashLaunchMsg('No battalions landed (halved to 0)'); return false; }
    // Auto-select ground if the dropsite has no active features.
    const _dsActiveFeats = (ds.features || []).filter((fk, fi) => !(ds.destroyedFeatures || []).includes(fi));
    state.selectedDropsiteId = ds.id;
    state.launching = null;
    if (_dsActiveFeats.length === 0) {
      dispatch({ type: 'launchGroundAsset', gid: L.gid, si: L.si, li: L.li, dsId: ds.id, count, locationKey: 'ground' });
      flashLaunchMsg(`${L.name} → ${ds.base.name}${halved ? ' (halved: enemy present)' : ''}`, true);
    } else {
      flashLaunchMsg(`${L.name} → ${ds.base.name}${halved ? ' (halved: enemy present)' : ''} — choose a location`, true);
      state.pendingGroundLaunch = { gid: L.gid, si: L.si, li: L.li, dsId: ds.id, count, assetLabel: L.name, type: L.type };
      renderAll(true);
    }
    return true;
  }

  // SHIP / STATION target (boarding pods): hit-test enemy ships + stations.
  if (meta.target === 'ship_or_station') {
    const enemySide = def.side === 'player1' ? 'player2' : 'player1';
    const enemyFleet = fleetForSide(enemySide);
    let hit = null;
    enemyFleet.forEach(edef => {
      const eg = getGroup(edef.id);
      if (!eg) return;
      const r = shipBaseRadiusPx(edef);
      eg.ships.forEach((es, esi) => {
        if (es.destroyed || es.offTable) return;
        if (Math.hypot(pt.x - es.x, pt.y - es.y) <= r + 3 && inAura(es.x, es.y)) {
          hit = { kind: 'ship', name: edef.name + (eg.ships.length>1?` (${esi+1})`:''), gid: edef.id, si: esi };
        }
      });
    });
    if (!hit) {
      const ds = nearestDropsite(pt);
      if (ds && ds.base.category === 'station') {
        const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
        if (inAura(dx, dy)) hit = { kind: 'station', name: ds.base.name };
      }
    }
    if (!hit) { flashLaunchMsg('Click an enemy ship or station in range'); return false; }
    logEvent(`${def.name} launched Boarding Pods → ${hit.name}`);
    flashLaunchMsg(`Boarding Pods → ${hit.name}`, true);
    dispatch({ type: 'launchGroundAsset', gid: L.gid, si: L.si, li: L.li,
      ...(hit.kind === 'ship' ? { targetGid: hit.gid, targetSi: hit.si } : {}) });
    return true;
  }
  return false;
}

/* Nearest dropsite to a px point (within a click tolerance). */
function nearestDropsite(pt) {
  if (!state.scenarioData || !state.scenarioData.dropsites) return null;
  let best = null, bestD = Infinity;
  state.scenarioData.dropsites.forEach(ds => {
    const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
    const d = Math.hypot(pt.x - dx, pt.y - dy);
    if (d < bestD) { bestD = d; best = ds; }
  });
  // Accept if click is reasonably near a dropsite (within ~2.5").
  return bestD <= 2.5 * INCH ? best : null;
}

/* Brief transient message during launch targeting. */
let _launchMsgTimer = null;
function flashLaunchMsg(msg, success) {
  const board = document.querySelector('.board-wrap');
  if (!board) return;
  let el = document.getElementById('launch-msg');
  if (el) el.remove();
  el = document.createElement('div');
  el.id = 'launch-msg';
  el.className = 'deploy-hint';
  el.style.bottom = '44px';
  el.style.color = success ? 'var(--hull-good)' : 'var(--hull-warn)';
  el.innerHTML = `<span><b>${msg}</b></span>`;
  board.appendChild(el);
  if (_launchMsgTimer) clearTimeout(_launchMsgTimer);
  _launchMsgTimer = setTimeout(() => { const m = document.getElementById('launch-msg'); if (m) m.remove(); }, 1800);
}

// Right-click cancels in-progress targeting / selection so the player is never
// stuck (e.g. Mothership has Dropships left but no valid Voidgate to drop through).
board.addEventListener('contextmenu', (e) => {
  if (state.phase === 'scenery' && state.sceneryPlace) {
    e.preventDefault();
    if (state.sceneryPlace.pending) {
      state.sceneryPlace.pending = null; // back out of angle-aim to position pick
    } else {
      state.sceneryPlace = null;         // deselect tool
    }
    state.hoverPoint = null;
    renderAll();
    return;
  }
  if (state.pendingGroundLaunch) {
    e.preventDefault();
    state.pendingGroundLaunch = null;
    state.selectedDropsiteId = null;
    flashLaunchMsg('Launch cancelled');
    renderAll(true);
    return;
  }
  if (state.launching) {
    e.preventDefault();
    if (state.launching.gateSel) {
      // First right-click backs out of the chosen Voidgate (back to gate pick).
      state.launching.gateSel = null;
      flashLaunchMsg('Voidgate selection cancelled');
    } else {
      // Otherwise cancel the whole launch.
      state.launching = null;
      flashLaunchMsg('Launch cancelled');
    }
    renderAll();
    return;
  }
  if (state.assetMove) {
    e.preventDefault();
    state.assetMove = null;
    renderAll();
    return;
  }
  if (state.extracting) {
    e.preventDefault();
    state.extracting = null;
    flashLaunchMsg('Extract cancelled');
    renderAll();
    return;
  }
  if (state.featureAttack) {
    e.preventDefault();
    state.featureAttack = null;
    flashLaunchMsg('Targeting cancelled');
    renderAll();
    return;
  }
  if (state.aiming || state.vectoredSecondMove) {
    e.preventDefault();
    state.aiming = null;
    state.vectoredSecondMove = null;
    renderAll();
    return;
  }
  if (state.battalionDeploy) {
    e.preventDefault();
    state.battalionDeploy = null;
    renderAll();
    return;
  }
  if (state.payloadDetach) {
    e.preventDefault();
    state.payloadDetach = null;
    flashLaunchMsg('Detach cancelled');
    renderAll(true);
    return;
  }
  if (state.payloadReattach) {
    e.preventDefault();
    state.payloadReattach = null;
    flashLaunchMsg('Reattach cancelled');
    renderAll();
    return;
  }
  if (state.antiWing) {
    e.preventDefault();
    state.antiWing = null;
    flashLaunchMsg('Anti-Wing cancelled');
    renderAll();
    return;
  }
  if (state.detector) {
    e.preventDefault();
    state.detector = null;
    flashLaunchMsg('Detector cancelled');
    renderAll();
    return;
  }
  if (state.targeting) {
    e.preventDefault();
    state.targeting = null;
    flashLaunchMsg('Targeting cancelled');
    renderAll(true);
    return;
  }
});

board.addEventListener('click', (e) => {
  if (state.phase === 'setup') return; // overlay handles

  // ── PROTECT NOMINATION — click a dropsite on the map ──
  if (state.protectNomPhase && _nomPicking && _nomPicking.key === '__protect__' && (!_netSide || _nomPicking.side === _netSide)) {
    const { side } = _nomPicking;
    const pt = svgPointFromEvent(e);
    const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
    let best = null, bestD = Infinity;
    dss.forEach(ds => { const d = Math.hypot(inchToPx(ds.x) - pt.x, inchToPx(ds.y) - pt.y); if (d < bestD) { bestD = d; best = ds; } });
    if (best && bestD <= 5 * INCH) {
      dispatch({ type: 'setProtectNom', side, dsId: best.id });
      renderAll(true);
    }
    return;
  }

  // ── SECONDARY OBJECTIVE NOMINATION — click a dropsite on the map ──
  if (state.phase === 'nominations' && _nomPicking && (!_netSide || _nomPicking.side === _netSide)) {
    const { side, key } = _nomPicking;
    const cands = secondaryCandidates(side, key);
    if (key === 'key_site' || key === 'priority_target' || key === 'long_shot') {
      const pt = svgPointFromEvent(e);
      const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
      let best = null, bestD = Infinity;
      dss.forEach(ds => {
        const d = Math.hypot(inchToPx(ds.x) - pt.x, inchToPx(ds.y) - pt.y);
        if (d < bestD) { bestD = d; best = ds; }
      });
      if (best && bestD <= 5 * INCH) {
        if (key === 'long_shot') {
          const match = cands.find(c => c.nom.dsId === best.id);
          if (match) { dispatch({ type: 'setNomination', side, key, nom: match.nom }); renderAll(true); }
          else { flashLaunchMsg('No eligible feature on that dropsite'); }
        } else {
          const match = cands.find(c => c.nom.dsId === best.id);
          if (match) { dispatch({ type: 'setNomination', side, key, nom: match.nom }); renderAll(true); }
          else { flashLaunchMsg('That dropsite is not eligible for this objective'); }
        }
        return;
      }
    }
    return; // non-map-based nomination, clicks should not fall through
  }

  // When it's not our turn (online, play phase), still allow ship selection for viewing.
  // Any click that isn't a ship or dropsite element is blocked as a game action.
  if (!netIsMyTurn()) {
    let el0 = e.target;
    while (el0 && el0 !== board) {
      if (el0.dataset && el0.dataset.ship) {
        const [gid0, si0] = el0.dataset.ship.split('|');
        if (state.selectedGroupId !== gid0) { state.selectedGroupId = gid0; arcViewMode = 1; }
        state.selectedShipIdx = parseInt(si0);
        state.selectedDropsiteId = null;
        state.hoverPoint = null;
        state.layerToggle = false;
        state.launching = null;
        state.extracting = null;
        renderAll(true);
        netSendPeerView();
        return;
      }
      if (el0.dataset && el0.dataset.dropsite) {
        const did = el0.dataset.dropsite;
        const isActivating = state.dropsiteActivation && state.dropsiteActivation.dsId === did;
        state.selectedDropsiteId = (state.selectedDropsiteId === did && !isActivating) ? null : did;
        state.selectedGroupId = null;
        state.selectedShipIdx = null;
        state.hoverPoint = null;
        renderAll(true);
        return;
      }
      el0 = el0.parentNode;
    }
    return;
  }

  // ── ANTI-WING: attack an enemy Wing (asset stack) as if a ship (Sig 0, −1 Lock) ──
  if (state.antiWing) {
    const aw = state.antiWing;
    const myDef = getDef(aw.gid), myShip = state.groups[aw.gid] && state.groups[aw.gid].ships[aw.si];
    const w = myDef && myDef.weapons[aw.wi];
    if (!myDef || !myShip || !w) { state.antiWing = null; renderAll(); return; }
    const pt = svgPointFromEvent(e);
    // Find the nearest enemy fighter/bomber wing to the click.
    let target = null, bestD = 18;
    (state.launchedAssets || []).forEach(a => {
      if (a.side === myDef.side || (a.kind !== 'fighter' && a.kind !== 'bomber')) return;
      const d = Math.hypot(pt.x - a.x, pt.y - a.y);
      if (d < bestD) { bestD = d; target = a; }
    });
    if (!target) { flashLaunchMsg('Click an enemy Wing'); return; }
    // Range + arc check (Sig 0, so range = attacker Scan only; −1 Lock).
    const scanPx = (myDef.scan || 6) * INCH;
    if (Math.hypot(target.x - myShip.x, target.y - myShip.y) > scanPx) { flashLaunchMsg('Wing out of range'); return; }
    if (!pointInWeaponArc(myShip, w, target.x, target.y)) { flashLaunchMsg('Wing not in arc'); return; }
    // Roll Att dice at Lock−1; each hit removes one fighter/bomber from the target Wing
    // or any enemy Wing within 3".
    const lock = Math.min(6, (parseInt(w.lock) || 4) + 1); // −1 Lock = worse by 1
    let hits = 0; const rolls = [];
    for (let i = 0; i < (w.att || 0); i++) { const r = rollDie(); rolls.push(r); if (r >= lock) hits++; }
    // Build the pool of removable wings: target + enemy wings within 3" of it.
    let removed = 0;
    const pool = (state.launchedAssets || []).filter(a => a.side !== myDef.side && (a.kind === 'fighter' || a.kind === 'bomber') &&
      (a === target || Math.hypot(a.x - target.x, a.y - target.y) <= 3 * INCH));
    // Remove from the target first, then spill to nearby wings.
    pool.sort((a, b) => (a === target ? -1 : 0));
    for (let h = 0; h < hits; h++) {
      const victim = pool.find(a => a.count > 0);
      if (!victim) break;
      victim.count -= 1; removed++;
    }
    // Clear emptied stacks.
    state.launchedAssets = state.launchedAssets.filter(a => a.count > 0);
    myShip.firedThisActivation = true;
    logEvent(`${myDef.name} Anti-Wing: ${hits} hit${hits!==1?'s':''} → ${removed} craft destroyed`);
    flashLaunchMsg(`Anti-Wing: ${hits} hit${hits!==1?'s':''} → ${removed} craft destroyed`, true);
    state.antiWing = null;
    renderAll(); return;
  }
  // ── DETECTOR: place Spikes on an enemy Group in Line of Sight ──
  if (state.detector) {
    const d = state.detector;
    const myDef = getDef(d.gid), myShip = state.groups[d.gid] && state.groups[d.gid].ships[d.si];
    if (!myDef || !myShip) { state.detector = null; renderAll(); return; }
    const pt = svgPointFromEvent(e);
    const hit = enemyShipAtPoint(myDef.side, pt);
    if (!hit) { flashLaunchMsg('Click an enemy ship'); return; }
    const ts = state.groups[hit.gid].ships[hit.si];
    // Line of Sight: blocked only by Large Objects (same scenery LoS rule as weapons).
    const eff = sceneryAttackEffects(myShip.x, myShip.y, ts.x, ts.y, myShip, ts);
    if (eff.blocked) { flashLaunchMsg('No Line of Sight (blocked by scenery)'); return; }
    flashLaunchMsg(`Detector: +2 Spikes on ${getDef(hit.gid).name}, +1 on ${myDef.name}`, true);
    state.detector = null;
    dispatch({ type: 'useDetector', gid: d.gid, si: d.si, wi: d.wi, targetGid: hit.gid, targetSi: hit.si });
    return;
  }

  if (state.featureAttack) {
    const fa = state.featureAttack;
    const ds = state.scenarioData.dropsites.find(d => d.id === fa.dsId);
    const f = ds && FEATURES[ds.features[fa.fi]];
    if (!ds || !f || !f.weapon) { state.featureAttack = null; renderAll(); return; }
    const pt = svgPointFromEvent(e);
    const enemy = fa.side === 'player1' ? 'player2' : 'player1';
    const hit = enemyShipAtPoint(fa.side, pt);
    if (!hit) { flashLaunchMsg('Click an enemy ship'); return; }
    const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
    const ts = state.groups[hit.gid].ships[hit.si];
    // Range: Close Action weapons reach the feature's Scan only (target Sig & Spikes
    // give no extra range); other weapons add the target's effective Sig + 3"/Spike.
    const scanPx = (parseInt(f.weapon.scan) || 6) * INCH;
    const isCA = /Close Action/i.test(f.weapon.special || '');
    const sigBonusIn = isCA ? 0 : ((ts.sigSilent ? 0 : (getDef(hit.gid).sig || 0)) + ((state.groups[hit.gid].spikes||0)+(ts.spikes||0)) * 3);
    const reach = scanPx + sigBonusIn * INCH;
    if (Math.hypot(ts.x - dsx, ts.y - dsy) > reach) { flashLaunchMsg('Target out of range'); return; }
    dispatch({ type: 'fireFeatureWeapon', dsId: ds.id, fi: fa.fi, targetGid: hit.gid, targetSi: hit.si });
    state.featureAttack = null;
    return;
  }

  // ── SCENERY PLACEMENT (scenery phase) ──
  if (state.phase === 'scenery') {
    // Multiplayer: block if not your turn.
    const myScenTurn = !state.sceneryTurn || !_netSide || state.sceneryTurn === _gs();
    // Click an existing piece to remove it (only when not mid-placement and it's your turn).
    if (!(state.sceneryPlace && state.sceneryPlace.pending)) {
      const sc = e.target.closest && e.target.closest('[data-scenery-idx]');
      if (sc) {
        if (!myScenTurn) { flashLaunchMsg('Not your turn to place scenery'); return; }
        const idx = parseInt(sc.dataset.sceneryIdx);
        state.scenarioData.placedScenery.splice(idx, 1);
        renderAll();
        return;
      }
    }
    if (state.sceneryPlace) {
      if (!myScenTurn) return;
      const sp = state.sceneryPlace;
      const type = sp.type;
      const target = (state.scenarioData.sceneryTargets || {})[type] || 0;
      const have = state.scenarioData.placedScenery.filter(s => s.type === type).length;
      const pt = svgPointFromEvent(e);
      if (!sp.pending) {
        // FIRST click — set position (validated).
        if (have >= target) { flashLaunchMsg(`All ${type === 'micrometeor' ? 'Micrometeor Clouds' : 'Dense Fields'} placed`); return; }
        const v = sceneryValid(type, pt.x / INCH, pt.y / INCH);
        if (!v.ok) { flashLaunchMsg(`Invalid: ${v.reason}`); return; }
        sp.pending = { x: pt.x, y: pt.y };
        sp.angle = 0;
        flashLaunchMsg('Now click to set facing angle');
        renderAll();
        return;
      } else {
        // SECOND click — commit with the aimed angle, then pass to the other player.
        const angle = headingToward(sp.pending.x, sp.pending.y, pt.x, pt.y);
        state.scenarioData.placedScenery.push({ type, x: sp.pending.x / INCH, y: sp.pending.y / INCH, angle });
        sp.pending = null;
        if (have + 1 >= target) state.sceneryPlace = null; // auto-deselect when done
        // Alternate turns in multiplayer.
        if (state.sceneryTurn) state.sceneryTurn = state.sceneryTurn === 'player1' ? 'player2' : 'player1';
        renderAll();
        return;
      }
    }
    return;
  }

  // ── ASSET COMBAT — move launched assets (Fighters/Bombers/Fire Ships). ──
  if (state.assetPhase && state.assetPhase.step === 'assets') {
    // Online: only the active side may select or move assets.
    if (_netSide && state.assetActiveSide && _gs() !== state.assetActiveSide) return;
    const assetEl = e.target.closest && e.target.closest('[data-asset-id]');
    if (!state.assetMove) {
      // Select an asset to move — must belong to the side whose turn it is.
      if (assetEl) {
        const a = state.launchedAssets.find(x => x.id === assetEl.dataset.assetId);
        const curType = state.assetPhase.assetType;
        const inCurType = a && kindsForAssetType(curType).includes(a.kind);
        // Already-moved assets stay selectable (to reach panel actions like Clear Target).
        if (a && a.moved) { state.assetMove = { id: a.id, count: a.count }; }
        else if (a && state.assetActiveSide && a.side !== state.assetActiveSide) flashLaunchMsg(`${playerNameForSide(state.assetActiveSide)} activates next`);
        else if (a && curType && !inCurType) flashLaunchMsg(`${curType === 'fighter' ? 'Fighters' : curType === 'bomber' ? 'Bombers & Fire Ships' : 'Torpedoes'} activate now`);
        else if (a) state.assetMove = { id: a.id, count: a.count };
        renderAll();
      }
      return;
    }
    // Move the selected (sub-)group to the clicked point.
    const a = state.launchedAssets.find(x => x.id === state.assetMove.id);
    if (!a) { state.assetMove = null; renderAll(); return; }
    if (a.moved) { return; } // already moved — board click does nothing (use Reset Move first)
    if (a.kind === 'mine') { flashLaunchMsg('Mines cannot move once launched'); state.assetMove = null; renderAll(); return; }
    const pt = svgPointFromEvent(e);
    const thrPx = (a._t2tRange ? a._t2tRange : assetThrust(a)) * INCH;
    // ── AUTO-MOVE-AND-LOCK (bombers / fire ships / torpedoes) ──
    // Clicking a valid enemy ship in move range flies the whole stack to base contact
    // of that ship and locks the attack in one action. Excludes Descent ships in atmo.
    if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') {
      const hit = enemyShipAtPoint(a.side, pt);
      if (hit && (hit.ship.layer || 'orbit') !== 'atmosphere') {
        const contactPx = 1 * INCH + shipBaseRadiusPx(hit.def); // base-contact distance
        const dToShip = Math.hypot(hit.ship.x - a.x, hit.ship.y - a.y);
        // Compute the landing point: along the line toward the ship, at base contact.
        let lx, ly;
        if (dToShip <= contactPx) { lx = a.x; ly = a.y; } // already in contact — stay put
        else {
          const ux = (hit.ship.x - a.x) / dToShip, uy = (hit.ship.y - a.y) / dToShip;
          lx = hit.ship.x - ux * contactPx; ly = hit.ship.y - uy * contactPx;
        }
        const travel = Math.hypot(lx - a.x, ly - a.y);
        if (travel > thrPx + 2) { flashLaunchMsg('Target out of move range'); return; }
        // Move the whole stack to the contact point (split-on-attack isn't used here —
        // the entire selected stack commits to the attack).
        const aOrigX2 = a.x, aOrigY2 = a.y;
        a._preMove = { x: a.x, y: a.y, t2tRange: a._t2tRange };
        a.x = lx; a.y = ly; a.moved = true; a._t2tRange = undefined;
        a.bomberTarget = { gid: hit.gid, si: hit.si };
        const tn = hit.def.name + (hit.grp.ships.length > 1 ? ` #${hit.si + 1}` : '');
        flashLaunchMsg(`${a.kind} → base contact, locked onto ${tn}`, true);
        // Resolve scenery attrition along the path (same rules as a normal move).
        applyAssetScenery(a, aOrigX2, aOrigY2);
        if (a.count <= 0) { state.launchedAssets = state.launchedAssets.filter(x => x.count > 0); a.bomberTarget = null; }
        state.assetMove = null;
        afterAssetMove();
        // Keep it selected (if its stage still holds) so the lock is visible/clearable.
        if (a.count > 0 && state.assetActiveSide && !state.attackModal &&
            (state.launchedAssets || []).includes(a)) {
          state.assetMove = { id: a.id, count: a.count };
        }
        renderAll(); return;
      }
    }
    if (Math.hypot(pt.x - a.x, pt.y - a.y) > thrPx + 2) { flashLaunchMsg('Out of move range'); return; }
    const moveCount = state.assetMove.count;
    const aOrigX = a.x, aOrigY = a.y; // path origin for scenery checks
    // Split: if moving fewer than the whole stack, leave the remainder behind.
    let mover;
    if (moveCount < a.count) {
      a.count -= moveCount;
      mover = { id: 'a' + (state._assetId = (state._assetId||0)+1), kind: a.kind, count: moveCount, side: a.side, x: pt.x, y: pt.y, moved: true };
      state.launchedAssets.push(mover);
    } else {
      a._preMove = { x: a.x, y: a.y, t2tRange: a._t2tRange }; // snapshot for Reset Move
      a.x = pt.x; a.y = pt.y; a.moved = true; a._t2tRange = undefined; mover = a;
    }
    // ── SCENERY ATTRITION (assets count as moving in Orbit) ──
    {
      applyAssetScenery(mover, aOrigX, aOrigY);
      if (mover.count <= 0) { state.launchedAssets = state.launchedAssets.filter(x => x.count > 0); state.assetMove = null; afterAssetMove(); renderAll(); return; }
    }
    // Fighter combat: if a moving FIGHTER ends on an enemy launch asset, remove
    // equal numbers from each (Fighters vs Fighters/Bombers — equal removal).
    if (mover.kind === 'fighter') {
      const enemySide = mover.side === 'player1' ? 'player2' : 'player1';
      const foe = state.launchedAssets.find(x =>
        x.id !== mover.id && x.side === enemySide &&
        Math.hypot(x.x - mover.x, x.y - mover.y) <= shipBaseRadiusPx({tonnage:'L'}));
      if (foe) {
        const moverBefore = mover.count, foeBefore = foe.count;
        const removed = Math.min(mover.count, foe.count);
        mover.count -= removed;
        foe.count -= removed;
        const foeKind = foe.kind;
        // Remove emptied stacks.
        state.launchedAssets = state.launchedAssets.filter(x => x.count > 0);
        // Show a result modal with the numbers and losses (dismissed before play continues).
        state.dogfightResult = {
          attackerSide: mover.side, foeSide: enemySide, foeKind,
          attackerBefore: moverBefore, attackerAfter: mover.count,
          foeBefore: foeBefore, foeAfter: foe.count, removed
        };
        state.assetMove = null;
        afterAssetMove();
        renderAll();
        return;
      }
    }
    // Combine: if the mover ends on another same-kind, same-faction stack, merge.
    const target = state.launchedAssets.find(x =>
      x.id !== mover.id && x.kind === mover.kind && x.side === mover.side &&
      Math.hypot(x.x - mover.x, x.y - mover.y) <= shipBaseRadiusPx({tonnage:'L'}));
    if (target) {
      target.count += mover.count;
      target.moved = true;
      state.launchedAssets = state.launchedAssets.filter(x => x.id !== mover.id);
      flashLaunchMsg(`Combined into ${target.count} ${target.kind}s`, true);
      mover = target; // surviving stack (for possible re-selection below)
    } else {
      flashLaunchMsg(`Moved ${mover.count} ${mover.kind}${mover.count>1?'s':''}`, true);
    }
    state.assetMove = null;
    // If this attacker moved into base contact of an enemy ship, keep it selected so
    // the LOCK-target button is immediately available (only while its side/stage holds).
    const moverInContact = mover && (mover.kind === 'bomber' || mover.kind === 'fireship' || mover.kind === 'torpedo')
      && mover.count > 0 && enemyShipsInBaseContact(mover.side, mover.x, mover.y).length > 0;
    const sideBefore = state.assetActiveSide, typeBefore = state.assetPhase.assetType;
    afterAssetMove();
    if (moverInContact && state.assetActiveSide === sideBefore && state.assetPhase.assetType === typeBefore && !state.attackModal) {
      state.assetMove = { id: mover.id, count: mover.count };
    }
    renderAll();
    return;
  }

  // ── PAYLOAD DETACH placement — drop within 3" of the Porter. ──
  if (state.payloadDetach) {
    const pd = state.payloadDetach;
    const porter = state.groups[pd.porterGid] && state.groups[pd.porterGid].ships[pd.porterSi];
    const payGrp = state.groups[pd.gid];
    const payShip = payGrp && payGrp.ships[pd.si];
    if (!porter || !payShip) { state.payloadDetach = null; renderAll(true); return; }
    const pt = svgPointFromEvent(e);
    if (Math.hypot(pt.x - porter.x, pt.y - porter.y) > 3 * INCH + 2) { flashLaunchMsg('Must be within 3" of the Porter'); return; }
    flashLaunchMsg(`${getDef(pd.gid).name} detached — may now activate`, true);
    state.payloadDetach = null;
    dispatch({ type: 'deployPayload', gid: pd.gid, si: pd.si, porterGid: pd.porterGid, porterSi: pd.porterSi, x: pt.x, y: pt.y });
    return;
  }

  // ── PAYLOAD REATTACH — click a detached payload within 3" of the Porter. ──
  if (state.payloadReattach) {
    const pr = state.payloadReattach;
    const porter = state.groups[pr.porterGid] && state.groups[pr.porterGid].ships[pr.porterSi];
    if (!porter) { state.payloadReattach = null; renderAll(); return; }
    const pdef = getDef(pr.porterGid);
    const cands = detachedReattachCandidates(pdef.side, porter, pdef.porter.size);
    // Find the clicked candidate (nearest to click within base size).
    const pt = svgPointFromEvent(e);
    let best = null, bestD = Infinity;
    cands.forEach(c => { const d = Math.hypot(c.ship.x - pt.x, c.ship.y - pt.y); if (d < bestD) { bestD = d; best = c; } });
    if (!best || bestD > 14) { flashLaunchMsg('Click a detached Payload within 3" of the Porter'); return; }
    // Capacity check.
    const used = payloadShips(pdef.side).filter(p => { const a = p.ship.attachedTo; return a && a.gid === pr.porterGid && a.si === pr.porterSi; }).length;
    if (used >= (pdef.porter.cap || 1)) { flashLaunchMsg('Porter is at capacity'); state.payloadReattach = null; renderAll(); return; }
    // Reattach: remove from table; clear tokens/spikes/effects.
    best.ship.attachedTo = { gid: pr.porterGid, si: pr.porterSi };
    best.ship.offTable = true;
    best.ship.spikes = 0;
    best.ship.sigSilent = false;
    best.ship.movedThisRound = false;
    flashLaunchMsg(`${best.def.name} reattached — redeploys in a later round`, true);
    state.payloadReattach = null;
    renderAll();
    return;
  }

  // ── WEAPON TARGETING — lock a weapon onto the clicked enemy ship or dropsite. ──
  if (state.targeting) {
    const t = state.targeting;
    const aGrp = state.groups[t.gid];
    const aShip = aGrp && aGrp.ships[t.si];
    const aDef = getDef(t.gid);
    const w = aDef && aDef.weapons[t.wi];
    if (!aShip || !w) { state.targeting = null; renderAll(true); return; }
    // Bombardment weapons target dropsites, not ships.
    if (/Bombardment/i.test(w.special || '')) {
      const pt = svgPointFromEvent(e);
      const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
      let nearestDs = null, nearestD = Infinity;
      dss.forEach(ds => {
        const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
        const d = Math.hypot(pt.x - dx, pt.y - dy);
        if (d < nearestD) { nearestD = d; nearestDs = ds; }
      });
      if (nearestDs && nearestD <= 2.5 * INCH) {
        dispatch({ type: 'lockBombardmentTarget', gid: t.gid, si: t.si, wi: t.wi, dsId: nearestDs.id });
        state.targeting = null;
        flashLaunchMsg(`${w.name} → ${nearestDs.base.name}`, true);
      } else {
        flashLaunchMsg('Click a Dropsite to bombard');
      }
      renderAll();
      return;
    }
    const originShip = firingOriginShip(aDef, aGrp, t.si);
    const hit = enemyShipAtPoint(aDef.side, svgPointFromEvent(e));
    if (!hit) { flashLaunchMsg('Click an enemy ship'); return; }
    if (!weaponCanTarget(aDef, originShip, w, hit.def, hit.ship, hit.grp)) {
      flashLaunchMsg('Target not in arc / range / layer (measured from lead ship)'); return;
    }
    dispatch({ type: 'lockWeaponTarget', gid: t.gid, si: t.si, wi: t.wi, targetGid: hit.gid, targetSi: hit.si });
    state.targeting = null;
    flashLaunchMsg(`${w.name} → ${hit.def.name}`, true);
    return;
  }

  // ── LAUNCH TARGETING — resolve a launch against the clicked target. ──
  if (state.launching) {
    if (resolveLaunchClick(e)) return;
    // If click didn't resolve a valid target, keep targeting mode active.
    return;
  }

  // Remove a launched fighter/bomber asset by clicking its marker.
  {
    const assetEl = e.target.closest && e.target.closest('[data-asset]');
    if (assetEl) {
      const ai = parseInt(assetEl.dataset.asset);
      if (confirm('Remove this Fighter/Bomber asset?')) {
        state.launchedAssets.splice(ai, 1);
        renderAll();
      }
      return;
    }
  }

  // ── AIMING / VECTORED SECOND MOVE take priority over selection. ──
  if (state.aiming || state.vectoredSecondMove) {
    const pt0 = svgPointFromEvent(e);
    if (state.aiming) {
      const a = state.aiming;
      if (a.mode === 'deploy') {
        const ag = state.groups[a.gid];
        const aship = ag && ag.ships[a.si];
        if (!aship) { state.aiming = null; return; }
        const finalX = aship.x, finalY = aship.y;
        const heading = headingToward(finalX, finalY, pt0.x, pt0.y);
        state.aiming = null;
        state.hoverPoint = null;
        state.redeployingShip = null;
        if (state.phase === 'deploy') {
          // Show the ship at its aimed position locally; CONFIRM button sends the intent.
          aship.heading = heading;
          _pendingDeploy = { gid: a.gid, si: a.si, x: finalX, y: finalY, heading };
          renderAll(true);
        } else {
          // Play-phase reserve arrival — dispatch intent so the server is authoritative.
          dispatch({ type: 'arriveShip', gid: a.gid, si: a.si, x: finalX, y: finalY, heading });
          renderAll();
        }
        return;
      }
      // Vectored pivot / Course-Change bonus turn — server-authoritative intent.
      dispatch({ type: 'aimShip', gid: a.gid, x: pt0.x, y: pt0.y });
      return;
    }
    if (state.vectoredSecondMove) {
      dispatch({ type: 'vectoredMove', gid: state.vectoredSecondMove.gid, x: pt0.x, y: pt0.y });
      return;
    }
  }

  // EXTRACT targeting: resolve against the nearest clicked dropsite, bypassing the
  // el-walk so any click on/near a dropsite works regardless of which SVG child was hit.
  if (state.extracting) {
    const pt = svgPointFromEvent(e);
    const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
    let nearestDs = null, nearestD = Infinity;
    dss.forEach(ds => {
      const dx = inchToPx(ds.x), dy = inchToPx(ds.y);
      const d = Math.hypot(pt.x - dx, pt.y - dy);
      if (d < nearestD) { nearestD = d; nearestDs = ds; }
    });
    const CLICK_TOL = 2.5 * INCH;
    if (nearestDs && nearestD <= CLICK_TOL) {
      const eg = state.groups[state.extracting.gid];
      const es = eg && eg.ships[state.extracting.si];
      const edef = getDef(state.extracting.gid);
      const ds = nearestDs;
      if (es && ds) {
        if (!(ds.reconOps > 0)) { flashLaunchMsg('No Recon Operatives at that Dropsite'); return; }
        if (Math.hypot(es.x - inchToPx(ds.x), es.y - inchToPx(ds.y)) > 6 * INCH) {
          flashLaunchMsg('Dropsite out of range (6")'); return;
        }
        const take = Math.min(transportValue(edef), ds.reconOps);
        const { gid, si } = state.extracting;
        state.extracting = null;
        dispatch({ type: 'extractRecon', gid, si, dsId: ds.id });
        flashLaunchMsg(`${edef.name} extracted ${take} Operative${take>1?'s':''}`, true);
        renderAll(); return;
      }
    }
    // Click didn't land on a dropsite — cancel targeting.
    flashLaunchMsg('No Dropsite at that location');
    return;
  }

  // Did we click on a ship or dropsite?
  let el = e.target;
  while (el && el !== board) {
    // A Feature hit-circle (Dropsite Activation) is handled by the document click
    // handler — don't also select the parent Dropsite here.
    if (el.dataset && el.dataset.daFeat) return;
    if (el.dataset && el.dataset.ship) {
      const [gid, si] = el.dataset.ship.split('|');
      // Hotseat turn enforcement on board ship-click.
      if (!_netSide) {
        const clickedDefHs = getDef(gid);
        if (clickedDefHs) {
          if (state.phase === 'deploy' && !deploySideAllowed(clickedDefHs.side)) {
            const active = !state.deployDone.player1 ? 'player1' : 'player2';
            flashLaunchMsg(`${playerNameForSide(active)} deploys first`);
            return;
          }
          if (state.phase === 'play' && state.activeSide && clickedDefHs.side !== state.activeSide) {
            flashLaunchMsg(`${playerNameForSide(state.activeSide)}'s turn to activate`);
            return;
          }
        }
      }
      // Activation lock: don't switch to a group that is locked this activation.
      // In online mode, only enforce this for the local player's own groups —
      // allow free browsing of opponent groups even during their activation.
      if (state.phase === 'play' && state.selectedGroupId !== gid) {
        const clickedDef = getDef(gid);
        const clickedGrp = state.groups[gid];
        const isMyGroup = !_netSide || (clickedDef && clickedDef.side === _netSide);
        if (isMyGroup && clickedDef && clickedGrp && !clickedGrp.activated) {
          const lockGid = activeGroupIdForSide(clickedDef.side);
          if (lockGid && lockGid !== gid) {
            flashLaunchMsg('Finish the current activation first');
            return;
          }
        }
      }
      if (state.selectedGroupId !== gid) {
        state.selectedGroupId = gid;
        arcViewMode = 1;
      }
      state.selectedShipIdx = parseInt(si);
      state.selectedDropsiteId = null;
      state.hoverPoint = null;
      state.layerToggle = false;
      state.launching = null;
      state.extracting = null;
      // Deploy phase: clicking an already-placed ship marks it for repositioning.
      if (state.phase === 'deploy') {
        const _rdDef = getDef(gid);
        const _rdGrp = state.groups[gid];
        const _rdShip = _rdGrp && _rdGrp.ships[parseInt(si)];
        if (_rdShip && !_rdShip.offTable && _rdDef && deploySideAllowed(_rdDef.side)) {
          state.redeployingShip = { gid, si: parseInt(si) };
        } else {
          state.redeployingShip = null;
        }
      } else {
        state.redeployingShip = null;
      }
      renderAll(true);
      netSendPeerView();
      return;
    }
    if (el.dataset && el.dataset.dropsite) {
      const did = el.dataset.dropsite;
      // EXTRACT: if this ship is in extract-targeting mode, take Recon Operatives aboard
      // from this Dropsite (within 6", up to the ship's transport value).
      if (state.extracting) {
        const eg = state.groups[state.extracting.gid];
        const es = eg && eg.ships[state.extracting.si];
        const edef = getDef(state.extracting.gid);
        const ds = state.scenarioData.dropsites.find(d => d.id === did);
        if (es && ds) {
          if (!(ds.reconOps > 0)) { flashLaunchMsg('No Recon Operatives at that Dropsite'); return; }
          if (Math.hypot(es.x - inchToPx(ds.x), es.y - inchToPx(ds.y)) > 6 * INCH) { flashLaunchMsg('Dropsite out of range (6")'); return; }
          const take = Math.min(transportValue(edef), ds.reconOps);
          const { gid, si } = state.extracting;
          state.extracting = null;
          dispatch({ type: 'extractRecon', gid, si, dsId: did });
          flashLaunchMsg(`${edef.name} extracted ${take} Operative${take>1?'s':''}`, true);
          renderAll(); return;
        }
        state.extracting = null;
      }
      // During Dropsite Activation picking phase: clicking a controlled dropsite activates it
      const _da2 = state.dropsiteActivation;
      if (_da2 && !_da2.dsId && dropsiteController(state.scenarioData.dropsites.find(d=>d.id===did)) === _da2.side
          && !_da2.done.includes(did) && (!_netSide || _gs() === _da2.side)) {
        _da2.dsId = did;
        state.selectedDropsiteId = did;
        state.selectedGroupId = null; state.selectedShipIdx = null;
        renderAll(true); return;  // local UI only — game events use their own dsId in intents
      }
      // During Dropsite Activation, clicking the activated dropsite keeps it selected
      // (re-shows its detail panel) rather than toggling the selection off.
      const isActivating = _da2 && _da2.dsId === did;
      state.selectedDropsiteId = (state.selectedDropsiteId === did && !isActivating) ? null : did;
      // Deselect any ship so the right panel shows the dropsite
      state.selectedGroupId = null;
      state.selectedShipIdx = null;
      state.hoverPoint = null;
      renderAll(true);
      return;
    }
    el = el.parentNode;
  }
  // Clicked empty board — drop any dropsite selection without an early render
  const hadDropsiteSelected = state.selectedDropsiteId !== null;
  if (hadDropsiteSelected) state.selectedDropsiteId = null;

  const pt = svgPointFromEvent(e);

  // DEPLOY phase: place the next undeployed ship in the selected Group.
  if (state.phase === 'deploy') {
    if (!state.selectedGroupId) {
      if (hadDropsiteSelected) renderAll(true);
      return;
    }
    const grp = state.groups[state.selectedGroupId];
    const def = getDef(state.selectedGroupId);

    // Block placement for Groups that aren't deployable now (non-Direct, non-Vanguard).
    if (!canDeployNow(def)) {
      if (hadDropsiteSelected) renderAll(true);
      return;
    }
    // Enforce deploy order: red (ucm) places all its deploy-eligible Groups first,
    // then blue (shal).
    if (!deploySideAllowed(def.side)) {
      flashLaunchMsg(`${playerNameForSide('player1')} must finish deploying first`);
      if (hadDropsiteSelected) renderAll(true);
      return;
    }

    const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);

    // Validate click is inside the legal placement area (DZ + Vanguard halo if any).
    const xIn = pt.x / INCH, yIn = pt.y / INCH;
    const dep = DEPLOYMENTS[state.scenario.deployment];
    const zone = dep.zones[state.deployZone && state.deployZone[def.side] || 'south'];
    const inBaseZone = isInZone(xIn, yIn, zone);
    let valid = inBaseZone;
    if (!valid && def.vanguard) {
      // Check the expanded Vanguard halo.
      valid = isInVanguardZone(xIn, yIn, def, zone);
    }
    if (!valid) {
      // Click outside legal area — ignore. (Could flash a warning, but silent is fine.)
      if (hadDropsiteSelected) renderAll(true);
      return;
    }
    // Snap to the deployment line only when placed in the base zone — NOT in the
    // Vanguard halo (Vanguard ships sit wherever clicked, X" into the board).
    const snapPlace = inBaseZone ? (snapToEdgeLineTangent(zone, pt, def) || pt) : pt;

    // Block any placement while a ship is awaiting confirmation.
    if (_pendingDeploy) {
      flashLaunchMsg('Confirm or cancel the current placement first');
      return;
    }

    // Redeployment: user clicked a specific placed ship to pick it up and move it.
    const rdp = state.redeployingShip;
    if (rdp && rdp.gid === state.selectedGroupId) {
      state.redeployingShip = null;
      const rdpShip = grp.ships[rdp.si];
      if (rdpShip && !rdpShip.destroyed && !rdpShip.offTable) {
        state.selectedShipIdx = rdp.si;
        rdpShip.x = snapPlace.x;
        rdpShip.y = snapPlace.y;
        rdpShip.heading = def.side === 'player1' ? -90 : 90;
        state.aiming = { gid: state.selectedGroupId, si: rdp.si, mode: 'deploy' };
        renderAll(true);
        return;
      }
    }

    if (undeployedIdx >= 0) {
      // Place this ship at the click point, then enter free-aim to set facing.
      const ship = grp.ships[undeployedIdx];
      ship.x = snapPlace.x;
      ship.y = snapPlace.y;
      ship.offTable = false;
      ship.deployedRound = state.round;
      ship.heading = def.side === 'player1' ? -90 : 90;
      state.selectedShipIdx = undeployedIdx;
      state.aiming = { gid: state.selectedGroupId, si: undeployedIdx, mode: 'deploy' };
      renderAll(true);
      return;
    }

    // All ships placed — clicking repositions the currently-selected ship, then re-aims.
    if (state.selectedShipIdx !== null) {
      const ship = grp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed && !ship.offTable) {
        ship.x = snapPlace.x;
        ship.y = snapPlace.y;
        ship.heading = def.side === 'player1' ? -90 : 90; // provisional; aim adjusts
        state.aiming = { gid: state.selectedGroupId, si: state.selectedShipIdx, mode: 'deploy' };
        renderAll(true);
        return;
      }
    }
    if (hadDropsiteSelected) renderAll();
    return;
  }

  // PLAY phase — handle off-table activation FIRST (place ships before they activate).
  if (state.selectedGroupId !== null) {
    const sgrp = state.groups[state.selectedGroupId];
    const sdef = getDef(state.selectedGroupId);
    const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
    if (undeployedIdx >= 0) {
      // The Group has off-table ships. Check eligibility this round.
      const elig = canActivateOffTable(sdef);
      if (!elig.eligible) {
        if (hadDropsiteSelected) renderAll();
        return;
      }
      // Group can't already be activated this round.
      if (sgrp.activated) {
        if (hadDropsiteSelected) renderAll();
        return;
      }
      // Validate click is in the base DZ. (Vanguard halo is deploy-phase only —
      // off-table arrivals in play deploy in the normal DZ like any other ship.)
      const xIn = pt.x / INCH, yIn = pt.y / INCH;
      const dep = DEPLOYMENTS[state.scenario.deployment];
      const zone = dep.zones[state.deployZone && state.deployZone[sdef.side] || 'south'];
      const inBaseZone = isInZone(xIn, yIn, zone);
      let valid = inBaseZone;
      if (!valid) {
        if (hadDropsiteSelected) renderAll();
        return;
      }
      // Snap to the line in edge-line zones.
      const place = inBaseZone ? (snapToEdgeLineTangent(zone, pt, sdef) || pt) : pt;
      const ship = sgrp.ships[undeployedIdx];
      ship.x = place.x;
      ship.y = place.y;
      ship.offTable = false;
      ship.justArrived = true; // arrived this activation — repositionable until the Group moves
      ship.deployedRound = state.round; // for Open Network: joins the Network next round
      ship.heading = sdef.side === 'player1' ? -90 : 90; // provisional; aim adjusts
      state.selectedShipIdx = undeployedIdx;
      state.deployingGroup = state.selectedGroupId;
      state.aiming = { gid: state.selectedGroupId, si: undeployedIdx, mode: 'deploy' };
      renderAll(true);
      return;
    }

    // REDEPLOY: ships arrived this activation (justArrived) may be repositioned/re-angled
    // until the Group has ACTED — i.e. no ship has moved, fired, launched, or used the
    // Detector this activation. (Picking an Order alone does not lock the deploy point.)
    const grpActed = sgrp.ships.some(s => s.movedThisRound || s.firedThisActivation || (s.launchedThisRound > 0) || s.detectorUsed);
    if (undeployedIdx < 0 && !sgrp.activated && !grpActed && state.selectedShipIdx !== null) {
      const ship = sgrp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed && !ship.offTable && ship.justArrived) {
        const xIn = pt.x / INCH, yIn = pt.y / INCH;
        const dep = DEPLOYMENTS[state.scenario.deployment];
        const zone = dep.zones[state.deployZone && state.deployZone[sdef.side] || 'south'];
        // Only treat the click as a REDEPLOY when it lands inside the deploy zone.
        // A click elsewhere is a normal move — fall through to the move handler below.
        if (isInZone(xIn, yIn, zone)) {
          const place = snapToEdgeLineTangent(zone, pt, sdef) || pt;
          ship.x = place.x;
          ship.y = place.y;
          ship.heading = sdef.side === 'player1' ? -90 : 90; // provisional; aim adjusts
          state.aiming = { gid: state.selectedGroupId, si: state.selectedShipIdx, mode: 'deploy' };
          renderAll(true);
          return;
        }
        // else: not in zone — let it fall through to normal movement.
      }
    }
  }

  // PLAY phase requires a specific ship selected
  if (state.selectedGroupId === null || state.selectedShipIdx === null) {
    if (hadDropsiteSelected) renderAll(true);
    return;
  }
  const grp = state.groups[state.selectedGroupId];
  const def = getDef(state.selectedGroupId);
  const ship = grp.ships[state.selectedShipIdx];
  if (!ship || ship.destroyed || ship.offTable) return;

  // PLAY phase — the full move (cone validation, base-overlap resolution,
  // scenery/mine effects, and the vectored / Course-Change follow-up) lives in
  // the engine commitMove(); the click is dispatched as a moveShip intent.
  if (grp.activated) return;
  dispatch({ type: 'moveShip', gid: state.selectedGroupId, si: state.selectedShipIdx, x: pt.x, y: pt.y, layerToggle: state.layerToggle });
});

board.addEventListener('mousemove', (e) => {
  const pt = svgPointFromEvent(e);

  // Payload detach: ghost ship follows the cursor.
  if (state.payloadDetach) {
    state.hoverPoint = pt;
    renderBoard();
    return;
  }

  // Scenery placement ghost follows the cursor; angle aims when pending.
  if (state.phase === 'scenery') {
    if (state.sceneryPlace) {
      if (state.sceneryPlace.pending) {
        state.sceneryPlace.angle = headingToward(state.sceneryPlace.pending.x, state.sceneryPlace.pending.y, pt.x, pt.y);
      } else {
        state.hoverPoint = pt;
      }
      renderBoard();
    }
    return;
  }

  // While aiming: rotate the ship live to face the cursor (clamped if needed).
  if (state.aiming) {
    const a = state.aiming;
    const ag = state.groups[a.gid];
    const aship = ag && ag.ships[a.si];
    if (aship) {
      const desired = headingToward(aship.x, aship.y, pt.x, pt.y);
      aship.heading = (a.mode === 'deploy')
        ? desired
        : clampHeading(a.originHeading, desired, 45);
      renderBoard();
    }
    return;
  }

  // While awaiting Vectored's second move: preview the straight move.
  if (state.vectoredSecondMove) {
    state.hoverPoint = pt;
    renderBoard();
    return;
  }

  if (state.selectedGroupId === null || state.selectedShipIdx === null) {
    if (state.hoverPoint) {
      state.hoverPoint = null;
      renderBoard();
    }
    return;
  }
  const grp = state.groups[state.selectedGroupId];
  const defMM = getDef(state.selectedGroupId);
  const ordMM = effectiveOrder(defMM, grp, state.selectedShipIdx);
  if (grp.activated || !ordMM || ORDERS[ordMM].moveMax <= 0) {
    if (state.hoverPoint) { state.hoverPoint = null; renderBoard(); }
    return;
  }
  state.hoverPoint = pt;
  renderBoard();
});

board.addEventListener('mouseleave', () => {
  if (state.hoverPoint) {
    state.hoverPoint = null;
    renderBoard();
  }
});

/* Touch support — basic */
board.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const pt = { clientX: t.clientX, clientY: t.clientY };
    // simulate hover
    const p = svgPointFromEvent(pt);
    state.hoverPoint = p;
    renderBoard();
  }
}, { passive: true });

/* ==========================================================================
   ONLINE MODE
   Activated when the URL contains ?room=XXXX&side=player1 (or player2).
   The server relays state between clients; each client still runs the engine
   locally, then pushes its state after every renderAll().
   ========================================================================== */

const _netParams = new URLSearchParams(location.search);
const _netRoom   = (_netParams.get('room') || '').toUpperCase();
const _netSide   = (_netParams.get('side') || '').toLowerCase(); // 'player1' | 'player2' | '' (hotseat)
// Return the local player's board-side key ('player1' | 'player2').
function _gs() { return _netSide; }
let   _netWs            = null;
let   _netConnected     = false;
let   _netReceiving     = false; // true while we are applying a remote state update
let   _netPendingIntent = false; // true after sending an intent, until server broadcasts result

// Local board overlay mode (not synced): 1 = selected ship's arcs+scan + enemy sigs, 2 = selected ship's sig + enemy arcs+scans
let arcViewMode = 1;
// Which nomination row is currently awaiting a board click: { side, key } | null
let _nomPicking = null;
// Pending deploy confirmation: { gid, si, x, y, heading } — aimed but not yet dispatched
let _pendingDeploy = null;
// Sides that have voted to end the current round (online mode only; cleared on full state update)
let _endRoundVotes = new Set();

// Ensure stuck flags never permanently silence the relay after an unhandled error.
window.addEventListener('error', () => { _netReceiving = false; _netPendingIntent = false; });

// Permanent relay for pre-game setup state (fleet choices, names, colours, scenario
// options). This relay is intentionally kept — setup is collaborative config with no
// server-side legality to enforce. It will NOT be removed when in-game relay is retired.
function netRelaySetup() {
  if (!_netWs || !_netConnected || _netReceiving || _netPendingIntent) return;
  if (_netWs.readyState !== WebSocket.OPEN) return;
  const { hoverPoint: _hp, selectedGroupId: _sg, selectedShipIdx: _ss, selectedDropsiteId: _sd, layerToggle: _lt, peerView: _pv, ...stateToSend } = state;
  stateToSend.peerView = { gid: _sg, si: _ss, layerToggle: _lt };
  console.log('%c[relay:setup]', 'color:#f5c518;font-weight:bold', state.phase);
  try { _netWs.send(JSON.stringify({ type: 'state', state: stateToSend })); }
  catch(e) { console.error('[relay:setup] send failed:', e); }
}

// Temporary relay used during the intent migration. Called at the end of every
// renderAll() for non-setup phases, and explicitly by in-game handlers not yet
// migrated to dispatch(intent). Remove this (and its renderAll() call) once all
// in-game action families have been migrated to server-authoritative intents.
function netAfterRender() {
  if (!_netWs || !_netConnected || _netReceiving || _netPendingIntent) return;
  if (_netWs.readyState !== WebSocket.OPEN) return;
  // Strip ephemeral pointer state before sending — hoverPoint changes every
  // mousemove and must not trigger a flood of state broadcasts.
  const { hoverPoint: _hp, selectedGroupId: _sg, selectedShipIdx: _ss, selectedDropsiteId: _sd, layerToggle: _lt, peerView: _pv, targeting: _tgt, antiWing: _aw, detector: _det, extracting: _ext, pendingGroundLaunch: _pgl, featureAttack: _fa, launching: _lch, ...stateToSend } = state;
  // Re-include launching only for ship-based non-gate launches.
  // gate_dropship and fromDropsite are client-only targeting UI — no relay needed.
  if (_lch && !_lch.fromDropsite && _lch.type !== 'gate_dropship') stateToSend.launching = _lch;
  stateToSend.peerView = { gid: _sg, si: _ss, layerToggle: _lt };

  // ── Legacy relay diagnostic ──────────────────────────────────────────────────
  // Any relay during play phase is a migration gap — the action should use an intent.
  // Log context + a stack trace so we can identify and migrate the remaining paths.
  if (state.phase === 'play') {
    const _ctx = {
      activeSide:        state.activeSide,
      selectedGroup:     _sg,
      selectedShip:      _ss,
      attackModal:       state.attackModal ? `${state.attackModal.step}` : null,
      battalionCombat:   state.battalionCombat ? `${state.battalionCombat.stage}` : null,
      deployingGroup:    state.deployingGroup || null,
      assetPhase:        state.assetPhase ? `${state.assetPhase.step}` : null,
      launching:         stateToSend.launching ? `${stateToSend.launching.type}` : null,
      dropsiteActivation:state.dropsiteActivation?.dsId || null,
    };
    console.warn('%c[relay:legacy] play', 'background:#4a0000;color:#ff8888;font-weight:bold;padding:2px 6px;border-radius:3px;', _ctx);
    console.trace('[relay:legacy] call stack ↑');
  } else {
    console.log('%c[relay:legacy]', 'color:#ff4444;font-weight:bold', state.phase);
  }
  // ─────────────────────────────────────────────────────────────────────────────

  try { _netWs.send(JSON.stringify({ type: 'state', state: stateToSend })); }
  catch(e) { console.error('[relay] send failed:', e); }
}

function _netApplyRemote(remoteState) {
  _netPendingIntent = false; // server responded — intent cycle complete
  _pendingDeploy = null;     // any local pending placement is superseded by the authoritative state
  _netReceiving = true;
  // Preserve local view state so each client can browse independently.
  const localView = {
    selectedGroupId:   state.selectedGroupId,
    selectedShipIdx:   state.selectedShipIdx,
    selectedDropsiteId: state.selectedDropsiteId,
    layerToggle:       state.layerToggle,
    hoverPoint:        state.hoverPoint,
    pendingGroundLaunch: state.pendingGroundLaunch, // local-only, never in server state
    targeting:         state.targeting,             // local-only weapon targeting cursor
    antiWing:          state.antiWing,              // local-only anti-wing targeting cursor
    detector:          state.detector,              // local-only detector targeting cursor
    extracting:        state.extracting,            // local-only extract targeting cursor
    featureAttack:     state.featureAttack,          // local-only dropsite weapon targeting
    // Preserve fromDropsite launches — committed via intent, must survive relay responses
    launching:         (state.launching && (state.launching.fromDropsite || state.launching.type === 'gate_dropship')) ? state.launching : (remoteState.launching || null),
    // Preserve the locally-selected dsId inside dropsiteActivation — it's UI-only
    _daDsId:           state.dropsiteActivation && state.dropsiteActivation.dsId,
    _daDaSide:         state.dropsiteActivation && state.dropsiteActivation.side,
  };
  // Replace the contents of the shared state object in-place so all existing
  // references (imports, closures) still point to the same object.
  Object.keys(state).forEach(k => { if (!(k in remoteState)) delete state[k]; });
  Object.assign(state, remoteState, localView);
  // Restore the locally-selected dsId only if it hasn't been finished (added to done[])
  if (state.dropsiteActivation && localView._daDsId
      && !(state.dropsiteActivation.done || []).includes(localView._daDsId)
      && state.dropsiteActivation.side === localView._daDaSide) {
    state.dropsiteActivation.dsId = localView._daDsId;
  }
  delete localView._daDsId; delete localView._daDaSide;
  // Keep _netReceiving true through the renderAll() so netAfterRender() does
  // not echo the received state back to the server (which would cause a loop).
  // try/catch ensures _netReceiving is always reset — if renderAll() throws,
  // a stuck _netReceiving=true would permanently silence all future sends.
  try { renderAll(); } catch(e) { console.error('[net] renderAll error during remote apply:', e); }
  _netReceiving = false;
}

function _netUpdateBadge() {
  const dot = _netConnected ? '#4ad66d' : '#ff5252';
  const dotEl = document.getElementById('log-net-dot');
  if (dotEl) dotEl.style.background = dot;
  const roomEl = document.getElementById('log-net-room');
  if (roomEl) roomEl.textContent = _netRoom;
}

function _netConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = `${proto}//${location.host}/ws?room=${_netRoom}&side=${_netSide}`;
  _netWs = new WebSocket(url);

  _netWs.onopen = () => {
    _netConnected = true;
    _netUpdateBadge();
    console.log(`[net] Connected to room ${_netRoom} as ${_netSide}`);
  };

  _netWs.onclose = () => {
    _netConnected = false;
    _netPendingIntent = false;
    _netWs = null;
    _netUpdateBadge();
    console.log('[net] Disconnected — reconnecting in 2 s…');
    setTimeout(_netConnect, 2000);
  };

  _netWs.onerror = err => console.error('[net] WebSocket error', err);

  _netWs.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    switch (msg.type) {
      case 'joined':
        // Server sends the current authoritative state on connect.
        _netApplyRemote(msg.state);
        break;
      case 'full':
        // Broadcast from the server after the other player acted.
        _netApplyRemote(msg.state);
        break;
      case 'peerJoined': {
        const peerName = playerNameForSide(msg.side);
        logEvent(`${peerName} connected`);
        renderAll();
        break;
      }
      case 'opponentLeft':
        logEvent(`Opponent disconnected`);
        renderAll();
        break;
      case 'peerView':
        // Lightweight selection update from the other player — update our view of
        // their selection and re-render the board overlays (no full state change).
        state.peerView = msg.peerView;
        renderAll(true);
        break;
      case 'endRoundVotes':
        _endRoundVotes = new Set(msg.votes || []);
        renderAll(true);
        break;
      case 'error':
        console.warn('[net] Server:', msg.reason);
        break;
    }
  };
}

// Send the local selection to the opponent so they see movement cones / overlays.
function netSendPeerView() {
  if (!_netWs || !_netConnected || !_netSide) return;
  _netWs.send(JSON.stringify({
    type: 'peerView',
    peerView: { gid: state.selectedGroupId, si: state.selectedShipIdx, layerToggle: state.layerToggle },
  }));
}

// ---------------------------------------------------------------------------
// Side gating helpers (used by event handlers to block opponent's actions)
// ---------------------------------------------------------------------------

// True when the local player is allowed to act. In local/hotseat mode always
// true. In online mode: true during setup/scenery/deploy (both players manage
// their own side), and during play only when it is this client's activeSide.
function netIsMyTurn() {
  if (!_netSide) return true;                                    // hotseat
  if (state.phase !== 'play') return true;                       // pre-play phases
  if (!state.activeSide) return true;                            // no active side yet
  return _gs() === state.activeSide;
}

// True when a given board side ('player1'|'player2') belongs to this client.
function netIsMySide(side) {
  if (!_netSide) return true;
  return _gs() === side;
}

// ---------------------------------------------------------------------------
// Intent dispatch — the migration path toward server authority.
// ---------------------------------------------------------------------------
// Perform a game action as an intent (see src/engine/gating.js + apply()).
//   Hotseat: validate, mutate the shared state locally, re-render.
//   Online : the server is authoritative — emit the intent and wait for the
//            broadcast of the new state (we do NOT mutate locally here).
// Handlers not yet migrated to dispatch() still mutate state directly and rely
// on netAfterRender()'s full-state relay.
function dispatch(intent) {
  const side = (_netSide ? _gs() : null) || _intentSide(intent);
  if (!_isLegal(state, intent, side)) return;
  if (_netSide) {
    if (_netWs && _netConnected) {
      console.log('%c[intent]', 'color:#4caf50;font-weight:bold', intent.type, intent);
      _netPendingIntent = true;
      _netWs.send(JSON.stringify({ type: 'intent', intent }));
      // Tell the opponent which ship we're acting on so they see movement cones.
      netSendPeerView();
    }
  } else {
    _apply(state, intent, rng);
    renderAll();
    // Bug 4: after a ship action, auto-finish the activation if all ships have acted.
    const autoFinishTriggers = ['moveShip', 'holdPosition', 'fireWeapons', 'launchAsset', 'surveySite'];
    if (autoFinishTriggers.includes(intent.type)) maybeAutoFinish(intent.gid);
  }
}

// Auto-finish a group's activation when every alive on-table ship has both moved
// and either fired or operates on an order that doesn't allow firing.
function maybeAutoFinish(gid) {
  if (!gid) return;
  const grp = state.groups[gid];
  const def = getDef(gid);
  if (!grp || !def || grp.activated || !grp.order) return;
  if (state.attackModal || state.launching || state.aiming) return;
  const aliveOnTable = grp.ships.filter(s => !s.destroyed && !s.offTable);
  if (!aliveOnTable.length) return;
  const allActed = aliveOnTable.every(ship => {
    if (!ship.movedThisRound) return false;
    if (ship.firedThisActivation) return true;
    const si = grp.ships.indexOf(ship);
    const eo = effectiveOrder(def, grp, si);
    return fireLimit(eo, def) <= 0;
  });
  if (allActed) {
    const side = def.side;
    if (_isLegal(state, { type: 'finishActivation', gid }, side)) {
      dispatch({ type: 'finishActivation', gid });
    }
  }
}

// The side performing an intent. Online, the server uses the connection's side;
// locally (hotseat) the operator acts for whichever side the intent concerns —
// an intent targeting a Group belongs to that Group's owner, otherwise it is an
// active-side action (pass / endRound).
// The side performing an intent. Online, the server uses the connection's side;
// locally (hotseat) the operator acts for whichever side the intent concerns —
// an intent targeting a Group belongs to that Group's owner; combat defensive
// decisions belong to the defender (opponent of the attacker); everything else is
// an active-side / attacker action.
function _intentSide(intent) {
  if (intent && intent.gid) { const d = getDef(intent.gid); if (d) return d.side; }
  if (intent && (intent.type === 'deployDone' || intent.type === 'commitScenery' ||
      intent.type === 'confirmNominations' || intent.type === 'confirmProtectNom' ||
      intent.type === 'readySetup' || intent.type === 'unreadySetup')) return intent.side;
  if (intent && intent.type === 'resolveBombardCollateral') {
    const M = state.attackModal;
    const q = M && M.bombardCollateralQueue && M.bombardCollateralQueue[0];
    if (q) return q.side; // the defender removes their own battalions
  }
  if (intent && intent.assetId) {
    const a = (state.launchedAssets || []).find(x => x.id === intent.assetId);
    if (a) return a.side;
  }
  const atk = state.assetActiveSide || state.activeSide;
  const defensive = state.attackModal && intent && (
    intent.type === 'attackFighterReroll' ||
    (intent.type === 'attackReroll' && intent.which === 'save') ||
    (intent.type === 'attackDeclare' && (intent.what === 'shield' || intent.what === 'brace' || intent.what === 'contain'))
  );
  if (defensive) return atk === 'player1' ? 'player2' : atk === 'player2' ? 'player1' : atk;
  return atk;
}

// ---------------------------------------------------------------------------
// Mode selector — full-screen overlay shown at first load (no URL params)
// ---------------------------------------------------------------------------
