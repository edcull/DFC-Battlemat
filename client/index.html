<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0d">
<title>DFC FLEET OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0d; --bg-elev: #11171a; --bg-card: #161e22;
    --bg-card-2: #1a242a;
    --border: #233038; --border-bright: #2f4250;
    --text: #d8e3e8; --text-dim: #7a8a94; --text-mute: #4a5862;
    --ucm: #d4a647; --ucm-dim: #7a5e1f; --ucm-glow: rgba(212,166,71,0.30);
    --shal: #4ad6ff; --shal-dim: #1f6e8c; --shal-glow: rgba(74,214,255,0.25);
    --hull-good: #4ad6ff; --hull-warn: #ffb547; --hull-crit: #ff5252;
    --grid-line: rgba(212,166,71,0.07);
    --grid-line-shal: rgba(74,214,255,0.07);
    --table-bg: #08100f;
    --mono: 'Roboto Mono', ui-monospace, monospace;
    --display: 'Oswald', 'Impact', sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 12px; line-height: 1.4;
    font-feature-settings: "zero" 1; /* slashed zero — distinguishes 0 from 8 */
    background-image:
      radial-gradient(ellipse at top, rgba(74,214,255,0.04), transparent 60%),
      linear-gradient(to bottom, var(--bg), #060a0c);
    user-select: none;
  }

  /* ============== LAYOUT ============== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
  }
  /* During Setup the side panels are hidden; collapse their columns so the board
     area (and the centred scenario overlay) spans the full width. Panels keep
     visibility:hidden (not display:none) so the board stays in its centre track. */
  .app.panels-hidden { grid-template-columns: 0 1fr 0; }
  .app.panels-hidden .panel { visibility: hidden; }
  .topbar {
    grid-column: 1 / -1;
    background: linear-gradient(180deg, #0e1518 0%, #0a1014 100%);
    border-bottom: 1px solid var(--border-bright);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .brand {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .brand .vs { color: var(--text-mute); font-size: 11px; }
  .brand .shal-name { color: var(--shal); }
  .topbar-controls { display: flex; align-items: center; gap: 10px; }
  .btn {
    background: linear-gradient(180deg, #1a242a 0%, #11181c 100%);
    border: 1px solid var(--border-bright);
    color: var(--text); padding: 6px 12px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--ucm-dim); color: var(--ucm); }
  .btn:active { transform: scale(0.96); }
  .btn.shal:hover { border-color: var(--shal-dim); color: var(--shal); }
  .btn-icon {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; border-radius: 3px;
    font-size: 14px;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--border-bright); }
  .round-display {
    font-family: var(--display); font-size: 14px;
    color: var(--text-dim); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .round-display b { color: var(--text); font-weight: 700; }

  /* ============== PHASE NAV ============== */
  .phase-nav {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--display); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .phase-step {
    color: var(--text-mute);
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .phase-step.active {
    color: var(--ucm);
    border-color: var(--ucm-dim);
    background: var(--ucm-glow);
  }
  .phase-step.done { color: var(--text-dim); }
  .phase-arrow { color: var(--text-mute); font-size: 10px; }
  @media (max-width: 1100px) {
    .phase-nav { font-size: 10px; gap: 4px; }
    .phase-step { padding: 3px 5px; }
  }
  @media (max-width: 860px) {
    .phase-nav { display: none; }
  }

  /* ============== SETUP OVERLAY ============== */
  .setup-overlay {
    position: absolute; inset: 0;
    background: rgba(8,16,15,0.93);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; overflow-y: auto; padding: 20px;
  }
  .setup-card {
    width: 100%; max-width: 760px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    margin: auto;
  }
  .setup-header {
    padding: 12px 18px;
    background: linear-gradient(180deg, #142028 0%, #0d171c 100%);
    border-bottom: 1px solid var(--border-bright);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .setup-title {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    margin: 0;
  }
  .setup-sub {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .setup-body { padding: 14px 18px; }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .faction-select {
    display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  @media (min-width: 600px) { .faction-select { grid-template-columns: 1fr 1fr; } }
  .faction-slot .faction-lbl { font-family: var(--display); font-size: 10px; letter-spacing: 2px; margin-bottom: 5px; }
  .faction-opts { display: flex; flex-wrap: wrap; gap: 4px; }
  .faction-btn {
    flex: 1 1 auto; padding: 6px 8px; font-size: 10px; font-family: var(--mono);
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; border-radius: 3px; letter-spacing: 1px;
  }
  .faction-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .faction-btn.sel.ucm { color: var(--ucm); border-color: var(--ucm); background: rgba(212,166,71,0.08); }
  .faction-btn.sel.shal { color: var(--shal); border-color: var(--shal); background: rgba(74,214,255,0.08); }
  .fleet-dropdown {
    width: 100%; padding: 8px 10px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border-bright); border-radius: 4px; font-family: var(--mono);
    font-size: 12px; cursor: pointer;
    color-scheme: dark;
  }
  .fleet-dropdown:hover { border-color: var(--text); }
  /* Theme the native popup list (the selectable items) to match the dark UI. */
  .fleet-dropdown option, .scen-dropdown option {
    background: var(--bg-elev); color: var(--text);
    font-family: var(--mono); font-size: 12px;
  }
  .fleet-dropdown option:checked, .scen-dropdown option:checked {
    background: var(--ucm-dim); color: var(--text);
  }
  .fleet-dropdown option:disabled, .scen-dropdown option:disabled {
    color: var(--text-mute);
  }
  .pl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pl-row .pl-name { flex: 0 0 45%; font-size: 11px; }
  .pl-row .pl-select { flex: 1 1 55%; }
  .ap-section { margin-bottom: 10px; }
  .ap-title { font-family: var(--display); font-size: 11px; letter-spacing: 1px; margin-bottom: 5px; color: var(--text); }
  .ap-ds { margin-bottom: 6px; }
  .ap-ds-name { font-size: 10px; color: var(--text-dim); font-weight: 700; }
  .ap-loc { display: flex; justify-content: space-between; font-size: 10px; padding: 1px 0 1px 8px; font-family: var(--mono); }
  .ap-log { font-size: 10px; color: var(--text-dim); padding: 2px 0; font-family: var(--mono); }
  .init-grid { display: flex; align-items: flex-start; justify-content: center; gap: 16px; margin: 8px 0 14px; }
  .init-slot { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 130px; }
  .init-name { font-family: var(--display); font-size: 11px; letter-spacing: 1px; }
  .init-die { width: 56px; height: 56px; border: 2px solid; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-family: var(--mono); font-size: 28px; font-weight: 700;
    background: var(--bg-elev); }
  .init-vs { color: var(--text-mute); font-size: 11px; font-family: var(--display); letter-spacing: 1px; padding-top: 28px; }
  .init-result { text-align: center; font-family: var(--display); font-size: 14px; letter-spacing: 1px; font-weight: 700; }
  .init-choice { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .init-choice-lbl { font-size: 10px; color: var(--text-dim); text-align: center; margin-bottom: 6px; }
  .init-choice-btns { display: flex; gap: 6px; }
  .init-choice-btns .btn { flex: 1; font-size: 10px; }
  @media (min-width: 600px) {
    .setup-grid { grid-template-columns: 1fr 1fr; }
    .setup-grid .full-width { grid-column: 1 / -1; }
  }
  .scen-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ucm-dim);
    border-radius: 2px;
    padding: 9px 11px 9px 12px;
    position: relative;
    min-height: 96px;
  }
  .scen-row .scen-label {
    font-family: var(--display);
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--text-mute); text-transform: uppercase;
    margin-bottom: 3px;
  }
  .scen-row .scen-helper {
    font-size: 9px; color: var(--text-mute);
    line-height: 1.35; margin-bottom: 6px; font-style: italic;
  }
  .scen-row .scen-name {
    font-family: var(--display);
    font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
    padding-right: 38px;
  }
  .scen-row .scen-short {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px; line-height: 1.4;
  }
  .scen-row .scen-roll {
    position: absolute; top: 8px; right: 10px;
    font-family: var(--display); font-weight: 700;
    font-size: 16px; color: var(--ucm);
    width: 24px; height: 24px;
    display: grid; place-items: center;
    border: 1px solid var(--ucm-dim);
    border-radius: 50%;
    background: rgba(212,166,71,0.07);
  }
  .scen-row .scen-roll.none { color: var(--text-mute); border-color: var(--border); background: transparent; }
  .scen-row .reroll-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    margin-top: 8px;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .reroll-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .scen-controls {
    display: flex; gap: 6px;
    margin-top: 8px;
    align-items: stretch;
  }
  .scen-row .scen-controls .scen-dropdown { flex: 0 0 75%; }
  .scen-row .scen-controls .reroll-btn { flex: 1 1 25%; margin-top: 0; }
  .scen-row .scen-dropdown {
    background: var(--panel); border: 1px solid var(--border-bright);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer; width: 100%;
    color-scheme: dark;
  }
  .scen-row .scen-dropdown:hover { border-color: var(--text); }
  .scen-row .picker-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .picker-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .picker-btn.expanded { color: var(--ucm); border-color: var(--ucm-dim); background: var(--ucm-glow); }

  .scen-picker {
    margin-top: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
  }
  .scen-pick-opt {
    padding: 8px 11px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.08s;
  }
  .scen-pick-opt:last-child { border-bottom: none; }
  .scen-pick-opt:hover { background: var(--bg-card-2); }
  .scen-pick-opt.selected { background: var(--ucm-glow); }
  .scen-pick-opt .pick-d6 {
    font-family: var(--display); font-weight: 700;
    font-size: 13px; color: var(--text-dim);
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .scen-pick-opt.selected .pick-d6 { color: var(--ucm); }
  .scen-pick-opt .pick-d6.none { color: var(--text-mute); }
  .scen-pick-opt .pick-body { flex: 1; min-width: 0; }
  .scen-pick-opt .pick-name {
    font-family: var(--display);
    font-size: 12px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.15;
  }
  .scen-pick-opt.selected .pick-name { color: var(--ucm); }
  .scen-pick-opt .pick-desc {
    font-size: 9.5px; color: var(--text-dim);
    margin-top: 3px; line-height: 1.4;
  }

  .setup-footer {
    padding: 12px 18px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--ucm) 0%, var(--ucm-dim) 100%);
    border: 1px solid var(--ucm);
    color: #021018;
    padding: 8px 20px;
    font-family: var(--display); font-weight: 700;
    font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-finish-act {
    width: 100%; margin-top: 6px;
    background: linear-gradient(180deg, var(--hull-warn) 0%, #b87d1f 100%);
    border: 1px solid var(--hull-warn);
    color: #1a1108;
    padding: 6px 14px;
    font-family: var(--display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-finish-act:hover { filter: brightness(1.12); }
  .btn-finish-act:active { transform: scale(0.99); }
  .am-line { font-size: 12px; margin: 6px 0; line-height: 1.4; }
  .am-shot { font-size: 10px; color: var(--text-dim); margin: 3px 0; padding-left: 6px; border-left: 2px solid var(--hull-crit); }
  .am-step-head { font-family: var(--display); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hull-crit); margin-bottom: 6px; }
  .am-toggle { display: block; font-size: 11px; margin: 4px 0; cursor: pointer; }
  .am-dice { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin: 6px 0; font-size: 13px; }
  .am-die {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 4px; font-family: var(--mono);
    font-weight: 700; font-size: 12px; border: 1px solid var(--border-bright);
    background: var(--bg-card); color: var(--text-mute);
  }
  .am-die.hit { background: rgba(212,166,71,0.18); border-color: var(--ucm); color: var(--ucm); }
  .am-die.crit { background: rgba(255,181,71,0.22); border-color: var(--hull-warn); color: var(--hull-warn); }
  .am-die.miss { opacity: 0.5; }

  .attack-hud {
    position: absolute; bottom: 8px; right: 8px;
    width: 400px; max-height: calc(100% - 16px);
    overflow-y: auto;
    background: rgba(8,16,15,0.93);
    border: 1px solid var(--hull-crit);
    border-radius: 3px;
    padding: 12px 14px;
    backdrop-filter: blur(8px);
    color: var(--text);
    font-size: 12px;
    pointer-events: auto;
    z-index: 10;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
  .attack-hud-title {
    font-family: var(--display); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--hull-crit);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(220,50,50,0.3);
  }
  .attack-hud-footer {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary.shal {
    background: linear-gradient(180deg, var(--shal) 0%, var(--shal-dim) 100%);
    border-color: var(--shal); color: #1a1108;
  }
  .scen-extra-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(255,181,71,0.05);
    border-left: 2px solid var(--hull-warn);
    color: var(--hull-warn);
    font-size: 10px;
    border-radius: 0 2px 2px 0;
  }

  /* ============== DEPLOY HINT BAR ============== */
  .deploy-hint {
    position: absolute; bottom: 12px;
    left: 50%; transform: translateX(-50%);
    background: rgba(8,16,15,0.92);
    border: 1px solid var(--border-bright);
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-align: center;
    backdrop-filter: blur(4px);
    z-index: 10;
    display: flex; align-items: center; gap: 12px;
  }
  .deploy-hint b { color: var(--text); }

  /* Activation HUD — floating action panel bottom-right of the board */
  .act-hud {
    position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
    min-width: 160px; max-width: 220px;
    background: rgba(8,16,15,0.93); backdrop-filter: blur(6px);
    border: 1px solid var(--border-bright); border-radius: 4px;
    padding: 8px 10px; z-index: 40;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    font-family: var(--mono); font-size: 10px;
  }
  .act-hud-title { font-family: var(--display); font-size: 10px; letter-spacing: 0.8px; color: var(--text-mute); margin-bottom: 5px; }
  .act-hud-name  { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

  /* ============== SCENARIO MINI-BANNER (PLAY phase) ============== */
  /* Nomination panel — floats over the left edge of the board, leaves the map accessible */
  .nom-panel {
    position: absolute; top: 8px; left: 8px;
    width: 220px; max-height: calc(100% - 16px);
    background: rgba(8,16,15,0.93); backdrop-filter: blur(6px);
    border: 1px solid var(--border-bright); border-radius: 4px;
    padding: 10px 10px 8px; z-index: 40; overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    font-family: var(--mono); font-size: 10px;
  }
  .nom-panel h3 { font-family: var(--display); font-size: 11px; letter-spacing: 1px; color: var(--text); margin: 0 0 4px; }
  .nom-row-btn {
    width: 100%; text-align: left; background: none;
    border: 1px solid var(--border); border-radius: 3px;
    padding: 5px 7px; margin-top: 5px; cursor: pointer;
    font-family: var(--mono); font-size: 9px; color: var(--text-dim);
    transition: border-color 0.15s, background 0.15s;
  }
  .nom-row-btn:hover { border-color: var(--border-bright); background: rgba(255,255,255,0.03); }
  .nom-row-btn.active { border-color: var(--hull-warn); background: rgba(232,204,64,0.07); color: var(--text); }
  .nom-row-btn .nom-side { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; }
  .nom-row-btn .nom-obj  { font-size: 9.5px; font-weight: 600; }
  .nom-row-btn .nom-sel  { font-size: 8.5px; color: var(--hull-warn); margin-top: 2px; }
  .nom-row-btn .nom-hint { font-size: 8px; color: var(--text-mute); margin-top: 1px; }

  .scen-banner {
    position: absolute; top: 8px; right: 8px;
    background: rgba(8,16,15,0.78);
    border: 1px solid var(--border);
    padding: 5px 9px;
    border-radius: 2px;
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    backdrop-filter: blur(4px);
    max-width: 240px;
    line-height: 1.5;
  }
  .scen-banner b { color: var(--text); }
  .scen-banner .scen-title-mini {
    font-family: var(--display); font-size: 11px;
    color: var(--ucm); letter-spacing: 0.14em;
    text-transform: uppercase;
    display: block; margin-bottom: 2px;
  }

  /* ============== SIDE PANELS ============== */
  .panel {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  .panel.right {
    border-right: none; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; padding: 0;
  }
  .panel.right #detail-panel {
    flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 8px 0;
  }
  #event-log-dock {
    flex: 0 0 auto;
    border-top: 1px solid var(--border-bright);
    background: rgba(8,12,11,0.6);
  }
  .panel-section {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--display);
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-dim); font-weight: 600;
    text-transform: uppercase;
    margin: 0 0 8px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title .count {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-mute);
  }
  .panel-title.ucm { color: var(--ucm); }
  .panel-title.shal { color: var(--shal); }

  /* Group cards in the side panels */
  .ap-chip {
    display: flex; align-items: center; gap: 6px;
    width: calc(100% - 16px);
    margin: 0 8px 8px 8px;
    padding: 6px 10px;
    background: rgba(10,14,13,0.6);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.1s;
  }
  .ap-chip:hover { border-color: var(--text); background: var(--bg-card-2); }
  .group-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 7px 9px;
    margin: 0 8px 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }
  .group-card.ucm { border-left-color: var(--ucm-dim); }
  .group-card.shal { border-left-color: var(--shal-dim); }
  .group-card:hover { background: var(--bg-card-2); }
  .group-card.active { background: #1f2d35; }
  .group-card.active.ucm { border-left-color: var(--ucm); box-shadow: inset 4px 0 12px -8px var(--ucm-glow); }
  .group-card.active.shal { border-left-color: var(--shal); box-shadow: inset 4px 0 12px -8px var(--shal-glow); }
  .group-card.activated { opacity: 0.5; }
  .group-card.off-turn { opacity: 0.4; }
  .group-card.off-turn::after { content: 'WAIT'; position: absolute; top: 4px; right: 6px; font-size: 7px; letter-spacing: 1px; color: var(--text-mute); font-family: var(--mono); }
  .group-card.activation-locked { opacity: 0.35; pointer-events: none; }
  .group-card.activation-locked::after { content: 'LOCKED'; position: absolute; top: 4px; right: 6px; font-size: 7px; letter-spacing: 1px; color: var(--hull-warn); font-family: var(--mono); }
  .group-card.activated::after {
    content: "✓ ACTIVATED";
    display: block;
    font-size: 8px; letter-spacing: 0.15em;
    color: var(--text-mute);
    margin-top: 4px;
  }
  .gc-name {
    font-family: var(--display); font-weight: 600;
    font-size: 13px; letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .gc-role {
    font-size: 9.5px; color: var(--text-dim);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-top: 2px;
  }
  .gc-stats {
    display: flex; gap: 8px; margin-top: 4px;
    font-size: 9.5px; color: var(--text-mute);
  }
  .gc-stats b { color: var(--text-dim); font-weight: 600; }

  .gc-badges {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 4px;
  }
  .gc-badge {
    font-family: var(--mono);
    font-size: 8.5px; font-weight: 700;
    letter-spacing: 0.1em;
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid currentColor;
    line-height: 1.2;
  }
  .gc-badge.vanguard { color: var(--hull-crit); background: rgba(255,82,82,0.08); }
  .gc-badge.direct   { color: var(--hull-warn); background: rgba(255,181,71,0.08); }
  .gc-badge.reserve  { color: var(--text-mute); background: rgba(122,138,148,0.08); }
  .gc-badge.undeployed { color: var(--text-dim); background: rgba(122,138,148,0.08); }
  .gc-badge.ready    { color: #6eca7a; background: rgba(110,202,122,0.10); border-color: #6eca7a; }

  /* ============== BOARD ============== */
  .board-wrap {
    position: relative;
    background: var(--table-bg);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .board-wrap::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  #board {
    width: 100%; height: 100%;
    display: block;
    cursor: default;
  }
  #board.targeting { cursor: crosshair; }

  /* Board overlay HUD */
  .board-hud {
    position: absolute; top: 8px; left: 8px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none;
    font-size: 10px;
  }
  .hud-item {
    background: rgba(8,16,15,0.75);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 2px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    backdrop-filter: blur(4px);
  }
  .hud-item b { color: var(--text); }
  .hud-item.warn { color: var(--hull-warn); border-color: var(--hull-warn); }
  #board3d {
    display: none; position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #board3d:active { cursor: grabbing; }
  .hud-btn {
    pointer-events: auto; cursor: pointer;
    background: rgba(8,16,15,0.85); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono); font-size: 10px;
    padding: 4px 8px; border-radius: 2px; letter-spacing: 0.08em;
    backdrop-filter: blur(4px); text-align: left;
  }
  .hud-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .hud-btn.active { color: var(--shal); border-color: var(--shal-dim); }

  .board-legend {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(8,16,15,0.75);
    border: 1px solid var(--border);
    padding: 6px 8px;
    border-radius: 2px;
    font-size: 9.5px;
    backdrop-filter: blur(4px);
    pointer-events: none;
    max-width: 340px;
  }
  .legend-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
  .legend-swatch {
    width: 12px; height: 12px; border-radius: 2px;
    background: var(--ucm); opacity: 0.4;
  }
  .legend-swatch.scan { background: transparent; border: 1px dashed var(--text-dim); }
  .legend-swatch.arcF { background: rgba(212,166,71,0.25); border: 1px solid var(--ucm-dim); }
  .legend-swatch.arcS { background: rgba(122,138,148,0.20); border: 1px solid var(--text-mute); }
  .legend-swatch.arcFN { background: rgba(255,181,71,0.30); border: 1px solid var(--hull-warn); }

  /* ============== RIGHT PANEL — Selected Group Detail ============== */
  .detail-name {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 2px 0; line-height: 1;
  }
  .detail-name.ucm { color: var(--ucm); }
  .detail-name.shal { color: var(--shal); }
  .detail-role {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  .stat-cell {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 4px 6px;
    border-radius: 2px;
    text-align: center;
  }
  .stat-cell .lbl {
    font-size: 8px; letter-spacing: 0.14em;
    color: var(--text-mute); text-transform: uppercase;
  }
  .stat-cell .val {
    font-family: var(--display); font-weight: 600;
    font-size: 14px; color: var(--text);
    line-height: 1.2;
  }
  .weapons-list { margin-top: 6px; }
  .weapon-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 5px 7px;
    border-radius: 2px;
    margin-bottom: 4px;
    font-size: 10px;
  }
  .weapon-row[data-weapon-target]:hover,
  .weapon-row[data-da-fire]:hover { border-color: var(--hull-crit); background: var(--bg-card-2); }
  .weapon-row.weapon-locked { border-color: var(--hull-crit); background: rgba(255,82,82,0.07); }
  .weapon-row.weapon-aiming { border-color: var(--hull-crit); box-shadow: 0 0 0 1px var(--hull-crit); }
  .weapon-name {
    font-weight: 600; color: var(--text);
    letter-spacing: 0.03em;
  }
  .weapon-stats {
    color: var(--text-dim); font-size: 9.5px;
    margin-top: 1px;
  }
  .weapon-special {
    color: var(--text-mute); font-size: 9px;
    font-style: italic; margin-top: 1px;
  }

  /* Order selector */
  .orders {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    margin-top: 6px;
  }
  .order-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 4px;
    font-family: var(--mono); font-size: 10px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.05em;
    transition: all 0.1s;
    text-align: center;
  }
  .order-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .order-btn.active {
    background: linear-gradient(180deg, #1f3a47 0%, #143040 100%);
    border-color: var(--ucm-dim);
    color: var(--ucm);
  }
  .order-btn.active.shal {
    background: linear-gradient(180deg, #3a2e15 0%, #2a200c 100%);
    border-color: var(--shal-dim);
    color: var(--shal);
  }
  .order-info {
    background: var(--bg-card);
    border-left: 2px solid var(--border-bright);
    padding: 6px 8px;
    margin-top: 6px;
    font-size: 9.5px;
    color: var(--text-dim);
    border-radius: 0 2px 2px 0;
  }
  .order-info b { color: var(--text); }
  .order-info .neg { color: var(--hull-crit); }
  .order-info .spk { color: var(--hull-warn); }

  /* Ship sub-list inside group card */
  .ship-list { margin-top: 6px; }
  .ship-row {
    display: flex; align-items: center;
    gap: 6px;
    padding: 4px 0;
    border-top: 1px dashed var(--border);
    font-size: 10px;
  }
  .ship-row:first-child { border-top: none; }
  .ship-row .ship-idx {
    font-size: 9px; color: var(--text-mute);
    width: 16px;
  }
  .ship-row .ship-nm { flex: 1; }
  .ship-row .ship-hp {
    font-family: var(--display);
    font-size: 11px; font-weight: 600;
    color: var(--hull-good);
    min-width: 36px; text-align: right;
  }
  .ship-row .ship-hp.warn { color: var(--hull-warn); }
  .ship-row .ship-hp.crit { color: var(--hull-crit); }
  .ship-row .ship-hp.dead { color: var(--text-mute); text-decoration: line-through; }
  .ship-row .hp-btns { display: flex; gap: 2px; }
  .ship-row .hp-btn {
    width: 20px; height: 20px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer; border-radius: 2px;
    font-size: 12px; line-height: 1;
  }
  .ship-row .hp-btn:hover { color: var(--text); }

  /* Generic hp-btn (used outside ship rows, e.g. launch counters) */
  .hp-btn {
    width: 20px; height: 20px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer; border-radius: 2px;
    font-size: 12px; line-height: 1;
  }
  .hp-btn:hover:not(:disabled) { color: var(--text); }
  .hp-btn:disabled { opacity: 0.35; cursor: default; }
  .launch-counter { margin-top: 6px; padding: 6px; background: var(--bg-elev); border-radius: 3px; }
  .launch-counter .lc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .launch-counter .lc-lbl { flex: 1; font-size: 10px; color: var(--text-dim); }
  .launch-counter .lc-val { min-width: 18px; text-align: center; font-family: var(--mono); font-weight: 700; font-size: 12px; }
  .bat-counts { display: flex; gap: 10px; margin-top: 4px; }
  .bat-loc-label { font-size: 9px; letter-spacing: 1px; color: var(--text-mute); text-transform: uppercase; }
  .bat-side { display: flex; align-items: center; gap: 4px; font-size: 8.5px; color: var(--text-mute); letter-spacing: 1px; }
  .bat-side b { font-family: var(--mono); font-size: 12px; min-width: 12px; text-align: center; }

  .empty-state {
    padding: 16px;
    text-align: center;
    color: var(--text-mute);
    font-size: 10.5px;
    font-style: italic;
  }

  /* Spike control */
  .spike-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 2px;
  }
  .spike-row .label {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .spike-row .spike-controls {
    display: flex; align-items: center; gap: 4px;
  }
  .spike-val {
    font-family: var(--display); font-weight: 700;
    font-size: 16px;
    min-width: 18px; text-align: center;
    color: var(--text);
  }
  .spike-val.warn { color: var(--hull-warn); }
  .spike-val.max { color: var(--hull-crit); }
  .spike-btn {
    width: 22px; height: 22px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer; border-radius: 2px;
    font-size: 13px; line-height: 1;
  }
  .spike-btn:hover { color: var(--text); }

  /* Move/turn controls */
  .move-controls {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 6px;
  }
  .move-status {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 5px 8px;
    border-radius: 2px;
    font-size: 10px;
    display: flex; justify-content: space-between;
    color: var(--text-dim);
  }
  .move-status b { color: var(--text); font-weight: 600; }
  .move-status.ok b { color: var(--hull-good); }
  .move-status.warn b { color: var(--hull-warn); }
  .move-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
  }
  .turn-controls {
    display: flex; gap: 4px;
  }
  .turn-btn {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 4px;
    cursor: pointer; border-radius: 2px;
    font-size: 11px;
    font-family: var(--mono);
  }
  .turn-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .turn-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Selected ship marker */
  .help-tip {
    background: var(--bg-card);
    border-left: 2px solid var(--ucm-dim);
    padding: 6px 8px;
    margin-top: 6px;
    font-size: 9.5px;
    color: var(--text-dim);
    font-style: italic;
  }
  .help-tip.shal { border-left-color: var(--shal-dim); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

  /* Small screens */
  @media (max-width: 1100px) {
    .app { grid-template-columns: 200px 1fr 240px; }
  }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 48px 1fr; }
    .panel { display: none; }
    .panel.mobile-visible { display: block; position: fixed; top: 48px; bottom: 0; width: 80%; z-index: 100; }
    .panel.left.mobile-visible { left: 0; border-right: 1px solid var(--border); }
    .panel.right.mobile-visible { right: 0; border-left: 1px solid var(--border); }
  }
</style>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span id="brand-red">UCMF</span>
      <span class="vs">VS</span>
      <span class="shal-name" id="brand-blue">SHALTARI</span>
    </div>
    <nav class="phase-nav" id="phase-nav">
      <span class="phase-step active" data-phase="setup">1 · SETUP</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="scenery">2 · SCENERY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="nominations">3 · SECONDARIES</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="deploy">4 · DEPLOY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="play">5 · PLAY</span>
    </nav>
    <div class="topbar-controls" id="topbar-controls">
      <!-- populated by renderTopbarControls() -->
    </div>
  </header>

  <aside class="panel left" id="panel-left">
    <div class="panel-section">
      <div class="panel-title shal" id="shal-title">FLEET <span class="count" id="shal-count"></span></div>
      <div id="shal-groups"></div>
    </div>
    <div class="panel-section" style="margin-top:14px;">
      <div class="panel-title ucm" id="ucm-title">FLEET <span class="count" id="ucm-count"></span></div>
      <div id="ucm-groups"></div>
    </div>
  </aside>

  <main class="board-wrap">
    <svg id="board" viewBox="0 0 576 576" preserveAspectRatio="xMidYMid meet"></svg>
    <canvas id="board3d"></canvas>
    <div class="board-hud">
      <div class="hud-item" id="hud-active">SELECT A GROUP →</div>
      <div class="hud-item" id="hud-turn-info" style="display:none;"></div>
      <button class="hud-item hud-btn" id="btn-3d-toggle">3D VIEW</button>
    </div>
    <div class="board-legend">
      <div class="legend-row">
        <div class="legend-item"><span class="legend-swatch scan"></span>Scan</div>
        <div class="legend-item"><span class="legend-swatch arcF"></span>F arc (90°)</div>
        <div class="legend-item"><span class="legend-swatch arcS"></span>S arc</div>
        <div class="legend-item"><span class="legend-swatch arcFN"></span>FN/RN (22°)</div>
      </div>
    </div>
  </main>

  <aside class="panel right" id="panel-right">
    <div id="detail-panel">
      <div class="empty-state">
        Click a Group in the left panel,<br>
        then click a Ship on the board<br>
        to issue movement orders.
      </div>
    </div>
    <div id="event-log-dock"></div>
  </aside>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
  }
}
</script>
<script type="module">
// ─── ENGINE IMPORTS ──────────────────────────────────────────────────────────
import {
  UCM_FLEET, SHAL_FLEET, PHR_FLEET, RESISTANCE_FLEET, SCOURGE_FLEET, BIOFICER_FLEET,
  FACTIONS, ORDERS, INCH, BOARD_IN, BOARD_PX,
  DROPSITE_BASE, FEATURES, ds, LAYOUTS, DEPLOYMENTS,
  APPROACH_BEHAVIOURS, APPROACHES, VARIANTS,
  SECONDARY_OBJECTIVES, OBJECTIVES, ASSET_PROFILES
} from '../src/engine/constants.js';

import { localRng as _rng, rollD6 as _rollD6, rollDie as _rollDie } from '../src/engine/rng.js';

import { findShipDef, ADMIRAL_FACTION_ABILITIES, FAMOUS_ADMIRAL_ABILITIES, FACTION_ADMIRAL_TITLES, FACTION_ADMIRAL_PERSONAL, SHIP_SPECIAL_RULES } from '../src/fleet/db.js';

import {
  createState,
  buildSideFleet as _buildSideFleet, fleetForSide as _fleetForSide,
  redFleet as _redFleet, blueFleet as _blueFleet, factionName as _factionName,
  fleetHasPayloads, sideHasPayloads as _sideHasPayloads,
  payloadsReady as _payloadsReady, allPayloadsReady as _allPayloadsReady,
  porterShips as _porterShips, payloadShips as _payloadShips,
  porterUsed as _porterUsed, payloadAttached,
  detachedReattachCandidates as _detachedReattachCandidates,

// Lighten a hex colour by mixing it toward white by `amount` (0–1).
function _lightenHex(hex, amount) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);

function renderEventLog() {
  const dock = document.getElementById('event-log-dock');
  if (!dock) return;
  const isOnline = !!_netRoom;
  const netPrefix = isOnline
    ? `<span id="log-net-room" style="font-size:8px;font-family:var(--mono);color:var(--text-mute);letter-spacing:0.06em;">${_netRoom}</span>` +
      `<span id="log-net-dot" style="width:6px;height:6px;border-radius:50%;background:${_netConnected ? '#4ad66d' : '#ff5252'};display:inline-block;flex-shrink:0;"></span>`
    : '';
  dock.style.display = '';
  if (state.phase !== 'play') {
    dock.innerHTML = `<div style="display:flex;align-items:center;gap:6px;padding:6px 11px;font-family:var(--mono);">
      ${netPrefix}
      <span style="font-size:8px;letter-spacing:0.14em;color:var(--text-mute);">EVENT LOG</span>
    </div>`;
    return;
  }
  const log = state.eventLog || [];
  const expanded = !!state.logExpanded;
  const shown = expanded ? log.slice().reverse() : log.slice(-3).reverse();
  const rows = shown.length
    ? shown.map(e => `<div style="padding:3px 11px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:7px;font-size:9.5px;font-family:var(--mono);">
        <span style="color:var(--text-mute);flex-shrink:0;">R${e.round}</span>
        <span style="color:var(--text-dim);">${e.text}</span></div>`).join('')
    : `<div style="padding:6px 11px;color:var(--text-mute);font-size:9.5px;font-family:var(--mono);">No events yet.</div>`;
  dock.innerHTML = `
    <button id="event-log-toggle" style="display:flex;align-items:center;gap:6px;width:100%;text-align:left;
      background:rgba(255,255,255,0.03);border:none;border-bottom:1px solid var(--border);padding:6px 11px;cursor:pointer;font-family:var(--mono);">
      ${netPrefix}
      <span style="font-size:8px;letter-spacing:0.14em;color:var(--text-mute);">EVENT LOG</span>
      <span style="color:var(--text-mute);font-size:8px;">${log.length}</span>
      <span style="margin-left:auto;color:var(--text-mute);font-size:10px;">${expanded ? '▾ collapse' : '▴ expand'}</span>
    </button>
    <div id="event-log-body" style="${expanded ? 'max-height:240px;' : 'max-height:none;'}overflow-y:auto;">${rows}</div>`;
  const toggle = dock.querySelector('#event-log-toggle');
  if (toggle) toggle.addEventListener('click', () => { state.logExpanded = !state.logExpanded; renderEventLog(); });
  const body = dock.querySelector('#event-log-body');
  if (expanded && body) body.scrollTop = 0;
}

/* Transient VP-award toast, stacked at top-centre of the board. */
function notifyVP(side, vp, reason) {
  const board = document.querySelector('.board-wrap');
  if (!board) return;
  let tray = document.getElementById('vp-toasts');
  if (!tray) {
    tray = document.createElement('div');
    tray.id = 'vp-toasts';
    tray.style.cssText = 'position:absolute;top:46px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;';
    board.appendChild(tray);
  }
  const t = document.createElement('div');
  t.style.cssText = `background:rgba(10,14,13,0.94);border:1px solid var(--${side});border-left:4px solid var(--${side});border-radius:5px;padding:7px 13px;font-family:var(--mono);font-size:11px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.5);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;`;
  t.innerHTML = `<b style="color:var(--${side})">${playerNameForSide(side)}</b> <b style="color:${vp>=0?'var(--hull-good,#6ec97a)':'var(--hull-crit)'}">${vp>=0?'+':''}${vp} VP</b> <span style="color:var(--text-mute)">· ${reason}</span>`;
  tray.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateY(0)'; });
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-6px)'; setTimeout(() => t.remove(), 250); }, 3400);
}

function renderDropsite(d) {
  const cx = inchToPx(d.x), cy = inchToPx(d.y);
  const base = d.base;
  const isStation = base.category === 'station';
  const stationDiaIn = { small: 30/25.4, medium: 40/25.4, large: 50/25.4 };
  const citySizeMap  = { small: INCH * 1.0, medium: INCH * 1.25, large: INCH * 1.5 };
  const r = isStation
    ? (stationDiaIn[base.size] * INCH) / 2
    : citySizeMap[base.size];
  const ringCol = isStation ? '#a8b4bc' : '#7ec8ff';
  const fillCol = isStation ? 'rgba(168,180,188,0.10)' : 'rgba(126,200,255,0.10)';
  let html = `<g class="dropsite" data-dropsite="${d.id}" style="cursor:pointer;">`;
  if (isStation) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
  } else {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.6}" fill="none" stroke="${ringCol}" stroke-width="0.6" opacity="0.6"/>`;
  }
  if (state.selectedDropsiteId === d.id) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r + 4}" fill="none"
              stroke="${ringCol}" stroke-width="1.4" stroke-dasharray="3 2"/>`;
  }
  // Dropsite Activation: highlight dropsites the active player can click to activate
  const _da = state.dropsiteActivation;
  if (_da && !_da.dsId && dropsiteController(d) === _da.side && !_da.done.includes(d.id)) {
    const hlCol = _da.side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
    html += `<circle cx="${cx}" cy="${cy}" r="${r + 6}" fill="none"
              stroke="${hlCol}" stroke-width="1.8" stroke-dasharray="4 2" opacity="0.8"/>
             <circle cx="${cx}" cy="${cy}" r="${r}" fill="${_da.side === 'player1' ? 'rgba(74,214,255,0.08)' : 'rgba(212,166,71,0.08)'}"/>`;
  }
  // Show activating dropsite with solid glow
  if (_da && _da.dsId === d.id) {
    const hlCol = _da.side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
    html += `<circle cx="${cx}" cy="${cy}" r="${r + 5}" fill="none" stroke="${hlCol}" stroke-width="2"/>`;
  }
  const sizeLetter = base.size === 'small' ? 'S' : base.size === 'medium' ? 'M' : 'L';
  html += `<text x="${cx}" y="${cy + 1}" font-family="var(--display)" font-size="${r * 0.7}"
            font-weight="700" fill="${ringCol}" text-anchor="middle" dominant-baseline="middle"
            pointer-events="none">${sizeLetter}</text>`;
  // All objective/status icons stacked BELOW the circle.
  // Use a running y-offset so icons never overlap regardless of which are shown.
  {
    let iy = cy + r + 4; // start just below the circle (hull bar uses +3 to +5)
    const iline = (markup, h = 11) => { html += markup; iy += h; };

    // Hull damage bar (keep at fixed offset, then advance iy past it)
    if (d.damage > 0 && d.damage < d.maxHull) {
      const pct = (d.maxHull - d.damage) / d.maxHull;
      const barCol = pct <= 0.5 ? 'var(--hull-warn)' : 'var(--hull-good)';
      html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2}" height="2" fill="var(--bg)" opacity="0.6"/>`;
      html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2*pct}" height="2" fill="${barCol}"/>`;
      iy = cy + r + 10;
    }

    // Recon Ops ⬆N
    if (d.reconOps > 0) {
      iline(`<text x="${cx}" y="${iy}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">⬆${d.reconOps}</text>`);
    }

    // Secondary objective nomination stars ★
    if (state.secondaryNominations) {
      const nomSides = [['player1','ucm'],['player2','shal']].filter(([sd]) => {
        const noms = state.secondaryNominations[sd] || {};
        return Object.keys(noms).some(k => noms[k] && noms[k].dsId === d.id);
      });
      if (nomSides.length) {
        const starX = nomSides.map(([, cssKey], i) => `<text x="${cx - 5 + i * 10}" y="${iy}" font-size="9" fill="var(--${cssKey})" text-anchor="middle" pointer-events="none">★</text>`).join('');
        iline(starX);
      }
    }

    // Survey markers ⌖
    if (d.surveyedBy && d.surveyedBy.length) {
      const markers = d.surveyedBy.map((sd, i) => `<text x="${cx - 6 + i*12}" y="${iy}" font-size="9" fill="var(--${sd})" text-anchor="middle" pointer-events="none">⌖</text>`).join('');
      iline(markers);
    }

    // Protect nomination shield 🛡
    if (state.protectNom) {
      const shields = [['player1','ucm'],['player2','shal']].filter(([sd]) => state.protectNom[sd] === d.id);
      if (shields.length) {
        iline(shields.map(([, cssKey], i) => `<text x="${cx - 5 + i*10}" y="${iy}" font-size="10" fill="var(--${cssKey})" text-anchor="middle" pointer-events="none">🛡</text>`).join(''));
      }
    }
  }
  const daActive = state.dropsiteActivation && state.dropsiteActivation.dsId === d.id && !state.launching && !state.featureAttack;
  if (d.features && d.features.length) {
    d.features.forEach((fkey, fi) => {
      const f = FEATURES[fkey];
      const angle = (Math.PI * 2 / d.features.length) * fi - Math.PI / 2;
      const fr = r + 8;
      const fx = cx + Math.cos(angle) * fr;
      const fy = cy + Math.sin(angle) * fr;
      const fcol = f.color || ringCol;
      const dead = (d.destroyedFeatures || []).includes(fi);
      const usable = daActive && !dead && (f.weapon || (f.launch && f.launch.length));
      const fired = f.weapon && (d.firedFeatures || []).includes(fi);
      if (usable) {
        html += `<circle data-da-feat="${d.id}|${fi}" cx="${fx}" cy="${fy}" r="9"
          fill="rgba(255,255,255,0.04)" stroke="${fired?'var(--text-mute)':fcol}" stroke-width="1"
          stroke-dasharray="${fired?'2 2':'none'}" style="cursor:pointer;${fired?'opacity:0.5;':''}"/>`;
        html += `<text x="${fx + 7}" y="${fy - 6}" font-size="7" fill="${f.weapon?'var(--hull-crit)':fcol}" text-anchor="middle" pointer-events="none">${f.weapon?(fired?'✓':'⚔'):'⊕'}</text>`;
      }
      html += `<text x="${fx}" y="${fy + 1}" font-family="var(--mono)" font-size="9" font-weight="700"
                fill="${dead?'var(--text-mute)':fcol}" text-anchor="middle" dominant-baseline="middle"
                pointer-events="none" ${dead?'opacity="0.4"':''}>${f.glyph}</text>`;
    });
  }
  if (d.damage > 0 && d.damage < d.maxHull) {
    const pct = (d.maxHull - d.damage) / d.maxHull;
    const barCol = pct <= 0.5 ? 'var(--hull-warn)' : 'var(--hull-good)';
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2}" height="2" fill="var(--bg)" opacity="0.6"/>`;
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2*pct}" height="2" fill="${barCol}"/>`;
  }
  html += `</g>`;
  return html;
}

function renderStaticScenery() {
  if (!state.scenarioData) return '';
  let html = '';
  (state.scenarioData.rings || []).forEach(ring => {
    if (ring.axis === 'horizontal') {
      const y = inchToPx(ring.y);
      html += `<line x1="0" y1="${y}" x2="${BOARD_PX}" y2="${y}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="6" y="${y - 3}" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    } else {
      const x = inchToPx(ring.x);
      html += `<line x1="${x}" y1="0" x2="${x}" y2="${BOARD_PX}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="${x + 4}" y="14" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    }
  });
  (state.scenarioData.largeObjects || []).forEach(obj => {
    const cx = inchToPx(obj.x), cy = inchToPx(obj.y), r = inchToPx(obj.diameter / 2);
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#4a5560"
              stroke="#7a8a94" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.4}" fill="#5a6670"/>`;
  });
  const sceneryPiece = (s, ghost) => {
    const cx = inchToPx(s.x), cy = inchToPx(s.y);
    const w = inchToPx(6), h = inchToPx(3);
    const angle = s.angle || 0;
    const isMicro = s.type === 'micrometeor';
    const fill = isMicro ? 'rgba(120,180,230,0.16)' : 'rgba(225,120,90,0.16)';
    const stroke = isMicro ? 'rgba(150,200,240,0.8)' : 'rgba(235,140,100,0.85)';
    const op = ghost ? 0.5 : 1;
    const label = isMicro ? 'MICROMETEOR' : 'DENSE FIELD';
    let g = `<g transform="translate(${cx},${cy}) rotate(${angle})" opacity="${op}" ${ghost?'pointer-events="none"':`data-scenery-idx="${s._idx}" style="cursor:pointer;"`}>
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="${h*0.4}"
        fill="${fill}" stroke="${stroke}" stroke-width="1.2" stroke-dasharray="${isMicro?'':'4 3'}"/>`;
    for (let i = 0; i < 7; i++) {
      const dx = (Math.sin(i*2.3)*0.42)*w, dy = (Math.cos(i*1.7)*0.34)*h;
      g += `<circle cx="${dx}" cy="${dy}" r="${isMicro?1.5:2}" fill="${stroke}" opacity="0.5"/>`;
    }
    g += `<text x="0" y="${-h/2 - 3}" font-family="var(--mono)" font-size="6.5" font-weight="700"
            fill="${stroke}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke">${label}</text>`;
    g += `</g>`;
    return g;
  };
  (state.scenarioData.placedScenery || []).forEach((s, i) => {
    html += sceneryPiece(Object.assign({ _idx: i }, s), false);
  });
  if (state.phase === 'scenery' && state.sceneryPlace) {
    const sp = state.sceneryPlace;
    if (sp.pending) {
      html += sceneryPiece({ type: sp.type, x: sp.pending.x / INCH, y: sp.pending.y / INCH, angle: sp.angle || 0 }, true);
      const cx = sp.pending.x, cy = sp.pending.y;
      const v = headingVec(sp.angle || 0);
      html += `<line x1="${cx}" y1="${cy}" x2="${cx + v.x*inchToPx(5)}" y2="${cy + v.y*inchToPx(5)}" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="3 3"/>`;
    } else if (state.hoverPoint) {
      const v = sceneryValid(sp.type, state.hoverPoint.x / INCH, state.hoverPoint.y / INCH);
      const piece = sceneryPiece({ type: sp.type, x: state.hoverPoint.x / INCH, y: state.hoverPoint.y / INCH, angle: 0 }, true);
      html += v.ok ? piece : piece.replace('opacity="0.5"', 'opacity="0.35"') +
        `<circle cx="${state.hoverPoint.x}" cy="${state.hoverPoint.y}" r="5" fill="none" stroke="var(--hull-crit)" stroke-width="1.5"/>`;
    }
  }
  return html;
}

/* Render deployment zones on the board (always-on after setup) */
function renderDeploymentZones() {
  if (!state.scenario) return '';
  const dep = DEPLOYMENTS[state.scenario.deployment];
  if (!dep) return '';
  // Determine which color belongs to each physical zone based on deployZone assignment.
  const dz = state.deployZone || { player1: 'south', player2: 'north' };
  const northSide = dz.player1 === 'north' ? 'player1' : 'player2';
  const southSide = dz.player1 === 'south' ? 'player1' : 'player2';
  let html = `<g class="deploy-zones">`;
  html += renderZone(dep.zones.north, sideRgba(northSide, 0.10), sideRgba(northSide, 0.55));
  html += renderZone(dep.zones.south, sideRgba(southSide, 0.10), sideRgba(southSide, 0.55));
  html += `</g>`;
  return html;
}

function renderAssetPhase() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('asset-overlay');
  if (overlay) overlay.remove();
  let banner = document.getElementById('asset-move-banner');
  if (banner) banner.remove();
  const prevHud = document.getElementById('asset-phase-hud');
  if (prevHud) prevHud.remove();
  if (!state.assetPhase) return;

  const ap = state.assetPhase;
  const sideName = (s) => playerNameForSide(s);

  if (ap.step === 'assets') {
    // Pending bomber/torpedo attacks flagged by the server — resolve client-side then re-render.
    if (ap._pendingBomberResolve && (!_netSide || _gs() === ap._pendingBomberResolve.side)) {
      const pbr = ap._pendingBomberResolve;
      ap._pendingBomberResolve = null;
      resolvePendingBomberAttacks(pbr.side, pbr.type);
      renderAll();
      return;
    }

    banner = document.createElement('div');
    banner.id = 'asset-move-banner';
    banner.className = 'deploy-hint';
    const typeLabel = { fighter: 'Fighters', bomber: 'Bombers & Fire Ships', torpedo: 'Torpedoes' }[ap.assetType] || 'Assets';
    const myTurn = !_netSide || !state.assetActiveSide || _gs() === state.assetActiveSide;
    const mySide = _netSide ? _gs() : null;
    let msg, footer;

    if (!state.assetActiveSide) {
      // All stages done — both players must confirm.
      const doneSides = ap.doneSides || [];
      if (!_netSide) {
        // Hotseat: show a confirm button per side.
        const p1Done = doneSides.includes('player1'), p2Done = doneSides.includes('player2');
        msg = `<span><b>Asset Combat complete.</b> Both players confirm to advance.</span>`;
        footer = `${!p1Done
          ? `<button class="btn-primary" id="apd-p1" style="padding:5px 12px;font-size:10px;">${playerNameForSide('player1')} DONE →</button>`
          : `<span style="color:var(--hull-good);font-size:10px;padding:0 6px;">✓ ${playerNameForSide('player1')}</span>`}
          ${!p2Done
          ? `<button class="btn-primary" id="apd-p2" style="padding:5px 12px;font-size:10px;">${playerNameForSide('player2')} DONE →</button>`
          : `<span style="color:var(--hull-good);font-size:10px;padding:0 6px;">✓ ${playerNameForSide('player2')}</span>`}`;
      } else if (doneSides.includes(mySide)) {
        msg = `<span><b>Asset Combat complete.</b> Waiting for <b>${playerNameForSide(mySide === 'player1' ? 'player2' : 'player1')}</b> to confirm…</span>`;
        footer = '';
      } else {
        msg = `<span><b>Asset Combat complete.</b>${doneSides.length ? ` <b style="color:var(--hull-good)">Opponent confirmed.</b>` : ''} Confirm when ready.</span>`;
        footer = `<button class="btn-primary" id="asset-move-done" style="padding:5px 14px;font-size:11px;">DONE →</button>`;
      }
    } else if (!myTurn) {
      msg = `<span>Waiting for <b style="color:var(--${sideCssKey(state.assetActiveSide)})">${playerNameForSide(state.assetActiveSide)}</b> to activate ${typeLabel}…</span>`;
      footer = '';
    } else if (state.assetMove) {
      const a = state.launchedAssets.find(x => x.id === state.assetMove.id);
      const thr = a ? (a.t2t && a._t2tRange ? a._t2tRange : assetThrust(a)) : 0;
      let hint;
      if (a && !a.moved) {
        if (a.kind === 'fighter') hint = `click a destination ≤<b>${thr}"</b> · move onto an enemy Wing to dogfight`;
        else if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') hint = `click a destination ≤<b>${thr}"</b> · click an enemy ship to fly in & lock it`;
        else hint = `click a destination ≤<b>${thr}"</b>`;
      } else hint = 'use the right panel';
      msg = `<span><b style="color:var(--${sideCssKey(a?a.side:'player1')})">${a?a.kind:''}</b> selected — ${hint} →</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} →</button>`;
    } else {
      msg = `<span><b style="color:var(--${sideCssKey(state.assetActiveSide)})">${playerNameForSide(state.assetActiveSide)}</b> activates <b>${typeLabel}</b> · click one on the board to move it.</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} →</button>`;
    }
    banner.innerHTML = `${msg}${footer}`;
    board.appendChild(banner);

    // "DONE WITH [TYPE]" — server-authoritative stage advance.
    const fb = banner.querySelector('#asset-finish-stage');
    if (fb) fb.addEventListener('click', () => {
      dispatch({ type: 'assetStageDone', side: state.assetActiveSide, type: ap.assetType });
      renderAll();
    });

    // "DONE →" — online: this player confirms all assets done.
    const db = banner.querySelector('#asset-move-done');
    if (db) db.addEventListener('click', () => {
      if (anyPendingBomberAttacks()) { state.assetMove = null; resolvePendingBomberAttacks(); renderAll(); return; }
      dispatch({ type: 'assetPhaseDone', side: _gs() });
      renderAll();
    });

    // Hotseat per-side confirm buttons.
    const p1Btn = banner.querySelector('#apd-p1');
    if (p1Btn) p1Btn.addEventListener('click', () => { dispatch({ type: 'assetPhaseDone', side: 'player1' }); renderAll(); });
    const p2Btn = banner.querySelector('#apd-p2');
    if (p2Btn) p2Btn.addEventListener('click', () => { dispatch({ type: 'assetPhaseDone', side: 'player2' }); renderAll(); });

    return;
  }

  const bc = state.battalionCombat;
  const initSide = state.initiativeHolder || 'player1';
  const otherSide = initSide === 'player1' ? 'player2' : 'player1';

  const battSummaryFor = (hlId) => {
    let h = '';
    if (state.scenarioData && state.scenarioData.dropsites) {
      state.scenarioData.dropsites.forEach(ds => {
        const b = dsBattalions(ds);
        const rows = Object.keys(b).filter(k => (b[k].player1||0)+(b[k].player2||0) > 0);
        if (!rows.length) return;
        const hl = ds.id === hlId ? ' style="outline:1px solid var(--ucm);border-radius:3px;padding:3px;"' : '';
        h += `<div class="ap-ds"${hl}><div class="ap-ds-name">${ds.base.name}${dropsiteContested(ds)?' <span style="color:var(--hull-warn);font-size:8px;">CONTESTED</span>':''}</div>`;
        rows.forEach(k => {
          const loc = b[k];
          h += `<div class="ap-loc"><span>${locDisplayName(ds, k)}</span>
            <span><b style="color:var(--ucm)">${loc.player1||0}</b> · <b style="color:var(--shal)">${loc.player2||0}</b></span></div>`;
        });
        h += `</div>`;
      });
    }
    return h || `<div style="color:var(--text-mute);font-style:italic;font-size:10px;">No battalions on any dropsite.</div>`;
  };

  if (bc) {
    const ds = bc.dsId ? state.scenarioData.dropsites.find(d => d.id === bc.dsId) : null;
    let bodyHTML = '', footerHTML = '';
    const logHTML = (bc.log && bc.log.length)
      ? `<div class="ap-section"><div class="ap-log" style="color:var(--text-dim)">${bc.log.slice(-5).join('<br>')}</div></div>` : '';

    if (bc.stage === 'pick') {
      const contested = contestedDropsites();
      if (!contested.length) {
        bodyHTML = `<div class="ap-section"><div class="ap-log" style="color:var(--text-mute)">No more contested dropsites — Battalion Combat complete.</div></div>`;
        footerHTML = `<button class="btn-primary" id="bc-to-destroy">CONTINUE →</button>`;
      } else {
        bodyHTML = `<div class="ap-section"><div class="ap-title">${sideName(initSide)} (1st initiative) — pick a contested dropsite</div>` +
          contested.map(d => `<button class="btn" data-bc-pick="${d.id}" style="width:100%;margin-bottom:3px;">
            ${d.base.name} <span style="color:var(--text-mute)">(${sideName('player1')} ${dsSideBattalions(d,'player1')} · ${sideName('player2')} ${dsSideBattalions(d,'player2')})</span></button>`).join('') +
          `</div>`;
        footerHTML = `<button class="btn" id="bc-to-destroy">SKIP REMAINING →</button>`;
      }
    } else if (bc.stage === 'init' || bc.stage === 'other') {
      const actor = bc.stage === 'init' ? initSide : otherSide;
      const enemy = actor === 'player1' ? 'player2' : 'player1';
      const feats = enemyFeatures(ds, actor);
      const myGround = dsBattalions(ds).ground[actor] || 0;
      bodyHTML = `<div class="ap-section">
        <div class="ap-title">${ds.base.name} — ${sideName(actor)} assigns ground battalions</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">
          ${sideName(actor)} has <b style="color:var(--${sideCssKey(actor)})">${myGround}</b> battalion${myGround!==1?'s':''} on the dropsite ground.
          ${(myGround>0 && feats.length) ? 'Pick one enemy-held Feature to attack (1-for-1), or skip.' : (myGround<=0 ? 'No ground battalions to assign.' : 'No enemy-held Features.')}
        </div>`;
      if (myGround > 0 && feats.length) {
        bodyHTML += feats.map(fk => `<button class="btn" data-bc-feat="${fk}" style="width:100%;margin-bottom:3px;">
          Attack ${locDisplayName(ds, fk)} <span style="color:var(--text-mute)">(enemy ${dsBattalions(ds)[fk][enemy]})</span></button>`).join('');
      }
      bodyHTML += `</div>`;
      footerHTML = `<button class="btn-primary" id="bc-skip-assign">${bc.stage === 'init' ? 'NEXT PLAYER →' : 'RESOLVE DROPSITE →'}</button>`;
    } else if (bc.stage === 'destroy') {
      const destroyOpts = featureDestroyOptions();
      bodyHTML = `<div class="ap-section">
        <div class="ap-title">Destroy Features <span style="color:var(--text-mute);font-weight:400;font-size:8.5px;">(4+ battalions, no enemy)</span></div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">${destroyOpts.length ? 'Optional — remove all those battalions to destroy the Feature.' : 'No eligible Features.'}</div>`;
      bodyHTML += destroyOpts.map(o => `<button class="btn" data-destroy-feature="${o.dsId}|${o.key}" style="width:100%;margin-bottom:3px;">
        Destroy ${o.name} <span style="color:var(--${sideCssKey(o.side)})">(${sideName(o.side)})</span></button>`).join('');
      bodyHTML += `</div>`;
      footerHTML = `<button class="btn-primary" id="bc-finish">FINISH COMBAT →</button>`;
    }

    overlay = document.createElement('div');
    overlay.id = 'asset-overlay';
    overlay.className = 'setup-overlay';
    overlay.innerHTML = `
      <div class="setup-card" style="max-width:440px;">
        <div class="setup-header">
          <h2 class="setup-title">BATTALION COMBAT</h2>
          <div class="setup-sub">Round ${state.round} · ${sideName(initSide)} has initiative</div>
        </div>
        <div class="setup-body">
          ${bodyHTML}
          ${logHTML}
          <div class="ap-section"><div class="ap-title">Battalions <span style="color:var(--text-mute);font-weight:400;">(${sideName('player1')} · ${sideName('player2')})</span></div>${battSummaryFor(bc.dsId)}</div>
        </div>
        <div class="setup-footer">${footerHTML}</div>
      </div>
    `;
    board.appendChild(overlay);
    return;
  }

  const hasContested = contestedDropsites().length > 0;
  const hudEl = document.createElement('div');
  hudEl.id = 'asset-phase-hud';
  hudEl.className = 'hud-item';
  hudEl.style.cssText = 'pointer-events:auto;min-width:170px;';
  let primaryBtn = '';
  if (!ap.resolved) {
    if (hasContested) {
      primaryBtn = `<button class="hud-btn" id="asset-start-battalions" style="width:100%;margin-top:5px;padding:3px 8px;">BATTALION COMBAT →</button>`;
    } else {
      primaryBtn = `<button class="hud-btn" id="asset-skip-battalions" style="width:100%;margin-top:5px;padding:3px 8px;">ASSET PHASE →</button>`;
    }
  } else if (!ap.boardingResolved && anyShipBattalions()) {
    primaryBtn = `<button class="hud-btn" id="asset-boarding" style="width:100%;margin-top:5px;padding:3px 8px;">BOARDING ACTIONS →</button>`;
  } else {
    primaryBtn = `<button class="hud-btn" id="asset-move-assets" style="width:100%;margin-top:5px;padding:3px 8px;">MOVE LAUNCH ASSETS →</button>`;
  }
  hudEl.innerHTML = `
    <div style="font-family:var(--display);font-size:10px;letter-spacing:1px;color:var(--text);margin-bottom:3px;">ASSET PHASE · R${state.round}</div>
    <div style="font-size:9px;color:var(--text-mute);">${sideName(initSide)} has initiative</div>
    ${ap.resolved ? `<div style="font-size:9px;color:var(--hull-good);margin-top:3px;">&#10003; Battalion Combat done</div>` : ''}
    ${ap.boardingResolved ? `<div style="font-size:9px;color:var(--hull-good);">&#10003; Boarding resolved</div>` : ''}
    ${primaryBtn}
  `;
  document.querySelector('.board-hud').appendChild(hudEl);
}
