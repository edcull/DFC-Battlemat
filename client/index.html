      sel.addEventListener('change', () => {
        const admiralIdx = parseInt(sel.dataset.admiralIdx);
        const [gi, si] = sel.value.split(':').map(Number);
        const existing = imported.admiralAssignments.find(a => !a.isFamous && a.admiralIdx === admiralIdx);
        if (!existing) {
          const adm = (imported.admirals || [])[admiralIdx] || {};
          imported.admiralAssignments.push({ level: adm.level || 1, groupIdx: gi, shipIdx: si, isFamous: false, admiralIdx });
        } else {
          existing.groupIdx = gi; existing.shipIdx = si;
        }
        const firstNfa = imported.admiralAssignments.find(a => !a.isFamous);
        if (firstNfa) imported.admiralGroupIdx = firstNfa.groupIdx;
        renderAll(); netRelaySetup();
      });
    });

    // Non-famous admiral ability pickers.
    panel.querySelectorAll('.nfa-ability-sel').forEach(sel => {
      sel.addEventListener('change', () => {
        const admiralIdx = parseInt(sel.dataset.admiralIdx);
        const existing = imported.admiralAssignments.find(a => !a.isFamous && a.admiralIdx === admiralIdx);
        if (existing) {
          existing.abilities = sel.value ? [sel.value] : [];
        }
        renderAll(); netRelaySetup();
      });
    });

    // Famous admiral ship-position pickers.
    panel.querySelectorAll('select.famous-ship-sel').forEach(sel => {
      sel.addEventListener('change', () => {
        const idx = parseInt(sel.dataset.asnIdx);
        if (assignments[idx]) { assignments[idx].shipIdx = parseInt(sel.value); renderAll(); netRelaySetup(); }
      });
    });

    // Payload assignment dropdowns.
    panel.querySelectorAll('select.payload-sel').forEach(sel => {
      sel.addEventListener('change', () => {
        const pk = sel.dataset.plKey;
        if (sel.value) payloadLinks[pk] = sel.value;
        else delete payloadLinks[pk];
        // Re-render the panel to update capacity counts.
        panel.remove(); openFleetView(slot); renderAll(); netRelaySetup();
      });
    });
  }
}

/* Payload→Porter assignment modal (Bioficer, setup-time, per chosen fleet slot).
   Works on the faction's fleet DEFS (before sides are assigned), enumerating
   ship-slots from each group's size. Stores links in state.payloadLinks[slot]. */
function renderPayloadAssign() {
  let overlay = document.getElementById('payload-overlay');
  if (overlay) overlay.remove();
  if (!state.payloadAssign) return;
  const slot = state.payloadAssign.slot;            // 'f1' | 'f2'
  const fk = state.fleetChoices[slot];
  const fleet = FACTIONS[fk] && FACTIONS[fk].fleet;
  if (!fleet) { state.payloadAssign = null; return; }
  const links = state.payloadLinks[slot] || (state.payloadLinks[slot] = {});

  // Enumerate ship-slots.
  const porters = [], payloads = [];
  fleet.forEach(def => {
    const n = def.groupSize || 1;
    for (let si = 0; si < n; si++) {
      if (def.porter) porters.push({ def, si, key: `${def.id}:${si}` });
      if (def.payload) payloads.push({ def, si, key: `${def.id}:${si}` });
    }
  });
  // Capacity used per porter (from links).
  const portUsed = {};
  porters.forEach(p => portUsed[p.key] = 0);
  Object.values(links).forEach(pk => { if (portUsed[pk] != null) portUsed[pk]++; });

  const porterLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };
  const payloadLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };

  const rows = payloads.map(pl => {
    const cur = links[pl.key] || '';
    const opts = porters.map(po => {
      const cap = po.def.porter.cap || 1;
      const totalUsed = portUsed[po.key];                    // includes this payload if assigned here
      const usedByOthers = totalUsed - (cur === po.key ? 1 : 0);
      const full = usedByOthers >= cap;                      // no room for THIS payload
      const sizeOk = po.def.porter.size === pl.def.payload.size;
      const disabled = (full || !sizeOk) && cur !== po.key;
      return `<option value="${po.key}" ${cur===po.key?'selected':''} ${disabled?'disabled':''}>
        ${porterLabel(po)} (${totalUsed}/${cap})${!sizeOk?' — size mismatch':''}</option>`;
    }).join('');
    return `<div class="pl-row">
      <div class="pl-name">${payloadLabel(pl)} <span style="color:var(--text-mute);font-size:9px;">S-payload</span></div>
      <select class="fleet-dropdown pl-select" data-pl-assign="${slot}|${pl.key}">
        <option value="" ${!cur?'selected':''}>— unassigned —</option>
        ${opts}
      </select>
    </div>`;
  }).join('');

  overlay = document.createElement('div');
  overlay.id = 'payload-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '200';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:460px;">
      <div class="setup-header">
        <h2 class="setup-title">ASSIGN PAYLOADS</h2>
        <div class="setup-sub">${FACTIONS[fk].name} · attach Payload Cells to Porter ships</div>
      </div>
      <div class="setup-body">
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">
          Each Payload (S) must be assigned to a Porter (S) with available capacity. Unassigned Payloads are left out of the fleet.
        </div>
        ${rows || '<div style="color:var(--text-mute);font-style:italic;">No Payload ships in this fleet.</div>'}
      </div>
      <div class="setup-footer">
        <button class="btn-primary" id="payload-done">DONE →</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-pl-assign]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [sl, pk] = sel.dataset.plAssign.split('|');
      if (sel.value) state.payloadLinks[sl][pk] = sel.value;
      else delete state.payloadLinks[sl][pk];
      renderPayloadAssign();
    });
  });
  overlay.querySelector('#payload-done').addEventListener('click', () => {
    state.payloadAssign = null;
    renderPayloadAssign();   // remove the modal
    renderSetupOverlay();    // refresh setup so the scenario lock updates immediately
    netRelaySetup();         // sync payload links to opponent
  });
}

function renderDropsiteActivation() {
  const board = document.querySelector('.board-wrap');
  // Always remove legacy separate elements
  ['da-overlay','da-launch-banner'].forEach(id => { const b = document.getElementById(id); if (b) b.remove(); });
  if (!state.dropsiteActivation) {
    const b = document.getElementById('da-ds-banner'); if (b) b.remove();
    return;
  }

  const da = state.dropsiteActivation;
  const sideName = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();
  const otherSide = da.side === 'player1' ? 'player2' : 'player1';
  const sideKey = da.side === 'player1' ? 'ucm' : 'shal';
  const isMyTurn = !_netSide || _gs() === da.side;

  // Dropsites this side Controls (not contested) and hasn't activated yet.
  const controlled = (state.scenarioData ? state.scenarioData.dropsites : [])
    .filter(d => dropsiteController(d) === da.side && !da.done.includes(d.id));
  const otherControlled = (state.scenarioData ? state.scenarioData.dropsites : [])
    .filter(d => dropsiteController(d) === otherSide && !da.done.includes(d.id));

  // Auto-advance: if the active side has no controlled dropsites and nothing is activating,
  // silently pass to the other side (or end the phase) after a brief paint.
  if (!da.dsId && controlled.length === 0 && isMyTurn) {
    setTimeout(() => {
      if (!state.dropsiteActivation || state.dropsiteActivation.dsId) return;
      if (otherControlled.length > 0) dispatch({ type: 'daSwitchSide' });
      else dispatch({ type: 'daEnd' });
    }, 0);
  }

  // Build bottom banner
  let dsBan = document.getElementById('da-ds-banner');
  if (!dsBan) { dsBan = document.createElement('div'); dsBan.id = 'da-ds-banner'; dsBan.className = 'deploy-hint'; board.appendChild(dsBan); }

  const ds = da.dsId ? (state.scenarioData && state.scenarioData.dropsites.find(d => d.id === da.dsId)) : null;

  // Launch-targeting mode: show fighter/bomber ±/+ controls in the banner
  if (state.launching && state.launching.fromDropsite && ds) {
    const L = state.launching;
    const lSideKey = L.side === 'player1' ? 'ucm' : 'shal';
    if (L.type === 'fighter_bomber') {
      const f = L.fighters||0, b = L.bombers||0;
      dsBan.innerHTML = `<span><b>${L.name}:</b></span>
        <span>Ftr</span>
        <button class="hp-btn" data-da-fb="fighters|-1" ${b>0||f<=0?'disabled':''}>−</button>
        <b style="color:var(--${lSideKey})">${f}</b>
        <button class="hp-btn" data-da-fb="fighters|1" ${b>0?'disabled':''}>+</button>
        <span>Bmr</span>
        <button class="hp-btn" data-da-fb="bombers|-1" ${f>0||b<=0?'disabled':''}>−</button>
        <b style="color:var(--${lSideKey})">${b}</b>
        <button class="hp-btn" data-da-fb="bombers|1" ${f>0?'disabled':''}>+</button>
        <span>· click ≤${L.auraIn}" to place</span>
        <button class="btn" id="da-launch-cancel" style="padding:4px 10px;font-size:10px;">CANCEL</button>`;
    } else {
      const cnt = L.type === 'fireship' ? (L.fireships||0) : (L.assetCount||1);
      const cntCtl = L.type === 'fireship'
        ? `<button class="hp-btn" data-da-fb="fireships|-1" ${cnt<=0?'disabled':''}>−</button>
           <b style="color:var(--${lSideKey})">${cnt}</b>
           <button class="hp-btn" data-da-fb="fireships|1">+</button>`
        : `<b style="color:var(--${lSideKey})">${cnt}</b>`;
      dsBan.innerHTML = `<span><b>${L.name}:</b></span> ${cntCtl}
        <span>· click ≤${L.auraIn}" to place</span>
        <button class="btn" id="da-launch-cancel" style="padding:4px 10px;font-size:10px;">CANCEL</button>`;
    }
  } else if (ds) {
    // A dropsite is selected — show a minimal banner; panel handles the detail
    dsBan.innerHTML = `<span><b style="color:var(--${sideKey})">${sideName(da.side)}</b> activating <b>${ds.base.name}</b> · use right panel to fire weapons / launch assets</span>
      ${isMyTurn ? `<button class="btn" id="da-skip-all" style="padding:4px 10px;font-size:10px;margin-left:8px;">SKIP ALL ACTIVATIONS</button>` : ''}`;
  } else if (controlled.length > 0) {
    // Picking phase — controlled dropsites are highlighted on the map; click one to activate
    dsBan.innerHTML = `<span><b style="color:var(--${sideKey})">${sideName(da.side)}</b> — click a highlighted dropsite to activate it</span>
      ${isMyTurn ? `<button class="btn" id="da-skip-all" style="padding:4px 10px;font-size:10px;margin-left:8px;">SKIP ALL ACTIVATIONS</button>` : ''}`;
  } else {
    // No dropsites left for this side
    dsBan.innerHTML = `<span style="color:var(--text-dim)"><b style="color:var(--${sideKey})">${sideName(da.side)}</b> has no more Dropsites to activate</span>
      ${isMyTurn ? (otherControlled.length
        ? `<button class="btn-primary" id="da-next-side" style="padding:4px 12px;font-size:10px;margin-left:8px;">${sideName(otherSide).toUpperCase()}'S TURN →</button>`
        : `<button class="btn-primary" id="da-done" style="padding:4px 12px;font-size:10px;margin-left:8px;">PROCEED TO ASSET PHASE →</button>`) : ''}`;
  }

  // "Skip All Activations" — marks all this side's remaining dropsites done
  const skipAll = dsBan.querySelector('#da-skip-all');
  if (skipAll) skipAll.addEventListener('click', () => {
    if (otherControlled.length > 0) dispatch({ type: 'daSwitchSide' });
    else dispatch({ type: 'daEnd' });
  });
  const nextBtn = dsBan.querySelector('#da-next-side');
  if (nextBtn) nextBtn.addEventListener('click', () => dispatch({ type: 'daSwitchSide' }));
  const doneBtn = dsBan.querySelector('#da-done');
  if (doneBtn) doneBtn.addEventListener('click', () => dispatch({ type: 'daEnd' }));
}

/* AP adjuster modal — opened from a fleet's AP chip.
   Shows the current AP, +/- controls (own side only in online), and a reference
   list of admiral abilities available to this side. */
function renderApEditModal() {
  let overlay = document.getElementById('ap-edit-overlay');
  if (overlay) overlay.remove();
  const side = state.apEditOpen;
  if (!side || !state.planning) return;
  const P = state.planning;
  const ownSide = _netSide ? _gs() : null; // null in hotseat = can adjust either
  const canAdjust = !ownSide || ownSide === side;

  // ── Build ability reference list ──────────────────────────────────────────
  const CORE = [
    { cost: '1/die', name: 'AP Re-roll',        desc: 'After any roll, re-roll any dice (once per activation).' },
    { cost: '2 AP',  name: 'Brace for Impact',  desc: 'Declare before Crippling roll. Set result to 4.' },
    { cost: '2 AP',  name: 'Contain Reactor',   desc: 'Declare before Explosion roll. Set result to 2.' },
    { cost: '2 AP',  name: 'Time to Target',    desc: 'Move a Fighter/Bomber Wing a second time up to 6".' },
  ];
  const abilityRow = (a) =>
    `<tr><td style="padding:3px 6px;color:var(--hull-warn);font-size:9px;white-space:nowrap;font-weight:600;">${a.cost}</td>
     <td style="padding:3px 6px;font-size:10px;font-weight:600;">${a.name}</td>
     <td style="padding:3px 6px;font-size:9px;color:var(--text-dim);">${a.desc}</td></tr>`;
  const sectionHdr = (lbl) =>
    `<tr><td colspan="3" style="padding:5px 6px 2px;font-size:8px;letter-spacing:0.1em;color:var(--text-mute);background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.08);">${lbl}</td></tr>`;

  // Famous admiral abilities for this side
  const slot = state.slotForSide && state.slotForSide[side];
  const imp = slot && state.importedFleets && state.importedFleets[slot];
  const asns = imp && imp.admiralAssignments ? imp.admiralAssignments : [];
  let extraRows = '';
  // Famous admirals
  asns.filter(a => a.isFamous).forEach(a => {
    const grp = imp && imp.groups && imp.groups[a.groupIdx];
    if (!grp) return;
    const faAbs = (FAMOUS_ADMIRAL_ABILITIES && FAMOUS_ADMIRAL_ABILITIES[grp.name]) || [];
    if (faAbs.length) {
      extraRows += sectionHdr(`★ ${grp.name.toUpperCase()} ABILITIES`);
      faAbs.forEach(ab => { extraRows += abilityRow(ab); });
    }
  });
  // Non-famous admiral abilities (personal + chosen faction pick)
  asns.filter(a => !a.isFamous).forEach(a => {
    const admEntry = imp && imp.admirals && imp.admirals[a.admiralIdx];
    const title = admEntry ? admEntry.title : '';
    // Personal abilities for named faction admirals (Captain, Rear Admiral, etc.)
    const factionPersonal = FACTION_ADMIRAL_PERSONAL && FACTION_ADMIRAL_PERSONAL[imp && imp.faction] || {};
    const titleKey = Object.keys(factionPersonal).find(k => (title || '').toLowerCase().includes(k));
    if (titleKey) {
      const personal = factionPersonal[titleKey] || [];
      if (personal.length) {
        extraRows += sectionHdr(`${title.toUpperCase()} ABILITIES`);
        personal.forEach(ab => { extraRows += abilityRow({ cost: `${ab.cost} AP`, name: ab.name, desc: ab.desc }); });
      }
    }
    // Chosen faction pool ability
    const abs = a.abilities || [];
    const factionAbs = (ADMIRAL_FACTION_ABILITIES && ADMIRAL_FACTION_ABILITIES[imp && imp.faction]) || [];
    abs.forEach(key => {
      const ab = factionAbs.find(x => x.key === key);
      const header = 'FACTION POOL ABILITY';
      if (ab) {
        if (!extraRows.includes(header)) extraRows += sectionHdr(header);
        extraRows += abilityRow({ cost: `${ab.cost} AP`, name: ab.name, desc: ab.desc });
      } else if (key) {
        if (!extraRows.includes(header)) extraRows += sectionHdr(header);
        extraRows += abilityRow({ cost: '—', name: key, desc: '(see faction rules)' });
      }
    });
  });

  const abilitiesTable = `
    <table style="width:100%;border-collapse:collapse;margin-top:4px;">
      ${sectionHdr('CORE ABILITIES')}
      ${CORE.map(abilityRow).join('')}
      ${extraRows}
    </table>`;

  overlay = document.createElement('div');
  overlay.id = 'ap-edit-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '312';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--${sideCssKey(side)})">${factionName(side)} · ABILITY POINTS</h2></div>
    <div class="setup-body">
      ${canAdjust ? `
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin:4px 0 8px;">
        <button class="hp-btn" id="ap-dec" style="font-size:18px;width:38px;height:38px;" ${P.ap[side]<=0?'disabled':''}>−</button>
        <b style="color:var(--${sideCssKey(side)});font-size:40px;font-family:var(--mono);min-width:54px;text-align:center;">${P.ap[side]}</b>
        <button class="hp-btn" id="ap-inc" style="font-size:18px;width:38px;height:38px;">+</button>
      </div>` : `
      <div style="text-align:center;margin:6px 0 10px;">
        <b style="color:var(--${sideCssKey(side)});font-size:40px;font-family:var(--mono);">${P.ap[side]}</b>
        <div style="font-size:9px;color:var(--text-mute);margin-top:2px;">Opponent's AP — view only</div>
      </div>`}
      ${P.passTokens[side] ? `<div style="font-size:10px;color:var(--text-mute);text-align:center;margin-bottom:6px;">${P.passTokens[side]} Pass Token${P.passTokens[side]>1?'s':''} remaining</div>` : ''}
      ${abilitiesTable}
    </div>
    <div class="setup-footer"><button class="btn-primary" id="ap-edit-close" style="width:100%;">DONE</button></div>
  </div>`;
  document.body.appendChild(overlay);

  if (canAdjust) {
    overlay.querySelector('#ap-dec').addEventListener('click', () => {
      if ((P.ap[side] || 0) > 0) dispatch({ type: 'adjustAP', side, delta: -1 });
    });
    overlay.querySelector('#ap-inc').addEventListener('click', () => {
      dispatch({ type: 'adjustAP', side, delta: 1 });
    });
  }
  overlay.querySelector('#ap-edit-close').addEventListener('click', () => { state.apEditOpen = null; renderAll(); });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { state.apEditOpen = null; renderAll(); } });
}

/* Full Victory-Point breakdown modal — opened from the topbar VP counter. Groups the
   structured scoreLog by side, newest first, plus current totals. */
function renderVPBreakdown() {
  let overlay = document.getElementById('vpbreak-overlay');
  if (overlay) overlay.remove();
  if (!state.vpBreakdownOpen || !state.score) return;
  const sideBlock = (side) => {
    const entries = (state.scoreLog || []).filter(e => e.side === side);
    const lines = entries.length
      ? entries.map(e => `<div style="display:flex;gap:8px;font-size:10px;padding:2px 0;">
          <span style="color:var(--text-mute);min-width:24px;">R${e.round}</span>
          <span style="flex:1;">${e.reason}</span>
          <b style="color:${e.vp>=0?`var(--${side})`:'var(--hull-crit)'};">${e.vp>=0?'+':''}${e.vp}</b>
        </div>`).join('')
      : `<div style="font-size:10px;color:var(--text-mute);padding:4px 0;">No VP yet.</div>`;
    return `<div style="flex:1;min-width:0;">
      <div class="init-name" style="color:var(--${side})">${factionName(side)}</div>
      <div style="font-size:26px;font-weight:700;color:var(--${side});line-height:1;">${state.score[side].vp}<span style="font-size:11px;color:var(--text-mute);font-weight:400;"> VP</span></div>
      <div style="font-size:9px;color:var(--text-mute);margin-bottom:6px;">${state.score[side].kp} Kill Points</div>
      ${lines}
    </div>`;
  };
  const obj = state.scenario && state.scenario.objective ? OBJECTIVES[state.scenario.objective] : null;
  const objExpanded = !!state.vpObjOpen;
  const objBlock = obj ? `<button id="vp-obj-toggle" style="display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:${ucmRgba(0.06)};border:1px solid var(--ucm);border-radius:5px;padding:7px 11px;cursor:pointer;margin-bottom:12px;">
      <span style="font-size:9px;letter-spacing:0.12em;color:var(--text-mute);">OBJECTIVE</span>
      <b style="color:var(--ucm);flex:1;">${obj.name}</b>
      <span style="color:var(--text-mute);font-size:11px;">${objExpanded ? '▾' : '▸'}</span>
    </button>
    ${objExpanded ? `<div style="font-size:10px;color:var(--text-dim);line-height:1.5;margin:-6px 0 12px;padding:0 4px;">
      ${obj.desc}${obj.bonus ? `<div style="margin-top:6px;color:var(--hull-good,#6ec97a);">▸ ${obj.bonus}</div>` : ''}
    </div>` : ''}` : '';

  // Secondary objectives block
  const secExpanded = !!state.vpSecOpen;
  // In online mode only show the current player's secondaries — don't reveal the opponent's.
  const _secSides = ['player1', 'player2'];
  const secRows = _secSides.flatMap(side => {
    const keys = (state.secondaries && state.secondaries[side]) || [];
    return keys.map(k => {
      const sd = SECONDARY_OBJECTIVES[k];
      if (!sd) return '';
      const col = side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
      return `<div style="margin-bottom:6px;">
        <div style="font-size:9px;font-weight:700;color:${col};">${factionName(side)} — ${sd.name}</div>
        <div style="font-size:9px;color:var(--text-dim);line-height:1.4;">${sd.desc}</div>
      </div>`;
    });
  }).join('');
  const _secSummary = _secSides.map(s => (state.secondaries?.[s]||[]).map(k => SECONDARY_OBJECTIVES[k]?.name).filter(Boolean).join(', ')).filter(Boolean).join(' · ');
  const secBlock = secRows ? `<button id="vp-sec-toggle" style="display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:rgba(170,111,255,0.06);border:1px solid rgba(170,111,255,0.3);border-radius:5px;padding:7px 11px;cursor:pointer;margin-bottom:12px;">
      <span style="font-size:9px;letter-spacing:0.12em;color:var(--text-mute);">SECONDARIES</span>
      <span style="flex:1;font-size:10px;color:var(--text-dim);">${_secSummary}</span>
      <span style="color:var(--text-mute);font-size:11px;">${secExpanded ? '▾' : '▸'}</span>
    </button>
    ${secExpanded ? `<div style="margin:-6px 0 12px;padding:0 4px;">${secRows}</div>` : ''}` : '';
  overlay = document.createElement('div');
  overlay.id = 'vpbreak-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '310';
  overlay.innerHTML = `<div class="setup-card" style="max-width:480px;">
    <div class="setup-header"><h2 class="setup-title">VICTORY POINTS</h2>
      <div class="setup-sub">Round ${state.round} / 6 · VP decides the game (Kill Points break ties)</div></div>
    <div class="setup-body">
      ${objBlock}
      ${secBlock}
      <div style="display:flex;gap:18px;">${sideBlock('player1')}${sideBlock('player2')}</div>
    </div>
    <div class="setup-footer"><button class="btn-primary" id="vpbreak-close" style="width:100%;">CLOSE</button></div>
  </div>`;
  document.body.appendChild(overlay);
  const objToggle = overlay.querySelector('#vp-obj-toggle');
  if (objToggle) objToggle.addEventListener('click', () => { state.vpObjOpen = !state.vpObjOpen; renderAll(true); });
  const secToggle = overlay.querySelector('#vp-sec-toggle');
  if (secToggle) secToggle.addEventListener('click', () => { state.vpSecOpen = !state.vpSecOpen; renderAll(true); });
  overlay.querySelector('#vpbreak-close').addEventListener('click', () => { state.vpBreakdownOpen = false; state.vpObjOpen = false; state.vpSecOpen = false; renderAll(true); });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { state.vpBreakdownOpen = false; state.vpObjOpen = false; state.vpSecOpen = false; renderAll(true); } });
}

    state.secondaryNominations = { player1:{}, player2:{} }; state.shipReconOps = {}; state.reconKills = { player1:0, player2:0 }; state.nominationPhase = false;

/* Initiative roll modal — shown at the start of each round. */
function renderInitiative() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('init-overlay');
  if (overlay) overlay.remove();
  if (!state.initiative) return;
  const I = state.initiative;
  const redName = playerNameForSide('player1');
  const blueName = playerNameForSide('player2');
  const winName = I.winner === 'player1' ? redName : blueName;
  const holderName = I.holder === 'player1' ? redName : blueName;
  const die = (raw, bonus, col) => `<div class="init-die" style="border-color:${col};color:${col}">${raw}${bonus?`<span style="font-size:9px;"> +${bonus}</span>`:''}</div>`;
  const P = state.planning || { ap:{player1:1,player2:1}, passTokens:{player1:0,player2:0}, apBreakdown:null };
  const apDetail = (side) => {
    const col = side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
    const bd = P.apBreakdown && P.apBreakdown[side];
    if (!bd) return `<span style="font-size:14px;font-weight:700;color:${col};">AP ${P.ap[side]}</span>`;
    const parts = [`1 base`];
    if (bd.admiralChosen > 0) {
      if (bd.admiral > 0) parts.push(`+${bd.admiral} admiral`);
      else parts.push(`<span style="text-decoration:line-through;opacity:0.4;">+${bd.admiralChosen} admiral</span> (dead)`);
    }
    if (bd.cmd > 0) parts.push(`+${bd.cmd} cmd ship`);
    if (bd.comms > 0) parts.push(`+1 comms`);
    return `<span style="font-size:14px;font-weight:700;color:${col};">AP ${P.ap[side]}</span><br><span style="font-size:8px;opacity:0.65;">${parts.join(' ')}</span>`;
  };
  const passDetail = (side) => {
    const pt = P.passTokens[side];
    if (!pt) return '';
    return `<span style="font-size:8px;color:var(--hull-warn);">${pt} Pass token${pt>1?'s':''}</span>`;
  };
  const handed = I.holder !== I.winner; // winner gave initiative away
  const isWinner  = !_netSide || _gs() === I.winner;  // this client is the initiative winner
  const isHolder  = !_netSide || _gs() === I.holder;  // this client holds initiative now
  const loserSide = I.winner === 'player1' ? 'player2' : 'player1';

  // Build the choice section — only shown to the winner before they hand over
  let choiceHtml;
  if (handed) {
    // After handover: show outcome to everyone
    choiceHtml = `<div class="init-choice">
      <div class="init-choice-lbl" style="color:var(--${sideCssKey(I.holder)})">${winName} gave initiative to ${holderName}</div>
    </div>`;
  } else if (isWinner) {
    // Winner sees the two option buttons
    choiceHtml = `<div class="init-choice">
      <div class="init-choice-lbl">${winName} takes 1st initiative, or may give it to the opponent (reverse order):</div>
      <div class="init-choice-btns">
        <button class="btn btn-primary" data-init-give="${I.winner}">${winName} takes 1st</button>
        <button class="btn" data-init-give="${loserSide}">${I.winner==='player1'?blueName:redName} takes 1st</button>
      </div>
    </div>`;
  } else {
    // Loser (online) sees a waiting message
    choiceHtml = `<div class="init-choice">
      <div class="init-choice-lbl" style="color:var(--text-mute)">${winName} is choosing who activates first…</div>
    </div>`;
  }

  // Footer: only the current holder sees BEGIN ACTIVATION
  const footerHtml = isHolder
    ? `<button class="btn-primary" id="init-confirm">BEGIN ACTIVATION →</button>`
    : handed
      ? `<div style="font-size:10px;color:var(--text-mute);text-align:center;padding:6px 0;">Waiting for ${holderName} to begin…</div>`
      : `<div style="font-size:10px;color:var(--text-mute);text-align:center;padding:6px 0;">Waiting for ${winName} to decide…</div>`;

  overlay = document.createElement('div');
  overlay.id = 'init-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:400px;">
      <div class="setup-header">
        <h2 class="setup-title">PLANNING PHASE</h2>
        <div class="setup-sub">Round ${I.round} · Initiative roll-off</div>
      </div>
      <div class="setup-body">
        <div class="init-grid">
          <div class="init-slot">
            <div class="init-name" style="color:var(--ucm)">${redName}</div>
            ${die(I.rRaw, I.redBonus, 'var(--ucm)')}
            <div style="font-size:9px;color:var(--text-mute);line-height:1.4;">${apDetail('player1')}</div>
            <div style="min-height:14px;">${passDetail('player1')}</div>
          </div>
          <div class="init-vs">vs</div>
          <div class="init-slot">
            <div class="init-name" style="color:var(--shal)">${blueName}</div>
            ${die(I.bRaw, I.blueBonus, 'var(--shal)')}
            <div style="font-size:9px;color:var(--text-mute);line-height:1.4;">${apDetail('player2')}</div>
            <div style="min-height:14px;">${passDetail('player2')}</div>
          </div>
        </div>
        <div class="init-result" style="color:var(--${sideCssKey(I.winner)})">
          ${winName} won the roll
        </div>
        ${choiceHtml}
      </div>
      <div class="setup-footer">
        ${footerHtml}
      </div>
    </div>
  `;
  board.appendChild(overlay);
  overlay.querySelectorAll('[data-init-give]').forEach(btn => {
    btn.addEventListener('click', () => { dispatch({ type: 'giveInitiative', to: btn.dataset.initGive }); renderAll(); });
  });
  const confirmBtn = overlay.querySelector('#init-confirm');
  if (confirmBtn) confirmBtn.addEventListener('click', () => {
    dispatch({ type: 'beginActivation' });
    renderAll();
  });
}

/* Two dropdowns to choose up to 2 Secondary Objectives for a fleet slot. */
function secondaryPickers(slot) {
  // f1 belongs to player1, f2 to player2. In online mode only own slot is editable.
  const owner = slot === 'f1' ? 'player1' : 'player2';
  const isDisabled = _netSide && _netSide !== owner;
  const chosen = state.secondaryChoice[slot] || [];
  const opt = (idx) => {
    const cur = chosen[idx] || '';
    const others = chosen.filter((_, i) => i !== idx);
    return `<select class="fleet-dropdown" data-secondary="${slot}|${idx}" style="margin-top:4px;font-size:9.5px;"${isDisabled ? ' disabled' : ''}>
      <option value="">— Secondary ${idx+1} —</option>
      ${Object.keys(SECONDARY_OBJECTIVES).map(k => `<option value="${k}" ${cur===k?'selected':''} ${others.includes(k)?'disabled':''}>${SECONDARY_OBJECTIVES[k].name}</option>`).join('')}
    </select>`;
  };
  return opt(0) + opt(1);
}

/* Nomination editor — side panel over the board so the map stays visible and clickable.
   Dropsite-based objectives (key_site, priority_target, long_shot) let the player click
   the map to pick; objectives_beyond uses an inline dropdown. */
function renderNominationModal() {
  const board = document.querySelector('.board-wrap');
  let panel = document.getElementById('nomination-overlay');
  if (panel) panel.remove();
  if (state.phase !== 'nominations') { _nomPicking = null; return; }

  // Build the list of (side, key) rows that need nominations.
  const rows = [];
  ['player1','player2'].forEach(side => {
    (state.secondaries[side] || []).forEach(key => {
      const def = SECONDARY_OBJECTIVES[key];
      if (!def || !def.nominate) return;
      const cands = secondaryCandidates(side, key);
      if (!cands.length) return;
      rows.push({ side, key, def, cands });
    });
  });
  if (!rows.length) { _nomPicking = null; return; }

  // In online mode the player can only pick their own rows.
  const myRows  = _netSide ? rows.filter(r => r.side === _netSide) : rows;
  const oppRows = _netSide ? rows.filter(r => r.side !== _netSide) : [];

  // Default active pick to the player's own first unresolved row.
  if (!_nomPicking || (_netSide && _nomPicking.side !== _netSide)) {
    const first = myRows[0] || rows[0];
    _nomPicking = first ? { side: first.side, key: first.key } : null;
  }

  const renderRow = ({ side, key, def, cands }, interactive) => {
    const cur = state.secondaryNominations[side][key];
    const curStr = JSON.stringify(cur);
    const curLabel = cur ? (cands.find(c => JSON.stringify(c.nom) === curStr) || {}).label : null;
    const isActive = interactive && _nomPicking && _nomPicking.side === side && _nomPicking.key === key;
    const mapBased = key === 'key_site' || key === 'priority_target' || key === 'long_shot';
    if (!interactive) {
      // Opponent row — read-only, dimmed
      return `<div class="nom-row-btn" style="opacity:0.4;cursor:default;pointer-events:none;">
        <div class="nom-side" style="color:var(--${sideCssKey(side)});">${playerNameForSide(side)}</div>
        <div class="nom-obj">${def.name}</div>
        ${curLabel ? `<div class="nom-sel">✓ ${curLabel}</div>` : `<div class="nom-sel" style="color:var(--text-mute);">Pending opponent</div>`}
      </div>`;
    }
    return `<button class="nom-row-btn${isActive ? ' active' : ''}" data-nom-pick="${side}|${key}">
      <div class="nom-side" style="color:var(--${sideCssKey(side)});">${playerNameForSide(side)}</div>
      <div class="nom-obj">${def.name}</div>
      ${curLabel ? `<div class="nom-sel">✓ ${curLabel}</div>` : `<div class="nom-sel" style="color:var(--text-mute);">Not selected</div>`}
      <div class="nom-hint">${isActive ? (mapBased ? '← Click a site on the map' : 'Choose below') : 'Click to activate'}</div>
      ${(!mapBased && isActive) ? `<select class="fleet-dropdown" data-nom-sel="${side}|${key}" style="margin-top:5px;font-size:9px;width:100%;">
        ${cands.map(c => `<option value='${JSON.stringify(c.nom)}' ${JSON.stringify(c.nom)===curStr?'selected':''}>${c.label}</option>`).join('')}
      </select>` : ''}
    </button>`;
  };

  const rowsHTML = [
    ...myRows.map(r => renderRow(r, true)),
    ...oppRows.map(r => renderRow(r, false)),
  ].join('');

  // Build confirm button — show waiting/done state per side.
  const nomReady = state.nominationsReady || {};
  let confirmBtnHtml;
  if (!_netSide) {
    const p1Done = nomReady.player1;
    const p2Done = nomReady.player2;
    confirmBtnHtml = `
      ${p1Done
        ? `<span class="btn" style="width:100%;margin-top:4px;padding:5px;font-size:10px;opacity:0.5;cursor:default;display:block;">✓ ${playerNameForSide('player1')}</span>`
        : `<button class="btn-primary" data-nom-confirm="player1" style="width:100%;margin-top:4px;padding:5px;font-size:10px;">✓ ${playerNameForSide('player1')} CONFIRM</button>`}
      ${p2Done
        ? `<span class="btn" style="width:100%;margin-top:4px;padding:5px;font-size:10px;opacity:0.5;cursor:default;display:block;">✓ ${playerNameForSide('player2')}</span>`
        : `<button class="btn-primary" data-nom-confirm="player2" style="width:100%;margin-top:4px;padding:5px;font-size:10px;">✓ ${playerNameForSide('player2')} CONFIRM</button>`}`;
  } else {
    const myConfirmed = nomReady[_netSide];
    confirmBtnHtml = myConfirmed
      ? `<button class="btn-primary" style="width:100%;margin-top:8px;padding:5px;font-size:10px;opacity:0.5;cursor:not-allowed;" disabled>⏳ Waiting for opponent…</button>`
      : `<button class="btn-primary" id="nom-confirm" style="width:100%;margin-top:8px;padding:5px;font-size:10px;">CONFIRM →</button>`;
  }

  panel = document.createElement('div');
  panel.id = 'nomination-overlay';
  panel.className = 'nom-panel';
  panel.innerHTML = `
    <h3>NOMINATE SECONDARIES</h3>
    <div style="font-size:8px;color:var(--text-mute);margin-bottom:6px;">Click a row then select a site on the map.</div>
    ${rowsHTML}
    ${confirmBtnHtml}
  `;
  board.appendChild(panel);

  // Row click → activate that row for picking (own rows only).
  panel.querySelectorAll('[data-nom-pick]').forEach(btn => {
    btn.addEventListener('click', e => {
      if (e.target.closest('select')) return;
      const [side, key] = btn.dataset.nomPick.split('|');
      if (_netSide && side !== _netSide) return; // opponent row — ignore
      _nomPicking = { side, key };
      renderAll(true);
    });
  });
  // Inline dropdown (objectives_beyond).
  panel.querySelectorAll('[data-nom-sel]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [side, key] = sel.dataset.nomSel.split('|');
      if (_netSide && side !== _netSide) return;
      try { dispatch({ type: 'setNomination', side, key, nom: JSON.parse(sel.value) }); } catch (e) {}
      renderAll(true);
    });
  });
  // Online CONFIRM — sends for this player's side.
  const nomConfirmBtn = panel.querySelector('#nom-confirm');
  if (nomConfirmBtn) nomConfirmBtn.addEventListener('click', () => {
    _nomPicking = null;
    dispatch({ type: 'confirmNominations', side: _netSide });
  });
  // Hotseat per-side CONFIRM buttons.
  panel.querySelectorAll('[data-nom-confirm]').forEach(btn => {
    btn.addEventListener('click', () => {
      _nomPicking = null;
      dispatch({ type: 'confirmNominations', side: btn.dataset.nomConfirm });
    });
  });
}

/* Protect-objective nomination panel — shown after secondaries are confirmed on round 1. */
function renderProtectNomModal() {
  const board = document.querySelector('.board-wrap');
  let panel = document.getElementById('protect-nom-overlay');
  if (panel) panel.remove();
  if (!state.protectNomPhase) return;
  const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
  const renderRow = (side) => {
    if (_netSide && side !== _netSide) {
      const cur = state.protectNom && state.protectNom[side];
      const ds = cur && dss.find(d => d.id === cur);
      const col = `var(--${sideCssKey(side)})`;
      return `<div class="nom-row-btn" style="opacity:0.4;cursor:default;pointer-events:none;">
        <div class="nom-side" style="color:${col};">${playerNameForSide(side)}</div>
        <div class="nom-sel">${ds ? `🛡 ${ds.base.name}` : 'Pending opponent'}</div>
      </div>`;
    }
    const cur = state.protectNom && state.protectNom[side];
    const ds = cur && dss.find(d => d.id === cur);
    const col = `var(--${sideCssKey(side)})`;
    const isActive = !_nomPicking || (_nomPicking.side === side && _nomPicking.key === '__protect__');
    return `<button class="nom-row-btn${isActive ? ' active' : ''}" data-protect-pick="${side}">
      <div class="nom-side" style="color:${col};">${playerNameForSide(side)}</div>
      <div class="nom-obj">Protect Nomination</div>
      ${ds ? `<div class="nom-sel">🛡 ${ds.base.name}</div>` : `<div class="nom-sel" style="color:var(--text-mute);">Not selected</div>`}
      <div class="nom-hint">${isActive ? '← Click a dropsite on the map' : 'Click to activate'}</div>
    </button>`;
  };
  // Default active pick to own side
  if (!_nomPicking) _nomPicking = { side: _netSide || 'player1', key: '__protect__' };

  // Build confirm button — waiting state per side.
  const protReady = state.protectNomReady || {};
  let protConfirmHtml;
  if (!_netSide) {
    const p1Done = protReady.player1;
    const p2Done = protReady.player2;
    protConfirmHtml = `
      ${p1Done
        ? `<span class="btn" style="width:100%;margin-top:4px;padding:5px;font-size:10px;opacity:0.5;cursor:default;display:block;">✓ ${playerNameForSide('player1')}</span>`
        : `<button class="btn-primary" data-protect-confirm="player1" style="width:100%;margin-top:4px;padding:5px;font-size:10px;">✓ ${playerNameForSide('player1')} CONFIRM</button>`}
      ${p2Done
        ? `<span class="btn" style="width:100%;margin-top:4px;padding:5px;font-size:10px;opacity:0.5;cursor:default;display:block;">✓ ${playerNameForSide('player2')}</span>`
        : `<button class="btn-primary" data-protect-confirm="player2" style="width:100%;margin-top:4px;padding:5px;font-size:10px;">✓ ${playerNameForSide('player2')} CONFIRM</button>`}`;
  } else {
    const myConfirmed = protReady[_netSide];
    protConfirmHtml = myConfirmed
      ? `<button class="btn-primary" style="width:100%;margin-top:8px;padding:5px;font-size:10px;opacity:0.5;cursor:not-allowed;" disabled>⏳ Waiting for opponent…</button>`
      : `<button class="btn-primary" id="protect-nom-confirm" style="width:100%;margin-top:8px;padding:5px;font-size:10px;">CONFIRM →</button>`;
  }

  panel = document.createElement('div');
  panel.id = 'protect-nom-overlay';
  panel.className = 'nom-panel';
  panel.innerHTML = `
    <h3>PROTECT NOMINATION</h3>
    <div style="font-size:8px;color:var(--text-mute);margin-bottom:6px;">Each player nominates a Dropsite to protect. Click a site on the map.</div>
    ${renderRow('player1')}${renderRow('player2')}
    ${protConfirmHtml}
  `;
  board.appendChild(panel);
  panel.querySelectorAll('[data-protect-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.protectPick;
      if (_netSide && s !== _netSide) return;
      _nomPicking = { side: s, key: '__protect__' };
      renderAll(true);
    });
  });
  const protConfirmBtn = panel.querySelector('#protect-nom-confirm');
  if (protConfirmBtn) protConfirmBtn.addEventListener('click', () => {
    _nomPicking = null;
    dispatch({ type: 'confirmProtectNom', side: _netSide });
  });
  panel.querySelectorAll('[data-protect-confirm]').forEach(btn => {
    btn.addEventListener('click', () => {
      _nomPicking = null;
      dispatch({ type: 'confirmProtectNom', side: btn.dataset.protectConfirm });
    });
  });
}

function renderSetupOverlay() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('setup-overlay');
  if (overlay) overlay.remove();
  if (state.phase !== 'setup') return;

  if (!state.scenario) state.scenario = { deployment: null, approach: null, layout: null, variant: null, objective: null };
  const scen = state.scenario;
  const vrn = scen.variant ? VARIANTS[scen.variant] : null;
  const obj = scen.objective ? OBJECTIVES[scen.objective] : null;
  // Scenario setup is locked until BOTH fleets are chosen and (for Bioficer)
  // all Payloads are assigned to Porters.
  const bothFleetsSelected = !!state.fleetChoices.f1 && !!state.fleetChoices.f2;
  const payloadsLocked = !bothFleetsSelected || !(fleetAssignmentsReady('f1') && fleetAssignmentsReady('f2'));
  // Per-side ready state.
  const _sr = state.setupReady || {};
  const p1Ready = !!_sr.player1, p2Ready = !!_sr.player2;
  const anyReady = p1Ready || p2Ready;
  const readyCount = (p1Ready ? 1 : 0) + (p2Ready ? 1 : 0);
  const scenarioComplete = bothFleetsSelected && !payloadsLocked && state.scenario &&
    ['deployment','approach','layout','variant','objective'].every(k => state.scenario[k]);
  // Fleet inputs: locked for opponent (online) OR if that player has already readied.
  const f1Lock = (_netSide && _netSide !== 'player1') || p1Ready;
  const f2Lock = (_netSide && _netSide !== 'player2') || p2Ready;

  // Build a summary line per option for each table — what shows in the picker list.
  const summarisers = {
    deployment: (k, v) => v.short || v.desc,
    approach:   (k, v) => `${playerNameForSide('player2')}: ${APPROACH_BEHAVIOURS[v.blue].short} · ${playerNameForSide('player1')}: ${APPROACH_BEHAVIOURS[v.red].short}`,
    layout:     (k, v) => `${v.dropsites.length} dropsites · ${v.scenery.micrometeor} micrometeor · ${v.scenery.dense} dense${v.rings.length?' · '+v.rings.length+' ring'+(v.rings.length>1?'s':''):''}${v.largeObjects.length?' · '+v.largeObjects.length+' large obj':''}`,
    variant:    (k, v) => v.short || '',
    objective:  (k, v) => v.short || ''
  };

  // Card-summary functions (the small text shown on the card's collapsed view)
  const cardSummary = {
    deployment: () => { if (!scen.deployment) return ''; const d = DEPLOYMENTS[scen.deployment]; return d.short || d.desc; },
    approach:   () => { if (!scen.approach) return ''; const a = APPROACHES[scen.approach]; const dz = state.deployZone || { player1:'south', player2:'north' }; return `<b style="color:var(--shal)">Red:</b> ${APPROACH_BEHAVIOURS[a[dz.player2]].short} · <b style="color:var(--ucm)">Blue:</b> ${APPROACH_BEHAVIOURS[a[dz.player1]].short}`; },
    layout:     () => { if (!scen.layout) return ''; const l = LAYOUTS[scen.layout]; return summarisers.layout('', l); },
    variant:    () => vrn ? (vrn.short || '') : '',
    objective:  () => obj ? `${obj.short}${obj.bonus?'<br><span style="color:var(--text-mute)">'+obj.bonus+'</span>':''}` : ''
  };

  const HELPER_TEXT = {
    deployment: 'Where each fleet starts on the board.',
    approach:   'How each side arrives: Direct, Close, or Distant reserves.',
    layout:     'Dropsite positions and how much scenery to place.',
    variant:    'Optional battlefield twist applied to the game.',
    objective:  'How victory is scored this game.'
  };

  const makeCard = (key, label, table, currentKey, fullWidth = false) => {
    const cur = currentKey ? table[currentKey] : null;
    const d6Display = !cur ? '?' : (cur.d6 === 0 ? '—' : cur.d6);
    const d6Cls = !cur || cur.d6 === 0 ? 'none' : '';
    let html = `<div class="scen-row ${fullWidth?'full-width':''}">
      <div class="scen-roll ${d6Cls}">${d6Display}</div>
      <div class="scen-label">${label}</div>
      <div class="scen-helper">${HELPER_TEXT[key] || ''}</div>
      <div class="scen-name">${cur ? cur.name : '<span style="color:var(--text-mute)">— not selected —</span>'}</div>
      <div class="scen-short">${cardSummary[key]()}</div>
      <div class="scen-controls">
        <select class="scen-dropdown" data-scen-select="${key}">
          <option value="" ${!currentKey?'selected':''}>— select —</option>
          ${Object.keys(table).map(optKey => {
            const opt = table[optKey];
            const d6 = opt.d6 === 0 ? '—' : opt.d6;
            return `<option value="${optKey}" ${optKey===currentKey?'selected':''}>${d6==='—'?'':'['+d6+'] '}${opt.name}</option>`;
          }).join('')}
        </select>
        <button class="reroll-btn" data-reroll="${key}" title="Randomise this row">↻</button>
      </div>`;
    html += `</div>`;
    return html;
  };

  overlay = document.createElement('div');
  overlay.id = 'setup-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card">
      <div class="setup-header">
        <h2 class="setup-title">SCENARIO SETUP</h2>
        <div class="setup-sub">D6 · 6-Round Game</div>
      </div>
      <div class="setup-body">
        <div class="faction-select">
          <div class="faction-slot">
            <div class="faction-lbl" style="color:var(--ucm)">${_netSide === 'player1' ? '▶ YOUR NAME' : _netSide === 'player2' ? 'Opponent' : 'Player 1'}${p1Ready ? ' <span style="color:var(--hull-good);font-size:9px;">✓ READY</span>' : ''}</div>
            <input class="fleet-dropdown" type="text" data-player-name="f1" value="${state.playerNames ? state.playerNames.f1 : 'Player 1'}" placeholder="Player 1 name" style="margin-bottom:5px;font-size:10px;" ${f1Lock ? 'disabled' : ''}>
            <select class="fleet-dropdown" data-fleet-choice="f1" ${f1Lock ? 'disabled' : ''}>
              <option value="" ${!state.fleetChoices.f1?'selected':''}>— select quickplay fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f1===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-color-choice="f1" style="margin-top:5px;font-size:10px;" ${f1Lock ? 'disabled' : ''}>
              <option value="" ${!(state.playerColors&&state.playerColors.f1)?'selected':''}>— colour —</option>
              ${Object.entries(PLAYER_COLORS).map(([k,c]) => { const taken = k === (state.playerColors&&state.playerColors.f2); return `<option value="${k}" ${(state.playerColors&&state.playerColors.f1)===k?'selected':''} ${taken?'disabled':''}>${c.label}</option>`; }).join('')}
            </select>
            ${secondaryPickers('f1')}
            <button class="btn" data-import-fleet="f1" style="width:100%;margin-top:5px;font-size:10px;" ${f1Lock ? 'disabled' : ''}>${state.importedFleets&&state.importedFleets.f1 ? '✏ EDIT IMPORT' : '⊕ IMPORT LIST'}</button>
            ${(state.importedFleets&&state.importedFleets.f1)||(fleetHasPayloads(state.fleetChoices.f1)&&!state.importedFleets?.f1) ? `<button class="btn${fleetAssignmentsReady('f1')?'':' btn-primary'}" data-view-fleet="f1" style="width:100%;margin-top:3px;font-size:10px;" ${f1Lock ? 'disabled' : ''}>${fleetAssignmentsReady('f1')?'👁':'⚠'} SETUP / VIEW FLEET${state.importedFleets&&state.importedFleets.f1?' ('+_fleetTotalPts(state.importedFleets.f1)+' pts)':''}</button>` : ''}
          </div>
          <div class="faction-slot">
            <div class="faction-lbl" style="color:var(--shal)">${_netSide === 'player2' ? '▶ YOUR NAME' : _netSide === 'player1' ? 'Opponent' : 'Player 2'}${p2Ready ? ' <span style="color:var(--hull-good);font-size:9px;">✓ READY</span>' : ''}</div>
            <input class="fleet-dropdown" type="text" data-player-name="f2" value="${state.playerNames ? state.playerNames.f2 : 'Player 2'}" placeholder="Player 2 name" style="margin-bottom:5px;font-size:10px;" ${f2Lock ? 'disabled' : ''}>
            <select class="fleet-dropdown" data-fleet-choice="f2" ${f2Lock ? 'disabled' : ''}>
              <option value="" ${!state.fleetChoices.f2?'selected':''}>— select quickplay fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f2===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-color-choice="f2" style="margin-top:5px;font-size:10px;" ${f2Lock ? 'disabled' : ''}>
              <option value="" ${!(state.playerColors&&state.playerColors.f2)?'selected':''}>— colour —</option>
              ${Object.entries(PLAYER_COLORS).map(([k,c]) => { const taken = k === (state.playerColors&&state.playerColors.f1); return `<option value="${k}" ${(state.playerColors&&state.playerColors.f2)===k?'selected':''} ${taken?'disabled':''}>${c.label}</option>`; }).join('')}
            </select>
            ${secondaryPickers('f2')}
            <button class="btn" data-import-fleet="f2" style="width:100%;margin-top:5px;font-size:10px;" ${f2Lock ? 'disabled' : ''}>${state.importedFleets&&state.importedFleets.f2 ? '✏ EDIT IMPORT' : '⊕ IMPORT LIST'}</button>
            ${(state.importedFleets&&state.importedFleets.f2)||(fleetHasPayloads(state.fleetChoices.f2)&&!state.importedFleets?.f2) ? `<button class="btn${fleetAssignmentsReady('f2')?'':' btn-primary'}" data-view-fleet="f2" style="width:100%;margin-top:3px;font-size:10px;" ${f2Lock ? 'disabled' : ''}>${fleetAssignmentsReady('f2')?'👁':'⚠'} SETUP / VIEW FLEET${state.importedFleets&&state.importedFleets.f2?' ('+_fleetTotalPts(state.importedFleets.f2)+' pts)':''}</button>` : ''}
          </div>
        </div>
        <div style="font-size:9px;color:var(--text-mute);margin:-4px 0 10px;text-align:center;">Red and Blue deployment sides are assigned randomly when you confirm.</div>
        ${payloadsLocked ? `<div class="scen-extra-note" style="background:rgba(255,181,71,0.08);border-left-color:var(--hull-warn);color:var(--hull-warn);text-align:center;">
          ${!bothFleetsSelected
            ? 'Select <b>both fleets</b> above before choosing a scenario.'
            : 'Complete fleet setup (admiral &amp; payload assignment) before choosing a scenario. Use <b>⚠ SETUP / VIEW FLEET</b> above.'}
        </div>` : ''}
        <div class="setup-grid" style="${payloadsLocked || anyReady ? 'opacity:0.4;pointer-events:none;filter:grayscale(0.6);' : ''}">
          ${makeCard('deployment','Deployment Type', DEPLOYMENTS, scen.deployment)}
          ${makeCard('approach',  'Approach',        APPROACHES,  scen.approach)}
          ${makeCard('layout',    'Layout',          LAYOUTS,     scen.layout)}
          ${makeCard('variant',   'Variant',         VARIANTS,    scen.variant)}
          ${makeCard('objective', 'Scoring Objective', OBJECTIVES, scen.objective, true)}
        </div>
        ${vrn && vrn.d6 > 0 ? `<div class="scen-extra-note">
          <b>${vrn.name}:</b> ${vrn.desc}
        </div>` : ''}
        ${obj && obj.d6 > 0 ? `<div class="scen-extra-note" style="background:${ucmRgba(0.05)};border-left-color:var(--ucm);color:var(--ucm)">
          <b>${obj.name}:</b> ${obj.desc}
        </div>` : ''}
      </div>
      <div class="setup-footer">
        <button class="btn" id="test-setup" title="UCM vs Scourge · no admirals/secondaries · Line / Close Enough / Diagonal / Guarded Sectors / Standard">⚡ TEST SETUP</button>
        <button class="btn" data-reroll="all" ${payloadsLocked || anyReady ? 'disabled' : ''}>⚄ RANDOMISE ALL</button>
        ${(() => {
          if (!_netSide) {
            // Hotseat: one ready button per player.
            const p1Btn = p1Ready
              ? `<button class="btn" data-unready-setup="player1" style="color:var(--hull-good);border-color:var(--hull-good);">✓ ${playerNameForSide('player1')} READY [${readyCount}/2]</button>`
              : `<button class="btn-primary" data-ready-setup="player1" ${scenarioComplete ? '' : 'disabled'}>✓ ${playerNameForSide('player1')} READY</button>`;
            const p2Btn = p2Ready
              ? `<button class="btn" data-unready-setup="player2" style="color:var(--hull-good);border-color:var(--hull-good);">✓ ${playerNameForSide('player2')} READY [${readyCount}/2]</button>`
              : `<button class="btn-primary" data-ready-setup="player2" ${scenarioComplete ? '' : 'disabled'}>✓ ${playerNameForSide('player2')} READY</button>`;
            return p1Btn + p2Btn;
          }
          const mySide = _netSide;
          const myReady = mySide === 'player1' ? p1Ready : p2Ready;
          if (myReady) {
            return `<button class="btn" data-unready-setup="${mySide}" style="color:var(--hull-good);border-color:var(--hull-good);">✓ READY [${readyCount}/2] — cancel</button>`;
          }
          const countLabel = readyCount > 0 ? ` [${readyCount}/2]` : '';
          return `<button class="btn-primary" data-ready-setup="${mySide}" ${scenarioComplete ? '' : 'disabled'}>✓ CONFIRM READY${countLabel}</button>`;
        })()}
      </div>
    </div>
  `;
  board.appendChild(overlay);

  // Reroll buttons: 'all' randomises every row; a single key randomises just that row.
  const SCEN_TABLES = { deployment: DEPLOYMENTS, approach: APPROACHES, layout: LAYOUTS, variant: VARIANTS, objective: OBJECTIVES };
  overlay.querySelectorAll('[data-reroll]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.reroll;
      if (key === 'all') {
        state.scenario = generateScenario();
      } else {
        const keys = Object.keys(SCEN_TABLES[key]);
        state.scenario = { ...state.scenario, [key]: keys[Math.floor(Math.random() * keys.length)] };
      }
      renderAll(); // relays to the other player via netRelaySetup() (still in setup phase)
    });
  });
  // Picker dropdown — change (or clear) the chosen option for a scenario row.
  overlay.querySelectorAll('[data-scen-select]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const key = sel.dataset.scenSelect;
      state.scenario = { ...state.scenario, [key]: sel.value || null };
      renderAll();
    });
  });
  // Fleet selection (dropdowns).
  overlay.querySelectorAll('[data-fleet-choice]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const which = sel.dataset.fleetChoice; // 'f1' | 'f2'
      state.fleetChoices[which] = sel.value || null;
      state.payloadLinks[which] = {};
      // Clear any imported fleet when the dropdown is changed manually
      if (state.importedFleets) state.importedFleets[which] = null;
      // Auto-set colour to faction default when a fleet is chosen; pick random free colour if default is taken.
      if (sel.value && FACTION_COLORS[sel.value]) {
        state.playerColors = state.playerColors || { f1: null, f2: null };
        const other = which === 'f1' ? 'f2' : 'f1';
        const preferred = FACTION_COLORS[sel.value];
        const otherCol = state.playerColors[other];
        if (preferred !== otherCol) {
          state.playerColors[which] = preferred;
        } else {
          const free = Object.keys(PLAYER_COLORS).filter(k => k !== otherCol);
          state.playerColors[which] = free[Math.floor(Math.random() * free.length)];
        }
      }
      renderAll();
      netRelaySetup(); // explicit relay after render (guards against renderAll errors)
    });
  });
  // Player colour selects.
  overlay.querySelectorAll('[data-color-choice]').forEach(sel => {
    sel.addEventListener('change', () => {
      state.playerColors = state.playerColors || { f1: null, f2: null };
      state.playerColors[sel.dataset.colorChoice] = sel.value || null;
      renderAll();
      netRelaySetup();
    });
  });
  overlay.querySelectorAll('[data-secondary]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [slot, idx] = sel.dataset.secondary.split('|');
      state.secondaryChoice[slot] = state.secondaryChoice[slot] || [];
      state.secondaryChoice[slot][parseInt(idx)] = sel.value || undefined;
      state.secondaryChoice[slot] = state.secondaryChoice[slot].filter(Boolean);
      renderAll();
      netRelaySetup();
    });
  });
  // Editable player name inputs.
  overlay.querySelectorAll('[data-player-name]').forEach(inp => {
    inp.addEventListener('input', () => {
      state.playerNames = state.playerNames || { f1: 'Player 1', f2: 'Player 2' };
      state.playerNames[inp.dataset.playerName] = inp.value || (inp.dataset.playerName === 'f1' ? 'Player 1' : 'Player 2');
      netRelaySetup(); // relay without re-render to avoid focus loss
    });
  });
  // Open the Payload→Porter assignment modal for a fleet slot.
  overlay.querySelectorAll('[data-payload-open]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.payloadAssign = { slot: btn.dataset.payloadOpen };
      renderPayloadAssign();
    });
  });
  overlay.querySelectorAll('[data-import-fleet]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openFleetImport(btn.dataset.importFleet);
    });
  });
  overlay.querySelectorAll('[data-view-fleet]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openFleetView(btn.dataset.viewFleet);
    });
  });
  overlay.querySelectorAll('[data-ready-setup]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const side = btn.dataset.readySetup;
      const slot = side === 'player1' ? 'f1' : 'f2';
      if (!state.fleetChoices[slot]) { flashLaunchMsg('Select your fleet first'); return; }
      if (!state.scenario || ['deployment','approach','layout','variant','objective'].some(k => !state.scenario[k])) {
        flashLaunchMsg('Select all scenario options first'); return;
      }
      dispatch({ type: 'readySetup', side });
    });
  });
  overlay.querySelectorAll('[data-unready-setup]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dispatch({ type: 'unreadySetup', side: btn.dataset.unreadySetup });
    });
  });
  const testBtn = overlay.querySelector('#test-setup');
  if (testBtn) testBtn.addEventListener('click', () => {
    // Quick deterministic test game: UCM vs Scourge, no admirals/secondaries,
    // Line deployment · Close Enough approach · Diagonal layout · Guarded Sectors
    // variant · Standard scoring. Then commit straight to play.
    state.fleetChoices = { f1: 'ucm', f2: 'scourge' };
    state.admiralChoice = { f1: 0, f2: 0 };
    state.secondaryChoice = { f1: [], f2: [] };
    state.scenario = {
      deployment: 'line', approach: 'close_enough', layout: 'diagonal',
      variant: 'guarded_sectors', objective: 'standard'
    };
    commitScenario();
  });
}

/* Activation HUD: Undo Move · Finish Activation · Undo Deploy
   Floats at the bottom-right of the board so the detail panel stays uncluttered. */
function renderActivationHUD() {
  const board = document.querySelector('.board-wrap');
  let hud = document.getElementById('act-hud');
  if (hud) hud.remove();

  const P = state.planning;
  const canPass = state.phase === 'play' && P && state.activeSide
    && P.passTokens[state.activeSide] > 0
    && (!_netSide || _gs() === state.activeSide);
  const passBtn = canPass
    ? `<button class="btn" id="pass-activation" style="width:100%;margin-top:4px;" title="Spend a Pass Token to pass">⏭ PASS (${P.passTokens[state.activeSide]})</button>`
    : '';

  const gid = state.selectedGroupId;
  if (!gid) {
    // No group selected — only show HUD if there's a pass button
    if (!canPass) return;
    hud = document.createElement('div');
    hud.id = 'act-hud';
    hud.className = 'act-hud';
    hud.innerHTML = `<div class="act-hud-title">ACTIVATION</div>${passBtn}`;
    board.appendChild(hud);
    return;
  }

  const grp = state.groups[gid];
  const def = getDef(gid);
  if (!grp || !def) return;
  const isOpponent = !!_netSide && def.side !== _netSide;
  if (isOpponent) return;

  const sideClass = sideCssKey(def.side);
  const si = state.selectedShipIdx;
  const ship = si !== null ? grp.ships[si] : null;

  // ── Deploy phase ──
  if (state.phase === 'deploy') {
    const hasPlaced = grp.ships.some(s => !s.destroyed && !s.offTable);
    if (!hasPlaced) return;
    hud = document.createElement('div');
    hud.id = 'act-hud';
    hud.className = 'act-hud';
    hud.innerHTML = `
      <div class="act-hud-title">DEPLOY</div>
      <div class="act-hud-name" style="color:var(--${sideClass});">${def.name}</div>
      <button class="btn" data-undo-deploy="${gid}" style="width:100%;">↩ UNDO DEPLOY</button>
    `;
    board.appendChild(hud);
    return;
  }

  if (state.phase !== 'play' || grp.activated) {
    if (!canPass) return;
    hud = document.createElement('div');
    hud.id = 'act-hud';
    hud.className = 'act-hud';
    hud.innerHTML = `<div class="act-hud-title">ACTIVATION</div>${passBtn}`;
    board.appendChild(hud);
    return;
  }

  // ── Play phase ──
  const moved = ship && ship.movedThisRound;
  const locked = ship && (ship.firedThisActivation || ship.detectorUsed || (ship.launchedThisRound > 0));
  const anyMoved = grp.ships.some(s => !s.destroyed && s.movedThisRound);
  const pendCell = Object.values(state.groups).some(cg =>
    cg.ships.some(cs => cs.deployedByGid === gid && !cs.destroyed && !cs.movedThisRound && !cs.firedThisActivation && !(cs.launchedThisRound > 0))
  );

  const anyOnTableNotMoved = grp.ships.some(s => !s.destroyed && !s.offTable && !s.movedThisRound && s.deployedRound === state.round);
  let undoBtn = '';
  if (ship && locked) {
    undoBtn = `<button class="btn" disabled style="width:100%;opacity:0.45;margin-bottom:4px;" title="Can't undo after firing/detecting/launching">⟲ UNDO MOVE (locked)</button>`;
  } else if (ship && moved) {
    undoBtn = `<button class="btn" data-clear-trail="${gid}|${si}" style="width:100%;margin-bottom:4px;">⟲ UNDO MOVE</button>`;
  } else if (anyOnTableNotMoved) {
    undoBtn = `<button class="btn" data-undo-deploy="${gid}" style="width:100%;margin-bottom:4px;">↩ UNDO DEPLOY</button>`;
  }

  // Can finish if: any ship has moved, OR the group order doesn't require movement (Hold Position etc.)
  const _orderNeedsMove = grp.order && ORDERS[grp.order] && ORDERS[grp.order].moveMax > 0;
  const canFinishAct = anyMoved || (grp.order && !_orderNeedsMove);
  let finishBtn;
  if (pendCell) {
    finishBtn = `<div style="font-size:8px;color:var(--hull-warn);margin-bottom:4px;">⬡ Deployed cell must act first</div>
      <button class="btn-finish-act" disabled style="width:100%;opacity:0.35;">FINISH ACTIVATION ▸</button>`;
  } else if (canFinishAct) {
    finishBtn = `<button class="btn-finish-act" data-finish-activation="${gid}" style="width:100%;">FINISH ACTIVATION ▸</button>`;
  } else {
    finishBtn = `<button class="btn-finish-act" disabled style="width:100%;opacity:0.35;">FINISH ACTIVATION ▸</button>`;
  }

  hud = document.createElement('div');
  hud.id = 'act-hud';
  hud.className = 'act-hud';
  hud.innerHTML = `
    <div class="act-hud-title">ACTIVATION</div>
    <div class="act-hud-name" style="color:var(--${sideClass});">${def.name}</div>
    ${undoBtn}
    ${finishBtn}
    ${passBtn}
  `;
  board.appendChild(hud);
}

function renderDeployHint() {
  const board = document.querySelector('.board-wrap');
  let hint = document.getElementById('deploy-hint');
  if (hint) hint.remove();
  if (state.phase !== 'deploy') return;

  // Auto-skip sides that have nothing to deploy (no Direct or Vanguard groups).
  // Don't fire while a placement is pending confirmation or a ship is being aimed.
  if (!_pendingDeploy && !state.aiming) {
    for (const side of ['player1', 'player2']) {
      if (state.deployDone[side]) continue;
      if (!deploySideAllowed(side)) continue;
      if (undeployedDeployableCount(side) > 0) continue;
      if (!netIsMySide(side)) continue;
      setTimeout(() => dispatch({ type: 'deployDone', side }), 0);
    }
  }

  hint = document.createElement('div');
  hint.id = 'deploy-hint';
  hint.className = 'deploy-hint';

  // Status text varies depending on selection.
  let status = '';
  if (_pendingDeploy) {
    const pdDef = getDef(_pendingDeploy.gid);
    const pdGrp = state.groups[_pendingDeploy.gid];
    const pdTotal = pdGrp ? pdGrp.ships.filter(s => !s.destroyed).length : 1;
    status = `Confirm placement of <b>${pdDef ? pdDef.name : 'ship'}</b> (ship ${_pendingDeploy.si + 1} of ${pdTotal})?`;
  } else if (state.selectedGroupId) {
    const def = getDef(state.selectedGroupId);
    const grp = state.groups[state.selectedGroupId];
    if (!canDeployNow(def)) {
      const app = approachFor(def.side);
      status = `<b>${def.name}</b> · <span style="color:var(--text-mute)">Reserve (${app === 'close' ? 'Close' : 'Distant'}) — arrives via off-table activation in play</span>`;
    } else if (!deploySideAllowed(def.side)) {
      status = `<b>${def.name}</b> · <span style="color:var(--hull-warn)">${playerNameForSide('player1')} deploys first — finish all Direct/Vanguard Groups before ${playerNameForSide('player2')} can deploy</span>`;
    } else {
      const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
      const total = grp.ships.filter(s => !s.destroyed).length;
      const placed = total - (grp.ships.filter(s => !s.destroyed && s.offTable).length);
      const rdp = state.redeployingShip;
      if (rdp && rdp.gid === state.selectedGroupId) {
        const rdpShip = grp.ships[rdp.si];
        const rdpName = rdpShip ? `ship ${rdp.si + 1}` : 'ship';
        status = `<b>${def.name}</b> · <span style="color:var(--hull-warn)">redeploying ${rdpName} — click in zone to place</span>`;
      } else if (undeployedIdx >= 0) {
        status = `<b>${def.name}</b> · click in zone to place ship <b>${placed + 1}</b> of <b>${total}</b>`;
      } else {
        status = `<b>${def.name}</b> · all ships placed · click a ship to redeploy it`;
      }
    }
  } else {
    // Show Direct-deployment progress per side.
    const ucmStat = directDeploymentStatus('player1');
    const shalStat = directDeploymentStatus('player2');
    const parts = [];
    if (ucmStat)  parts.push(`<span style="color:var(--ucm)">${playerNameForSide('player1')} ${ucmStat.placed}/${ucmStat.required} req</span>`);
    if (shalStat) parts.push(`<span style="color:var(--shal)">${playerNameForSide('player2')} ${shalStat.placed}/${shalStat.required} req</span>`);
    const p1Needs = sideNeedsDeployPhase('player1'), p2Needs = sideNeedsDeployPhase('player2');
    let order;
    if (p1Needs && p2Needs) {
      if (!state.deployDone.player1) order = `<span style="color:var(--ucm)">${playerNameForSide('player1')} deploys first</span>`;
      else if (!state.deployDone.player2) order = `<span style="color:var(--shal)">${playerNameForSide('player2')} deploying</span>`;
      else order = `Both sides ready`;
    } else if (p1Needs) {
      order = state.deployDone.player1 ? `${playerNameForSide('player1')} done` : `<span style="color:var(--ucm)">${playerNameForSide('player1')} deploying</span>`;
    } else if (p2Needs) {
      order = state.deployDone.player2 ? `${playerNameForSide('player2')} done` : `<span style="color:var(--shal)">${playerNameForSide('player2')} deploying</span>`;
    } else {
      order = `Ready to begin play`;
    }
    status = parts.length ? `Direct minimums: ${parts.join(' · ')} · ${order}` : order;
  }

  // Footer button.
  let footerBtn;
  if (_pendingDeploy) {
    footerBtn = `<button class="btn-finish-act" id="deploy-confirm" style="width:auto;padding:6px 16px;margin-top:0;">✓ CONFIRM PLACEMENT</button>` +
                `<button class="btn" id="deploy-cancel" style="width:auto;padding:6px 12px;margin-top:0;margin-left:4px;">✕ CANCEL</button>`;
  } else if (state.aiming) {
    footerBtn = '';
  } else if (!state.deployDone.player1 && netIsMySide('player1') && sideNeedsDeployPhase('player1')) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-red" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${playerNameForSide('player1')} DONE ▸</button>`;
  } else if (!state.deployDone.player2 && netIsMySide('player2') && sideNeedsDeployPhase('player2')) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-blue" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${playerNameForSide('player2')} DONE ▸</button>`;
  } else {
    footerBtn = `<button class="btn-primary" id="commit-deploy" style="padding:5px 14px;font-size:11px;">BEGIN PLAY →</button>`;
  }

  hint.innerHTML = `<span>${status}</span>${footerBtn}`;
  board.appendChild(hint);

  const dc = hint.querySelector('#deploy-confirm');
  if (dc) dc.addEventListener('click', () => {
    const pd = _pendingDeploy;
    _pendingDeploy = null;
    const pdShip = pd && state.groups[pd.gid] && state.groups[pd.gid].ships[pd.si];
    if (pdShip) { pdShip.offTable = true; pdShip.x = undefined; pdShip.y = undefined; pdShip.heading = undefined; pdShip.deployedRound = undefined; }
    dispatch({ type: 'deployShip', gid: pd.gid, si: pd.si, x: pd.x, y: pd.y, heading: pd.heading });
  });
  const dcancel = hint.querySelector('#deploy-cancel');
  if (dcancel) dcancel.addEventListener('click', () => {
    const pd = _pendingDeploy;
    _pendingDeploy = null;
    const pdShip = pd && state.groups[pd.gid] && state.groups[pd.gid].ships[pd.si];
    if (pdShip) { pdShip.offTable = true; pdShip.x = undefined; pdShip.y = undefined; pdShip.heading = undefined; pdShip.deployedRound = undefined; }
    renderAll(true);
  });

  const cd = hint.querySelector('#commit-deploy');
  if (cd) cd.addEventListener('click', commitDeployment);
  const ddr = hint.querySelector('#deploy-done-red');
  if (ddr) ddr.addEventListener('click', () => {
    const left = undeployedDeployableCount('player1');
    const stat = directDeploymentStatus('player1');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${playerNameForSide('player1')} must place their Direct minimum first`); return; }
    if (left > 0 && !confirm(`${playerNameForSide('player1')} still has ${left} deployable Group(s) off-table. Signal done and hand over?`)) return;
    dispatch({ type: 'deployDone', side: 'player1' });
  });
  const ddb = hint.querySelector('#deploy-done-blue');
  if (ddb) ddb.addEventListener('click', () => {
    const left = undeployedDeployableCount('player2');
    const stat = directDeploymentStatus('player2');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${playerNameForSide('player2')} must place their Direct minimum first`); return; }
    if (left > 0 && !confirm(`${playerNameForSide('player2')} still has ${left} deployable Group(s) off-table. Signal done?`)) return;
    dispatch({ type: 'deployDone', side: 'player2' });
  });
}

function renderScenBanner() {
  const board = document.querySelector('.board-wrap');
  let bn = document.getElementById('scen-banner');
  if (bn) bn.remove();
  if (state.phase !== 'play' || !state.scenario) return;
  const obj = OBJECTIVES[state.scenario.objective];
  // In online mode show only this player's info; in hotseat show both sides.
  const sides = _netSide ? [_netSide] : ['player1', 'player2'];
  const lines = sides.map(side => {
    const fName = FACTIONS[state.factions?.[side]]?.name || playerNameForSide(side);
    const col   = side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
    const secKeys = (state.secondaries && state.secondaries[side]) || [];
    const secText = secKeys.map(k => SECONDARY_OBJECTIVES[k]?.name).filter(Boolean).join(', ');
    return `<div style="margin-bottom:1px;">
      <span style="font-size:9px;font-weight:700;color:${col};">${fName}</span>
      ${secText ? `<div style="font-size:8px;color:${col};opacity:0.8;">${secText}</div>` : ''}
    </div>`;
  }).join('');
  bn = document.createElement('div');
  bn.id = 'scen-banner';
  bn.className = 'scen-banner';
  bn.innerHTML = `<b>${obj.name}</b>${lines}`;
  board.appendChild(bn);
}

function currentPlaySubPhase() {
  if (state.repairPhase)        return 'END PHASE';
  if (state.assetPhase)         return 'ASSET';
  if (state.dropsiteActivation) return 'DROPSITE';
  if (state.activeSide)         return 'ACTIVATION';
  if (state.initiative)         return 'PLANNING';
  return null;
}

function renderPhaseNav() {
  const nav = document.getElementById('phase-nav');
  if (nav && state.phase === 'play') {
    const sub = currentPlaySubPhase();
    nav.style.display = sub ? '' : 'none';
    if (sub) nav.innerHTML = `<span style="font-family:var(--display);font-size:10px;letter-spacing:0.16em;color:var(--text-dim);">${sub}</span>`;
    return;
  }
  // Restore the phase-step breadcrumb if it was replaced.
  if (nav && !nav.querySelector('.phase-step')) {
    nav.innerHTML = `<span class="phase-step" data-phase="setup">1 · SETUP</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="scenery">2 · SCENERY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="nominations">3 · SECONDARIES</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="deploy">4 · DEPLOY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="play">5 · PLAY</span>`;
  }
  document.querySelectorAll('.phase-step').forEach(el => {
    el.classList.toggle('active', el.dataset.phase === state.phase);
    const phases = ['setup','scenery','nominations','deploy','play'];
    const curIdx = phases.indexOf(state.phase);
    const elIdx = phases.indexOf(el.dataset.phase);
    el.classList.toggle('done', elIdx < curIdx);
  });
}

function renderTopbarControls() {
  const ctrl = document.getElementById('topbar-controls');
  if (!ctrl) return;
  if (state.phase === 'setup') {
    ctrl.innerHTML = ``;
  } else if (state.phase === 'scenery') {
    const r = state.sceneryReady || {};
    let scenBtns;
    if (!_netSide) {
      // Hotseat: separate done button per side.
      const p1 = r.player1
        ? `<span class="btn" style="opacity:0.5;cursor:default;padding:6px 10px;font-size:11px;">✓ ${playerNameForSide('player1')}</span>`
        : `<button class="btn-primary" data-scenery-done="player1" style="padding:6px 14px;font-size:11px;">✓ ${playerNameForSide('player1')} DONE</button>`;
      const p2 = r.player2
        ? `<span class="btn" style="opacity:0.5;cursor:default;padding:6px 10px;font-size:11px;">✓ ${playerNameForSide('player2')}</span>`
        : `<button class="btn-primary" data-scenery-done="player2" style="padding:6px 14px;font-size:11px;">✓ ${playerNameForSide('player2')} DONE</button>`;
      scenBtns = `${p1}${p2}`;
    } else {
      scenBtns = r[_netSide]
        ? `<span style="font-size:10px;color:var(--text-mute);padding:6px;">⏳ Waiting for opponent…</span>`
        : `<button class="btn-primary" id="commit-scenery-top" style="padding:6px 14px;font-size:11px;">SCENERY COMPLETE →</button>`;
    }
    ctrl.innerHTML = `<button class="btn" id="back-to-setup">← SETUP</button>${scenBtns}`;
  } else if (state.phase === 'nominations') {
    ctrl.innerHTML = ``;
  } else if (state.phase === 'deploy') {
    ctrl.innerHTML = `
      <button class="btn" id="back-to-setup">← SETUP</button>
      <button class="btn-primary" id="commit-deploy-top" style="padding:6px 14px;font-size:11px;">DEPLOYMENT COMPLETE →</button>
    `;
  } else { // play
    const waitingBanner = (_netSide && state.activeSide && _gs() !== state.activeSide)
      ? `<span style="font-size:10px;color:var(--text-mute);font-family:var(--mono);margin-right:4px;">⏳ OPPONENT'S TURN</span>`
      : '';
    // END ROUND is only available when all activations are done (activeSide === null).
    const allDone = state.activeSide === null;
    const myVoted   = _netSide && _endRoundVotes.has(_netSide);
    const theyVoted = _netSide && _endRoundVotes.has(_netSide === 'player1' ? 'player2' : 'player1');
    let endRoundBtn;
    if (!allDone) {
      endRoundBtn = `<button class="btn" id="end-round" disabled style="opacity:0.35;cursor:not-allowed;" title="All groups must finish activation first">END ROUND ▸</button>`;
    } else if (_netSide && myVoted) {
      endRoundBtn = `<button class="btn" id="end-round" disabled style="opacity:0.5;cursor:not-allowed;color:var(--hull-warn);" title="Waiting for opponent">⏳ WAITING</button>`;
    } else {
      const hint = (_netSide && theyVoted) ? ' (opponent ready)' : '';
      endRoundBtn = `<button class="btn" id="end-round"${hint ? ' style="border-color:var(--hull-warn);color:var(--hull-warn);"' : ''}>END ROUND${hint} ▸</button>`;
    }
    ctrl.innerHTML = `
      ${waitingBanner}
      <div class="round-display">RND <b id="round-num">${state.round}</b> / 6</div>
      ${endRoundBtn}
    `;
  }
}



function renderAll(localOnly = false) {
  // Wrap ALL rendering in try/catch so the relay always fires even if a render
  // function throws — a stuck _netReceiving=true would silence all relay.
  try {
    applyThemeColors();
    syncPayloads();
    renderBrand();
    renderPhaseNav();
    renderTopbarControls();
    renderPanels();
    renderDetail();
    renderBoard();
    // 2D↔3D auto-switching:
    // → 3D on entering deploy or play (first planning phase)
    // → 2D on entering nominations or protect nomination
    const _to3d = (state.phase === 'deploy' && _prevPhase !== 'deploy') ||
                  (state.phase === 'play'   && _prevPhase !== 'play');
    const _to2d = (state.phase === 'nominations' && _prevPhase !== 'nominations') ||
                  (!!state.protectNomPhase && !_prevProtectNomPhase);
    _prevPhase = state.phase;
    _prevProtectNomPhase = !!state.protectNomPhase;
    if (_to3d && !_view3d) toggle3d();
    if (_to2d && _view3d) toggle3d();
    if (_view3d && _3d) sync3d();
    renderSetupOverlay();
    renderNominationModal();
    renderProtectNomModal();
    renderDropsiteActivation();
    renderPayloadAssign();
    renderAttackModal();
    renderRepairPhase();
    renderBattalionDeployModal();
    renderDogfightModal();
    renderScoreboard();
    renderEventLog();
    renderApEditModal();
    renderScoringModal();
    renderVPBreakdown();
    renderGameOver();
    renderSceneryPlacement();
    renderAssetPhase();
    renderInitiative();
    renderDeployHint();
    renderActivationHUD();
    renderFeatureAttackHUD();
    renderScenBanner();
    updateHUD();
    renderAimHint();
  } catch(e) {
    console.error('[renderAll]', e);
  }
  // Selection-only renders skip the relay — both clients manage their own view state.
  if (!localOnly) {
    if (state.phase === 'setup' || state.phase === 'scenery' || state.phase === 'nominations') netRelaySetup(); else netAfterRender();
  }
  // Cursor: crosshair when targeting / placing / aiming on either board.
