/* Render the right-panel content for a selected Dropsite. */
function renderDropsiteDetail(ds) {
  const base = ds.base;
  const isStation = base.category === 'station';
  const accentCol = isStation ? '#a8b4bc' : '#7ec8ff';
  const accentVar = isStation ? '--text-dim' : '--ucm';

  // Compute best available saves from base + features (better = lower number).
  const saveBetter = (a, b) => {
    if (a === '—' || a == null) return b;
    if (b === '—' || b == null) return a;
    return parseInt(a) < parseInt(b) ? a : b;
  };
  let bestES = base.es, bestKS = base.ks;
  (ds.features || []).forEach(fk => {
    const f = FEATURES[fk];
    bestES = saveBetter(bestES, f.es);
    bestKS = saveBetter(bestKS, f.ks);
  });

  const remainingHull = Math.max(0, ds.maxHull - ds.damage);
  const hullPct = remainingHull / ds.maxHull;
  const ruined = hullPct < 0.5;
  const destroyed = remainingHull === 0;

  let html = `<div class="panel-section">
    <div class="detail-name" style="color:${accentCol}">${base.name}</div>
    <div class="detail-role">${base.layer} · Hull ${remainingHull}/${ds.maxHull}${ruined && !destroyed?' · <span style="color:var(--hull-warn)">RUINED</span>':''}${destroyed?' · <span style="color:var(--hull-crit)">LEVELLED</span>':''}</div>
    ${(() => {
      const ctrl = dropsiteController(ds), cont = dropsiteContested(ds);
      const nm = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();
      if (cont) return `<div class="detail-role" style="color:var(--hull-warn)">⚔ CONTESTED</div>`;
      if (ctrl) return `<div class="detail-role" style="color:var(--${ctrl})">✓ Controlled — ${nm(ctrl)}</div>`;
      return '';
    })()}
    <div class="stat-grid">
      <div class="stat-cell"><div class="lbl">Scan</div><div class="val">${base.scan}"</div></div>
      <div class="stat-cell"><div class="lbl">Sig</div><div class="val">${base.sig}"</div></div>
      <div class="stat-cell"><div class="lbl">Hull</div><div class="val">${remainingHull}</div></div>
      <div class="stat-cell"><div class="lbl">ES</div><div class="val">${bestES}${bestES !== base.es?'*':''}</div></div>
      <div class="stat-cell"><div class="lbl">KS</div><div class="val">${bestKS}${bestKS !== base.ks?'*':''}</div></div>
      <div class="stat-cell"><div class="lbl">Size</div><div class="val">${base.size === 'small'?'S':base.size==='medium'?'M':'L'}</div></div>
    </div>
    ${(bestES !== base.es || bestKS !== base.ks) ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">* improved by Feature save</div>` : ''}
  </div>`;

  // When this Dropsite is being activated by the controlling side, its Feature cards
  // gain ENGAGE / LAUNCH buttons (added inline below) and a Finish button at the bottom.
  const daActive = state.dropsiteActivation && state.dropsiteActivation.dsId === ds.id;
  const daSide = daActive ? state.dropsiteActivation.side : null;

  // Battalion data + deploy mode (shared by ground block and feature cards).
  const bats = dsBattalions(ds);
  // Renders the per-side +/− battalion controls for one location key.
  // (Landing launched battalions is now done via the deploy modal, so these rows
  // are only for manual adjustment — not click-to-deploy targets.)
  const batControls = (key) => {
    const loc = bats[key];
    return `<div class="bat-counts">
      <span class="bat-side ucm">${factionName('ucm')}
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|ucm|-1">−</button>
        <b style="color:var(--ucm)">${loc.ucm}</b>
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|ucm|1">+</button>
      </span>
      <span class="bat-side shal">${factionName('shal')}
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|shal|-1">−</button>
        <b style="color:var(--shal)">${loc.shal}</b>
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|shal|1">+</button>
      </span>
    </div>`;
  };

  // Hull damage controls + Dropsite (ground) battalions.
  html += `<div class="panel-section">
    <div class="spike-row">
      <span class="label">Damage</span>
      <div class="spike-controls">
        <button class="spike-btn" data-ds-damage-d="${ds.id}">−</button>
        <div class="spike-val ${remainingHull <= ds.maxHull * 0.34 ? 'max' : remainingHull <= ds.maxHull * 0.6 ? 'warn' : ''}">${ds.damage}</div>
        <button class="spike-btn" data-ds-damage-u="${ds.id}">+</button>
      </div>
    </div>
    <div style="margin-top:8px;">
      <div class="bat-loc-label">Dropsite</div>
      ${batControls('ground')}
    </div>
  </div>`;

  // Features — each card shows its stats and its own battalion controls.
  if (ds.features && ds.features.length) {
    html += `<div class="panel-section">
      <div class="panel-title">Features <span class="count">${ds.features.length}</span></div>
      <div class="weapons-list">`;
    ds.features.forEach((fk, fi) => {
      const f = FEATURES[fk];
      const fcol = f.color || 'var(--text)';
      const bgTint = hexToRgba(fcol, 0.08);
      const fdestroyed = (ds.destroyedFeatures || []).includes(fi);
      // Activation buttons (only while this dropsite is being activated, not destroyed).
      let weaponCardHTML = '';
      let launchCardHTML = '';
      if (daActive && !fdestroyed) {
        if (f.weapon) {
          const fired = (ds.firedFeatures || []).includes(fi);
          // The weapon CARD itself is the activation control during dropsite activation
          // (mirrors ship weapon cards) — no separate ENGAGE button.
          const aiming = state.featureAttack && state.featureAttack.dsId === ds.id && state.featureAttack.fi === fi;
          const wpnClickable = daActive && !fired && !fdestroyed;
          const w = f.weapon;
          weaponCardHTML = `<div class="weapon-row${fired ? ' weapon-locked' : ''}${aiming ? ' weapon-aiming' : ''}"
              ${wpnClickable ? `data-da-fire="${ds.id}|${fi}" style="cursor:pointer;margin-top:6px;"` : `style="margin-top:6px;${(!daActive || fdestroyed) ? 'opacity:0.55;' : ''}"`}>
            <div class="weapon-name">${w.name}${fired ? ' <span style="color:var(--hull-crit);font-size:9px;">✓ fired</span>' : ''}</div>
            <div class="weapon-stats">${w.scan} scan · Att ${w.att} · Lock ${w.lock} · Dmg ${w.dmg} · ${w.type}</div>
            ${w.special && w.special !== '—' ? `<div class="weapon-special">${w.special}</div>` : ''}
            ${aiming ? `<div class="weapon-special" style="color:var(--hull-crit)">Click an enemy ship in range · right-click cancels</div>`
              : wpnClickable ? `<div class="weapon-special" style="color:var(--text-mute)">Click to ENGAGE ▸ then click a target ship</div>` : ''}
          </div>`;
        }
        if (f.launch && f.launch.length) {
          f.launch.forEach(l => {
            const meta = launchMeta(l.type);
            const lActive = state.launching && state.launching.fromDropsite === ds.id &&
              state.launching.fromFeature === fi && state.launching.type === l.type;
            launchCardHTML += `<div class="weapon-row" data-da-launch="${ds.id}|${fi}|${l.type}"
                style="cursor:pointer;margin-top:6px;${lActive ? 'border-left:3px solid var(--'+daSide+');background:rgba(74,214,255,0.06);' : ''}">
              <div class="weapon-name">${l.name}${lActive ? ' <span style="color:var(--'+daSide+')">◉</span>' : ''}</div>
              <div class="weapon-stats">Launch ${l.n} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
              ${lActive ? '' : `<div class="weapon-special" style="color:var(--text-mute);">Click to launch ▸ place on map ≤${meta.auraIn}"</div>`}
            </div>`;
          });
        }
      }
      // When NOT activating, still show the launch profile as a (disabled) card for unity.
      if (!launchCardHTML && f.launch && f.launch.length) {
        f.launch.forEach(l => {
          const meta = launchMeta(l.type);
          launchCardHTML += `<div class="weapon-row" style="margin-top:6px;opacity:0.55;">
            <div class="weapon-name">${l.name}</div>
            <div class="weapon-stats">Launch ${l.n} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
          </div>`;
        });
      }
      // When NOT activating, still show the weapon as a (disabled) card for unity.
      if (!weaponCardHTML && f.weapon) {
        const w = f.weapon;
        weaponCardHTML = `<div class="weapon-row" style="margin-top:6px;opacity:0.55;">
          <div class="weapon-name">${w.name}</div>
          <div class="weapon-stats">${w.scan} scan · Att ${w.att} · Lock ${w.lock} · Dmg ${w.dmg} · ${w.type}</div>
          ${w.special && w.special !== '—' ? `<div class="weapon-special">${w.special}</div>` : ''}
        </div>`;
      }
      html += `<div class="weapon-row" style="border-left:3px solid ${fcol};background:${bgTint};${fdestroyed?'opacity:0.5;':''}">
        <div class="weapon-name"><span style="color:${fcol}">${f.glyph ? f.glyph + ' ' : ''}${f.name}${fdestroyed?' <span style="color:var(--hull-crit);font-size:9px;">DESTROYED</span>':''}</span></div>
        <div class="weapon-stats">ES ${f.es} · KS ${f.ks}</div>
        ${weaponCardHTML}
        ${launchCardHTML}
        ${f.note ? `<div class="weapon-special">${f.note}</div>` : ''}
        <div style="margin-top:5px;">${batControls('feat' + fi)}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="panel-section">
      <div class="panel-title">Features</div>
      <div style="font-size:10px;color:var(--text-mute);font-style:italic;">No Features on this Dropsite.</div>
    </div>`;
  }

  // Finish Activation — at the very bottom while this dropsite is being activated.
  if (daActive) {
    html += `<div class="panel-section">
      <button class="btn-primary" id="da-finish-ds" style="width:100%;">✓ FINISH ACTIVATION</button>
    </div>`;
  }

  return html;
}

/* Detail panel for a selected launched asset (Asset Phase): stats, movement, and —
   for bombers/fire ships/torpedoes that have moved into base contact — an attack button. */
function renderAssetDetail(a) {
  const side = a.side;
  const sideClass = side === 'ucm' ? 'ucm' : 'shal';
  const thr = a.t2t && a._t2tRange ? a._t2tRange : assetThrust(a);
  const max = a.count;
  const c = state.assetMove.count;
  const kindLabel = { fighter: 'Fighters', bomber: 'Bombers', fireship: 'Fire Ships', torpedo: 'Torpedoes', mine: 'Mines' }[a.kind] || a.kind;
  const cell = (lbl, val) => `<div class="stat-cell"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  let statCells = cell('Thrust', thr + '"') + cell('In Stack', max);
  if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo' || a.kind === 'mine') {
    const p = assetProfile(side, a.kind);
    statCells += cell('Att/ea', p.att) + cell('Lock', p.lock) + cell('Dmg', p.dmg + ' ' + p.type);
  } else if (a.kind === 'fighter') {
    /* fighters: base Thrust + In Stack cells suffice; Close Protection in the note. */
  }
  const specialNote = (() => {
    const p = assetProfile(side, a.kind);
    if (a.kind === 'fighter') return `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">Close Protection: friendly ships within ${assetProfile(side,'fighter').thrust}" may spend these to re-roll failed saves vs Close Action / Bomber / Fire-Ship hits.</div>`;
    return (p.special) ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">${p.special}</div>` : '';
  })();

  let html = `<div class="panel-section">
    <div class="detail-name ${sideClass}">${kindLabel} <span style="color:var(--text-mute);font-weight:400;font-size:11px;">· ${factionName(side)} asset</span></div>
    <div class="detail-role">${a.moved ? 'Moved this round' : 'Not yet moved'}</div>
    <div class="stat-grid">${statCells}</div>
    ${specialNote}
  </div>`;

  // Movement controls (split the stack, then click the board to move).
  if (!a.moved && a.kind !== 'mine') {
    html += `<div class="panel-section">
      <div class="panel-title">Move</div>
      <div class="bat-counts" style="justify-content:center;gap:8px;align-items:center;">
        <span style="font-size:10px;color:var(--text-dim);">Stack to move:</span>
        <button class="hp-btn" data-asm-adj="-1" ${c<=1?'disabled':''}>−</button>
        <b style="color:var(--${sideClass});font-size:13px;">${c}</b><span style="color:var(--text-mute);">/ ${max}</span>
        <button class="hp-btn" data-asm-adj="1" ${c>=max?'disabled':''}>+</button>
      </div>
      <div class="weapon-special" style="color:var(--text-mute);margin-top:4px;">Click a destination on the board ≤ ${thr}".${
        a.kind === 'fighter' ? ' Move onto an enemy Wing to dogfight.' :
        (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') ? ' Click an enemy ship to fly in & lock an attack.' :
        ' Split with −/+ to move part of the stack.'}</div>
    </div>`;
  } else if (a.kind === 'mine') {
    html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">Mines cannot move once launched.</div></div>`;
  }

  // Attack target: bombers/fire ships/torpedoes that have MOVED into base contact
  // LOCK a target (resolved later, pooled). Excludes Descent ships in atmosphere
  // (enemyShipsInBaseContact already excludes atmosphere-layer ships).
  if ((a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo')) {
    if (a.moved) {
      const contacts = enemyShipsInBaseContact(side, a.x, a.y);
      if (a.bomberTarget) {
        const td = getDef(a.bomberTarget.gid);
        const tn = td ? td.name + (state.groups[a.bomberTarget.gid].ships.length > 1 ? ` #${a.bomberTarget.si + 1}` : '') : '?';
        html += `<div class="panel-section">
          <div class="panel-title">Target Locked</div>
          <div class="weapon-special" style="color:var(--hull-crit);">▶ ${tn} — resolves when all assets have moved.</div>
          <button class="btn" id="asset-detail-untarget" style="width:100%;margin-top:4px;">✕ Clear Target</button>
        </div>`;
      } else if (contacts.length) {
        const verb = a.kind === 'torpedo' ? 'TORPEDO' : a.kind === 'fireship' ? 'FIRE SHIP' : 'BOMBER';
        html += `<div class="panel-section">
          <div class="panel-title">Attack Target</div>`;
        contacts.forEach(ct => {
          const tn = ct.def.name + (state.groups[ct.gid].ships.length > 1 ? ` #${ct.si + 1}` : '');
          html += `<button class="btn-finish-act" data-asset-target="${ct.gid}|${ct.si}" style="margin-top:4px;background:linear-gradient(180deg,var(--hull-crit) 0%,#a32020 100%);border-color:var(--hull-crit);color:#fff;">⊕ LOCK ${verb} ▸ ${tn}</button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">No enemy ship in base contact.</div></div>`;
      }
    } else {
      html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">Move into base contact of an enemy ship to lock an attack.</div></div>`;
    }
  }

  // Time to Target (2 AP): move a moved fighter/bomber again up to 6".
  if ((a.kind === 'fighter' || a.kind === 'bomber') && a.moved && !a.t2t &&
      state.planning && state.planning.ap[side] >= 2) {
    html += `<div class="panel-section">
      <button class="btn" id="asset-detail-t2t" style="width:100%;">⚙ Time to Target (2 AP · move again ≤6")</button>
    </div>`;
  }

  // Reset Move: undo this asset's move so it can be re-activated this turn.
  if (a.moved && a.kind !== 'mine') {
    html += `<div class="panel-section">
      <button class="btn" id="asset-detail-reset" style="width:100%;">⟲ Reset Move</button>
      ${a._preMove ? '' : '<div class="weapon-special" style="color:var(--text-mute);margin-top:3px;">(stack was split/merged — resets in place)</div>'}
    </div>`;
  }

  html += `<div class="panel-section"><button class="btn" id="asset-detail-deselect" style="width:100%;">↩ Deselect</button></div>`;
  return html;
}

function renderDetail() {
  const div = document.getElementById('detail-panel');

  // ── EXPLOSION REVIEW: while an explosion is resolving, show blast info in this panel. ──
  if (state.attackModal && state.attackModal.step === 'explosion' && state.attackModal.explodeQueue && state.attackModal.explodeQueue[0]) {
    const M = state.attackModal;
    const ex = M.explodeQueue[0];
    const defSide = getDef(ex.gid) ? getDef(ex.gid).side : null;
    const canContain = defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained;

    let html = `<div style="padding:10px 12px;">
      <div style="color:var(--hull-crit);font-weight:700;font-size:13px;margin-bottom:6px;">💥 EXPLOSION</div>
      <div style="font-weight:600;font-size:12px;margin-bottom:2px;">${ex.name}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">Blast radius: ${ex.rangeIn}" · ${ex.layer} layer${ex.mod ? ` · +${ex.mod} mod` : ''}</div>`;

    if (!ex.rolled) {
      // Pre-roll: declare Contain Reactor, then roll
      if (ex.contained) {
        html += `<div style="font-size:10px;color:var(--hull-crit);margin-bottom:8px;">Containing Reactor — result will be 2.</div>`;
      } else if (canContain) {
        html += `<button class="btn" id="expl-contain-btn" style="font-size:10px;width:100%;margin-bottom:8px;">⚙ Contain Reactor (2 AP → result 2)</button>`;
      }
      html += `<div style="font-size:10px;color:var(--text-mute);margin-bottom:10px;">Declare Admiral abilities, then roll.</div>
        <button class="btn-primary" id="expl-roll-btn" style="width:100%;">${ex.contained ? 'Resolve (2) ▸' : 'Roll 1D6 ▸'}</button>`;
    } else {
      // Post-roll: show result and affected ships
      html += `<div style="margin-bottom:6px;">`;
      if (ex.d1 != null) html += `<span class="am-die" style="font-size:12px;">${ex.d1}</span>${ex.mod ? ` +${ex.mod} = <b>${ex.total}</b>` : ''}`;
      html += `</div>
        <div style="color:var(--hull-crit);font-weight:600;margin-bottom:2px;">${ex.effectName}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px;">${ex.effectDesc}</div>`;

      if (ex.effKind !== 'none') {
        // Build per-group affected list (spikes are per group; damage/hits are per ship).
        const mult = ex.effKind === 'spike2x' ? 2 : 1;
        const rangePx = ex.rangeIn * INCH * mult;
        const affectedGroups = {}; // gid → { name, side, closestDist, ships: [{distIn, effect}] }
        Object.keys(state.groups).forEach(agid => {
          const adef = getDef(agid);
          state.groups[agid].ships.forEach((s) => {
            if (s.destroyed || s.offTable || s.attachedTo) return;
            if ((s.layer || 'orbit') !== ex.layer) return;
            const dist = Math.hypot(s.x - ex.x, s.y - ex.y);
            if (dist > rangePx) return;
            const distIn = (dist / INCH).toFixed(1);
            let shipEffect = '';
            if (ex.effKind === 'dmg2spike') shipEffect = '2 dmg';
            else if (ex.effKind === 'hits') {
              const sv = ex.effType === 'E' ? adef.es : ex.effType === 'K' ? adef.ks : '—';
              shipEffect = `2 ${ex.effType} hits (save ${sv}+)`;
            }
            if (!affectedGroups[agid]) affectedGroups[agid] = { name: adef.name, side: adef.side, closestDist: dist, ships: [] };
            else if (dist < affectedGroups[agid].closestDist) affectedGroups[agid].closestDist = dist;
            if (shipEffect) affectedGroups[agid].ships.push({ distIn, effect: shipEffect });
          });
        });

        const affectedList = Object.values(affectedGroups);
        if (affectedList.length) {
          html += `<div style="font-size:10px;color:var(--text-mute);margin-bottom:4px;font-weight:600;">AFFECTED GROUPS:</div>`;
          affectedList.sort((a, b) => a.closestDist - b.closestDist).forEach(a => {
            const sc = a.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
            const groupEffect = (ex.effKind === 'spike2x' || ex.effKind === 'dmg2spike') ? ' · <span style="color:var(--hull-warn)">+1 Spike</span>' : '';
            html += `<div style="font-size:10px;padding:3px 0;border-bottom:1px solid var(--border);">
              <span style="color:${sc};font-weight:600;">${a.name}</span>${groupEffect}`;
            a.ships.forEach(sh => {
              html += `<div style="color:var(--hull-crit);font-size:9px;padding-left:8px;">ship @ ${sh.distIn}" — ${sh.effect}</div>`;
            });
            html += `</div>`;
          });
          html += `<div style="margin-top:4px;"></div>`;
        } else {
          html += `<div style="font-size:10px;color:var(--text-mute);margin-bottom:8px;font-style:italic;">No groups in blast radius.</div>`;
        }
      }

      html += `<button class="btn-primary" id="expl-resolve-btn" style="width:100%;margin-top:8px;">Resolve Effects ▸</button>`;
    }

    html += `</div>`;
    div.innerHTML = html;

    // Wire up buttons
    const containBtn = div.querySelector('#expl-contain-btn');
    if (containBtn) containBtn.addEventListener('click', () => {
      if (defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained) {
        state.planning.ap[defSide] -= 2; ex.contained = true;
        M.log.push(`${factionName(defSide)} Contained Reactor (explosion → 2)`);
        renderAll();
      }
    });
    const rollBtn = div.querySelector('#expl-roll-btn');
    if (rollBtn) rollBtn.addEventListener('click', () => advanceAttack('explosion-roll'));
    const resolveBtn = div.querySelector('#expl-resolve-btn');
    if (resolveBtn) resolveBtn.addEventListener('click', () => advanceAttack('explosion-next'));

    return;
  }

  // ── ASSET DETAIL: a launched asset is selected in the Asset Phase. ──
  if (state.assetMove) {
    const a = (state.launchedAssets || []).find(x => x.id === state.assetMove.id);
    if (a) {
      div.innerHTML = renderAssetDetail(a);
      return;
    }
  }

  // If a dropsite is selected (and no ship/group is actively selected), show its info.
  if (state.selectedDropsiteId && state.scenarioData && !state.selectedGroupId) {
    const ds = state.scenarioData.dropsites.find(d => d.id === state.selectedDropsiteId);
    if (ds) {
      div.innerHTML = renderDropsiteDetail(ds);
      return;
    }
  }

  const gid = state.selectedGroupId;
  if (!gid) {
    div.innerHTML = `<div class="empty-state">
      Click a Group in the left panel,<br>
      then click a Ship on the board<br>
      to issue movement orders.<br><br>
      Or click a Dropsite to inspect it.
    </div>`;
    return;
  }
  const def = getDef(gid);
  const grp = getGroup(gid);
  const sideClass = def.side === 'ucm' ? 'ucm' : 'shal';

  // Stat grid
  // Silent Running: base Sig drops to 0", but Spikes still add 3" each.
  const grpSilent = grp.ships.some(s => !s.destroyed && s.sigSilent);
  const spikes = grp.spikes || 0;
  let sigDisplay;
  if (grpSilent) {
    const eff = 0 + 3 * spikes;
    sigDisplay = `<span style="color:var(--ucm)">${eff}"</span><span style="font-size:8px;color:var(--text-mute)"> SR${spikes>0 ? ' (0+'+spikes+'×3")' : ''}</span>`;
  } else {
    const eff = def.sig + 3 * spikes;
    sigDisplay = spikes > 0
      ? `${eff}"<span style="font-size:8px;color:var(--text-mute)"> (${def.sig}+${spikes}×3")</span>`
      : `${def.sig}"`;
  }
  let statsHTML = `
    <div class="panel-section">
      <div class="detail-name ${sideClass}">${def.name}</div>
      <div class="detail-role">${def.role} · ${def.tonnage} / ${def.pts}pts</div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="lbl">Thrust</div><div class="val">${def.thrust}"</div></div>
        <div class="stat-cell"><div class="lbl">Scan</div><div class="val">${def.scan}"</div></div>
        <div class="stat-cell"><div class="lbl">Sig</div><div class="val">${sigDisplay}</div></div>
        <div class="stat-cell"><div class="lbl">Hull</div><div class="val">${def.hull}</div></div>
        <div class="stat-cell"><div class="lbl">ES</div><div class="val">${def.es}</div></div>
        <div class="stat-cell"><div class="lbl">KS</div><div class="val">${def.ks}</div></div>
        <div class="stat-cell"><div class="lbl">BS</div><div class="val">${def.bs}</div></div>
        <div class="stat-cell"><div class="lbl">Side</div><div class="val">${def.side === 'ucm' ? 'UCMF' : 'SHAL'}</div></div>
      </div>
      ${def.special && def.special !== '—' ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">${def.special}</div>` : ''}
    </div>
  `;

  // Spike control
  statsHTML += `
    <div class="panel-section">
      <div class="spike-row">
        <span class="label">Spikes</span>
        <div class="spike-controls">
          <button class="spike-btn" data-spike-d="${gid}">−</button>
          <div class="spike-val ${grp.spikes >= 4 ? 'max' : grp.spikes >= 2 ? 'warn' : ''}">${grp.spikes}</div>
          <button class="spike-btn" data-spike-u="${gid}">+</button>
        </div>
      </div>
    </div>
  `;

  // In play phase: if this Group has undeployed ships, show the deploy-and-activate
  // prompt before the Order selector.
  let deployPromptHTML = '';
  if (state.phase === 'play') {
    const undeployedIdx = nextUndeployedShipIdx(gid);
    if (undeployedIdx >= 0) {
      const elig = canActivateOffTable(def);
      const total = grp.ships.filter(s => !s.destroyed).length;
      const placed = total - (grp.ships.filter(s => !s.destroyed && s.offTable).length);
      if (elig.eligible) {
        deployPromptHTML = `<div class="panel-section">
          <div class="help-tip ${sideClass}">
            <b>Off-table activation.</b> ${placed === 0 ? 'This Group has not yet arrived.' : `Placed ${placed}/${total}.`}
            <br>Click in your DZ to place ship ${placed + 1} of ${total}.
            ${placed === total ? '<br>Then pick an Order to activate.' : ''}
          </div>

    } else if (!grp.activated && !grp.order &&
               grp.ships.some(s => !s.destroyed && s.justArrived)) {

      const hasUndoable = grp.ships.some(s => !s.destroyed && !s.offTable && s.justArrived && !s.movedThisRound);

      deployPromptHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">

        </div>
        ${undoButtons}
      </div>`;
    }
  }

  // Order selector — show in play phase as soon as the Group has any ship on-table
  // (i.e. at least one ship has been deployed/arrived). This ensures orders appear
  // immediately once a ship is placed and angled.
  let ordersHTML = '';
  const hasOnTableShip = grp.ships.some(s => !s.destroyed && !s.offTable);
  // A Group still mid-deployment (some ships placed, others not) must finish
  // placing ALL its ships before any Order can be chosen — otherwise the first
  // ship gets order-locked while the click handler is still trying to place the rest.
  const undeployedInGroup = nextUndeployedShipIdx(def.id) >= 0;
  const showOrders = state.phase === 'play' && hasOnTableShip && !undeployedInGroup;
  // Show a helper when orders are withheld because deployment isn't complete.
  let deployGateHTML = '';
  if (state.phase === 'play' && hasOnTableShip && undeployedInGroup) {
    const left = grp.ships.filter(s => !s.destroyed && s.offTable && !s.attachedTo).length;
    deployGateHTML = `<div class="panel-section">
      <div class="panel-title">Group Order</div>
      <div class="help-tip ${sideClass}" style="color:var(--text-mute)">
        Place all ships in this Group first — <b>${left}</b> still to deploy. Click in the deployment zone to place the next ship, then Orders unlock.
      </div>
    </div>`;
  }
  // Open Network: from the round AFTER they deploy, each ship picks its own Order.
  const individualOrders = noFormation(def) && onIndividualOrders(def, grp);
  if (showOrders) {
    if (individualOrders) {
      // Per-ship orders. Buttons act on the selected ship.
      const si = state.selectedShipIdx;
      const selShip = si !== null ? grp.ships[si] : null;
      const canPick = selShip && !selShip.destroyed && !selShip.offTable;
      const shipOrder = selShip ? selShip.order : null;
      const shipLocked = shipOrder && selShip && selShip.movedThisRound;
      ordersHTML = `<div class="panel-section">
        <div class="panel-title">Individual Orders <span style="color:var(--shal);font-size:8.5px;">Open Network</span></div>`;
      if (!canPick) {

      } else {
        ordersHTML += `<div style="font-size:9.5px;color:var(--text-dim);margin-bottom:4px;">Ship #${si+1}${shipLocked ? ' · <span style="color:var(--text-mute)">locked</span>' : ''}</div>
          <div class="orders">`;
        Object.keys(ORDERS).forEach(k => {
          const o = ORDERS[k];
          const active = shipOrder === k;
          const dis = (shipLocked && !active) ? 'disabled' : '';
          ordersHTML += `<button class="order-btn ${active ? 'active ' + sideClass : ''}" data-ship-order="${gid}|${si}|${k}" ${dis}>${o.short}</button>`;
        });
        ordersHTML += `</div>`;
        if (shipOrder) {
          const o = ORDERS[shipOrder];
          ordersHTML += `<div class="order-info"><b>${o.label}</b><br>${o.canDo.map(t=>`• ${t}`).join('<br>')}
            ${o.cantDo.length ? '<br><span class="neg">' + o.cantDo.map(t=>`✗ ${t}`).join('<br>') + '</span>' : ''}
            <br><span class="spk">Spikes: ${o.spike}</span></div>`;
        }
      }
      // Per-ship order overview.
      const summ = grp.ships.map((s, i) => (s.destroyed||s.offTable) ? null : `#${i+1}: ${s.order || '—'}`).filter(Boolean);
      if (summ.length) ordersHTML += `<div style="font-size:9px;color:var(--text-mute);margin-top:5px;font-family:var(--mono)">${summ.join(' · ')}</div>`;
      ordersHTML += `</div>`;
    } else {
    // Once any ship in the Group has moved under the current Order, lock it —
    // the whole formation shares one Order for the activation.
    const orderLocked = grp.order && grp.ships.some(s => !s.destroyed && s.movedThisRound);
    ordersHTML = `<div class="panel-section">
      <div class="panel-title">Group Order ${grp.activated ? '· <span style="color:var(--text-mute)">activated</span>' : orderLocked ? '· <span style="color:var(--text-mute)">locked</span>' : ''}</div>
      <div class="orders">`;
    Object.keys(ORDERS).forEach(k => {
      const o = ORDERS[k];
      const active = grp.order === k;
      const dis = (orderLocked && !active) ? 'disabled' : '';
      ordersHTML += `<button class="order-btn ${active ? 'active ' + sideClass : ''}" data-order="${k}" ${dis}>${o.short}</button>`;
    });
    ordersHTML += `</div>`;
    if (grp.order) {
      const o = ORDERS[grp.order];
      ordersHTML += `<div class="order-info">
        <b>${o.label}</b>${orderLocked ? ' <span style="color:var(--text-mute)">(locked — formation committed)</span>' : ''}<br>
        ${o.canDo.map(t => `• ${t}`).join('<br>')}
        ${o.cantDo.length ? '<br><span class="neg">' + o.cantDo.map(t => `✗ ${t}`).join('<br>') + '</span>' : ''}

    </div>`;
    }
    ordersHTML += `</div>`;
    }
  }

  // Weapons
  // Formation status (needed for firing/launch restrictions).
  const oofSet = outOfFormationSet(def);
  const selShipOOF = state.selectedShipIdx !== null && oofSet.has(state.selectedShipIdx);

  let weaponsHTML = '';
  if (def.weapons && def.weapons.length) {
    const si = state.selectedShipIdx;
    const selShip = si !== null ? grp.ships[si] : null;
    const eo = selShip ? effectiveOrder(def, grp, si) : null;
    const limit = fireLimit(eo, def);
    const onTable = selShip && !selShip.destroyed && !selShip.offTable;
    const moved = selShip && selShip.movedThisRound;
    const weaponsOffline = selShip && selShip.crippling && selShip.crippling.includes('weapons');
    selShip && (selShip.weaponTargets = selShip.weaponTargets || {});
    const usedCost = selShip ? lockedWeaponCost(def, selShip, eo) : 0;
    const lockedCount = selShip ? Object.keys(selShip.weaponTargets).length : 0;
    const fired = selShip && selShip.firedThisActivation;
    // Movement-before-firing: for normal group orders the WHOLE group must finish moving

    const individualOrders = def.openNetwork || onIndividualOrders(def, grp);
    const moveGate = individualOrders ? moved : groupMovementComplete(def, grp);
    // Conditions under which weapons can be assigned this activation.

    def.weapons.forEach((w, wi) => {
      const isDetector = w.arc === 'LoS' || /^Detector$/i.test(w.name);

      const tgtName = tgt ? (getDef(tgt.gid) ? getDef(tgt.gid).name + (state.groups[tgt.gid] && state.groups[tgt.gid].ships.length>1 ? ` #${tgt.si+1}` : '') : '?') : null;
      const isAiming = state.targeting && state.targeting.gid === state.selectedGroupId && state.targeting.si === si && state.targeting.wi === wi;

      const fitsLimit = wsp.lowPower ? firingCA : (usedCost + thisCost <= limit);
      const clickable = !isDetector && canFire && !tgt && fitsLimit && !caBlocked && !limitedBlocked;
      const detectorUsed = selShip && selShip.detectorUsed;
      const detectorAiming = state.detector && state.detector.gid === state.selectedGroupId && state.detector.si === si && state.detector.wi === wi;
      const canDetect = isDetector && state.phase === 'play' && onTable && !selShipOOF && !weaponsOffline && !fired && moveGate && !detectorUsed;
      const isAntiWing = /Anti.?Wing/i.test(w.special || '');
      const awAiming = state.antiWing && state.antiWing.gid === state.selectedGroupId && state.antiWing.si === si && state.antiWing.wi === wi;
      const enemyWingsExist = (state.launchedAssets || []).some(a => a.side !== def.side && (a.kind === 'fighter' || a.kind === 'bomber'));
      const canAntiWing = isAntiWing && canFire && !tgt && fitsLimit && !caBlocked && !limitedBlocked && enemyWingsExist;
      const extraTag = [wsp.highPower && eo!=='WF'?'High Power ×2':'', wsp.lowPower?'Low Power':'', wsp.linked?'Linked':'', limitedMax?`Limited ${limitedUsed}/${limitedMax}`:''].filter(Boolean).join(' · ');
      weaponsHTML += `<div class="weapon-row${tgt ? ' weapon-locked' : ''}${isAiming ? ' weapon-aiming' : ''}${detectorAiming ? ' weapon-aiming' : ''}${awAiming ? ' weapon-aiming' : ''}"
          ${clickable ? `data-weapon-target="${state.selectedGroupId}|${si}|${wi}" style="cursor:pointer;"` : canDetect ? `data-detector="${state.selectedGroupId}|${si}|${wi}" style="cursor:pointer;"` : ''}>
        <div class="weapon-name">${w.name}${tgt ? ` <span style="color:var(--hull-crit);font-size:9px;">▶ ${tgtName}</span>` : ''}${detectorUsed ? ` <span style="color:var(--text-mute);font-size:9px;">✓ used</span>` : ''}${limitedBlocked ? ` <span style="color:var(--hull-crit);font-size:9px;">spent</span>` : ''}</div>

    weaponsHTML += `</div>`;

        weaponsHTML += `<div class="weapon-special" style="color:var(--text-mute)">Click a weapon, then click an enemy ship to lock a target.</div>`;

  // Survey action: a Capital Ship within 6" of a Dropsite (with Survey scoring) may

  let surveyHTML = '';
  {
    const objKey = state.scenario && state.scenario.objective;
    const surveyActive = objKey === 'survey' || (state.secondaries && state.secondaries[def.side] && state.secondaries[def.side].includes('gather_intel'));
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
    if (surveyActive && selShip && !selShip.destroyed && !selShip.offTable && isCapital(def) && state.phase === 'play') {

        surveyHTML = `<div class="panel-section">
          <div class="panel-title">Survey</div>
          <button class="btn-finish-act" data-survey="${state.selectedGroupId}|${state.selectedShipIdx}|${near.id}" style="background:linear-gradient(180deg,#3a7a8a 0%,#2a5a68 100%);border-color:#4a8a9a;color:#fff;">⌖ SURVEY ${near.base.name}</button>

        </div>`;

  }

  // Extract action (Extract objective): a Ship carrying a ground-transport Asset
  // (Dropship / Bulk Lander / Drop Pod / Boarding Pod) may Extract Recon Operatives
  // from a Dropsite within 6" — up to its transport VALUE (the Asset's launch n) —
  // taking them aboard instead of launching. Click Extract → click a target Dropsite.
  let extractHTML = '';
  {
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
    const canExtractObj = state.scenario && state.scenario.objective === 'extract';
    const tv = transportValue(def);
    if (canExtractObj && tv > 0 && selShip && !selShip.destroyed && !selShip.offTable && state.phase === 'play') {
      const k = targetKey(state.selectedGroupId, state.selectedShipIdx);
      const carried = (state.shipReconOps && state.shipReconOps[k]) || 0;
      const isExtracting = state.extracting && state.extracting.gid === state.selectedGroupId && state.extracting.si === state.selectedShipIdx;
      const acted = selShip.firedThisActivation || (selShip.launchedThisRound > 0);
      const moveOk = selShip.movedThisRound || !(ORDERS[effectiveOrder(def, grp, state.selectedShipIdx)] || {}).moveMax;
      extractHTML = `<div class="panel-section">
        <div class="panel-title">Extract${carried ? ` · <span style="color:#b59ad6">${carried} aboard</span>` : ''}</div>
        <div class="weapon-row" ${(!acted && moveOk) ? `data-extract-start="${state.selectedGroupId}|${state.selectedShipIdx}" style="cursor:pointer;${isExtracting?'border-left:3px solid #b59ad6;background:rgba(181,154,214,0.08);':''}"` : 'style="opacity:0.5;"'}>
          <div class="weapon-name">⬆ Extract Recon Operatives</div>
          <div class="weapon-stats">Transport value ${tv} · 6" range · ${carried} aboard</div>
          ${(!acted && moveOk) ? `<div class="weapon-special" style="color:var(--text-mute)">${isExtracting ? 'Click a Dropsite within 6" to extract · right-click cancels' : 'Click, then target a Dropsite. 2 VP per Operative at game end.'}</div>`
            : `<div class="weapon-special" style="color:var(--text-mute)">${acted ? 'Ship has already acted this activation.' : 'Move first.'}</div>`}
        </div>
      </div>`;
    }
  }

  // Launch
  let launchHTML = '';
  if (def.launch && def.launch.length) {
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
    // Launch is disallowed on Max Thrust, Damage Control, and Silent Running.
    const launchOrder = selShip ? effectiveOrder(def, grp, state.selectedShipIdx) : null;
    const launchBlockedByOrder = ['MT','DC','SR'].includes(launchOrder);
    // Movement must occur before launching: for group orders the whole group finishes
    // first; individual-order ships gate on their own move.

    const launchIndividual = def.openNetwork || onIndividualOrders(def, grp);
    const launchMoved = !launchNeedsMove || (launchIndividual ? (selShip && selShip.movedThisRound) : groupMovementComplete(def, grp));
    const canLaunch = state.phase === 'play' && selShip && !selShip.destroyed && !selShip.offTable && !selShipOOF && !!launchOrder && !launchBlockedByOrder && launchMoved && !selShip.usedVectoredSecondMove;
    launchHTML = `<div class="panel-section">

                         && state.launching.li === li;

            <div class="lc-row">

              <span class="lc-val" style="color:var(--${sideClass})">${f}</span>
              <button class="hp-btn" data-fb-adj="fighters|1" ${f>=remaining||b>0?'disabled':''}>+</button>
            </div>
            <div class="lc-row">
              <span class="lc-lbl">Bombers</span>
              <button class="hp-btn" data-fb-adj="bombers|-1" ${b<=0?'disabled':''}>−</button>
              <span class="lc-val" style="color:var(--${sideClass})">${b}</span>

      const isActive = state.launching && state.launching.gid === gid

    <div class="weapon-stats">${canLaunch ? `${remaining}/${l.n} left` : `Launch ${l.n}/round`} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
    ${canLaunch && !isActive && !exhausted ? `<div class="weapon-special" style="color:var(--text-mute);">Click to launch from Ship #${state.selectedShipIdx+1}</div>` : ''}`;
      if (isActive && l.type === 'fireship') {

      </div>
      <div class="weapon-special" style="color:var(--${sideClass});margin-top:4px;">
        ${fs > 0 ? `Click a point in range to deploy <b>${fs} Fire Ship${fs>1?'s':''}</b>` : 'Set Fire Ships, then click the map'}
      </div>
      <button class="btn" data-launch-cancel="1" style="width:100%;margin-top:4px;">Cancel</button>
    </div>`;
      } else if (isActive) {
        launchHTML += `<div class="weapon-special" style="color:var(--${sideClass});">${launchHint(meta.target)} · click again to cancel</div>`;
      }
      launchHTML += `</div>`;
    });
    if (!canLaunch && !selShipOOF) {
      launchHTML += `<div class="help-tip ${sideClass}" style="color:var(--text-mute);">Select a ship on the board (in play) to launch assets.</div>`;
    }
    launchHTML += `</div>`;
  }

  // Payload (Porter) management — show attached payloads on the selected Porter
  // ship, with Detach (place within 3") and Reattach (pick up within 3") actions.
  // Always visible when a Porter ship is selected; actions enabled per Order
  // (like weapons/launch), disabled until an Order allows launching.
  let payloadHTML = '';
  if (def.porter && state.selectedShipIdx !== null) {
    const selShip = grp.ships[state.selectedShipIdx];
    const attached = payloadShips(def.side).filter(p => {
      const a = p.ship.attachedTo; return a && a.gid === gid && a.si === state.selectedShipIdx;
    });
    const usedCap = attached.length;
    const freeCap = (def.porter.cap || 1) - usedCap;
    const eo = effectiveOrder(def, grp, state.selectedShipIdx);
    const launchOk = state.phase === 'play' && eo && ORDERS[eo] && ORDERS[eo].fireRule !== 'none' && !selShip.destroyed && !selShip.offTable;
    payloadHTML = `<div class="panel-section">
      <div class="panel-title">Payloads <span class="count">${usedCap}/${def.porter.cap}</span></div>`;
    if (!attached.length) {
      payloadHTML += `<div style="font-size:10px;color:var(--text-mute);font-style:italic;">No payloads attached.</div>`;
    } else {
      attached.forEach(p => {
        payloadHTML += `<div class="weapon-row">
          <div class="weapon-name">${p.def.name}${(p.def.groupSize||1)>1?` #${p.si+1}`:''} <span style="color:var(--text-mute);font-size:9px;">${p.def.payload.size}-payload</span></div>
          ${launchOk
            ? `<button class="btn ${sideClass==='shal'?'shal':''}" data-payload-detach="${p.gid}|${p.si}" style="width:100%;margin-top:4px;">DETACH ▸ place within 3"</button>`
            : `<div class="weapon-special" style="color:var(--text-mute)">${state.phase==='play' ? 'Set a launch-capable Order to detach (GQ/WF/SR/CC).' : 'Detaches in play.'}</div>`}
        </div>`;
      });
    }
    // Reattach: free capacity + a detached same-size payload within 3" of this Porter.
    if (freeCap > 0) {
      const candidates = detachedReattachCandidates(def.side, selShip, def.porter.size);
      if (state.phase === 'play' && launchOk && candidates.length) {
        payloadHTML += `<button class="btn ${sideClass==='shal'?'shal':''}" data-payload-reattach="${gid}|${state.selectedShipIdx}" style="width:100%;margin-top:6px;">⊕ REATTACH ▸ pick within 3"</button>`;
      } else if (state.phase === 'play') {
        payloadHTML += `<div style="font-size:9px;color:var(--text-mute);margin-top:6px;">Reattach: ${!launchOk ? 'needs a launch-capable Order' : 'no detached payload within 3"'}.</div>`;
      }
    }
    payloadHTML += `</div>`;
  }

  // Ships list
  const multiShip = grp.ships.filter(s => !s.destroyed && !s.offTable).length > 1;
  let shipsHTML = `<div class="panel-section">
    <div class="panel-title">Ships <span class="count">${grp.ships.filter(s=>!s.destroyed).length}/${grp.ships.length}</span></div>
    <div class="ship-list">`;
  grp.ships.forEach((ship, si) => {
    const pct = ship.hull / ship.maxHull;
    const hpCls = ship.destroyed ? 'dead' : pct <= 0.34 ? 'crit' : pct <= 0.6 ? 'warn' : '';
    const isSelected = state.selectedShipIdx === si && !ship.destroyed;
    const isLead = (grp.leadShipIdx || 0) === si;
    shipsHTML += `<div class="ship-row" style="${isSelected ? 'background:rgba(74,214,255,0.05);padding-left:4px;' : ''}">
      <span class="ship-idx">#${si+1}</span>
      <span class="ship-nm">${def.name.replace(/ [αβγ]$/, '')} ${grp.ships.length > 1 ? `(${si+1})` : ''}
        ${isLead && multiShip && !noFormation(def) ? `<span style="color:var(--${sideClass});font-size:8.5px;">✦ lead</span>` : ''}
        ${ship.offTable && !ship.destroyed ? '<span style="color:var(--text-mute);font-size:8.5px;">· off-table</span>' : ''}
        ${ship.movedThisRound ? '<span style="color:var(--text-mute);font-size:8.5px;">· moved</span>' : ''}
        ${oofSet.has(si) ? '<span style="color:var(--hull-crit);font-size:8.5px;">· out of formation</span>' : ''}
        ${ship.fireTokens ? `<span style="color:var(--hull-crit);font-size:8.5px;">· 🔥${ship.fireTokens}</span>` : ''}
        ${ship.crippling && ship.crippling.filter(c=>c!=='fire').length ? `<span style="color:var(--hull-warn);font-size:8.5px;">· ${ship.crippling.filter(c=>c!=='fire').map(c=>CRIPPLE_LABEL[c]||c).join(', ')}</span>` : ''}
        ${ship.battalions && (ship.battalions[def.side==='ucm'?'shal':'ucm']>0) ? `<span style="color:var(--hull-crit);font-size:8.5px;">· ⚔${ship.battalions[def.side==='ucm'?'shal':'ucm']} boarders</span>` : ''}
      </span>
      ${multiShip && !noFormation(def) && !ship.destroyed && !ship.offTable && !isLead ? `<button class="hp-btn" data-lead="${gid}|${si}" title="Nominate lead">✦</button>` : ''}
      <span class="ship-hp ${hpCls}">${ship.destroyed ? 'KIA' : ship.hull+'/'+ship.maxHull}</span>
      <div class="hp-btns">
        <button class="hp-btn" data-hpd="${gid}|${si}">−</button>
        <button class="hp-btn" data-hpu="${gid}|${si}">+</button>
      </div>
    </div>`;
  });
  shipsHTML += `</div></div>`;

  // Formation status + benefit card (multi-ship groups in play).
  let formationHTML = '';
  if (def.openNetwork) {
    // Open Network groups don't use coherency/formation/lead at all.
    formationHTML = `<div class="panel-section">
      <div class="panel-title" style="color:var(--shal)">Open Network</div>
      <div class="weapon-row" style="border-left:3px solid var(--shal);background:rgba(212,166,71,0.06);">
        <div class="weapon-special" style="color:var(--text-dim);line-height:1.5;">
          • Ships <b>ignore Coherency</b> & gain <b>no Formation Benefits</b><br>
          • <b>No Lead Ship</b> — each Ship targeted, damaged & spiked individually<br>
          • Crippling Effects/Spikes affect only the targeted Ship<br>
          • Ships choose <b>Orders individually</b> when the Group activates<br>
          • From R2: all your Open Network Ships count as one Group (and one Group for Pass Tokens)
        </div>
      </div>
    </div>`;
  } else if (multiShip) {
    const inForm = oofSet.size === 0;
    const coh = coherencyInches(def);
    if (inForm) {
      formationHTML = `<div class="panel-section">
        <div class="panel-title" style="color:var(--hull-good)">In Formation <span style="color:var(--text-mute)">· ${coh}" coherency</span></div>
        <div class="weapon-row" style="border-left:3px solid var(--hull-good);background:rgba(74,214,255,0.05);">
          <div class="weapon-special" style="color:var(--text-dim)">
            • Unmodifiable <b>6+ backup save</b> vs attacks<br>
            • Immune to <b>Navigation Offline</b> & <b>Orbital Decay</b> crippling effects<br>
            • Group ignores <b>Defence Systems Offline</b> (individual ships still affected)
          </div>
        </div>
      </div>`;
    } else {
      formationHTML = `<div class="panel-section">
        <div class="panel-title" style="color:var(--hull-crit)">Out of Formation</div>
        <div class="help-tip ${sideClass}" style="color:var(--hull-crit)">
          ${oofSet.size} ship${oofSet.size>1?'s':''} out of coherency (${coh}").
          Formation benefits are lost until ships regroup${grp.ships.filter(s=>!s.destroyed&&!s.offTable).length>=4?' (within '+coh+'" of ≥2 others)':' (within '+coh+'" of another ship)'}.
        </div>
      </div>`;
    }
  }

  // Layer-split warning — all ships in a group must share an orbital layer.
  // (Open Network ships are independent — no shared-layer requirement.)
  const lsplit = groupLayerSplit(def);
  if (multiShip && !noFormation(def) && lsplit.split) {
    formationHTML += `<div class="panel-section">
      <div class="panel-title" style="color:var(--hull-warn)">Layer Split</div>
      <div class="help-tip ${sideClass}" style="color:var(--hull-warn)">
        Group spans two layers (${lsplit.orbit} in Orbit, ${lsplit.atmo} in Atmosphere).
        All ships in a Group must share an orbital layer — bring them together.
      </div>
    </div>`;
  }

  // Movement / actions for selected ship — only in play phase
  let moveHTML = '';
  if (state.phase === 'deploy') {
    // Show Undo Deploy buttons for placed (on-table, not-yet-moved) ships.
    const hasPlaced = grp.ships.some(s => !s.destroyed && !s.offTable);
    const undoButtons = hasPlaced ? `<button class="btn" data-undo-deploy="${gid}" style="width:100%;margin-top:4px;">↩ UNDO DEPLOY (return all ships off-table)</button>` : '';
    moveHTML = `<div class="panel-section">
      <div class="help-tip ${sideClass}">
        <b>Deployment phase.</b> Select a Group, then click in your DZ to place each ship; move the mouse and click again to set facing. To reposition a placed ship, click it to select, then click a new spot and re-aim.
      </div>
      ${undoButtons}
    </div>`;
  } else if (state.phase === 'play') {
    const selEffOrder = effectiveOrder(def, grp, state.selectedShipIdx);
    if (state.selectedShipIdx !== null && selEffOrder) {
      const ship = grp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed) {
        const o = ORDERS[selEffOrder];
        const minMove = (o.moveMin * def.thrust).toFixed(1);
        const maxMove = (o.moveMax * def.thrust).toFixed(1);
        const moved = ship.movedThisRound;
        // Layer state + effect of the pending toggle.
        const curLayer = ship.layer || 'orbit';
        const normalMaxR = effectiveMaxMovePx(def, ship, grp.order ? effectiveOrder(def, grp, state.selectedShipIdx) : grp.order);
        const lm = layerMove(normalMaxR, ship, state.layerToggle);
        const effMaxIn = (lm.maxPx / INCH).toFixed(1);
        const targetLayer = lm.endLayer;
        const toggleLabel = curLayer === 'orbit'
          ? (state.layerToggle ? '↓ Descending → Atmosphere' : '↓ Descend to Atmosphere')
          : (state.layerToggle ? '↑ Ascending → Orbit (−4")' : '↑ Ascend to Orbit (−4")');
        moveHTML = `<div class="panel-section">
          <div class="panel-title">Ship #${state.selectedShipIdx+1} — Actions</div>
          <div class="move-status ${moved ? 'ok' : ''}">
            <span>Move range</span><b>${minMove}"–${moved ? maxMove : effMaxIn}"</b>
          </div>
          <div class="move-status">
            <span>Turn limit</span><b>${o.turnLimit > 0 ? '±' + o.turnLimit + '°' : 'No turn'}</b>
          </div>
          <div class="move-status">
            <span>Layer</span><b style="color:${curLayer === 'orbit' ? 'var(--ucm)' : 'var(--hull-warn)'}">${curLayer === 'orbit' ? 'ORBIT' : 'ATMOSPHERE'}${state.layerToggle ? ' → ' + (targetLayer === 'orbit' ? 'ORBIT' : 'ATMO') : ''}</b>
          </div>
          ${def.vectored ? `<div class="move-status"><span>Special</span><b style="color:var(--ucm)">Vectored</b></div>` : ''}
          ${!moved ? `<button class="btn ${state.layerToggle ? (sideClass==='shal'?'shal':'') : ''}" data-layer-toggle="1"
              style="width:100%;margin-top:4px;${state.layerToggle ? 'border-color:var(--'+sideClass+');color:var(--'+sideClass+');' : ''}">
              ${toggleLabel}${state.layerToggle ? ' ✓' : ''}</button>` : ''}
          <div class="help-tip ${sideClass}">
            ${moved
              ? `<b style="color:var(--hull-warn)">This ship has already moved this round.</b> Use UNDO MOVE to take it back, or pick another ship.`
              : (o.moveMax > 0
                  ? `Click inside the highlighted cone to move there. Ship <b>refaces</b> toward travel direction.${turnLimitText(o)}`
                  : 'No movement allowed on this Order.')}
            ${!moved && lm.label ? '<br><b>' + lm.label + '</b>' : ''}
            ${selEffOrder === 'CC' && !moved ? '<br><b>Course Change:</b> after moving, aim the bonus ±45° turn with the mouse and click to set.' : ''}
            ${def.vectored && !moved ? '<br><b>Vectored:</b> after moving, pivot ±45° (click), then optionally move again with any leftover thrust.' : ''}
            ${ship.justArrived && !grp.ships.some(s => s.movedThisRound || s.firedThisActivation || (s.launchedThisRound>0) || s.detectorUsed) ? '<br><b style="color:var(--'+sideClass+')">Just deployed:</b> click in your Zone to re-place this ship and re-aim, until the Group acts.' : ''}
          </div>
          <div class="move-actions" style="margin-top:6px;">
            ${!moved && o.moveMax > 0 && (selEffOrder === 'CC' || selEffOrder === 'DC') ? `<button class="btn" data-hold-position="${gid}|${state.selectedShipIdx}" style="width:100%;">⏸ HOLD POSITION (move 0")</button>` : ''}
            ${(ship.firedThisActivation || ship.detectorUsed || (ship.launchedThisRound > 0))
              ? `<button class="btn" disabled style="width:100%;opacity:0.45;cursor:not-allowed;" title="Can't undo move after firing, detecting, or launching">⟲ UNDO MOVE (locked)</button>`
              : `<button class="btn" data-clear-trail="${gid}|${state.selectedShipIdx}" style="width:100%;">⟲ UNDO MOVE</button>`}
            ${objectivesBeyondEligible(gid, state.selectedShipIdx) ? `<button class="btn" data-flyoff="${gid}|${state.selectedShipIdx}" style="width:100%;color:#b59ad6;border-color:#b59ad6;">✈ FLY OFF (Objectives Beyond)</button>` : ''}
            ${breakthroughFlyoffEligible(gid, state.selectedShipIdx) ? `<button class="btn" data-bt-flyoff="${gid}|${state.selectedShipIdx}" style="width:100%;color:#b59ad6;border-color:#b59ad6;">✈ FLY OFF (Breakthrough · ${shipPoints(def)} pts)</button>` : ''}
            <button class="btn-finish-act" data-finish-activation="${gid}">FINISH ACTIVATION ▸</button>
          </div>
        </div>`;
      }
    } else if (grp.order && !grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">
          Order set: <b>${ORDERS[grp.order].label}</b>.<br>
          Click a ship on the board to move it.
        </div>
        <div style="margin-top:6px;">
          <button class="btn-finish-act" data-finish-activation="${gid}">FINISH ACTIVATION ▸</button>
        </div>
      </div>`;
    } else if (!grp.order && !grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">Select an Order first ↑</div>
      </div>`;
    } else if (grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">This Group has activated this round. Use END ROUND to reset.</div>
      </div>`;
    }
  }

  div.innerHTML = statsHTML + deployPromptHTML + deployGateHTML + ordersHTML + formationHTML + weaponsHTML + surveyHTML + extractHTML + launchHTML + payloadHTML + shipsHTML + moveHTML;
}

/* ==========================================================================
   RENDERING — BOARD (SVG)
   ========================================================================== */
function renderBoard() {
  const svg = document.getElementById('board');
  let html = '';

  // background grid — 6" major, 1" minor
  html += '<g id="grid">';
  // minor 1"
  for (let i = 1; i < BOARD_IN; i++) {
    if (i % 6 === 0) continue;
    html += `<line x1="${i*INCH}" y1="0" x2="${i*INCH}" y2="${BOARD_PX}" stroke="var(--grid-line)" stroke-width="0.4"/>`;
    html += `<line x1="0" y1="${i*INCH}" x2="${BOARD_PX}" y2="${i*INCH}" stroke="var(--grid-line)" stroke-width="0.4"/>`;
  }
  // major 6"
  for (let i = 6; i < BOARD_IN; i += 6) {
    html += `<line x1="${i*INCH}" y1="0" x2="${i*INCH}" y2="${BOARD_PX}" stroke="var(--grid-line)" stroke-width="1"/>`;
    html += `<line x1="0" y1="${i*INCH}" x2="${BOARD_PX}" y2="${i*INCH}" stroke="var(--grid-line)" stroke-width="1"/>`;
  }
  // Deployment zones — scenario-driven if available, else simple top/bottom strips
  if (state.scenario) {
    html += renderDeploymentZones();
  } else {
    html += `<rect x="0" y="0" width="${BOARD_PX}" height="${6*INCH}" fill="var(--shal)" fill-opacity="0.025"/>`;
    html += `<rect x="0" y="${BOARD_PX - 6*INCH}" width="${BOARD_PX}" height="${6*INCH}" fill="var(--ucm)" fill-opacity="0.025"/>`;
  }
  // Vanguard halo (deploy phase only, when a Vanguard ship is selected)
  html += renderVanguardHalo();
  // Static scenery (planetary rings, large objects)
  if (state.scenarioData) {
    html += renderStaticScenery();
    // Dropsites
    state.scenarioData.dropsites.forEach(d => {
      html += renderDropsite(d);
    });
  }
  // table edge
  html += `<rect x="0" y="0" width="${BOARD_PX}" height="${BOARD_PX}" fill="none" stroke="var(--border-bright)" stroke-width="1"/>`;
  html += '</g>';

  // Render ship arcs/scan FIRST (under) for selected group
  const selGid = state.selectedGroupId;
  if (selGid) {
    const def = getDef(selGid);
    const grp = getGroup(selGid);

    // Formation coherency rings — shown while moving/aiming a ship in a multi-ship
    // group, around the OTHER ships, so the player can see the in-formation area.
    const aliveCount = grp.ships.filter(s => !s.destroyed && !s.offTable).length;
    const selOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    const movingActive = (state.selectedShipIdx !== null && selOrd &&
                          ORDERS[selOrd] && ORDERS[selOrd].moveMax > 0)
                         || (state.aiming && state.aiming.gid === selGid)
                         || (state.vectoredSecondMove && state.vectoredSecondMove.gid === selGid);
    if (aliveCount >= 2 && movingActive && !noFormation(def)) {
      const cohPx = coherencyInches(def) * INCH;
      const cohCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      grp.ships.forEach((s, si) => {
        if (s.destroyed || s.offTable) return;
        if (si === state.selectedShipIdx) return; // don't ring the ship being moved
        html += `<circle cx="${s.x}" cy="${s.y}" r="${cohPx}" fill="none"
                  stroke="${cohCol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.35"/>`;
      });
    }

    // Enemy signature auras — while moving a friendly ship, show every enemy
    // ship's detection bubble = (effective Signature + 3" per Spike) around its base.
    if (movingActive) {
      const enemySide = def.side === 'ucm' ? 'shal' : 'ucm';
      const enemyFleet = fleetForSide(enemySide);
      const enemyCol = 'var(--hull-crit)';
      enemyFleet.forEach(edef => {
        const eg = getGroup(edef.id);
        if (!eg) return;
        const spikes = eg.spikes || 0;
        eg.ships.forEach(es => {
          if (es.destroyed || es.offTable) return;
          // Effective signature: Silent Running drops it to 0.
          const sig = es.sigSilent ? 0 : edef.sig;
          const sigPx = (sig + 3 * spikes) * INCH;
          if (sigPx <= 0) return; // sig 0 and no spikes — nothing to show
          html += `<circle cx="${es.x}" cy="${es.y}" r="${sigPx}" fill="rgba(255,82,82,0.04)"
                    stroke="${enemyCol}" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>`;
        });
      });
    }

    const launchingHere = state.launching && state.launching.gid === selGid;
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      const isSel = state.selectedShipIdx === si;
      // While launching from this ship, suppress its scan/arc overlay (replaced
      // by the launch aura below).
      if (launchingHere && state.launching.si === si) return;
      html += renderShipOverlays(def, ship, isSel);
    });

    // Launch aura — replaces scan/arc overlay on the launching ship.
    if (launchingHere) {
      const lship = grp.ships[state.launching.si];
      if (lship && !lship.destroyed && !lship.offTable) {
        const acol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
        if (state.launching.type === 'gate_dropship') {
          // Shaltari Mothership: visualise the 18" Voidgate chain + 3" drop reach.
          const gates = connectedGateships(def.side, lship.x, lship.y);
          const reachPx = 3 * INCH;
          const CHAIN_PX = 18 * INCH;
          const gsel = state.launching.gateSel;
          // Chain links.
          gates.forEach(g => {
            if (Math.hypot(g.x - lship.x, g.y - lship.y) <= CHAIN_PX) {
              html += `<line x1="${lship.x}" y1="${lship.y}" x2="${g.x}" y2="${g.y}" stroke="${acol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.5"/>`;
            }
          });
          for (let i = 0; i < gates.length; i++) {
            for (let j = i + 1; j < gates.length; j++) {
              if (Math.hypot(gates[i].x - gates[j].x, gates[i].y - gates[j].y) <= CHAIN_PX) {
                html += `<line x1="${gates[i].x}" y1="${gates[i].y}" x2="${gates[j].x}" y2="${gates[j].y}" stroke="${acol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.35"/>`;
              }
            }
          }
          // Each connected Voidgate: ring + remaining gateship value. Selected gate
          // is highlighted and shows its 3" drop-reach circle.
          gates.forEach(g => {
            const rem = gateRemaining(g.ship, g.def);
            const isSel = gsel && gsel.si === g.si && gsel.gid === g.def.id;
            const gr = shipBaseRadiusPx(g.def);
            html += `<circle cx="${g.x}" cy="${g.y}" r="${gr + 3}" fill="none"
                      stroke="${acol}" stroke-width="${isSel?2:0.8}" opacity="${rem>0?1:0.35}"/>`;
            html += `<text x="${g.x}" y="${g.y - gr - 5}" font-family="var(--mono)" font-size="7.5"
                      font-weight="700" fill="${acol}" text-anchor="middle"
                      stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">G${rem}</text>`;
            if (isSel) {
              html += `<circle cx="${g.x}" cy="${g.y}" r="${reachPx}"
                        fill="rgba(212,166,71,0.09)" stroke="${acol}" stroke-width="1" stroke-dasharray="4 3"/>`;
            }
          });
          const launchEntry = (def.launch || []).find(x => x.type === 'gate_dropship');
          const cap = launchEntry ? launchEntry.n : 0;
          const motherLeft = cap - (lship.launchedThisRound || 0);
          const lbl = !gates.length ? 'NO VOIDGATE IN CHAIN · right-click to cancel'
            : gsel ? `Pick dropsite within 3" · right-click to cancel · Mothership ${motherLeft} left`
            : `Pick a Voidgate · right-click to cancel · Mothership ${motherLeft}/${cap} Dropships`;
          html += `<text x="${lship.x}" y="${lship.y - 14}" font-family="var(--mono)" font-size="8"
                    font-weight="700" fill="${acol}" text-anchor="middle"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                    pointer-events="none">${lbl}</text>`;
        } else {
          const auraPx = state.launching.auraIn * INCH;
          html += `<circle cx="${lship.x}" cy="${lship.y}" r="${auraPx}"
                    fill="${def.side === 'ucm' ? 'rgba(74,214,255,0.06)' : 'rgba(212,166,71,0.06)'}"
                    stroke="${acol}" stroke-width="1" stroke-dasharray="5 3"/>`;
          html += `<text x="${lship.x}" y="${lship.y - auraPx - 4}" font-family="var(--mono)" font-size="8"
                    font-weight="700" fill="${acol}" text-anchor="middle"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                    pointer-events="none">${state.launching.name.toUpperCase()} ${state.launching.auraIn}"</text>`;
        }
      }
    }

    // Move trail / ghost for selected ship
    const ghostOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    if (state.selectedShipIdx !== null && ghostOrd) {
      const ship = grp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed && ORDERS[ghostOrd].moveMax > 0 && !ship.movedThisRound) {
        const o = ORDERS[ghostOrd];
        const normalMaxR = effectiveMaxMovePx(def, ship, ghostOrd);
        const lm = layerMove(normalMaxR, ship, state.layerToggle);
        const maxR = lm.maxPx;
        // Min move scales if the layer cap is below the normal min (atmosphere).
        let minR = o.moveMin * def.thrust * INCH;
        if (minR > maxR) minR = 0;
        const turnDeg = o.turnLimit || 0; // 0 = no turn, ship moves straight; 45 = ±45° cone
        const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';

        // Draw the LEGAL MOVE CONE — annular wedge between minR and maxR, ±turnDeg from facing.
        // Always show this cone whenever a ship with a move-allowing order is selected.
        html += renderMoveCone(ship.x, ship.y, ship.heading, minR, maxR, turnDeg, sideCol);

        // Hover ghost
        if (state.hoverPoint) {
          const dx = state.hoverPoint.x - ship.x;
          const dy = state.hoverPoint.y - ship.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const inRange = dist >= minR - 1 && dist <= maxR + 1;
          // Angle between facing and target vector
          const fwd = headingVec(ship.heading);
          const cosAngle = (fwd.x * dx + fwd.y * dy) / Math.max(0.0001, dist);
          const clampedCos = Math.max(-1, Math.min(1, cosAngle));
          const angleDeg = Math.acos(clampedCos) * 180 / Math.PI;
          const inCone = angleDeg <= turnDeg + 0.5;
          const finalOk = inRange && inCone;

          // Direction of travel becomes the new facing
          const travelHeading = Math.atan2(dy, dx) * 180 / Math.PI;

          const ghostColor = finalOk ? sideCol : 'var(--hull-crit)';
          // Line from ship to target
          html += `<line x1="${ship.x}" y1="${ship.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}"
                    stroke="${ghostColor}" stroke-width="1" stroke-dasharray="4 3" opacity="0.75"/>`;
          // Ghost ship rotated to face travel direction (only if finalOk; else keep original facing for visual clarity)
          const ghostShip = {
            ...ship,
            x: state.hoverPoint.x,
            y: state.hoverPoint.y,
            heading: finalOk ? travelHeading : ship.heading
          };
          html += renderShipMarker(def, ghostShip, true, finalOk);
          const distIn = (dist / INCH).toFixed(1);
          const turnFromFacing = Math.round(angleDeg);
          // Label: distance + turn-required
          let labelText = `${distIn}"`;
          if (turnDeg > 0 && finalOk) labelText += ` · ${turnFromFacing}°`;
          else if (!inCone && turnDeg === 0) labelText = `${distIn}" · NO TURN`;
          else if (!inCone) labelText = `${distIn}" · ${turnFromFacing}° > ${turnDeg}°`;
          else if (!inRange) labelText = `${distIn}" OUT OF RANGE`;
          html += `<text x="${state.hoverPoint.x + 10}" y="${state.hoverPoint.y - 8}"
                    font-family="var(--mono)" font-size="9" font-weight="500"
                    fill="${ghostColor}"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  >${labelText}</text>`;
        }
      }
    }

    // Vectored second move overlay — straight-ahead range 0"–remaining, no turn.
    if (state.vectoredSecondMove && state.vectoredSecondMove.gid === selGid) {
      const v = state.vectoredSecondMove;
      const vship = grp.ships[v.si];
      if (vship && !vship.destroyed) {
        const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
        const maxR = v.remaining;
        // Draw a thin straight-ahead corridor (turnDeg ~0) from the ship's nose.
        html += renderMoveCone(vship.x, vship.y, vship.heading, 0, maxR, 0, sideCol);

        if (state.hoverPoint) {
          const dx = state.hoverPoint.x - vship.x;
          const dy = state.hoverPoint.y - vship.y;
          const dist = Math.hypot(dx, dy);
          const fwd = headingVec(vship.heading);
          const cosAngle = (fwd.x * dx + fwd.y * dy) / Math.max(0.0001, dist);
          const angleDeg = Math.acos(Math.max(-1, Math.min(1, cosAngle))) * 180 / Math.PI;
          const inRange = dist <= maxR + 1;
          const straight = angleDeg <= 20;
          const finalOk = inRange && straight;
          const ghostColor = finalOk ? sideCol : 'var(--hull-crit)';
          html += `<line x1="${vship.x}" y1="${vship.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}"
                    stroke="${ghostColor}" stroke-width="1" stroke-dasharray="4 3" opacity="0.75"/>`;
          // Ghost keeps current heading (no turn on second move).
          const ghostShip = { ...vship, x: state.hoverPoint.x, y: state.hoverPoint.y, heading: vship.heading };
          html += renderShipMarker(def, ghostShip, true, finalOk);
          const distIn = (dist / INCH).toFixed(1);
          const remIn = (maxR / INCH).toFixed(1);
          let labelText = `${distIn}" / ${remIn}"`;
          if (!straight) labelText = `${distIn}" · NO TURN`;
          else if (!inRange) labelText = `${distIn}" OUT OF RANGE`;
          html += `<text x="${state.hoverPoint.x + 10}" y="${state.hoverPoint.y - 8}"
                    font-family="var(--mono)" font-size="9" font-weight="500"
                    fill="${ghostColor}"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  >${labelText}</text>`;
        }
      }
    }
  }
  // Movement traces — faint dashed path from each ship's start-of-turn position
  // through its move(s) to its current spot. Cleared on Finish Activation / round end.
  allDefs().forEach(def => {
    const grp = getGroup(def.id);
    const trail = grp.moveTrail || [];
    if (!trail.length) return;
    const traceCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      if (payloadAttached(ship)) return;
      // Gather this ship's trail points (previous positions), in order, then current.
      const pts = trail.filter(t => t.si === si).map(t => ({ x: t.x, y: t.y }));
      if (!pts.length) return;
      pts.push({ x: ship.x, y: ship.y });
      let d = `M ${pts[0].x} ${pts[0].y}`;
      for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
      html += `<path d="${d}" fill="none" stroke="${traceCol}" stroke-width="1"
                stroke-dasharray="2 3" opacity="0.5"/>`;
      // Small origin marker at the start point.
      html += `<circle cx="${pts[0].x}" cy="${pts[0].y}" r="2" fill="${traceCol}" opacity="0.5"/>`;
    });
  });

  allDefs().forEach(def => {
    const grp = getGroup(def.id);
    const oof = outOfFormationSet(def);
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      if (payloadAttached(ship)) return; // attached payloads ride inside their Porter
      const isSel = state.selectedGroupId === def.id && state.selectedShipIdx === si;
      const isInSelGroup = state.selectedGroupId === def.id;
      html += renderShipMarker(def, ship, false, true, isSel, isInSelGroup, si);
      const r = shipBaseRadiusPx(def);
      // Lead-ship marker — small ✦ above the base (not for Open Network).
      if (!noFormation(def) && (grp.leadShipIdx || 0) === si && grp.ships.filter(s => !s.destroyed && !s.offTable).length > 1) {
        html += `<text x="${ship.x}" y="${ship.y - r - 4}" font-family="var(--mono)" font-size="9"
                  font-weight="700" fill="${def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)'}"
                  text-anchor="middle" pointer-events="none">✦</text>`;
      }
      // Out-of-formation marker — red dashed ring + tag.
      if (oof.has(si)) {
        html += `<circle cx="${ship.x}" cy="${ship.y}" r="${r + 3}" fill="none"
                  stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="2 2"/>`;
        html += `<text x="${ship.x}" y="${ship.y + r + 11}" font-family="var(--mono)" font-size="7"
                  font-weight="700" fill="var(--hull-crit)" text-anchor="middle"
                  stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  pointer-events="none">OUT OF FORM.</text>`;
      }
      // Atmosphere layer badge — small "ATMO" pill below the base.
      if ((ship.layer || 'orbit') === 'atmosphere') {
        html += `<text x="${ship.x}" y="${ship.y + r + (oof.has(si) ? 19 : 11)}" font-family="var(--mono)" font-size="6.5"
                  font-weight="700" fill="var(--hull-warn)" text-anchor="middle"
                  stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  pointer-events="none">ATMO</text>`;
      }
    });
  });

  // Dropsite-origin launch aura (Activate Dropsites step).
  if (state.launching && state.launching.fromDropsite) {
    const L = state.launching;
    const auraPx = L.auraIn * INCH;
    const acol = L.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    html += `<circle cx="${L.x}" cy="${L.y}" r="${auraPx}"
      fill="${L.side==='ucm'?'rgba(74,214,255,0.06)':'rgba(212,166,71,0.06)'}"
      stroke="${acol}" stroke-width="1" stroke-dasharray="5 3"/>`;
    html += `<text x="${L.x}" y="${L.y - auraPx - 4}" font-family="var(--mono)" font-size="8"
      font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2"
      paint-order="stroke" pointer-events="none">${L.name.toUpperCase()} ${L.auraIn}"</text>`;
  }

  // Dropsite Feature WEAPON scan radius (while targeting a feature attack).
  if (state.featureAttack) {
    const fa = state.featureAttack;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === fa.dsId);
    const f = ds && FEATURES[ds.features[fa.fi]];
    if (ds && f && f.weapon) {
      const scanPx = (parseInt(f.weapon.scan) || 6) * INCH;
      const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
      const acol = fa.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      html += `<circle cx="${dsx}" cy="${dsy}" r="${scanPx}"
        fill="rgba(255,82,82,0.05)" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="4 3"/>`;
      html += `<text x="${dsx}" y="${dsy - scanPx - 4}" font-family="var(--mono)" font-size="8"
        font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2"
        paint-order="stroke" pointer-events="none">${f.weapon.name.toUpperCase()} ${parseInt(f.weapon.scan)||6}"</text>`;
    }
  }

  // Extract range aura: ship in extract-targeting mode shows its 6" reach to Dropsites.
  if (state.extracting) {
    const eg = state.groups[state.extracting.gid];
    const es = eg && eg.ships[state.extracting.si];
    if (es && !es.destroyed && !es.offTable) {
      const rPx = 6 * INCH;
      html += `<circle cx="${es.x}" cy="${es.y}" r="${rPx}" fill="rgba(181,154,214,0.06)" stroke="#b59ad6" stroke-width="1" stroke-dasharray="5 3"/>
        <text x="${es.x}" y="${es.y - rPx - 4}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">EXTRACT 6"</text>`;
    }
  }

  // Explosion radius aura: while an Explosion is pending/resolving in the attack modal,
  // show its blast radius so the player sees which ships are caught.
  if (state.attackModal && state.attackModal.step === 'explosion' && state.attackModal.explodeQueue && state.attackModal.explodeQueue[0]) {
    const ex = state.attackModal.explodeQueue[0];
    const mult = (ex.rolled && ex.effKind === 'spike2x') ? 2 : 1;
    const rPx = ex.rangeIn * INCH * mult;
    html += `<circle cx="${ex.x}" cy="${ex.y}" r="${rPx}" fill="rgba(255,82,82,0.10)" stroke="var(--hull-crit)" stroke-width="1.5" stroke-dasharray="6 4">
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="1.1s" repeatCount="indefinite"/></circle>
    <text x="${ex.x}" y="${ex.y - rPx - 5}" font-family="var(--mono)" font-size="9" font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">💥 ${ex.rangeIn * mult}"</text>`;
  }

  // Enemy signature auras during Dropsite Activation (and while targeting a feature
  // weapon): weapon range = Scan + (effective Signature + 3"/Spike), so show each
  // enemy ship's detection bubble around its base.
  if ((state.dropsiteActivation && state.dropsiteActivation.dsId) || state.featureAttack) {
    const actSide = state.featureAttack ? state.featureAttack.side
      : (state.dropsiteActivation ? state.dropsiteActivation.side : null);
    // Sig/Spikes only extend range for NON-Close-Action weapons. Skip the auras when the
    // weapon being targeted is Close Action, or (in general activation) when the dropsite
    // has no non-Close-Action weapon feature.
    let showSigAuras = true;
    if (state.featureAttack) {
      const fads = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === state.featureAttack.dsId);
      const faf = fads && FEATURES[fads.features[state.featureAttack.fi]];
      showSigAuras = !!(faf && faf.weapon && !/Close Action/i.test(faf.weapon.special || ''));
    } else if (state.dropsiteActivation && state.dropsiteActivation.dsId) {
      const ads = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === state.dropsiteActivation.dsId);
      showSigAuras = !!(ads && (ads.features || []).some((fk, fi) => !(ads.destroyedFeatures||[]).includes(fi) && FEATURES[fk] && FEATURES[fk].weapon && !/Close Action/i.test(FEATURES[fk].weapon.special || '')));
    }
    if (actSide && showSigAuras) {
      const enemySide = actSide === 'ucm' ? 'shal' : 'ucm';
      fleetForSide(enemySide).forEach(edef => {
        const eg = getGroup(edef.id);
        if (!eg) return;
        const spikes = eg.spikes || 0;
        eg.ships.forEach(es => {
          if (es.destroyed || es.offTable) return;
          const sig = es.sigSilent ? 0 : (edef.sig || 0);
          const sigPx = (sig + 3 * (spikes + (es.spikes || 0))) * INCH;
          if (sigPx <= 0) return;
          html += `<circle cx="${es.x}" cy="${es.y}" r="${sigPx}" fill="rgba(255,82,82,0.04)"
                    stroke="var(--hull-crit)" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>`;
        });
      });
    }
  }

  // Auto-show a Dropsite's Scan (weapon) and Launch auras while it is being activated
  // (not while actively targeting — those more specific circles above take over).
  if (state.dropsiteActivation && state.dropsiteActivation.dsId && !state.featureAttack &&
      !(state.launching && state.launching.fromDropsite)) {
    const da = state.dropsiteActivation;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === da.dsId);
    if (ds) {
      const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
      const acol = da.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      // Scan range: best weapon scan among weapon features, else base Scan, else 6".
      let scanIn = 0;
      (ds.features || []).forEach((fk, fi) => {
        if ((ds.destroyedFeatures || []).includes(fi)) return;
        const f = FEATURES[fk];
        if (f && f.weapon) scanIn = Math.max(scanIn, parseInt(f.weapon.scan) || 6);
      });
      if (!scanIn && ds.base && ds.base.scan) scanIn = parseInt(ds.base.scan) || 0;
