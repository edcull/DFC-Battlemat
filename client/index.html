  atmPlane.renderOrder = 0;
  scene.add(atmPlane);
  const atmFrame = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(576, 1, 576)), new THREE.LineBasicMaterial({ color: 0x1a4a5a, transparent: true, opacity: 0.6 }));
  atmFrame.position.y = 60;
  scene.add(atmFrame);

  // Orbit layer plane (y=120)
  const orbGeo = new THREE.PlaneGeometry(576, 576);
  orbGeo.rotateX(-Math.PI / 2);
  const orbPlane = new THREE.Mesh(orbGeo, new THREE.MeshBasicMaterial({ color: 0x4ad6ff, transparent: true, opacity: 0.03, side: THREE.DoubleSide, depthWrite: false }));
  orbPlane.position.y = 120;
  orbPlane.renderOrder = 0;
  scene.add(orbPlane);
  const orbFrame = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(576, 1, 576)), new THREE.LineBasicMaterial({ color: 0x1a4a5a, transparent: true, opacity: 0.6 }));
  orbFrame.position.y = 120;
  scene.add(orbFrame);

  // Static scenery group — rings, asteroids, dropsites, placed clouds.
  // Only rebuilt when scenario content changes, not on every sync.
  _3dStaticGrp = new THREE.Group();
  _3dStaticHash = '';
  scene.add(_3dStaticGrp);

  // Dynamic objects group (ships, overlays, ghosts) — rebuilt on each sync.
  const dyn = new THREE.Group();
  scene.add(dyn);

  // Animate
  let animId;
  const animate = () => { animId = requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
  animate();

  // Resize
  const onResize = () => {
    const W = wrap.clientWidth, H = wrap.clientHeight;
    if (!W || !H) return;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  };
  const ro = new ResizeObserver(onResize);
  ro.observe(wrap);

  _3d = { renderer, scene, camera, controls, dyn, animId, ro };

  // Interaction: disambiguate click from OrbitControls drag by checking pointer delta.
  let _pdPos = null;
  canvas.addEventListener('pointerdown', e => { _pdPos = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener('pointerup', e => {
    if (!_pdPos) return;
    const dx = e.clientX - _pdPos.x, dy = e.clientY - _pdPos.y;
    _pdPos = null;
    if (Math.hypot(dx, dy) < 5) _handle3dClick(e);
  });
  canvas.addEventListener('pointermove', _handle3dMousemove);
  canvas.addEventListener('pointerleave', () => {
    if (state.hoverPoint) { state.hoverPoint = null; sync3d(); }
  });
  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (state.phase === 'scenery' && state.sceneryPlace) {
      const sp = state.sceneryPlace;
      if (sp.pending) { sp.pending = null; sp.angle = 0; state.hoverPoint = null; renderAll(true); }
      else { state.sceneryPlace = null; state.hoverPoint = null; renderAll(true); }
      return;
    }
    if (state.pendingGroundLaunch) {
      state.pendingGroundLaunch = null; state.selectedDropsiteId = null;
      flashLaunchMsg('Launch cancelled'); renderAll(true); return;
    }
    if (state.launching) {
      if (state.launching.gateSel) { state.launching.gateSel = null; flashLaunchMsg('Voidgate selection cancelled'); }
      else { state.launching = null; flashLaunchMsg('Launch cancelled'); }
      renderAll(); return;
    }
    if (state.assetMove) { state.assetMove = null; renderAll(); return; }
    if (state.extracting) { state.extracting = null; flashLaunchMsg('Extract cancelled'); renderAll(); return; }
    if (state.featureAttack) { state.featureAttack = null; flashLaunchMsg('Targeting cancelled'); renderAll(true); return; }
    if (state.aiming || state.vectoredSecondMove) {
      state.aiming = null; state.vectoredSecondMove = null; state.hoverPoint = null; renderAll(); return;
    }
    if (state.battalionDeploy) { state.battalionDeploy = null; renderAll(); return; }
    if (state.payloadDetach) { state.payloadDetach = null; flashLaunchMsg('Detach cancelled'); renderAll(true); return; }
    if (state.payloadReattach) { state.payloadReattach = null; flashLaunchMsg('Reattach cancelled'); renderAll(); return; }
    if (state.antiWing) { state.antiWing = null; flashLaunchMsg('Anti-Wing cancelled'); renderAll(); return; }
    if (state.detector) { state.detector = null; flashLaunchMsg('Detector cancelled'); renderAll(); return; }
    if (state.targeting) { state.targeting = null; flashLaunchMsg('Targeting cancelled'); renderAll(true); return; }
    if (state.layerToggle) { state.layerToggle = false; state.hoverPoint = null; renderAll(); return; }
  });

  _loadGlbModels();
  sync3d();
}

function teardown3d() {
  if (!_3d) return;
  cancelAnimationFrame(_3d.animId);
  _3d.ro.disconnect();
  _3d.controls.dispose();
  _3d.renderer.dispose();
  _3d = null;
  // Clear static group and caches
  if (_3dStaticGrp) { _disposeObj3d(_3dStaticGrp); _3dStaticGrp = null; }
  _3dStaticHash = '';
  _3dCircleGeoCache.forEach(g => g.dispose());
  _3dCircleGeoCache.clear();
  Object.values(_3dGhostMatCache).forEach(m => m.dispose());
  Object.keys(_3dGhostMatCache).forEach(k => delete _3dGhostMatCache[k]);
  _3dConeGeoCache = null;
  _3dMatTargetRed = _3dMatTargetGrey = _3dMatGhostSolid = null;
}

// Recursively dispose all geometries and materials in an Object3D subtree.
function _disposeObj3d(obj) {
  obj.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      // Skip materials flagged as shared (e.g. cached ghost materials) —
      // disposing a shared material would break all other users of the same object.
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(m => { if (!m._shared) m.dispose(); });
    }
  });
}

// Wrap a loaded GLB scene so its yaw correction lives on an inner Group.
// The outer Group's rotation.y stays free for per-ship heading direction —
// without this the heading assignment in _sync3dShips would overwrite the yaw.
// Returns the outer Group, normalised so the longest bbox dim = 14 and the
// bbox centre is at the local origin.
function _normaliseGlb(gltfScene, yaw) {
  const inner = new THREE.Group();
  inner.rotation.y = yaw || 0;
  inner.add(gltfScene);

  const outer = new THREE.Group();
  outer.add(inner);

  const box    = new THREE.Box3().setFromObject(outer);
  const center = new THREE.Vector3();
  const size   = new THREE.Vector3();
  box.getCenter(center);
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim > 0) {
    const s = 14 / maxDim;
    outer.scale.setScalar(s);
    outer.position.copy(center).multiplyScalar(-s);
  }
  return outer;
}

// Normalise a city GLB: scale to targetFootprint, centre in XZ, and ground-pin
// so the bottom of the geometry sits at y=0 (same formula as XZ centering but
// using min rather than midpoint).
function _normaliseGlbCity(gltfScene, targetFootprint) {
  const outer = new THREE.Group();
  outer.add(gltfScene);
  outer.updateMatrixWorld(true);

  const box  = new THREE.Box3().setFromObject(outer);
  const size = new THREE.Vector3();
  box.getSize(size);

  const footprint = Math.max(size.x, size.z);
  if (footprint > 0) {
    const s = targetFootprint / footprint;
    outer.scale.setScalar(s);
    outer.position.x = -(box.min.x + box.max.x) / 2 * s;
    outer.position.z = -(box.min.z + box.max.z) / 2 * s;
    outer.position.y = -box.min.y * s;
  }
  return outer;
}

// Load all faction GLBs (cruisers, frigates, bio cell) and cache normalised templates.
function _loadGlbModels() {
  const loader = new GLTFLoader();

  // Cruisers (M / H / SH tonnage)
  Object.entries(_FACTION_GLB).forEach(([faction, url]) => {
    loader.load(url, gltf => {
      _glbModels[faction] = _normaliseGlb(gltf.scene, _FACTION_GLB_YAW[faction] || 0);
      if (_view3d && _3d) sync3d();
    }, undefined, err => console.warn(`[3D] cruiser GLB failed (${faction}):`, err));
  });

  // Frigates (L tonnage, non-cell)
  Object.entries(_FACTION_GLB_FRIGATE).forEach(([faction, url]) => {
    loader.load(url, gltf => {
      const frigYaw = faction in _FACTION_GLB_FRIGATE_YAW ? _FACTION_GLB_FRIGATE_YAW[faction] : (_FACTION_GLB_YAW[faction] || 0);
      _glbFrigates[faction] = _normaliseGlb(gltf.scene, frigYaw);
      if (_view3d && _3d) sync3d();
    }, undefined, err => console.warn(`[3D] frigate GLB failed (${faction}):`, err));
  });

  // Bioficer cell
  loader.load(_BIO_CELL_GLB, gltf => {
    _glbBioCell = _normaliseGlb(gltf.scene, _FACTION_GLB_YAW['bioficer'] || 0);
    if (_view3d && _3d) sync3d();
  }, undefined, err => console.warn('[3D] bio_cell GLB failed:', err));

  // City dropsites — all normalised to the same footprint so S/M/L keep their
  // natural relative size instead of being independently rescaled.
  const _CITY_FOOTPRINT = 55;
  Object.entries(_CITY_GLB).forEach(([sk, url]) => {
    loader.load(url, gltf => {
      _glbCities[sk] = _normaliseGlbCity(gltf.scene, _CITY_FOOTPRINT);
      // Invalidate static hash so the next sync3d() rebuilds dropsites with the loaded GLB.
      _3dStaticHash = '';
      if (_view3d && _3d) sync3d();
    }, undefined, err => console.warn(`[3D] city GLB failed (${sk}):`, err));
  });

  // Station — normalise to 28 units (longest dim) centered at origin; caller
  // scales by 1.0 / 0.68 / 0.45 for L / M / S at placement time.
  loader.load(_STATION_GLB, gltf => {
    const outer = new THREE.Group();
    outer.add(gltf.scene);
    outer.updateMatrixWorld(true);
    const box    = new THREE.Box3().setFromObject(outer);
    const center = new THREE.Vector3();
    const size   = new THREE.Vector3();
    box.getCenter(center);
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 0) {
      const s = 28 / maxDim;
      outer.scale.setScalar(s);
      outer.position.copy(center).multiplyScalar(-s);
      // Disc sits in the upper portion of the model; bbox centre is in the pylon.
      // Drop the station by ~55% of the normalised half-height so the disc
      // intersects the orbital plane instead of floating above it.
      _3D_STATION_Y_DROP = (size.y * s / 2) * 0.80;
    }
    _glbStation = outer;
    // Invalidate static hash so the next sync3d() rebuilds stations with the loaded GLB.
    _3dStaticHash = '';
    if (_view3d && _3d) sync3d();
  }, undefined, err => console.warn('[3D] station GLB failed:', err));
}

// Apply a grey/blue-grey palette to a city or station GLB clone.
// Each mesh gets a tone from a deterministic sequence; dead models are charred.
function _tintGlbScenery(clone, dead) {
  const LIVE_PALETTE = [
    0xd0d8e0,  // near-white
    0x8898aa,  // mid blue-grey
    0xc0ccd8,  // light steel
    0x50667a,  // deep slate
    0xa0b4c4,  // sky grey
    0x38485a,  // dark navy-grey
  ];
  const DEAD_PALETTE = [0x2a1a10, 0x1c1208, 0x3a2010, 0x241408];
  const palette = dead ? DEAD_PALETTE : LIVE_PALETTE;
  let idx = 0;
  clone.traverse(child => {
    if (!child.isMesh) return;
    const col = palette[idx % palette.length];
    idx++;
    const applyTone = m => {
      const nm = m.clone();
      if (nm.color) nm.color.setHex(col);
      if (nm.emissive !== undefined) {
        nm.emissive.setHex(dead ? 0x200800 : 0x0a1e32);
        nm.emissiveIntensity = dead ? 0.4 : 0.12;
      }
      return nm;
    };
    child.material = Array.isArray(child.material)
      ? child.material.map(applyTone)
      : applyTone(child.material);
  });
}

// Clone a cached GLB ship, scale to tonnage, and paint in varied tones of the
// player colour — three alternating tones (main / light / dark) so different
// hull sections read as belonging to the same faction without being flat.
function _cloneGlbShip(template, tonnage, playerColorHex) {
  const model = template.clone(true);
  const t     = (_3D_SHIP_DIMS[tonnage] || _3D_SHIP_DIMS['M'])[0] / 14;
  model.scale.multiplyScalar(t);
  model.position.multiplyScalar(t);

  const pr = ((playerColorHex >> 16) & 0xff) / 255;
  const pg = ((playerColorHex >>  8) & 0xff) / 255;
  const pb = ( playerColorHex        & 0xff) / 255;

  let meshIdx = 0;
  model.traverse(child => {
    if (!child.isMesh) return;
    const tone = meshIdx++ % 3;
    // 0 = main hull (70 % brightness), 1 = secondary (light blend), 2 = accent (dark)
    const [cr, cg, cb] = tone === 0
      ? [pr * 0.70,          pg * 0.70,          pb * 0.70         ]
      : tone === 1
      ? [pr * 0.40 + 0.32,   pg * 0.40 + 0.32,   pb * 0.40 + 0.32 ]
      : [pr * 0.25,          pg * 0.25,           pb * 0.25        ];
    const tintMat = m => {
      const nm = m.clone();
      if (nm.color)    nm.color.setRGB(cr, cg, cb);
      if (nm.emissive !== undefined) {
        nm.emissive.setRGB(pr * 0.22, pg * 0.22, pb * 0.22);
        nm.emissiveIntensity = 0.65;
      }
      return nm;
    };
    child.material = Array.isArray(child.material)
      ? child.material.map(tintMat)
      : tintMat(child.material);
  });
  return model;
}

// ─── 3D DEPLOY ZONES ─────────────────────────────────────────────────────────

function _3dRenderDeployZones(group) {
  if (!state.scenario) return;
  if (state.phase !== 'deploy') {
    // Also show during play when the selected group has off-table ships eligible to arrive.
    if (state.phase !== 'play' || !state.selectedGroupId) return;
    const _rzDef = getDef(state.selectedGroupId);
    const _rzGrp = state.groups[state.selectedGroupId];
    if (!_rzDef || !_rzGrp || _rzGrp.activated) return;
    if (!_rzGrp.ships.some(s => !s.destroyed && s.offTable && !s.attachedTo)) return;
    if (!canActivateOffTable(_rzDef)?.eligible) return;
  }
  const dep = DEPLOYMENTS[state.scenario.deployment];
  if (!dep) return;
  const dz = state.deployZone || { player1: 'south', player2: 'north' };
  const northSide = dz.player1 === 'north' ? 'player1' : 'player2';
  const southSide = dz.player1 === 'south' ? 'player1' : 'player2';
  const OY = _3D_LAYER_Y.orbit;

  // Board inch → world unit (board is 576px wide, centred at 0)
  const iw = (inch) => inch * INCH - 288;

  const addZone = (zone, colorHex) => {
    const fillMat = new THREE.MeshBasicMaterial({
      color: colorHex, transparent: true, opacity: 0.10,
      side: THREE.DoubleSide, depthWrite: false
    });
    const dashMat = new THREE.LineDashedMaterial({
      color: colorHex, transparent: true, opacity: 0.75, dashSize: 10, gapSize: 6
    });

    // Emit a filled flat shape + dashed outline at OY.
    // Shape coords are in (worldX, worldZ) — ShapeGeometry lives in XY then rotateX(π/2)→XZ.
    const emitShape = (shape) => {
      const geo = new THREE.ShapeGeometry(shape);
      geo.rotateX(Math.PI / 2);
      geo.translate(0, OY, 0);
      group.add(new THREE.Mesh(geo, fillMat.clone()));
      const pts = shape.getPoints(64).map(p => new THREE.Vector3(p.x, OY, p.y));
      pts.push(pts[0].clone());
      const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), dashMat.clone());
      line.computeLineDistances();
      group.add(line);
    };

    if (zone.edgeLines) {
      // Edge-contact zone: draw thick bright lines along the board edge.
      zone.edgeLines.forEach(seg => {
        const pts = [
          new THREE.Vector3(iw(seg.x1), OY, iw(seg.y1)),
          new THREE.Vector3(iw(seg.x2), OY, iw(seg.y2)),
        ];
        group.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.90 })
        ));
        // Glow halo
        group.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.25 })
        ));
      });
    }

    if (zone.polygon) {
      emitShape(new THREE.Shape(zone.polygon.map(p => new THREE.Vector2(iw(p.x), iw(p.y)))));
    }

    if (zone.circle) {
      const c = zone.circle;
      const shape = new THREE.Shape();
      shape.absarc(iw(c.cx), iw(c.cy), c.r * INCH, 0, Math.PI * 2, false);
      emitShape(shape);
    }

    if (zone.circleQuad) {
      const c = zone.circleQuad;
      const cx = iw(c.cx), cz = iw(c.cy), r = c.r * INCH;
      // Map SVG quad names to (startAngle, endAngle) in XZ plane.
      // SVG y-down aligns with 3D +Z, so quadrant mapping is direct.
      const qa = { br: [0, Math.PI/2], tl: [Math.PI, 3*Math.PI/2], tr: [-Math.PI/2, 0], bl: [Math.PI/2, Math.PI] }[c.quad] || [0, Math.PI/2];
      const shape = new THREE.Shape();
      shape.moveTo(cx, cz);
      const N = 32;
      for (let i = 0; i <= N; i++) {
        const a = qa[0] + (qa[1] - qa[0]) * i / N;
        shape.lineTo(cx + Math.cos(a) * r, cz + Math.sin(a) * r);
      }
      shape.closePath();
      emitShape(shape);
    }

    if (zone.edgeSemicircle) {
      const c = zone.edgeSemicircle;
      const cx = iw(c.cx), cz = iw(c.cy), r = c.r * INCH;
      // Arc sweeps inward from the edge: top→south(+Z), bottom→north(-Z), left→east(+X), right→west(-X)
      const [a0, a1] = { top: [0, Math.PI], bottom: [Math.PI, 2*Math.PI], left: [-Math.PI/2, Math.PI/2], right: [Math.PI/2, 3*Math.PI/2] }[c.edge] || [0, Math.PI];
      const shape = new THREE.Shape();
      const N = 32;
      shape.moveTo(cx + Math.cos(a0) * r, cz + Math.sin(a0) * r);
      for (let i = 1; i <= N; i++) {
        const a = a0 + (a1 - a0) * i / N;
        shape.lineTo(cx + Math.cos(a) * r, cz + Math.sin(a) * r);
      }
      shape.closePath();
      emitShape(shape);
    }

    if (zone.corners) {
      zone.corners.forEach(c => addZone({ circleQuad: c }, colorHex));
    }
  };

  addZone(dep.zones.north, _3dSideColor(northSide));
  addZone(dep.zones.south, _3dSideColor(southSide));
}

// ─── 3D OVERLAY HELPERS ──────────────────────────────────────────────────────

// Build a dashed ring (circle) lying flat at world Y = y.
// Cached unit-circle geometry (XZ plane, radius 1, centred at origin).
// Shared across all dashed-circle calls — only the material and transform differ.
function _3dUnitCircleGeo(segs) {
  const key = `c${segs}`;
  if (_3dCircleGeoCache.has(key)) return _3dCircleGeoCache.get(key);
  const pts = [];
  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a), 0, Math.sin(a)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  // Pre-compute lineDistances once in unit-circle space (total arc = 2π ≈ 6.28).
  // Shared by all Line objects using this geometry — do NOT call computeLineDistances()
  // again per-line because that would rewrite the shared attribute.
  const tmpLine = new THREE.Line(geo);
  tmpLine.computeLineDistances();
  _3dCircleGeoCache.set(key, geo);
  return geo;
}

function _3dDashedCircle(cx, cz, r, y, color, opacity, dashSize, gapSize) {
  const segs = Math.max(48, Math.ceil(r * 0.6));
  // The cached geometry has unit-circle lineDistances (0 → 2π).
  // Dividing dashSize/gapSize by r converts world-space lengths to unit-circle space
  // so the dash pattern matches the intended world-space appearance after scaling.
  const line = new THREE.Line(
    _3dUnitCircleGeo(segs),
    new THREE.LineDashedMaterial({ color, transparent: true, opacity, dashSize: dashSize / r, gapSize: gapSize / r })
  );
  line.scale.set(r, 1, r);
  line.position.set(cx, y, cz);
  return line;
}

// Render weapon arc wedge(s) for one weapon onto group at world Y = wy.
// dimFactor scales fill/outline opacity for mode-2 enemy arcs.
function _sync3dWeaponArc(group, ship, def, w, wy, dimFactor = 1) {
  const r   = def.scan * INCH;
  const cx  = ship.x - 288, cz = ship.y - 288;
  const h   = ship.heading;

  const ARC_STYLE = {
    F:  { fill: 0x4ad6ff, fo: 0.18, stroke: 0x4488ff, so: 0.55 },
    R:  { fill: 0x7a8a94, fo: 0.12, stroke: 0x7a8a94, so: 0.40 },
    S:  { fill: 0x7a8a94, fo: 0.15, stroke: 0x7a8a94, so: 0.40 },
    FN: { fill: 0xffb547, fo: 0.30, stroke: 0xffb547, so: 0.65 },
    RN: { fill: 0xffb547, fo: 0.30, stroke: 0xffb547, so: 0.65 },
    B:  { fill: 0x7a8a94, fo: 0.15, stroke: 0x7a8a94, so: 0.40 },
  };

  function addWedge(centreOffset, halfWidth, key) {
    const st = ARC_STYLE[key] || ARC_STYLE.S;
    const a1 = (h + centreOffset - halfWidth) * Math.PI / 180;
    const a2 = (h + centreOffset + halfWidth) * Math.PI / 180;
    const steps = Math.max(8, Math.ceil(Math.abs(a2 - a1) * 16));

    // Filled shape — defined in XY with shape X = world X, shape Y = world Z;
    // rotateX(PI/2) lays it flat, then translate up to wy.
    const shape = new THREE.Shape();
    shape.moveTo(cx, cz);
    for (let i = 0; i <= steps; i++) {
      const a = a1 + (a2 - a1) * i / steps;
      shape.lineTo(cx + Math.cos(a) * r, cz + Math.sin(a) * r);
    }
    shape.closePath();
    const fillGeo = new THREE.ShapeGeometry(shape, steps);
    fillGeo.rotateX(Math.PI / 2);
    fillGeo.translate(0, wy, 0);
    group.add(new THREE.Mesh(fillGeo, new THREE.MeshBasicMaterial({
      color: st.fill, transparent: true, opacity: st.fo * dimFactor, side: THREE.DoubleSide, depthWrite: false
    })));

    // Outline: center → arc → back to center
    const outPts = [new THREE.Vector3(cx, wy, cz)];
    for (let i = 0; i <= steps; i++) {
      const a = a1 + (a2 - a1) * i / steps;
      outPts.push(new THREE.Vector3(cx + Math.cos(a) * r, wy, cz + Math.sin(a) * r));
    }
    outPts.push(new THREE.Vector3(cx, wy, cz));
    group.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(outPts),
      new THREE.LineBasicMaterial({ color: st.stroke, transparent: true, opacity: st.so * dimFactor })
    ));
  }

  const components = w.arc.split('/').map(s => s.trim());
  components.forEach(c => {
    if      (c === 'F')  addWedge(0,   45, 'F');
    else if (c === 'R')  addWedge(180, 45, 'R');
    else if (c === 'S')  { addWedge( 90, 45, 'S'); addWedge(-90, 45, 'S'); }
    else if (c === 'FN') addWedge(0,   11, 'FN');
    else if (c === 'RN') addWedge(180, 11, 'RN');
    else if (c === 'B')  { addWedge( 90, 45, 'B'); addWedge(-90, 45, 'B'); }
  });
}
