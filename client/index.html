            body += `<button class="btn" data-am-fighter-reroll="1" style="font-size:10px;margin-top:3px;color:#7fd6a0;border-color:#7fd6a0;" ${spendTotal>0?'':'disabled'}>↻ Re-roll ${spendTotal} save${spendTotal!==1?'s':''} (spend ${spendTotal} fighter${spendTotal!==1?'s':''})</button>
            </div>`;
          }
        }
      }
    }
    // Footer: if Backup/Aegis are still to roll and hits remain unsaved → roll them
    // (after re-rolls); otherwise apply damage. Both advance the attack — attacker only.
    const needBackup = !sr.backupRolled && sr.hitsList.some(h => !h.saved && h.sv != null) &&
      (sr.backupVal != null || ((sr.isBomberAtk || sr.isCloseAction) && !M.aegisUsed && aegisValueForGroup(sr.targetGid) > 0));
    if (isAttacker) {
      footer = needBackup
        ? `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="rollbackup">Roll Backup Saves ▸</button>`
        : `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="apply">Apply Damage ▸</button>`;
    }
    } // end else (non-bombardment save step)
  }

  else if (M.step === 'crippling') {
    const c = M.crippleQueue[0];
    const defSide = getDef(c.gid) ? getDef(c.gid).side : null;
    const canBrace = defSide && state.planning && state.planning.ap[defSide] >= 2 && !c.braced;
    if (!c.rolled) {
      // PRE-ROLL: declare Brace for Impact (set result to 4) BEFORE rolling.
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull.</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 2D6 for the effect.</div>
        ${canBrace?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-brace="1" style="font-size:10px;">⚙ Brace for Impact (2 AP → set result to 4, no roll)</button></div>`
          : c.braced?`<div class="am-line" style="color:var(--hull-warn)">Bracing for Impact — result will be 4.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-roll">${c.braced?'Apply (4) ▸':'Roll 2D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull${c.braced?' · <span style="color:var(--hull-warn)">Braced</span>':''}:</div>
        <div class="am-dice">${c.d1!=null?`<span class="am-die">${c.d1}</span><span class="am-die">${c.d2}</span> = `:''}<b>${c.total}</b></div>
        <div class="am-line" style="color:var(--hull-warn)"><b>${c.effectName}</b></div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${c.effectDesc}</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-next">Apply ▸</button>`;
    }
  }

  else if (M.step === 'explosion') {
    const ex = M.explodeQueue[0];
    const defSide = getDef(ex.gid) ? getDef(ex.gid).side : null;
    const canContain = defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained;
    if (!ex.rolled) {
      // PRE-ROLL: declare Contain Reactor (set result to 2) BEFORE rolling.
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed — explosion imminent (range ${ex.rangeIn}").</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 1D6${ex.mod?` (+${ex.mod} tonnage)`:''}. The radius is shown on the map.</div>
        ${canContain?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-contain="1" style="font-size:10px;">⚙ Contain Reactor (2 AP → set result to 2, no roll)</button></div>`
          : ex.contained?`<div class="am-line" style="color:var(--hull-crit)">Containing Reactor — result will be 2.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-roll">${ex.contained?'Resolve (2) ▸':'Roll 1D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed${ex.contained?' · <span style="color:var(--hull-crit)">Contained</span>':''}:</div>
        <div class="am-dice">${ex.d1!=null?`<span class="am-die">${ex.d1}</span>`:''}${ex.mod?` + ${ex.mod} = <b>${ex.total}</b>`:''}</div>
        <div class="am-line" style="color:var(--hull-crit)"><b>${ex.effectName}</b> (range ${ex.rangeIn}"${ex.effKind==='spike2x'?' ×2':''})</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${ex.effectDesc}</div>
        <div class="am-line" style="font-size:9px;color:var(--text-mute)">Applied to ships${ex.effAssets?' & assets':''} in range on the ${ex.layer} layer.</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-next">Resolve ▸</button>`;
    }
  }

  else if (M.step === 'impel') {
    const q = M.impelQueue[0];
    const tdef = getDef(q.gid);
    body = `<div class="am-step-head">Impel-${q.x}</div>
      <div class="am-line"><b>${tdef.name}</b> was struck by ${q.big?`≥${q.x*2}`:`≥${q.x}`} criticals. Attacker chooses:</div>
      <div class="am-line" style="margin-top:6px;">
        <button class="btn" data-impel="turn" style="font-size:10px;margin-right:6px;">↻ Turn ${q.big?'90°':'45°'}</button>
        <button class="btn" data-impel="move" style="font-size:10px;">→ Move forward up to ${q.x*2}"</button>
      </div>
      <div class="am-line" style="font-size:9px;color:var(--text-mute)">Turn rotates all ships in place; Move shifts them straight forward (auto, clamped to the table).</div>`;
    footer = '';
  }

  else if (M.step === 'bombardCollateral') {
    const q = M.bombardCollateralQueue[0];
    const _bds = state.scenarioData && state.scenarioData.dropsites && state.scenarioData.dropsites.find(d => d.id === q.dsId);
    const b = _bds ? dsBattalions(_bds) : {};
    // Features first (feat0, feat1, …), then ground.
    const locOrder = Object.keys(b).filter(k => k !== 'ground').concat(b.ground ? ['ground'] : []);
    const isActing = !_netSide || _netSide === q.side;
    const pName = q.side === 'player1' ? 'Player 1' : 'Player 2';
    // Locations where the affected player has at least one battalion
    const eligibleLocs = locOrder.filter(k => (b[k] && b[k][q.side]) > 0);
    // Auto-pick: if only one location has battalions, remove from it immediately — no picker needed
    if (isActing && eligibleLocs.length === 1) {
      setTimeout(() => dispatch({ type: 'resolveBombardCollateral', dsId: q.dsId, loc: eligibleLocs[0] }), 0);
      body = `<div class="am-step-head">Collateral Damage — ${q.dsName}</div>
        <div class="am-line" style="color:var(--text-mute);">Removing battalion from ${_bds ? locDisplayName(_bds, eligibleLocs[0]) : eligibleLocs[0]}…</div>`;
      footer = '';
    } else {
      const locBtns = eligibleLocs.map(k => {
        const cnt = (b[k] && b[k][q.side]) || 0;
        const lname = _bds ? locDisplayName(_bds, k) : k;
        return `<button class="btn" data-bombard-collateral="${k}" style="font-size:10px;margin:2px;">${lname} <span style="color:var(--hull-warn)">(${cnt})</span></button>`;
      }).join('');
      body = `<div class="am-step-head">Collateral Damage — ${q.dsName}</div>
        <div class="am-line">Hull point ${q.hullPoint} of ${q.hullTotal} · <b>${pName}</b> must remove 1 battalion</div>
        ${isActing
          ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">${locBtns || '<span style="color:var(--text-mute);font-size:10px;">No battalions present</span>'}</div>`
          : `<div class="am-line" style="color:var(--text-mute);margin-top:8px;">Waiting for ${pName} to choose…</div>`}`;
      footer = '';
    }
  }

  else if (M.step === 'done') {
    body = `<div class="am-step-head">Attack Resolved</div>
      ${M.log.map(l => `<div class="am-line" style="font-size:10px;">${l}</div>`).join('')}`;
    footer = isAttacker ? `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-close="1">Done</button>` : '';
  }

  overlay = document.createElement('div');
  overlay.id = 'attack-overlay';
  overlay.className = 'attack-hud';
  overlay.innerHTML = `<div class="attack-hud-title">⚔ ATTACK</div>
    <div class="attack-hud-body">${body}</div>
    ${footer ? `<div class="attack-hud-footer">${footer}</div>` : ''}`;
  (document.querySelector('.board-wrap') || document.body).appendChild(overlay);

  overlay.querySelectorAll('[data-shield-toggle]').forEach(cb => {
    cb.addEventListener('change', () => dispatch({ type: 'attackDeclare', what: 'shield', key: cb.dataset.shieldToggle, value: cb.checked }));
  });
  overlay.querySelectorAll('[data-overcharge]').forEach(cb => {
    cb.addEventListener('change', () => dispatch({ type: 'attackDeclare', what: 'overcharge', wi: cb.dataset.overcharge, value: cb.checked }));
  });
  overlay.querySelectorAll('[data-escort]').forEach(btn => {
    btn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'escort', idx: parseInt(btn.dataset.escort) }));
  });
  const cancelBtn = overlay.querySelector('[data-am-cancel]');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { state.attackModal = null; renderAll(); });
  const closeBtn = overlay.querySelector('[data-am-close]');
  if (closeBtn) closeBtn.addEventListener('click', () => { finishAttack(); });
  const nextBtn = overlay.querySelector('[data-am-next]');
  if (nextBtn) nextBtn.addEventListener('click', () => advanceAttack(nextBtn.dataset.amNext));
  const braceBtn = overlay.querySelector('[data-am-brace]');
  if (braceBtn) braceBtn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'brace' }));
  const containBtn = overlay.querySelector('[data-am-contain]');
  if (containBtn) containBtn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'contain' }));
  overlay.querySelectorAll('[data-impel]').forEach(btn => {
    btn.addEventListener('click', () => dispatch({ type: 'attackDeclare', what: 'impel', choice: btn.dataset.impel }));
  });
  overlay.querySelectorAll('[data-bombard-collateral]').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = M.bombardCollateralQueue && M.bombardCollateralQueue[0];
      if (!q) return;
      dispatch({ type: 'resolveBombardCollateral', dsId: q.dsId, loc: btn.dataset.bombardCollateral });
    });
  });
  overlay.querySelectorAll('[data-rr-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.rrAdj);
      // Compute the current max from whichever step we're in.
      let maxRR = 1;
      if (M.step === 'hit' && M.hitResult) {
        const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
        const miss = M.hitResult.dice.filter(d => !d.isHit).length;
        maxRR = Math.min(miss, (state.planning && state.planning.ap[atkSide]) || 0);
      } else if (M.step === 'save' && M.saveResult) {
        const td = getDef(M.shots[M.shotIdx].targetGid);
        const failed = M.saveResult.primDice.filter(d => !d.ok).length;
        maxRR = Math.min(failed, (state.planning && state.planning.ap[td.side]) || 0);
      }
      const cur = Math.min(M.rerollN || maxRR, maxRR);
      M.rerollN = Math.max(1, Math.min(maxRR, cur + delta));
      renderAll();
    });
  });
  // Close Protection: per-Wing fighter spend stepper.
  overlay.querySelectorAll('[data-fp-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [wingId, deltaStr] = btn.dataset.fpAdj.split('|');
      const delta = parseInt(deltaStr);
      const sr = M.saveResult; if (!sr) return;
      const s = M.shots[M.shotIdx]; const td = getDef(s.targetGid);
      const ts = state.groups[s.targetGid].ships[s.targetSi];
      const failed = sr.primDice.filter(d => !d.ok).length;
      const wings = friendlyFightersInRange(td.side, ts.x, ts.y);
      const avail = wings.reduce((a, w) => a + w.count, 0);
      const cap = Math.min(failed, avail);
      M.fighterSpend = M.fighterSpend || {};
      const wing = wings.find(w => w.id === wingId);
      if (!wing) return;
      const curWing = M.fighterSpend[wingId] || 0;
      const otherSpend = Object.keys(M.fighterSpend).reduce((a, k) => a + (k === wingId ? 0 : (M.fighterSpend[k] || 0)), 0);
      const room = Math.max(0, cap - otherSpend); // total cap minus what other wings already spend
      M.fighterSpend[wingId] = Math.max(0, Math.min(wing.count, room, curWing + delta));
      renderAll();
    });
  });
  // Close Protection: re-roll failed saves, spending the selected fighters.
  const fpRerollBtn = overlay.querySelector('[data-am-fighter-reroll]');
  if (fpRerollBtn) fpRerollBtn.addEventListener('click', () => dispatch({ type: 'attackFighterReroll' }));
  const rerollBtn = overlay.querySelector('[data-am-reroll]');
  if (rerollBtn) rerollBtn.addEventListener('click', () => dispatch({ type: 'attackReroll', which: rerollBtn.dataset.amReroll }));
}

/* Advance the attack state machine. */
/* Attack step machine — dispatched as a server-authoritative intent (so the
   server rolls the dice with the room's seeded rng); hotseat applies locally. */
function advanceAttack(to) { if (state.attackModal) dispatch({ type: 'attackStep', to }); }
function nextShotOrResolve() { _nextShotOrResolve(state, rng, state.attackModal); }

/* Per-ship points value (group points divided by group size). */

/* Apply pending damage + queue crippling/explosions — engine resolution. */
function resolveAccumulatedDamage() { _resolveAttackDamage(state, state.attackModal); }

function proceedQueues() { _proceedQueues(state.attackModal); }

const CRIPPLE_LABEL = { energy:'Energy Surge', structural:'Struct.', fire:'Fire', defence:'Def. Offline', scanners:'Scan Offline', weapons:'Wpn Offline', navigation:'Nav Offline', decay:'Orbital Decay' };
// Crippling/explosion resolvers now live in src/engine/mutators.js (shared with
// the server). makeCrippleRoll / makeExplosionRoll are imported directly; the
// rng-driven rolls are shimmed to inject the active rng.
function rollCrippleEffect(c, forced) { return _rollCrippleEffect(rng, c, forced); }
function applyCrippling() { _applyCripplingNext(state, state.attackModal); renderAll(); }
function rollExplosionEffect(ex, forced) { return _rollExplosionEffect(rng, ex, forced); }
function applyExplosion() { _applyExplosionNext(state, rng, state.attackModal); renderAll(); }

function applyExplosionEffect(ex, M) { return _applyExplosionEffect(state, rng, ex, M); }
/* Roll Backup saves (and Aegis save dice) on hits still unsaved AFTER primary ES/KS
   saves and any re-rolls have been applied. Mutates sr in place and recomputes damage.
   Called when the player advances past the primary-save sub-step. */
function rollDeferredBackupSaves(M) { _rollDeferredBackupSaves(state, rng, M); }

/* Commit a resolved attack. Group fire goes through the server-authoritative
   intent; a bomber attack commits via the engine then runs the asset-phase
   continuation (re-opening the next pooled attack / advancing the stage) here,
   since that orchestration re-opens client modals. */
function finishAttack() {
  const M = state.attackModal;
  if (!M) return;
  // Feature weapon attacks and regular ship attacks both close via the finishAttack intent
  if (!M.bomber || M.bomberKind === 'feature') { dispatch({ type: 'finishAttack' }); return; }
  const hint = _finishAttack(state, M);
  if (hint && hint.bomber) {
    const { scope, scopeType } = hint;
    if (anyPendingBomberAttacks(scope, scopeType)) { resolvePendingBomberAttacks(scope, scopeType); renderAll(); return; }
    if (scope) { state._bomberResolveSide = null; state._bomberResolveType = null; dispatch({ type: 'assetStageDone', side: scope, type: scopeType || 'bomber' }); }
  }
  renderAll();
}

/* ── END-PHASE REPAIR ──
   Repairable crippling effects (Energy Surge & Structural Damage are one-shot,
   not repairable). Orbital Decay needs 6+; others 4+. DC order = 2D6 per effect. */
const REPAIRABLE = ['fire', 'defence', 'scanners', 'weapons', 'navigation', 'decay'];

/* Are there any Fire tokens or repairable crippling effects on the table? */
function anyRepairWork() {
  return Object.keys(state.groups).some(gid =>
    state.groups[gid].ships.some(s =>
      !s.destroyed && !s.offTable &&
      ((s.fireTokens > 0) || (s.crippling && s.crippling.some(c => REPAIRABLE.includes(c))))
    )
  );
}

/* Begin the End-Phase repair: first apply Fire damage, then build repair rolls. */
function openRepairPhase() {
  // Step 1: Fire tokens deal 1 damage each, before repair. Track destructions.
  const fireLog = [];
  const explosions = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.fireTokens) return;
      const dmg = s.fireTokens;
      s.hull = Math.max(0, s.hull - dmg);
      fireLog.push(`${def.name} takes ${dmg} Fire damage (${s.hull}/${s.maxHull})`);
      if (s.hull <= 0) {
        s.destroyed = true;
        if (isCapital(def)) explosions.push(makeExplosionRoll(gid, si, def, s));
      }
    });
  });
  // Resolve any Fire-death explosions' area effects (chained explosions included).
  while (explosions.length) {
    const ex = explosions.shift();
    fireLog.push(`${ex.name} exploded: ${ex.effectName}`);
    applyExplosionEffect(ex, { explodeQueue: explosions });
  }
  // Step 2: build repair targets — ships with repairable crippling effects.
  const targets = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.crippling) return;
      const eff = s.crippling.filter(c => REPAIRABLE.includes(c));
      if (eff.length) targets.push({ gid, si, name: def.name, effects: eff.slice(), dc: !!s.dcThisRound, rolled: null });
    });
  });
  state.repairPhase = { step: fireLog.length ? 'fire' : 'repair', fireLog, explosions: [], targets, idx: 0, log: [] };
  renderAll();
}

/* Modal to choose WHERE to land launched Battalions: on the Dropsite itself, or on
   one of its Features. Shows for either:
   - state.pendingGroundLaunch: local intent path (dropship/bulk_lander/drop_pod)
   - state.battalionDeploy: relay path (gate_dropship via Voidgate) */
function renderBattalionDeployModal() {
  let overlay = document.getElementById('bat-deploy-overlay');
  if (overlay) overlay.remove();
  const pg = state.pendingGroundLaunch;
  const dep = state.battalionDeploy;
  // Prefer pendingGroundLaunch (intent path) over battalionDeploy (relay path).
  const src = pg || dep;
  if (!src) return;
  // For the relay path, non-active player observes only (dep.side check).
  if (!pg && dep && _netSide && dep.side !== _netSide) return;
  const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === src.dsId);
  if (!ds) return;
  const side = pg ? (state.groups[pg.gid] && getDef(pg.gid) && getDef(pg.gid).side) || _netSide || 'player1'
                  : dep.side;
  const enemy = side === 'player1' ? 'player2' : 'player1';
  const b = dsBattalions(ds);
  const remainingHull = Math.max(0, (ds.maxHull || 0) - (ds.damage || 0));
  const ruined = ds.maxHull && (remainingHull / ds.maxHull) < 0.5 && remainingHull > 0;
  const destroyed = remainingHull === 0 && ds.maxHull;
  // Per-location row showing the label plus BOTH sides' current battalion counts.
  const optRow = (key, label, glyph, col) => {
    const cur = (b[key] && b[key][side]) || 0;
    const foe = (b[key] && b[key][enemy]) || 0;
    return `<button class="btn" data-bat-deploy="${ds.id}|${key}" style="display:block;width:100%;text-align:left;margin-bottom:5px;border-left:3px solid ${col};">
      <div style="color:${col};font-weight:600;">${glyph ? glyph + ' ' : ''}${label}</div>
      <div style="font-size:9px;margin-top:2px;display:flex;gap:10px;">
        <span style="color:var(--${side});">${factionName(side)}: <b>${cur}</b></span>
        <span style="color:var(--${enemy});">${factionName(enemy)}: <b>${foe}</b></span>
      </div>
    </button>`;
  };
  let opts = optRow('ground', ds.base.name + ' (Dropsite)', '◎', 'var(--' + side + ')');
  (ds.features || []).forEach((fk, fi) => {
    if ((ds.destroyedFeatures || []).includes(fi)) return;
    const f = FEATURES[fk] || { name: fk };
    opts += optRow('feat' + fi, f.name, f.glyph, f.color || 'var(--text)');
  });
  // Header: dropsite name, layer, and current Hull / state.
  const hullStr = ds.maxHull
    ? `Hull ${remainingHull}/${ds.maxHull}${destroyed ? ' · <span style="color:var(--hull-crit)">LEVELLED</span>' : ruined ? ' · <span style="color:var(--hull-warn)">RUINED</span>' : ''}`
    : '';
  const assetLabel = pg ? pg.assetLabel : dep.asset;
  const count = src.count;
  overlay = document.createElement('div');
  overlay.id = 'bat-deploy-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `<div class="setup-panel" style="max-width:340px;">
    <div class="setup-title" style="color:var(--${side});">Land ${count} ${assetLabel} Battalion${count>1?'s':''}</div>
    <div style="font-size:10px;color:var(--text-dim);margin:4px 0 2px;">On <b>${ds.base.name}</b>${ds.base.layer ? ` · ${ds.base.layer}` : ''}</div>
    ${hullStr ? `<div style="font-size:11px;font-family:var(--mono);margin:0 0 9px;">${hullStr}</div>` : '<div style="margin-bottom:9px;"></div>'}
    <div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Choose a location:</div>
    ${opts}
    <div class="setup-footer"><button class="btn" id="bat-deploy-cancel">CANCEL</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#bat-deploy-cancel').addEventListener('click', () => {
    if (pg) {
      // Intent path: discard pending launch, return to targeting mode so the player can pick a different dropsite.
      state.pendingGroundLaunch = null;
      state.selectedDropsiteId = null;
      renderAll(true);
    } else {
      // Relay path (gate_dropship): restore the launching ship and clear.
      if (dep.fromGid != null) { state.selectedDropsiteId = null; state.selectedGroupId = dep.fromGid; state.selectedShipIdx = dep.fromSi; }
      state.battalionDeploy = null;
      renderAll();
    }
  });
}

function renderRepairPhase() {
  let overlay = document.getElementById('repair-overlay');
  if (overlay) overlay.remove();
  const R = state.repairPhase;
  if (!R) return;
  let body = '', footer = '';

  if (R.step === 'fire') {
    body = `<div class="am-step-head">🔥 Fire Damage</div>
      <div class="am-line" style="font-size:10px;color:var(--text-dim)">At the start of the End Phase, each Fire Token deals 1 damage before repairs.</div>
      ${R.fireLog.length ? R.fireLog.map(l => `<div class="am-line" style="font-size:11px;">${l}</div>`).join('') : '<div class="am-line">No Fire damage.</div>'}
      ${R.explosions.length ? `<div class="am-line" style="color:var(--hull-crit)">${R.explosions.length} ship(s) destroyed by Fire — explosions resolve.</div>` : ''}`;
    footer = `<button class="btn-primary" data-rp-next="repair">Continue ▸</button>`;
  }

  else if (R.step === 'repair') {
    if (!R.targets.length) {
      body = `<div class="am-step-head">🔧 Repair</div><div class="am-line">No repairable Crippling Effects.</div>`;
      footer = `<button class="btn-primary" data-rp-close="1">End Round ▸</button>`;
    } else {
      const t = R.targets[R.idx];
      const ship = state.groups[t.gid].ships[t.si];
      // Roll once per effect when first shown.
      if (!t.rolled) {
        t.rolled = t.effects.map(eff => {
          const dice = t.dc ? [rollDie(), rollDie()] : [rollDie()];
          const need = eff === 'decay' ? 6 : 4;
          const success = dice.some(d => d >= need);
          return { eff, dice, need, success };
        });
        // Apply: remove each effect that succeeded (player's choice is moot —
        // each effect rolls its own dice here for clarity).
        t.rolled.forEach(r => {
          if (r.success && ship.crippling) {
            const i = ship.crippling.indexOf(r.eff);
            if (i >= 0) ship.crippling.splice(i, 1);
            if (r.eff === 'fire') ship.fireTokens = 0;
            R.log.push(`${t.name}: repaired ${CRIPPLE_LABEL[r.eff]}`);
          }
        });
      }
      body = `<div class="am-step-head">🔧 Repair — ${t.name}${t.dc?' <span style="color:var(--ucm);font-size:9px;">DC: 2D6</span>':''}</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${t.dc?'2D6':'1D6'} per repairable effect · 4+ removes (Orbital Decay 6+).</div>
        ${t.rolled.map(r => `<div class="am-line">
          <b>${CRIPPLE_LABEL[r.eff]}</b> (need ${r.need}+):
          <span class="am-dice" style="display:inline-flex;">${r.dice.map(d=>`<span class="am-die ${d>=r.need?'hit':'miss'}">${d}</span>`).join('')}</span>
          ${r.success?'<span style="color:var(--hull-good)">✓ repaired</span>':'<span style="color:var(--text-mute)">remains</span>'}
        </div>`).join('')}`;
      const last = R.idx >= R.targets.length - 1;
      footer = `<button class="btn-primary" data-rp-next="${last?'done':'next'}">${last?'End Round ▸':'Next Ship ▸'}</button>`;
    }
  }

  overlay = document.createElement('div');
  overlay.id = 'repair-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '300';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--hull-warn)">⚙ END PHASE · REPAIR</h2></div>
    <div class="setup-body">${body}</div>
    <div class="setup-footer">${footer}</div>
  </div>`;
  document.body.appendChild(overlay);
  const nb = overlay.querySelector('[data-rp-next]');
  if (nb) nb.addEventListener('click', () => {
    const to = nb.dataset.rpNext;
    if (to === 'repair') R.step = 'repair';
    else if (to === 'next') R.idx++;
    else if (to === 'done') { finishRepairPhase(); return; }
    renderAll();
  });
  const cb = overlay.querySelector('[data-rp-close]');
  if (cb) cb.addEventListener('click', () => finishRepairPhase());
}

/* Close the repair phase and actually advance the round. */
function finishRepairPhase() {
  state.repairPhase = null;
  dispatch({ type: 'advanceRound' });
}


/* Render the legal move cone — annular wedge between minR and maxR,
   centred on ship's facing, half-angle = turnDeg.
   If turnDeg = 0, this collapses to a line; we still draw a thin wedge for visibility. */
function renderMoveCone(cx, cy, headingDeg, minR, maxR, turnDeg, color) {
  const half = Math.max(0.5, turnDeg); // even no-turn shows a thin sliver
  const a1 = (headingDeg - half) * Math.PI / 180;
  const a2 = (headingDeg + half) * Math.PI / 180;
  // Outer arc points
  const ox1 = cx + Math.cos(a1) * maxR;
  const oy1 = cy + Math.sin(a1) * maxR;
  const ox2 = cx + Math.cos(a2) * maxR;
  const oy2 = cy + Math.sin(a2) * maxR;
  // Inner arc points (if minR > 0)
  const ix1 = cx + Math.cos(a1) * minR;
  const iy1 = cy + Math.sin(a1) * minR;
  const ix2 = cx + Math.cos(a2) * minR;
  const iy2 = cy + Math.sin(a2) * minR;
  const largeArc = (half * 2) > 180 ? 1 : 0;

  let html = '';
  if (minR > 0) {
    // annular wedge
    html += `<path d="M ${ix1} ${iy1} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2}
                     L ${ix2} ${iy2}
                     A ${minR} ${minR} 0 ${largeArc} 0 ${ix1} ${iy1} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  } else {
    // pie wedge
    html += `<path d="M ${cx} ${cy} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  }
  // Facing centre line (subtle)
  const fwdLen = maxR + 4;
  const fwd = headingVec(headingDeg);
  html += `<line x1="${cx}" y1="${cy}" x2="${cx + fwd.x * fwdLen}" y2="${cy + fwd.y * fwdLen}"
            stroke="${color}" stroke-width="0.5" stroke-opacity="0.35"
            stroke-dasharray="1 4"/>`;
  return html;
}

/* Render a ship marker on the board */
function renderShipMarker(def, ship, isGhost, ghostValid = true, isSelected = false, isInSelGroup = false, shipIdx = 0) {
  const color = def.side === 'player1' ? 'var(--ucm)' : 'var(--shal)';
  const colorDim = def.side === 'player1' ? 'var(--ucm-dim)' : 'var(--shal-dim)';
  // Base diameter by tonnage — actual physical mm-base sizes at 25.4mm = 1".
  // L=30mm, M=40mm, H=50mm, C=60mm  →  inches → pixels (INCH = 12 px/").
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  const r = (diameterIn * INCH) / 2;
  const x = ship.x, y = ship.y, h = ship.heading;

  // Heading vector for the arrow tip (points from centre along facing direction).
  const hr = h * Math.PI / 180;
  const dirX = Math.cos(hr), dirY = Math.sin(hr);
  // Arrow geometry: nose at the base edge; tail two points just inside the base.
  const noseX = x + dirX * r;
  const noseY = y + dirY * r;
  const arrowLen = r * 0.65;          // length of the arrow from nose backward
  const arrowHalf = r * 0.35;          // half-width at the tail
  // Tail centre (just inside the nose direction)
  const tailCx = x + dirX * (r - arrowLen);
  const tailCy = y + dirY * (r - arrowLen);
  // Perpendicular to heading for tail spread
  const perpX = -dirY, perpY = dirX;
  const tailLx = tailCx + perpX * arrowHalf;
  const tailLy = tailCy + perpY * arrowHalf;
  const tailRx = tailCx - perpX * arrowHalf;
  const tailRy = tailCy - perpY * arrowHalf;

  const fillCol = isGhost ? (ghostValid ? colorDim : 'rgba(255,82,82,0.25)') : 'rgba(0,0,0,0)';
  const strokeCol = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  const dataAttrs = isGhost ? '' : `data-ship="${def.id}|${shipIdx}" style="cursor:pointer;"`;
  const opacity = isGhost ? 0.55 : 1;
  // Faint translucent base fill in the faction's literal colour (rgba so opacity blends).
  const baseFactionHex = def.side === 'player1' ? '#4ad6ff' : '#d4a647';
  const baseFill = isGhost
    ? (ghostValid ? hexToRgba(baseFactionHex, 0.12) : 'rgba(255,82,82,0.12)')
    : hexToRgba(baseFactionHex, 0.10);

  let html = `<g opacity="${opacity}" ${dataAttrs}>`;
  // Base circle — translucent fill in the faction colour, coloured outline.
  html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${baseFill}"
            stroke="${strokeCol}" stroke-width="${isSelected ? 1.6 : 1}"/>`;
  // Facing arrow (filled triangle) inside the base.
  const arrowFill = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  html += `<polygon points="${noseX},${noseY} ${tailLx},${tailLy} ${tailRx},${tailRy}"
            fill="${arrowFill}" stroke="${arrowFill}" stroke-width="0.5"
            stroke-linejoin="round"/>`;
  // Selection ring
  if (isSelected && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 3}" fill="none" stroke="${color}" stroke-width="1" stroke-dasharray="2 2"/>`;
  } else if (isInSelGroup && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 2}" fill="none" stroke="${colorDim}" stroke-width="0.7" opacity="0.6"/>`;
  }
  // "moved this round" badge
  if (!isGhost && isInSelGroup && ship.movedThisRound) {
    const bx = x + r * 0.72, by = y - r * 0.72;
    html += `<circle cx="${bx}" cy="${by}" r="3.5" fill="var(--bg-elev)" stroke="${color}" stroke-width="0.7"/>`;
    html += `<text x="${bx}" y="${by + 2}" font-family="var(--mono)" font-size="5" font-weight="700"
              fill="${color}" text-anchor="middle" pointer-events="none">✓</text>`;
  }
  // name label
  if (!isGhost) {
    const grp = getGroup(def.id);
    const nm = def.name.replace(/ [αβγ]$/, '');
    const showName = isInSelGroup || isSelected;
    if (showName) {
      const labelY = y + r + 10;
      html += `<text x="${x}" y="${labelY}" font-family="var(--mono)" font-size="8"
                fill="${color}" text-anchor="middle" pointer-events="none">${nm}${grp.ships.length > 1 ? ' '+(shipIdx+1) : ''}</text>`;
    }
    // health pip — small bar under ship
    const pct = ship.hull / ship.maxHull;
    if (pct < 1) {
      const barW = r * 2;
      const barX = x - r;
      const barY = y + r + 1;
      const barCol = pct <= 0.34 ? 'var(--hull-crit)' : pct <= 0.6 ? 'var(--hull-warn)' : 'var(--hull-good)';
      html += `<rect x="${barX}" y="${barY}" width="${barW}" height="1.5" fill="var(--bg)" opacity="0.6"/>`;
      html += `<rect x="${barX}" y="${barY}" width="${barW * pct}" height="1.5" fill="${barCol}"/>`;
    }
  }
  // Crippling effects badge — small ⚡ icon below the ship with count badge.
  if (!isGhost && ship.crippling && ship.crippling.length > 0) {
    const criCount = ship.crippling.length;
    const criY = y + r + (ship.hull < ship.maxHull ? 6 : 3); // below health bar if present
    html += `<text x="${x}" y="${criY}" font-family="var(--mono)" font-size="7" font-weight="700"
              fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2"
              paint-order="stroke" pointer-events="none">⚡${criCount > 1 ? criCount : ''}</text>`;
  }
  // Carried Recon Operatives badge (Extract objective) — ⬆N above the ship.
  if (!isGhost && state.shipReconOps) {
    const carried = state.shipReconOps[def.id + '#' + shipIdx] || 0;
    if (carried > 0) {
      html += `<text x="${x - r - 7}" y="${y + 3}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">⬆${carried}</text>`;
    }
  }
  html += `</g>`;
  return html;
}

/* ==========================================================================
   INTERACTION
   ========================================================================== */
/* ==========================================================================
   PHASE MANAGEMENT
   ========================================================================== */

function inchToPx(v) { return v * INCH; }

/* Ship base radius in pixels, by tonnage (mm bases at 25.4mm = 1"). */
function shipBaseRadiusPx(def) {
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  return (diameterIn * INCH) / 2;
}

/* ==========================================================================
   GROUP FORMATIONS (coherency)
   - Light groups: ships within 3" of each other.  Medium+ groups: within 6".
   - Single-ship groups (or down to one alive ship) ignore coherency.
   - Groups of 2–3: each ship within coherency of ≥1 other ship.
   - Groups of 4+: each ship within coherency of ≥2 other ships.
   ========================================================================== */

/* Coherency distance (inches) for a group, by its tonnage. */
function coherencyInches(def) { return _coherencyInches(def); }

/* Open Network ships pick orders individually from the round AFTER they deploy.
   We approximate the deploy round as round 1 (Voidgates have Descent), so
   individual orders apply from round 2 onwards. */
/* A Voidgate (Open Network) ship joins the Network the round AFTER it deploys.
   The round it deploys, it activates with its deploying Group under a single
   Group Order; from the next round it's part of the Network with its own Order. */
function shipInNetwork(def, ship) { return _shipInNetwork(state, def, ship); }
/* Does a Group currently use individual (per-ship) Orders?
   - Open Network: true if ANY of its ships are already in the Network. (Newly
     deployed gates still use the Group Order; networked gates use their own.)
   - Detached Payloads: single Group from R2, individual GQ orders. */
/* Ships that ignore Coherency, have no Lead, and gain no Formation Benefits:
   Open Network gateships and Payload ships. */
function noFormation(def) { return !!(def.openNetwork || def.payload); }

function onIndividualOrders(def, grp) { return _onIndividualOrders(state, def, grp); }

/* Effective Order for a given ship — its own Order if it's on individual orders
   (networked Voidgate / detached Payload), otherwise the Group Order. */
/* Movement-before-firing: a Group must finish ALL its movement before any ship fires
   or launches. Returns true when every on-table, non-destroyed ship whose effective
   Order permits movement has already moved this activation. Ships on individual orders
   are judged per-ship by the caller; this is the group gate. */
function groupMovementComplete(def, grp) {
  if (!grp || !grp.order) return false; // no order yet → not moved
  return grp.ships.every((s, i) => {
    if (!s || s.destroyed || s.offTable) return true;
    const eo = effectiveOrder(def, grp, i);
    const ord = eo && ORDERS[eo];
    if (!ord || ord.moveMax === 0) return true; // this ship has no movement to complete
    return !!s.movedThisRound;
  });
}

/* The ship from which a weapon's arc & range are measured. For group fire (multi-ship
   group not on individual orders), all measurements are taken from the LEAD ship; for
   individual orders / single ships, from the firing ship itself. */
function firingOriginShip(def, grp, shipIdx) { return _firingOriginShip(state, def, grp, shipIdx); }

function effectiveOrder(def, grp, shipIdx) { return _effectiveOrder(state, def, grp, shipIdx); }

/* Returns a Set of ship indices that are OUT of formation for the given group.
   Empty set = everyone in formation (or rule doesn't apply). */
function outOfFormationSet(def) { return _outOfFormationSet(state, def); }

/* Whole group in formation? */
function groupInFormation(def) { return _groupInFormation(state, def); }

/* Launch asset metadata: aura range (inches) and what it can target. */
const LAUNCH_TYPES = {
  dropship:       { auraIn: 3, target: 'dropsite_same_layer', label: 'Dropships' },
  gate_dropship:  { auraIn: 3, target: 'dropsite_via_gate',   label: 'Dropships (Voidgate)' },
  bulk_lander:    { auraIn: 6, target: 'dropsite_any_layer',  label: 'Bulk Landers' },
  drop_pod:       { auraIn: 3, target: 'city',                label: 'Drop Pods' },
  boarding_pod:   { auraIn: 3, target: 'ship_or_station',     label: 'Boarding Pods' },
  fighter_bomber: { auraIn: 6, target: 'point',               label: 'Fighters & Bombers' },
  fireship:       { auraIn: 6, target: 'point',               label: 'Fire Ships' },
  torpedo:        { auraIn: 6, target: 'point',               label: 'Torpedoes' },
  mine:           { auraIn: 6, target: 'point',               label: 'Mines' },
  feature_deploy: { auraIn: 6, target: 'dropsite',            label: 'Deploy Feature' }
};
function launchMeta(type) { return LAUNCH_TYPES[type] || { auraIn: 3, target: 'point', label: 'Asset' }; }

/* Movement value (inches) for a placed asset, by faction and asset kind. */
/* Faction-specific Fighter / Bomber / Fire Ship profiles.
   fighter: {thrust, rerolls}; bomber/fireship: {thrust, att, lock, dmg, type, special}.
   `att` is the attack dice PER asset (combined across the wing at attack time). */
/* Returns {x, y} in px, or null if the zone isn't an edge-line zone. */
function snapToEdgeLineTangent(zone, ptPx, def) {
  if (!zone || !zone.edgeLines || !zone.edgeLines.length) return null;
  const r = shipBaseRadiusPx(def);
  // Find the nearest segment (work in px).
  let best = null, bestD = Infinity;
  zone.edgeLines.forEach(seg => {
    const x1 = inchToPx(seg.x1), y1 = inchToPx(seg.y1);
    const x2 = inchToPx(seg.x2), y2 = inchToPx(seg.y2);
    const vx = x2 - x1, vy = y2 - y1;
    const len2 = vx*vx + vy*vy || 1;
    let t = ((ptPx.x - x1)*vx + (ptPx.y - y1)*vy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t*vx, cy = y1 + t*vy;
    const d = Math.hypot(ptPx.x - cx, ptPx.y - cy);
    if (d < bestD) { bestD = d; best = { cx, cy, x1, y1, x2, y2 }; }
  });
  if (!best) return null;
  // Inward normal: direction from the table edge toward the board interior.
  // The segment lies on a board edge; push the center r inward perpendicular to it.
  let nx = 0, ny = 0;
  const onTop    = best.cy <= 1;
  const onBottom = best.cy >= BOARD_PX - 1;
  const onLeft   = best.cx <= 1;
  const onRight  = best.cx >= BOARD_PX - 1;
  if (onTop)    ny = 1;
  else if (onBottom) ny = -1;
  else if (onLeft)   nx = 1;
  else if (onRight)  nx = -1;
  else {
    // Segment not exactly on an edge — derive inward normal from segment direction,
    // pointing toward board center.
    const dx = best.x2 - best.x1, dy = best.y2 - best.y1;
    const len = Math.hypot(dx, dy) || 1;
    let pnx = -dy/len, pny = dx/len;
    const toCenterX = BOARD_PX/2 - best.cx, toCenterY = BOARD_PX/2 - best.cy;
    if (pnx*toCenterX + pny*toCenterY < 0) { pnx = -pnx; pny = -pny; }
    nx = pnx; ny = pny;
  }
  return { x: best.cx + nx * r, y: best.cy + ny * r };
}

/* Convert a #rrggbb hex colour to rgba(r,g,b,a). */
function hexToRgba(hex, alpha) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!m) return hex; // pass-through for CSS vars or unparseable strings
  const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Convert a zone polygon (inch coords) to SVG path string */
function zonePolygonPath(polygon) {
  return polygon.map((p,i) => (i===0?'M':'L') + ' ' + inchToPx(p.x) + ' ' + inchToPx(p.y)).join(' ') + ' Z';
}

/* Render a deployment zone (any geometry: polygon, circle, circleQuad, edgeSemicircle, corners) */
function renderZone(zone, fillCol, strokeCol) {
  let html = '';
  const stroke = `stroke="${strokeCol}" stroke-width="0.8" stroke-dasharray="4 3"`;
  const fill = `fill="${fillCol}"`;
  if (zone.polygon) {
    html += `<path d="${zonePolygonPath(zone.polygon)}" ${fill} ${stroke}/>`;
  }
  if (zone.circle) {
    const c = zone.circle;
    html += `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r)}" ${fill} ${stroke}/>`;
  }
  if (zone.circleQuad) {
    // Quarter-circle of radius r centred on (cx,cy). 'quad' indicates which quadrant
    // the slice occupies relative to (cx,cy). The arc bulges AWAY from (cx,cy) — convex.
    const c = zone.circleQuad;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
    if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    // Sweep flag chosen so the arc passes through the OUTER corner of the quadrant
    // (convex slice). In SVG y-down: br/tl use CW (sweep=1); tr/bl use CCW (sweep=0).
    const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
    html += `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.edgeSemicircle) {
    // Semicircle of radius r centred on (cx,cy) — bulges INTO the board, not off-edge.
    const c = zone.edgeSemicircle;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x, p1y, p2x, p2y;
    if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy;     }
    if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy;     }
    if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
    if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
    // Sweep=0 (CCW) makes the arc bulge into the board for all four edges given the
    // p1/p2 ordering above.
    html += `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.corners) {
    zone.corners.forEach(c => {
      html += renderZone({ circleQuad: c }, fillCol, strokeCol);
    });
  }
  if (zone.edgeLines) {
    // Edge-only DZ: render each segment as a thick solid line on the table edge.
    zone.edgeLines.forEach(seg => {
      html += `<line x1="${inchToPx(seg.x1)}" y1="${inchToPx(seg.y1)}"
                     x2="${inchToPx(seg.x2)}" y2="${inchToPx(seg.y2)}"
                     stroke="${strokeCol}" stroke-width="3.5"
                     stroke-linecap="round" stroke-opacity="0.9"/>`;
    });
  }
  return html;
}

/* Sample a random point inside a zone (best-effort; uses bounding-box rejection). */
function pointInZone(zone) {
  // Edge-only zones: random sampling would never hit a 1D line. Pick a random
  // point along one of the segments (slightly off the edge so the ship marker
  // doesn't render clipped).
  if (zone.edgeLines && zone.edgeLines.length) {
    const seg = zone.edgeLines[Math.floor(Math.random() * zone.edgeLines.length)];
    const t = Math.random();
    const xIn = seg.x1 + (seg.x2 - seg.x1) * t;
    const yIn = seg.y1 + (seg.y2 - seg.y1) * t;
    // Nudge ~0.6" inward from the table edge so circular ship bases aren't clipped.
    const nudge = 0.6;
    let nx = xIn, ny = yIn;
    if (yIn <= 0.5)        ny += nudge;
    if (yIn >= BOARD_IN - 0.5) ny -= nudge;
    if (xIn <= 0.5)        nx += nudge;
    if (xIn >= BOARD_IN - 0.5) nx -= nudge;
    return { x: inchToPx(nx), y: inchToPx(ny) };
  }
  for (let i = 0; i < 200; i++) {
    const tx = Math.random() * BOARD_IN;
    const ty = Math.random() * BOARD_IN;
    if (isInZone(tx, ty, zone)) return { x: inchToPx(tx), y: inchToPx(ty) };
  }
  return null;
}
/* Phase transition: setup → scenery/deploy/play.
   Validates locally then dispatches a server-authoritative intent so the seeded
   RNG determines zone assignment and both clients get the same result. */
function commitScenario() {
  if (!state.scenario) return;
  if (!state.fleetChoices.f1 || !state.fleetChoices.f2) {
    alert('Select both fleets before confirming the scenario.');
    return;
  }
  if (!fleetAssignmentsReady('f1') || !fleetAssignmentsReady('f2')) {
    alert('Complete fleet setup (admiral & payload assignment) before confirming the scenario.');
    return;
  }
  const missing = ['deployment','approach','layout','variant','objective'].filter(k => !state.scenario[k]);
  if (missing.length) {
    alert('Please select or randomise all scenario options first:\n• ' + missing.join('\n• '));
    return;
  }
  dispatch({ type: 'commitScenario' });
  // hotseat: dispatch already calls renderAll; online: renderAll fires on state broadcast
}

/* Apply stored Payload→Porter links (per fleet slot) to the rebuilt ship objects.
   slotForSide maps a colour slot ('player1'/'player2') to a fleet slot ('f1'/'f2'). */
function applyPayloadLinks(slotForSide) {
  ['player1', 'player2'].forEach(side => {
    const slot = slotForSide[side];
    const links = (state.payloadLinks && state.payloadLinks[slot]) || {};
    Object.keys(links).forEach(payKey => {
      const [payBase, paySi] = payKey.split(':');
      const [porBase, porSi] = links[payKey].split(':');
      const payGrp = state.groups[side + ':' + payBase];
      if (!payGrp) return;
      const payShip = payGrp.ships[parseInt(paySi)];
      if (!payShip) return;
      payShip.attachedTo = { gid: side + ':' + porBase, si: parseInt(porSi) };
    });
  });
}

/* Phase transition: scenery → nominations or deploy/play. */
function commitScenery(side) {
  dispatch({ type: 'commitScenery', side: side || _netSide });
}

function commitDeployment() {
  // Direct sides must deploy ≥50% of non-Vanguard Groups before Round 1.
  // Vanguard groups don't count. Warn the player if either Direct side is short.
  const warnings = [];
  ['player1', 'player2'].forEach(side => {
    const stat = directDeploymentStatus(side);
    if (stat && stat.placed < stat.required) {
      warnings.push(`${playerNameForSide(side)} (${side === 'player1' ? 'Red' : 'Blue'}) has ${stat.placed}/${stat.required} required Direct Groups deployed`);
    }
  });
  if (warnings.length) {
    const ok = confirm(
      `Direct Deployment requires ≥50% of non-Vanguard Groups to be on-table before Round 1.\n\n` +
      warnings.join('\n') +
      `\n\nProceed to play anyway?`
    );
    if (!ok) return;
  }
  dispatch({ type: 'beginPlay' });
}

function goToPhase(phase) {
  state.phase = phase;
  renderAll();
}

/* Approach behaviour for a side ('player1' = red, 'player2' = blue). */
/* Can this Group be deployed in the deploy phase?
   Direct approach: yes (any group of a Direct side; Vanguard counts as extra).
   Close/Distant approach: only if the Group has Vanguard.
   Non-deployable Groups arrive later via off-table activation. */
function expandZone(zone, extraIn) {
  const out = {};
  if (zone.polygon) {
    out.polygon = zone.polygon.map(p => {
      // A vertex is "on edge" if it sits within 1.6" of a board edge.
      const onLeft   = p.x <= 1.6;
      const onRight  = p.x >= BOARD_IN - 1.6;
      const onTop    = p.y <= 1.6;
      const onBottom = p.y >= BOARD_IN - 1.6;
      let nx = p.x, ny = p.y;
      // Push x inward only if not on a vertical edge
      if (!onLeft && !onRight) {
        // Direction depends on which side the polygon hangs from. Look at the
        // polygon centroid to decide which way is "inward".
        const cx = zone.polygon.reduce((s,v)=>s+v.x,0) / zone.polygon.length;
        nx = (cx < BOARD_IN/2) ? p.x + extraIn : p.x - extraIn;
      }
      // Push y inward only if not on a horizontal edge
      if (!onTop && !onBottom) {
        const cy = zone.polygon.reduce((s,v)=>s+v.y,0) / zone.polygon.length;
        ny = (cy < BOARD_IN/2) ? p.y + extraIn : p.y - extraIn;
      }
      return { x: nx, y: ny };
    });
  }
  if (zone.circle) out.circle = { ...zone.circle, r: zone.circle.r + extraIn };
  if (zone.circleQuad) out.circleQuad = { ...zone.circleQuad, r: zone.circleQuad.r + extraIn };
  if (zone.edgeSemicircle) out.edgeSemicircle = { ...zone.edgeSemicircle, r: zone.edgeSemicircle.r + extraIn };
  if (zone.corners) out.corners = zone.corners.map(c => ({ ...c, r: c.r + extraIn }));
  return out;
}

/* Render the Vanguard halo for the selected ship if applicable. */
/* Render the Vanguard halo for the selected ship if applicable.
   Each deployment type needs slightly different geometry — strip DZs extend
   inward parallel to the edge; L-shapes extend with arc caps at the L's tips;
   radial DZs just grow their radius. */
function renderVanguardHalo() {
  if (!state.selectedGroupId) return '';
  if (!state.scenario) return '';
  const def = getDef(state.selectedGroupId);
  if (!def || !def.vanguard) return '';
  // Vanguard deployment is a DEPLOY-PHASE benefit only. A Vanguard ship that
  // arrives off-table during play deploys in the normal DZ like any other ship.
  if (state.phase !== 'deploy') return '';
  const depKey = state.scenario.deployment;
  const dep = DEPLOYMENTS[depKey];
  if (!dep) return '';
  const zoneSide = (state.deployZone && state.deployZone[def.side]) || (def.side === 'player1' ? 'south' : 'north');
  const zone = dep.zones && dep.zones[zoneSide];
  if (!zone) return '';
  const X = def.vanguard;

  // Each branch returns a single SVG path string for the Vanguard outline.
  let html = '';
  if (depKey === 'line') {
    // Both zones are edge lines. Build a strip polygon from the (single) edge segment.
    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
  } else if (depKey === 'attacker_defender') {
    // Red is edge-line, Blue is a 12"-deep polygon strip.
    if (zone.edgeLines)    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
    else if (zone.polygon) html += vanguardStripPath(zone.polygon, X);
  } else if (depKey === 'table_corners') {
    html += vanguardTableCornerPath(zoneSide, X);
  } else if (depKey === 'midboard') {
    // Semicircle expanded radially by X.
    const c = zone.edgeSemicircle;
    html += vanguardEdgeSemicirclePath(c, X);
  } else if (depKey === 'from_corners') {
    // Quarter disc expanded radially by X.
    const c = zone.circleQuad;
    html += vanguardCircleQuadPath(c, X);
  } else if (depKey === 'encirclement') {
    // Blue centre circle grows; Red corners each grow.
    if (zone.circle) html += vanguardCirclePath(zone.circle, X);
    if (zone.corners) zone.corners.forEach(c => { html += vanguardCircleQuadPath(c, X); });
  }
  return html;
}

/* Common Vanguard styling — bright red, dashed fill + thick outline */
function vanguardStyle() {
  return {
    fill: 'rgba(255,90,82,0.10)',
    stroke: 'var(--hull-crit)',
    sw: 1.8
  };
}

/* Vanguard for an edge-only DZ (single segment on a table edge).
   Builds an X"-deep strip extending perpendicular from the edge into the board,
   spanning the segment's full length. */
function vanguardStripFromEdgeLine(seg, X) {
  // Determine which edge this segment lies on, and which way "into the board" is.
  let polygon;
  const onTop    = seg.y1 <= 0.5 && seg.y2 <= 0.5;
  const onBottom = seg.y1 >= BOARD_IN - 0.5 && seg.y2 >= BOARD_IN - 0.5;
  const onLeft   = seg.x1 <= 0.5 && seg.x2 <= 0.5;
  const onRight  = seg.x1 >= BOARD_IN - 0.5 && seg.x2 >= BOARD_IN - 0.5;
  if (onTop) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:0},{x:x2,y:0},{x:x2,y:X},{x:x1,y:X}];
  } else if (onBottom) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:BOARD_IN},{x:x2,y:BOARD_IN},{x:x2,y:BOARD_IN-X},{x:x1,y:BOARD_IN-X}];
  } else if (onLeft) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:0,y:y1},{x:0,y:y2},{x:X,y:y2},{x:X,y:y1}];
  } else if (onRight) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:BOARD_IN,y:y1},{x:BOARD_IN,y:y2},{x:BOARD_IN-X,y:y2},{x:BOARD_IN-X,y:y1}];
  } else {
    return ''; // segment not on any edge — shouldn't happen
  }
  const s = vanguardStyle();
  const d = zonePolygonPath(polygon);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Strip-style Vanguard: expand the inner edge of an axis-aligned strip polygon
   into the board by X inches. Detects which edge is on the board boundary and
   pushes the opposite edge inward. */
function vanguardStripPath(polygon, X) {
  // For each vertex, push inward only if not on a board edge — same logic as
  // expandZone, but render with thicker red stroke.
  const cxAvg = polygon.reduce((s,p)=>s+p.x,0)/polygon.length;
  const cyAvg = polygon.reduce((s,p)=>s+p.y,0)/polygon.length;
  const expanded = polygon.map(p => {
    const onLeft   = p.x <= 1.6;
    const onRight  = p.x >= BOARD_IN - 1.6;
    const onTop    = p.y <= 1.6;
    const onBottom = p.y >= BOARD_IN - 1.6;
    let nx = p.x, ny = p.y;
    if (!onLeft && !onRight)  nx = (cxAvg < BOARD_IN/2) ? p.x + X : p.x - X;
    if (!onTop  && !onBottom) ny = (cyAvg < BOARD_IN/2) ? p.y + X : p.y - X;
    return { x: nx, y: ny };
  });
  const s = vanguardStyle();
  const d = zonePolygonPath(expanded);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Table Corners Vanguard: L-shape with rounded outer corners at each 12" tip.
   side = 'blue' (top-left) or 'red' (bottom-right). The original L is the DZ;
   Vanguard extends each arm's inner edge X inward, and at each outer arm-tip
   we add a quarter-arc rounded corner that bulges into the region outside the L.
   The corner-of-the-L (where the two arms meet on the table edges) stays sharp. */
function vanguardTableCornerPath(side, X) {
  const s = vanguardStyle();
  const L = 12; // arm length
  let path = '';
  if (side === 'north') {
    // Corner at (0,0). Walk outline clockwise:
    //   (0,0) → (L,0)         top table edge, full L length
    //   arc cap at top-arm tip (L,0): centred (L,0) radius X,
    //     from (L,0)... wait, the cap is at the OUTER tip of the arm. The
    //     tip's "outer" face is the small edge at x=L, y∈[0,X]. We replace
    //     that small edge with a quarter-arc that bulges OUT (to x > L, in
    //     the region beyond the arm's 12" mark) — but no, the rule says the
    //     cap bulges INTO the area outside the L. For Blue's top arm at
    //     (L,0): "outside the L" is the region x > L, y ∈ [0, X]. So arc
    //     centred at (L, 0) of radius X goes from (L+X, 0) on the table
    //     edge to (L, X) on the arm's inner edge.
    //
    //   So:  L (L+X, 0) along top table edge past the tip by X
    //        arc to (L, X), centred at (L, 0), radius X
    //        L (X, X) inner corner of the L
    //        L (X, L) inner edge of left arm
    //        arc cap at left-arm tip (0, L), centred (0, L) radius X
    //        L (0, L+X) along left table edge past the tip by X
    //        L (0, 0) up the table edge to corner
    const p = {
      a: inchPair(0, 0),
      b: inchPair(L + X, 0),
      c: inchPair(L, X),
      d: inchPair(X, X),
      e: inchPair(X, L),
      f: inchPair(0, L + X)
    };
    const r = X * INCH;
    // First arc (top): from (L+X, 0) to (L, X), centred (L, 0). In SVG y-down,
    //   (L+X, 0) is at angle 0°; (L, X) is at angle 90°. Going CCW (sweep=0)
    //   would pass through 270° = above the centre. Going CW (sweep=1) passes
    //   through 45° = bottom-right of (L,0). That's the region we want (inside
    //   the board). So sweep=1.
    // Second arc (left): from (0, L+X) wait — let me re-check direction. After
    //   the first L lines, we're at (X, L), moving down the left arm's inner
    //   edge. Then arc to (0, L+X). Centre (0, L), radius X. Start at (X, L)
    //   = angle 0°, end at (0, L+X) = angle 90°. Same sweep=1 (CW = through
    //   the bottom-right quadrant of centre (0,L), which lies inside the board).
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 1 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 1 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  } else { // red — corner at (48, 48)
    // Right arm tip at (48, 48-L); bottom arm tip at (48-L, 48).
    // Walk CW from corner (48,48):
    //   L (48, 48-L-X) up the right table edge past the tip by X
    //   arc to (48-X, 48-L), centred (48, 48-L) radius X, bulging into board
    //   L (48-X, 48-X) inner corner
    //   L (48-L, 48-X) inner edge of bottom arm
    //   arc to (48-L-X, 48), centred (48-L, 48) radius X
    //   L (48, 48) along bottom table edge back to corner
    const p = {
      a: inchPair(48, 48),
      b: inchPair(48, 48 - L - X),
      c: inchPair(48 - X, 48 - L),
      d: inchPair(48 - X, 48 - X),
      e: inchPair(48 - L, 48 - X),
      f: inchPair(48 - L - X, 48)
    };
    const r = X * INCH;
    // First arc: (48, 48-L-X) → (48-X, 48-L), centred (48, 48-L). Start angle
    //   270° (above centre), end angle 180° (left of centre). Going CCW = sweep=0
    //   passes through 225° = upper-left of centre — that's inside the board.
    // Second arc: (48-L, 48-X) → (48-L-X, 48), centred (48-L, 48). Start angle
    //   270° (above centre), end angle 180° (left). CCW = sweep=0 passes
    //   through upper-left = inside the board.
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 0 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 0 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  }
  return `<path d="${path}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

function inchPair(xIn, yIn) { return { x: inchToPx(xIn), y: inchToPx(yIn) }; }

/* Radial Vanguard helpers — each emits a single styled path. */
function vanguardCirclePath(c, X) {
  const s = vanguardStyle();
  return `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r + X)}"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardCircleQuadPath(c, X) {
  const s = vanguardStyle();
  // Reuse renderZone, but with thicker stroke. Easier to inline:
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
  if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
  return `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardEdgeSemicirclePath(c, X) {
  const s = vanguardStyle();
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x, p1y, p2x, p2y;
  if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy; }
  if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy; }
  if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
  if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
  return `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}



/* Scenery placement banner — shown during the 'scenery' phase. Lets the player
   pick a piece type, see remaining counts, rotate, and click the board to place.
   Existing pieces can be clicked to remove. */
/* Fleet import modal — paste New Recruit list, parse it, apply to state. */
function openFleetImport(slot) {
  let panel = document.getElementById('fleet-import-overlay');
  if (panel) panel.remove();
  panel = document.createElement('div');
  panel.id = 'fleet-import-overlay';
  panel.className = 'setup-overlay';
  panel.style.zIndex = '400';

  const existing = state.importedFleets && state.importedFleets[slot];
  panel.innerHTML = `
    <div class="setup-card" style="max-width:520px;">
      <div class="setup-header">
        <h2 class="setup-title">IMPORT FLEET LIST</h2>
        <div class="setup-sub">Paste your New Recruit export below</div>
      </div>
      <div class="setup-body">
        <textarea id="fleet-import-text" rows="14" style="width:100%;box-sizing:border-box;background:var(--bg-panel);color:var(--text);border:1px solid var(--border);font-family:var(--mono);font-size:10px;padding:8px;resize:vertical;" placeholder="Paste New Recruit list here...">${''}</textarea>
        <div id="fleet-import-result" style="margin-top:8px;font-size:10px;color:var(--text-mute);min-height:40px;"></div>
      </div>
      <div class="setup-footer" style="display:flex;gap:8px;">
        <button class="btn" id="fleet-import-cancel" style="flex:1;">CANCEL</button>
        ${existing ? `<button class="btn" id="fleet-import-clear" style="flex:1;color:var(--hull-crit);">CLEAR IMPORT</button>` : ''}
        <button class="btn-primary" id="fleet-import-apply" style="flex:2;" disabled>PARSE &amp; APPLY</button>
      </div>
    </div>
  `;
  document.body.appendChild(panel);

  const textarea = panel.querySelector('#fleet-import-text');
  const result   = panel.querySelector('#fleet-import-result');
  const applyBtn = panel.querySelector('#fleet-import-apply');

  let parsed = null;

  function tryParse() {
    const text = textarea.value.trim();
    if (!text) { result.innerHTML = ''; applyBtn.disabled = true; return; }
    parsed = parseNewRecruit(text);
    if (!parsed.valid) {
      result.innerHTML = `<span style="color:var(--hull-crit);">Could not detect faction or groups. Check the format.</span>`;
      applyBtn.disabled = true;
      return;
    }
    const factionLabel = parsed.faction.toUpperCase();
    const groupLines = parsed.groups.map(g => `${g.count}× ${g.name} (${g.pts} pts)`).join(', ');
    const admText = parsed.admirals.length > 0
      ? ` · ${parsed.admirals.length} admiral${parsed.admirals.length > 1 ? 's' : ''} (max Lv ${parsed.admiralLevel})`
      : parsed.groups.some(g => g.isFamousAdmiral) ? ' · Famous Admiral' : '';
    const secText = parsed.secondaries.length ? ` · Secondaries: ${parsed.secondaries.join(', ')}` : '';
    result.innerHTML = `<span style="color:var(--hull-warn);">✓ ${factionLabel}${admText}${secText}</span><br><span style="opacity:0.65;">${groupLines}</span>`;
    applyBtn.disabled = false;
  }

  textarea.addEventListener('input', tryParse);

  applyBtn.addEventListener('click', () => {
    if (!parsed || !parsed.valid) return;
    state.importedFleets = state.importedFleets || { f1: null, f2: null };
    state.importedFleets[slot] = { faction: parsed.faction, groups: parsed.groups, admirals: parsed.admirals, admiralLevel: parsed.admiralLevel, secondaries: parsed.secondaries };
    // Sync faction choice and admiral
    state.fleetChoices[slot] = parsed.faction;
    if (parsed.admiralLevel > 0) state.admiralChoice[slot] = parsed.admiralLevel;
    // Sync secondaries if any were found
    if (parsed.secondaries.length) state.secondaryChoice[slot] = parsed.secondaries.slice(0, 2);
    // Auto-set faction colour on import
    if (parsed.faction && FACTION_COLORS[parsed.faction]) {
      state.playerColors = state.playerColors || { f1: null, f2: null };
      const other = slot === 'f1' ? 'f2' : 'f1';
      const preferred = FACTION_COLORS[parsed.faction];
      const otherCol = state.playerColors[other]; // null if unassigned — preferred always wins
      if (preferred !== otherCol) {
        state.playerColors[slot] = preferred;
      } else {
        const free = Object.keys(PLAYER_COLORS).filter(k => k !== otherCol);
        state.playerColors[slot] = free[Math.floor(Math.random() * free.length)];
      }
    }
    panel.remove();
    renderAll();
    netRelaySetup();
  });

  panel.querySelector('#fleet-import-cancel').addEventListener('click', () => panel.remove());

  const clearBtn = panel.querySelector('#fleet-import-clear');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    state.importedFleets = state.importedFleets || { f1: null, f2: null };
    state.importedFleets[slot] = null;
    panel.remove();
    renderAll();
    netRelaySetup();
  });
}

/* True if the admiral title string matches a known faction-named admiral (not a generic "Admiral"). */
function isFactionAdmiral(faction, title) {
  const titles = (FACTION_ADMIRAL_TITLES && FACTION_ADMIRAL_TITLES[faction]) || [];
  const t = (title || '').toLowerCase();
  return titles.some(k => t.includes(k));
}

/* Parse a def.special string into an array of { tag, prefix, param, desc } objects.
   Entries with no description in SHIP_SPECIAL_RULES are still returned (desc = null). */
function parseSpecialRules(specialStr) {
  if (!specialStr || specialStr === '—') return [];
  return specialStr.split(',').map(s => s.trim()).filter(Boolean).map(tag => {
    // Try exact match first
    if (SHIP_SPECIAL_RULES[tag]) {
      const entry = SHIP_SPECIAL_RULES[tag];
      return { tag, prefix: tag, param: null, desc: typeof entry === 'function' ? entry() : entry };
    }
    // Try prefix match: "Aegis-2" → prefix="Aegis", param="2"
    const m = tag.match(/^(.+?)-(.+)$/);
    if (m) {
      const prefix = m[1].trim();
      const param  = m[2].trim();
      const entry  = SHIP_SPECIAL_RULES[prefix];
      if (entry) return { tag, prefix, param, desc: typeof entry === 'function' ? entry(param) : entry };
    }
    return { tag, prefix: tag, param: null, desc: null };
  });
}

/* Compute total pts for an imported fleet: ships (incl. famous admirals) + non-famous admiral costs. */
function _fleetTotalPts(imported) {
  const shipPts = (imported.groups || []).reduce((sum, g) => sum + (g.pts || 0) * (g.count || 1), 0);
  const admiralPts = (imported.admirals || []).reduce((sum, a) => sum + (a.cost || 0), 0);
  return shipPts + admiralPts;
}

/* Build default admiral assignments for an imported fleet. */
function _buildDefaultAdmiralAssignments(imported) {
  const assignments = [];
  const groups = imported.groups || [];
  const faction = imported.faction;
  const admiralsList = imported.admirals || [];
  const TONNAGE_ORDER = { C: 3, H: 2, M: 1, L: 0 };
  // Famous admirals: auto-assigned to their own group.
  const fallbackLevel = admiralsList.length > 0 ? Math.max(...admiralsList.map(a => a.level)) : 1;
  groups.forEach((grp, i) => {
    if (!grp.isFamousAdmiral) return;
    const def = findShipDef(faction, grp.name);
    const m = def && def.special && def.special.match(/Famous Admiral Lv(\d+)/i);
    assignments.push({ level: m ? +m[1] : fallbackLevel, groupIdx: i, shipIdx: 0, isFamous: true });
  });
  // Non-famous admirals: one assignment per entry in admiralsList, each defaulting to
  // the best available capital ship (command ship first, then heaviest tonnage).
  const caps = groups
    .map((grp, i) => ({ grp, i }))
    .filter(({ grp }) => {
      if (grp.isFamousAdmiral) return false;
      const def = findShipDef(faction, grp.name);
      return def && def.tonnage !== 'L';
    })
    .sort((a, b) => {
      const da = findShipDef(faction, a.grp.name) || {};
      const db = findShipDef(faction, b.grp.name) || {};
      const ca = +((da.special && da.special.match(/Command Ship-(\d+)/i) || [,0])[1]) || 0;
      const cb = +((db.special && db.special.match(/Command Ship-(\d+)/i) || [,0])[1]) || 0;
      if (cb !== ca) return cb - ca;
      return (TONNAGE_ORDER[db.tonnage] || 0) - (TONNAGE_ORDER[da.tonnage] || 0);
    });
  admiralsList.forEach((adm, admiralIdx) => {
    const cap = caps[admiralIdx] || caps[0]; // each admiral gets a different default ship if possible
    if (cap) assignments.push({ level: adm.level, groupIdx: cap.i, shipIdx: 0, isFamous: false, admiralIdx, abilities: (adm.abilities || []).slice() });
  });
  return assignments;
}

/* Show imported (or quickplay Bioficer) fleet with admirals, payloads, and ships. */

  panel = document.createElement('div');
  panel.id = 'fleet-view-overlay';
  panel.className = 'setup-overlay';
  panel.style.zIndex = '400';

  const groups = imported ? (imported.groups || []) : [];
  const faction = imported ? imported.faction : fk;

  const totalPts = imported ? _fleetTotalPts(imported) : 0;
  const isBioficerImported = !!(imported && imported.faction === 'bioficer');
  const isBioficerQuickplay = !imported && fk === 'bioficer';

  // Select element disabled when read-only.
  const selAttrs = readOnly ? 'disabled style="opacity:0.5;pointer-events:none;"' : '';

  // ── SECTION HEADER ─────────────────────────────────────────────────────────
  const sectionHdr = (label) => `<tr>
    <td colspan="4" style="padding:3px 8px 1px;font-size:8px;letter-spacing:0.1em;color:var(--text-mute);background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.08);">${label}</td>
  </tr>`;

  // ── ADMIRALS SECTION ───────────────────────────────────────────────────────
  // Build one row per admiral (famous + non-famous).
  const admiralRows = [];

  // Non-famous admiral rows — one per admiral in admiralsList.
  admiralsList.forEach((adm, admiralIdx) => {
    const asn = assignments.find(a => !a.isFamous && a.admiralIdx === admiralIdx);
    const opts = groups.flatMap((grp, i) => {
      if (grp.isFamousAdmiral) return [];
      const def = findShipDef(faction, grp.name);
      if (!def || def.tonnage === 'L') return [];
      return grp.count === 1
        ? [`<option value="${i}:0"${asn&&asn.groupIdx===i&&(asn.shipIdx||0)===0?' selected':''}>${grp.name}</option>`]
        : Array.from({length:grp.count}, (_,k) =>

    }).join('');
    const sel = opts
      ? `<select class="nfa-flagship-sel" data-admiral-idx="${admiralIdx}" ${selAttrs} style="font-size:10px;background:var(--bg-card,#111);color:inherit;border:1px solid rgba(255,255,255,0.2);padding:2px 6px;border-radius:3px;max-width:200px;">${opts}</select>`
      : `<span style="color:var(--text-mute);font-size:9px;">No capital ships</span>`;

    const isFactionAdm = isFactionAdmiral(imported.faction, adm.title);
    const factionAbs = isFactionAdm ? ((ADMIRAL_FACTION_ABILITIES && ADMIRAL_FACTION_ABILITIES[imported.faction]) || []) : [];

    const abSel = factionAbs.length
      ? `<select class="nfa-ability-sel" data-admiral-idx="${admiralIdx}" ${selAttrs} style="font-size:10px;background:var(--bg-card,#111);color:inherit;border:1px solid rgba(255,255,255,0.2);padding:2px 6px;border-radius:3px;max-width:200px;margin-top:3px;">
          <option value="">— faction ability —</option>
          ${factionAbs.map(ab => `<option value="${ab.key}" ${chosenAbs.includes(ab.key)?'selected':''}>${ab.name} (${ab.cost} AP)</option>`).join('')}

      : (isFactionAdm && chosenAbs.length ? `<div style="font-size:9px;color:var(--text-mute);margin-top:3px;">${chosenAbs.join(', ')}</div>` : '');

  // Famous admiral rows — one row per famous admiral group.
  assignments.filter(a => a.isFamous).forEach(a => {
    const grp = groups[a.groupIdx];
    if (!grp) return;
    const def = findShipDef(faction, grp.name);
    const lvl = a.level || (def && def.special && +(def.special.match(/Famous Admiral Lv(\d+)/i)||[,0])[1]) || '?';
    // Ship position picker for multi-ship famous groups (rare).
    const shipSel = grp.count > 1
      ? `<select class="famous-ship-sel" data-asn-idx="${assignments.indexOf(a)}" ${selAttrs} style="font-size:10px;background:var(--bg-card,#111);color:inherit;border:1px solid rgba(255,255,255,0.2);padding:2px 6px;border-radius:3px;">${Array.from({length:grp.count},(_,k)=>`<option value="${k}"${a.shipIdx===k?' selected':''}>Ship ${k+1}</option>`).join('')}</select>`
      : `<span style="font-size:9px;color:var(--text-mute);">Own ship</span>`;
    admiralRows.push(`<tr style="background:rgba(255,181,71,0.07);">

  // ── PAYLOADS SECTION (Bioficer imported) ───────────────────────────────────
  const payloadRows = [];
  const payloadLinks = state.payloadLinks && (state.payloadLinks[slot] || (state.payloadLinks[slot] = {}));

  if (isBioficerImported) {
    // Find porter groups and payload groups in imported fleet.
    const porterGrps = [], payloadGrps = [];
    groups.forEach((grp, i) => {
      const def = findShipDef('bioficer', grp.name);
      if (!def) return;
      if (def.porter) {
        for (let si = 0; si < (grp.count||1); si++) porterGrps.push({ grp, i, si, def, key: `imp${i}:${si}` });
      }
      if (def.payload) {
        for (let si = 0; si < (grp.count||1); si++) payloadGrps.push({ grp, i, si, def, key: `imp${i}:${si}` });
      }
    });
    // Capacity used per porter.
    const portUsed = {};
    porterGrps.forEach(p => portUsed[p.key] = 0);
    Object.values(payloadLinks).forEach(pk => { if (portUsed[pk] != null) portUsed[pk]++; });

    payloadGrps.forEach(pl => {
      const cur = payloadLinks[pl.key] || '';
      const porterOpts = porterGrps.map(po => {
        const cap = po.def.porter.cap || 1;
        const usedByOthers = portUsed[po.key] - (cur === po.key ? 1 : 0);
        const full = usedByOthers >= cap;
        const sizeOk = po.def.porter.size === pl.def.payload.size;
        const dis = (full || !sizeOk) && cur !== po.key;
        const label = `${po.grp.name}${po.grp.count>1?` #${po.si+1}`:''}`;
        return `<option value="${po.key}" ${cur===po.key?'selected':''} ${dis?'disabled':''}>${label} (${portUsed[po.key]}/${cap})${!sizeOk?' ✗':''}</option>`;

      const isAssigned = !!cur;
      payloadRows.push(`<tr style="${isAssigned?'':'background:rgba(255,100,0,0.06);'}">

  } else if (isBioficerQuickplay) {

    const fleet = FACTIONS['bioficer'] && FACTIONS['bioficer'].fleet;
    if (fleet) {
      const porters = [], payloads = [];
      fleet.forEach(def => {
        const n = def.groupSize || 1;

          if (def.payload) payloads.push({ def, si, key: `${def.id}:${si}` });

      const portUsed = {};
      porters.forEach(p => portUsed[p.key] = 0);
      Object.values(payloadLinks).forEach(pk => { if (portUsed[pk] != null) portUsed[pk]++; });
      payloads.forEach(pl => {
        const cur = payloadLinks[pl.key] || '';

          const cap = po.def.porter.cap || 1;
          const used = portUsed[po.key] - (cur === po.key ? 1 : 0);
          const full = used >= cap;
          const sizeOk = po.def.porter.size === pl.def.payload.size;
          const dis = (full || !sizeOk) && cur !== po.key;
          const label = `${po.def.name}${po.def.groupSize>1?` #${po.si+1}`:''}`;

  // ── SHIPS SECTION (exclude famous admirals — they appear in ADMIRALS) ──────
  const shipRows = groups
    .filter(grp => !grp.isFamousAdmiral)
    .map((grp, _unused, _arr) => {
      const i = groups.indexOf(grp);
      const isNFAdm = assignments.some(a => !a.isFamous && a.groupIdx === i);
      const def = findShipDef(faction, grp.name);
      const role = def ? def.role : '—';

      return `<tr style="${rowBg}">
        ${tdS(`<span style="color:var(--hull-warn)">${badge}</span><span>${displayName}</span>${optStr}`,'min-width:160px;max-width:260px;')}

  // ── SECONDARIES ───────────────────────────────────────────────────────────

    ? imported.secondaries.map(key => {
        const obj = SECONDARY_OBJECTIVES[key];

          <td style="padding:4px 8px;font-weight:600;">${obj.name}</td>

        </tr>`;
      }).join('')
    : '';

    ? `<div style="font-size:9px;color:var(--text-mute);padding:4px 12px;font-style:italic;">👁 View only — opponent's fleet</div>`

  panel.innerHTML = `
    <div class="setup-card" style="max-width:720px;">
      <div class="setup-header">

      </div>
      <div class="setup-body" style="padding:0;">
        ${readOnlyNote}
        <table style="width:100%;border-collapse:collapse;font-size:11px;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-mute);font-size:9px;letter-spacing:0.04em;">

              </td>

            </tr>

        </table>
      </div>
      <div class="setup-footer"><button class="btn" id="fleet-view-close" style="width:100%;">CLOSE</button></div>
    </div>
  `;
  document.body.appendChild(panel);
  panel.querySelector('#fleet-view-close').addEventListener('click', () => panel.remove());

  if (!readOnly) {
