/* Modal to choose WHERE to land launched Battalions: on the Dropsite itself, or on
   one of its Features. Appears once a Dropship/Bulk Lander/Drop Pod has targeted a
   Dropsite (state.battalionDeploy). */
function renderBattalionDeployModal() {
  let overlay = document.getElementById('bat-deploy-overlay');
  if (overlay) overlay.remove();
  const dep = state.battalionDeploy;
  if (!dep) return;
  const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dep.dsId);
  if (!ds) return;
  const side = dep.side;
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const b = dsBattalions(ds);
  const remainingHull = Math.max(0, (ds.maxHull || 0) - (ds.damage || 0));
  const ruined = ds.maxHull && (remainingHull / ds.maxHull) < 0.5 && remainingHull > 0;
  const destroyed = remainingHull === 0 && ds.maxHull;
  // Per-location row showing the label plus BOTH sides' current battalion counts.
  const optRow = (key, label, glyph, col) => {
    const cur = (b[key] && b[key][side]) || 0;
    const foe = (b[key] && b[key][enemy]) || 0;
    return `<button class="btn" data-bat-deploy="${ds.id}|${key}" style="display:block;width:100%;text-align:left;margin-bottom:5px;border-left:3px solid ${col};">
      <div style="color:${col};font-weight:600;">${glyph ? glyph + ' ' : ''}${label}</div>
      <div style="font-size:9px;margin-top:2px;display:flex;gap:10px;">
        <span style="color:var(--${side});">${factionName(side)}: <b>${cur}</b></span>
        <span style="color:var(--${enemy});">${factionName(enemy)}: <b>${foe}</b></span>
      </div>
    </button>`;
  };
  let opts = optRow('ground', ds.base.name + ' (Dropsite)', '◎', 'var(--' + side + ')');
  (ds.features || []).forEach((fk, fi) => {
    if ((ds.destroyedFeatures || []).includes(fi)) return;
    const f = FEATURES[fk] || { name: fk };
    opts += optRow('feat' + fi, f.name, f.glyph, f.color || 'var(--text)');
  });
  // Header: dropsite name, layer, and current Hull / state.
  const hullStr = ds.maxHull
    ? `Hull ${remainingHull}/${ds.maxHull}${destroyed ? ' · <span style="color:var(--hull-crit)">LEVELLED</span>' : ruined ? ' · <span style="color:var(--hull-warn)">RUINED</span>' : ''}`
    : '';
  overlay = document.createElement('div');
  overlay.id = 'bat-deploy-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `<div class="setup-panel" style="max-width:340px;">
    <div class="setup-title" style="color:var(--${side});">Land ${dep.count} ${dep.asset} Battalion${dep.count>1?'s':''}</div>
    <div style="font-size:10px;color:var(--text-dim);margin:4px 0 2px;">On <b>${ds.base.name}</b>${ds.base.layer ? ` · ${ds.base.layer}` : ''}</div>
    ${hullStr ? `<div style="font-size:11px;font-family:var(--mono);margin:0 0 9px;">${hullStr}</div>` : '<div style="margin-bottom:9px;"></div>'}
    <div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Choose a location:</div>
    ${opts}
    <div class="setup-footer"><button class="btn" id="bat-deploy-cancel">CANCEL</button></div>
  </div>`;
  document.body.appendChild(overlay);
  // The deploy buttons reuse the existing [data-bat-deploy] click handler.
  overlay.querySelector('#bat-deploy-cancel').addEventListener('click', () => {
    if (dep.fromGid != null) { state.selectedDropsiteId = null; state.selectedGroupId = dep.fromGid; state.selectedShipIdx = dep.fromSi; }
    state.battalionDeploy = null;
    renderAll();
  });
}

function renderRepairPhase() {
  let overlay = document.getElementById('repair-overlay');
  if (overlay) overlay.remove();
  const R = state.repairPhase;
  if (!R) return;
  let body = '', footer = '';

  if (R.step === 'fire') {
    body = `<div class="am-step-head">🔥 Fire Damage</div>
      <div class="am-line" style="font-size:10px;color:var(--text-dim)">At the start of the End Phase, each Fire Token deals 1 damage before repairs.</div>
      ${R.fireLog.length ? R.fireLog.map(l => `<div class="am-line" style="font-size:11px;">${l}</div>`).join('') : '<div class="am-line">No Fire damage.</div>'}
      ${R.explosions.length ? `<div class="am-line" style="color:var(--hull-crit)">${R.explosions.length} ship(s) destroyed by Fire — explosions resolve.</div>` : ''}`;
    footer = `<button class="btn-primary" data-rp-next="repair">Continue ▸</button>`;
  }

  else if (R.step === 'repair') {
    if (!R.targets.length) {
      body = `<div class="am-step-head">🔧 Repair</div><div class="am-line">No repairable Crippling Effects.</div>`;
      footer = `<button class="btn-primary" data-rp-close="1">End Round ▸</button>`;
    } else {
      const t = R.targets[R.idx];
      const ship = state.groups[t.gid].ships[t.si];
      // Roll once per effect when first shown.
      if (!t.rolled) {
        t.rolled = t.effects.map(eff => {
          const dice = t.dc ? [rollDie(), rollDie()] : [rollDie()];
          const need = eff === 'decay' ? 6 : 4;
          const success = dice.some(d => d >= need);
          return { eff, dice, need, success };
        });
        // Apply: remove each effect that succeeded (player's choice is moot —
        // each effect rolls its own dice here for clarity).
        t.rolled.forEach(r => {
          if (r.success && ship.crippling) {
            const i = ship.crippling.indexOf(r.eff);
            if (i >= 0) ship.crippling.splice(i, 1);
            if (r.eff === 'fire') ship.fireTokens = 0;
            R.log.push(`${t.name}: repaired ${CRIPPLE_LABEL[r.eff]}`);
          }
        });
      }
      body = `<div class="am-step-head">🔧 Repair — ${t.name}${t.dc?' <span style="color:var(--ucm);font-size:9px;">DC: 2D6</span>':''}</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${t.dc?'2D6':'1D6'} per repairable effect · 4+ removes (Orbital Decay 6+).</div>
        ${t.rolled.map(r => `<div class="am-line">
          <b>${CRIPPLE_LABEL[r.eff]}</b> (need ${r.need}+):
          <span class="am-dice" style="display:inline-flex;">${r.dice.map(d=>`<span class="am-die ${d>=r.need?'hit':'miss'}">${d}</span>`).join('')}</span>
          ${r.success?'<span style="color:var(--hull-good)">✓ repaired</span>':'<span style="color:var(--text-mute)">remains</span>'}
        </div>`).join('')}`;
      const last = R.idx >= R.targets.length - 1;
      footer = `<button class="btn-primary" data-rp-next="${last?'done':'next'}">${last?'End Round ▸':'Next Ship ▸'}</button>`;
    }
  }

  overlay = document.createElement('div');
  overlay.id = 'repair-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '300';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--hull-warn)">⚙ END PHASE · REPAIR</h2></div>
    <div class="setup-body">${body}</div>
    <div class="setup-footer">${footer}</div>
  </div>`;
  document.body.appendChild(overlay);
  const nb = overlay.querySelector('[data-rp-next]');
  if (nb) nb.addEventListener('click', () => {
    const to = nb.dataset.rpNext;
    if (to === 'repair') R.step = 'repair';
    else if (to === 'next') R.idx++;
    else if (to === 'done') { finishRepairPhase(); return; }
    renderAll();
  });
  const cb = overlay.querySelector('[data-rp-close]');
  if (cb) cb.addEventListener('click', () => finishRepairPhase());
}

/* Close the repair phase and actually advance the round. */
function finishRepairPhase() {
  state.repairPhase = null;
  advanceRoundNow();
  renderAll();
}

/* Advance to the next round: reset per-round flags, roll new initiative. */
function advanceRoundNow() {
  // Status tokens are automatically removed at the start of the End Phase.
  Object.values(state.groups).forEach(g => g.ships.forEach(s => {
    if (s.statusToken) {
      s.statusToken = false;
      if (s.crippling) { const i = s.crippling.indexOf('scanners'); if (i >= 0) s.crippling.splice(i, 1); }
    }
  }));
  state.assetPhase = null;
  state.assetMove = null;
  state.battalionCombat = null;
  state.dropsiteActivation = null;
  // Victory Point scoring for the round just completed (before advancing).
  const completedRound = state.round;
  const scoreLog = runScoring(completedRound);
  if (completedRound >= 6) {
    // End of game — show summary; do not advance.
    const u = state.score.ucm, s = state.score.shal;
    let winner;
    if (u.vp !== s.vp) winner = u.vp > s.vp ? 'ucm' : 'shal';
    else if (u.kp !== s.kp) winner = u.kp > s.kp ? 'ucm' : 'shal';
    else winner = 'draw';
    state.gameOver = { winner, scoreLog };
    return;
  }
  // Standard scoring happened this round (R4) — show the breakdown modal before advancing.
  if (state.lastScoring) state.scoringModal = { ...state.lastScoring, log: scoreLog };
  state.round = state.round + 1;
  logEvent(`── Round ${state.round} begins ──`);
  Object.values(state.groups).forEach(g => {
    g.activated = false;
    g.order = null;
    // Sustained Fire: this round's hit-by record becomes last round's; reset for new round.
    g.hitByLastRound = g.hitByThisRound || [];
    g.hitByThisRound = [];
    g.ships.forEach(s => { s.movedThisRound = false; s.justArrived = false; s.launchedThisRound = 0; s.usedLinks = {}; s.gateRemaining = undefined; s.order = null; s.firedThisActivation = false; s.weaponTargets = {}; s.dcRepaired = false; s.dcThisRound = false; s.detectorUsed = false; s.arrestedThisRound = false; });
    g.moveTrail = [];
  });
  state.selectedShipIdx = null;
  // Reset per-round dropsite feature firing.
  ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => { ds.firedFeatures = []; });
  if (scoreLog.length) state._lastScoreLog = scoreLog;
  rollInitiative();
}

/* Render the legal move cone — annular wedge between minR and maxR,
   centred on ship's facing, half-angle = turnDeg.
   If turnDeg = 0, this collapses to a line; we still draw a thin wedge for visibility. */
function renderMoveCone(cx, cy, headingDeg, minR, maxR, turnDeg, color) {
  const half = Math.max(0.5, turnDeg); // even no-turn shows a thin sliver
  const a1 = (headingDeg - half) * Math.PI / 180;
  const a2 = (headingDeg + half) * Math.PI / 180;
  // Outer arc points
  const ox1 = cx + Math.cos(a1) * maxR;
  const oy1 = cy + Math.sin(a1) * maxR;
  const ox2 = cx + Math.cos(a2) * maxR;
  const oy2 = cy + Math.sin(a2) * maxR;
  // Inner arc points (if minR > 0)
  const ix1 = cx + Math.cos(a1) * minR;
  const iy1 = cy + Math.sin(a1) * minR;
  const ix2 = cx + Math.cos(a2) * minR;
  const iy2 = cy + Math.sin(a2) * minR;
  const largeArc = (half * 2) > 180 ? 1 : 0;

  let html = '';
  if (minR > 0) {
    // annular wedge
    html += `<path d="M ${ix1} ${iy1} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2}
                     L ${ix2} ${iy2}
                     A ${minR} ${minR} 0 ${largeArc} 0 ${ix1} ${iy1} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  } else {
    // pie wedge
    html += `<path d="M ${cx} ${cy} L ${ox1} ${oy1}
                     A ${maxR} ${maxR} 0 ${largeArc} 1 ${ox2} ${oy2} Z"
              fill="${color}" fill-opacity="0.08"
              stroke="${color}" stroke-width="0.5" stroke-opacity="0.45"
              stroke-dasharray="3 3"/>`;
  }
  // Facing centre line (subtle)
  const fwdLen = maxR + 4;
  const fwd = headingVec(headingDeg);
  html += `<line x1="${cx}" y1="${cy}" x2="${cx + fwd.x * fwdLen}" y2="${cy + fwd.y * fwdLen}"
            stroke="${color}" stroke-width="0.5" stroke-opacity="0.35"
            stroke-dasharray="1 4"/>`;
  return html;
}

/* Render a ship marker on the board */
function renderShipMarker(def, ship, isGhost, ghostValid = true, isSelected = false, isInSelGroup = false, shipIdx = 0) {
  const color = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
  const colorDim = def.side === 'ucm' ? 'var(--ucm-dim)' : 'var(--shal-dim)';
  // Base diameter by tonnage — actual physical mm-base sizes at 25.4mm = 1".
  // L=30mm, M=40mm, H=50mm, C=60mm  →  inches → pixels (INCH = 12 px/").
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  const r = (diameterIn * INCH) / 2;
  const x = ship.x, y = ship.y, h = ship.heading;

  // Heading vector for the arrow tip (points from centre along facing direction).
  const hr = h * Math.PI / 180;
  const dirX = Math.cos(hr), dirY = Math.sin(hr);
  // Arrow geometry: nose at the base edge; tail two points just inside the base.
  const noseX = x + dirX * r;
  const noseY = y + dirY * r;
  const arrowLen = r * 0.65;          // length of the arrow from nose backward
  const arrowHalf = r * 0.35;          // half-width at the tail
  // Tail centre (just inside the nose direction)
  const tailCx = x + dirX * (r - arrowLen);
  const tailCy = y + dirY * (r - arrowLen);
  // Perpendicular to heading for tail spread
  const perpX = -dirY, perpY = dirX;
  const tailLx = tailCx + perpX * arrowHalf;
  const tailLy = tailCy + perpY * arrowHalf;
  const tailRx = tailCx - perpX * arrowHalf;
  const tailRy = tailCy - perpY * arrowHalf;

  const fillCol = isGhost ? (ghostValid ? colorDim : 'rgba(255,82,82,0.25)') : 'rgba(0,0,0,0)';
  const strokeCol = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  const dataAttrs = isGhost ? '' : `data-ship="${def.id}|${shipIdx}" style="cursor:pointer;"`;
  const opacity = isGhost ? 0.55 : 1;
  // Faint translucent base fill in the faction's literal colour (rgba so opacity blends).
  const baseFactionHex = def.side === 'ucm' ? '#4ad6ff' : '#d4a647';
  const baseFill = isGhost
    ? (ghostValid ? hexToRgba(baseFactionHex, 0.12) : 'rgba(255,82,82,0.12)')
    : hexToRgba(baseFactionHex, 0.10);

  let html = `<g opacity="${opacity}" ${dataAttrs}>`;
  // Base circle — translucent fill in the faction colour, coloured outline.
  html += `<circle cx="${x}" cy="${y}" r="${r}" fill="${baseFill}"
            stroke="${strokeCol}" stroke-width="${isSelected ? 1.6 : 1}"/>`;
  // Facing arrow (filled triangle) inside the base.
  const arrowFill = isGhost ? (ghostValid ? color : 'var(--hull-crit)') : color;
  html += `<polygon points="${noseX},${noseY} ${tailLx},${tailLy} ${tailRx},${tailRy}"
            fill="${arrowFill}" stroke="${arrowFill}" stroke-width="0.5"
            stroke-linejoin="round"/>`;
  // Selection ring
  if (isSelected && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 3}" fill="none" stroke="${color}" stroke-width="1" stroke-dasharray="2 2"/>`;
  } else if (isInSelGroup && !isGhost) {
    html += `<circle cx="${x}" cy="${y}" r="${r + 2}" fill="none" stroke="${colorDim}" stroke-width="0.7" opacity="0.6"/>`;
  }
  // "moved this round" badge
  if (!isGhost && isInSelGroup && ship.movedThisRound) {
    const bx = x + r * 0.72, by = y - r * 0.72;
    html += `<circle cx="${bx}" cy="${by}" r="3.5" fill="var(--bg-elev)" stroke="${color}" stroke-width="0.7"/>`;
    html += `<text x="${bx}" y="${by + 2}" font-family="var(--mono)" font-size="5" font-weight="700"
              fill="${color}" text-anchor="middle" pointer-events="none">✓</text>`;
  }
  // name label
  if (!isGhost) {
    const grp = getGroup(def.id);
    const nm = def.name.replace(/ [αβγ]$/, '');
    const showName = isInSelGroup || isSelected;
    if (showName) {
      const labelY = y + r + 10;
      html += `<text x="${x}" y="${labelY}" font-family="var(--mono)" font-size="8"
                fill="${color}" text-anchor="middle" pointer-events="none">${nm}${grp.ships.length > 1 ? ' '+(shipIdx+1) : ''}</text>`;
    }
    // health pip — small bar under ship
    const pct = ship.hull / ship.maxHull;
    if (pct < 1) {
      const barW = r * 2;
      const barX = x - r;
      const barY = y + r + 1;
      const barCol = pct <= 0.34 ? 'var(--hull-crit)' : pct <= 0.6 ? 'var(--hull-warn)' : 'var(--hull-good)';
      html += `<rect x="${barX}" y="${barY}" width="${barW}" height="1.5" fill="var(--bg)" opacity="0.6"/>`;
      html += `<rect x="${barX}" y="${barY}" width="${barW * pct}" height="1.5" fill="${barCol}"/>`;
    }
  }
  // Carried Recon Operatives badge (Extract objective) — ⬆N above the ship.
  if (!isGhost && state.shipReconOps) {
    const carried = state.shipReconOps[def.id + '#' + shipIdx] || 0;
    if (carried > 0) {
      html += `<text x="${x}" y="${y - r - 5}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">⬆${carried}</text>`;
    }
  }
  html += `</g>`;
  return html;
}

function inchToPx(v) { return v * INCH; }

/* Ship base radius in pixels, by tonnage (mm bases at 25.4mm = 1"). */
function shipBaseRadiusPx(def) {
  const diameterIn = { 'L': 30/25.4, 'M': 40/25.4, 'H': 50/25.4, 'C': 60/25.4 }[def.tonnage] || 30/25.4;
  return (diameterIn * INCH) / 2;
}

/* ==========================================================================
   GROUP FORMATIONS (coherency)
   - Light groups: ships within 3" of each other.  Medium+ groups: within 6".
   - Single-ship groups (or down to one alive ship) ignore coherency.
   - Groups of 2–3: each ship within coherency of ≥1 other ship.
   - Groups of 4+: each ship within coherency of ≥2 other ships.
   ========================================================================== */

/* Coherency distance (inches) for a group, by its tonnage. */
function coherencyInches(def) {
  return def.tonnage === 'L' ? 3 : 6;
}

/* Open Network ships pick orders individually from the round AFTER they deploy.
   We approximate the deploy round as round 1 (Voidgates have Descent), so
   individual orders apply from round 2 onwards. */
/* A Voidgate (Open Network) ship joins the Network the round AFTER it deploys.
   The round it deploys, it activates with its deploying Group under a single
   Group Order; from the next round it's part of the Network with its own Order. */
function shipInNetwork(def, ship) {
  if (!def.openNetwork || !ship) return false;
  if (ship.offTable || ship.destroyed) return false;
  return (ship.deployedRound != null) && (ship.deployedRound < state.round);
}
/* Does a Group currently use individual (per-ship) Orders?
   - Open Network: true if ANY of its ships are already in the Network. (Newly
     deployed gates still use the Group Order; networked gates use their own.)
   - Detached Payloads: single Group from R2, individual GQ orders. */
/* Ships that ignore Coherency, have no Lead, and gain no Formation Benefits:
   Open Network gateships and Payload ships. */
function noFormation(def) { return !!(def.openNetwork || def.payload); }

function onIndividualOrders(def, grp) {
  if (def.openNetwork) return grp && grp.ships.some(s => shipInNetwork(def, s));
  if (def.payload) return state.round >= 2;
  return false;
}

/* Effective Order for a given ship — its own Order if it's on individual orders
   (networked Voidgate / detached Payload), otherwise the Group Order. */
/* Movement-before-firing: a Group must finish ALL its movement before any ship fires
   or launches. Returns true when every on-table, non-destroyed ship whose effective
   Order permits movement has already moved this activation. Ships on individual orders
   are judged per-ship by the caller; this is the group gate. */
function groupMovementComplete(def, grp) {
  if (!grp || !grp.order) return false; // no order yet → not moved
  return grp.ships.every((s, i) => {
    if (!s || s.destroyed || s.offTable) return true;
    const eo = effectiveOrder(def, grp, i);
    const ord = eo && ORDERS[eo];
    if (!ord || ord.moveMax === 0) return true; // this ship has no movement to complete
    return !!s.movedThisRound;
  });
}

/* The ship from which a weapon's arc & range are measured. For group fire (multi-ship
   group not on individual orders), all measurements are taken from the LEAD ship; for
   individual orders / single ships, from the firing ship itself. */
function firingOriginShip(def, grp, shipIdx) {
  if (!grp) return null;
  const individual = def.openNetwork || onIndividualOrders(def, grp);
  if (!individual) {
    const li = grp.leadShipIdx || 0;
    const lead = grp.ships[li];
    if (lead && !lead.destroyed && !lead.offTable) return lead;
  }
  return grp.ships[shipIdx];
}

function effectiveOrder(def, grp, shipIdx) {
  const s = grp.ships[shipIdx];
  if (def.openNetwork) {
    // Networked gates use their own order; freshly-deployed gates use the group order.
    return shipInNetwork(def, s) ? (s ? s.order : null) : grp.order;
  }
  if (onIndividualOrders(def, grp)) {
    return s ? s.order : null;
  }
  return grp.order;
}

/* Returns a Set of ship indices that are OUT of formation for the given group.
   Empty set = everyone in formation (or rule doesn't apply). */
function outOfFormationSet(def) {
  if (def.openNetwork || def.payload) return new Set(); // Open Network & Payloads ignore coherency
  const grp = getGroup(def.id);
  const alive = grp.ships.map((s, i) => ({ s, i })).filter(o => !o.s.destroyed && !o.s.offTable);
  if (alive.length <= 1) return new Set(); // single ship (or down to one) — rule ignored
  const cohPx = coherencyInches(def) * INCH;
  const need = alive.length >= 4 ? 2 : 1; // 4+ need two neighbours, else one
  const out = new Set();
  alive.forEach(({ s, i }) => {
    let neighbours = 0;
    alive.forEach(({ s: o, i: j }) => {
      if (i === j) return;
      // Must be in the same orbital layer AND within coherency distance.
      if ((s.layer || 'orbit') !== (o.layer || 'orbit')) return;
      if (Math.hypot(s.x - o.x, s.y - o.y) <= cohPx) neighbours++;
    });
    if (neighbours < need) out.add(i);
  });
  return out;
}

/* Whole group in formation? */
function groupInFormation(def) {
  return outOfFormationSet(def).size === 0;
}

/* Launch asset metadata: aura range (inches) and what it can target. */
const LAUNCH_TYPES = {
  dropship:       { auraIn: 3, target: 'dropsite_same_layer', label: 'Dropships' },
  gate_dropship:  { auraIn: 3, target: 'dropsite_via_gate',   label: 'Dropships (Voidgate)' },
  bulk_lander:    { auraIn: 6, target: 'dropsite_any_layer',  label: 'Bulk Landers' },
  drop_pod:       { auraIn: 3, target: 'city',                label: 'Drop Pods' },
  boarding_pod:   { auraIn: 3, target: 'ship_or_station',     label: 'Boarding Pods' },
  fighter_bomber: { auraIn: 6, target: 'point',               label: 'Fighters & Bombers' },

function launchMeta(type) { return LAUNCH_TYPES[type] || { auraIn: 3, target: 'point', label: 'Asset' }; }

/* Movement value (inches) for a placed asset, by faction and asset kind. */
/* Faction-specific Fighter / Bomber / Fire Ship profiles.
   fighter: {thrust, rerolls}; bomber/fireship: {thrust, att, lock, dmg, type, special}.

const ASSET_PROFILES = {

    torpedo:  { thrust: 6,  att: 3, lock: '4+', dmg: 3, type: 'C', special: 'Flash-2' },

  },
  scourge: {

    bomber:   { thrust: 12, att: 2, lock: '3+', dmg: 1, type: 'K', special: 'Crippling-Fire' },
    fireship: { thrust: 7,  att: 3, lock: '4+', dmg: 1, type: 'K' },
    torpedo:  { thrust: 8,  att: 6, lock: '4+', dmg: 1, type: 'K', special: 'Corruptor-2, Crippling-Fire' },
    mine:     { thrust: 6,  att: 3, lock: '4+', dmg: 1, type: 'K', special: 'Corruptor-1' }
  },
  resistance: {
    fighter:  { thrust: 16, rerolls: 3 },
    bomber:   { thrust: 10, att: 3, lock: '4+', dmg: 1, type: 'K' },
    fireship: { thrust: 3,  att: 3, lock: '2+', dmg: 1, type: 'E' },
    torpedo:  { thrust: 6,  att: 6, lock: '2+', dmg: 1, type: 'K', special: 'Penetrator' },
    mine:     { thrust: 3,  att: 5, lock: '4+', dmg: 1, type: 'K' }
  },
  bioficer: {
    fighter:  { thrust: 16, rerolls: 1 },
    bomber:   { thrust: 13, att: 3, lock: '4+', dmg: 1, type: 'K' },
    fireship: { thrust: 8,  att: 3, lock: '4+', dmg: 1, type: 'E' },
    torpedo:  { thrust: 12, att: 3, lock: '2+', dmg: 1, type: 'K', special: 'Corruptor-2' },
    mine:     { thrust: 5,  att: 4, lock: '3+', dmg: 1, type: 'K' }
  }
};
/* Resolve a faction's asset profile (defaults to UCM if unknown). */
function assetProfile(side, kind) {
  const fk = state.factions && state.factions[side];
  const tbl = ASSET_PROFILES[fk] || ASSET_PROFILES.ucm;
  return tbl[kind] || tbl.bomber;
}
/* Thrust for an asset entry — resolves the faction from its side slot. */
function assetThrust(asset) {
  return assetProfile(asset.side, asset.kind).thrust || 10;
}
/* Fighter re-rolls (Close Protection) for a side. */
function fighterRerolls(side) {
  return (assetProfile(side, 'fighter').rerolls) || 0;
}

/* Apply scenery attrition to a moving asset stack along origin→current path.
   Per asset, for each crossed piece: Large Object removes outright, Ring removes 2+,
   Micrometeor 3+, Dense 5+. Mutates mover.count; returns the number removed. */
function applyAssetScenery(mover, origX, origY) {
  const sd = state.scenarioData;
  if (!sd) return 0;
  const thresholds = [];
  (sd.largeObjects||[]).forEach(o => { if (largeObjectAt(mover.x,mover.y) || segCrossesCircle(origX,origY,mover.x,mover.y,inchToPx(o.x),inchToPx(o.y),inchToPx(o.diameter/2))) thresholds.push(1); });
  (sd.rings||[]).forEach(r => { if (segCrossesRing(origX,origY,mover.x,mover.y,r)) thresholds.push(2); });
  (sd.placedScenery||[]).forEach(s => { if (segCrossesRect(origX,origY,mover.x,mover.y,inchToPx(s.x),inchToPx(s.y),inchToPx(6),inchToPx(3),s.angle||0)) thresholds.push(s.type==='dense'?5:3); });
  if (!thresholds.length) return 0;
  const need = Math.min(...thresholds);
  let survivors = 0;
  for (let i = 0; i < mover.count; i++) { if (need === 1 || rollDie() < need) { /* removed */ } else survivors++; }
  const removed = mover.count - survivors;
  mover.count = survivors;
  if (removed > 0) flashLaunchMsg(`Scenery: ${removed} ${mover.kind}${removed>1?'s':''} lost`);
  return removed;
}

/* Close Protection: friendly Fighter Wings within Fighter Thrust range of a ship at
   (x,y). Returns [{id, count}] for Wings of `side` with count>0. Used to re-roll failed
   saves vs Close Action / Bomber / Fire-Ship attacks (each re-roll spends one fighter). */
function friendlyFightersInRange(side, x, y) {
  const thrPx = (assetProfile(side, 'fighter').thrust || 12) * INCH;
  return (state.launchedAssets || [])
    .filter(a => a.kind === 'fighter' && a.side === side && a.count > 0 &&
                 Math.hypot(a.x - x, a.y - y) <= thrPx)
    .map(a => ({ id: a.id, count: a.count }));
}

/* Battalion storage on a dropsite. Locations: 'ground' + 'feat<index>'.
   Each location is { ucm:n, shal:n }. Lazily initialised. */
function dsBattalions(ds) {
  if (!ds.battalions) {
    ds.battalions = { ground: { ucm: 0, shal: 0 } };
    (ds.features || []).forEach((fk, fi) => { ds.battalions['feat' + fi] = { ucm: 0, shal: 0 }; });
  }
  return ds.battalions;
}
/* Total enemy battalions on a dropsite (relative to a given side) across all locations. */
function dsEnemyBattalions(ds, side) {
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const b = dsBattalions(ds);
  return Object.values(b).reduce((sum, loc) => sum + (loc[enemy] || 0), 0);
}
/* All battalions of a side on a dropsite. */
function dsSideBattalions(ds, side) {
  const b = dsBattalions(ds);
  return Object.values(b).reduce((sum, loc) => sum + (loc[side] || 0), 0);
}

/* Friendly readable location name for a dropsite location key. */
function locDisplayName(ds, key) {
  if (key === 'ground') return `${ds.base.name} (ground)`;
  const fi = parseInt(key.replace('feat', ''));
  const fk = ds.features[fi];
  const f = FEATURES[fk];
  return `${f.glyph ? f.glyph + ' ' : ''}${f.name}`;
}

/* Resolve Battalion Combat (Asset Phase step 1) for all dropsites.
   Per location, if both sides have battalions, remove equally (min of the two)
   so the smaller side is wiped and the larger reduced by that amount. */
function resolveBattalionCombat() {
  const log = [];
  if (!state.scenarioData || !state.scenarioData.dropsites) return log;
  state.scenarioData.dropsites.forEach(ds => {
    const b = dsBattalions(ds);
    Object.keys(b).forEach(key => {
      const loc = b[key];
      const u = loc.ucm || 0, s = loc.shal || 0;
      if (u > 0 && s > 0) {
        const removed = Math.min(u, s);
        loc.ucm = u - removed;
        loc.shal = s - removed;
        log.push({ where: locDisplayName(ds, key), removed, u, s, nu: loc.ucm, ns: loc.shal });
      }
    });
  });
  return log;
}

/* Aegis-X (§15.1): the best Aegis value protecting a target group — from a friendly
   ship/platform Group within 6" on the same Orbital Layer (Y added save dice vs Close
   Action & Bomber attacks). Also checks Aegis Platform features on friendly dropsites. */
function aegisValueForGroup(targetGid) {
  const tg = state.groups[targetGid];
  if (!tg) return 0;
  const tdef = getDef(targetGid);
  const tside = tdef.side;
  // Reference point: the target group's lead/first on-table ship.
  const tShip = tg.ships.find(s => !s.destroyed && !s.offTable);
  if (!tShip) return 0;
  const tLayer = tShip.layer || 'orbit';
  let best = 0;
  // Friendly ship Groups with Aegis-X.
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    if (def.side !== tside) return;
    const m = (def.special || '').match(/Aegis-(\d)/i);
    if (!m) return;
    const y = parseInt(m[1]);
    const src = state.groups[gid].ships.find(s => !s.destroyed && !s.offTable && (s.layer||'orbit') === tLayer);
    if (src && Math.hypot(src.x - tShip.x, src.y - tShip.y) <= 6 * INCH) best = Math.max(best, y);
  });
  // Friendly Dropsites carrying an Aegis Platform feature (treated as Aegis-4 source).
  ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => {
    if (ds.destroyed) return;
    const hasAegis = (ds.features || []).some((fk, fi) => fk === 'aegis_platform' && !(ds.destroyedFeatures||[]).includes(fi));
    if (!hasAegis) return;
    if (dropsiteController(ds) !== tside) return;
    if (tLayer !== 'orbit') return; // platform sits in orbit
    if (Math.hypot(inchToPx(ds.x) - tShip.x, inchToPx(ds.y) - tShip.y) <= 6 * INCH) best = Math.max(best, 4);
  });
  return best;
}
function surveyableDropsite(ship, side) {
  const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
  for (const ds of dss) {
    if (ds.destroyed) continue;
    if (ds.surveyedBy && ds.surveyedBy.includes(side)) continue;
    if (Math.hypot(ship.x - inchToPx(ds.x), ship.y - inchToPx(ds.y)) <= 6 * INCH) return ds;
  }
  return null;
}

/* A Dropsite within 6" of `ship` that still holds Recon Operatives. Returns it or null. */
/* Transport VALUE of a ship = the largest launch `n` among its ground-transport Assets
   (Dropship / Bulk Lander / Drop Pod / Boarding Pod). 0 if it carries none. Caps how
   many Recon Operatives it can Extract at once. */
function transportValue(def) {
  if (!def.launch) return 0;
  let v = 0;
  def.launch.forEach(l => { if (/lander|dropship|drop_pod|boarding_pod|gate_dropship/i.test(l.type)) v = Math.max(v, l.n || 0); });
  return v;
}

function extractableDropsite(ship, side) {
  const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
  for (const ds of dss) {
    if (ds.destroyed || !(ds.reconOps > 0)) continue;
    if (Math.hypot(ship.x - inchToPx(ds.x), ship.y - inchToPx(ds.y)) <= 6 * INCH) return ds;
  }
  return null;
}

/* A dropsite is "contestable" if both sides have any battalions on it. */
function dropsiteContested(ds) {
  return dsSideBattalions(ds, 'ucm') > 0 && dsSideBattalions(ds, 'shal') > 0;
}
/* Which side Controls a dropsite: has battalions and the opponent does not.
   Returns 'ucm' | 'shal' | null (uncontrolled / contested / empty). */
function dropsiteController(ds) {
  const u = dsSideBattalions(ds, 'ucm'), s = dsSideBattalions(ds, 'shal');
  if (u > 0 && s === 0) return 'ucm';
  if (s > 0 && u === 0) return 'shal';
  return null;
}
/* Launchable features on a dropsite (those with a `launch` profile). */
function dropsiteLaunchFeatures(ds) {
  const out = [];
  (ds.features || []).forEach((fk, fi) => {
    const f = FEATURES[fk];
    if (f && f.launch && f.launch.length && !(ds.destroyedFeatures||[]).includes(fi)) {
      out.push({ fi, fk, f });
    }
  });
  return out;
}
/* Features on a dropsite with a weapon (Military Outpost, Orbital Defence Gun). */
function dropsiteWeaponFeatures(ds) {
  const out = [];
  (ds.features || []).forEach((fk, fi) => {
    const f = FEATURES[fk];
    if (f && f.weapon && !(ds.destroyedFeatures||[]).includes(fi)) out.push({ fi, fk, f });
  });
  return out;
}
/* An eligible Escort Group for a hit on (gid,si): a friendly Group with the Escort
   rule, in coherency, within 6" on the same layer of the H/C target. Returns {gid,name}. */
function eligibleEscort(targetGid, targetSi) {
  const tdef = getDef(targetGid);
  if (!tdef || !['H','C'].includes(tdef.tonnage)) return null; // only H/C may be Escorted
  const tShip = state.groups[targetGid] && state.groups[targetGid].ships[targetSi];
  if (!tShip || tShip.destroyed) return null;
  const side = tdef.side, tLayer = tShip.layer || 'orbit';
  let found = null;
  fleetForSide(side).forEach(def => {
    if (found || !/Escort/i.test(def.special || '') || def.id === targetGid) return;
    const grp = state.groups[def.id];
    if (!grp) return;
    const src = grp.ships.find(s => !s.destroyed && !s.offTable && (s.layer||'orbit') === tLayer);
    if (src && Math.hypot(src.x - tShip.x, src.y - tShip.y) <= 6 * INCH) found = { gid: def.id, name: def.name };
  });
  return found;
}

/* Highest Command Ship-X among `side`'s on-table, non-destroyed ships (0 if none). */
function commandShipBonus(side) {
  let best = 0;
  fleetForSide(side).forEach(def => {
    const m = (def.special || '').match(/Command Ship-(\d)/i);
    if (!m) return;
    const grp = state.groups[def.id];
    if (grp && grp.ships.some(s => !s.destroyed && !s.offTable)) best = Math.max(best, parseInt(m[1]));
  });
  return best;
}

/* Does `side` Control a dropsite with a working Comms Station? (+1 AP / round) */
function sideHasCommsUplink(side) {
  return ((state.scenarioData && state.scenarioData.dropsites) || []).some(ds => {
    if (ds.destroyed || dropsiteController(ds) !== side) return false;
    return (ds.features || []).some((fk, fi) => fk === 'comms_station' && !(ds.destroyedFeatures||[]).includes(fi));
  });
}

/* Remove a feature from a dropsite. Power Plant is Volatile: on destruction all
   Groups within 3" gain a Spike and the Dropsite takes an extra 2D3 damage. */
function destroyFeature(ds, fi) {
  ds.destroyedFeatures = ds.destroyedFeatures || [];
  if (ds.destroyedFeatures.includes(fi)) return;
  const fkey = ds.features[fi];
  ds.destroyedFeatures.push(fi);
  if (fkey === 'power_plant') {
    const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
    // Spike all groups with a ship within 3".
    Object.keys(state.groups).forEach(gid => {
      const g = state.groups[gid];
      if (g.ships.some(s => !s.destroyed && !s.offTable && Math.hypot(s.x - dsx, s.y - dsy) <= 3 * INCH)) g.spikes = (g.spikes || 0) + 1;
    });
    const extra = (Math.ceil(rollDie()/2) + Math.ceil(rollDie()/2)); // 2D3
    ds.damage = (ds.damage || 0) + extra;
    flashLaunchMsg(`Power Plant detonates! Dropsite +${extra} damage, nearby groups spiked`);
    if (ds.maxHull && ds.damage >= ds.maxHull) ds.destroyed = true;
  }
}
function contestedDropsites() {
  if (!state.scenarioData || !state.scenarioData.dropsites) return [];
  const done = (state.battalionCombat && state.battalionCombat.done) || [];
  return state.scenarioData.dropsites.filter(ds => dropsiteContested(ds) && !done.includes(ds.id));
}
/* Features on a dropsite that hold ENEMY battalions (relative to `side`). */
function enemyFeatures(ds, side) {
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const b = dsBattalions(ds);
  return Object.keys(b).filter(k => k !== 'ground' && (b[k][enemy] || 0) > 0);
}
/* Stage 1/2: a side's GROUND battalions attack one Feature; 1-for-1 removal. */
function assignGroundToFeature(ds, side, featKey) {
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const b = dsBattalions(ds);
  const removed = Math.min(b.ground[side] || 0, b[featKey][enemy] || 0);
  b.ground[side] -= removed;
  b[featKey][enemy] -= removed;
  return { removed, where: locDisplayName(ds, featKey) };
}
/* Stages 3 + 4: remaining 1-for-1 on the ground, then each feature locally. */
function resolveDropsiteRemainder(ds) {
  const b = dsBattalions(ds);
  const log = [];
  Object.keys(b).forEach(key => {
    const loc = b[key];
    const u = loc.ucm || 0, s = loc.shal || 0;
    if (u > 0 && s > 0) {
      const removed = Math.min(u, s);
      loc.ucm = u - removed; loc.shal = s - removed;
      log.push({ where: locDisplayName(ds, key), removed });
    }
  });
  return log;
}

/* Finish a dropsite: resolve remaining ground + feature combat, mark it done,
   and return to dropsite-picking. */
function bcResolveDropsite(bc, ds) {
  const rem = resolveDropsiteRemainder(ds);
  rem.forEach(r => bc.log.push(`${ds.base.name}: ${r.where} remainder — ${r.removed} each`));
  bc.done = bc.done || [];
  if (!bc.done.includes(ds.id)) bc.done.push(ds.id);
  bc.dsId = null;
  bc.stage = 'pick';
}

/* Features eligible to be destroyed: 4+ friendly battalions, no enemy present. */
function featureDestroyOptions() {
  const opts = [];
  if (!state.scenarioData) return opts;
  state.scenarioData.dropsites.forEach(ds => {
    const b = dsBattalions(ds);
    Object.keys(b).forEach(key => {
      if (key === 'ground') return;
      const loc = b[key];
      ['ucm', 'shal'].forEach(side => {
        const enemy = side === 'ucm' ? 'shal' : 'ucm';
        if ((loc[side] || 0) >= 4 && (loc[enemy] || 0) === 0) {
          opts.push({ dsId: ds.id, key, side, name: locDisplayName(ds, key) });
        }
      });
    });
  });
  return opts;
}

/* Effective signature (inches) for a ship: base Sig (or 0 if Silent Running),
   plus 3" per Spike on its group. Spikes always add, even under Silent Running. */
function effectiveSig(def, ship, grp) {
  const base = ship && ship.sigSilent ? 0 : def.sig;
  const spikes = grp ? (grp.spikes || 0) : 0;
  return base + 3 * spikes;
}

function launchTargetLabel(target) {
  return {
    dropsite_same_layer: 'target dropsite (same layer)',
    dropsite_via_gate:   'target dropsite via Voidgate chain',
    dropsite_any_layer:  'target dropsite (any layer)',
    city:                'target city',
    ship_or_station:     'target enemy ship / station',
    point:               'place on map'
  }[target] || 'target';
}
function launchHint(target) {
  return {
    dropsite_same_layer: 'Click a dropsite in range on the SAME orbital layer',
    dropsite_via_gate:   'Click a dropsite within 3" of a chained Voidgate',
    dropsite_any_layer:  'Click any dropsite in range',
    city:                'Click a city in range',
    ship_or_station:     'Click an enemy ship or space station in range',
    point:               'Click a point in range to place the asset'
  }[target] || 'Click a target in range';
}

/* All friendly Voidgates (Gateships) connected to a Mothership via the 18" chain.
   A Voidgate is connected if within 18" of the Mothership, or within 18" of an
   already-connected Voidgate (BFS — chain may be arbitrarily long). Returns an
   array of {x, y, layer} in px. */
function connectedGateships(motherSide, motherX, motherY) {
  const CHAIN_IN = 18, CHAIN_PX = CHAIN_IN * INCH;
  // Collect all live Voidgate ships on the mothership's side (openNetwork groups).
  const gates = [];
  fleetForSide(motherSide).forEach(def => {
    if (!def.openNetwork) return; // Voidgates are the Open Network gateships
    const grp = state.groups[def.id];
    if (!grp) return;
    grp.ships.forEach((s, si) => {
      if (s.destroyed || s.offTable) return;
      gates.push({ ship: s, def, si, x: s.x, y: s.y, layer: s.layer || 'orbit',
                   gateship: def.gateship || 0, connected: false });
    });
  });
  // BFS from the mothership.
  const queue = [];
  gates.forEach(g => {
    if (Math.hypot(g.x - motherX, g.y - motherY) <= CHAIN_PX) { g.connected = true; queue.push(g); }
  });
  while (queue.length) {
    const cur = queue.shift();
    gates.forEach(g => {
      if (!g.connected && Math.hypot(g.x - cur.x, g.y - cur.y) <= CHAIN_PX) {
        g.connected = true; queue.push(g);
      }
    });
  }
  return gates.filter(g => g.connected);
}

/* Remaining Gateship value for a Voidgate ship this round (lazily init). */
function gateRemaining(gateShip, def) {
  if (gateShip.gateRemaining === undefined) gateShip.gateRemaining = def.gateship || 0;
  return gateShip.gateRemaining;
}

/* Compute the effective move range and resulting layer for a ship's move,
   given the order's normal max (in px), the ship, and whether the player has
   toggled a layer change for this move.
   Rules:
     • Orbit, no toggle      → normal max, ends Orbit
     • Orbit, toggle         → normal max, ends Atmosphere (descend at end, free)
     • Atmosphere, no toggle → 2" cap, ends Atmosphere
     • Atmosphere, toggle    → (normal − 4") cap (min 0), ends Orbit (ascend at start)
   Returns { maxPx, endLayer, label }. */
function layerMove(normalMaxPx, ship, toggle) {
  const layer = ship.layer || 'orbit';
  if (layer === 'orbit') {
    if (toggle) return { maxPx: normalMaxPx, endLayer: 'atmosphere', label: 'Descend to Atmosphere (end of move)' };
    return { maxPx: normalMaxPx, endLayer: 'orbit', label: null };
  } else { // atmosphere
    if (toggle) {
      const reduced = Math.max(0, normalMaxPx - 4 * INCH);
      return { maxPx: reduced, endLayer: 'orbit', label: 'Ascend to Orbit (−4" this move)' };
    }
    return { maxPx: 2 * INCH, endLayer: 'atmosphere', label: 'In Atmosphere (move capped 2")' };
  }
}

/* Are all alive on-table ships in a group in the same layer? Returns the split
   info: { split:bool, orbit:n, atmo:n }. */
function groupLayerSplit(def) {
  const grp = getGroup(def.id);
  let orbit = 0, atmo = 0;
  grp.ships.forEach(s => {
    if (s.destroyed || s.offTable) return;
    if ((s.layer || 'orbit') === 'atmosphere') atmo++; else orbit++;
  });
  return { split: orbit > 0 && atmo > 0, orbit, atmo };
}

/* All other on-table ships' base circles, excluding (skipGid, skipSi).
   Also includes Space Station dropsite bases (NOT cities — ships fly over cities
   in the atmosphere layer, but stations are physical obstacles in orbit).
   Returns [{x, y, r}]. */
function otherShipBases(skipGid, skipSi) {
  const out = [];
  allDefs().forEach(d => {
    const g = state.groups[d.id];
    if (!g) return;
    const r = shipBaseRadiusPx(d);
    g.ships.forEach((s, si) => {
      if (s.destroyed || s.offTable) return;
      if (d.id === skipGid && si === skipSi) return;
      out.push({ x: s.x, y: s.y, r });
    });
  });
  // Space station bases (same radii as ship bases by size). Cities excluded.
  if (state.scenarioData && state.scenarioData.dropsites) {
    const stationDiaIn = { small: 30/25.4, medium: 40/25.4, large: 50/25.4 };
    state.scenarioData.dropsites.forEach(ds => {
      if (ds.base.category !== 'station') return;
      const r = (stationDiaIn[ds.base.size] * INCH) / 2;
      out.push({ x: inchToPx(ds.x), y: inchToPx(ds.y), r });
    });
  }
  return out;
}

/* Does a base of radius r at (x,y) overlap any of the given bases? */
function baseOverlaps(x, y, r, bases) {
  return bases.some(b => Math.hypot(x - b.x, y - b.y) < (r + b.r - 0.01));
}

/* Given an intended destination along a straight path from (ox,oy)→(tx,ty),
   back the moving ship (radius r) toward the origin until its base no longer
   overlaps any other base. Returns {x, y}. If even the origin overlaps (rare),
   returns the furthest clear point found, or the origin. */
function resolveBaseOverlap(ox, oy, tx, ty, r, bases) {
  if (!baseOverlaps(tx, ty, r, bases)) return { x: tx, y: ty };
  const dx = tx - ox, dy = ty - oy;
  const len = Math.hypot(dx, dy);
  if (len < 0.001) return { x: tx, y: ty };
  // Step back along the path in small increments until clear.
  const step = 1; // px (~1/12")
  for (let d = len; d >= 0; d -= step) {
    const t = d / len;
    const x = ox + dx * t, y = oy + dy * t;
    if (!baseOverlaps(x, y, r, bases)) return { x, y };
  }
  return { x: ox, y: oy };
}

/* For an edge-line zone, snap a click point so the ship's base edge sits tangent
   to the nearest deployment line (base touching the line), nudged into the board.
   Returns {x, y} in px, or null if the zone isn't an edge-line zone. */
function snapToEdgeLineTangent(zone, ptPx, def) {
  if (!zone || !zone.edgeLines || !zone.edgeLines.length) return null;
  const r = shipBaseRadiusPx(def);
  // Find the nearest segment (work in px).
  let best = null, bestD = Infinity;
  zone.edgeLines.forEach(seg => {
    const x1 = inchToPx(seg.x1), y1 = inchToPx(seg.y1);
    const x2 = inchToPx(seg.x2), y2 = inchToPx(seg.y2);
    const vx = x2 - x1, vy = y2 - y1;
    const len2 = vx*vx + vy*vy || 1;
    let t = ((ptPx.x - x1)*vx + (ptPx.y - y1)*vy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t*vx, cy = y1 + t*vy;
    const d = Math.hypot(ptPx.x - cx, ptPx.y - cy);
    if (d < bestD) { bestD = d; best = { cx, cy, x1, y1, x2, y2 }; }
  });
  if (!best) return null;
  // Inward normal: direction from the table edge toward the board interior.
  // The segment lies on a board edge; push the center r inward perpendicular to it.
  let nx = 0, ny = 0;
  const onTop    = best.cy <= 1;
  const onBottom = best.cy >= BOARD_PX - 1;
  const onLeft   = best.cx <= 1;
  const onRight  = best.cx >= BOARD_PX - 1;
  if (onTop)    ny = 1;
  else if (onBottom) ny = -1;
  else if (onLeft)   nx = 1;
  else if (onRight)  nx = -1;
  else {
    // Segment not exactly on an edge — derive inward normal from segment direction,
    // pointing toward board center.
    const dx = best.x2 - best.x1, dy = best.y2 - best.y1;
    const len = Math.hypot(dx, dy) || 1;
    let pnx = -dy/len, pny = dx/len;
    const toCenterX = BOARD_PX/2 - best.cx, toCenterY = BOARD_PX/2 - best.cy;
    if (pnx*toCenterX + pny*toCenterY < 0) { pnx = -pnx; pny = -pny; }
    nx = pnx; ny = pny;
  }
  return { x: best.cx + nx * r, y: best.cy + ny * r };
}

/* Convert a #rrggbb hex colour to rgba(r,g,b,a). */
function hexToRgba(hex, alpha) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!m) return hex; // pass-through for CSS vars or unparseable strings
  const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Convert a zone polygon (inch coords) to SVG path string */
function zonePolygonPath(polygon) {
  return polygon.map((p,i) => (i===0?'M':'L') + ' ' + inchToPx(p.x) + ' ' + inchToPx(p.y)).join(' ') + ' Z';
}

/* Render a deployment zone (any geometry: polygon, circle, circleQuad, edgeSemicircle, corners) */
function renderZone(zone, fillCol, strokeCol) {
  let html = '';
  const stroke = `stroke="${strokeCol}" stroke-width="0.8" stroke-dasharray="4 3"`;
  const fill = `fill="${fillCol}"`;
  if (zone.polygon) {
    html += `<path d="${zonePolygonPath(zone.polygon)}" ${fill} ${stroke}/>`;
  }
  if (zone.circle) {
    const c = zone.circle;
    html += `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r)}" ${fill} ${stroke}/>`;
  }
  if (zone.circleQuad) {
    // Quarter-circle of radius r centred on (cx,cy). 'quad' indicates which quadrant
    // the slice occupies relative to (cx,cy). The arc bulges AWAY from (cx,cy) — convex.
    const c = zone.circleQuad;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
    if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
    if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
    // Sweep flag chosen so the arc passes through the OUTER corner of the quadrant
    // (convex slice). In SVG y-down: br/tl use CW (sweep=1); tr/bl use CCW (sweep=0).
    const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
    html += `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.edgeSemicircle) {
    // Semicircle of radius r centred on (cx,cy) — bulges INTO the board, not off-edge.
    const c = zone.edgeSemicircle;
    const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r);
    let p1x, p1y, p2x, p2y;
    if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy;     }
    if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy;     }
    if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
    if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
    // Sweep=0 (CCW) makes the arc bulge into the board for all four edges given the
    // p1/p2 ordering above.
    html += `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z" ${fill} ${stroke}/>`;
  }
  if (zone.corners) {
    zone.corners.forEach(c => {
      html += renderZone({ circleQuad: c }, fillCol, strokeCol);
    });
  }
  if (zone.edgeLines) {
    // Edge-only DZ: render each segment as a thick solid line on the table edge.
    zone.edgeLines.forEach(seg => {
      html += `<line x1="${inchToPx(seg.x1)}" y1="${inchToPx(seg.y1)}"
                     x2="${inchToPx(seg.x2)}" y2="${inchToPx(seg.y2)}"
                     stroke="${strokeCol}" stroke-width="3.5"
                     stroke-linecap="round" stroke-opacity="0.9"/>`;
    });
  }
  return html;
}

/* Sample a random point inside a zone (best-effort; uses bounding-box rejection). */
function pointInZone(zone) {
  // Edge-only zones: random sampling would never hit a 1D line. Pick a random
  // point along one of the segments (slightly off the edge so the ship marker
  // doesn't render clipped).
  if (zone.edgeLines && zone.edgeLines.length) {
    const seg = zone.edgeLines[Math.floor(Math.random() * zone.edgeLines.length)];
    const t = Math.random();
    const xIn = seg.x1 + (seg.x2 - seg.x1) * t;
    const yIn = seg.y1 + (seg.y2 - seg.y1) * t;
    // Nudge ~0.6" inward from the table edge so circular ship bases aren't clipped.
    const nudge = 0.6;
    let nx = xIn, ny = yIn;
    if (yIn <= 0.5)        ny += nudge;
    if (yIn >= BOARD_IN - 0.5) ny -= nudge;
    if (xIn <= 0.5)        nx += nudge;
    if (xIn >= BOARD_IN - 0.5) nx -= nudge;
    return { x: inchToPx(nx), y: inchToPx(ny) };
  }
  for (let i = 0; i < 200; i++) {
    const tx = Math.random() * BOARD_IN;
    const ty = Math.random() * BOARD_IN;
    if (isInZone(tx, ty, zone)) return { x: inchToPx(tx), y: inchToPx(ty) };
  }
  return null;
}
function isInZone(xIn, yIn, zone) {
  if (zone.polygon) return pointInPolygon(xIn, yIn, zone.polygon);
  if (zone.circle) {
    const c = zone.circle;
    return Math.hypot(xIn - c.cx, yIn - c.cy) <= c.r;
  }
  if (zone.circleQuad) {
    const c = zone.circleQuad;
    const dx = xIn - c.cx, dy = yIn - c.cy;
    if (Math.hypot(dx, dy) > c.r) return false;
    if (c.quad === 'br') return dx >= 0 && dy >= 0;
    if (c.quad === 'tl') return dx <= 0 && dy <= 0;
    if (c.quad === 'tr') return dx >= 0 && dy <= 0;
    if (c.quad === 'bl') return dx <= 0 && dy >= 0;
  }
  if (zone.edgeSemicircle) {
    const c = zone.edgeSemicircle;
    if (Math.hypot(xIn - c.cx, yIn - c.cy) > c.r) return false;
    if (c.edge === 'top')    return yIn >= c.cy;
    if (c.edge === 'bottom') return yIn <= c.cy;
    if (c.edge === 'left')   return xIn >= c.cx;
    if (c.edge === 'right')  return xIn <= c.cx;
  }
  if (zone.corners) return zone.corners.some(cz => isInZone(xIn, yIn, { circleQuad: cz }));
  if (zone.edgeLines) {
    // Treat each segment as a thin band — within 0.6" of the line counts as "in".
    return zone.edgeLines.some(seg => distancePointToSegmentIn(xIn, yIn, seg) <= 0.6);
  }
  return false;
}

/* Distance from point (px,py) in inches to a segment {x1,y1,x2,y2} in inches. */
function distancePointToSegmentIn(px, py, seg) {
  const vx = seg.x2 - seg.x1, vy = seg.y2 - seg.y1;
  const wx = px - seg.x1,   wy = py - seg.y1;
  const len2 = vx*vx + vy*vy;
  if (len2 === 0) return Math.hypot(wx, wy);
  let t = (wx*vx + wy*vy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = seg.x1 + t*vx, cy = seg.y1 + t*vy;
  return Math.hypot(px - cx, py - cy);
}

/* True if a point (xIn, yIn) is inside the Vanguard halo for a given def + base zone.
   Builds an "expanded zone" matching the visual halo for the deployment type and
   tests against that. */
function isInVanguardZone(xIn, yIn, def, baseZone) {
  if (!def.vanguard || !state.scenario) return false;
  const X = def.vanguard;
  const depKey = state.scenario.deployment;
  // Build an expanded zone-like object that isInZone can test.
  let z = {};
  if (depKey === 'line' && baseZone.edgeLines) {
    z.polygon = stripFromEdgeLine(baseZone.edgeLines[0], X);
  } else if (depKey === 'attacker_defender') {
    if (baseZone.edgeLines) {
      z.polygon = stripFromEdgeLine(baseZone.edgeLines[0], X);
    } else if (baseZone.polygon) {
      // Defender's 12" strip extended X further into board.
      z.polygon = expandStripPolygon(baseZone.polygon, X);
    }
  } else if (depKey === 'table_corners' && baseZone.edgeLines) {
    // Two strips meeting at the corner, each X" deep along their edge.
    const polys = baseZone.edgeLines.map(seg => stripFromEdgeLine(seg, X));
    // Approximate: a point is inside if it's inside either strip.
    return polys.some(p => pointInPolygon(xIn, yIn, p));
  } else if (depKey === 'midboard' && baseZone.edgeSemicircle) {
    z.edgeSemicircle = { ...baseZone.edgeSemicircle, r: baseZone.edgeSemicircle.r + X };
  } else if (depKey === 'from_corners' && baseZone.circleQuad) {
    z.circleQuad = { ...baseZone.circleQuad, r: baseZone.circleQuad.r + X };
  } else if (depKey === 'encirclement') {
    if (baseZone.circle)  z.circle  = { ...baseZone.circle,  r: baseZone.circle.r  + X };
    if (baseZone.corners) z.corners = baseZone.corners.map(c => ({ ...c, r: c.r + X }));
  }
  return isInZone(xIn, yIn, z);
}

/* Build a strip polygon X" deep extending into the board from an edge segment. */
function stripFromEdgeLine(seg, X) {
  const onTop    = seg.y1 <= 0.5 && seg.y2 <= 0.5;
  const onBottom = seg.y1 >= BOARD_IN - 0.5 && seg.y2 >= BOARD_IN - 0.5;
  const onLeft   = seg.x1 <= 0.5 && seg.x2 <= 0.5;
  const onRight  = seg.x1 >= BOARD_IN - 0.5 && seg.x2 >= BOARD_IN - 0.5;
  if (onTop) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    return [{x:x1,y:0},{x:x2,y:0},{x:x2,y:X},{x:x1,y:X}];
  } else if (onBottom) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    return [{x:x1,y:BOARD_IN},{x:x2,y:BOARD_IN},{x:x2,y:BOARD_IN-X},{x:x1,y:BOARD_IN-X}];
  } else if (onLeft) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    return [{x:0,y:y1},{x:0,y:y2},{x:X,y:y2},{x:X,y:y1}];
  } else if (onRight) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    return [{x:BOARD_IN,y:y1},{x:BOARD_IN,y:y2},{x:BOARD_IN-X,y:y2},{x:BOARD_IN-X,y:y1}];
  }
  return [];
}

/* Expand an axis-aligned strip polygon's inner edge X" further into the board. */
function expandStripPolygon(polygon, X) {
  const cxAvg = polygon.reduce((s,p)=>s+p.x,0)/polygon.length;
  const cyAvg = polygon.reduce((s,p)=>s+p.y,0)/polygon.length;
  return polygon.map(p => {
    const onLeft   = p.x <= 1.6;
    const onRight  = p.x >= BOARD_IN - 1.6;
    const onTop    = p.y <= 1.6;
    const onBottom = p.y >= BOARD_IN - 1.6;
    let nx = p.x, ny = p.y;
    if (!onLeft && !onRight)  nx = (cxAvg < BOARD_IN/2) ? p.x + X : p.x - X;
    if (!onTop  && !onBottom) ny = (cyAvg < BOARD_IN/2) ? p.y + X : p.y - X;
    return { x: nx, y: ny };
  });
}

function pointInPolygon(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* Render dropsites onto the SVG */
function renderDropsite(d) {
  const cx = inchToPx(d.x), cy = inchToPx(d.y);
  const base = d.base;
  const isStation = base.category === 'station';
  // Stations use the same base radii as ships (mm bases at 25.4mm = 1"):
  //   small → 30mm (Light), medium → 40mm (Medium), large → 50mm (Heavy).
  // Cities keep the larger dropsite footprint (templates on the planet surface).
  const stationDiaIn = { small: 30/25.4, medium: 40/25.4, large: 50/25.4 };
  const citySizeMap  = { small: INCH * 1.0, medium: INCH * 1.25, large: INCH * 1.5 };
  const r = isStation
    ? (stationDiaIn[base.size] * INCH) / 2
    : citySizeMap[base.size];
  const ringCol = isStation ? '#a8b4bc' : '#7ec8ff';
  const fillCol = isStation ? 'rgba(168,180,188,0.10)' : 'rgba(126,200,255,0.10)';
  let html = `<g class="dropsite" data-dropsite="${d.id}" style="cursor:pointer;">`;
  // Drop range rings (3" Dropships / 6" Bulk Landers) — hidden for now, used later.
  // html += `<circle cx="${cx}" cy="${cy}" r="${inchToPx(6)}" fill="none" stroke="${ringCol}" stroke-width="0.6" stroke-dasharray="2 4" opacity="0.45"/>`;
  // html += `<circle cx="${cx}" cy="${cy}" r="${inchToPx(3)}" fill="none" stroke="${ringCol}" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.6"/>`;
  // Marker: stations = single circle, cities = concentric circles (template feel)
  if (isStation) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
  } else {
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillCol}" stroke="${ringCol}" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.6}" fill="none" stroke="${ringCol}" stroke-width="0.6" opacity="0.6"/>`;
  }
  // Selection halo
  if (state.selectedDropsiteId === d.id) {
    html += `<circle cx="${cx}" cy="${cy}" r="${r + 4}" fill="none"
              stroke="${ringCol}" stroke-width="1.4" stroke-dasharray="3 2"/>`;
  }
  // Size letter in centre
  const sizeLetter = base.size === 'small' ? 'S' : base.size === 'medium' ? 'M' : 'L';
  html += `<text x="${cx}" y="${cy + 1}" font-family="var(--display)" font-size="${r * 0.7}"
            font-weight="700" fill="${ringCol}" text-anchor="middle" dominant-baseline="middle"
            pointer-events="none">${sizeLetter}</text>`;
  // Survey marker(s) — small ⌖ per side that has surveyed this dropsite.
  if (d.surveyedBy && d.surveyedBy.length) {
    d.surveyedBy.forEach((sd, i) => {
      html += `<text x="${cx - 6 + i*12}" y="${cy - r - 4}" font-size="9" fill="var(--${sd})" text-anchor="middle" pointer-events="none">⌖</text>`;
    });
  }
  // Recon Operatives remaining (Extract objective).
  if (d.reconOps > 0) {
    html += `<text x="${cx}" y="${cy + r + 11}" font-size="9" fill="#b59ad6" text-anchor="middle" pointer-events="none">⬆${d.reconOps}</text>`;
  }
  // Position-based Secondary nomination markers (★ in the nominating side's colour).
  if (state.secondaryNominations) {
    ['ucm','shal'].forEach((sd, idx) => {
      const noms = state.secondaryNominations[sd] || {};
      const targetsThis = Object.keys(noms).some(k => noms[k] && noms[k].dsId === d.id);
      if (targetsThis) html += `<text x="${cx - 5 + idx*10}" y="${cy - r - 13}" font-size="9" fill="var(--${sd})" text-anchor="middle" pointer-events="none">★</text>`;
    });
  }
  // Protect objective: shield marker on each side's nominated Dropsite.
  if (state.protectNom) {
    ['ucm','shal'].forEach((sd, idx) => {
      if (state.protectNom[sd] === d.id) html += `<text x="${cx - 5 + idx*10}" y="${cy + r + 22}" font-size="10" fill="var(--${sd})" text-anchor="middle" pointer-events="none">🛡</text>`;
    });
  }
  // Feature glyphs orbiting the dropsite — bare glyphs, no backdrop circle.
  // During this dropsite's activation, weapon/launch features become clickable.
  const daActive = state.dropsiteActivation && state.dropsiteActivation.dsId === d.id && !state.launching && !state.featureAttack;
  if (d.features && d.features.length) {
    d.features.forEach((fkey, fi) => {
      const f = FEATURES[fkey];
      const angle = (Math.PI * 2 / d.features.length) * fi - Math.PI / 2;
      const fr = r + 8;
      const fx = cx + Math.cos(angle) * fr;
      const fy = cy + Math.sin(angle) * fr;
      const fcol = f.color || ringCol;
      const dead = (d.destroyedFeatures || []).includes(fi);
      const usable = daActive && !dead && (f.weapon || (f.launch && f.launch.length));
      const fired = f.weapon && (d.firedFeatures || []).includes(fi);
      if (usable) {
        // Clickable hit-area + highlight ring; small badge shows weapon (⚔) or launch (⊕).
        html += `<circle data-da-feat="${d.id}|${fi}" cx="${fx}" cy="${fy}" r="9"
          fill="rgba(255,255,255,0.04)" stroke="${fired?'var(--text-mute)':fcol}" stroke-width="1"
          stroke-dasharray="${fired?'2 2':'none'}" style="cursor:pointer;${fired?'opacity:0.5;':''}"/>`;
        html += `<text x="${fx + 7}" y="${fy - 6}" font-size="7" fill="${f.weapon?'var(--hull-crit)':fcol}" text-anchor="middle" pointer-events="none">${f.weapon?(fired?'✓':'⚔'):'⊕'}</text>`;
      }
      html += `<text x="${fx}" y="${fy + 1}" font-family="var(--mono)" font-size="9" font-weight="700"
                fill="${dead?'var(--text-mute)':fcol}" text-anchor="middle" dominant-baseline="middle"
                pointer-events="none" ${dead?'opacity="0.4"':''}>${f.glyph}</text>`;
    });
  }
  // Hull damage indicator (if damaged)
  if (d.damage > 0 && d.damage < d.maxHull) {
    const pct = (d.maxHull - d.damage) / d.maxHull;
    const barCol = pct <= 0.5 ? 'var(--hull-warn)' : 'var(--hull-good)';
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2}" height="2" fill="var(--bg)" opacity="0.6"/>`;
    html += `<rect x="${cx - r}" y="${cy + r + 3}" width="${r*2*pct}" height="2" fill="${barCol}"/>`;
  }
  html += `</g>`;
  return html;
}

/* Render planetary rings + large objects (static scenery) */
function renderStaticScenery() {
  if (!state.scenarioData) return '';
  let html = '';
  // Planetary rings — bright 1px lines across the board
  (state.scenarioData.rings || []).forEach(ring => {
    if (ring.axis === 'horizontal') {
      const y = inchToPx(ring.y);
      html += `<line x1="0" y1="${y}" x2="${BOARD_PX}" y2="${y}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="6" y="${y - 3}" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    } else {
      const x = inchToPx(ring.x);
      html += `<line x1="${x}" y1="0" x2="${x}" y2="${BOARD_PX}"
                stroke="rgba(212,166,71,0.85)" stroke-width="1"/>`;
      html += `<text x="${x + 4}" y="14" font-family="var(--display)" font-size="9"
                fill="rgba(212,166,71,0.65)" letter-spacing="2">PLANETARY RING</text>`;
    }
  });
  // Large objects (moons / asteroids) — solid grey, blocks line of sight per rules
  (state.scenarioData.largeObjects || []).forEach(obj => {
    const cx = inchToPx(obj.x), cy = inchToPx(obj.y), r = inchToPx(obj.diameter / 2);
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#4a5560"
              stroke="#7a8a94" stroke-width="1.2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="${r * 0.4}" fill="#5a6670"/>`;
  });
  // Player-placed scenery — Micrometeor Clouds & Dense Fields (6"×3" pieces).
  const sceneryPiece = (s, ghost) => {
    const cx = inchToPx(s.x), cy = inchToPx(s.y);
    const w = inchToPx(6), h = inchToPx(3);
    const angle = s.angle || 0;
    const isMicro = s.type === 'micrometeor';
    const fill = isMicro ? 'rgba(120,180,230,0.16)' : 'rgba(225,120,90,0.16)';
    const stroke = isMicro ? 'rgba(150,200,240,0.8)' : 'rgba(235,140,100,0.85)';
    const op = ghost ? 0.5 : 1;
    const label = isMicro ? 'MICROMETEOR' : 'DENSE FIELD';
    let g = `<g transform="translate(${cx},${cy}) rotate(${angle})" opacity="${op}" ${ghost?'pointer-events="none"':`data-scenery-idx="${s._idx}" style="cursor:pointer;"`}>
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="${h*0.4}"
        fill="${fill}" stroke="${stroke}" stroke-width="1.2" stroke-dasharray="${isMicro?'':'4 3'}"/>`;
    // texture dots
    for (let i = 0; i < 7; i++) {
      const dx = (Math.sin(i*2.3)*0.42)*w, dy = (Math.cos(i*1.7)*0.34)*h;
      g += `<circle cx="${dx}" cy="${dy}" r="${isMicro?1.5:2}" fill="${stroke}" opacity="0.5"/>`;
    }
    g += `<text x="0" y="${-h/2 - 3}" font-family="var(--mono)" font-size="6.5" font-weight="700"
            fill="${stroke}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke">${label}</text>`;
    g += `</g>`;
    return g;
  };
  (state.scenarioData.placedScenery || []).forEach((s, i) => {
    html += sceneryPiece(Object.assign({ _idx: i }, s), false);
  });
  // Placement ghost in the scenery phase.
  if (state.phase === 'scenery' && state.sceneryPlace) {
    const sp = state.sceneryPlace;
    if (sp.pending) {
      // Locked position, aiming the angle — show in valid colour.
      html += sceneryPiece({ type: sp.type, x: sp.pending.x / INCH, y: sp.pending.y / INCH, angle: sp.angle || 0 }, true);
      // direction indicator line
      const cx = sp.pending.x, cy = sp.pending.y;
      const v = headingVec(sp.angle || 0);
      html += `<line x1="${cx}" y1="${cy}" x2="${cx + v.x*inchToPx(5)}" y2="${cy + v.y*inchToPx(5)}" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="3 3"/>`;
    } else if (state.hoverPoint) {
      // Position preview — tint by validity.
      const v = sceneryValid(sp.type, state.hoverPoint.x / INCH, state.hoverPoint.y / INCH);
      const piece = sceneryPiece({ type: sp.type, x: state.hoverPoint.x / INCH, y: state.hoverPoint.y / INCH, angle: 0 }, true);
      html += v.ok ? piece : piece.replace('opacity="0.5"', 'opacity="0.35"') +
        `<circle cx="${state.hoverPoint.x}" cy="${state.hoverPoint.y}" r="5" fill="none" stroke="var(--hull-crit)" stroke-width="1.5"/>`;
    }
  }
  return html;
}

/* Render deployment zones on the board (always-on after setup) */
function renderDeploymentZones() {
  if (!state.scenario) return '';
  const dep = DEPLOYMENTS[state.scenario.deployment];
  // UCM = red, Shaltari = blue (north). Tracker convention: blue zone is top.
  let html = `<g class="deploy-zones">`;
  html += renderZone(dep.zones.blue, 'rgba(212,166,71,0.10)', 'rgba(212,166,71,0.55)');
  html += renderZone(dep.zones.red,  'rgba(74,214,255,0.10)', 'rgba(74,214,255,0.55)');
  html += `</g>`;
  return html;
}

/* ── SCENERY GEOMETRY & EFFECTS ──
   All scenery only affects ships/assets in ORBIT. Coordinates here are in PIXELS.
   A "crossing" segment is the LoS line (attacks) or the move path (movement). */

/* Do two segments (px) intersect? */
function segsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
  const d = (bx-ax)*(dy-cy) - (by-ay)*(dx-cx);
  if (Math.abs(d) < 1e-9) return false;
  const t = ((cx-ax)*(dy-cy) - (cy-ay)*(dx-cx)) / d;
  const u = ((cx-ax)*(by-ay) - (cy-ay)*(bx-ax)) / d;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}
/* Does a segment cross a rotated rectangle (cloud/field), in px? cx,cy centre;
   wpx,hpx full width/height; angleDeg rotation. */
function segCrossesRect(ax, ay, bx, by, cx, cy, wpx, hpx, angleDeg) {
  // Transform the segment into the rect's local (axis-aligned) frame.
  const rad = -angleDeg * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad);
  const tx = (x, y) => ({ x: (x-cx)*cos - (y-cy)*sin, y: (x-cx)*sin + (y-cy)*cos });
  const p = tx(ax, ay), q = tx(bx, by);
  const hw = wpx/2, hh = hpx/2;
  // Inside?
  const inside = (pt) => pt.x >= -hw && pt.x <= hw && pt.y >= -hh && pt.y <= hh;
  if (inside(p) || inside(q)) return true;
  // Edge tests.
  const edges = [[-hw,-hh,hw,-hh],[hw,-hh,hw,hh],[hw,hh,-hw,hh],[-hw,hh,-hw,-hh]];
  return edges.some(e => segsIntersect(p.x,p.y,q.x,q.y, e[0],e[1],e[2],e[3]));
}
/* Does a segment cross a planetary ring (a full-board line)? */
function segCrossesRing(ax, ay, bx, by, ring) {
  if (ring.axis === 'horizontal') { const ry = inchToPx(ring.y); return (ay - ry) * (by - ry) <= 0; }
  const rx = inchToPx(ring.x); return (ax - rx) * (bx - rx) <= 0;
}
/* Does a segment cross/enter a circle (large object), in px? */
function segCrossesCircle(ax, ay, bx, by, cx, cy, r) {
  const dx = bx-ax, dy = by-ay; const len2 = dx*dx+dy*dy || 1;
  let t = ((cx-ax)*dx + (cy-ay)*dy) / len2; t = Math.max(0, Math.min(1, t));
  const px = ax + t*dx, py = ay + t*dy;
  return Math.hypot(px-cx, py-cy) <= r;
}
/* Is a point inside any large object? (px) → the object, or null. */
function largeObjectAt(xpx, ypx) {
  const objs = (state.scenarioData && state.scenarioData.largeObjects) || [];
  for (const o of objs) { if (Math.hypot(xpx - inchToPx(o.x), ypx - inchToPx(o.y)) <= inchToPx(o.diameter/2)) return o; }
  return null;
}
/* Analyse a LoS line (attacker→target, px). Returns scenery effects on the
   attack: {blocked, ignoreSpikes, ignoreSig}. Both ends must be in Orbit for
   scenery to apply (atmosphere LoS is unaffected). */
function sceneryAttackEffects(ax, ay, bx, by, attackerShip, targetShip) {
  const res = { blocked: false, ignoreSpikes: false, ignoreSig: false };
  const sd = state.scenarioData; if (!sd) return res;
  const bothAtmo = (attackerShip && attackerShip.layer === 'atmosphere') && (targetShip && targetShip.layer === 'atmosphere');
  if (bothAtmo) return res; // scenery doesn't affect LoS when both ends in atmosphere
  // Only orbit ships are affected; if either end is in orbit, scenery applies.
  (sd.largeObjects || []).forEach(o => {
    if (segCrossesCircle(ax, ay, bx, by, inchToPx(o.x), inchToPx(o.y), inchToPx(o.diameter/2))) res.blocked = true;
  });
  (sd.rings || []).forEach(r => { if (segCrossesRing(ax, ay, bx, by, r)) res.ignoreSpikes = true; });
  (sd.placedScenery || []).forEach(s => {
    if (segCrossesRect(ax, ay, bx, by, inchToPx(s.x), inchToPx(s.y), inchToPx(6), inchToPx(3), s.angle||0)) {
      res.ignoreSpikes = true;
      if (s.type === 'dense') res.ignoreSig = true; // debris also ignores Signature
    }
  });
  return res;
}
/* Ship move-through hits: returns [{type:'K'|'C', n:2, label}] for each cloud/
   field the move path crosses (orbit only). */
function sceneryMoveHits(ax, ay, bx, by, ship) {
  const out = []; const sd = state.scenarioData;
  if (!sd || (ship && ship.layer === 'atmosphere')) return out;
  (sd.placedScenery || []).forEach(s => {
    if (segCrossesRect(ax, ay, bx, by, inchToPx(s.x), inchToPx(s.y), inchToPx(6), inchToPx(3), s.angle||0)) {
      if (s.type === 'micrometeor') out.push({ type: 'K', n: 2, label: 'Micrometeor Cloud' });
      else out.push({ type: 'C', n: 2, label: 'Dense Field' });
    }
  });
  return out;
}

/* Distance (inches) from a point to a deployment zone's geometry. 0 if inside.
   Handles the zone shapes used in DEPLOYMENTS. Approximate but conservative. */
function distToZone(zone, x, y) {
  if (!zone) return Infinity;
  const distToSeg = (px, py, x1, y1, x2, y2) => {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx*dx + dy*dy || 1;
    let t = ((px - x1)*dx + (py - y1)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
  };
  let best = Infinity;
  if (zone.edgeLines) zone.edgeLines.forEach(l => { best = Math.min(best, distToSeg(x, y, l.x1, l.y1, l.x2, l.y2)); });
  if (zone.circle) { const c = zone.circle; best = Math.min(best, Math.max(0, Math.hypot(x-c.cx, y-c.cy) - c.r)); }
  if (zone.circleQuad) { const c = zone.circleQuad; best = Math.min(best, Math.max(0, Math.hypot(x-c.cx, y-c.cy) - c.r)); }
  if (zone.edgeSemicircle) { const c = zone.edgeSemicircle; best = Math.min(best, Math.max(0, Math.hypot(x-c.cx, y-c.cy) - c.r)); }
  if (zone.corners) zone.corners.forEach(c => { best = Math.min(best, Math.max(0, Math.hypot(x-c.cx, y-c.cy) - c.r)); });
  if (zone.polygon) {
    // Distance to polygon edges (0 if inside via even-odd test).
    const pts = zone.polygon; let inside = false;
    for (let i = 0, j = pts.length-1; i < pts.length; j = i++) {
      if (((pts[i].y > y) !== (pts[j].y > y)) &&
          (x < (pts[j].x - pts[i].x) * (y - pts[i].y) / (pts[j].y - pts[i].y) + pts[i].x)) inside = !inside;
    }
    if (inside) best = 0;
    else for (let i = 0, j = pts.length-1; i < pts.length; j = i++)
      best = Math.min(best, distToSeg(x, y, pts[j].x, pts[j].y, pts[i].x, pts[i].y));
  }
  return best;
}

/* Validate a candidate scenery position (in inches). Micrometeor/Dense pieces
   must be ≥4" from board edges, deployment zones, and OTHER scenery (overlap
   with SAME-type pieces is allowed). Returns {ok, reason}. */
function sceneryValid(type, xIn, yIn) {
  const MIN = 4;
  if (xIn < MIN || yIn < MIN || xIn > BOARD_IN - MIN || yIn > BOARD_IN - MIN)
    return { ok: false, reason: 'too close to board edge (4")' };
  const dep = state.scenario && DEPLOYMENTS[state.scenario.deployment];
  if (dep) {
    for (const z of [dep.zones.red, dep.zones.blue]) {
      if (z && distToZone(z, xIn, yIn) < MIN) return { ok: false, reason: 'too close to a deployment zone (4")' };
    }
  }
  for (const s of (state.scenarioData.placedScenery || [])) {
    if (s.type === type) continue; // same type may overlap
    if (Math.hypot(s.x - xIn, s.y - yIn) < MIN) return { ok: false, reason: 'too close to other scenery (4")' };
  }
  for (const obj of (state.scenarioData.largeObjects || [])) {
    if (Math.hypot(obj.x - xIn, obj.y - yIn) < obj.diameter / 2 + MIN) return { ok: false, reason: 'too close to a large object (4")' };
  }
  return { ok: true };
}

/* Phase transition: setup → scenery. Build dropsites + scenery state; the player
   then places Micrometeor Clouds and Dense Fields before deployment. */
function commitScenario() {
  if (!state.scenario) return;
  // Both fleets must be chosen first.
  if (!state.fleetChoices.f1 || !state.fleetChoices.f2) {
    alert('Select both fleets before confirming the scenario.');
    return;
  }
  // Bioficer Payloads must be assigned to Porters first.
  if (!allPayloadsReady()) {
    alert('Assign all Bioficer Payloads to Porter ships before confirming the scenario.');
    return;
  }
  // Require all scenario rows to be chosen (or randomised) before proceeding.
  const missing = ['deployment','approach','layout','variant','objective'].filter(k => !state.scenario[k]);
  if (missing.length) {
    alert('Please select or randomise all scenario options first:\n• ' + missing.join('\n• '));
    return;
  }
  // Randomise which chosen fleet takes the red (south) vs blue (north) slot.
  const f1 = state.fleetChoices.f1, f2 = state.fleetChoices.f2;
  let slotForSide; // maps 'ucm'/'shal' → 'f1'/'f2'
  if (Math.random() < 0.5) { state.factions.ucm = f1; state.factions.shal = f2; slotForSide = { ucm:'f1', shal:'f2' }; }
  else { state.factions.ucm = f2; state.factions.shal = f1; slotForSide = { ucm:'f2', shal:'f1' }; }
  rebuildFleets();
  applyPayloadLinks(slotForSide);
  // Admiral Levels follow their fleet slot to the assigned side.
  state.admiralLevel = { ucm: state.admiralChoice[slotForSide.ucm] || 0, shal: state.admiralChoice[slotForSide.shal] || 0 };
  state.secondaries = { ucm: (state.secondaryChoice[slotForSide.ucm] || []).slice(), shal: (state.secondaryChoice[slotForSide.shal] || []).slice() };
  state.captured = { ucm: 0, shal: 0 };
  state.admiralKilled = { ucm: false, shal: false };
  const scenData = buildScenarioState(state.scenario);
  state.scenarioData = scenData;
  // Extract objective: seed Recon Operative tokens on each Dropsite (1/2/3 by size).
  if (state.scenario.objective === 'extract') {
    scenData.dropsites.forEach(ds => {
      const k = dropsiteSizeKey(ds);
      ds.reconOps = k === 'L' ? 3 : k === 'M' ? 2 : 1;
    });
  }
  state.shipReconOps = {}; state.reconKills = { ucm:0, shal:0 }; state.nominationPhase = false; // ship key → Recon Operatives carried
  // Breakthrough: track points flown off the opponent's table edge (Red = ucm slot).
  state.breakthroughFlyoff = { ucm: 0, shal: 0 };
  state.scoreLog = []; state.lastScoring = null; state.scoredRounds = [];
  state.eventLog = []; state.logExpanded = false;
  // Protect: each side nominates a unique Dropsite to defend. Auto-nominate the
  // highest-value Dropsite nearest each side's own Zone (the player may re-nominate).
  state.protectNom = { ucm: null, shal: null };
  if (state.scenario.objective === 'protect') {
    const dss = scenData.dropsites.slice();
    ['ucm','shal'].forEach(side => {
      const cands = dss.filter(ds => !Object.values(state.protectNom).includes(ds.id));
      cands.sort((a,b) => {
        const va = (DROPSITE_VP[dropsiteSizeKey(a)]||DROPSITE_VP.M).control;
        const vb = (DROPSITE_VP[dropsiteSizeKey(b)]||DROPSITE_VP.M).control;
        if (vb !== va) return vb - va;                         // highest value first
        return distFromZoneIn(side, inchToPx(a.y)) - distFromZoneIn(side, inchToPx(b.y)); // then nearest own zone
      });
      if (cands.length) state.protectNom[side] = cands[0].id;
    });
  }
  // Position-based Secondary nominations (declared before the 1st Planning Phase).
  // Auto-nominate a valid default; the player may override via the nomination editor.
  state.secondaryNominations = { ucm: {}, shal: {} };
  let needsNomination = false;
  ['ucm','shal'].forEach(side => {
    (state.secondaries[side] || []).forEach(key => {
      const def = SECONDARY_OBJECTIVES[key];
      if (!def || !def.nominate) return;
      const nom = nominateForSecondary(side, key);
      if (nom) { state.secondaryNominations[side][key] = nom; needsNomination = true; }
    });
  });
  state.nominationPhase = needsNomination;
  initShipsOffTable();
  // If there's variable scenery to place, enter the scenery phase first.
  const t = scenData.sceneryTargets || {};
  if ((t.micrometeor || 0) + (t.dense || 0) > 0) {
    state.phase = 'scenery';
  } else if (!anyoneNeedsDeployPhase()) {
    state.phase = 'play';
  } else {
    state.deployDone = { ucm: false, shal: false };
    state.phase = 'deploy';
  }
  renderAll();
}

/* Apply stored Payload→Porter links (per fleet slot) to the rebuilt ship objects.
   slotForSide maps a colour slot ('ucm'/'shal') to a fleet slot ('f1'/'f2'). */
function applyPayloadLinks(slotForSide) {
  ['ucm', 'shal'].forEach(side => {
    const slot = slotForSide[side];
    const links = (state.payloadLinks && state.payloadLinks[slot]) || {};
    Object.keys(links).forEach(payKey => {
      const [payBase, paySi] = payKey.split(':');
      const [porBase, porSi] = links[payKey].split(':');
      const payGrp = state.groups[side + ':' + payBase];
      if (!payGrp) return;
      const payShip = payGrp.ships[parseInt(paySi)];
      if (!payShip) return;
      payShip.attachedTo = { gid: side + ':' + porBase, si: parseInt(porSi) };
    });
  });
}

/* Phase transition: scenery → deploy (or play). */
function commitScenery() {
  state.sceneryPlace = null;
  state.deployDone = { ucm: false, shal: false };
  if (!anyoneNeedsDeployPhase()) {
    state.phase = 'play';
    rollInitiative();
  } else {
    state.phase = 'deploy';
  }
  renderAll();
}

function commitDeployment() {
  // Direct sides must deploy ≥50% of non-Vanguard Groups before Round 1.
  // Vanguard groups don't count. Warn the player if either Direct side is short.
  const warnings = [];
  ['ucm', 'shal'].forEach(side => {
    const stat = directDeploymentStatus(side);
