    if (stat && stat.placed < stat.required) {
      warnings.push(`${factionName(side)} (${side === 'ucm' ? 'Red' : 'Blue'}) has ${stat.placed}/${stat.required} required Direct Groups deployed`);
    }
  });
  if (warnings.length) {
    const ok = confirm(
      `Direct Deployment requires ≥50% of non-Vanguard Groups to be on-table before Round 1.\n\n` +
      warnings.join('\n') +
      `\n\nProceed to play anyway?`
    );
    if (!ok) return;
  }
  state.phase = 'play';
  state.selectedShipIdx = null;
  logEvent(`── Round 1 begins ──`);
  rollInitiative(); // Round 1 initiative roll
  renderAll();
}

function goToPhase(phase) {
  state.phase = phase;
  renderAll();
}

/* Approach behaviour for a side ('ucm' = red, 'shal' = blue). */
/* Can this Group be deployed in the deploy phase?
   Direct approach: yes (any group of a Direct side; Vanguard counts as extra).
   Close/Distant approach: only if the Group has Vanguard.
   Non-deployable Groups arrive later via off-table activation. */
function canDeployNow(def) {
  if (def.vanguard) return true;
  return approachFor(def.side) === 'directly_deploy';
}

/* Can an undeployed Group activate (and arrive) THIS round?
   Direct:   R2+ for any tonnage
   Close:    R1+ for any tonnage
   Distant:  R1 = L only, R2 = L+M, R3+ = any
   Vanguard ships ignore tonnage gating — they may always activate when their
   approach allows (treated as Light for this purpose, effectively). */
function canActivateOffTable(def) {
  if (!state.scenario) return { eligible: false, reason: 'No scenario' };
  const app = approachFor(def.side);
  const r = state.round;
  if (app === 'directly_deploy') {
    if (r >= 2) return { eligible: true };
    return { eligible: false, reason: 'Direct: available from Round 2' };
  }
  if (app === 'close') {
    return { eligible: true };
  }
  if (app === 'distant') {
    // Vanguard is rare on H/C; treat Vanguard as ignoring the tonnage gate
    // (per a generous reading — they're "advance scouts"). For non-VG ships,
    // gate by tonnage.
    if (def.vanguard) return { eligible: true };
    const t = def.tonnage;
    if (r >= 3) return { eligible: true };
    if (r === 2 && (t === 'L' || t === 'M')) return { eligible: true };
    if (r === 1 && t === 'L') return { eligible: true };
    const tName = t === 'L' ? 'Light' : t === 'M' ? 'Medium' : t === 'H' ? 'Heavy' : 'Colossal';
    const arriveR = t === 'M' ? 2 : 3;
    return { eligible: false, reason: `Distant ${tName}: available from Round ${arriveR}` };
  }
  return { eligible: false, reason: 'Unknown approach' };
}

/* Is this Group currently undeployed (no alive ships on-table)? */
function isGroupUndeployed(gid) {
  const grp = state.groups[gid];
  if (!grp) return false;
  return !grp.ships.some(s => !s.destroyed && !s.offTable);
}

/* Direct sides have a 50% rule: at least half of NON-Vanguard Groups must be
   placed before Round 1. Vanguard Groups deploy as extras and don't count.
   Returns { eligible, placed, required } for a side, or null if side isn't Direct. */
function directDeploymentStatus(side) {
  if (approachFor(side) !== 'directly_deploy') return null;
  const fleet = fleetForSide(side);
  const nonVg = fleet.filter(d => !d.vanguard);
  // A Group counts as "placed" if it has at least one alive ship on-table.
  const placed = nonVg.filter(def => {
    const grp = state.groups[def.id];
    if (!grp) return false;
    return grp.ships.some(s => !s.destroyed && !s.offTable);
  }).length;
  const required = Math.ceil(nonVg.length / 2);
  return { eligible: nonVg.length, placed, required };
}

function approachFor(side) {
  if (!state.scenario) return 'close';
  const app = APPROACHES[state.scenario.approach];
  return side === 'ucm' ? app.red : app.blue;
}

/* During the deploy phase, all deploy-eligible (Direct/Vanguard) Groups of a side
   must be placed before the next side may begin. Red (ucm) deploys first, then
   blue (shal). Returns the count of still-undeployed deploy-eligible Groups. */
function undeployedDeployableCount(side) {
  return fleetForSide(side).filter(def => {
    if (!canDeployNow(def)) return false;          // reserve groups arrive later, don't gate
    const grp = state.groups[def.id];
    if (!grp) return false;
    // Undeployed = has at least one alive ship still off-table.
    return grp.ships.some(s => !s.destroyed && s.offTable);
  }).length;
}
/* Is a side allowed to deploy right now? Red goes first and signals "done" via a
   button; Blue then deploys. (A side that has finished can't place more.) */
function deploySideAllowed(side) {
  if (state.phase !== 'deploy') return true;
  if (state.deployDone[side]) return false;        // this side already finished
  if (side === 'ucm') return true;                 // red always first
  return state.deployDone.ucm === true;            // blue only after red signals done
}

/* Does the current scenario require a manual deploy phase?
   Yes if: any side is Direct, OR any group contains a Vanguard ship. */
function anyoneNeedsDeployPhase() {
  if (!state.scenario) return true;
  const redApp  = approachFor('ucm');
  const blueApp = approachFor('shal');
  if (redApp === 'directly_deploy' || blueApp === 'directly_deploy') return true;
  // Vanguard check
  const _allDefs = allDefs();
  if (_allDefs.some(d => d.vanguard)) return true;
  return false;
}

/* Mark every ship as off-table — they'll be placed via deploy clicks or later activation. */
function initShipsOffTable() {
  allDefs().forEach(def => {
    const grp = state.groups[def.id];
    if (!grp) return;
    const heading = def.side === 'ucm' ? -90 : 90;
    grp.ships.forEach(ship => {
      ship.offTable = true;
      ship.heading = heading;
      ship.movedThisRound = false;
      // x/y stay at last value; they're not rendered when offTable is true.
    });
  });
}

/* Index of the next undeployed (off-table, alive) ship in a group, or -1 if all placed. */
function nextUndeployedShipIdx(gid) {
  const grp = state.groups[gid];
  if (!grp) return -1;
  for (let i = 0; i < grp.ships.length; i++) {
    const s = grp.ships[i];
    // Attached payloads ride inside their Porter — they are not "undeployed ships
    // awaiting board placement" (they detach via the Porter's activation instead).
    if (!s.destroyed && s.offTable && !s.attachedTo) return i;
  }
  return -1;
}

/* All ships in a group are placed (or destroyed). */
function allShipsDeployed(gid) {
  return nextUndeployedShipIdx(gid) === -1;
}

/* Expand a zone outward by `extraIn` inches for visualisation (Vanguard halo).
   For radial geometries, increase radius. For polygons (always strip-or-L-shaped
   in this app), push vertices that are NOT on the table edge inward by extraIn
   in the direction away from the nearest board edge. Vertices already on a
   board edge stay put — the strip extends into the board, not off it. */
function expandZone(zone, extraIn) {
  const out = {};
  if (zone.polygon) {
    out.polygon = zone.polygon.map(p => {
      // A vertex is "on edge" if it sits within 1.6" of a board edge.
      const onLeft   = p.x <= 1.6;
      const onRight  = p.x >= BOARD_IN - 1.6;
      const onTop    = p.y <= 1.6;
      const onBottom = p.y >= BOARD_IN - 1.6;
      let nx = p.x, ny = p.y;
      // Push x inward only if not on a vertical edge
      if (!onLeft && !onRight) {
        // Direction depends on which side the polygon hangs from. Look at the
        // polygon centroid to decide which way is "inward".
        const cx = zone.polygon.reduce((s,v)=>s+v.x,0) / zone.polygon.length;
        nx = (cx < BOARD_IN/2) ? p.x + extraIn : p.x - extraIn;
      }
      // Push y inward only if not on a horizontal edge
      if (!onTop && !onBottom) {
        const cy = zone.polygon.reduce((s,v)=>s+v.y,0) / zone.polygon.length;
        ny = (cy < BOARD_IN/2) ? p.y + extraIn : p.y - extraIn;
      }
      return { x: nx, y: ny };
    });
  }
  if (zone.circle) out.circle = { ...zone.circle, r: zone.circle.r + extraIn };
  if (zone.circleQuad) out.circleQuad = { ...zone.circleQuad, r: zone.circleQuad.r + extraIn };
  if (zone.edgeSemicircle) out.edgeSemicircle = { ...zone.edgeSemicircle, r: zone.edgeSemicircle.r + extraIn };
  if (zone.corners) out.corners = zone.corners.map(c => ({ ...c, r: c.r + extraIn }));
  return out;
}

/* Render the Vanguard halo for the selected ship if applicable. */
/* Render the Vanguard halo for the selected ship if applicable.
   Each deployment type needs slightly different geometry — strip DZs extend
   inward parallel to the edge; L-shapes extend with arc caps at the L's tips;
   radial DZs just grow their radius. */
function renderVanguardHalo() {
  if (!state.selectedGroupId) return '';
  if (!state.scenario) return '';
  const def = getDef(state.selectedGroupId);
  if (!def || !def.vanguard) return '';
  // Vanguard deployment is a DEPLOY-PHASE benefit only. A Vanguard ship that
  // arrives off-table during play deploys in the normal DZ like any other ship.
  if (state.phase !== 'deploy') return '';
  const depKey = state.scenario.deployment;
  const dep = DEPLOYMENTS[depKey];
  const side = def.side === 'ucm' ? 'red' : 'blue';
  const zone = dep.zones[side];
  const X = def.vanguard;

  // Each branch returns a single SVG path string for the Vanguard outline.
  let html = '';
  if (depKey === 'line') {
    // Both zones are edge lines. Build a strip polygon from the (single) edge segment.
    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
  } else if (depKey === 'attacker_defender') {
    // Red is edge-line, Blue is a 12"-deep polygon strip.
    if (zone.edgeLines)    html += vanguardStripFromEdgeLine(zone.edgeLines[0], X);
    else if (zone.polygon) html += vanguardStripPath(zone.polygon, X);
  } else if (depKey === 'table_corners') {
    html += vanguardTableCornerPath(side, X);
  } else if (depKey === 'midboard') {
    // Semicircle expanded radially by X.
    const c = zone.edgeSemicircle;
    html += vanguardEdgeSemicirclePath(c, X);
  } else if (depKey === 'from_corners') {
    // Quarter disc expanded radially by X.
    const c = zone.circleQuad;
    html += vanguardCircleQuadPath(c, X);
  } else if (depKey === 'encirclement') {
    // Blue centre circle grows; Red corners each grow.
    if (zone.circle) html += vanguardCirclePath(zone.circle, X);
    if (zone.corners) zone.corners.forEach(c => { html += vanguardCircleQuadPath(c, X); });
  }
  return html;
}

/* Common Vanguard styling — bright red, dashed fill + thick outline */
function vanguardStyle() {
  return {
    fill: 'rgba(255,90,82,0.10)',
    stroke: 'var(--hull-crit)',
    sw: 1.8
  };
}

/* Vanguard for an edge-only DZ (single segment on a table edge).
   Builds an X"-deep strip extending perpendicular from the edge into the board,
   spanning the segment's full length. */
function vanguardStripFromEdgeLine(seg, X) {
  // Determine which edge this segment lies on, and which way "into the board" is.
  let polygon;
  const onTop    = seg.y1 <= 0.5 && seg.y2 <= 0.5;
  const onBottom = seg.y1 >= BOARD_IN - 0.5 && seg.y2 >= BOARD_IN - 0.5;
  const onLeft   = seg.x1 <= 0.5 && seg.x2 <= 0.5;
  const onRight  = seg.x1 >= BOARD_IN - 0.5 && seg.x2 >= BOARD_IN - 0.5;
  if (onTop) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:0},{x:x2,y:0},{x:x2,y:X},{x:x1,y:X}];
  } else if (onBottom) {
    const x1 = Math.min(seg.x1, seg.x2), x2 = Math.max(seg.x1, seg.x2);
    polygon = [{x:x1,y:BOARD_IN},{x:x2,y:BOARD_IN},{x:x2,y:BOARD_IN-X},{x:x1,y:BOARD_IN-X}];
  } else if (onLeft) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:0,y:y1},{x:0,y:y2},{x:X,y:y2},{x:X,y:y1}];
  } else if (onRight) {
    const y1 = Math.min(seg.y1, seg.y2), y2 = Math.max(seg.y1, seg.y2);
    polygon = [{x:BOARD_IN,y:y1},{x:BOARD_IN,y:y2},{x:BOARD_IN-X,y:y2},{x:BOARD_IN-X,y:y1}];
  } else {
    return ''; // segment not on any edge — shouldn't happen
  }
  const s = vanguardStyle();
  const d = zonePolygonPath(polygon);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Strip-style Vanguard: expand the inner edge of an axis-aligned strip polygon
   into the board by X inches. Detects which edge is on the board boundary and
   pushes the opposite edge inward. */
function vanguardStripPath(polygon, X) {
  // For each vertex, push inward only if not on a board edge — same logic as
  // expandZone, but render with thicker red stroke.
  const cxAvg = polygon.reduce((s,p)=>s+p.x,0)/polygon.length;
  const cyAvg = polygon.reduce((s,p)=>s+p.y,0)/polygon.length;
  const expanded = polygon.map(p => {
    const onLeft   = p.x <= 1.6;
    const onRight  = p.x >= BOARD_IN - 1.6;
    const onTop    = p.y <= 1.6;
    const onBottom = p.y >= BOARD_IN - 1.6;
    let nx = p.x, ny = p.y;
    if (!onLeft && !onRight)  nx = (cxAvg < BOARD_IN/2) ? p.x + X : p.x - X;
    if (!onTop  && !onBottom) ny = (cyAvg < BOARD_IN/2) ? p.y + X : p.y - X;
    return { x: nx, y: ny };
  });
  const s = vanguardStyle();
  const d = zonePolygonPath(expanded);
  return `<path d="${d}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

/* Table Corners Vanguard: L-shape with rounded outer corners at each 12" tip.
   side = 'blue' (top-left) or 'red' (bottom-right). The original L is the DZ;
   Vanguard extends each arm's inner edge X inward, and at each outer arm-tip
   we add a quarter-arc rounded corner that bulges into the region outside the L.
   The corner-of-the-L (where the two arms meet on the table edges) stays sharp. */
function vanguardTableCornerPath(side, X) {
  const s = vanguardStyle();
  const L = 12; // arm length
  let path = '';
  if (side === 'blue') {
    // Corner at (0,0). Walk outline clockwise:
    //   (0,0) → (L,0)         top table edge, full L length
    //   arc cap at top-arm tip (L,0): centred (L,0) radius X,
    //     from (L,0)... wait, the cap is at the OUTER tip of the arm. The
    //     tip's "outer" face is the small edge at x=L, y∈[0,X]. We replace
    //     that small edge with a quarter-arc that bulges OUT (to x > L, in
    //     the region beyond the arm's 12" mark) — but no, the rule says the
    //     cap bulges INTO the area outside the L. For Blue's top arm at
    //     (L,0): "outside the L" is the region x > L, y ∈ [0, X]. So arc
    //     centred at (L, 0) of radius X goes from (L+X, 0) on the table
    //     edge to (L, X) on the arm's inner edge.
    //
    //   So:  L (L+X, 0) along top table edge past the tip by X
    //        arc to (L, X), centred at (L, 0), radius X
    //        L (X, X) inner corner of the L
    //        L (X, L) inner edge of left arm
    //        arc cap at left-arm tip (0, L), centred (0, L) radius X
    //        L (0, L+X) along left table edge past the tip by X
    //        L (0, 0) up the table edge to corner
    const p = {
      a: inchPair(0, 0),
      b: inchPair(L + X, 0),
      c: inchPair(L, X),
      d: inchPair(X, X),
      e: inchPair(X, L),
      f: inchPair(0, L + X)
    };
    const r = X * INCH;
    // First arc (top): from (L+X, 0) to (L, X), centred (L, 0). In SVG y-down,
    //   (L+X, 0) is at angle 0°; (L, X) is at angle 90°. Going CCW (sweep=0)
    //   would pass through 270° = above the centre. Going CW (sweep=1) passes
    //   through 45° = bottom-right of (L,0). That's the region we want (inside
    //   the board). So sweep=1.
    // Second arc (left): from (0, L+X) wait — let me re-check direction. After
    //   the first L lines, we're at (X, L), moving down the left arm's inner
    //   edge. Then arc to (0, L+X). Centre (0, L), radius X. Start at (X, L)
    //   = angle 0°, end at (0, L+X) = angle 90°. Same sweep=1 (CW = through
    //   the bottom-right quadrant of centre (0,L), which lies inside the board).
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 1 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 1 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  } else { // red — corner at (48, 48)
    // Right arm tip at (48, 48-L); bottom arm tip at (48-L, 48).
    // Walk CW from corner (48,48):
    //   L (48, 48-L-X) up the right table edge past the tip by X
    //   arc to (48-X, 48-L), centred (48, 48-L) radius X, bulging into board
    //   L (48-X, 48-X) inner corner
    //   L (48-L, 48-X) inner edge of bottom arm
    //   arc to (48-L-X, 48), centred (48-L, 48) radius X
    //   L (48, 48) along bottom table edge back to corner
    const p = {
      a: inchPair(48, 48),
      b: inchPair(48, 48 - L - X),
      c: inchPair(48 - X, 48 - L),
      d: inchPair(48 - X, 48 - X),
      e: inchPair(48 - L, 48 - X),
      f: inchPair(48 - L - X, 48)
    };
    const r = X * INCH;
    // First arc: (48, 48-L-X) → (48-X, 48-L), centred (48, 48-L). Start angle
    //   270° (above centre), end angle 180° (left of centre). Going CCW = sweep=0
    //   passes through 225° = upper-left of centre — that's inside the board.
    // Second arc: (48-L, 48-X) → (48-L-X, 48), centred (48-L, 48). Start angle
    //   270° (above centre), end angle 180° (left). CCW = sweep=0 passes
    //   through upper-left = inside the board.
    path = `M ${p.a.x} ${p.a.y}
            L ${p.b.x} ${p.b.y}
            A ${r} ${r} 0 0 0 ${p.c.x} ${p.c.y}
            L ${p.d.x} ${p.d.y}
            L ${p.e.x} ${p.e.y}
            A ${r} ${r} 0 0 0 ${p.f.x} ${p.f.y}
            L ${p.a.x} ${p.a.y} Z`;
  }
  return `<path d="${path}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}

function inchPair(xIn, yIn) { return { x: inchToPx(xIn), y: inchToPx(yIn) }; }

/* Radial Vanguard helpers — each emits a single styled path. */
function vanguardCirclePath(c, X) {
  const s = vanguardStyle();
  return `<circle cx="${inchToPx(c.cx)}" cy="${inchToPx(c.cy)}" r="${inchToPx(c.r + X)}"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardCircleQuadPath(c, X) {
  const s = vanguardStyle();
  // Reuse renderZone, but with thicker stroke. Easier to inline:
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x = cx, p1y = cy, p2x = cx, p2y = cy;
  if (c.quad === 'br') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  if (c.quad === 'tl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'tr') { p1x = cx + r; p1y = cy;     p2x = cx;     p2y = cy - r; }
  if (c.quad === 'bl') { p1x = cx - r; p1y = cy;     p2x = cx;     p2y = cy + r; }
  const sweep = (c.quad === 'br' || c.quad === 'tl') ? 1 : 0;
  return `<path d="M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 ${sweep} ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}
function vanguardEdgeSemicirclePath(c, X) {
  const s = vanguardStyle();
  const cx = inchToPx(c.cx), cy = inchToPx(c.cy), r = inchToPx(c.r + X);
  let p1x, p1y, p2x, p2y;
  if (c.edge === 'top')    { p1x = cx - r; p1y = cy;     p2x = cx + r; p2y = cy; }
  if (c.edge === 'bottom') { p1x = cx + r; p1y = cy;     p2x = cx - r; p2y = cy; }
  if (c.edge === 'left')   { p1x = cx;     p1y = cy - r; p2x = cx;     p2y = cy + r; }
  if (c.edge === 'right')  { p1x = cx;     p1y = cy + r; p2x = cx;     p2y = cy - r; }
  return `<path d="M ${p1x} ${p1y} A ${r} ${r} 0 0 0 ${p2x} ${p2y} Z"
            fill="${s.fill}" stroke="${s.stroke}" stroke-width="${s.sw}"/>`;
}



/* Scenery placement banner — shown during the 'scenery' phase. Lets the player
   pick a piece type, see remaining counts, rotate, and click the board to place.
   Existing pieces can be clicked to remove. */
/* Payload→Porter assignment modal (Bioficer, setup-time, per chosen fleet slot).
   Works on the faction's fleet DEFS (before sides are assigned), enumerating
   ship-slots from each group's size. Stores links in state.payloadLinks[slot]. */
function renderPayloadAssign() {
  let overlay = document.getElementById('payload-overlay');
  if (overlay) overlay.remove();
  if (!state.payloadAssign) return;
  const slot = state.payloadAssign.slot;            // 'f1' | 'f2'
  const fk = state.fleetChoices[slot];
  const fleet = FACTIONS[fk] && FACTIONS[fk].fleet;
  if (!fleet) { state.payloadAssign = null; return; }
  const links = state.payloadLinks[slot] || (state.payloadLinks[slot] = {});

  // Enumerate ship-slots.
  const porters = [], payloads = [];
  fleet.forEach(def => {
    const n = def.groupSize || 1;
    for (let si = 0; si < n; si++) {
      if (def.porter) porters.push({ def, si, key: `${def.id}:${si}` });
      if (def.payload) payloads.push({ def, si, key: `${def.id}:${si}` });
    }
  });
  // Capacity used per porter (from links).
  const portUsed = {};
  porters.forEach(p => portUsed[p.key] = 0);
  Object.values(links).forEach(pk => { if (portUsed[pk] != null) portUsed[pk]++; });

  const porterLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };
  const payloadLabel = (p) => {
    const n = p.def.groupSize || 1;
    return `${p.def.name}${n>1?` #${p.si+1}`:''}`;
  };

  const rows = payloads.map(pl => {
    const cur = links[pl.key] || '';
    const opts = porters.map(po => {
      const cap = po.def.porter.cap || 1;
      const totalUsed = portUsed[po.key];                    // includes this payload if assigned here
      const usedByOthers = totalUsed - (cur === po.key ? 1 : 0);
      const full = usedByOthers >= cap;                      // no room for THIS payload
      const sizeOk = po.def.porter.size === pl.def.payload.size;
      const disabled = (full || !sizeOk) && cur !== po.key;
      return `<option value="${po.key}" ${cur===po.key?'selected':''} ${disabled?'disabled':''}>
        ${porterLabel(po)} (${totalUsed}/${cap})${!sizeOk?' — size mismatch':''}</option>`;
    }).join('');
    return `<div class="pl-row">
      <div class="pl-name">${payloadLabel(pl)} <span style="color:var(--text-mute);font-size:9px;">S-payload</span></div>
      <select class="fleet-dropdown pl-select" data-pl-assign="${slot}|${pl.key}">
        <option value="" ${!cur?'selected':''}>— unassigned —</option>
        ${opts}
      </select>
    </div>`;
  }).join('');

  overlay = document.createElement('div');
  overlay.id = 'payload-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '200';
  overlay.innerHTML = `
    <div class="setup-card" style="max-width:460px;">
      <div class="setup-header">
        <h2 class="setup-title">ASSIGN PAYLOADS</h2>
        <div class="setup-sub">${FACTIONS[fk].name} · attach Payload Cells to Porter ships</div>
      </div>
      <div class="setup-body">
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">
          Each Payload (S) must be assigned to a Porter (S) with available capacity. Unassigned Payloads are left out of the fleet.
        </div>
        ${rows || '<div style="color:var(--text-mute);font-style:italic;">No Payload ships in this fleet.</div>'}
      </div>
      <div class="setup-footer">
        <button class="btn-primary" id="payload-done">DONE →</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-pl-assign]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [sl, pk] = sel.dataset.plAssign.split('|');
      if (sel.value) state.payloadLinks[sl][pk] = sel.value;
      else delete state.payloadLinks[sl][pk];
      renderPayloadAssign();
    });
  });
  overlay.querySelector('#payload-done').addEventListener('click', () => {
    state.payloadAssign = null;
    renderPayloadAssign();   // remove the modal
    renderSetupOverlay();    // refresh setup so the scenario lock updates immediately
  });
}

/* ── ASSET ACTIVATION SEQUENCING (rulebook order) ──
   Persistent Assets activate by TYPE, then by initiative within each type:
     Fighters (1st init, then 2nd) → Bombers (1st, then 2nd) → Torpedoes (1st, then 2nd).
   Fire Ships activate within the Bomber step. After EACH player finishes moving their
   Bombers/Fire Ships, that player's locked Bomber/Fire-Ship attacks resolve immediately.
   Stages with no movable asset for that side/type are skipped. */

/* Asset kinds that move in a given stage type. */
function kindsForAssetType(type) {
  if (type === 'fighter') return ['fighter'];
  if (type === 'bomber') return ['bomber', 'fireship'];
  if (type === 'torpedo') return ['torpedo'];
  return [];
}
/* Does `side` have an unmoved asset of the given stage type still on the table? */
function sideHasUnmovedOfType(side, type) {
  const kinds = kindsForAssetType(type);
  return (state.launchedAssets || []).some(a => a.side === side && !a.moved && kinds.includes(a.kind));
}
/* Ordered list of {type, side} stages for the current round, initiative side first. */
function assetStageOrder() {
  const init = state.initiativeHolder || 'ucm';
  const other = init === 'ucm' ? 'shal' : 'ucm';
  const stages = [];
  ['fighter', 'bomber', 'torpedo'].forEach(type => {
    stages.push({ type, side: init });
    stages.push({ type, side: other });
  });
  return stages;
}
/* Set assetType + assetActiveSide to the FIRST stage (from `fromIdx`) that still has a
   movable asset. If none remain, ends the step (assetActiveSide = null). Resolves any
   bomber/fire-ship attacks owned by the side that just finished its bomber stage. */
function advanceAssetStage(justFinished) {
  // After a player finishes an ATTACKING stage (Bombers/Fire Ships, or Torpedoes),
  // resolve THEIR locked attacks now, before the next player/type.
  if (justFinished && (justFinished.type === 'bomber' || justFinished.type === 'torpedo')) {
    if (sideHasPendingAttacks(justFinished.side, justFinished.type)) {
      // Leave stage pointers as-is; caller resolves attacks then re-advances.
      return { resolveAttacksFor: justFinished.side, resolveType: justFinished.type };
    }
  }
  const order = assetStageOrder();
  // Find the index of the stage we just finished (or -1 to start from the top).
  let startIdx = 0;
  if (justFinished) {
    const i = order.findIndex(s => s.type === justFinished.type && s.side === justFinished.side);
    startIdx = i + 1;
  }
  for (let i = startIdx; i < order.length; i++) {
    if (sideHasUnmovedOfType(order[i].side, order[i].type)) {
      state.assetPhase.assetType = order[i].type;
      state.assetActiveSide = order[i].side;
      return { stage: order[i] };
    }
  }
  // Nothing left to move.
  state.assetPhase.assetType = null;
  state.assetActiveSide = null;
  return { done: true };
}
/* Pending locked attacks owned by `side` for a given stage type (bomber covers
   bombers+fire ships; torpedo covers torpedoes). */
function sideHasPendingAttacks(side, type) {
  const kinds = kindsForAssetType(type);
  return (state.launchedAssets || []).some(a => a.bomberTarget && a.side === side && kinds.includes(a.kind));
}

/* Called after a single asset finishes moving. A player activates ALL their assets of
   the current type before passing on. If the current side still has unmoved assets of
   this type, it stays; otherwise advance to the next stage (resolving that side's
   bomber attacks first if the bomber stage just ended). */
function afterAssetMove() {
  const ap = state.assetPhase;
  if (!ap) return;
  const cur = { type: ap.assetType, side: state.assetActiveSide };
  // Same side still has unmoved assets of this type → keep activating.
  if (cur.side && cur.type && sideHasUnmovedOfType(cur.side, cur.type)) return;
  // This side has finished the current type. If it was the bomber stage, resolve
  // its locked attacks now (before the other player moves their bombers).
  const res = advanceAssetStage(cur);
  if (res.resolveAttacksFor) {
    // Resolve this side's attacks of the finished type; chain re-advances on completion.
    state.assetMove = null;
    resolvePendingBomberAttacks(res.resolveAttacksFor, res.resolveType);
  }
}

function renderAssetPhase() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('asset-overlay');
  if (overlay) overlay.remove();
  let banner = document.getElementById('asset-move-banner');
  if (banner) banner.remove();
  if (!state.assetPhase) return;

  const ap = state.assetPhase;
  const sideName = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();

  // ASSET COMBAT step — modal hidden, board interactive for moving assets.
  if (ap.step === 'assets') {
    banner = document.createElement('div');
    banner.id = 'asset-move-banner';
    banner.className = 'deploy-hint';
    const typeLabel = { fighter: 'Fighters', bomber: 'Bombers & Fire Ships', torpedo: 'Torpedoes' }[ap.assetType] || 'Assets';
    let msg, footer;
    if (!state.assetActiveSide) {
      // All stages exhausted — only DONE remains.
      msg = `<span><b>Asset Combat complete</b> — all Fighters, Bombers and Torpedoes have activated.</span>`;
      footer = `<button class="btn-primary" id="asset-move-done" style="padding:5px 14px;font-size:11px;">DONE →</button>`;
    } else if (state.assetMove) {
      const a = state.launchedAssets.find(x => x.id === state.assetMove.id);
      const thr = a ? (a.t2t && a._t2tRange ? a._t2tRange : assetThrust(a)) : 0;
      let hint;
      if (a && !a.moved) {
        if (a.kind === 'fighter') hint = `click a destination ≤<b>${thr}"</b> · move onto an enemy Wing to dogfight`;
        else if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') hint = `click a destination ≤<b>${thr}"</b> · click an enemy ship to fly in & lock it`;
        else hint = `click a destination ≤<b>${thr}"</b>`;
      } else hint = 'use the right panel';
      msg = `<span><b style="color:var(--${a?a.side:'ucm'})">${a?a.kind:''}</b> selected — ${hint} →</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} (${sideName(state.assetActiveSide)}) →</button>`;
    } else {
      msg = `<span><b style="color:var(--${state.assetActiveSide})">${sideName(state.assetActiveSide)}</b> activates <b>${typeLabel}</b> · click one on the board to move it.</span>`;
      footer = `<button class="btn" id="asset-finish-stage" style="padding:5px 12px;font-size:10px;">DONE WITH ${typeLabel.toUpperCase()} (${sideName(state.assetActiveSide)}) →</button>`;
    }
    banner.innerHTML = `${msg}${footer}`;
    board.appendChild(banner);
    const fb = banner.querySelector('#asset-finish-stage');
    if (fb) fb.addEventListener('click', () => {
      // Force-finish the current side's current type: mark its remaining unmoved assets
      // of this type as moved (skipping them), then advance the stage.
      const side = state.assetActiveSide, type = ap.assetType;
      (state.launchedAssets || []).forEach(a => { if (a.side === side && kindsForAssetType(type).includes(a.kind)) a.moved = true; });
      state.assetMove = null;
      const cur = { type, side };
      const res = advanceAssetStage(cur);
      if (res.resolveAttacksFor) resolvePendingBomberAttacks(res.resolveAttacksFor, res.resolveType);
      renderAll();
    });
    const db = banner.querySelector('#asset-move-done');
    if (db) db.addEventListener('click', () => {
      // Resolve any straggler locked attacks, then exit the step.
      if (anyPendingBomberAttacks()) { state.assetMove = null; resolvePendingBomberAttacks(); renderAll(); return; }
      state.assetMove = null;
      state.assetPhase = { resolved: true, log: ap.log, step: 'battalion_done' };
      renderAll();
    });
    return; // no modal in this step
  }

  const bc = state.battalionCombat;
  const initSide = state.initiativeHolder || 'ucm';
  const otherSide = initSide === 'ucm' ? 'shal' : 'ucm';

  // Battalion-presence summary (optionally highlighting the active dropsite).
  const battSummaryFor = (hlId) => {
    let h = '';
    if (state.scenarioData && state.scenarioData.dropsites) {
      state.scenarioData.dropsites.forEach(ds => {
        const b = dsBattalions(ds);
        const rows = Object.keys(b).filter(k => (b[k].ucm||0)+(b[k].shal||0) > 0);
        if (!rows.length) return;
        const hl = ds.id === hlId ? ' style="outline:1px solid var(--ucm);border-radius:3px;padding:3px;"' : '';
        h += `<div class="ap-ds"${hl}><div class="ap-ds-name">${ds.base.name}${dropsiteContested(ds)?' <span style="color:var(--hull-warn);font-size:8px;">CONTESTED</span>':''}</div>`;
        rows.forEach(k => {
          const loc = b[k];

            <span><b style="color:var(--ucm)">${loc.ucm||0}</b> · <b style="color:var(--shal)">${loc.shal||0}</b></span></div>`;
        });
        h += `</div>`;
      });
    }
    return h || `<div style="color:var(--text-mute);font-style:italic;font-size:10px;">No battalions on any dropsite.</div>`;
  };

  // ── GUIDED BATTALION COMBAT (interactive, in initiative order) ──
  if (bc) {
    const ds = bc.dsId ? state.scenarioData.dropsites.find(d => d.id === bc.dsId) : null;
    let bodyHTML = '', footerHTML = '';
    const logHTML = (bc.log && bc.log.length)

      const contested = contestedDropsites();
      if (!contested.length) {
        bodyHTML = `<div class="ap-section"><div class="ap-log" style="color:var(--text-mute)">No more contested dropsites — Battalion Combat complete.</div></div>`;
        footerHTML = `<button class="btn-primary" id="bc-to-destroy">CONTINUE →</button>`;
      } else {
        bodyHTML = `<div class="ap-section"><div class="ap-title">${sideName(initSide)} (1st initiative) — pick a contested dropsite</div>` +
          contested.map(d => `<button class="btn" data-bc-pick="${d.id}" style="width:100%;margin-bottom:3px;">
            ${d.base.name} <span style="color:var(--text-mute)">(${sideName('ucm')} ${dsSideBattalions(d,'ucm')} · ${sideName('shal')} ${dsSideBattalions(d,'shal')})</span></button>`).join('') +
          `</div>`;
        footerHTML = `<button class="btn" id="bc-to-destroy">SKIP REMAINING →</button>`;
      }
    } else if (bc.stage === 'init' || bc.stage === 'other') {
      const actor = bc.stage === 'init' ? initSide : otherSide;
      const enemy = actor === 'ucm' ? 'shal' : 'ucm';
      const feats = enemyFeatures(ds, actor);
      const myGround = dsBattalions(ds).ground[actor] || 0;
      bodyHTML = `<div class="ap-section">
        <div class="ap-title">${ds.base.name} — ${sideName(actor)} assigns ground battalions</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">
          ${sideName(actor)} has <b style="color:var(--${actor})">${myGround}</b> battalion${myGround!==1?'s':''} on the dropsite ground.
          ${(myGround>0 && feats.length) ? 'Pick one enemy-held Feature to attack (1-for-1), or skip.' : (myGround<=0 ? 'No ground battalions to assign.' : 'No enemy-held Features.')}
        </div>`;
      if (myGround > 0 && feats.length) {
        bodyHTML += feats.map(fk => `<button class="btn" data-bc-feat="${fk}" style="width:100%;margin-bottom:3px;">
          Attack ${locDisplayName(ds, fk)} <span style="color:var(--text-mute)">(enemy ${dsBattalions(ds)[fk][enemy]})</span></button>`).join('');
      }
      bodyHTML += `</div>`;
      footerHTML = `<button class="btn-primary" id="bc-skip-assign">${bc.stage === 'init' ? 'NEXT PLAYER →' : 'RESOLVE DROPSITE →'}</button>`;
    } else if (bc.stage === 'destroy') {
      const destroyOpts = featureDestroyOptions();

/* Any on-table ship carrying enemy Battalions (Boarding candidates)? */
function anyShipBattalions() {
  return Object.keys(state.groups).some(gid => {
    const side = getDef(gid).side, enemy = side === 'ucm' ? 'shal' : 'ucm';
    return state.groups[gid].ships.some(s => !s.destroyed && !s.offTable && s.battalions && s.battalions[enemy] > 0);
  });
}

/* Resolve Boarding Actions (§9.2): each ship with enemy Battalions takes Core hits
   equal to their number; each passed Backup Save removes one Battalion; if destroyed
   this way the ship is captured (no explosion, 2× Kill Points). Marines-X removes X
   enemy Battalions first. */
function resolveBoardingActions() {
  const log = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    const owner = def.side, boarder = owner === 'ucm' ? 'shal' : 'ucm';
    state.groups[gid].ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable || !ship.battalions) return;
      let n = ship.battalions[boarder] || 0;
      if (!n) return;
      // Marines-X removes X boarding Battalions before hits.
      const marines = (def.special && /Marines-(\d)/i.test(def.special)) ? parseInt(def.special.match(/Marines-(\d)/i)[1]) : 0;
      if (marines) { const rem = Math.min(marines, n); n -= rem; ship.battalions[boarder] -= rem; if (rem) log.push(`${def.name}: Marines repel ${rem} Battalion(s)`); }
      if (n <= 0) return;
      // Core hits = boarding Battalion count. Shield cannot save boarding; Backup can,
      // and each passed Backup also removes one boarding Battalion.
      const bv = saveVal(def.bs);
      let unsaved = 0, removed = 0;
      for (let i = 0; i < n; i++) {
        if (bv != null && rollDie() >= bv) { removed++; } // passed backup → removes a battalion, no damage
        else unsaved++;
      }
      ship.battalions[boarder] = Math.max(0, (ship.battalions[boarder] || 0) - removed);
      if (unsaved > 0) {
        ship.hull = Math.max(0, ship.hull - unsaved);
        if (ship.hull <= 0) {
          ship.destroyed = true; ship.captured = true;
          recordKill(def, boarder, true); // captured = 2× KP, no explosion
          log.push(`${def.name} CAPTURED by boarding (${unsaved} Core hits)`);
        } else {
          log.push(`${def.name}: ${unsaved} Core hits from boarding${removed?`, ${removed} Battalion(s) repelled`:''} (${ship.hull}/${ship.maxHull})`);
        }
      } else if (removed) {
        log.push(`${def.name}: repelled ${removed} boarding Battalion(s)`);
      }
    });
  });
  return log;
}

/* Does a side have any group that can still activate this round? */
/* Returns the group ID that is currently mid-activation for the given side, if any.
   A group is "in activation" once it has an Order assigned OR any ship has moved/fired/
   launched/detected this round — i.e. it has started but not yet finished. */
function activeGroupIdForSide(side) {
  const fleet = fleetForSide(side);
  for (const def of fleet) {
    const grp = state.groups[def.id];
    if (!grp || grp.activated) continue;
    if (grp.order || grp.ships.some(s => s.movedThisRound || s.firedThisActivation || (s.launchedThisRound > 0) || s.detectorUsed)) {
      return def.id;
    }
  }
  return null;
}

function sideHasPendingActivation(side) {
  const fleet = fleetForSide(side);
  return fleet.some(def => {
    const grp = state.groups[def.id];
    if (!grp || grp.activated) return false;
    const onTable = grp.ships.some(s => !s.destroyed && !s.offTable);
    if (onTable) return true;
    return canActivateOffTable(def).eligible;
  });
}

/* Advance the active side after an activation finishes (alternate factions).
   If the other side has nothing left to activate, the same side continues. */
function advanceActiveSide() {
  const other = state.activeSide === 'ucm' ? 'shal' : 'ucm';
  if (sideHasPendingActivation(other)) state.activeSide = other;
  else if (sideHasPendingActivation(state.activeSide)) { /* same side continues */ }
  else state.activeSide = null;
}

/* Roll initiative for the start of a round: a D6 per faction, reroll ties.
   Stores the result in state.initiative for the modal. */
function rollInitiative() {
  const baseLvl = state.admiralLevel || { ucm: 0, shal: 0 };
  // Command Ship-X raises the assigned Admiral's effective Level by X (we model the
  // Admiral as on the side's best on-table Command Ship).
  const aLvl = {
    ucm: (baseLvl.ucm || 0) + commandShipBonus('ucm'),
    shal: (baseLvl.shal || 0) + commandShipBonus('shal')
  };
  const redBonus = (aLvl.ucm >= aLvl.shal && aLvl.ucm > 0) ? 1 : 0;
  const blueBonus = (aLvl.shal >= aLvl.ucm && aLvl.shal > 0) ? 1 : 0;
  let red, blue, rRaw, bRaw;
  do {
    rRaw = 1 + Math.floor(Math.random() * 6);
    bRaw = 1 + Math.floor(Math.random() * 6);
    red = rRaw + redBonus; blue = bRaw + blueBonus;
  } while (red === blue);
  // AP generation: 1 + Admiral Level per side.
  const ap = { ucm: 1 + (aLvl.ucm || 0), shal: 1 + (aLvl.shal || 0) };
  // Comms Uplink: +1 AP if you Control a Dropsite with a working Comms Station.
  if (sideHasCommsUplink('ucm')) ap.ucm += 1;
  if (sideHasCommsUplink('shal')) ap.shal += 1;
  // Pass Tokens: a side 2+ Groups fewer than the leader gets 1, +1 per further fewer.
  const groupCount = (side) => fleetForSide(side).filter(def => {
    const g = state.groups[def.id];
    return g && g.ships.some(s => !s.destroyed && (!s.offTable || canDeployNow(def)));
  }).length;
  const gc = { ucm: groupCount('ucm'), shal: groupCount('shal') };
  const most = Math.max(gc.ucm, gc.shal);
  const passTokens = { ucm: Math.max(0, (most - gc.ucm) - 1), shal: Math.max(0, (most - gc.shal) - 1) };
  state.planning = { ap, passTokens, gc, aLvl };
  state.initiative = {
    red, blue, rRaw, bRaw, redBonus, blueBonus,
    winner: red > blue ? 'ucm' : 'shal',
    holder: red > blue ? 'ucm' : 'shal',
    round: state.round
  };
}

          <div class="init-vs">vs</div>
          <div class="init-slot">
            <div class="init-name" style="color:var(--shal)">${blueName}</div>
            ${die(I.bRaw, I.blueBonus, 'var(--shal)')}
            <div style="font-size:9px;color:var(--text-mute);margin-top:4px;">AP ${P.ap.shal}${P.passTokens.shal?` · ${P.passTokens.shal} Pass`:''}</div>
          </div>
        </div>
        ${(I.redBonus||I.blueBonus)?`<div style="font-size:9px;color:var(--text-mute);text-align:center;margin-top:-6px;">+1 from highest Admiral Level</div>`:''}
        <div class="init-result" style="color:var(--${I.winner})">
          ${winName} won the roll
        </div>
        <div class="init-choice">
          <div class="init-choice-lbl">${winName} takes 1st initiative, or may give it to the opponent (reverse order):</div>
          <div class="init-choice-btns">
            <button class="btn ${I.holder === I.winner ? 'btn-primary' : ''}" data-init-give="${I.winner}">${(I.winner==='ucm'?redName:blueName)} takes 1st</button>
            <button class="btn ${I.holder !== I.winner ? 'btn-primary' : ''}" data-init-give="${I.winner==='ucm'?'shal':'ucm'}">${(I.winner==='ucm'?blueName:redName)} takes 1st</button>
          </div>
        </div>
      </div>
      <div class="setup-footer">
        <button class="btn" id="init-reroll">↻ REROLL</button>
        <button class="btn-primary" id="init-confirm">BEGIN ACTIVATION →</button>
      </div>
    </div>
  `;
  board.appendChild(overlay);
  overlay.querySelector('#init-reroll').addEventListener('click', () => { rollInitiative(); renderInitiative(); });
  overlay.querySelectorAll('[data-init-give]').forEach(btn => {
    btn.addEventListener('click', () => { state.initiative.holder = btn.dataset.initGive; renderInitiative(); });
  });
  overlay.querySelector('#init-confirm').addEventListener('click', () => {
    // The holder of initiative activates first this round.
    state.activeSide = state.initiative.holder;
    state.initiativeHolder = state.initiative.holder; // persists for the round (battalion combat order)
    state.initiative = null;
    renderAll();
  });
}

/* Two dropdowns to choose up to 2 Secondary Objectives for a fleet slot. */
function secondaryPickers(slot) {
  const chosen = state.secondaryChoice[slot] || [];
  const opt = (idx) => {
    const cur = chosen[idx] || '';
    const others = chosen.filter((_, i) => i !== idx);
    return `<select class="fleet-dropdown" data-secondary="${slot}|${idx}" style="margin-top:4px;font-size:9.5px;">
      <option value="">— Secondary ${idx+1} —</option>
      ${Object.keys(SECONDARY_OBJECTIVES).map(k => `<option value="${k}" ${cur===k?'selected':''} ${others.includes(k)?'disabled':''}>${SECONDARY_OBJECTIVES[k].name}</option>`).join('')}
    </select>`;
  };
  return opt(0) + opt(1);
}

/* Nomination editor: lets each side confirm/override its position-based Secondary
   nominations (Key Site, Priority Target, Long Shot, Objectives Beyond) before play. */
function renderNominationModal() {
  let overlay = document.getElementById('nomination-overlay');
  if (overlay) overlay.remove();
  if (!state.nominationPhase) return;
  const rows = [];
  ['ucm','shal'].forEach(side => {
    (state.secondaries[side] || []).forEach(key => {
      const def = SECONDARY_OBJECTIVES[key];
      if (!def || !def.nominate) return;
      const cands = secondaryCandidates(side, key);
      if (!cands.length) return;
      const cur = state.secondaryNominations[side][key];
      const curStr = JSON.stringify(cur);
      rows.push(`<div class="nom-row" style="margin:8px 0;padding:8px;border:1px solid var(--${side});border-radius:6px;">
        <div style="font-size:11px;color:var(--${side});font-weight:600;">${factionName(side)} — ${def.name}</div>
        <div style="font-size:9px;color:var(--text-mute);margin:2px 0 5px;">${def.desc}</div>
        <select class="fleet-dropdown" data-nom="${side}|${key}" style="font-size:10px;">
          ${cands.map(c => `<option value='${JSON.stringify(c.nom)}' ${JSON.stringify(c.nom)===curStr?'selected':''}>${c.label}</option>`).join('')}
        </select>
      </div>`);
    });
  });
  overlay = document.createElement('div');
  overlay.id = 'nomination-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `<div class="setup-panel" style="max-width:440px;">
    <div class="setup-title">Nominate Secondary Objectives</div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;">Declared before the first Planning Phase. Defaults are pre-selected; adjust if you wish.</div>
    ${rows.join('')}
    <div class="setup-footer"><button class="btn-primary" id="nom-confirm">CONFIRM →</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-nom]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [side, key] = sel.dataset.nom.split('|');
      try { state.secondaryNominations[side][key] = JSON.parse(sel.value); } catch (e) {}
    });
  });
  overlay.querySelector('#nom-confirm').addEventListener('click', () => {
    state.nominationPhase = false;
    renderAll();
  });
}

function renderSetupOverlay() {
  const board = document.querySelector('.board-wrap');
  let overlay = document.getElementById('setup-overlay');
  if (overlay) overlay.remove();
  if (state.phase !== 'setup') return;

  if (!state.scenario) state.scenario = { deployment: null, approach: null, layout: null, variant: null, objective: null };
  const scen = state.scenario;
  const vrn = scen.variant ? VARIANTS[scen.variant] : null;
  const obj = scen.objective ? OBJECTIVES[scen.objective] : null;
  // Scenario setup is locked until BOTH fleets are chosen and (for Bioficer)
  // all Payloads are assigned to Porters.
  const bothFleetsSelected = !!state.fleetChoices.f1 && !!state.fleetChoices.f2;
  const payloadsLocked = !bothFleetsSelected || !allPayloadsReady();

  // Build a summary line per option for each table — what shows in the picker list.
  const summarisers = {
    deployment: (k, v) => v.short || v.desc,
    approach:   (k, v) => `${FACTIONS[state.factions.shal].name}: ${APPROACH_BEHAVIOURS[v.blue].short} · ${FACTIONS[state.factions.ucm].name}: ${APPROACH_BEHAVIOURS[v.red].short}`,
    layout:     (k, v) => `${v.dropsites.length} dropsites · ${v.scenery.micrometeor} micrometeor · ${v.scenery.dense} dense${v.rings.length?' · '+v.rings.length+' ring'+(v.rings.length>1?'s':''):''}${v.largeObjects.length?' · '+v.largeObjects.length+' large obj':''}`,
    variant:    (k, v) => v.short || '',
    objective:  (k, v) => v.short || ''
  };

  // Card-summary functions (the small text shown on the card's collapsed view)
  const cardSummary = {
    deployment: () => { if (!scen.deployment) return ''; const d = DEPLOYMENTS[scen.deployment]; return d.short || d.desc; },
    approach:   () => { if (!scen.approach) return ''; const a = APPROACHES[scen.approach]; return `<b style="color:var(--shal)">${FACTIONS[state.factions.shal].name}:</b> ${APPROACH_BEHAVIOURS[a.blue].short} · <b style="color:var(--ucm)">${FACTIONS[state.factions.ucm].name}:</b> ${APPROACH_BEHAVIOURS[a.red].short}`; },
    layout:     () => { if (!scen.layout) return ''; const l = LAYOUTS[scen.layout]; return summarisers.layout('', l); },
    variant:    () => vrn ? (vrn.short || '') : '',
    objective:  () => obj ? `${obj.short}${obj.bonus?'<br><span style="color:var(--text-mute)">'+obj.bonus+'</span>':''}` : ''
  };

  const HELPER_TEXT = {
    deployment: 'Where each fleet starts on the board.',
    approach:   'How each side arrives: Direct, Close, or Distant reserves.',
    layout:     'Dropsite positions and how much scenery to place.',
    variant:    'Optional battlefield twist applied to the game.',
    objective:  'How victory is scored this game.'
  };

  const makeCard = (key, label, table, currentKey, fullWidth = false) => {
    const cur = currentKey ? table[currentKey] : null;
    const d6Display = !cur ? '?' : (cur.d6 === 0 ? '—' : cur.d6);
    const d6Cls = !cur || cur.d6 === 0 ? 'none' : '';
    let html = `<div class="scen-row ${fullWidth?'full-width':''}">
      <div class="scen-roll ${d6Cls}">${d6Display}</div>
      <div class="scen-label">${label}</div>
      <div class="scen-helper">${HELPER_TEXT[key] || ''}</div>
      <div class="scen-name">${cur ? cur.name : '<span style="color:var(--text-mute)">— not selected —</span>'}</div>
      <div class="scen-short">${cardSummary[key]()}</div>
      <div class="scen-controls">
        <select class="scen-dropdown" data-scen-select="${key}">
          <option value="" ${!currentKey?'selected':''}>— select —</option>
          ${Object.keys(table).map(optKey => {
            const opt = table[optKey];
            const d6 = opt.d6 === 0 ? '—' : opt.d6;
            return `<option value="${optKey}" ${optKey===currentKey?'selected':''}>${d6==='—'?'':'['+d6+'] '}${opt.name}</option>`;
          }).join('')}
        </select>
        <button class="reroll-btn" data-reroll="${key}" title="Randomise this row">↻</button>
      </div>`;
    html += `</div>`;
    return html;
  };

  overlay = document.createElement('div');
  overlay.id = 'setup-overlay';
  overlay.className = 'setup-overlay';
  overlay.innerHTML = `
    <div class="setup-card">
      <div class="setup-header">
        <h2 class="setup-title">SCENARIO SETUP</h2>
        <div class="setup-sub">D6 · 6-Round Game</div>
      </div>
      <div class="setup-body">
        <div class="faction-select">
          <div class="faction-slot">
            <div class="faction-lbl">FLEET 1</div>
            <select class="fleet-dropdown" data-fleet-choice="f1">
              <option value="" ${!state.fleetChoices.f1?'selected':''}>— select fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f1===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-admiral-choice="f1" style="margin-top:5px;font-size:10px;">
              ${[0,1,2,3,4].map(l => `<option value="${l}" ${state.admiralChoice.f1===l?'selected':''}>${l===0?'No Admiral':'Admiral Lv '+l}</option>`).join('')}
            </select>
            ${secondaryPickers('f1')}
            ${fleetHasPayloads(state.fleetChoices.f1) ? `<button class="btn ${payloadsReady('f1')?'':'btn-primary'}" data-payload-open="f1" style="width:100%;margin-top:5px;font-size:10px;">${payloadsReady('f1')?'✓ PAYLOADS ASSIGNED':'⊕ ASSIGN PAYLOADS'}</button>` : ''}
          </div>
          <div class="faction-slot">
            <div class="faction-lbl">FLEET 2</div>
            <select class="fleet-dropdown" data-fleet-choice="f2">
              <option value="" ${!state.fleetChoices.f2?'selected':''}>— select fleet —</option>
              ${Object.keys(FACTIONS).map(fk => `<option value="${fk}" ${state.fleetChoices.f2===fk?'selected':''}>${FACTIONS[fk].name}</option>`).join('')}
            </select>
            <select class="fleet-dropdown" data-admiral-choice="f2" style="margin-top:5px;font-size:10px;">
              ${[0,1,2,3,4].map(l => `<option value="${l}" ${state.admiralChoice.f2===l?'selected':''}>${l===0?'No Admiral':'Admiral Lv '+l}</option>`).join('')}
            </select>
            ${secondaryPickers('f2')}
            ${fleetHasPayloads(state.fleetChoices.f2) ? `<button class="btn ${payloadsReady('f2')?'':'btn-primary'}" data-payload-open="f2" style="width:100%;margin-top:5px;font-size:10px;">${payloadsReady('f2')?'✓ PAYLOADS ASSIGNED':'⊕ ASSIGN PAYLOADS'}</button>` : ''}
          </div>
        </div>
        <div style="font-size:9px;color:var(--text-mute);margin:-4px 0 10px;text-align:center;">Red/Blue sides are randomised when you confirm.</div>
        ${payloadsLocked ? `<div class="scen-extra-note" style="background:rgba(255,181,71,0.08);border-left-color:var(--hull-warn);color:var(--hull-warn);text-align:center;">
          ${!bothFleetsSelected
            ? 'Select <b>both fleets</b> above before choosing a scenario.'
            : 'Assign all Bioficer Payloads to Porter ships before choosing a scenario. Use <b>⊕ ASSIGN PAYLOADS</b> above.'}
        </div>` : ''}
        <div class="setup-grid" style="${payloadsLocked ? 'opacity:0.4;pointer-events:none;filter:grayscale(0.6);' : ''}">
          ${makeCard('deployment','Deployment Type', DEPLOYMENTS, scen.deployment)}
          ${makeCard('approach',  'Approach',        APPROACHES,  scen.approach)}
          ${makeCard('layout',    'Layout',          LAYOUTS,     scen.layout)}
          ${makeCard('variant',   'Variant',         VARIANTS,    scen.variant)}
          ${makeCard('objective', 'Scoring Objective', OBJECTIVES, scen.objective, true)}
        </div>
        ${vrn && vrn.d6 > 0 ? `<div class="scen-extra-note">
          <b>${vrn.name}:</b> ${vrn.desc}
        </div>` : ''}
        ${obj && obj.d6 > 0 ? `<div class="scen-extra-note" style="background:rgba(74,214,255,0.05);border-left-color:var(--ucm);color:var(--ucm)">
          <b>${obj.name}:</b> ${obj.desc}
        </div>` : ''}
      </div>
      <div class="setup-footer">
        <button class="btn" id="test-setup" title="UCM vs Scourge · no admirals/secondaries · Line / Close Enough / Diagonal / Guarded Sectors / Standard">⚡ TEST SETUP</button>
        <button class="btn" data-reroll="all" ${payloadsLocked ? 'disabled' : ''}>⚄ RANDOMISE ALL</button>
        <button class="btn-primary" id="commit-scenario" ${payloadsLocked ? 'disabled' : ''}>CONFIRM SCENARIO →</button>
      </div>
    </div>
  `;
  board.appendChild(overlay);

  // Reroll buttons: 'all' randomises every row; a single key randomises just that row.
  const SCEN_TABLES = { deployment: DEPLOYMENTS, approach: APPROACHES, layout: LAYOUTS, variant: VARIANTS, objective: OBJECTIVES };
  overlay.querySelectorAll('[data-reroll]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.reroll;
      if (key === 'all') {
        state.scenario = generateScenario();
      } else {
        // Randomise only this row.
        const keys = Object.keys(SCEN_TABLES[key]);
        state.scenario = { ...state.scenario, [key]: keys[Math.floor(Math.random() * keys.length)] };
      }
      renderSetupOverlay();
    });
  });
  // Picker dropdown — change (or clear) the chosen option for a scenario row.
  overlay.querySelectorAll('[data-scen-select]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const key = sel.dataset.scenSelect;
      state.scenario = { ...state.scenario, [key]: sel.value || null };
      renderSetupOverlay();
    });
  });
  // Fleet selection (dropdowns). Red/Blue sides are randomised at commit.
  overlay.querySelectorAll('[data-fleet-choice]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const which = sel.dataset.fleetChoice; // 'f1' | 'f2'
      state.fleetChoices[which] = sel.value || null;
      state.payloadLinks[which] = {}; // changing the fleet clears its payload assignments
      renderSetupOverlay();           // refresh so ASSIGN PAYLOADS button appears/hides
    });
  });
  overlay.querySelectorAll('[data-admiral-choice]').forEach(sel => {
    sel.addEventListener('change', () => { state.admiralChoice[sel.dataset.admiralChoice] = parseInt(sel.value) || 0; });
  });
  overlay.querySelectorAll('[data-secondary]').forEach(sel => {
    sel.addEventListener('change', () => {
      const [slot, idx] = sel.dataset.secondary.split('|');
      state.secondaryChoice[slot] = state.secondaryChoice[slot] || [];
      state.secondaryChoice[slot][parseInt(idx)] = sel.value || undefined;
      state.secondaryChoice[slot] = state.secondaryChoice[slot].filter(Boolean);
      renderSetupOverlay();
    });
  });
  // Open the Payload→Porter assignment modal for a fleet slot.
  overlay.querySelectorAll('[data-payload-open]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.payloadAssign = { slot: btn.dataset.payloadOpen };
      renderPayloadAssign();
    });
  });
  overlay.querySelector('#commit-scenario').addEventListener('click', commitScenario);
  const testBtn = overlay.querySelector('#test-setup');
  if (testBtn) testBtn.addEventListener('click', () => {
    // Quick deterministic test game: UCM vs Scourge, no admirals/secondaries,
    // Line deployment · Close Enough approach · Diagonal layout · Guarded Sectors
    // variant · Standard scoring. Then commit straight to play.
    state.fleetChoices = { f1: 'ucm', f2: 'scourge' };
    state.admiralChoice = { f1: 0, f2: 0 };
    state.secondaryChoice = { f1: [], f2: [] };
    state.scenario = {
      deployment: 'line', approach: 'close_enough', layout: 'diagonal',
      variant: 'guarded_sectors', objective: 'standard'
    };
    commitScenario();
  });
}

function renderDeployHint() {
  const board = document.querySelector('.board-wrap');
  let hint = document.getElementById('deploy-hint');
  if (hint) hint.remove();
  if (state.phase !== 'deploy') return;
  hint = document.createElement('div');
  hint.id = 'deploy-hint';
  hint.className = 'deploy-hint';

  // Status text varies depending on selection.
  let status = '';
  if (state.selectedGroupId) {
    const def = getDef(state.selectedGroupId);
    const grp = state.groups[state.selectedGroupId];
    if (!canDeployNow(def)) {
      const app = approachFor(def.side);
      status = `<b>${def.name}</b> · <span style="color:var(--text-mute)">Reserve (${app === 'close' ? 'Close' : 'Distant'}) — arrives via off-table activation in play</span>`;
    } else if (!deploySideAllowed(def.side)) {
      status = `<b>${def.name}</b> · <span style="color:var(--hull-warn)">${factionName('ucm')} (Red) deploys first — finish all Red Direct/Vanguard Groups before placing Blue</span>`;
    } else {
      const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
      const total = grp.ships.filter(s => !s.destroyed).length;
      const placed = total - (grp.ships.filter(s => !s.destroyed && s.offTable).length);
      if (undeployedIdx >= 0) {
        status = `<b>${def.name}</b> · click in zone to place ship <b>${placed + 1}</b> of <b>${total}</b>`;
      } else {
        status = `<b>${def.name}</b> · all ships placed · click to fine-tune`;
      }
    }
  } else {
    // Show Direct-deployment progress per side, and whose turn it is.
    const ucmStat = directDeploymentStatus('ucm');
    const shalStat = directDeploymentStatus('shal');
    const parts = [];
    if (ucmStat)  parts.push(`<span style="color:var(--ucm)">${factionName('ucm')} ${ucmStat.placed}/${ucmStat.required} req</span>`);
    if (shalStat) parts.push(`<span style="color:var(--shal)">${factionName('shal')} ${shalStat.placed}/${shalStat.required} req</span>`);
    let order;
    if (!state.deployDone.ucm) order = `<span style="color:var(--ucm)">${factionName('ucm')} (Red) deploying — finish, then signal done</span>`;
    else if (!state.deployDone.shal) order = `<span style="color:var(--shal)">${factionName('shal')} (Blue) deploying</span>`;
    else order = `Both sides ready — begin play`;
    status = parts.length ? `Direct minimums: ${parts.join(' · ')} · ${order}` : order;
  }

  // Footer button: hand off between sides, then BEGIN PLAY once both are done.
  let footerBtn;
  const bothDone = state.deployDone.ucm && state.deployDone.shal;
  if (state.aiming) {
    footerBtn = '';
  } else if (!state.deployDone.ucm) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-red" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${factionName('ucm')} (RED) DEPLOYMENT DONE ▸</button>`;
  } else if (!state.deployDone.shal) {
    footerBtn = `<button class="btn-finish-act" id="deploy-done-blue" style="width:auto;padding:6px 16px;margin-top:0;">✓ ${factionName('shal')} (BLUE) DEPLOYMENT DONE ▸</button>`;
  } else {
    footerBtn = `<button class="btn-primary" id="commit-deploy" style="padding:5px 14px;font-size:11px;">BEGIN PLAY →</button>`;
  }

  hint.innerHTML = `<span>${status}</span>${footerBtn}`;
  board.appendChild(hint);
  const cd = hint.querySelector('#commit-deploy');
  if (cd) cd.addEventListener('click', commitDeployment);
  const ddr = hint.querySelector('#deploy-done-red');
  if (ddr) ddr.addEventListener('click', () => {
    const left = undeployedDeployableCount('ucm');
    const stat = directDeploymentStatus('ucm');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${factionName('ucm')} must place its Direct minimum first`); return; }
    if (left > 0 && !confirm(`${factionName('ucm')} still has ${left} deployable Group(s) off-table. Finish deploying Red and hand over to Blue?`)) return;
    state.deployDone.ucm = true;
    state.selectedGroupId = null; state.selectedShipIdx = null;
    renderAll();
  });
  const ddb = hint.querySelector('#deploy-done-blue');
  if (ddb) ddb.addEventListener('click', () => {
    const left = undeployedDeployableCount('shal');
    const stat = directDeploymentStatus('shal');
    if (stat && stat.placed < stat.required) { flashLaunchMsg(`${factionName('shal')} must place its Direct minimum first`); return; }
    if (left > 0 && !confirm(`${factionName('shal')} still has ${left} deployable Group(s) off-table. Finish deploying Blue?`)) return;
    state.deployDone.shal = true;
    state.selectedGroupId = null; state.selectedShipIdx = null;
    renderAll();
  });
}
