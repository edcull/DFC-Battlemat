      <span style="font-size:9px;letter-spacing:0.15em;color:var(--text-mute);">VP</span>
      <span style="color:var(--ucm);font-weight:700;font-size:16px;">${u.vp}</span>
      <span style="font-size:9px;color:var(--text-mute);">${factionName('ucm')}</span>
      <span style="color:var(--text-mute);">·</span>
      <span style="font-size:9px;color:var(--text-mute);">${factionName('shal')}</span>
      <span style="color:var(--shal);font-weight:700;font-size:16px;">${s.vp}</span>
      <span style="font-size:10px;color:var(--text-mute);margin-left:4px;">⊕</span>
    </button>`;
    const btn = nav.querySelector('#vp-counter');
    if (btn) btn.addEventListener('click', () => { state.vpBreakdownOpen = true; renderAll(); });
    return;
  }
  // Setup/scenery/deploy: restore the phase-step breadcrumb if it was replaced.
  if (nav && !nav.querySelector('.phase-step')) {
    nav.innerHTML = `<span class="phase-step" data-phase="setup">1 · SETUP</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="scenery">2 · SCENERY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="deploy">3 · DEPLOY</span>
      <span class="phase-arrow">→</span>
      <span class="phase-step" data-phase="play">4 · PLAY</span>`;
  }
  document.querySelectorAll('.phase-step').forEach(el => {
    el.classList.toggle('active', el.dataset.phase === state.phase);
    const phases = ['setup','scenery','deploy','play'];
    const curIdx = phases.indexOf(state.phase);
    const elIdx = phases.indexOf(el.dataset.phase);
    el.classList.toggle('done', elIdx < curIdx);
  });
}

function renderTopbarControls() {
  const ctrl = document.getElementById('topbar-controls');
  if (!ctrl) return;
  if (state.phase === 'setup') {
    ctrl.innerHTML = `<button class="btn" id="reset-game" title="Reset all">↻ RESET</button>`;
  } else if (state.phase === 'scenery') {
    ctrl.innerHTML = `
      <button class="btn" id="back-to-setup">← SETUP</button>
      <button class="btn-primary" id="commit-scenery-top" style="padding:6px 14px;font-size:11px;">SCENERY COMPLETE →</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  } else if (state.phase === 'deploy') {
    ctrl.innerHTML = `
      <button class="btn" id="back-to-setup">← SETUP</button>
      <button class="btn-primary" id="commit-deploy-top" style="padding:6px 14px;font-size:11px;">DEPLOYMENT COMPLETE →</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  } else { // play
    const P = state.planning;
    const canPass = P && state.activeSide && P.passTokens[state.activeSide] > 0;
    ctrl.innerHTML = `
      <div class="round-display">RND <b id="round-num">${state.round}</b> / 6</div>
      ${canPass ? `<button class="btn" id="pass-activation" title="Spend a Pass Token to pass">⏭ PASS (${P.passTokens[state.activeSide]})</button>` : ''}
      <button class="btn" id="end-round">END ROUND ▸</button>
      <button class="btn" id="reset-game" title="Reset all">↻ RESET</button>
    `;
  }
}



function renderAll() {
  syncPayloads();
  renderPhaseNav();
  renderTopbarControls();
  renderPanels();
  renderDetail();
  renderBoard();
  renderSetupOverlay();
  renderNominationModal();
  renderDropsiteActivation();
  renderPayloadAssign();
  renderAttackModal();
  renderRepairPhase();
  renderBattalionDeployModal();
  renderDogfightModal();
  renderScoreboard();
  renderEventLog();
  renderApEditModal();
  renderScoringModal();
  renderVPBreakdown();
  renderGameOver();
  renderSceneryPlacement();
  renderAssetPhase();
  renderInitiative();
  renderDeployHint();
  renderScenBanner();
  updateHUD();
  renderAimHint();
  // Cursor: crosshair when the player is about to place / aim / second-move.
  const board = document.getElementById('board');
  if (board) {
    let showCrosshair = false;
    if (state.aiming || state.vectoredSecondMove || state.launching || (state.assetPhase && state.assetPhase.step === 'assets') || (state.phase === 'scenery' && state.sceneryPlace)) {
      showCrosshair = true;
    } else if (state.selectedGroupId) {
      const def = getDef(state.selectedGroupId);
      const undeployedIdx = nextUndeployedShipIdx(state.selectedGroupId);
      if (def && undeployedIdx >= 0) {
        if (state.phase === 'deploy' && canDeployNow(def) && deploySideAllowed(def.side)) {
          showCrosshair = true;
        } else if (state.phase === 'play') {
          const grp = state.groups[state.selectedGroupId];
          if (!grp.activated && canActivateOffTable(def).eligible) showCrosshair = true;
        }
      }
    }
    board.style.cursor = showCrosshair ? 'crosshair' : 'default';
  }
}

/* Floating hint shown during aim / vectored-second-move states. */
function renderAimHint() {
  const board = document.querySelector('.board-wrap');
  let el = document.getElementById('aim-hint');
  if (el) el.remove();
  let msg = '';
  if (state.aiming) {
    if (state.aiming.mode === 'deploy') msg = 'Move mouse to aim · click to set facing (any angle)';
    else if (state.aiming.mode === 'vectored') msg = 'Vectored pivot — aim (±45°) · click to set, then move again';
    else if (state.aiming.mode === 'course_change') msg = 'Course Change — bonus turn (±45°) · click to set facing';
  } else if (state.vectoredSecondMove) {
    msg = 'Vectored — click ahead to move with remaining thrust (no further turn)';
  }
  if (!msg) return;
  el = document.createElement('div');
  el.id = 'aim-hint';
  el.className = 'deploy-hint';
  el.style.bottom = '12px';
  el.innerHTML = `<span><b>${msg}</b></span>`;
  board.appendChild(el);
}

function updateHUD() {
  const hud = document.getElementById('hud-active');
  const turnHud = document.getElementById('hud-turn-info');
  if (!state.selectedGroupId) {
    if (state.phase === 'play' && state.activeSide) {
      const an = FACTIONS[state.factions[state.activeSide]].name;
      const col = state.activeSide === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      hud.innerHTML = `<b style="color:${col}">${an}</b> TO ACTIVATE →`;
    } else {
      hud.innerHTML = 'SELECT A GROUP →';
    }
    turnHud.style.display = 'none';
  } else {
    const def = getDef(state.selectedGroupId);
    const grp = getGroup(state.selectedGroupId);
    const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    const hudOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    hud.innerHTML = `<b style="color:${sideCol}">${def.name}</b> · ${hudOrd || 'no order'}${state.selectedShipIdx !== null ? ' · ship #' + (state.selectedShipIdx+1) : ''}`;
    if (state.selectedShipIdx !== null && hudOrd && ORDERS[hudOrd].moveMax > 0) {
      const o = ORDERS[hudOrd];
      turnHud.style.display = 'block';
      turnHud.innerHTML = `MOVE <b>${(o.moveMin*def.thrust).toFixed(1)}"–${(o.moveMax*def.thrust).toFixed(1)}"</b> · TURN <b>±${o.turnLimit}°</b>`;
    } else {
      turnHud.style.display = 'none';
    }
  }
}

/* ==========================================================================
   EVENT WIRING
   ========================================================================== */
document.addEventListener('click', (e) => {
  // Group card click handled inline
  // Spike controls
  if (e.target.matches('[data-spike-u]')) {
    const gid = e.target.dataset.spikeU;
    if (state.groups[gid].spikes < 4) state.groups[gid].spikes++;
    renderAll(); return;
  }
  if (e.target.matches('[data-spike-d]')) {
    const gid = e.target.dataset.spikeD;
    if (state.groups[gid].spikes > 0) state.groups[gid].spikes--;
    renderAll(); return;
  }
  // Dropsite damage controls
  if (e.target.matches('[data-ds-damage-u]')) {
    const did = e.target.dataset.dsDamageU;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage < ds.maxHull) ds.damage++;
    renderAll(); return;
  }
  if (e.target.matches('[data-ds-damage-d]')) {
    const did = e.target.dataset.dsDamageD;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === did);
    if (ds && ds.damage > 0) ds.damage--;
    renderAll(); return;
  }
  // HP controls
  if (e.target.matches('[data-hpu]')) {
    const [gid, si] = e.target.dataset.hpu.split('|');
    const ship = state.groups[gid].ships[si];
    if (ship.hull < ship.maxHull) ship.hull++;
    if (ship.destroyed && ship.hull > 0) ship.destroyed = false;
    renderAll(); return;
  }
  if (e.target.matches('[data-hpd]')) {
    const [gid, si] = e.target.dataset.hpd.split('|');
    const ship = state.groups[gid].ships[si];
    if (ship.hull > 0) {
      ship.hull--;
      if (ship.hull <= 0) ship.destroyed = true;
    }
    // If the destroyed ship was the lead, hand lead to the first alive ship.
    const g = state.groups[gid];
    if (g.ships[g.leadShipIdx || 0] && g.ships[g.leadShipIdx || 0].destroyed) {
      const firstAlive = g.ships.findIndex(s => !s.destroyed && !s.offTable);
      g.leadShipIdx = firstAlive >= 0 ? firstAlive : 0;
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-bat-cancel]')) {
    const dep = state.battalionDeploy;
    if (dep && dep.fromGid != null) {
      state.selectedDropsiteId = null;
      state.selectedGroupId = dep.fromGid;
      state.selectedShipIdx = dep.fromSi;
    }
    state.battalionDeploy = null;
    renderAll(); return;
  }
  // Battalion manual adjust.
  if (e.target.matches('[data-bat-adj]')) {
    const [dsId, key, side, delta] = e.target.dataset.batAdj.split('|');
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds) {
      const b = dsBattalions(ds);
      if (b[key]) b[key][side] = Math.max(0, (b[key][side] || 0) + parseInt(delta));
    }
    renderAll(); return;
  }
  // Battalion deploy — land the launched battalions at the chosen location.
  if (e.target.closest && e.target.closest('[data-bat-deploy]')) {
    const el = e.target.closest('[data-bat-deploy]');
    const [dsId, key] = el.dataset.batDeploy.split('|');
    const dep = state.battalionDeploy;
    if (dep && dep.dsId === dsId) {
      const ds = state.scenarioData.dropsites.find(d => d.id === dsId);
      if (ds) {
        const b = dsBattalions(ds);
        if (b[key]) b[key][dep.side] = (b[key][dep.side] || 0) + dep.count;
      }
      // Reselect the launching ship so the player can continue its activation.
      if (dep.fromGid != null) {
        state.selectedDropsiteId = null;
        state.selectedGroupId = dep.fromGid;
        state.selectedShipIdx = dep.fromSi;
      }
      state.battalionDeploy = null;
    }
    renderAll(); return;
  }
  // Layer toggle (orbit ↔ atmosphere) for the selected ship's next move.
  // Fighter/Bomber counter adjust (must run BEFORE the data-launch toggle,
  // since the counter sits inside the launch row).
  if (e.target.matches('[data-fb-adj]')) {
    const [which, delta] = e.target.dataset.fbAdj.split('|');
    if (state.launching) {
      const d = parseInt(delta);
      const cur = state.launching[which] || 0;
      const next = Math.max(0, cur + d);
      // Enforce mutual exclusivity: only one of fighters/bombers may be > 0.
      const other = which === 'fighters' ? 'bombers' : 'fighters';
      if (next > 0 && (state.launching[other] || 0) > 0) { /* blocked */ }
      else state.launching[which] = next;
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-fs-adj]')) {
    const d = parseInt(e.target.dataset.fsAdj);
    if (state.launching) {
      state.launching.fireships = Math.max(0, (state.launching.fireships || 0) + d);
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-launch-cancel]')) {
    state.launching = null;
    renderAll(); return;
  }
  // Payload: begin detaching a payload — enter board placement (within 3").
  if (e.target.matches('[data-payload-detach]') || (e.target.closest && e.target.closest('[data-payload-detach]'))) {
    const btn = e.target.matches('[data-payload-detach]') ? e.target : e.target.closest('[data-payload-detach]');
    const [pgid, psi] = btn.dataset.payloadDetach.split('|');
    const porter = state.groups[state.selectedGroupId];
    state.payloadDetach = {
      gid: pgid, si: parseInt(psi),
      porterGid: state.selectedGroupId, porterSi: state.selectedShipIdx
    };
    state.launching = null;
    flashLaunchMsg('Click within 3" of the Porter to place the detached Payload');
    renderAll(); return;
  }
  // Payload: begin reattaching — click a detached payload within 3" of the Porter.
  if (e.target.matches('[data-payload-reattach]') || (e.target.closest && e.target.closest('[data-payload-reattach]'))) {
    const btn = e.target.matches('[data-payload-reattach]') ? e.target : e.target.closest('[data-payload-reattach]');
    const [pgid, psi] = btn.dataset.payloadReattach.split('|');
    state.payloadReattach = { porterGid: pgid, porterSi: parseInt(psi) };
    state.payloadDetach = null;
    state.launching = null;
    flashLaunchMsg('Click a detached Payload within 3" to reattach');
    renderAll(); return;
  }
  // Weapon targeting — click a weapon to enter target-assignment mode.
  const wtEl = e.target.closest && e.target.closest('[data-weapon-target]');
  if (wtEl) {
    const [gid, si, wi] = wtEl.dataset.weaponTarget.split('|');
    const sIdx = parseInt(si), wIdx = parseInt(wi);
    if (state.targeting && state.targeting.gid === gid && state.targeting.si === sIdx && state.targeting.wi === wIdx) {
      state.targeting = null; // toggle off
    } else {
      state.targeting = { gid, si: sIdx, wi: wIdx };
      state.launching = null;
      flashLaunchMsg('Click an enemy ship in arc & range to lock the target');
    }
    renderAll(); return;
  }
  // Clear a locked weapon target.
  if (e.target.matches('[data-weapon-unlock]')) {
    const [gid, si, wi] = e.target.dataset.weaponUnlock.split('|');
    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && ship.weaponTargets) { delete ship.weaponTargets[parseInt(wi)]; }
    renderAll(); return;
  }
  // Anti-Wing: toggle the wing-targeting mode.
  if (e.target.matches('[data-antiwing]') || (e.target.closest && e.target.closest('[data-antiwing]'))) {
    const btn = e.target.matches('[data-antiwing]') ? e.target : e.target.closest('[data-antiwing]');
    const [gid, si, wi] = btn.dataset.antiwing.split('|');
    if (state.antiWing && state.antiWing.gid === gid && state.antiWing.si === parseInt(si) && state.antiWing.wi === parseInt(wi)) {
      state.antiWing = null;
    } else {
      state.antiWing = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy Wing (fighter/bomber) in arc & range', true);
    }
    renderAll(); return;
  }
  // Detector: toggle the LoS-targeting mode (forgoes the weapon to place Spikes).
  if (e.target.matches('[data-detector]') || (e.target.closest && e.target.closest('[data-detector]'))) {
    const btn = e.target.matches('[data-detector]') ? e.target : e.target.closest('[data-detector]');
    const [gid, si, wi] = btn.dataset.detector.split('|');
    if (state.detector && state.detector.gid === gid && state.detector.si === parseInt(si) && state.detector.wi === parseInt(wi)) {
      state.detector = null; // toggle off
    } else {
      state.detector = { gid, si: parseInt(si), wi: parseInt(wi) };
      flashLaunchMsg('Click an enemy ship in Line of Sight', true);
    }
    renderAll(); return;
  }
  // FIRE — open the attack resolution modal for all locked weapons.
  if (e.target.matches('[data-fire]') || (e.target.closest && e.target.closest('[data-fire]'))) {
    const btn = e.target.matches('[data-fire]') ? e.target : e.target.closest('[data-fire]');
    const [gid, si] = btn.dataset.fire.split('|');
    openAttackModal(gid, parseInt(si));
    return;
  }
  if (e.target.matches('[data-survey]') || (e.target.closest && e.target.closest('[data-survey]'))) {
    const btn = e.target.matches('[data-survey]') ? e.target : e.target.closest('[data-survey]');
    const [gid, si, dsId] = btn.dataset.survey.split('|');
    const def = getDef(gid), ship = state.groups[gid].ships[parseInt(si)];
    const ds = state.scenarioData.dropsites.find(d => d.id === dsId);
    if (ds && ship) {
      ds.surveyedBy = ds.surveyedBy || [];
      if (!ds.surveyedBy.includes(def.side)) ds.surveyedBy.push(def.side);
      // Surveying forgoes attacking/launching: mark the ship as having fired+launched.
      ship.firedThisActivation = true; ship.launchedThisRound = 999;
      flashLaunchMsg(`${def.name} surveyed ${ds.base.name}`, true);
    }
    renderAll(); return;
  }
  if (e.target.closest && e.target.closest('[data-extract-start]')) {
    const [gid, si] = e.target.closest('[data-extract-start]').dataset.extractStart.split('|');
    // Toggle extract-targeting mode for this ship.
    if (state.extracting && state.extracting.gid === gid && state.extracting.si === parseInt(si)) {
      state.extracting = null;
    } else {
      state.extracting = { gid, si: parseInt(si) };
      state.launching = null; state.targeting = null;
      flashLaunchMsg('Click a Dropsite within 6" to extract Recon Operatives', true);
    }
    renderAll(); return;
  }
  // Launch asset — toggle launch-targeting mode.
  const launchEl = e.target.closest && e.target.closest('[data-launch]');
  if (launchEl) {
    const [gid, si, type] = launchEl.dataset.launch.split('|');
    const sIdx = parseInt(si);
    // Toggle off if already targeting this same asset.
    if (state.launching && state.launching.gid === gid && state.launching.si === sIdx && state.launching.type === type) {
      state.launching = null;
    } else {
      const meta = launchMeta(type);
      const def = getDef(gid);
      const entry = (def.launch || []).find(x => x.type === type);
      const link = entry ? entry.link : null;
      state.launching = { gid, si: sIdx, type, name: meta.label, auraIn: meta.auraIn, link, fighters: 0, bombers: 0, fireships: 0 };
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-layer-toggle]')) {
    state.layerToggle = !state.layerToggle;
    renderAll(); return;
  }
  // Nominate lead ship (weapons range/arcs, launching assets).
  if (e.target.matches('[data-lead]')) {
    const [gid, si] = e.target.dataset.lead.split('|');
    state.groups[gid].leadShipIdx = parseInt(si);
    renderAll(); return;
  }
  // Order buttons
  if (e.target.matches('[data-order]')) {
    const order = e.target.dataset.order;
    const gid = state.selectedGroupId;
    if (!gid) return;
    const grp = state.groups[gid];
    if (grp.activated) return;
    // Don't allow an Order until every ship in the Group is deployed — otherwise
    // the first ship locks while the rest still need placing.
    if (nextUndeployedShipIdx(gid) >= 0) {
      flashLaunchMsg('Deploy all ships in this Group first');
      return;
    }
    // Alternating activation: only the side whose turn it is may activate.
    const def = getDef(gid);
    if (state.phase === 'play' && state.activeSide && def.side !== state.activeSide) {
      flashLaunchMsg(`${FACTIONS[state.factions[state.activeSide]].name}'s turn to activate`);
      return;
    }
    // Activation lock: another group on this side has already started activating.
    const activatingGid = activeGroupIdForSide(def.side);
    if (activatingGid && activatingGid !== gid) {
      flashLaunchMsg('Finish the current activation before starting another');
      return;
    }
    // Lock: once any ship has moved under the current Order, the formation is
    // committed — the Order can't be changed for the rest of the activation.
    if (grp.order && order !== grp.order && grp.ships.some(s => !s.destroyed && s.movedThisRound)) {
      return;
    }
    grp.order = order;
    logEvent(`${getDef(gid).name} → ${ORDERS[order].label}`);
    // Once an Order is chosen, the deploy-point adjust window closes for arrived ships.
    grp.ships.forEach(s => { s.justArrived = false; });
    // Activating again ends the previous Silent Running sig reduction.
    grp.ships.forEach(s => { s.sigSilent = false; });
    // Apply Spike effects from the chosen Order:
    if (order === 'GQ') grp.spikes = Math.max(0, grp.spikes - 2);
    if (order === 'SR') grp.spikes = 0;
    // Damage Control: each ship recovers Hull (1, or D3 for H/C tonnage) once,
    // and is flagged to roll 2D6 per crippling effect in the Repair step.
    if (order === 'DC') {
      const ddef = getDef(gid);
      grp.ships.forEach(s => {
        if (s.destroyed || s.offTable) return;
        s.dcThisRound = true;
        if (!s.dcRepaired) {
          s.dcRepaired = true;
          const rec = (ddef.tonnage === 'H' || ddef.tonnage === 'C') ? Math.ceil(rollDie() / 2) : 1; // D3 for H/C
          s.hull = Math.min(s.maxHull, s.hull + rec);
          flashLaunchMsg(`${ddef.name} Damage Control: +${rec} Hull`, true);
        }
      });
    }
    // (WF, CC, MT add spikes at END of activation — handled in finish-activation)
    // NOTE: do NOT reset movedThisRound here. Each ship moves at most once per round,
    // regardless of how many times the Order is changed.
    // Auto-select a ship to activate its movement immediately: pick the lead ship
    // (or first on-table, not-yet-moved ship) so its move cone shows at once.
    if (state.selectedShipIdx === null && ORDERS[order] && ORDERS[order].moveMax > 0) {
      const leadIdx = grp.leadShipIdx || 0;
      const pick = (i) => { const s = grp.ships[i]; return s && !s.destroyed && !s.offTable && !s.movedThisRound; };
      let idx = pick(leadIdx) ? leadIdx : grp.ships.findIndex((s, i) => pick(i));
      if (idx >= 0) state.selectedShipIdx = idx;
    }
    renderAll(); return;
  }
  // Open Network: per-ship Order assignment.
  if (e.target.matches('[data-ship-order]')) {
    const [gid, si, order] = e.target.dataset.shipOrder.split('|');
    const grp = state.groups[gid];
    const def = getDef(gid);
    const sIdx = parseInt(si);
    const ship = grp.ships[sIdx];
    if (!ship || grp.activated) return;
    // Alternating activation gate.
    if (state.phase === 'play' && state.activeSide && def.side !== state.activeSide) {
      flashLaunchMsg(`${FACTIONS[state.factions[state.activeSide]].name}'s turn to activate`);
      return;
    }
    // Lock once this ship has moved under its current order.
    if (ship.order && order !== ship.order && ship.movedThisRound) return;
    ship.order = order;
    ship.justArrived = false;
    ship.sigSilent = false;
    // Per-ship spike effects (Open Network spikes are per-ship).
    if (order === 'GQ') ship.spikes = Math.max(0, (ship.spikes||0) - 2);
    if (order === 'SR') ship.spikes = 0;
    if (order === 'DC' && !ship.destroyed && !ship.offTable) {
      ship.dcThisRound = true;
      if (!ship.dcRepaired) {
        ship.dcRepaired = true;
        const rec = (def.tonnage === 'H' || def.tonnage === 'C') ? Math.ceil(rollDie() / 2) : 1;
        ship.hull = Math.min(ship.maxHull, ship.hull + rec);
        flashLaunchMsg(`${def.name} Damage Control: +${rec} Hull`, true);
      }
    }
    renderAll(); return;
  }
  // Turn buttons
  // Clear trail / undo
  if (e.target.matches('[data-flyoff]')) {
    const [gid, si] = e.target.dataset.flyoff.split('|');
    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && objectivesBeyondEligible(gid, parseInt(si))) {
      ship.flewOff = true; ship.offTable = true;
      flashLaunchMsg(`${getDef(gid).name} flies off (Objectives Beyond)`, true);
    }
    renderAll(); return;
  }
  if (e.target.matches('[data-bt-flyoff]')) {
    const [gid, si] = e.target.dataset.btFlyoff.split('|');
    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && breakthroughFlyoffEligible(gid, parseInt(si))) {
      const def = getDef(gid);
      ship.flewOff = true; ship.offTable = true;
      state.breakthroughFlyoff = state.breakthroughFlyoff || { ucm: 0, shal: 0 };
      state.breakthroughFlyoff[def.side] += shipPoints(def);
      flashLaunchMsg(`${def.name} flies off (Breakthrough · +${shipPoints(def)} pts)`, true);
    }
    renderAll(); return;
  }
  // Undo Deploy — send a placed ship back off-table (before it has moved).
  if (e.target.matches('[data-undo-deploy]')) {
    const [gid] = e.target.dataset.undoDeploy.split('|');
    const grp = state.groups[gid];
    const def = getDef(gid);
    if (grp && def) {
      let removed = 0;
      grp.ships.forEach((ship, si) => {
        if (!ship.offTable && !ship.movedThisRound) {
          ship.offTable = true;
          ship.x = undefined; ship.y = undefined; ship.heading = undefined;
          ship.deployedRound = undefined; ship.justArrived = false;
          if (state.aiming && state.aiming.gid === gid && state.aiming.si === si) state.aiming = null;
          removed++;

      });
      if (removed) {
        grp.order = null; // clear any order set during this partial deployment
        state.selectedShipIdx = null;
        logEvent(`${def.name} deployment undone (${removed} ship${removed!==1?'s':''} returned off-table)`);
        flashLaunchMsg(`${def.name} returned off-table`);
        renderAll();

    return;
  }
  if (e.target.matches('[data-hold-position]')) {
    const [gid, si] = e.target.dataset.holdPosition.split('|');
    const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
    if (ship && !ship.movedThisRound) {
      // Record a 0" move so the ship counts as having completed movement and may fire.
      ship._preHoldPos = { x: ship.x, y: ship.y, heading: ship.heading }; // for UNDO
      ship.movedThisRound = true;
      const grp = state.groups[gid];
      grp.moveTrail = grp.moveTrail || [];
      grp.moveTrail.push({ si: parseInt(si), x: ship.x, y: ship.y, heading: ship.heading, hold: true });
      logEvent && logEvent(`${getDef(gid).name} #${parseInt(si)+1} held position`);
      renderAll();
    }
    return;
  }
  if (e.target.matches('[data-clear-trail]')) {
    const [gid, si] = e.target.dataset.clearTrail.split('|');
    const grp = state.groups[gid];
    const cs = grp && grp.ships[parseInt(si)];
    // Can't undo a move once the ship has fired, used its Detector, or launched.
    if (cs && (cs.firedThisActivation || cs.detectorUsed || (cs.launchedThisRound > 0))) {
      flashLaunchMsg("Can't undo move after firing / detecting / launching");
      return;
    }
    const trail = grp.moveTrail || [];
    // find last trail entry for this ship
    for (let i = trail.length - 1; i >= 0; i--) {
      if (trail[i].si === parseInt(si)) {
        const prev = trail[i];
        grp.ships[si].x = prev.x;
        grp.ships[si].y = prev.y;
        grp.ships[si].heading = prev.heading;
        if (prev.layer !== undefined) grp.ships[si].layer = prev.layer;
        grp.ships[si].movedThisRound = false;
        trail.splice(i, 1);
        break;
      }
    }
    // Any aim / second-move in progress for this ship is cancelled by the undo.
    state.aiming = null;
    state.vectoredSecondMove = null;
    state.hoverPoint = null;
    // If the ship now has no remaining trail entries, it's back at its start
    // position — deselect it so it's no longer locked into targeting a move.
    const stillHasTrail = (grp.moveTrail || []).some(t => t.si === parseInt(si));
    if (!stillHasTrail && state.selectedShipIdx === parseInt(si)) {
      state.selectedShipIdx = null;
    }
    renderAll(); return;
  }
  // Finish activation
  if (e.target.matches('[data-finish-activation]')) {
    const gid = e.target.dataset.finishActivation;
    const grp = state.groups[gid];
    // Each ship must move once per round — warn if any non-destroyed ships haven't.
    const unmoved = grp.ships.filter(s => !s.destroyed && !s.movedThisRound);
    if (unmoved.length > 0) {
      const ok = confirm(
        `${unmoved.length} ship${unmoved.length>1?'s':''} in this Group ${unmoved.length>1?'have':'has'} not moved this round.\n\n` +
        `Each ship must move once per round. Finish activation anyway?`
      );
      if (!ok) return;
    }
    const fdef = getDef(gid);
    if (onIndividualOrders(fdef, grp)) {
      // Open Network: each ship resolves its own Order's end-of-activation effects.
      grp.ships.forEach(s => {
        if (s.destroyed) return;
        if (s.order === 'WF') addShipSpikes(s, fdef, 2);
        if (s.order === 'CC') addShipSpikes(s, fdef, 1);
        if (s.order === 'MT') addShipSpikes(s, fdef, 2);
        if (s.order === 'SR') s.sigSilent = true;
      });
    } else {
      // Apply end-of-activation spikes from Order:
      if (grp.order === 'WF') addGroupSpikes(grp, fdef, 2);
      if (grp.order === 'CC') addGroupSpikes(grp, fdef, 1);
      if (grp.order === 'MT') addGroupSpikes(grp, fdef, 2);
      // Silent Running: Signature drops to 0" at end of activation (until next activation).
      if (grp.order === 'SR') {
        grp.ships.forEach(s => { if (!s.destroyed) s.sigSilent = true; });
      }
    }
    // ── END-OF-ACTIVATION DAMAGE ──
    const variantKey = state.scenario && state.scenario.variant;
    const expansiveAtmo = variantKey === 'expansive_atmosphere';
    const orbitalComplex = variantKey === 'orbital_complex';
    const ord = onIndividualOrders(fdef, grp) ? null : grp.order;
    const endDmgLog = [];
    grp.ships.forEach((s, si) => {
      if (s.destroyed || s.offTable) return;
      let dmg = 0;
      const is2D3 = fdef.tonnage === 'C';
      const d3 = () => Math.ceil(rollDie()/2);
      // Non-Descent ship ending its activation in Atmosphere takes D3 (Colossal 2D3).
      if ((s.layer === 'atmosphere') && !/Descent/i.test(fdef.special || '')) {
        const a = d3() + (is2D3 ? d3() : 0); dmg += a;
        endDmgLog.push(`${fdef.name}: ${a} (atmosphere)`);
      }
      // Orbital Complex variant: Orbital Decay tokens cause D3 (Colossal 2D3) at end of activation.
      if (orbitalComplex && s.crippling && s.crippling.includes('decay')) {
        const a = d3() + (is2D3 ? d3() : 0); dmg += a;
        endDmgLog.push(`${fdef.name}: ${a} (orbital decay)`);
      }
      // Expansive Atmosphere variant: groups on Course Change / Max Thrust take 1 hit
      // (Energy or Kinetic save) at end of activation.
      const o = onIndividualOrders(fdef, grp) ? s.order : grp.order;
      if (expansiveAtmo && (o === 'CC' || o === 'MT')) {
        const sv = Math.min(saveVal(fdef.es) || 7, saveVal(fdef.ks) || 7);
        if (sv == null || rollDie() < sv) { dmg += 1; endDmgLog.push(`${fdef.name}: 1 (Expansive Atmosphere)`); }
      }
      if (dmg > 0) {
        s.hull = Math.max(0, s.hull - dmg);
        if (s.hull <= 0 && !s.destroyed) {
          s.destroyed = true;
          if (isCapital(fdef)) { const ex = makeExplosionRoll(gid, si, fdef, s); applyExplosionEffect(ex, { explodeQueue: [] }); }
        }
      }
      // Regenerate-X: recover X lost Hull at the end of activation (if it survived).
      const reg = (fdef.special || '').match(/Regenerate-(\d)/i);
      if (reg && !s.destroyed && s.hull < s.maxHull) {
        const heal = Math.min(parseInt(reg[1]), s.maxHull - s.hull);
        if (heal > 0) { s.hull += heal; endDmgLog.push(`${fdef.name}: +${heal} Hull (Regenerate)`); }
      }
    });
    if (endDmgLog.length) flashLaunchMsg(`End-of-activation damage: ${endDmgLog.join(', ')}`);
    grp.activated = true;
    state.selectedShipIdx = null;
    state.selectedGroupId = null;
    advanceActiveSide(); // alternate to the other faction
    renderAll(); return;
  }
  // End round
  if (e.target.matches('#pass-activation')) {
    const P = state.planning;
    if (P && state.activeSide && P.passTokens[state.activeSide] > 0) {

      flashLaunchMsg(`${FACTIONS[state.factions[state.activeSide]].name} passes`);
      // Hand activation to the other side (mirrors finish-activation alternation).
      const other = state.activeSide === 'ucm' ? 'shal' : 'ucm';
      if (sideHasPendingActivation(other)) state.activeSide = other;

  }

    renderAll(); return;

    const da = state.dropsiteActivation;

      state.featureAttack = { dsId, fi, side: da.side };

    const da = state.dropsiteActivation;
    const meta = launchMeta(type);
    const f = FEATURES[ds.features[parseInt(fi)]];
    const lentry = f && f.launch && f.launch.find(x => x.type === type);
    state.launching = {

      x: inchToPx(ds.x), y: inchToPx(ds.y), fighters: 0, bombers: 0, fireships: 0,
      assetCount: (type === 'torpedo' || type === 'mine') ? ((lentry && lentry.n) || 1) : undefined

  if (e.target.matches('[data-da-fb]')) {

        state.launching.fireships = Math.max(0, (state.launching.fireships||0) + parseInt(delta));

        const next = Math.max(0, (state.launching[which]||0) + parseInt(delta));

  }

    state.launching = null;
    renderAll(); return;
  }

  if (e.target.matches('#da-finish-ds')) {
    const da = state.dropsiteActivation;
    if (da.dsId && !da.done.includes(da.dsId)) da.done.push(da.dsId);
    da.dsId = null;
    // Cancel any in-progress weapon targeting / launch placement and remove its radius.
    state.featureAttack = null;
    state.launching = null;
    state.selectedDropsiteId = null;
    renderAll(); return;
  }

  if (e.target.matches('#da-next-side')) {

    const r = assignGroundToFeature(ds, actor, e.target.dataset.bcFeat);

    renderAll(); return;
  }

  if (e.target.matches('#bc-skip-assign')) {

    else bcResolveDropsite(bc, ds);
    renderAll(); return;
  }

    state.battalionCombat.dsId = null;
    renderAll(); return;
  }

    state.assetPhase.resolved = true;
    renderAll(); return;
  }

    state.assetActiveSide = null;

  }

  // move was recorded), so it can be activated again this turn.
  if (e.target.closest && e.target.closest('#asset-detail-reset')) {

    if (a) {

    if (a && state.planning && state.planning.ap[a.side] >= 2) {
      state.planning.ap[a.side] -= 2; a.moved = false; a.t2t = true; a._t2tRange = 6;
      logEvent(`${factionName(a.side)} used Time to Target (2 AP)`);
      flashLaunchMsg(`${factionName(a.side)} Time to Target: move again ≤6"`);
      renderAll();
    }
    return;
  }
  // Asset detail panel: LOCK a bomber/fire ship/torpedo target (resolved later, pooled).
  if (e.target.closest && e.target.closest('[data-asset-target]')) {
    const btn = e.target.closest('[data-asset-target]');
    const a = state.assetMove && state.launchedAssets.find(x => x.id === state.assetMove.id);
    if (a) {
      const [gid, si] = btn.dataset.assetTarget.split('|');
      a.bomberTarget = { gid, si: parseInt(si) };
      flashLaunchMsg(`${a.kind} locked onto ${getDef(gid).name}`, true);
      state.assetMove = null;
    }

  }

  if (e.target.closest && e.target.closest('#asset-detail-untarget')) {

  if (e.target.matches('[data-destroy-feature]')) {

    if (ds) {

    state.assetMove = null;

  }

  if (e.target.matches('#commit-deploy-top')) {

  }

  if (e.target.matches('[data-scenery-tool]') || (e.target.closest && e.target.closest('[data-scenery-tool]'))) {

    const type = btn.dataset.sceneryTool;

  }

  if (e.target.matches('#reset-game')) {
    if (confirm('Reset everything — scenario, ships, positions?')) {
