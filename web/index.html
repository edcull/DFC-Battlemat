    // Launch is disallowed on Max Thrust, Damage Control, and Silent Running.
    const launchOrder = selShip ? effectiveOrder(def, grp, state.selectedShipIdx) : null;
    const launchBlockedByOrder = ['MT','DC','SR'].includes(launchOrder);
    // Movement must occur before launching: for group orders the whole group finishes
    // first; individual-order ships gate on their own move.
    const launchNeedsMove = launchOrder && ORDERS[launchOrder] && ORDERS[launchOrder].moveMax > 0;
    const launchIndividual = def.openNetwork || onIndividualOrders(def, grp);
    const launchMoved = !launchNeedsMove || (launchIndividual ? (selShip && selShip.movedThisRound) : groupMovementComplete(def, grp));
    const canLaunch = state.phase === 'play' && selShip && !selShip.destroyed && !selShip.offTable && !selShipOOF && !launchBlockedByOrder && launchMoved;
    launchHTML = `<div class="panel-section">
      <div class="panel-title">Launch Assets${selShipOOF ? ' · <span style="color:var(--hull-crit)">disabled (out of formation)</span>' : launchBlockedByOrder ? ` · <span style="color:var(--hull-crit)">disabled (${launchOrder})</span>` : (!launchMoved ? ' · <span style="color:var(--text-mute)">move first</span>' : '')}</div>`;
    def.launch.forEach((l, li) => {
      const meta = launchMeta(l.type);
      const isActive = state.launching && state.launching.gid === gid
                       && state.launching.si === state.selectedShipIdx && state.launching.type === l.type;
      // Remaining launch capacity this round for the selected ship.
      const used = selShip ? (selShip.launchedThisRound || 0) : 0;
      const remaining = Math.max(0, l.n - used);
      // Linked launches (e.g. Bulk Landers / Fire Ships): using one disables the
      // other for the rest of the round.
      const usedLinks = (selShip && selShip.usedLinks) || {};
      const linkedOut = l.link && usedLinks[l.link] && usedLinks[l.link] !== l.type;
      const exhausted = canLaunch && (remaining <= 0 || linkedOut);
      const exhaustNote = linkedOut ? '· other option used' : 'all launched';
      launchHTML += `<div class="weapon-row" ${canLaunch && !exhausted ? `data-launch="${gid}|${state.selectedShipIdx}|${l.type}|${li}" style="cursor:pointer;${isActive ? 'border-left:3px solid var(--'+sideClass+');background:rgba(74,214,255,0.06);' : ''}"` : (selShipOOF || exhausted ? 'style="opacity:0.45;"' : '')}>
        <div class="weapon-name">${l.name}${isActive ? ' <span style="color:var(--'+sideClass+')">◉</span>' : ''}${exhausted ? ` <span style="color:var(--text-mute);font-size:8.5px;">· ${exhaustNote}</span>` : ''}</div>
        <div class="weapon-stats">${canLaunch ? `${remaining}/${l.n} left` : `Launch ${l.n}/round`} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
        ${canLaunch && !isActive && !exhausted ? `<div class="weapon-special" style="color:var(--text-mute);">Click to launch from Ship #${state.selectedShipIdx+1}</div>` : ''}`;
      // Fighters/Bombers: counter sub-UI when active.
      if (isActive && l.type === 'fighter_bomber') {
        const f = state.launching.fighters || 0;
        const b = state.launching.bombers || 0;
        const fDis = b > 0;     // mutually exclusive
        const bDis = f > 0;
        const cap = remaining;  // can't launch more than remaining capacity
        launchHTML += `<div class="launch-counter">
          <div class="lc-row">
            <span class="lc-lbl">Fighters</span>
            <button class="hp-btn" data-fb-adj="fighters|-1" ${fDis||f<=0?'disabled':''}>−</button>
            <span class="lc-val" style="color:var(--${sideClass})">${f}</span>
            <button class="hp-btn" data-fb-adj="fighters|1" ${fDis||f>=cap?'disabled':''}>+</button>
          </div>
          <div class="lc-row">
            <span class="lc-lbl">Bombers</span>
            <button class="hp-btn" data-fb-adj="bombers|-1" ${bDis||b<=0?'disabled':''}>−</button>
            <span class="lc-val" style="color:var(--${sideClass})">${b}</span>
            <button class="hp-btn" data-fb-adj="bombers|1" ${bDis||b>=cap?'disabled':''}>+</button>
          </div>
          <div class="weapon-special" style="color:var(--${sideClass});margin-top:4px;">
            ${(f+b) > 0 ? `Click a point in range to deploy <b>${f>0?f+' Fighter'+(f>1?'s':''):b+' Bomber'+(b>1?'s':'')}</b>` : 'Set Fighters or Bombers, then click the map'}
          </div>
          <button class="btn" data-launch-cancel="1" style="width:100%;margin-top:4px;">Cancel</button>
        </div>`;
      } else if (isActive && l.type === 'fireship') {
        const fs = state.launching.fireships || 0;
        const cap = remaining;
        launchHTML += `<div class="launch-counter">
          <div class="lc-row">
            <span class="lc-lbl">Fire Ships</span>
            <button class="hp-btn" data-fs-adj="-1" ${fs<=0?'disabled':''}>−</button>
            <span class="lc-val" style="color:var(--${sideClass})">${fs}</span>
            <button class="hp-btn" data-fs-adj="1" ${fs>=cap?'disabled':''}>+</button>
          </div>
          <div class="weapon-special" style="color:var(--${sideClass});margin-top:4px;">
            ${fs > 0 ? `Click a point in range to deploy <b>${fs} Fire Ship${fs>1?'s':''}</b>` : 'Set Fire Ships, then click the map'}
          </div>
          <button class="btn" data-launch-cancel="1" style="width:100%;margin-top:4px;">Cancel</button>
        </div>`;
      } else if (isActive) {
        launchHTML += `<div class="weapon-special" style="color:var(--${sideClass});">${launchHint(meta.target)} · click again to cancel</div>`;
      }
      launchHTML += `</div>`;
    });
    if (!canLaunch && !selShipOOF) {
      launchHTML += `<div class="help-tip ${sideClass}" style="color:var(--text-mute);">Select a ship on the board (in play) to launch assets.</div>`;
    }
    launchHTML += `</div>`;
  }

  // Payload (Porter) management — show attached payloads on the selected Porter
  // ship, with Detach (place within 3") and Reattach (pick up within 3") actions.
  // Always visible when a Porter ship is selected; actions enabled per Order
  // (like weapons/launch), disabled until an Order allows launching.
  let payloadHTML = '';
  if (def.porter && state.selectedShipIdx !== null) {
    const selShip = grp.ships[state.selectedShipIdx];
    const attached = payloadShips(def.side).filter(p => {
      const a = p.ship.attachedTo; return a && a.gid === gid && a.si === state.selectedShipIdx;
    });
    const usedCap = attached.length;
    const freeCap = (def.porter.cap || 1) - usedCap;
    const eo = effectiveOrder(def, grp, state.selectedShipIdx);
    const launchOk = state.phase === 'play' && eo && ORDERS[eo] && ORDERS[eo].fireRule !== 'none' && !selShip.destroyed && !selShip.offTable;
    payloadHTML = `<div class="panel-section">
      <div class="panel-title">Payloads <span class="count">${usedCap}/${def.porter.cap}</span></div>`;
    if (!attached.length) {
      payloadHTML += `<div style="font-size:10px;color:var(--text-mute);font-style:italic;">No payloads attached.</div>`;
    } else {
      attached.forEach(p => {
        payloadHTML += `<div class="weapon-row">
          <div class="weapon-name">${p.def.name}${(p.def.groupSize||1)>1?` #${p.si+1}`:''} <span style="color:var(--text-mute);font-size:9px;">${p.def.payload.size}-payload</span></div>
          ${launchOk
            ? `<button class="btn ${sideClass==='shal'?'shal':''}" data-payload-detach="${p.gid}|${p.si}" style="width:100%;margin-top:4px;">DETACH ▸ place within 3"</button>`
            : `<div class="weapon-special" style="color:var(--text-mute)">${state.phase==='play' ? 'Set a launch-capable Order to detach (GQ/WF/SR/CC).' : 'Detaches in play.'}</div>`}
        </div>`;
      });
    }
    // Reattach: free capacity + a detached same-size payload within 3" of this Porter.
    if (freeCap > 0) {
      const candidates = detachedReattachCandidates(def.side, selShip, def.porter.size);
      if (state.phase === 'play' && launchOk && candidates.length) {
        payloadHTML += `<button class="btn ${sideClass==='shal'?'shal':''}" data-payload-reattach="${gid}|${state.selectedShipIdx}" style="width:100%;margin-top:6px;">⊕ REATTACH ▸ pick within 3"</button>`;
      } else if (state.phase === 'play') {
        payloadHTML += `<div style="font-size:9px;color:var(--text-mute);margin-top:6px;">Reattach: ${!launchOk ? 'needs a launch-capable Order' : 'no detached payload within 3"'}.</div>`;
      }
    }
    payloadHTML += `</div>`;
  }

  // Ships list
  const multiShip = grp.ships.filter(s => !s.destroyed && !s.offTable).length > 1;
  let shipsHTML = `<div class="panel-section">
    <div class="panel-title">Ships <span class="count">${grp.ships.filter(s=>!s.destroyed).length}/${grp.ships.length}</span></div>
    <div class="ship-list">`;
  grp.ships.forEach((ship, si) => {
    const pct = ship.hull / ship.maxHull;
    const hpCls = ship.destroyed ? 'dead' : pct <= 0.34 ? 'crit' : pct <= 0.6 ? 'warn' : '';
    const isSelected = state.selectedShipIdx === si && !ship.destroyed;
    const isLead = (grp.leadShipIdx || 0) === si;
    shipsHTML += `<div class="ship-row" style="${isSelected ? 'background:rgba(74,214,255,0.05);padding-left:4px;' : ''}">
      <span class="ship-idx">#${si+1}</span>
      <span class="ship-nm">${def.name.replace(/ [αβγ]$/, '')} ${grp.ships.length > 1 ? `(${si+1})` : ''}
        ${isLead && multiShip && !noFormation(def) ? `<span style="color:var(--${sideClass});font-size:8.5px;">✦ lead</span>` : ''}
        ${ship.offTable && !ship.destroyed ? '<span style="color:var(--text-mute);font-size:8.5px;">· off-table</span>' : ''}
        ${ship.movedThisRound ? '<span style="color:var(--text-mute);font-size:8.5px;">· moved</span>' : ''}
        ${oofSet.has(si) ? '<span style="color:var(--hull-crit);font-size:8.5px;">· out of formation</span>' : ''}
        ${ship.fireTokens ? `<span style="color:var(--hull-crit);font-size:8.5px;">· 🔥${ship.fireTokens}</span>` : ''}
        ${ship.crippling && ship.crippling.filter(c=>c!=='fire').length ? `<span style="color:var(--hull-warn);font-size:8.5px;">· ${ship.crippling.filter(c=>c!=='fire').map(c=>CRIPPLE_LABEL[c]||c).join(', ')}</span>` : ''}
        ${ship.battalions && (ship.battalions[def.side==='ucm'?'shal':'ucm']>0) ? `<span style="color:var(--hull-crit);font-size:8.5px;">· ⚔${ship.battalions[def.side==='ucm'?'shal':'ucm']} boarders</span>` : ''}
      </span>
      ${multiShip && !noFormation(def) && !ship.destroyed && !ship.offTable && !isLead ? `<button class="hp-btn" data-lead="${gid}|${si}" title="Nominate lead">✦</button>` : ''}
      <span class="ship-hp ${hpCls}">${ship.destroyed ? 'KIA' : ship.hull+'/'+ship.maxHull}</span>
      <div class="hp-btns">
        <button class="hp-btn" data-hpd="${gid}|${si}">−</button>
        <button class="hp-btn" data-hpu="${gid}|${si}">+</button>
      </div>
    </div>`;
  });
  shipsHTML += `</div></div>`;

  // Formation status + benefit card (multi-ship groups in play).
  let formationHTML = '';
  if (def.openNetwork) {
    // Open Network groups don't use coherency/formation/lead at all.
    formationHTML = `<div class="panel-section">
      <div class="panel-title" style="color:var(--shal)">Open Network</div>
      <div class="weapon-row" style="border-left:3px solid var(--shal);background:rgba(212,166,71,0.06);">
        <div class="weapon-special" style="color:var(--text-dim);line-height:1.5;">
          • Ships <b>ignore Coherency</b> & gain <b>no Formation Benefits</b><br>
          • <b>No Lead Ship</b> — each Ship targeted, damaged & spiked individually<br>
          • Crippling Effects/Spikes affect only the targeted Ship<br>
          • Ships choose <b>Orders individually</b> when the Group activates<br>
          • From R2: all your Open Network Ships count as one Group (and one Group for Pass Tokens)
        </div>
      </div>
    </div>`;
  } else if (multiShip) {
    const inForm = oofSet.size === 0;
    const coh = coherencyInches(def);
    if (inForm) {
      formationHTML = `<div class="panel-section">
        <div class="panel-title" style="color:var(--hull-good)">In Formation <span style="color:var(--text-mute)">· ${coh}" coherency</span></div>
        <div class="weapon-row" style="border-left:3px solid var(--hull-good);background:rgba(74,214,255,0.05);">
          <div class="weapon-special" style="color:var(--text-dim)">
            • Unmodifiable <b>6+ backup save</b> vs attacks<br>
            • Immune to <b>Navigation Offline</b> & <b>Orbital Decay</b> crippling effects<br>
            • Group ignores <b>Defence Systems Offline</b> (individual ships still affected)
          </div>
        </div>
      </div>`;
    } else {
      formationHTML = `<div class="panel-section">
        <div class="panel-title" style="color:var(--hull-crit)">Out of Formation</div>
        <div class="help-tip ${sideClass}" style="color:var(--hull-crit)">
          ${oofSet.size} ship${oofSet.size>1?'s':''} out of coherency (${coh}").
          Formation benefits are lost until ships regroup${grp.ships.filter(s=>!s.destroyed&&!s.offTable).length>=4?' (within '+coh+'" of ≥2 others)':' (within '+coh+'" of another ship)'}.
        </div>
      </div>`;
    }
  }

  // Layer-split warning — all ships in a group must share an orbital layer.
  // (Open Network ships are independent — no shared-layer requirement.)
  const lsplit = groupLayerSplit(def);
  if (multiShip && !noFormation(def) && lsplit.split) {
    formationHTML += `<div class="panel-section">
      <div class="panel-title" style="color:var(--hull-warn)">Layer Split</div>
      <div class="help-tip ${sideClass}" style="color:var(--hull-warn)">
        Group spans two layers (${lsplit.orbit} in Orbit, ${lsplit.atmo} in Atmosphere).
        All ships in a Group must share an orbital layer — bring them together.
      </div>
    </div>`;
  }

  // Movement / actions for selected ship — only in play phase
  let moveHTML = '';
  if (state.phase === 'deploy') {
    // Show Undo Deploy buttons for placed (on-table, not-yet-moved) ships.
    const hasPlaced = grp.ships.some(s => !s.destroyed && !s.offTable);
    const undoButtons = hasPlaced ? `<button class="btn" data-undo-deploy="${gid}" style="width:100%;margin-top:4px;">↩ UNDO DEPLOY (return all ships off-table)</button>` : '';
    moveHTML = `<div class="panel-section">
      <div class="help-tip ${sideClass}">
        <b>Deployment phase.</b> Select a Group, then click in your DZ to place each ship; move the mouse and click again to set facing. To reposition a placed ship, click it to select, then click a new spot and re-aim.
      </div>
      ${undoButtons}
    </div>`;
  } else if (state.phase === 'play') {
    const selEffOrder = effectiveOrder(def, grp, state.selectedShipIdx);
    if (state.selectedShipIdx !== null && selEffOrder) {
      const ship = grp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed) {
        const o = ORDERS[selEffOrder];
        const minMove = (o.moveMin * def.thrust).toFixed(1);
        const maxMove = (o.moveMax * def.thrust).toFixed(1);
        const moved = ship.movedThisRound;
        // Layer state + effect of the pending toggle.
        const curLayer = ship.layer || 'orbit';
        const normalMaxR = effectiveMaxMovePx(def, ship, grp.order ? effectiveOrder(def, grp, state.selectedShipIdx) : grp.order);
        const lm = layerMove(normalMaxR, ship, state.layerToggle);
        const effMaxIn = (lm.maxPx / INCH).toFixed(1);
        const targetLayer = lm.endLayer;
        const toggleLabel = curLayer === 'orbit'
          ? (state.layerToggle ? '↓ Descending → Atmosphere' : '↓ Descend to Atmosphere')
          : (state.layerToggle ? '↑ Ascending → Orbit (−4")' : '↑ Ascend to Orbit (−4")');
        moveHTML = `<div class="panel-section">
          <div class="panel-title">Ship #${state.selectedShipIdx+1} — Actions</div>
          <div class="move-status ${moved ? 'ok' : ''}">
            <span>Move range</span><b>${minMove}"–${moved ? maxMove : effMaxIn}"</b>
          </div>
          <div class="move-status">
            <span>Turn limit</span><b>${o.turnLimit > 0 ? '±' + o.turnLimit + '°' : 'No turn'}</b>
          </div>
          <div class="move-status">
            <span>Layer</span><b style="color:${curLayer === 'orbit' ? 'var(--ucm)' : 'var(--hull-warn)'}">${curLayer === 'orbit' ? 'ORBIT' : 'ATMOSPHERE'}${state.layerToggle ? ' → ' + (targetLayer === 'orbit' ? 'ORBIT' : 'ATMO') : ''}</b>
          </div>
          ${def.vectored ? `<div class="move-status"><span>Special</span><b style="color:var(--ucm)">Vectored</b></div>` : ''}
          ${!moved ? `<button class="btn ${state.layerToggle ? (sideClass==='shal'?'shal':'') : ''}" data-layer-toggle="1"
              style="width:100%;margin-top:4px;${state.layerToggle ? 'border-color:var(--'+sideClass+');color:var(--'+sideClass+');' : ''}">
              ${toggleLabel}${state.layerToggle ? ' ✓' : ''}</button>` : ''}
          <div class="help-tip ${sideClass}">
            ${moved
              ? `<b style="color:var(--hull-warn)">This ship has already moved this round.</b> Use UNDO MOVE to take it back, or pick another ship.`
              : (o.moveMax > 0
                  ? `Click inside the highlighted cone to move there. Ship <b>refaces</b> toward travel direction.${turnLimitText(o)}`
                  : 'No movement allowed on this Order.')}
            ${!moved && lm.label ? '<br><b>' + lm.label + '</b>' : ''}
            ${selEffOrder === 'CC' && !moved ? '<br><b>Course Change:</b> after moving, aim the bonus ±45° turn with the mouse and click to set.' : ''}
            ${def.vectored && !moved ? '<br><b>Vectored:</b> after moving, pivot ±45° (click), then optionally move again with any leftover thrust.' : ''}
            ${ship.justArrived && !grp.ships.some(s => s.movedThisRound || s.firedThisActivation || (s.launchedThisRound>0) || s.detectorUsed) ? '<br><b style="color:var(--'+sideClass+')">Just deployed:</b> click in your Zone to re-place this ship and re-aim, until the Group acts.' : ''}
          </div>
          <div class="move-actions" style="margin-top:6px;">
            ${!moved && o.moveMax > 0 && (selEffOrder === 'CC' || selEffOrder === 'DC') ? `<button class="btn" data-hold-position="${gid}|${state.selectedShipIdx}" style="width:100%;">⏸ HOLD POSITION (move 0")</button>` : ''}
            ${(ship.firedThisActivation || ship.detectorUsed || (ship.launchedThisRound > 0))
              ? `<button class="btn" disabled style="width:100%;opacity:0.45;cursor:not-allowed;" title="Can't undo move after firing, detecting, or launching">⟲ UNDO MOVE (locked)</button>`
              : `<button class="btn" data-clear-trail="${gid}|${state.selectedShipIdx}" style="width:100%;">⟲ UNDO MOVE</button>`}
            ${objectivesBeyondEligible(gid, state.selectedShipIdx) ? `<button class="btn" data-flyoff="${gid}|${state.selectedShipIdx}" style="width:100%;color:#b59ad6;border-color:#b59ad6;">✈ FLY OFF (Objectives Beyond)</button>` : ''}
            ${breakthroughFlyoffEligible(gid, state.selectedShipIdx) ? `<button class="btn" data-bt-flyoff="${gid}|${state.selectedShipIdx}" style="width:100%;color:#b59ad6;border-color:#b59ad6;">✈ FLY OFF (Breakthrough · ${shipPoints(def)} pts)</button>` : ''}
            <button class="btn-finish-act" data-finish-activation="${gid}">FINISH ACTIVATION ▸</button>
          </div>
        </div>`;
      }
    } else if (grp.order && !grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">
          Order set: <b>${ORDERS[grp.order].label}</b>.<br>
          Click a ship on the board to move it.
        </div>
        <div style="margin-top:6px;">
          <button class="btn-finish-act" data-finish-activation="${gid}">FINISH ACTIVATION ▸</button>
        </div>
      </div>`;
    } else if (!grp.order && !grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">Select an Order first ↑</div>
      </div>`;
    } else if (grp.activated) {
      moveHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">This Group has activated this round. Use END ROUND to reset.</div>
      </div>`;
    }
  }

  div.innerHTML = statsHTML + deployPromptHTML + deployGateHTML + ordersHTML + formationHTML + weaponsHTML + surveyHTML + extractHTML + launchHTML + payloadHTML + shipsHTML + moveHTML;
}

/* ==========================================================================
   RENDERING — BOARD (SVG)
   ========================================================================== */
function renderBoard() {
  const svg = document.getElementById('board');
  let html = '';

  // background grid — 6" major, 1" minor
  html += '<g id="grid">';
  // minor 1"
  for (let i = 1; i < BOARD_IN; i++) {
    if (i % 6 === 0) continue;
    html += `<line x1="${i*INCH}" y1="0" x2="${i*INCH}" y2="${BOARD_PX}" stroke="var(--grid-line)" stroke-width="0.4"/>`;
    html += `<line x1="0" y1="${i*INCH}" x2="${BOARD_PX}" y2="${i*INCH}" stroke="var(--grid-line)" stroke-width="0.4"/>`;
  }
  // major 6"
  for (let i = 6; i < BOARD_IN; i += 6) {
    html += `<line x1="${i*INCH}" y1="0" x2="${i*INCH}" y2="${BOARD_PX}" stroke="var(--grid-line)" stroke-width="1"/>`;
    html += `<line x1="0" y1="${i*INCH}" x2="${BOARD_PX}" y2="${i*INCH}" stroke="var(--grid-line)" stroke-width="1"/>`;
  }
  // Deployment zones — scenario-driven if available, else simple top/bottom strips
  if (state.scenario) {
    html += renderDeploymentZones();
  } else {
    html += `<rect x="0" y="0" width="${BOARD_PX}" height="${6*INCH}" fill="var(--shal)" fill-opacity="0.025"/>`;
    html += `<rect x="0" y="${BOARD_PX - 6*INCH}" width="${BOARD_PX}" height="${6*INCH}" fill="var(--ucm)" fill-opacity="0.025"/>`;
  }
  // Vanguard halo (deploy phase only, when a Vanguard ship is selected)
  html += renderVanguardHalo();
  // Static scenery (planetary rings, large objects)
  if (state.scenarioData) {
    html += renderStaticScenery();
    // Dropsites
    state.scenarioData.dropsites.forEach(d => {
      html += renderDropsite(d);
    });
  }
  // table edge
  html += `<rect x="0" y="0" width="${BOARD_PX}" height="${BOARD_PX}" fill="none" stroke="var(--border-bright)" stroke-width="1"/>`;
  html += '</g>';

  // Render ship arcs/scan FIRST (under) for selected group
  const selGid = state.selectedGroupId;
  if (selGid) {
    const def = getDef(selGid);
    const grp = getGroup(selGid);

    // Formation coherency rings — shown while moving/aiming a ship in a multi-ship
    // group, around the OTHER ships, so the player can see the in-formation area.
    const aliveCount = grp.ships.filter(s => !s.destroyed && !s.offTable).length;
    const selOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    const movingActive = (state.selectedShipIdx !== null && selOrd &&
                          ORDERS[selOrd] && ORDERS[selOrd].moveMax > 0)
                         || (state.aiming && state.aiming.gid === selGid)
                         || (state.vectoredSecondMove && state.vectoredSecondMove.gid === selGid);
    if (aliveCount >= 2 && movingActive && !noFormation(def)) {
      const cohPx = coherencyInches(def) * INCH;
      const cohCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      grp.ships.forEach((s, si) => {
        if (s.destroyed || s.offTable) return;
        if (si === state.selectedShipIdx) return; // don't ring the ship being moved
        html += `<circle cx="${s.x}" cy="${s.y}" r="${cohPx}" fill="none"
                  stroke="${cohCol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.35"/>`;
      });
    }

    // Enemy signature auras — while moving a friendly ship, show every enemy
    // ship's detection bubble = (effective Signature + 3" per Spike) around its base.
    if (movingActive) {
      const enemySide = def.side === 'ucm' ? 'shal' : 'ucm';
      const enemyFleet = fleetForSide(enemySide);
      const enemyCol = 'var(--hull-crit)';
      enemyFleet.forEach(edef => {
        const eg = getGroup(edef.id);
        if (!eg) return;
        const spikes = eg.spikes || 0;
        eg.ships.forEach(es => {
          if (es.destroyed || es.offTable) return;
          // Effective signature: Silent Running drops it to 0.
          const sig = es.sigSilent ? 0 : edef.sig;
          const sigPx = (sig + 3 * spikes) * INCH;
          if (sigPx <= 0) return; // sig 0 and no spikes — nothing to show
          html += `<circle cx="${es.x}" cy="${es.y}" r="${sigPx}" fill="rgba(255,82,82,0.04)"
                    stroke="${enemyCol}" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>`;
        });
      });
    }

    const launchingHere = state.launching && state.launching.gid === selGid;
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      const isSel = state.selectedShipIdx === si;
      // While launching from this ship, suppress its scan/arc overlay (replaced
      // by the launch aura below).
      if (launchingHere && state.launching.si === si) return;
      html += renderShipOverlays(def, ship, isSel);
    });

    // Launch aura — replaces scan/arc overlay on the launching ship.
    if (launchingHere) {
      const lship = grp.ships[state.launching.si];
      if (lship && !lship.destroyed && !lship.offTable) {
        const acol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
        if (state.launching.type === 'gate_dropship') {
          // Shaltari Mothership: visualise the 18" Voidgate chain + 3" drop reach.
          const gates = connectedGateships(def.side, lship.x, lship.y);
          const reachPx = 3 * INCH;
          const CHAIN_PX = 18 * INCH;
          const gsel = state.launching.gateSel;
          // Chain links.
          gates.forEach(g => {
            if (Math.hypot(g.x - lship.x, g.y - lship.y) <= CHAIN_PX) {
              html += `<line x1="${lship.x}" y1="${lship.y}" x2="${g.x}" y2="${g.y}" stroke="${acol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.5"/>`;
            }
          });
          for (let i = 0; i < gates.length; i++) {
            for (let j = i + 1; j < gates.length; j++) {
              if (Math.hypot(gates[i].x - gates[j].x, gates[i].y - gates[j].y) <= CHAIN_PX) {
                html += `<line x1="${gates[i].x}" y1="${gates[i].y}" x2="${gates[j].x}" y2="${gates[j].y}" stroke="${acol}" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.35"/>`;
              }
            }
          }
          // Each connected Voidgate: ring + remaining gateship value. Selected gate
          // is highlighted and shows its 3" drop-reach circle.
          gates.forEach(g => {
            const rem = gateRemaining(g.ship, g.def);
            const isSel = gsel && gsel.si === g.si && gsel.gid === g.def.id;
            const gr = shipBaseRadiusPx(g.def);
            html += `<circle cx="${g.x}" cy="${g.y}" r="${gr + 3}" fill="none"
                      stroke="${acol}" stroke-width="${isSel?2:0.8}" opacity="${rem>0?1:0.35}"/>`;
            html += `<text x="${g.x}" y="${g.y - gr - 5}" font-family="var(--mono)" font-size="7.5"
                      font-weight="700" fill="${acol}" text-anchor="middle"
                      stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">G${rem}</text>`;
            if (isSel) {
              html += `<circle cx="${g.x}" cy="${g.y}" r="${reachPx}"
                        fill="rgba(212,166,71,0.09)" stroke="${acol}" stroke-width="1" stroke-dasharray="4 3"/>`;
            }
          });
          const launchEntry = (def.launch || []).find(x => x.type === 'gate_dropship');
          const cap = launchEntry ? launchEntry.n : 0;
          const motherLeft = cap - (lship.launchedThisRound || 0);
          const lbl = !gates.length ? 'NO VOIDGATE IN CHAIN · right-click to cancel'
            : gsel ? `Pick dropsite within 3" · right-click to cancel · Mothership ${motherLeft} left`
            : `Pick a Voidgate · right-click to cancel · Mothership ${motherLeft}/${cap} Dropships`;
          html += `<text x="${lship.x}" y="${lship.y - 14}" font-family="var(--mono)" font-size="8"
                    font-weight="700" fill="${acol}" text-anchor="middle"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                    pointer-events="none">${lbl}</text>`;
        } else {
          const auraPx = state.launching.auraIn * INCH;
          html += `<circle cx="${lship.x}" cy="${lship.y}" r="${auraPx}"
                    fill="${def.side === 'ucm' ? 'rgba(74,214,255,0.06)' : 'rgba(212,166,71,0.06)'}"
                    stroke="${acol}" stroke-width="1" stroke-dasharray="5 3"/>`;
          html += `<text x="${lship.x}" y="${lship.y - auraPx - 4}" font-family="var(--mono)" font-size="8"
                    font-weight="700" fill="${acol}" text-anchor="middle"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                    pointer-events="none">${state.launching.name.toUpperCase()} ${state.launching.auraIn}"</text>`;
        }
      }
    }

    // Move trail / ghost for selected ship
    const ghostOrd = effectiveOrder(def, grp, state.selectedShipIdx);
    if (state.selectedShipIdx !== null && ghostOrd) {
      const ship = grp.ships[state.selectedShipIdx];
      if (ship && !ship.destroyed && ORDERS[ghostOrd].moveMax > 0 && !ship.movedThisRound) {
        const o = ORDERS[ghostOrd];
        const normalMaxR = effectiveMaxMovePx(def, ship, ghostOrd);
        const lm = layerMove(normalMaxR, ship, state.layerToggle);
        const maxR = lm.maxPx;
        // Min move scales if the layer cap is below the normal min (atmosphere).
        let minR = o.moveMin * def.thrust * INCH;
        if (minR > maxR) minR = 0;
        const turnDeg = o.turnLimit || 0; // 0 = no turn, ship moves straight; 45 = ±45° cone
        const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';

        // Draw the LEGAL MOVE CONE — annular wedge between minR and maxR, ±turnDeg from facing.
        // Always show this cone whenever a ship with a move-allowing order is selected.
        html += renderMoveCone(ship.x, ship.y, ship.heading, minR, maxR, turnDeg, sideCol);

        // Hover ghost
        if (state.hoverPoint) {
          const dx = state.hoverPoint.x - ship.x;
          const dy = state.hoverPoint.y - ship.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const inRange = dist >= minR - 1 && dist <= maxR + 1;
          // Angle between facing and target vector
          const fwd = headingVec(ship.heading);
          const cosAngle = (fwd.x * dx + fwd.y * dy) / Math.max(0.0001, dist);
          const clampedCos = Math.max(-1, Math.min(1, cosAngle));
          const angleDeg = Math.acos(clampedCos) * 180 / Math.PI;
          const inCone = angleDeg <= turnDeg + 0.5;
          const finalOk = inRange && inCone;

          // Direction of travel becomes the new facing
          const travelHeading = Math.atan2(dy, dx) * 180 / Math.PI;

          const ghostColor = finalOk ? sideCol : 'var(--hull-crit)';
          // Line from ship to target
          html += `<line x1="${ship.x}" y1="${ship.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}"
                    stroke="${ghostColor}" stroke-width="1" stroke-dasharray="4 3" opacity="0.75"/>`;
          // Ghost ship rotated to face travel direction (only if finalOk; else keep original facing for visual clarity)
          const ghostShip = {
            ...ship,
            x: state.hoverPoint.x,
            y: state.hoverPoint.y,
            heading: finalOk ? travelHeading : ship.heading
          };
          html += renderShipMarker(def, ghostShip, true, finalOk);
          const distIn = (dist / INCH).toFixed(1);
          const turnFromFacing = Math.round(angleDeg);
          // Label: distance + turn-required
          let labelText = `${distIn}"`;
          if (turnDeg > 0 && finalOk) labelText += ` · ${turnFromFacing}°`;
          else if (!inCone && turnDeg === 0) labelText = `${distIn}" · NO TURN`;
          else if (!inCone) labelText = `${distIn}" · ${turnFromFacing}° > ${turnDeg}°`;
          else if (!inRange) labelText = `${distIn}" OUT OF RANGE`;
          html += `<text x="${state.hoverPoint.x + 10}" y="${state.hoverPoint.y - 8}"
                    font-family="var(--mono)" font-size="9" font-weight="500"
                    fill="${ghostColor}"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  >${labelText}</text>`;
        }
      }
    }

    // Vectored second move overlay — straight-ahead range 0"–remaining, no turn.
    if (state.vectoredSecondMove && state.vectoredSecondMove.gid === selGid) {
      const v = state.vectoredSecondMove;
      const vship = grp.ships[v.si];
      if (vship && !vship.destroyed) {
        const sideCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
        const maxR = v.remaining;
        // Draw a thin straight-ahead corridor (turnDeg ~0) from the ship's nose.
        html += renderMoveCone(vship.x, vship.y, vship.heading, 0, maxR, 0, sideCol);

        if (state.hoverPoint) {
          const dx = state.hoverPoint.x - vship.x;
          const dy = state.hoverPoint.y - vship.y;
          const dist = Math.hypot(dx, dy);
          const fwd = headingVec(vship.heading);
          const cosAngle = (fwd.x * dx + fwd.y * dy) / Math.max(0.0001, dist);
          const angleDeg = Math.acos(Math.max(-1, Math.min(1, cosAngle))) * 180 / Math.PI;
          const inRange = dist <= maxR + 1;
          const straight = angleDeg <= 20;
          const finalOk = inRange && straight;
          const ghostColor = finalOk ? sideCol : 'var(--hull-crit)';
          html += `<line x1="${vship.x}" y1="${vship.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}"
                    stroke="${ghostColor}" stroke-width="1" stroke-dasharray="4 3" opacity="0.75"/>`;
          // Ghost keeps current heading (no turn on second move).
          const ghostShip = { ...vship, x: state.hoverPoint.x, y: state.hoverPoint.y, heading: vship.heading };
          html += renderShipMarker(def, ghostShip, true, finalOk);
          const distIn = (dist / INCH).toFixed(1);
          const remIn = (maxR / INCH).toFixed(1);
          let labelText = `${distIn}" / ${remIn}"`;
          if (!straight) labelText = `${distIn}" · NO TURN`;
          else if (!inRange) labelText = `${distIn}" OUT OF RANGE`;
          html += `<text x="${state.hoverPoint.x + 10}" y="${state.hoverPoint.y - 8}"
                    font-family="var(--mono)" font-size="9" font-weight="500"
                    fill="${ghostColor}"
                    stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  >${labelText}</text>`;
        }
      }
    }
  }
  // Movement traces — faint dashed path from each ship's start-of-turn position
  // through its move(s) to its current spot. Cleared on Finish Activation / round end.
  allDefs().forEach(def => {
    const grp = getGroup(def.id);
    const trail = grp.moveTrail || [];
    if (!trail.length) return;
    const traceCol = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      if (payloadAttached(ship)) return;
      // Gather this ship's trail points (previous positions), in order, then current.
      const pts = trail.filter(t => t.si === si).map(t => ({ x: t.x, y: t.y }));
      if (!pts.length) return;
      pts.push({ x: ship.x, y: ship.y });
      let d = `M ${pts[0].x} ${pts[0].y}`;
      for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
      html += `<path d="${d}" fill="none" stroke="${traceCol}" stroke-width="1"
                stroke-dasharray="2 3" opacity="0.5"/>`;
      // Small origin marker at the start point.
      html += `<circle cx="${pts[0].x}" cy="${pts[0].y}" r="2" fill="${traceCol}" opacity="0.5"/>`;
    });
  });

  allDefs().forEach(def => {
    const grp = getGroup(def.id);
    const oof = outOfFormationSet(def);
    grp.ships.forEach((ship, si) => {
      if (ship.destroyed || ship.offTable) return;
      if (payloadAttached(ship)) return; // attached payloads ride inside their Porter
      const isSel = state.selectedGroupId === def.id && state.selectedShipIdx === si;
      const isInSelGroup = state.selectedGroupId === def.id;
      html += renderShipMarker(def, ship, false, true, isSel, isInSelGroup, si);
      const r = shipBaseRadiusPx(def);
      // Lead-ship marker — small ✦ above the base (not for Open Network).
      if (!noFormation(def) && (grp.leadShipIdx || 0) === si && grp.ships.filter(s => !s.destroyed && !s.offTable).length > 1) {
        html += `<text x="${ship.x}" y="${ship.y - r - 4}" font-family="var(--mono)" font-size="9"
                  font-weight="700" fill="${def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)'}"
                  text-anchor="middle" pointer-events="none">✦</text>`;
      }
      // Out-of-formation marker — red dashed ring + tag.
      if (oof.has(si)) {
        html += `<circle cx="${ship.x}" cy="${ship.y}" r="${r + 3}" fill="none"
                  stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="2 2"/>`;
        html += `<text x="${ship.x}" y="${ship.y + r + 11}" font-family="var(--mono)" font-size="7"
                  font-weight="700" fill="var(--hull-crit)" text-anchor="middle"
                  stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  pointer-events="none">OUT OF FORM.</text>`;
      }
      // Atmosphere layer badge — small "ATMO" pill below the base.
      if ((ship.layer || 'orbit') === 'atmosphere') {
        html += `<text x="${ship.x}" y="${ship.y + r + (oof.has(si) ? 19 : 11)}" font-family="var(--mono)" font-size="6.5"
                  font-weight="700" fill="var(--hull-warn)" text-anchor="middle"
                  stroke="var(--bg)" stroke-width="2" paint-order="stroke"
                  pointer-events="none">ATMO</text>`;
      }
    });
  });

  // Dropsite-origin launch aura (Activate Dropsites step).
  if (state.launching && state.launching.fromDropsite) {
    const L = state.launching;
    const auraPx = L.auraIn * INCH;
    const acol = L.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    html += `<circle cx="${L.x}" cy="${L.y}" r="${auraPx}"
      fill="${L.side==='ucm'?'rgba(74,214,255,0.06)':'rgba(212,166,71,0.06)'}"
      stroke="${acol}" stroke-width="1" stroke-dasharray="5 3"/>`;
    html += `<text x="${L.x}" y="${L.y - auraPx - 4}" font-family="var(--mono)" font-size="8"
      font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2"
      paint-order="stroke" pointer-events="none">${L.name.toUpperCase()} ${L.auraIn}"</text>`;
  }

  // Dropsite Feature WEAPON scan radius (while targeting a feature attack).
  if (state.featureAttack) {
    const fa = state.featureAttack;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === fa.dsId);
    const f = ds && FEATURES[ds.features[fa.fi]];
    if (ds && f && f.weapon) {
      const scanPx = (parseInt(f.weapon.scan) || 6) * INCH;
      const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
      const acol = fa.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      html += `<circle cx="${dsx}" cy="${dsy}" r="${scanPx}"
        fill="rgba(255,82,82,0.05)" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="4 3"/>`;
      html += `<text x="${dsx}" y="${dsy - scanPx - 4}" font-family="var(--mono)" font-size="8"
        font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2"
        paint-order="stroke" pointer-events="none">${f.weapon.name.toUpperCase()} ${parseInt(f.weapon.scan)||6}"</text>`;
    }
  }

  // Extract range aura: ship in extract-targeting mode shows its 6" reach to Dropsites.
  if (state.extracting) {
    const eg = state.groups[state.extracting.gid];
    const es = eg && eg.ships[state.extracting.si];
    if (es && !es.destroyed && !es.offTable) {
      const rPx = 6 * INCH;
      html += `<circle cx="${es.x}" cy="${es.y}" r="${rPx}" fill="rgba(181,154,214,0.06)" stroke="#b59ad6" stroke-width="1" stroke-dasharray="5 3"/>
        <text x="${es.x}" y="${es.y - rPx - 4}" font-family="var(--mono)" font-size="8" font-weight="700" fill="#b59ad6" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">EXTRACT 6"</text>`;
    }
  }

  // Explosion radius aura: while an Explosion is pending/resolving in the attack modal,
  // show its blast radius so the player sees which ships are caught.
  if (state.attackModal && state.attackModal.step === 'explosion' && state.attackModal.explodeQueue && state.attackModal.explodeQueue[0]) {
    const ex = state.attackModal.explodeQueue[0];
    const mult = (ex.rolled && ex.effKind === 'spike2x') ? 2 : 1;
    const rPx = ex.rangeIn * INCH * mult;
    html += `<circle cx="${ex.x}" cy="${ex.y}" r="${rPx}" fill="rgba(255,82,82,0.10)" stroke="var(--hull-crit)" stroke-width="1.5" stroke-dasharray="6 4">
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="1.1s" repeatCount="indefinite"/></circle>
    <text x="${ex.x}" y="${ex.y - rPx - 5}" font-family="var(--mono)" font-size="9" font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">💥 ${ex.rangeIn * mult}"</text>`;
  }

  // Enemy signature auras during Dropsite Activation (and while targeting a feature
  // weapon): weapon range = Scan + (effective Signature + 3"/Spike), so show each
  // enemy ship's detection bubble around its base.
  if ((state.dropsiteActivation && state.dropsiteActivation.dsId) || state.featureAttack) {
    const actSide = state.featureAttack ? state.featureAttack.side
      : (state.dropsiteActivation ? state.dropsiteActivation.side : null);
    // Sig/Spikes only extend range for NON-Close-Action weapons. Skip the auras when the
    // weapon being targeted is Close Action, or (in general activation) when the dropsite
    // has no non-Close-Action weapon feature.
    let showSigAuras = true;
    if (state.featureAttack) {
      const fads = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === state.featureAttack.dsId);
      const faf = fads && FEATURES[fads.features[state.featureAttack.fi]];
      showSigAuras = !!(faf && faf.weapon && !/Close Action/i.test(faf.weapon.special || ''));
    } else if (state.dropsiteActivation && state.dropsiteActivation.dsId) {
      const ads = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === state.dropsiteActivation.dsId);
      showSigAuras = !!(ads && (ads.features || []).some((fk, fi) => !(ads.destroyedFeatures||[]).includes(fi) && FEATURES[fk] && FEATURES[fk].weapon && !/Close Action/i.test(FEATURES[fk].weapon.special || '')));
    }
    if (actSide && showSigAuras) {
      const enemySide = actSide === 'ucm' ? 'shal' : 'ucm';
      fleetForSide(enemySide).forEach(edef => {
        const eg = getGroup(edef.id);
        if (!eg) return;
        const spikes = eg.spikes || 0;
        eg.ships.forEach(es => {
          if (es.destroyed || es.offTable) return;
          const sig = es.sigSilent ? 0 : (edef.sig || 0);
          const sigPx = (sig + 3 * (spikes + (es.spikes || 0))) * INCH;
          if (sigPx <= 0) return;
          html += `<circle cx="${es.x}" cy="${es.y}" r="${sigPx}" fill="rgba(255,82,82,0.04)"
                    stroke="var(--hull-crit)" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>`;
        });
      });
    }
  }

  // Auto-show a Dropsite's Scan (weapon) and Launch auras while it is being activated
  // (not while actively targeting — those more specific circles above take over).
  if (state.dropsiteActivation && state.dropsiteActivation.dsId && !state.featureAttack &&
      !(state.launching && state.launching.fromDropsite)) {
    const da = state.dropsiteActivation;
    const ds = state.scenarioData && state.scenarioData.dropsites.find(d => d.id === da.dsId);
    if (ds) {
      const dsx = inchToPx(ds.x), dsy = inchToPx(ds.y);
      const acol = da.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
      // Scan range: best weapon scan among weapon features, else base Scan, else 6".
      let scanIn = 0;
      (ds.features || []).forEach((fk, fi) => {
        if ((ds.destroyedFeatures || []).includes(fi)) return;
        const f = FEATURES[fk];
        if (f && f.weapon) scanIn = Math.max(scanIn, parseInt(f.weapon.scan) || 6);
      });
      if (!scanIn && ds.base && ds.base.scan) scanIn = parseInt(ds.base.scan) || 0;
      // Launch aura: 6" (Fighters/Bombers/Fire Ships/Torpedoes from a Dropsite feature).
      const hasLaunch = (ds.features || []).some((fk, fi) => !(ds.destroyedFeatures||[]).includes(fi) && FEATURES[fk] && FEATURES[fk].launch && FEATURES[fk].launch.length);
      const launchIn = hasLaunch ? 6 : 0;
      if (scanIn > 0) {
        const sPx = scanIn * INCH;
        html += `<circle cx="${dsx}" cy="${dsy}" r="${sPx}" fill="none" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>`;
        html += `<text x="${dsx}" y="${dsy - sPx - 4}" font-family="var(--mono)" font-size="8" font-weight="700" fill="var(--hull-crit)" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">SCAN ${scanIn}"</text>`;
      }
      if (launchIn > 0 && launchIn !== scanIn) {
        const lPx = launchIn * INCH;
        html += `<circle cx="${dsx}" cy="${dsy}" r="${lPx}" fill="none" stroke="${acol}" stroke-width="1" stroke-dasharray="5 3" opacity="0.7"/>`;
        html += `<text x="${dsx}" y="${dsy + lPx + 11}" font-family="var(--mono)" font-size="8" font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">LAUNCH ${launchIn}"</text>`;
      } else if (launchIn > 0 && launchIn === scanIn) {
        // Same radius — label the single ring as both.
        const lPx = launchIn * INCH;
        html += `<text x="${dsx}" y="${dsy + lPx + 11}" font-family="var(--mono)" font-size="8" font-weight="700" fill="${acol}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke" pointer-events="none">LAUNCH ${launchIn}"</text>`;
      }
    }
  }

  // Launched fighter/bomber/fireship asset markers.
  const assetMoveMode = state.assetPhase && state.assetPhase.step === 'assets';
  (state.launchedAssets || []).forEach((a, ai) => {
    const col = a.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
    const s = 6;
    const lbl = a.kind === 'bomber' ? 'BMR' : a.kind === 'fighter' ? 'FTR' : a.kind === 'fireship' ? 'FIRE' : a.kind === 'torpedo' ? 'TORP' : a.kind === 'mine' ? 'MINE' : 'F/B';
    const cnt = a.count || 1;
    const isSel = state.assetMove && state.assetMove.id === a.id;
    // In Asset Combat, show the selected asset's move range.
    if (assetMoveMode && isSel) {
      const thrPx = (a._t2tRange ? a._t2tRange : assetThrust(a)) * INCH;
      html += `<circle cx="${a.x}" cy="${a.y}" r="${thrPx}" fill="rgba(255,255,255,0.03)"
                stroke="${col}" stroke-width="1" stroke-dasharray="5 4"/>`;
    }
    html += `<g data-asset="${ai}" data-asset-id="${a.id}" style="cursor:pointer;">
      <polygon points="${a.x},${a.y-s} ${a.x+s},${a.y} ${a.x},${a.y+s} ${a.x-s},${a.y}"
        fill="${a.side==='ucm'?'rgba(74,214,255,0.15)':'rgba(212,166,71,0.15)'}" stroke="${col}" stroke-width="${isSel?2:1}"
        ${a.moved && assetMoveMode ? 'opacity="0.5"' : ''}/>
      <text x="${a.x}" y="${a.y+1.5}" font-family="var(--mono)" font-size="7" font-weight="700"
        fill="${col}" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${cnt}</text>
      <text x="${a.x}" y="${a.y+s+9}" font-family="var(--mono)" font-size="6.5" font-weight="700"
        fill="${col}" text-anchor="middle" stroke="var(--bg)" stroke-width="2" paint-order="stroke"
        pointer-events="none">${lbl}</text>
    </g>`;
    // Locked bomber-attack line to its target ship.
    if (a.bomberTarget) {
      const tg = state.groups[a.bomberTarget.gid];
      const ts = tg && tg.ships[a.bomberTarget.si];
      if (ts && !ts.destroyed && !ts.offTable) {
        html += `<line x1="${a.x}" y1="${a.y}" x2="${ts.x}" y2="${ts.y}" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="2 2" opacity="0.8"/>
          <circle cx="${ts.x}" cy="${ts.y}" r="9" fill="none" stroke="var(--hull-crit)" stroke-width="1.2" opacity="0.85"/>`;
      }
    }
  });

  // Weapon target lines — red dotted lines from a ship to its locked targets.
  Object.keys(state.groups).forEach(gid => {
    const grp = state.groups[gid];
    grp.ships.forEach(s => {
      if (s.destroyed || s.offTable || !s.weaponTargets) return;
      Object.keys(s.weaponTargets).forEach(wi => {
        const t = s.weaponTargets[wi];
        const tg = state.groups[t.gid];
        const ts = tg && tg.ships[t.si];
        if (!ts || ts.destroyed || ts.offTable) return;
        html += `<line x1="${s.x}" y1="${s.y}" x2="${ts.x}" y2="${ts.y}" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="3 3" opacity="0.75"/>
          <circle cx="${ts.x}" cy="${ts.y}" r="8" fill="none" stroke="var(--hull-crit)" stroke-width="1.2" opacity="0.8"/>`;
      });
    });
  });
  // Active targeting: highlight valid enemy targets for the chosen weapon.
  if (state.targeting) {
    const t = state.targeting;
    const aGrp = state.groups[t.gid];
    const aShip = aGrp && aGrp.ships[t.si];
    const aDef = getDef(t.gid);
    const w = aDef && aDef.weapons[t.wi];
    if (aShip && w) {
      // Group fire is measured from the LEAD ship.
      const originShip = firingOriginShip(aDef, aGrp, t.si);
      // Highlight the measuring origin so the player sees what arcs/ranges are from.
      if (originShip && originShip !== aShip) {
        html += `<circle cx="${originShip.x}" cy="${originShip.y}" r="${shipBaseRadiusPx(aDef)+3}" fill="none" stroke="var(--hull-crit)" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>`;
      }
      Object.keys(state.groups).forEach(gid => {
        const def = getDef(gid);
        if (!def || def.side === aDef.side) return;
        state.groups[gid].ships.forEach((s, si) => {
          if (s.destroyed || s.offTable || s.attachedTo) return;
          if (weaponCanTarget(aDef, originShip, w, def, s, state.groups[gid])) {
            html += `<circle cx="${s.x}" cy="${s.y}" r="9" fill="none" stroke="var(--hull-crit)" stroke-width="1.5" stroke-dasharray="2 2"/>`;
          }
        });
      });
    }
  }

  // Payload DETACH: 3" placement aura around the Porter + ghost ship at cursor.
  if (state.payloadDetach) {
    const pd = state.payloadDetach;
    const porter = state.groups[pd.porterGid] && state.groups[pd.porterGid].ships[pd.porterSi];
    const payDef = getDef(pd.gid);
    if (porter) {
      const r = 3 * INCH;
      html += `<circle cx="${porter.x}" cy="${porter.y}" r="${r}" fill="rgba(74,214,255,0.06)" stroke="var(--ucm)" stroke-width="1" stroke-dasharray="4 3"/>`;
      if (state.hoverPoint) {
        const within = Math.hypot(state.hoverPoint.x - porter.x, state.hoverPoint.y - porter.y) <= r + 2;
        const gcol = within ? (payDef.side==='ucm'?'var(--ucm)':'var(--shal)') : 'var(--hull-crit)';
        html += `<circle cx="${state.hoverPoint.x}" cy="${state.hoverPoint.y}" r="5" fill="none" stroke="${gcol}" stroke-width="1.5" opacity="0.85"/>`;
        html += `<line x1="${porter.x}" y1="${porter.y}" x2="${state.hoverPoint.x}" y2="${state.hoverPoint.y}" stroke="${gcol}" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.6"/>`;
      }
    }
  }
  // Payload REATTACH: 3" aura + highlight eligible detached payloads.
  if (state.payloadReattach) {
    const pr = state.payloadReattach;
    const porter = state.groups[pr.porterGid] && state.groups[pr.porterGid].ships[pr.porterSi];
    const pdef = getDef(pr.porterGid);
    if (porter) {
      const r = 3 * INCH;
      html += `<circle cx="${porter.x}" cy="${porter.y}" r="${r}" fill="rgba(212,166,71,0.06)" stroke="var(--shal)" stroke-width="1" stroke-dasharray="4 3"/>`;
      detachedReattachCandidates(pdef.side, porter, pdef.porter.size).forEach(c => {
        html += `<circle cx="${c.ship.x}" cy="${c.ship.y}" r="7" fill="none" stroke="var(--shal)" stroke-width="1.5"/>`;
      });
    }
  }

  // Clip everything to the playable 48"×48" board so arcs/auras/lines that
  // extend past the edge are not drawn outside the map area.
  svg.innerHTML = `<defs><clipPath id="board-clip"><rect x="0" y="0" width="${BOARD_PX}" height="${BOARD_PX}"/></clipPath></defs>`
    + `<g clip-path="url(#board-clip)">${html}</g>`;
}

/* Render scan range + arcs for a ship (called for selected group ships) */
function renderShipOverlays(def, ship, isSelected) {
  const scanR = (def.scan + def.sig) * INCH; // not exact — Scan + target's Sig but Sig varies; show own Scan + 6 as approximation
  // Actually Scan is base range. The +Sig is per-target. Show Scan as the base.
  const baseScanR = def.scan * INCH;
  const opacity = isSelected ? 0.6 : 0.2;
  const color = def.side === 'ucm' ? 'var(--ucm)' : 'var(--shal)';
  let html = `<g class="ship-overlays">`;
  // Scan range — dashed circle
  html += `<circle cx="${ship.x}" cy="${ship.y}" r="${baseScanR}"
            fill="none" stroke="${color}" stroke-width="0.5"
            stroke-dasharray="3 4" opacity="${opacity * 0.7}"/>`;
  if (!isSelected) return html + '</g>';

  // Weapon arcs — show ALL weapon arcs of the SELECTED ship
  if (def.weapons) {
    def.weapons.forEach(w => {
      if (w.arc === 'LoS' || w.arc === '—' || !w.arc) return;
      html += renderWeaponArc(ship, def, w);
    });
  }
  html += `</g>`;
  return html;
}

/* Render a single weapon arc as a translucent wedge.
   Arc range = Scan (we don't know target Sig, so show base Scan).
   F = 90° front, S = 90° each side, R = 90° rear,
   FN = 22° narrow front, RN = 22° narrow rear, B = side left+right combined.
   For F/S, F/S/R combos: draw each component as a separate wedge. */
function renderWeaponArc(ship, def, w) {
  const r = def.scan * INCH;
  const cx = ship.x, cy = ship.y;
  const h = ship.heading;
  let html = '';
  // Parse arc — could be "F", "F/S", "F/S/R", "FN", "RN", "B", "S"
  const components = w.arc.split('/').map(s => s.trim());

  // map arc names to centre-angle relative to heading and half-width
  function wedge(centreOffset, halfWidth, fill, stroke) {
    const a1 = (h + centreOffset - halfWidth) * Math.PI / 180;
    const a2 = (h + centreOffset + halfWidth) * Math.PI / 180;
    const x1 = cx + Math.cos(a1) * r;
    const y1 = cy + Math.sin(a1) * r;
    const x2 = cx + Math.cos(a2) * r;
    const y2 = cy + Math.sin(a2) * r;
    const largeArc = (halfWidth * 2) > 180 ? 1 : 0;
    return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z"
              fill="${fill}" stroke="${stroke}" stroke-width="0.4" opacity="0.6"/>`;
  }
  components.forEach(c => {
    if (c === 'F') html += wedge(0, 45, 'rgba(74,214,255,0.18)', 'var(--ucm-dim)');
    else if (c === 'R') html += wedge(180, 45, 'rgba(122,138,148,0.12)', 'var(--text-mute)');
    else if (c === 'S') {
      // both sides
      html += wedge(90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
      html += wedge(-90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
    }
    else if (c === 'FN') html += wedge(0, 11, 'rgba(255,181,71,0.30)', 'var(--hull-warn)');
    else if (c === 'RN') html += wedge(180, 11, 'rgba(255,181,71,0.30)', 'var(--hull-warn)');
    else if (c === 'B') {
      html += wedge(90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
      html += wedge(-90, 45, 'rgba(122,138,148,0.15)', 'var(--text-mute)');
    }
  });
  return html;
}

function headingVec(h) {
  const r = h * Math.PI / 180;
  return { x: Math.cos(r), y: Math.sin(r) };
}

/* Heading (deg) from a ship at (sx,sy) toward a point (px,py). */
function headingToward(sx, sy, px, py) {
  return Math.atan2(py - sy, px - sx) * 180 / Math.PI;
}

/* Smallest signed angle (deg) from a→b, in range (-180, 180]. */
function angleDelta(a, b) {
  let d = (b - a) % 360;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

/* Clamp a desired heading to within ±limitDeg of an origin heading. */
function clampHeading(origin, desired, limitDeg) {
  const d = angleDelta(origin, desired);
  const clamped = Math.max(-limitDeg, Math.min(limitDeg, d));
  return origin + clamped;
}

/* ── ATTACK GEOMETRY & RULES ── */
/* Half-widths (deg) of each arc letter relative to the ship's heading centre. */
function arcWedges(arcStr) {
  // Returns [{centre, half}] offsets relative to heading.
  const out = [];
  arcStr.split('/').map(s => s.trim()).forEach(c => {
    if (c === 'F') out.push({ centre: 0, half: 45 });
    else if (c === 'R') out.push({ centre: 180, half: 45 });
    else if (c === 'S' || c === 'B') { out.push({ centre: 90, half: 45 }); out.push({ centre: -90, half: 45 }); }
    else if (c === 'FN') out.push({ centre: 0, half: 11.25 });
    else if (c === 'RN') out.push({ centre: 180, half: 11.25 });
  });
  return out;
}
/* Is point (px,py) within a weapon's firing arc from the ship? */
function pointInWeaponArc(ship, w, px, py) {
  const wedges = arcWedges(w.arc);
  if (!wedges.length) return true; // arcless (e.g. LoS) — treat as all-round
  const bearing = headingToward(ship.x, ship.y, px, py);
  return wedges.some(wg => Math.abs(angleDelta(ship.heading + wg.centre, bearing)) <= wg.half + 0.5);
}
/* Effective scan (inches) of a ship — 1" if Scanners Offline crippling. */
function effectiveScan(def, ship) {
  if (ship && ship.crippling && ship.crippling.includes('scanners')) return 1;
  return def.scan;
}
/* Maximum move distance (PIXELS) for a ship under an order, honouring the
   Navigation Offline crippling effect (total movement → 2", no thrust scaling). */
function effectiveMaxMovePx(def, ship, order) {
  const o = ORDERS[order] || { moveMax: 0 };
  if (ship && ship.crippling && ship.crippling.includes('navigation')) return 2 * INCH;
  // Arrest-X: this ship's Thrust is reduced by X" during its next activation.
  const thrust = Math.max(0, def.thrust - (ship && ship.arrestNext ? ship.arrestNext : 0));
  return o.moveMax * thrust * INCH;
}
/* Targeting range in PIXELS = attacker Scan + (target Signature + target Spikes×3").
   Scenery on the LoS line can cause the target's Spikes (and, for Debris, Signature)
   to be ignored. */
function targetingRangePx(attackerDef, targetDef, targetShip, targetGrp, attackerShip, w) {
  // Close Action weapons target only within the attacker's Scan range (Sig & Spikes
  // give the target no extra "visibility" range against Close Action).
  if (w && /Close Action/i.test(w.special || '')) {
    return effectiveScan(attackerDef, attackerShip) * INCH;
  }
  let spikes = (targetGrp ? (targetGrp.spikes || 0) : 0) + (targetShip.spikes || 0);
  let sig = targetShip.sigSilent ? 0 : (targetDef.sig || 0);
  if (attackerShip) {
    const eff = sceneryAttackEffects(attackerShip.x, attackerShip.y, targetShip.x, targetShip.y, attackerShip, targetShip);
    if (eff.ignoreSpikes) spikes = 0;
    if (eff.ignoreSig) sig = 0;
  }
  const sigIn = sig + spikes * 3;
  return (effectiveScan(attackerDef, attackerShip) + sigIn) * INCH;
}
/* Can a weapon legally target a given enemy ship right now?
   Checks: same orbital layer, weapon arc, Scan+Sig(+spikes) range, and that a
   Large Object does not block Line of Sight. */
function weaponCanTarget(attackerDef, attackerShip, w, targetDef, targetShip, targetGrp) {
  if (targetShip.destroyed || targetShip.offTable || targetShip.attachedTo) return false;
  const aLayer = attackerShip.layer || 'orbit', tLayer = targetShip.layer || 'orbit';
  if (aLayer !== tLayer) {
    // Orbit → Atmosphere: always allowed (−1 Lock vs non-Descent; 6+ vs Descent — applied at hit resolution).
    // Atmosphere → Orbit: only allowed with Escape Velocity (Close Action).
    const orbitToAtmo = aLayer === 'orbit' && tLayer === 'atmosphere';
    const atmoToOrbit = aLayer === 'atmosphere' && tLayer === 'orbit';
    const escapeVel = /Escape Velocity/i.test(w.special || '');
    if (!orbitToAtmo && !(atmoToOrbit && escapeVel)) return false;
  }
  if (!pointInWeaponArc(attackerShip, w, targetShip.x, targetShip.y)) return false;
  // Large Objects block Line of Sight (unless both ends in atmosphere).
  const eff = sceneryAttackEffects(attackerShip.x, attackerShip.y, targetShip.x, targetShip.y, attackerShip, targetShip);
  if (eff.blocked) return false;
  const range = targetingRangePx(attackerDef, targetDef, targetShip, targetGrp, attackerShip, w);
  if (Math.hypot(targetShip.x - attackerShip.x, targetShip.y - attackerShip.y) > range) return false;
  return true;
}
/* How many weapons a ship may fire this activation, given its effective Order. */
function fireLimit(order, def) {
  if (!order || !ORDERS[order]) return 0;
  const fr = ORDERS[order].fireRule;
  const total = (def.weapons || []).length;
  // Stealth: this Ship may fire ONE Weapon while on Silent Running.
  if (order === 'SR' && /Stealth/i.test(def.special || '')) return 1;
  if (fr === 'none') return 0;
  if (fr === 'all') return total;
  if (fr === 'half') return Math.ceil(total / 2);
  if (fr === 'one') return 1;
  if (fr === 'one-CA') return 1; // one Close Action weapon
  return 0;
}
/* Fire-slot cost of firing weapon wi: High Power = 2 off Weapons Free, else 1. */
function weaponSlotCost(def, wi, order) {
  const sp = parseWeaponSpecials(def.weapons[wi]);
  if (sp.highPower && order !== 'WF') return 2;
  return 1;
}
/* Grouping key: Linked-X / Alt-X weapons of the same value count as one Weapon. */
function weaponGroupKey(def, wi) {
  const sp = parseWeaponSpecials(def.weapons[wi]);
  if (sp.linked) return 'L:' + sp.linked;
  if (sp.alt) return 'A:' + sp.alt;
  return 'W:' + wi;
}
/* All weapon indices that fire together with wi (Linked-X partners share a trigger). */
function linkedPartners(def, wi) {
  const sp = parseWeaponSpecials(def.weapons[wi]);
  if (!sp.linked) return [wi];
  const out = [];
  def.weapons.forEach((w, i) => { const s = parseWeaponSpecials(w); if (s.linked === sp.linked) out.push(i); });
  return out;
}
/* Total fire-slot cost of a ship's locked weapons: Linked/Alt groups count once,
   High Power double (off WF), Low Power is free when a Close Action weapon also fires. */
function lockedWeaponCost(def, ship, order) {
  const locked = Object.keys(ship.weaponTargets || {}).map(n => parseInt(n));
  const seen = new Set();
  let cost = 0;
  locked.forEach(wi => {
    const sp = parseWeaponSpecials(def.weapons[wi]);
    const gk = weaponGroupKey(def, wi);
    if (seen.has(gk)) return;
    seen.add(gk);
    if (sp.lowPower) return; // Low Power is a free extra (allowed alongside a CA weapon)
    cost += weaponSlotCost(def, wi, order);
  });
  return cost;
}
/* Is this ship a Capital Ship (Medium tonnage or larger) — subject to Crippling? */
function isCapital(def) { return ['M', 'H', 'C'].includes(def.tonnage); }
/* Explosion range (inches) by tonnage. */
function explosionRangeIn(def) { return def.tonnage === 'C' ? 9 : def.tonnage === 'H' ? 6 : 3; }
/* Parse a Lock value like "3+" → 3. */
function lockVal(w) { return parseInt(String(w.lock).replace('+', '')) || 7; }
/* Parse a save like "4+" → 4, "—" → null (no save). */
function saveVal(s) { if (!s || s === '—') return null; return parseInt(String(s).replace('+', '')) || null; }

/* Parse a weapon's special string into structured critical-effect modifiers. */
/* Maximum Spikes a Group may hold. Default 4; Cloak-X lowers it to X. */
function spikeCap(def) {
  const m = (def && def.special || '').match(/Cloak-(\d)/i);
  return m ? parseInt(m[1]) : 4;
}
/* Add n Spikes to a Group, respecting its (possibly Cloak-reduced) cap. */
function addGroupSpikes(grp, def, n) {
  grp.spikes = Math.min(spikeCap(def), (grp.spikes || 0) + n);
}
function addShipSpikes(ship, def, n) {
  ship.spikes = Math.min(spikeCap(def), (ship.spikes || 0) + n);
}

function parseWeaponSpecials(w) {
  const sp = (w.special || '');
  const num = (re) => { const m = sp.match(re); return m ? parseInt(m[1]) : 0; };
  return {
    scald:       num(/Scald-(\d)/i),
    reave:       num(/Reave-(\d)/i),
    burnthrough: num(/Burnthrough-(\d)/i),
    critical:    num(/Critical-(\d)/i),
    flash:       num(/Flash-(\d)/i),
    bloom:       num(/Bloom-(\d)/i),
    fusillade:   num(/Fusillade-(\d)/i),
    penetrator:  /Penetrator/i.test(sp),
    focused:     /Focused/i.test(sp),
    closeAction: /Close Action/i.test(sp),
    mauler:      /Mauler/i.test(sp),
    antiWing:    /Anti.?Wing/i.test(sp),
    crippling:   /Crippling/i.test(sp),
    calibre:     (sp.match(/Calibre-([HMCL/]+)/i) || [])[1] || null,
    status:      /Status/i.test(sp),
    volley:      num(/Volley-(\d)/i),
    overcharge:  /Overcharge/i.test(sp),
    corruptor:   num(/Corruptor-(\d)/i),
    arrest:      num(/Arrest-(\d)/i),
    impel:       num(/Impel-(\d)/i),
    sustained:   /Sustained Fire/i.test(sp),
    highPower:   /High Power/i.test(sp),
    lowPower:    /Low Power/i.test(sp),
    linked:      (sp.match(/Linked-([A-Za-z0-9]+)/i) || [])[1] || null,
    limited:     num(/Limited-(\d)/i),
    alt:         (sp.match(/\bAlt-([A-Za-z0-9]+)/i) || [])[1] || null
  };
}
/* Save value (number) a hit uses against a given damage type for a target.
   When shieldUp, the Shield Save replaces ES/KS and applies to E/K/C alike,
   ignoring modifiers to ES/KS (returns {v, shielded}). Otherwise applies the
   Defence-Systems-Offline crippling (−1 / worse). Returns null v = no save. */
function baseSaveForType(td, ts, type, shieldUp) {
  // Full Shield-X: a raised Shield replaces ES & KS and saves vs E, K, and Core,
  // ignoring any ES/KS modifiers.
  if (shieldUp && shieldSaveVal(td)) return shieldSaveVal(td);
  let v;
  if (type === 'E') v = saveVal(td.es);
  else if (type === 'K') v = saveVal(td.ks);
  else v = null; // Core has no save without a Shield
  if (v != null && ts.crippling && ts.crippling.includes('defence')) v = v + 1; // worse
  return v;
}

/* Find an enemy ship (relative to attackerSide) whose marker contains the point. */
function enemyShipAtPoint(attackerSide, pt) {
  let best = null, bestD = Infinity;
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    if (!def || def.side === attackerSide) return;
    const grp = state.groups[gid];
    grp.ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || s.attachedTo) return;
      const d = Math.hypot(s.x - pt.x, s.y - pt.y);
      if (d < bestD && d < 16) { bestD = d; best = { gid, si, def, ship: s, grp }; }
    });
  });
  return best;
}

/* ── ATTACK RESOLUTION ── */
function rollDie() { return Math.floor(Math.random() * 6) + 1; }
function hasShields(def) { return /Shield-?\d?/i.test(def.special || ''); }
function shieldSaveVal(def) { const m = (def.special||'').match(/Shield-?(\d)/i); return m ? parseInt(m[1]) : null; }

/* Build the attack from the firing ship's locked weapons, grouped by target. */
function openAttackModal(gid, si) {
  const aDef = getDef(gid);
  const grp = state.groups[gid];
  if (!grp) return;
  // Gather locked weapons from EVERY ship in the Group (the whole group fires together).
  // Combine identical weapon systems firing at the same target into one pooled-Att shot.
  const combined = {}; // key: weaponName|targetGid|targetSi → shot
  grp.ships.forEach((ship, sIdx) => {
    if (ship.destroyed || ship.offTable || !ship.weaponTargets) return;
    const shipEO = effectiveOrder(aDef, grp, sIdx); // this ship's effective Order
    Object.keys(ship.weaponTargets).forEach(wi => {
      const t = ship.weaponTargets[wi];
      const tg = state.groups[t.gid];
      const ts = tg && tg.ships[t.si];
      if (!ts || ts.destroyed || ts.offTable) return;
      const w = aDef.weapons[parseInt(wi)];
      const sp = parseWeaponSpecials(w);
      // Fusillade-X: +X Attack for THIS ship while it is on Weapons Free. Applied per
      // contributing ship so pooled group fire sums each ship's boosted Attack.
      const shipAtt = w.att + ((sp.fusillade && shipEO === 'WF') ? sp.fusillade : 0);
      const reps = sp.volley > 1 ? sp.volley : 1;
      for (let r = 0; r < reps; r++) {
        const key = w.name + '|' + t.gid + '|' + t.si + (reps > 1 ? '|v' + r : '');
        if (combined[key]) {
          combined[key].w = { ...combined[key].w, att: combined[key].w.att + shipAtt }; // pool Att
        } else {
          combined[key] = { wi: parseInt(wi), w: { ...w, att: shipAtt }, targetGid: t.gid, targetSi: t.si,
            volleyIdx: reps > 1 ? r + 1 : 0, volleyOf: reps, fusilladeBaked: true };
        }
      }
    });
  });
  const shots = Object.values(combined);
  if (!shots.length) { flashLaunchMsg('No valid targets'); return; }
  // Group fire is measured from the LEAD ship — use it as the attacker origin so the
  // hit step's range/scenery/layer effects measure from the correct point.
  const individual = aDef.openNetwork || onIndividualOrders(aDef, grp);
  let originSi = si;
  if (!individual) {
    const li = grp.leadShipIdx || 0;
    const lead = grp.ships[li];
    if (lead && !lead.destroyed && !lead.offTable) originSi = li;
  }
  state.attackModal = {
    attackerGid: gid, attackerSi: originSi,
    groupFire: true,
    shots,
    step: 'intro',       // intro → hit → save → crippling → explosion → done
    shotIdx: 0,
    shieldsUp: {},        // {targetKey: bool}
    log: [],
    pendingDamage: {},    // {targetKey: damage} accumulated
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}

/* Enemy ships within 1" (base contact) of a point, for bomber attacks. */
function enemyShipsInBaseContact(side, x, y) {
  const out = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    if (!def || def.side === side) return;
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || s.attachedTo) return;
      // Assets operate in Orbit and cannot attack ships in the Atmosphere layer
      // (e.g. Descent ships that have dropped into atmosphere).
      if ((s.layer || 'orbit') === 'atmosphere') return;
      if (Math.hypot(s.x - x, s.y - y) <= 1 * INCH + shipBaseRadiusPx(def)) out.push({ gid, si, def, ship: s });
    });
  });
  return out;
}

function targetKey(gid, si) { return gid + '#' + si; }

/* Open the attack modal for an asset attack (bomber / fireship / torpedo).
   Bombers & Fire Ships in `assetIds` combine into ONE roll; a Torpedo attacks alone.
   Uses the side's faction profile for that asset kind. */
function openBomberAttackModal(assetIds, targetGid, targetSi, side, kind) {
  kind = kind || 'bomber';
  const movers = state.launchedAssets.filter(a => assetIds.includes(a.id) && a.kind === kind);
  const total = movers.reduce((n, a) => n + a.count, 0);
  if (!total) { flashLaunchMsg('No asset in contact'); return; }
  const tg = state.groups[targetGid];
  const ts = tg && tg.ships[targetSi];
  if (!ts) { flashLaunchMsg('Invalid target'); return; }
  const prof = assetProfile(side, kind);
  const totalDice = total * (prof.att || 1);
  // Saturation Fire (bombers/fire ships): −1 save die per asset above 6.
  const saturation = (kind === 'torpedo') ? 0 : Math.max(0, total - 6);
  // Scourge Crippling-Fire on bombers (2 if 7+).
  const cripplingFire = (prof.special || '').includes('Crippling-Fire') ? (total >= 7 ? 2 : 1) : 0;
  const kindLabel = kind === 'torpedo' ? 'Torpedo' : kind === 'fireship' ? 'Fire Ship Wing' : 'Bomber Wing';
  const w = { name: `${kindLabel} ×${total}`, arc: '—', att: totalDice, lock: prof.lock, dmg: prof.dmg, type: prof.type,
    special: [prof.special || '', saturation ? `Saturation −${saturation}` : ''].filter(Boolean).join(', ') };
  state.attackModal = {
    bomber: true, bomberKind: kind, bomberAssetIds: assetIds, bomberSide: side, saturation, cripplingFire,
    attackerName: `${kindLabel} ×${total}`,
    attackerGid: null, attackerSi: null,
    shots: [{ wi: 0, w, targetGid, targetSi }],
    step: 'intro', shotIdx: 0, shieldsUp: {}, log: [], pendingDamage: {},
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}

/* Any launched assets currently locked onto a ship target (awaiting pooled attack)?
   Optionally restricted to a side and a stage type. */
function anyPendingBomberAttacks(side, type) {
  const kinds = type ? kindsForAssetType(type) : null;
  return (state.launchedAssets || []).some(a => a.bomberTarget && (!side || a.side === side) && (!kinds || kinds.includes(a.kind)));
}

/* Resolve the NEXT pending pooled attack (optionally scoped to a side + stage type).
   All assets of the SAME kind & side locked onto the SAME target ship combine into one
   attack. Chains via finishAttack → resolvePendingBomberAttacks until none remain for
   the scope. When a stage-scoped run finishes, the asset stage advances. */
function resolvePendingBomberAttacks(side, type) {
  // Remember the scope so finishAttack can continue / hand back to the stage machine.
  state._bomberResolveSide = side || null;
  state._bomberResolveType = type || null;
  const kinds = type ? kindsForAssetType(type) : null;
  const inScope = a => a.bomberTarget && (!side || a.side === side) && (!kinds || kinds.includes(a.kind));
  const locked = (state.launchedAssets || []).filter(inScope);
  if (!locked.length) {
    // No (more) attacks for this scope. If we were resolving for a stage, advance it.
    if (side) { state._bomberResolveSide = null; state._bomberResolveType = null; advanceAssetStage({ type: type || 'bomber', side }); }
    return false;
  }
  const first = locked[0];
  const key = a => `${a.kind}|${a.side}|${a.bomberTarget.gid}|${a.bomberTarget.si}`;
  const k0 = key(first);
  const pool = locked.filter(a => key(a) === k0);
  const tg = state.groups[first.bomberTarget.gid];
  const ts = tg && tg.ships[first.bomberTarget.si];
  if (!ts || ts.destroyed || ts.offTable) {
    pool.forEach(a => { a.bomberTarget = null; });
    return resolvePendingBomberAttacks(side, type);
  }
  openBomberAttackModal(pool.map(a => a.id), first.bomberTarget.gid, first.bomberTarget.si, first.side, first.kind);
  return true;
}

/* Open the attack modal for a Dropsite Feature weapon (Missile Halo, Orbital Gun).
   Treated like a bomber-style single-weapon attack from the dropsite. */
function openFeatureAttackModal(ds, fi, targetGid, targetSi, side) {
  const f = FEATURES[ds.features[fi]];
  const wp = f.weapon;
  const w = { name: `${f.name}: ${wp.name}`, arc: '—', att: wp.att, lock: wp.lock, dmg: wp.dmg, type: wp.type, special: wp.special || '' };
  state.attackModal = {
    bomber: true, bomberKind: 'feature', bomberAssetIds: [], bomberSide: side, saturation: 0, cripplingFire: 0,
    attackerName: `${f.name}: ${wp.name}`,
    attackerGid: null, attackerSi: null,
    shots: [{ wi: 0, w, targetGid, targetSi }],
    step: 'intro', shotIdx: 0, shieldsUp: {}, log: [], pendingDamage: {},
    hitResult: null, saveResult: null, crippleQueue: [], explodeQueue: []
  };
  renderAll();
}

function renderAttackModal() {
  let overlay = document.getElementById('attack-overlay');
  if (overlay) overlay.remove();
  const M = state.attackModal;
  if (!M) return;
  const aDef = M.bomber ? { name: M.attackerName || 'Bombers', side: M.bomberSide } : getDef(M.attackerGid);
  const aShip = M.bomber ? null : state.groups[M.attackerGid].ships[M.attackerSi];
  const sideClass = aDef.side === 'ucm' ? 'ucm' : 'shal';

  let body = '';
  let footer = '';

  if (M.step === 'intro') {
    // Show shields-up toggles for any targets that have shields.
    const targetsWithShields = [];
    M.shots.forEach(s => {
      const td = getDef(s.targetGid);
      const k = targetKey(s.targetGid, s.targetSi);
      if (hasShields(td) && !targetsWithShields.find(x => x.k === k)) targetsWithShields.push({ k, name: td.name, sv: shieldSaveVal(td) });
    });
    body = `<div class="am-line">Firing <b>${aDef.name}</b> — ${M.shots.length} weapon${M.shots.length>1?'s':''} locked.</div>`;
    M.shots.forEach(s => {
      const td = getDef(s.targetGid);
      let scNote = '';
      if (!M.bomber && M.attackerGid) {
        const ash = state.groups[M.attackerGid].ships[M.attackerSi];
        const ts = state.groups[s.targetGid].ships[s.targetSi];
        if (ash && ts) {
          const eff = sceneryAttackEffects(ash.x, ash.y, ts.x, ts.y, ash, ts);
          const tags = [eff.ignoreSig ? 'ignore Sig+Spikes' : eff.ignoreSpikes ? 'ignore Spikes' : ''].filter(Boolean);
          if (tags.length) scNote = ` <span style="color:var(--hull-warn);font-size:9px;">⌖ ${tags.join(', ')} (scenery)</span>`;
        }
      }
      body += `<div class="am-shot">${s.w.name} <span style="color:var(--text-mute)">(${s.w.arc}, Att ${s.w.att}, Lock ${s.w.lock}, Dmg ${s.w.dmg}, ${s.w.type})</span> ▶ <b>${td.name}</b>${scNote}</div>`;
    });
    if (targetsWithShields.length) {
      body += `<div class="am-line" style="margin-top:8px;"><b>Shields:</b></div>`;
      targetsWithShields.forEach(t => {
        body += `<label class="am-toggle"><input type="checkbox" data-shield-toggle="${t.k}" ${M.shieldsUp[t.k]?'checked':''}/> Raise shields on ${t.name} (Shield ${t.sv}+ vs E/K/C, ignores save mods; +1 Spike)</label>`;
      });
    }
    // Escort (§15.6): a friendly H/C target within 6" of a coherent Escort Group may
    // have non-Focused hits redirected to the Escort. Offer per eligible shot.
    if (!M.bomber) {
      M.shots.forEach((s, idx) => {
        const sp = parseWeaponSpecials(s.w);
        if (sp.focused) return; // Focused weapons can't be Escorted
        if (s.escortedTo) {
          body += `<div class="am-line" style="color:#7fd6a0;font-size:10px;">↪ ${s.w.name} redirected to Escort: ${getDef(s.escortedTo.gid).name}</div>`;
          return;
        }
        const esc = eligibleEscort(s.targetGid, s.targetSi);
        if (esc) {
          body += `<div class="am-line" style="margin-top:4px;"><button class="btn" data-escort="${idx}" style="font-size:10px;color:#7fd6a0;border-color:#7fd6a0;">🛡 Escort ${s.w.name} → ${esc.name}</button></div>`;
        }
      });
    }
    if (!M.bomber) {
      const ocWeapons = [];
      M.shots.forEach(s => { const sp = parseWeaponSpecials(s.w); if (sp.overcharge && !ocWeapons.find(x=>x.wi===s.wi)) ocWeapons.push({ wi: s.wi, name: s.w.name }); });
      if (ocWeapons.length) {
        body += `<div class="am-line" style="margin-top:8px;"><b>Overcharge:</b></div>`;
        ocWeapons.forEach(o => {
          body += `<label class="am-toggle"><input type="checkbox" data-overcharge="${o.wi}" ${M.overcharge&&M.overcharge[o.wi]?'checked':''}/> Overcharge ${o.name} (×2 Dmg; 6s self-damage)</label>`;
        });
      }
    }
    footer = `<button class="btn" data-am-cancel="1">Cancel</button>
      <button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="hit">Roll to Hit ▸</button>`;
  }

  else if (M.step === 'hit') {
    const s = M.shots[M.shotIdx];
    const td = getDef(s.targetGid);
    const ts = state.groups[s.targetGid].ships[s.targetSi];
    const sp = parseWeaponSpecials(s.w);
    if (!M.hitResult) {
      // Lock: Mauler uses the target's relevant save as Lock; Calibre improves Lock
      // by 1 vs listed tonnages.
      let lock = lockVal(s.w);
      if (sp.mauler) {
        const sv = s.w.type === 'K' ? saveVal(td.ks) : s.w.type === 'E' ? saveVal(td.es) : (shieldSaveVal(td) || 6);
        if (sv != null) lock = sv;
      }
      if (sp.calibre && sp.calibre.toUpperCase().includes(td.tonnage)) lock = Math.max(2, lock - 1);
      // ── ATMOSPHERE ATTACK RULES (§4.1.2) ──
