      // forceSix: hit only on 6+ and cannot critical. Otherwise apply Lock modifiers.
      let forceSix = false;
      if (!M.bomber && M.attackerGid) {
        const ash = state.groups[M.attackerGid].ships[M.attackerSi];
        const aL = ash && (ash.layer || 'orbit'), tL = ts.layer || 'orbit';
        const isCity = td.category === 'city';
        const targetDescent = /Descent/i.test(td.special || '');
        const isBombardment = /Bombardment/i.test(s.w.special || '');
        if (isCity && isBombardment) {
          lock = Math.max(2, lock - 2);            // Bombardment improves Lock by 2 vs Cities
        } else if (tL === 'atmosphere' && (isCity || targetDescent)) {
          forceSix = true;                          // City / Descent ship in Atmosphere → 6+, no crit
        } else if (aL === 'atmosphere' && tL === 'orbit') {
          forceSix = true;                          // firing Atmosphere → Orbit → 6+, no crit
        } else if (aL === 'orbit' && tL === 'atmosphere') {
          lock = Math.min(6, lock + 1);             // Orbit → non-Descent ship in Atmosphere: −1 Lock
        }
      }
      // Fusillade-X: for pooled group fire it's already baked per-ship at combine time
      // (s.fusilladeBaked). For single-ship / non-grouped attacks, apply it here.
      let att = s.w.att;
      if (sp.fusillade && !s.fusilladeBaked && !M.bomber && M.attackerGid) {
        const ag = state.groups[M.attackerGid];
        const eo = ag ? effectiveOrder(getDef(M.attackerGid), ag, M.attackerSi) : null;
        if (eo === 'WF') att += sp.fusillade;
      }
      // Sustained Fire: double Att vs a target Group hit in the PREVIOUS round.
      if (sp.sustained && !M.bomber) {
        const tg = state.groups[s.targetGid];
        if (tg && tg.hitByLastRound && tg.hitByLastRound.includes(M.attackerGid)) att *= 2;
      }
      const dice = [];
      let hits = 0, crits = 0, sixes = 0;
      // Reinforced Armour: this target can only be critted on Lock+3 (not +2).
      const critMargin = (td.special && /Reinforced Armour/i.test(td.special)) ? 3 : 2;
      for (let i = 0; i < att; i++) {
        const r = rollDie();
        // Atmosphere forceSix: hits only on 6, and never criticals.
        const isHit = forceSix ? (r === 6) : (r >= lock);
        const isCrit = forceSix ? false : (r >= lock + critMargin);
        if (isHit) hits++;
        if (isCrit) crits++;
        if (r === 6) sixes++;
        dice.push({ r, isHit, isCrit });
      }
      M.hitResult = { dice, hits, crits, lock, forceSix };
      // Sustained Fire bookkeeping: record that this attacker Group hit the target Group.
      if (hits > 0 && !M.bomber && M.attackerGid) {
        const tg = state.groups[s.targetGid];
        if (tg) { tg.hitByThisRound = tg.hitByThisRound || []; if (!tg.hitByThisRound.includes(M.attackerGid)) tg.hitByThisRound.push(M.attackerGid); }
      }
      // Overcharge: each roll of 6 costs the attacker this weapon's UNMODIFIED Damage
      // in Hull (applied to the firing ship immediately).
      const oc = M.overcharge && M.overcharge[s.wi];
      if (oc && sixes > 0 && !M.bomber && M.attackerGid) {
        const ash = state.groups[M.attackerGid].ships[M.attackerSi];
        if (ash) {
          const self = sixes * (s.w.dmg || 0);
          ash.hull = Math.max(0, ash.hull - self);
          M.log.push(`Overcharge: ${s.w.name} dealt ${self} self-damage (${sixes}×6)`);
          if (ash.hull <= 0 && !ash.destroyed) { ash.destroyed = true; }
        }
      }
      // Bloom-X: attacker gains X spikes when this weapon fires.
      if (sp.bloom && !M.bomber && M.attackerGid) {
        const ag = state.groups[M.attackerGid];
        if (ag) ag.spikes = (ag.spikes || 0) + sp.bloom;
      }
    }
    const hr = M.hitResult;
    const effNote = [
      sp.mauler ? `Mauler (Lock=${hr.lock}+)` : '',
      sp.calibre && sp.calibre.toUpperCase().includes(td.tonnage) ? 'Calibre +1' : '',
      sp.scald ? `Scald-${sp.scald}` : '', sp.reave ? `Reave-${sp.reave}` : '',
      sp.burnthrough ? `Burnthrough-${sp.burnthrough}` : '', sp.penetrator ? 'Penetrator' : '',
      sp.critical ? `Critical-${sp.critical}` : ''
    ].filter(Boolean).join(' · ');
    body = `<div class="am-step-head">Shot ${M.shotIdx+1}/${M.shots.length} · Roll to Hit</div>
      <div class="am-line"><b>${s.w.name}</b>${s.volleyOf>1?` <span style="color:var(--hull-warn);font-size:9px;">Volley ${s.volleyIdx}/${s.volleyOf}</span>`:''} ▶ ${td.name} · ${hr.forceSix?'<span style="color:var(--hull-warn)">Atmosphere: hits 6+ only, no crit</span>':`Lock ${hr.lock}+ (${s.w.type})`}</div>
      ${effNote?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">${effNote}</div>`:''}
      <div class="am-dice">${hr.dice.map(d => `<span class="am-die ${d.isCrit?'crit':d.isHit?'hit':'miss'}">${d.r}</span>`).join('')}</div>
      <div class="am-line"><b>${hr.hits}</b> hit${hr.hits!==1?'s':''}${hr.crits?` · <span style="color:var(--hull-warn)">${hr.crits} critical</span>`:''}</div>`;
    {
      const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
      const missCount = hr.dice.filter(d => !d.isHit).length;
      if (!hr.rerolled && atkSide && state.planning && state.planning.ap[atkSide] >= 1 && missCount > 0) {
        const maxRR = Math.min(missCount, state.planning.ap[atkSide]);
        const n = Math.min(M.rerollN || maxRR, maxRR);
        body += `<div class="am-line" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:10px;">Re-roll</span>
          <button class="btn" data-rr-adj="-1" style="font-size:11px;padding:1px 7px;">−</button>
          <b style="font-size:11px;">${n}</b>
          <button class="btn" data-rr-adj="1" style="font-size:11px;padding:1px 7px;">+</button>
          <span style="font-size:9px;color:var(--text-mute);">of ${missCount} miss${missCount>1?'es':''} · max ${maxRR} AP</span>
          <button class="btn" data-am-reroll="hit" style="font-size:10px;">↻ Re-roll ${n} (${n} AP)</button>
        </div>`;
      }
    }
    footer = `<button class="btn" data-am-cancel="1">Abort</button>
      <button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="save">${hr.hits>0?'Roll Saves ▸':'No hits — Continue ▸'}</button>`;
  }

  else if (M.step === 'save') {
    const s = M.shots[M.shotIdx];
    const td = getDef(s.targetGid);
    const ts = state.groups[s.targetGid].ships[s.targetSi];
    const sp = parseWeaponSpecials(s.w);
    if (!M.saveResult) {
      const hr = M.hitResult;
      const k = targetKey(s.targetGid, s.targetSi);
      const shieldUp = !!M.shieldsUp[k];
      const sat = M.saturation || 0;       // bomber Saturation Fire: ignore some hits' saves
      // Build a per-hit list. Each non-crit hit and each crit hit is one entry.
      // Penetrator: criticals become Core hits (use Shield/none save).
      // Burnthrough: each crit lowers THIS weapon's ES/KS by X for all its hits.
      const critCount = hr.crits;
      const burnReduce = sp.burnthrough * critCount; // total ES/KS reduction from burnthrough
      const hitsList = [];
      let critsRemaining = hr.crits;
      for (let i = 0; i < hr.hits; i++) {
        const isCrit = critsRemaining > 0; if (isCrit) critsRemaining--;
        let type = s.w.type;
        if (isCrit && sp.penetrator) type = 'C'; // critical → Core hit
        // Base save for this hit's type.
        let sv = baseSaveForType(td, ts, type, shieldUp);
        // ES/KS modifiers (Scald, Reave, Burnthrough) apply to E/K hits ONLY, and
        // are IGNORED when the Shield Save is in use (Shield ignores ES/KS modifiers).
        if (sv != null && type !== 'C' && !shieldUp) {
          let red = sp.scald + burnReduce + (isCrit ? sp.reave : 0);
          if (red) sv = Math.min(6, sv + red); // worse save (capped at 6+)
        }
        // Damage for this hit: Critical-X adds X to a crit's damage.
        const ocOn = M.overcharge && M.overcharge[s.wi];
        const baseDmg = ocOn ? (s.w.dmg * 2) : s.w.dmg;
        const dmg = baseDmg + (isCrit ? sp.critical : 0);
        hitsList.push({ isCrit, type, sv, dmg, saved: false, savedBy: null });
      }
      // Roll saves per hit (primary), honouring Saturation (skip saves for `sat` hits).
      const primDice = [];
      let skipSaves = sat;
      hitsList.forEach(h => {
        if (h.sv == null) return; // no save possible
        if (skipSaves > 0) { skipSaves--; h.noSaveDie = true; return; } // saturation removes the save die
        const r = rollDie(); const ok = r >= h.sv;
        primDice.push({ r, ok, sv: h.sv, crit: h.isCrit });
        if (ok) { h.saved = true; h.savedBy = 'primary'; }
      });
      // Shield-X: the Group gains 1 Spike each time it uses Shield Saves (once per
      // attack sequence, regardless of how many saves were rolled).
      if (shieldUp && !M.shieldSpiked) {
        M.shieldSpiked = M.shieldSpiked || {};
        if (!M.shieldSpiked[k]) { M.shieldSpiked[k] = true; ts.spikes = (ts.spikes || 0) + 1; }
      }
      // Backup saves and Aegis are DEFERRED until after any re-rolls (AP / Fighter
      // Close Protection) are applied to the primary ES/KS saves. Stored here so the
      // backup step can use them; the dice are rolled in rollDeferredBackupSaves().
      let backupVal = saveVal(td.bs);
      const tgrp = state.groups[s.targetGid];
      if (tgrp && tgrp.ships.length > 1 && groupInFormation(td)) {
        backupVal = (backupVal == null) ? 6 : Math.min(backupVal, 6);
      }
      const backDice = [];
      const isBomberAtk = M.bomber && (M.bomberKind === 'bomber' || M.bomberKind === 'fireship');
      const isCloseAction = /Close Action/i.test(s.w.special || '');
      const aegisDice = [];
      let aegisY = 0;
      const dmg = hitsList.filter(h => !h.saved).reduce((a, h) => a + h.dmg, 0);
      const unsaved = hitsList.filter(h => !h.saved).length;
      // Status applies on a HIT (regardless of damage); Corruptor on damage.
      M.saveResult = { hitsList, primDice, backDice, backupVal, aegisDice, aegisY, unsaved, dmg,
        backupRolled: false, targetGid: s.targetGid, isBomberAtk, isCloseAction,
        flash: sp.flash, crippling: sp.crippling, penetrator: sp.penetrator,
        status: sp.status && hitsList.length > 0, corruptor: (sp.corruptor && dmg > 0) ? sp.corruptor : 0,
        critDamaged: hitsList.some(h => h.isCrit && !h.saved) };
    }
    const sr = M.saveResult;
    const typeLabel = (t) => t === 'E' ? 'ES' : t === 'K' ? 'KS' : 'Shield/Core';
    const primFailedNow = sr.hitsList.filter(h => !h.saved && h.sv != null && !h.noSaveDie).length;
    body = `<div class="am-step-head">Shot ${M.shotIdx+1}/${M.shots.length} · ${sr.backupRolled ? 'Saves' : 'ES / KS Saves'}</div>
      <div class="am-line">${td.name} — ${sr.hitsList.length} hit${sr.hitsList.length!==1?'s':''}${sr.penetrator?' (criticals → Core)':''}</div>
      ${sr.primDice.length?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">Primary saves (vs each hit's modified save):</div>
        <div class="am-dice">${sr.primDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}" title="vs ${d.sv}+${d.crit?' (crit)':''}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled && sr.backDice.length?`<div class="am-line" style="font-size:9px;color:var(--text-mute)">Backup saves (${td.bs}):</div>
        <div class="am-dice">${sr.backDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled && sr.aegisDice && sr.aegisDice.length?`<div class="am-line" style="font-size:9px;color:#4ad6ff">Aegis-${sr.aegisY} save dice:</div>
        <div class="am-dice">${sr.aegisDice.map(d=>`<span class="am-die ${d.ok?'hit':'miss'}">${d.r}</span>`).join('')}</div>`:''}
      ${sr.backupRolled
        ? `<div class="am-line"><b>${sr.unsaved}</b> unsaved → <b style="color:var(--hull-crit)">${sr.dmg} damage</b>${sr.flash?` · <span style="color:var(--hull-warn)">Flash-${sr.flash} (${sr.dmg>0?'+'+sr.flash+' spike':'no dmg'})</span>`:''}${sr.crippling&&sr.critDamaged?` · <span style="color:var(--hull-warn)">Crippling!</span>`:''}</div>`
        : `<div class="am-line" style="color:var(--text-mute);font-size:10px;"><b>${primFailedNow}</b> hit${primFailedNow!==1?'s':''} unsaved so far${sr.backupVal != null ? ` — Backup (${td.bs}) still to roll` : (sr.isBomberAtk || sr.isCloseAction) ? ' — Aegis still to roll' : ''}</div>`}`;
    if (!sr.backupRolled) {
      const failed = sr.primDice.filter(d => !d.ok).length;
      if (!sr.rerolled && td.side && state.planning && state.planning.ap[td.side] >= 1 && failed > 0) {
        const maxRR = Math.min(failed, state.planning.ap[td.side]);
        const n = Math.min(M.rerollN || maxRR, maxRR);
        body += `<div class="am-line" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:10px;">Re-roll</span>
          <button class="btn" data-rr-adj="-1" style="font-size:11px;padding:1px 7px;">−</button>
          <b style="font-size:11px;">${n}</b>
          <button class="btn" data-rr-adj="1" style="font-size:11px;padding:1px 7px;">+</button>
          <span style="font-size:9px;color:var(--text-mute);">of ${failed} failed · max ${maxRR} AP</span>
          <button class="btn" data-am-reroll="save" style="font-size:10px;">↻ Re-roll ${n} (${n} AP)</button>
        </div>`;
      }
      // ── CLOSE PROTECTION (Fighters) ──
      // Vs Close Action / Bomber / Fire-Ship attacks, the defender may re-roll failed
      // PRIMARY saves using friendly Fighters within Fighter Thrust range (before Backup).
      {
        const isBomberAtk = M.bomber && (M.bomberKind === 'bomber' || M.bomberKind === 'fireship');
        const isCloseAction = parseWeaponSpecials(s.w).closeAction || /Close Action/i.test(s.w.special || '');
        if ((isBomberAtk || isCloseAction) && failed > 0 && td.side && !sr.fighterRerolled) {
          const wings = friendlyFightersInRange(td.side, ts.x, ts.y);
          const avail = wings.reduce((a, w) => a + w.count, 0);
          if (avail > 0) {
            M.fighterSpend = M.fighterSpend || {};
            const spendTotal = wings.reduce((a, w) => a + (M.fighterSpend[w.id] || 0), 0);
            const cap = Math.min(failed, avail);
            body += `<div class="am-line" style="border-top:1px dashed var(--border);margin-top:6px;padding-top:6px;">
              <div style="font-size:10px;color:#7fd6a0;margin-bottom:3px;">🛡 Close Protection — re-roll failed saves with Fighters (1 fighter each, max ${cap}):</div>`;
            wings.forEach((w, i) => {
              const cur = M.fighterSpend[w.id] || 0;
              body += `<div style="display:flex;align-items:center;gap:6px;font-size:10px;margin:2px 0;">
                <span style="flex:1;">Fighter Wing ${i + 1} <span style="color:var(--text-mute)">(${w.count} craft)</span></span>
                <button class="btn" data-fp-adj="${w.id}|-1" style="font-size:11px;padding:1px 7px;">−</button>
                <b>${cur}</b>
                <button class="btn" data-fp-adj="${w.id}|1" style="font-size:11px;padding:1px 7px;">+</button>
              </div>`;
            });
            body += `<button class="btn" data-am-fighter-reroll="1" style="font-size:10px;margin-top:3px;color:#7fd6a0;border-color:#7fd6a0;" ${spendTotal>0?'':'disabled'}>↻ Re-roll ${spendTotal} save${spendTotal!==1?'s':''} (spend ${spendTotal} fighter${spendTotal!==1?'s':''})</button>
            </div>`;
          }
        }
      }
    }
    // Footer: if Backup/Aegis are still to roll and hits remain unsaved → roll them
    // (after re-rolls); otherwise apply damage.
    const needBackup = !sr.backupRolled && sr.hitsList.some(h => !h.saved && h.sv != null) &&
      (sr.backupVal != null || ((sr.isBomberAtk || sr.isCloseAction) && !M.aegisUsed && aegisValueForGroup(sr.targetGid) > 0));
    if (needBackup) {
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="rollbackup">Roll Backup Saves ▸</button>`;
    } else {
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="apply">Apply Damage ▸</button>`;
    }
  }

  else if (M.step === 'crippling') {
    const c = M.crippleQueue[0];
    const defSide = getDef(c.gid) ? getDef(c.gid).side : null;
    const canBrace = defSide && state.planning && state.planning.ap[defSide] >= 2 && !c.braced;
    if (!c.rolled) {
      // PRE-ROLL: declare Brace for Impact (set result to 4) BEFORE rolling.
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull.</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 2D6 for the effect.</div>
        ${canBrace?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-brace="1" style="font-size:10px;">⚙ Brace for Impact (2 AP → set result to 4, no roll)</button></div>`
          : c.braced?`<div class="am-line" style="color:var(--hull-warn)">Bracing for Impact — result will be 4.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-roll">${c.braced?'Apply (4) ▸':'Roll 2D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Crippling Effect</div>
        <div class="am-line"><b>${c.name}</b> dropped below half Hull${c.braced?' · <span style="color:var(--hull-warn)">Braced</span>':''}:</div>
        <div class="am-dice">${c.d1!=null?`<span class="am-die">${c.d1}</span><span class="am-die">${c.d2}</span> = `:''}<b>${c.total}</b></div>
        <div class="am-line" style="color:var(--hull-warn)"><b>${c.effectName}</b></div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${c.effectDesc}</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="crippling-next">Apply ▸</button>`;
    }
  }

  else if (M.step === 'explosion') {
    const ex = M.explodeQueue[0];
    const defSide = getDef(ex.gid) ? getDef(ex.gid).side : null;
    const canContain = defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained;
    if (!ex.rolled) {
      // PRE-ROLL: declare Contain Reactor (set result to 2) BEFORE rolling.
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed — explosion imminent (range ${ex.rangeIn}").</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">Declare Admiral abilities, then roll 1D6${ex.mod?` (+${ex.mod} tonnage)`:''}. The radius is shown on the map.</div>
        ${canContain?`<div class="am-line" style="margin-top:6px;"><button class="btn" data-am-contain="1" style="font-size:10px;">⚙ Contain Reactor (2 AP → set result to 2, no roll)</button></div>`
          : ex.contained?`<div class="am-line" style="color:var(--hull-crit)">Containing Reactor — result will be 2.</div>`:''}`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-roll">${ex.contained?'Resolve (2) ▸':'Roll 1D6 ▸'}</button>`;
    } else {
      body = `<div class="am-step-head">Explosion!</div>
        <div class="am-line"><b>${ex.name}</b> destroyed${ex.contained?' · <span style="color:var(--hull-crit)">Contained</span>':''}:</div>
        <div class="am-dice">${ex.d1!=null?`<span class="am-die">${ex.d1}</span>`:''}${ex.mod?` + ${ex.mod} = <b>${ex.total}</b>`:''}</div>
        <div class="am-line" style="color:var(--hull-crit)"><b>${ex.effectName}</b> (range ${ex.rangeIn}"${ex.effKind==='spike2x'?' ×2':''})</div>
        <div class="am-line" style="font-size:10px;color:var(--text-dim)">${ex.effectDesc}</div>
        <div class="am-line" style="font-size:9px;color:var(--text-mute)">Applied to ships${ex.effAssets?' & assets':''} in range on the ${ex.layer} layer.</div>`;
      footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-next="explosion-next">Resolve ▸</button>`;
    }
  }

  else if (M.step === 'impel') {
    const q = M.impelQueue[0];
    const tdef = getDef(q.gid);
    body = `<div class="am-step-head">Impel-${q.x}</div>
      <div class="am-line"><b>${tdef.name}</b> was struck by ${q.big?`≥${q.x*2}`:`≥${q.x}`} criticals. Attacker chooses:</div>
      <div class="am-line" style="margin-top:6px;">
        <button class="btn" data-impel="turn" style="font-size:10px;margin-right:6px;">↻ Turn ${q.big?'90°':'45°'}</button>
        <button class="btn" data-impel="move" style="font-size:10px;">→ Move forward up to ${q.x*2}"</button>
      </div>
      <div class="am-line" style="font-size:9px;color:var(--text-mute)">Turn rotates all ships in place; Move shifts them straight forward (auto, clamped to the table).</div>`;
    footer = '';
  }

  else if (M.step === 'done') {
    body = `<div class="am-step-head">Attack Resolved</div>
      ${M.log.map(l => `<div class="am-line" style="font-size:10px;">${l}</div>`).join('')}`;
    footer = `<button class="btn-primary ${sideClass==='shal'?'shal':''}" data-am-close="1">Done</button>`;
  }

  overlay = document.createElement('div');
  overlay.id = 'attack-overlay';
  overlay.className = 'setup-overlay';
  overlay.style.zIndex = '300';
  overlay.innerHTML = `<div class="setup-card" style="max-width:420px;">
    <div class="setup-header"><h2 class="setup-title" style="color:var(--hull-crit)">⚔ ATTACK</h2></div>
    <div class="setup-body">${body}</div>
    <div class="setup-footer">${footer}</div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelectorAll('[data-shield-toggle]').forEach(cb => {
    cb.addEventListener('change', () => { M.shieldsUp[cb.dataset.shieldToggle] = cb.checked; });
  });
  overlay.querySelectorAll('[data-overcharge]').forEach(cb => {
    cb.addEventListener('change', () => { M.overcharge = M.overcharge || {}; M.overcharge[cb.dataset.overcharge] = cb.checked; });
  });
  overlay.querySelectorAll('[data-escort]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.escort);
      const s = M.shots[idx];
      if (!s || s.escortedTo) return;
      const esc = eligibleEscort(s.targetGid, s.targetSi);
      if (!esc) { renderAll(); return; }
      // Only one Group may Escort at a time across this attack.
      if (M.escortGid && M.escortGid !== esc.gid) { flashLaunchMsg('Only one Escort Group per attack'); return; }
      M.escortGid = esc.gid;
      const eg = state.groups[esc.gid];
      const leadIdx = eg.ships.findIndex(sh => !sh.destroyed && !sh.offTable);
      // Remember the original target (for the cap) and redirect the shot to the Escort.
      s.escortedTo = { gid: esc.gid, si: leadIdx, origGid: s.targetGid, origSi: s.targetSi };
      s.targetGid = esc.gid; s.targetSi = leadIdx;
      flashLaunchMsg(`Escort: ${esc.name} intercepts hits`, true);
      renderAll();
    });
  });
  const cancelBtn = overlay.querySelector('[data-am-cancel]');
  if (cancelBtn) cancelBtn.addEventListener('click', () => { state.attackModal = null; renderAll(); });
  const closeBtn = overlay.querySelector('[data-am-close]');
  if (closeBtn) closeBtn.addEventListener('click', () => { finishAttack(); });
  const nextBtn = overlay.querySelector('[data-am-next]');
  if (nextBtn) nextBtn.addEventListener('click', () => advanceAttack(nextBtn.dataset.amNext));
  const braceBtn = overlay.querySelector('[data-am-brace]');
  if (braceBtn) braceBtn.addEventListener('click', () => {
    const c = M.crippleQueue[0]; const defSide = getDef(c.gid) && getDef(c.gid).side;
    if (defSide && state.planning && state.planning.ap[defSide] >= 2 && !c.braced) {
      state.planning.ap[defSide] -= 2; c.braced = true;
      M.log.push(`${factionName(defSide)} Braced for Impact (crippling → 4)`);
      renderAll();
    }
  });
  const containBtn = overlay.querySelector('[data-am-contain]');
  if (containBtn) containBtn.addEventListener('click', () => {
    const ex = M.explodeQueue[0]; const defSide = getDef(ex.gid) && getDef(ex.gid).side;
    if (defSide && state.planning && state.planning.ap[defSide] >= 2 && !ex.contained) {
      state.planning.ap[defSide] -= 2; ex.contained = true;
      M.log.push(`${factionName(defSide)} Contained Reactor (explosion → 2)`);
      renderAll();
    }
  });
  overlay.querySelectorAll('[data-impel]').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = btn.dataset.impel;
      const q = M.impelQueue.shift();
      const grp = state.groups[q.gid];
      if (grp) {
        if (choice === 'turn') {
          const turn = q.big ? 90 : 45;
          grp.ships.forEach(s => { if (!s.destroyed && !s.offTable) s.heading = ((s.heading || 0) + turn) % 360; });
          M.log.push(`Impel: ${getDef(q.gid).name} turned ${turn}°`);
        } else {
          const distPx = q.x * 2 * INCH;
          grp.ships.forEach(s => {
            if (s.destroyed || s.offTable) return;
            const rad = (s.heading || 0) * Math.PI / 180;
            s.x = Math.max(0, Math.min(BOARD_PX, s.x + Math.cos(rad) * distPx));
            s.y = Math.max(0, Math.min(BOARD_PX, s.y + Math.sin(rad) * distPx));
          });
          M.log.push(`Impel: ${getDef(q.gid).name} moved forward ${q.x*2}"`);
        }
      }
      proceedQueues();
      renderAll();
    });
  });
  overlay.querySelectorAll('[data-rr-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const delta = parseInt(btn.dataset.rrAdj);
      // Compute the current max from whichever step we're in.
      let maxRR = 1;
      if (M.step === 'hit' && M.hitResult) {
        const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
        const miss = M.hitResult.dice.filter(d => !d.isHit).length;
        maxRR = Math.min(miss, (state.planning && state.planning.ap[atkSide]) || 0);
      } else if (M.step === 'save' && M.saveResult) {
        const td = getDef(M.shots[M.shotIdx].targetGid);
        const failed = M.saveResult.primDice.filter(d => !d.ok).length;
        maxRR = Math.min(failed, (state.planning && state.planning.ap[td.side]) || 0);
      }
      const cur = Math.min(M.rerollN || maxRR, maxRR);
      M.rerollN = Math.max(1, Math.min(maxRR, cur + delta));
      renderAll();
    });
  });
  // Close Protection: per-Wing fighter spend stepper.
  overlay.querySelectorAll('[data-fp-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [wingId, deltaStr] = btn.dataset.fpAdj.split('|');
      const delta = parseInt(deltaStr);
      const sr = M.saveResult; if (!sr) return;
      const s = M.shots[M.shotIdx]; const td = getDef(s.targetGid);
      const ts = state.groups[s.targetGid].ships[s.targetSi];
      const failed = sr.primDice.filter(d => !d.ok).length;
      const wings = friendlyFightersInRange(td.side, ts.x, ts.y);
      const avail = wings.reduce((a, w) => a + w.count, 0);
      const cap = Math.min(failed, avail);
      M.fighterSpend = M.fighterSpend || {};
      const wing = wings.find(w => w.id === wingId);
      if (!wing) return;
      const curWing = M.fighterSpend[wingId] || 0;
      const otherSpend = Object.keys(M.fighterSpend).reduce((a, k) => a + (k === wingId ? 0 : (M.fighterSpend[k] || 0)), 0);
      const room = Math.max(0, cap - otherSpend); // total cap minus what other wings already spend
      M.fighterSpend[wingId] = Math.max(0, Math.min(wing.count, room, curWing + delta));
      renderAll();
    });
  });
  // Close Protection: re-roll failed saves, spending the selected fighters.
  const fpRerollBtn = overlay.querySelector('[data-am-fighter-reroll]');
  if (fpRerollBtn) fpRerollBtn.addEventListener('click', () => {
    const sr = M.saveResult; if (!sr) return;
    const s = M.shots[M.shotIdx]; const td = getDef(s.targetGid);
    const spend = M.fighterSpend || {};
    let nSpend = Object.keys(spend).reduce((a, k) => a + (spend[k] || 0), 0);
    if (nSpend <= 0) return;
    // Remove the spent fighters from their Wings.
    Object.keys(spend).forEach(wingId => {
      const n = spend[wingId] || 0; if (!n) return;
      const a = (state.launchedAssets || []).find(x => x.id === wingId);
      if (a) a.count = Math.max(0, a.count - n);
    });
    state.launchedAssets = (state.launchedAssets || []).filter(a => a.count > 0);
    // Re-roll up to nSpend failed primary saves.
    const failedIdx = sr.primDice.map((d, i) => (!d.ok ? i : -1)).filter(i => i >= 0);
    failedIdx.slice(0, nSpend).forEach(i => { const d = sr.primDice[i]; d.r = rollDie(); d.ok = d.r >= d.sv; });
    // Recompute saved flags from scratch using new primDice + existing backup/aegis saves.
    let pIdx = 0;
    sr.hitsList.forEach(h => { h.saved = false; h.savedBy = null; });
    sr.hitsList.forEach(h => { if (h.sv == null || h.noSaveDie) return; const d = sr.primDice[pIdx++]; if (d && d.ok) { h.saved = true; h.savedBy = 'primary'; } });
    let bIdx = 0;
    if (sr.backupVal != null) sr.hitsList.forEach(h => { if (h.saved) return; const d = sr.backDice[bIdx++]; if (d && d.ok) { h.saved = true; h.savedBy = 'backup'; } });
    sr.dmg = sr.hitsList.filter(h => !h.saved).reduce((a, h) => a + h.dmg, 0);
    sr.unsaved = sr.hitsList.filter(h => !h.saved).length;
    sr.fighterRerolled = true; M.fighterSpend = {};
    M.log.push(`${factionName(td.side)} Close Protection: re-rolled ${nSpend} save${nSpend!==1?'s':''} (−${nSpend} fighters)`);
    renderAll();
  });
  const rerollBtn = overlay.querySelector('[data-am-reroll]');
  if (rerollBtn) rerollBtn.addEventListener('click', () => {
    const which = rerollBtn.dataset.amReroll;
    if (which === 'hit') {
      const hr = M.hitResult;
      const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
      const missIdx = hr.dice.map((d, i) => (!d.isHit ? i : -1)).filter(i => i >= 0);
      const maxRR = Math.min(missIdx.length, (state.planning && state.planning.ap[atkSide]) || 0);
      const n = Math.min(M.rerollN || maxRR, maxRR);
      if (atkSide && n > 0) {
        state.planning.ap[atkSide] -= n;
        missIdx.slice(0, n).forEach(i => { const d = hr.dice[i]; d.r = rollDie(); d.isHit = d.r >= hr.lock; d.isCrit = d.r >= hr.lock + 2; });
        hr.hits = hr.dice.filter(d => d.isHit).length;
        hr.crits = hr.dice.filter(d => d.isCrit).length;
        hr.rerolled = true; M.rerollN = null;
        M.log.push(`${factionName(atkSide)} AP Re-roll ${n} (${n} AP)`);
        renderAll();
      }
    } else if (which === 'save') {
      const sr = M.saveResult; const s = M.shots[M.shotIdx];
      const td = getDef(s.targetGid); const defSide = td.side;
      const failedIdx = sr.primDice.map((d, i) => (!d.ok ? i : -1)).filter(i => i >= 0);
      const maxRR = Math.min(failedIdx.length, (state.planning && state.planning.ap[defSide]) || 0);
      const n = Math.min(M.rerollN || maxRR, maxRR);
      if (defSide && n > 0) {
        state.planning.ap[defSide] -= n;
        failedIdx.slice(0, n).forEach(i => { const d = sr.primDice[i]; d.r = rollDie(); d.ok = d.r >= d.sv; });
        // Recompute saved flags from scratch using new primDice + existing backups.
        let pIdx = 0;
        sr.hitsList.forEach(h => { h.saved = false; h.savedBy = null; });
        sr.hitsList.forEach(h => {
          if (h.sv == null || h.noSaveDie) return;
          const d = sr.primDice[pIdx++]; if (d && d.ok) { h.saved = true; h.savedBy = 'primary'; }
        });
        let bIdx = 0;
        if (sr.backupVal != null) sr.hitsList.forEach(h => { if (h.saved) return; const d = sr.backDice[bIdx++]; if (d && d.ok) { h.saved = true; h.savedBy = 'backup'; } });
        sr.dmg = sr.hitsList.filter(h => !h.saved).reduce((a, h) => a + h.dmg, 0);
        sr.unsaved = sr.hitsList.filter(h => !h.saved).length;
        sr.rerolled = true; M.rerollN = null;
        M.log.push(`${factionName(defSide)} AP Re-roll ${n} saves (${n} AP)`);
        renderAll();
      }
    }
  });
}

/* Advance the attack state machine. */
function advanceAttack(to) {
  const M = state.attackModal;
  if (!M) return;
  if (to === 'hit') { M.step = 'hit'; M.shotIdx = 0; M.hitResult = null; M.rerollN = null; }
  else if (to === 'save') {
    M.rerollN = null; M.fighterSpend = {};
    if (M.hitResult.hits > 0) { M.step = 'save'; M.saveResult = null; }
    else { nextShotOrResolve(); }
  }
  else if (to === 'rollbackup') {
    // Primary saves (and any re-rolls) are locked in — now roll Backup + Aegis saves.
    rollDeferredBackupSaves(M);
    renderAll();
    return;
  }
  else if (to === 'apply') {
    // If backups weren't rolled yet (e.g. none available), roll them now (safe no-op).
    if (M.saveResult && !M.saveResult.backupRolled) rollDeferredBackupSaves(M);
    // Accumulate damage onto the target.
    const s = M.shots[M.shotIdx];
    const k = targetKey(s.targetGid, s.targetSi);
    const sr = M.saveResult;
    M.pendingDamage[k] = (M.pendingDamage[k] || 0) + sr.dmg;
    // Track whether any NON-Focused damage hit this target (enables group spillover).
    if (sr.dmg > 0 && !parseWeaponSpecials(s.w).focused) {
      M.spillEligible = M.spillEligible || {};
      M.spillEligible[k] = true;
    }
    // Flash-X: target gains X spikes when this weapon inflicts damage.
    if (sr.flash && sr.dmg > 0) {
      M.pendingFlash = M.pendingFlash || {};
      M.pendingFlash[k] = (M.pendingFlash[k] || 0) + sr.flash;
    }
    // Crippling-X: if this weapon scored a critical that caused damage, force a
    // crippling effect on the target regardless of tonnage.
    if (sr.crippling && sr.critDamaged && sr.dmg > 0) {
      M.forcedCripple = M.forcedCripple || {};
      M.forcedCripple[k] = true;
    }
    // Status: on a hit, mark target to gain a Scanners Offline token (auto-removed at
    // start of the End Phase). Corruptor-X: place X Battalions on the target ship.
    if (sr.status) { M.pendingStatus = M.pendingStatus || {}; M.pendingStatus[k] = true; }
    if (sr.corruptor) { M.pendingCorruptor = M.pendingCorruptor || {}; M.pendingCorruptor[k] = (M.pendingCorruptor[k] || 0) + sr.corruptor; }
    // Arrest-X: a ship damaged by this weapon reduces Thrust by X" next activation (once/round).
    const spA = parseWeaponSpecials(s.w);
    if (spA.arrest && sr.dmg > 0) {
      M.pendingArrest = M.pendingArrest || {};
      M.pendingArrest[k] = Math.max(M.pendingArrest[k] || 0, spA.arrest);
    }
    // Impel-X: if this weapon scored ≥X criticals vs the group, queue a forced move/turn.
    if (spA.impel && M.hitResult && M.hitResult.crits >= spA.impel) {
      M.pendingImpel = M.pendingImpel || {};
      const big = M.hitResult.crits >= spA.impel * 2;
      M.pendingImpel[s.targetGid] = { x: spA.impel, big };
    }
    const td = getDef(s.targetGid);
    M.log.push(`${s.w.name} ▶ ${td.name}: ${sr.dmg} dmg${sr.flash&&sr.dmg>0?` (+${sr.flash} spike)`:''}`);
    nextShotOrResolve();
  }
  else if (to === 'crippling-roll') {
    const c = state.attackModal.crippleQueue[0];
    rollCrippleEffect(c, c.braced ? 4 : null);
    renderAll();
  }
  else if (to === 'explosion-roll') {
    const ex = state.attackModal.explodeQueue[0];
    rollExplosionEffect(ex, ex.contained ? 2 : null);
    renderAll();
  }
  else if (to === 'crippling-next') { applyCrippling(); }
  else if (to === 'explosion-next') { applyExplosion(); }
  renderAll();
}

/* Move to the next shot, or once all shots done, apply damage & queue crippling/explosion. */
function nextShotOrResolve() {
  const M = state.attackModal;
  if (M.shotIdx < M.shots.length - 1) {
    M.shotIdx++; M.hitResult = null; M.saveResult = null; M.step = 'hit';
    return;
  }
  // All shots resolved — apply accumulated damage now.
  resolveAccumulatedDamage();
}

/* Per-ship points value (group points divided by group size). */
function shipPoints(def) { return Math.round((def.pts || 0) / (def.groupSize || 1)); }

/* Award Victory Points: mutates the score, records a structured entry in state.scoreLog
   (for the breakdown view), returns a text line (for round/end logs), and fires a
   transient on-board notification. `vp` may be negative (e.g. Protect penalty). */
function awardVP(side, vp, reason, round) {
  if (!vp || !state.score || !state.score[side]) return null;
  state.score[side].vp += vp;
  state.scoreLog = state.scoreLog || [];
  const entry = { round: round != null ? round : (state.round || 0), side, vp, reason };
  state.scoreLog.push(entry);
  notifyVP(side, vp, reason);
  logEvent(`${factionName(side)} ${vp >= 0 ? '+' : ''}${vp} VP — ${reason}`);
  return `${factionName(side)} ${vp >= 0 ? '+' : ''}${vp} VP (${reason})`;
}

/* Append a game event to the log (orders, moves, shots, launches, extracts, etc.). */
function logEvent(text) {
  if (!text) return;
  state.eventLog = state.eventLog || [];
  state.eventLog.push({ round: state.round || 0, text, ts: Date.now() });
  // Cap the stored history to keep things light.
  if (state.eventLog.length > 400) state.eventLog.shift();
  renderEventLog();
}

/* Event-log dock at the bottom of the right panel. Always shown in play; collapsed
   shows the last 3 events, expanded shows a taller scrollable history. */
function renderEventLog() {
  const dock = document.getElementById('event-log-dock');
  if (!dock) return;
  if (state.phase !== 'play') { dock.innerHTML = ''; dock.style.display = 'none'; return; }
  dock.style.display = '';
  const log = state.eventLog || [];
  const expanded = !!state.logExpanded;
  const shown = expanded ? log.slice().reverse() : log.slice(-3).reverse();
  const rows = shown.length
    ? shown.map(e => `<div style="padding:3px 11px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:7px;font-size:9.5px;font-family:var(--mono);">
        <span style="color:var(--text-mute);flex-shrink:0;">R${e.round}</span>
        <span style="color:var(--text-dim);">${e.text}</span></div>`).join('')
    : `<div style="padding:6px 11px;color:var(--text-mute);font-size:9.5px;font-family:var(--mono);">No events yet.</div>`;
  dock.innerHTML = `
    <button id="event-log-toggle" style="display:flex;align-items:center;gap:6px;width:100%;text-align:left;
      background:rgba(255,255,255,0.03);border:none;border-bottom:1px solid var(--border);padding:6px 11px;cursor:pointer;font-family:var(--mono);">
      <span style="font-size:8px;letter-spacing:0.14em;color:var(--text-mute);">EVENT LOG</span>
      <span style="color:var(--text-mute);font-size:8px;">${log.length}</span>
      <span style="margin-left:auto;color:var(--text-mute);font-size:10px;">${expanded ? '▾ collapse' : '▴ expand'}</span>
    </button>
    <div id="event-log-body" style="${expanded ? 'max-height:240px;' : 'max-height:none;'}overflow-y:auto;">${rows}</div>`;
  const toggle = dock.querySelector('#event-log-toggle');
  if (toggle) toggle.addEventListener('click', () => { state.logExpanded = !state.logExpanded; renderEventLog(); });
  const body = dock.querySelector('#event-log-body');
  if (expanded && body) body.scrollTop = 0;
}

/* Transient VP-award toast, stacked at top-centre of the board. */
function notifyVP(side, vp, reason) {
  const board = document.querySelector('.board-wrap');
  if (!board) return;
  let tray = document.getElementById('vp-toasts');
  if (!tray) {
    tray = document.createElement('div');
    tray.id = 'vp-toasts';
    tray.style.cssText = 'position:absolute;top:46px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;';
    board.appendChild(tray);
  }
  const t = document.createElement('div');
  t.style.cssText = `background:rgba(10,14,13,0.94);border:1px solid var(--${side});border-left:4px solid var(--${side});border-radius:5px;padding:7px 13px;font-family:var(--mono);font-size:11px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.5);opacity:0;transform:translateY(-6px);transition:opacity .2s,transform .2s;`;
  t.innerHTML = `<b style="color:var(--${side})">${factionName(side)}</b> <b style="color:${vp>=0?'var(--hull-good,#6ec97a)':'var(--hull-crit)'}">${vp>=0?'+':''}${vp} VP</b> <span style="color:var(--text-mute)">· ${reason}</span>`;
  tray.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateY(0)'; });
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-6px)'; setTimeout(() => t.remove(), 250); }, 3400);
}

/* Award a destroyed ship's points to the killer's Kill Points (2× if captured). */
function recordKill(def, killerSide, captured, killedShipKey) {
  if (!killerSide || !state.score || !state.score[killerSide]) return;
  state.score[killerSide].kp += shipPoints(def) * (captured ? 2 : 1);
  logEvent(`${factionName(killerSide)} ${captured ? 'captured' : 'destroyed'} ${def.name} (+${shipPoints(def) * (captured ? 2 : 1)} KP)`);
  if (captured && state.captured) state.captured[killerSide] += shipPoints(def);
  // Extract: +1 VP per enemy Ship destroyed while it was carrying Recon Operatives.
  if (killedShipKey && state.shipReconOps && state.shipReconOps[killedShipKey] > 0) {
    state.reconKills = state.reconKills || { ucm: 0, shal: 0 };
    state.reconKills[killerSide] = (state.reconKills[killerSide] || 0) + 1;
    state.shipReconOps[killedShipKey] = 0; // operatives lost with the ship
  }
  // Decapitate: flag the victim side if this ship carried its admiral.
  if (def.flagship || (def.special && /Command Ship/i.test(def.special)) || (def.admiralLevel)) {
    if (state.admiralKilled) state.admiralKilled[def.side] = true;
  }
}

/* Standard Scoring VP for a dropsite size + control/contest. */
const DROPSITE_VP = { S: { control: 2, contest: 0 }, M: { control: 3, contest: 1 }, L: { control: 4, contest: 2 } };
function dropsiteSizeKey(ds) {
  const t = String((ds.base && ds.base.size) || ds.size || 'medium').toLowerCase();
  if (t === 's' || t === 'small') return 'S';
  if (t === 'l' || t === 'large') return 'L';
  return 'M';
}
/* Compute Standard Scoring VP gained this scoring round, per side.
   Objective modifiers:
   • Protect: a side's nominated Dropsite scores DOUBLE while intact; if Levelled, that
     side instead takes a penalty equal to the Dropsite's control value.
   • Raze: a Dropsite Levelled or Ruined ≥24" from a side's Zone scores DOUBLE for the
     OPPOSING side that razed/contests it (handled in runScoring's raze block, not here).
   Returns { ucm, shal } VP for this round. */
function computeStandardScoring() {
  const out = { ucm: 0, shal: 0 };
  const rows = []; // per-dropsite breakdown for the scoring modal
  const obj = state.scenario && state.scenario.objective;
  const noms = state.protectNom || {};
  ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => {
    const sz = dropsiteSizeKey(ds);
    const vp = DROPSITE_VP[sz] || DROPSITE_VP.M;
    const ctrl = dropsiteController(ds);
    const isLevelled = !!ds.destroyed;
    let ucmGain = 0, shalGain = 0, statusNote = '';
    if (obj === 'protect') {
      ['ucm','shal'].forEach(s => { if (noms[s] === ds.id && isLevelled) { out[s] -= vp.control; if (s==='ucm') ucmGain -= vp.control; else shalGain -= vp.control; statusNote = 'Protect penalty'; } });
    }
    if (isLevelled) {
      rows.push({ name: ds.base.name, sz, status: 'Levelled' + (statusNote?' · '+statusNote:''), ctrl: null, ucm: ucmGain, shal: shalGain });
      return;
    }
    if (ctrl) {
      let gain = vp.control;
      if (obj === 'protect' && noms[ctrl] === ds.id) { gain *= 2; statusNote = 'Protected ×2'; }
      out[ctrl] += gain;
      if (ctrl === 'ucm') ucmGain += gain; else shalGain += gain;
      rows.push({ name: ds.base.name, sz, status: 'Controlled' + (statusNote?' · '+statusNote:''), ctrl, ucm: ucmGain, shal: shalGain });
    } else if (dropsiteContested(ds)) {
      out.ucm += vp.contest; out.shal += vp.contest;
      rows.push({ name: ds.base.name, sz, status: 'Contested', ctrl: null, ucm: ucmGain + vp.contest, shal: shalGain + vp.contest });
    } else {
      rows.push({ name: ds.base.name, sz, status: 'Uncontrolled', ctrl: null, ucm: ucmGain, shal: shalGain });
    }
  });
  out.rows = rows;
  return out;
}
/* Run end-of-round Victory Point scoring (rounds 4 & 6 for standard scoring),
   plus the scenario's scoring-variant bonuses where computable. */
function runScoring(round) {
  const log = [];
  state.lastScoring = null; // set below for the R4/R6 standard-scoring modal
  if ((round === 4 || round === 6) && !state.scoredRounds.includes(round)) {
    state.scoredRounds.push(round);
    const std = computeStandardScoring();
    const l1 = awardVP('ucm', std.ucm, `Standard Scoring R${round}`, round);
    const l2 = awardVP('shal', std.shal, `Standard Scoring R${round}`, round);
    if (l1) log.push(l1); if (l2) log.push(l2);
    if (!l1 && !l2) log.push(`Standard Scoring (R${round}): no VP scored`);
    // Stash the per-dropsite breakdown for the scoring modal.
    state.lastScoring = { round, rows: std.rows, ucm: std.ucm, shal: std.shal };
  }
  // Scoring variant bonuses applied at game end (round 6).
  if (round === 6) {
    const obj = state.scenario && state.scenario.objective;
    const objName = (obj && OBJECTIVES[obj]) ? OBJECTIVES[obj].name : '';
    const push = (line) => { if (line) log.push(line); };
    // Attrition: +2 VP per 500 pts destroyed (both sides).
    if (obj === 'attrition') {
      ['ucm','shal'].forEach(s => push(awardVP(s, Math.floor(state.score[s].kp / 500) * 2, `${objName}: pts destroyed`, round)));
    }
    // Raze: +2 VP per 500 pts destroyed, PLUS double Standard Scoring value for each
    // Dropsite Levelled or Ruined that lies ≥24" from the scoring side's own Zone.
    if (obj === 'raze') {
      ['ucm','shal'].forEach(s => push(awardVP(s, Math.floor(state.score[s].kp / 500) * 2, `${objName}: pts destroyed`, round)));
      const razeVP = { ucm: 0, shal: 0 };
      ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => {
        const remHull = (ds.maxHull || 0) - (ds.damage || 0);
        const levelled = ds.destroyed || remHull <= 0;
        const ruined = !levelled && ds.maxHull && (remHull / ds.maxHull) < 0.5;
        if (!levelled && !ruined) return;
        const vp = (DROPSITE_VP[dropsiteSizeKey(ds)] || DROPSITE_VP.M).control;
        ['ucm','shal'].forEach(s => { if (distFromZoneIn(s, inchToPx(ds.y)) >= 24) razeVP[s] += vp; });
      });
      ['ucm','shal'].forEach(s => push(awardVP(s, razeVP[s], 'Raze: distant Levelled/Ruined', round)));
    }
    // Breakthrough: Red scores 1 VP per 200 pts flown off; the OTHER side scores kills.
    if (obj === 'breakthrough') {
      const flown = state.breakthroughFlyoff || { ucm: 0, shal: 0 };
      push(awardVP('ucm', Math.floor((flown.ucm || 0) / 200), `Breakthrough: ${flown.ucm} pts flown off`, round));
      push(awardVP('shal', Math.floor(state.score.shal.kp / 500) * 2, 'Breakthrough: pts destroyed', round));
    }
    // Survey: +1 VP per Dropsite Surveyed.
    if (obj === 'survey') {
      const surv = { ucm: 0, shal: 0 };
      ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => (ds.surveyedBy || []).forEach(s => surv[s]++));
      ['ucm','shal'].forEach(s => push(awardVP(s, surv[s], 'Survey', round)));
    }
    // Extract: 2 VP per Recon Operative still aboard a surviving Ship.
    if (obj === 'extract' && state.shipReconOps) {
      const ex = { ucm: 0, shal: 0 };
      Object.keys(state.shipReconOps).forEach(k => {
        const n = state.shipReconOps[k]; if (!n) return;
        const [gid, si] = k.split('#');
        const ship = state.groups[gid] && state.groups[gid].ships[parseInt(si)];
        if (ship && !ship.destroyed) ex[getDef(gid).side] += n * 2;
      });
      ['ucm','shal'].forEach(s => push(awardVP(s, ex[s], 'Recon Operatives aboard', round)));
      if (state.reconKills) ['ucm','shal'].forEach(s => push(awardVP(s, state.reconKills[s] || 0, 'destroyed operative-carriers', round)));
    }
    // Secondary Objectives (each side scores its one chosen scoring secondary).
    log.push(...scoreSecondaries());
  }
  return log;
}

/* Distance (inches) of a board point from `side`'s deployment edge (its Zone).
   UCM deploys on the south edge (y≈BOARD_PX), Shaltari on the north (y≈0). */
function distFromZoneIn(side, yPx) {
  const edgeY = side === 'ucm' ? BOARD_PX : 0;
  return Math.abs(yPx - edgeY) / INCH;
}
/* All valid nomination candidates for a position-based Secondary (for manual choice).
   Returns [{nom, label}]. The default (auto) nomination is the first entry. */
function secondaryCandidates(side, key) {
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
  const out = [];
  if (key === 'key_site' || key === 'priority_target') {
    let cands = dss.filter(ds => distFromZoneIn(side, inchToPx(ds.y)) >= 24);
    if (key === 'priority_target') cands = cands.filter(ds => ['M','L'].includes(dropsiteSizeKey(ds)));
    cands.sort((a,b) => distFromZoneIn(enemy, inchToPx(a.y)) - distFromZoneIn(enemy, inchToPx(b.y)));
    cands.forEach(ds => out.push({ nom: { dsId: ds.id }, label: `${ds.base.name} (${dropsiteSizeKey(ds)})` }));
  } else if (key === 'long_shot') {
    dss.forEach(ds => {
      if (distFromZoneIn(enemy, inchToPx(ds.y)) <= 12) {
        (ds.features || []).forEach((fk, fi) => out.push({ nom: { dsId: ds.id, fi }, label: `${(FEATURES[fk]||{}).name||fk} @ ${ds.base.name}` }));
      }
    });
  } else if (key === 'objectives_beyond') {
    fleetForSide(side).forEach(d => { if (['M','H','C'].includes(d.tonnage)) out.push({ nom: { shipId: d.id }, label: `${d.name} (${d.tonnage})` }); });
  }
  return out;
}

/* Auto-nominate a valid target for a position-based Secondary Objective. */
function nominateForSecondary(side, key) {
  const cands = secondaryCandidates(side, key);
  return cands.length ? cands[0].nom : null;
}

/* Is this ship the Objectives Beyond nominee, in position to fly off (within 6" of the
   opponent's Zone edge, having moved)? */
function objectivesBeyondEligible(gid, si) {
  const def = getDef(gid);
  const side = def.side;
  const noms = state.secondaryNominations && state.secondaryNominations[side];
  const nom = noms && noms.objectives_beyond;
  if (!nom) return false;
  if (def.id.split(':').pop() !== nom.shipId.split(':').pop()) return false;
  const ship = state.groups[gid] && state.groups[gid].ships[si];
  if (!ship || ship.destroyed || ship.offTable || !ship.movedThisRound) return false;
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  return distFromZoneIn(enemy, ship.y) <= 6;
}

/* Breakthrough objective: a Red (UCM-slot) Ship that has moved and reached within 6"
   of the opponent's Zone edge may fly off for 1 VP per 200 pts. */
function breakthroughFlyoffEligible(gid, si) {
  if (!state.scenario || state.scenario.objective !== 'breakthrough') return false;
  const def = getDef(gid);
  if (!def || def.side !== 'ucm') return false; // only Red flies off for Breakthrough
  const ship = state.groups[gid] && state.groups[gid].ships[si];
  if (!ship || ship.destroyed || ship.offTable || !ship.movedThisRound) return false;
  return distFromZoneIn('shal', ship.y) <= 6; // within 6" of the opponent's (north) edge
}

/* Score each side's selected Secondary Objective at game end. Returns log lines. */
function scoreSecondaries() {
  const log = [];
  if (!state.secondaries) return log;
  ['ucm','shal'].forEach(side => {
    const chosen = state.secondaries[side] || [];
    let best = 0, bestName = '';
    chosen.forEach(key => {
      let vp = 0;
      if (key === 'annihilate') vp = Math.min(3, Math.floor(state.score[side].kp / 500));
      else if (key === 'take_prizes') vp = Math.min(3, Math.floor((state.captured && state.captured[side] || 0) / 100));
      else if (key === 'gather_intel') {
        let n = 0; ((state.scenarioData && state.scenarioData.dropsites) || []).forEach(ds => { if (ds.surveyedBy && ds.surveyedBy.includes(side)) n++; });
        vp = Math.min(2, n);
      } else if (key === 'decapitate') {
        const enemy = side === 'ucm' ? 'shal' : 'ucm';
        vp = (state.admiralKilled && state.admiralKilled[enemy]) ? 2 : 0;
      } else if (key === 'key_site' || key === 'priority_target' || key === 'long_shot' || key === 'objectives_beyond') {
        vp = scorePositionSecondary(side, key);
      }
      if (vp > best) { best = vp; bestName = SECONDARY_OBJECTIVES[key] ? SECONDARY_OBJECTIVES[key].name : key; }
    });
    if (best > 0) { const l = awardVP(side, best, `Secondary: ${bestName}`, 6); if (l) log.push(l); }
  });
  return log;
}

/* Score a position-based Secondary from its nomination. */
function scorePositionSecondary(side, key) {
  const enemy = side === 'ucm' ? 'shal' : 'ucm';
  const nom = state.secondaryNominations && state.secondaryNominations[side] && state.secondaryNominations[side][key];
  if (!nom) return 0;
  const dss = (state.scenarioData && state.scenarioData.dropsites) || [];
  const ds = nom.dsId ? dss.find(d => d.id === nom.dsId) : null;
  if (key === 'key_site' && ds) {
    if (dropsiteController(ds) !== side) return 0;
    return distFromZoneIn(enemy, inchToPx(ds.y)) <= 6 ? 3 : 2; // 3 VP if near opponent Zone
  }
  if (key === 'priority_target' && ds) {
    if (!ds.destroyed) return 0; // "Levelled"
    return distFromZoneIn(enemy, inchToPx(ds.y)) <= 6 ? 3 : 2;
  }
  if (key === 'long_shot' && ds) {
    const destroyed = (ds.destroyedFeatures || []).includes(nom.fi) || ds.destroyed;
    return destroyed ? 2 : 0;
  }
  if (key === 'objectives_beyond' && nom.shipId) {
    // Find the nominated ship; score if it flew off (offTable) and isn't crippled.
    let res = 0;
    Object.keys(state.groups).forEach(gid => {
      const def = getDef(gid);
      if (def.side !== side || def.id.split(':').pop() !== nom.shipId.split(':').pop()) return;
      state.groups[gid].ships.forEach(s => {
        if (s.flewOff && !s.crippledRolled) res = Math.max(res, ['H','C'].includes(def.tonnage) ? 2 : 1);
      });
    });
    return res;
  }
  return 0;
}

/* Apply pending damage to targets (least-hull-first within a group is approximated
   by applying directly to each targeted ship), then queue crippling & explosions. */
function resolveAccumulatedDamage() {
  const M = state.attackModal;
  M.crippleQueue = [];
  M.explodeQueue = [];
  Object.keys(M.pendingDamage).forEach(k => {
    const [gid, si] = k.split('#');
    const grp = state.groups[gid];
    const ship = grp && grp.ships[parseInt(si)];
    if (!ship || ship.destroyed) return;
    const def = getDef(gid);
    const dmg = M.pendingDamage[k];
    const wasAboveHalf = ship.hull > ship.maxHull / 2;
    const before = ship.hull;
    ship.hull = Math.max(0, ship.hull - dmg);
    // Damage spillover: excess damage beyond destroying the targeted ship spills to
    // other ships in the same Group (lowest-hull first), unless ALL damage was Focused.
    let excess = dmg - before;
    if (ship.hull <= 0 && excess > 0 && M.spillEligible && M.spillEligible[k]) {
      const mates = grp.ships
        .map((sh, idx) => ({ sh, idx }))
        .filter(o => !o.sh.destroyed && !o.sh.offTable && o.idx !== parseInt(si))
        .sort((a, b) => a.sh.hull - b.sh.hull);
      for (const o of mates) {
        if (excess <= 0) break;
        const take = Math.min(excess, o.sh.hull);
        const wasHalf = o.sh.hull > o.sh.maxHull / 2;
        o.sh.hull = Math.max(0, o.sh.hull - take);
        excess -= take;
        M.log.push(`Spillover: ${take} → ${def.name} #${o.idx + 1}`);
        if (o.sh.hull <= 0) {
          o.sh.destroyed = true;
          recordKill(def, M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null), false, targetKey(gid, o.idx));
          if (isCapital(def)) M.explodeQueue.push(makeExplosionRoll(gid, o.idx, def, o.sh));
        } else if (isCapital(def) && !o.sh.crippledRolled && o.sh.hull <= o.sh.maxHull / 2 && wasHalf) {
          o.sh.crippledRolled = true;
          M.crippleQueue.push(makeCrippleRoll(gid, o.idx, def, o.sh));
        }
      }
    }
    // Flash-X spikes accrued from weapons that damaged this ship.
    if (M.pendingFlash && M.pendingFlash[k]) ship.spikes = (ship.spikes || 0) + M.pendingFlash[k];
    // Arrest-X: reduce Thrust next activation (once per round).
    if (M.pendingArrest && M.pendingArrest[k] && !ship.arrestedThisRound) {
      ship.arrestNext = M.pendingArrest[k];
      ship.arrestedThisRound = true;
    }
    // Crippling-X: forced crippling roll (regardless of tonnage) when a critical
    // from a Crippling weapon caused damage — in addition to the half-hull rule.
    if (M.forcedCripple && M.forcedCripple[k] && ship.hull > 0) {
      M.crippleQueue.push(makeCrippleRoll(gid, parseInt(si), def, ship));
    }
    // Crippling: first time a capital ship drops below half (and not destroyed).
    if (isCapital(def) && !ship.crippledRolled && ship.hull > 0 && ship.hull <= ship.maxHull / 2 && wasAboveHalf) {
      ship.crippledRolled = true;
      M.crippleQueue.push(makeCrippleRoll(gid, parseInt(si), def, ship));
    }
    // Destruction → explosion.
    if (ship.hull <= 0) {
      ship.destroyed = true;
      recordKill(def, M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null), false, targetKey(gid, parseInt(si)));
      if (isCapital(def)) M.explodeQueue.push(makeExplosionRoll(gid, parseInt(si), def, ship));
    } else {
      // Status: gain a Scanners Offline token (auto-removed start of End Phase).
      if (M.pendingStatus && M.pendingStatus[k]) {
        ship.crippling = ship.crippling || [];
        if (!ship.crippling.includes('scanners')) ship.crippling.push('scanners');
        ship.statusToken = true; // flag for End-Phase auto-removal
      }
      // Corruptor-X: place X Battalions (attacker's side) aboard the target ship.
      if (M.pendingCorruptor && M.pendingCorruptor[k]) {
        const atkSide = M.bomber ? M.bomberSide : (M.attackerGid ? getDef(M.attackerGid).side : null);
        if (atkSide) { ship.battalions = ship.battalions || { ucm: 0, shal: 0 }; ship.battalions[atkSide] += M.pendingCorruptor[k]; }
      }
    }
  });
  // Impel-X: queue affected groups for a player choice (turn vs move forward).
  if (M.pendingImpel) {
    M.impelQueue = M.impelQueue || [];
    Object.keys(M.pendingImpel).forEach(gid => {
      const grp = state.groups[gid];
      if (!grp) return;
      if (!M.impelQueue.find(q => q.gid === gid)) M.impelQueue.push({ gid, x: M.pendingImpel[gid].x, big: M.pendingImpel[gid].big });
    });
  }
  proceedQueues();
}

function proceedQueues() {
  const M = state.attackModal;
  if (M.crippleQueue.length) { M.step = 'crippling'; return; }
  if (M.explodeQueue.length) { M.step = 'explosion'; return; }
  if (M.impelQueue && M.impelQueue.length) { M.step = 'impel'; return; }
  M.step = 'done';
}

const CRIPPLE_LABEL = { energy:'Energy Surge', structural:'Struct.', fire:'Fire', defence:'Def. Offline', scanners:'Scan Offline', weapons:'Wpn Offline', navigation:'Nav Offline', decay:'Orbital Decay' };
const CRIPPLE_TABLE = {
  energy:    { name:'Energy Surge', key:'energy', desc:'Gain a Spike.' },
  structural:{ name:'Structural Damage', key:'structural', desc:'Suffer another point of damage.' },
  fire:      { name:'Fire', key:'fire', desc:'Gain a Fire Token. 1 damage per token each End Phase. Repairable.' },
  defence:   { name:'Defence Systems Offline', key:'defence', desc:'ES/KS/BS/Shield −1; may be targeted as if Focused. Repairable.' },
  scanners:  { name:'Scanners Offline', key:'scanners', desc:'Scan reduced to 1". Repairable.' },
  weapons:   { name:'Weapons Offline', key:'weapons', desc:'Cannot use Weapons or launch Assets. Repairable.' },
  navigation:{ name:'Navigation Offline', key:'navigation', desc:'Movement → 2"; cannot turn or change layer. Repairable.' },
  decay:     { name:'Orbital Decay', key:'decay', desc:'Falls into Atmosphere; cannot move to Orbit. Repairable on 6+.' }
};
function crippleFor(total) {
  if (total <= 3) return CRIPPLE_TABLE.energy;
  if (total <= 5) return CRIPPLE_TABLE.structural;
  if (total === 6) return CRIPPLE_TABLE.fire;
  if (total === 7) return CRIPPLE_TABLE.defence;
  if (total === 8) return CRIPPLE_TABLE.scanners;
  if (total === 9) return CRIPPLE_TABLE.weapons;
  if (total === 10) return CRIPPLE_TABLE.navigation;
  return CRIPPLE_TABLE.decay;
}
function makeCrippleRoll(gid, si, def, ship) {
  // Roll is DEFERRED: Admiral abilities (Brace) are declared BEFORE rolling.
  return { gid, si, name: def.name, rolled: false, braced: false };
}
/* Perform the crippling 2D6 roll (or apply Brace's fixed 4) for queue entry c. */
function rollCrippleEffect(c, forced) {
  if (forced != null) { c.total = forced; c.d1 = null; c.d2 = null; }
  else { c.d1 = rollDie(); c.d2 = rollDie(); c.total = c.d1 + c.d2; }
  const eff = crippleFor(c.total);
  c.effectName = eff.name; c.effectKey = eff.key; c.effectDesc = eff.desc;
  c.rolled = true;
}
function applyCrippling() {
  const M = state.attackModal;
  const c = M.crippleQueue.shift();
  const ship = state.groups[c.gid].ships[c.si];
  const def = getDef(c.gid);
  ship.crippling = ship.crippling || [];
  if (c.effectKey === 'fire') { ship.fireTokens = (ship.fireTokens || 0) + 1; ship.crippling.push('fire'); }
  else if (c.effectKey === 'energy') { ship.spikes = (ship.spikes || 0) + 1; }
  else if (c.effectKey === 'structural') {
    ship.hull = Math.max(0, ship.hull - 1);
    if (ship.hull <= 0 && !ship.destroyed) { ship.destroyed = true; if (isCapital(def)) M.explodeQueue.push(makeExplosionRoll(c.gid, c.si, def, ship)); }
  }
  else if (!ship.crippling.includes(c.effectKey)) ship.crippling.push(c.effectKey);
  M.log.push(`${c.name} crippled: ${c.effectName}`);
  proceedQueues();
  renderAll();
}
function makeExplosionRoll(gid, si, def, ship) {
  // Roll is DEFERRED: Admiral abilities (Contain Reactor) are declared BEFORE rolling.
  const mod = def.tonnage === 'C' ? 2 : def.tonnage === 'H' ? 1 : 0;
  return { gid, si, name: def.name, mod, rolled: false, contained: false,
    rangeIn: explosionRangeIn(def), x: ship.x, y: ship.y, layer: ship.layer || 'orbit', side: def.side };
}
/* Perform the explosion 1D6(+tonnage) roll (or apply Contain's fixed 2) for entry ex. */
function rollExplosionEffect(ex, forced) {
  const EX = {
    1:{n:'Burn Up', d:'Removed, no further effects.', kind:'none'},
    2:{n:'Reactor Rupture', d:'Groups/Stations within DOUBLE range gain a Spike.', kind:'spike2x'},
    3:{n:'Shredded', d:'All in range suffer 2 Kinetic hits. Assets removed 5+.', kind:'hits', type:'K', assets:5},
    4:{n:'Fuel Detonation', d:'All in range suffer 2 Energy hits. Assets removed 4+.', kind:'hits', type:'E', assets:4},
    5:{n:'Reactor Overload', d:'All in range suffer 2 Core hits. Assets removed 3+.', kind:'hits', type:'C', assets:3}
  };
  if (forced != null) { ex.d1 = forced; ex.mod = 0; ex.total = forced; }
  else { ex.d1 = rollDie(); ex.total = ex.d1 + ex.mod; }
  const eff = ex.total >= 6 ? {n:'Foldspace Catastrophe', d:'All in range suffer 2 damage + a Spike. Assets removed 2+.', kind:'dmg2spike', assets:2} : EX[Math.max(1, ex.total)];
  ex.effectName = eff.n; ex.effectDesc = eff.d; ex.effKind = eff.kind; ex.effType = eff.type; ex.effAssets = eff.assets;
  ex.rolled = true;
}
function applyExplosion() {
  const M = state.attackModal;
  const ex = M.explodeQueue.shift();
  M.log.push(`${ex.name} exploded: ${ex.effectName}`);
  applyExplosionEffect(ex, M);
  proceedQueues();
  renderAll();
}

/* Apply an explosion's area effect to all ships/assets on the SAME orbital layer
   within range (double range for the spike effect). Hit-effects roll saves;
   chains may queue further explosions. Used by both attack and repair-phase paths. */
function applyExplosionEffect(ex, M) {
  if (!ex.rolled) rollExplosionEffect(ex); // non-modal callers: roll immediately
  if (ex.effKind === 'none') return;
  const rangePx = ex.rangeIn * INCH * (ex.effKind === 'spike2x' ? 2 : 1);
  // Affected ships (any side), same layer, within range, on-table, alive.
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || s.attachedTo) return;
      if ((s.layer || 'orbit') !== ex.layer) return;
      if (Math.hypot(s.x - ex.x, s.y - ex.y) > rangePx) return;
      if (ex.effKind === 'spike2x') {
        s.spikes = (s.spikes || 0) + 1;
      } else if (ex.effKind === 'dmg2spike') {
        s.spikes = (s.spikes || 0) + 1;
        s.hull = Math.max(0, s.hull - 2);
        if (s.hull <= 0 && !s.destroyed) { s.destroyed = true; if (M && isCapital(def)) M.explodeQueue.push(makeExplosionRoll(gid, si, def, s)); }
      } else if (ex.effKind === 'hits') {
        // 2 hits of the given type — roll the target's save per hit.
        const sv = baseSaveForType(def, s, ex.effType, false);
        let unsaved = 0;
        for (let i = 0; i < 2; i++) {
          if (sv == null) { unsaved++; continue; }
          if (rollDie() < sv) {
            // try backup save
            const bv = saveVal(def.bs);
            if (bv == null || rollDie() < bv) unsaved++;
          }
        }
        if (unsaved > 0) {
          s.hull = Math.max(0, s.hull - unsaved);
          if (s.hull <= 0 && !s.destroyed) { s.destroyed = true; if (M && isCapital(def)) M.explodeQueue.push(makeExplosionRoll(gid, si, def, s)); }
        }
      }
    });
  });
  // Launch assets on the same conceptual layer (assets count as Orbit) within range.
  if (ex.effAssets && state.launchedAssets) {
    state.launchedAssets = state.launchedAssets.filter(a => {
      if (Math.hypot(a.x - ex.x, a.y - ex.y) > rangePx) return true;
      // Roll per asset in the stack; removed on effAssets+.
      let remaining = a.count;
      for (let i = 0; i < a.count; i++) { if (rollDie() >= ex.effAssets) remaining--; }
      a.count = remaining;
      return remaining > 0;
    });
  }
}
/* Roll Backup saves (and Aegis save dice) on hits still unsaved AFTER primary ES/KS
   saves and any re-rolls have been applied. Mutates sr in place and recomputes damage.
   Called when the player advances past the primary-save sub-step. */
function rollDeferredBackupSaves(M) {
  const sr = M.saveResult;
  if (!sr || sr.backupRolled) return;
  // Backup saves for hits not yet saved.
  if (sr.backupVal != null) {
    sr.hitsList.forEach(h => {
      if (h.saved || h.sv == null) return;
      const r = rollDie(); const ok = r >= sr.backupVal;
      sr.backDice.push({ r, ok });
      if (ok) { h.saved = true; h.savedBy = 'backup'; }
    });
  }
  // Aegis-X (§15.1): vs Bomber/Close Action, Y extra save dice (on Backup, or 4+).
  if ((sr.isBomberAtk || sr.isCloseAction) && !M.aegisUsed) {
    const aegisY = aegisValueForGroup(sr.targetGid);
    sr.aegisY = aegisY;
    if (aegisY > 0) {
      const av = sr.backupVal != null ? sr.backupVal : 4;
      for (let i = 0; i < aegisY; i++) {
        const unsavedHit = sr.hitsList.find(h => !h.saved);
        if (!unsavedHit) break;
        const r = rollDie(); const ok = r >= av;
        sr.aegisDice.push({ r, ok });
        if (ok) { unsavedHit.saved = true; unsavedHit.savedBy = 'aegis'; }
      }
      M.aegisUsed = true;
    }
  }
  sr.dmg = sr.hitsList.filter(h => !h.saved).reduce((a, h) => a + h.dmg, 0);
  sr.unsaved = sr.hitsList.filter(h => !h.saved).length;
  sr.critDamaged = sr.hitsList.some(h => h.isCrit && !h.saved);
  sr.backupRolled = true;
}

function finishAttack() {
  const M = state.attackModal;
  if (!M) return;
  // Log a concise result summary (attacker → targets, total damage, kills).
  {
    const atkName = M.bomber ? (M.attackerName || 'Assets') : (getDef(M.attackerGid) ? getDef(M.attackerGid).name : 'Group');
    const tgtNames = {};
    (M.shots || []).forEach(s => {
      const td = getDef(s.targetGid); if (!td) return;
      const multi = state.groups[s.targetGid] && state.groups[s.targetGid].ships.length > 1;
      tgtNames[targetKey(s.targetGid, s.targetSi)] = td.name + (multi ? ` #${s.targetSi+1}` : '');
    });
    let totDmg = 0, kills = 0;
    Object.keys(M.pendingDamage || {}).forEach(k => {
      totDmg += M.pendingDamage[k] || 0;
      const [g, si] = k.split('#'); const ts = state.groups[g] && state.groups[g].ships[parseInt(si)];
      if (ts && ts.destroyed) kills++;
    });
    const tgtList = Object.values(tgtNames).join(', ') || 'target';
    if (totDmg > 0 || kills > 0) logEvent(`${atkName} hit ${tgtList} for ${totDmg} dmg${kills?` · ${kills} destroyed`:''}`);
    else logEvent(`${atkName} fired at ${tgtList} — no damage`);
    // Flush the detailed per-step lines (hit/save rolls, AP re-rolls, Brace/Contain,
    // crippling, explosions, Impel, Close Protection, etc.) into the event log.
    (M.log || []).forEach(line => logEvent(`· ${line}`));
  }
  if (M.bomber) {
    // Scourge Crippling-Fire: place Fire token(s) on the target if it survived.
    if (M.cripplingFire) {
      const s = M.shots[0];
      const ts = state.groups[s.targetGid] && state.groups[s.targetGid].ships[s.targetSi];
      if (ts && !ts.destroyed) {
        ts.fireTokens = (ts.fireTokens || 0) + M.cripplingFire;
        ts.crippling = ts.crippling || [];
        if (!ts.crippling.includes('fire')) ts.crippling.push('fire');
      }
    }
    // Remove the attacking bombers after the attack.
    state.launchedAssets = state.launchedAssets.filter(a => !M.bomberAssetIds.includes(a.id));
    state.attackModal = null;
    // If more pooled attacks are pending in the current scope, resolve the next.
    const scope = state._bomberResolveSide;
    const scopeType = state._bomberResolveType;
    if (anyPendingBomberAttacks(scope, scopeType)) { resolvePendingBomberAttacks(scope, scopeType); renderAll(); return; }
    // Scope exhausted: if this was a stage-scoped run, advance the asset stage.
    if (scope) { state._bomberResolveSide = null; state._bomberResolveType = null; advanceAssetStage({ type: scopeType || 'bomber', side: scope }); }
  } else {
    // Whole Group fired: mark every ship fired, record Limited-X uses, clear all locks
    // and remove their targeting lines.
    const aDef = getDef(M.attackerGid);
    const grp = state.groups[M.attackerGid];
    grp.ships.forEach(ship => {
      if (!ship.weaponTargets) { ship.firedThisActivation = true; return; }
      ship.limitedUses = ship.limitedUses || {};
      const seen = new Set();
      Object.keys(ship.weaponTargets).forEach(wi => {
        const sp = parseWeaponSpecials(aDef.weapons[wi]);
        const gk = weaponGroupKey(aDef, parseInt(wi));
        if (sp.limited && !seen.has(gk)) { seen.add(gk); ship.limitedUses[wi] = (ship.limitedUses[wi] || 0) + 1; }
      });
      ship.firedThisActivation = true;
      ship.weaponTargets = {};
    });
  }
  state.attackModal = null;
  renderAll();
}

/* ── END-PHASE REPAIR ──
   Repairable crippling effects (Energy Surge & Structural Damage are one-shot,
   not repairable). Orbital Decay needs 6+; others 4+. DC order = 2D6 per effect. */
const REPAIRABLE = ['fire', 'defence', 'scanners', 'weapons', 'navigation', 'decay'];

/* Are there any Fire tokens or repairable crippling effects on the table? */
function anyRepairWork() {
  return Object.keys(state.groups).some(gid =>
    state.groups[gid].ships.some(s =>
      !s.destroyed && !s.offTable &&
      ((s.fireTokens > 0) || (s.crippling && s.crippling.some(c => REPAIRABLE.includes(c))))
    )
  );
}

/* Begin the End-Phase repair: first apply Fire damage, then build repair rolls. */
function openRepairPhase() {
  // Step 1: Fire tokens deal 1 damage each, before repair. Track destructions.
  const fireLog = [];
  const explosions = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.fireTokens) return;
      const dmg = s.fireTokens;
      s.hull = Math.max(0, s.hull - dmg);
      fireLog.push(`${def.name} takes ${dmg} Fire damage (${s.hull}/${s.maxHull})`);
      if (s.hull <= 0) {
        s.destroyed = true;
        if (isCapital(def)) explosions.push(makeExplosionRoll(gid, si, def, s));
      }
    });
  });
  // Resolve any Fire-death explosions' area effects (chained explosions included).
  while (explosions.length) {
    const ex = explosions.shift();
    fireLog.push(`${ex.name} exploded: ${ex.effectName}`);
    applyExplosionEffect(ex, { explodeQueue: explosions });
  }
  // Step 2: build repair targets — ships with repairable crippling effects.
  const targets = [];
  Object.keys(state.groups).forEach(gid => {
    const def = getDef(gid);
    state.groups[gid].ships.forEach((s, si) => {
      if (s.destroyed || s.offTable || !s.crippling) return;
      const eff = s.crippling.filter(c => REPAIRABLE.includes(c));
      if (eff.length) targets.push({ gid, si, name: def.name, effects: eff.slice(), dc: !!s.dcThisRound, rolled: null });
    });
  });
  state.repairPhase = { step: fireLog.length ? 'fire' : 'repair', fireLog, explosions: [], targets, idx: 0, log: [] };
  renderAll();
}
