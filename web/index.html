<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0d">
<title>DFC FLEET OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0d; --bg-elev: #11171a; --bg-card: #161e22;
    --bg-card-2: #1a242a;
    --border: #233038; --border-bright: #2f4250;
    --text: #d8e3e8; --text-dim: #7a8a94; --text-mute: #4a5862;
    --ucm: #4ad6ff; --ucm-dim: #1f6e8c; --ucm-glow: rgba(74,214,255,0.25);
    --shal: #d4a647; --shal-dim: #7a5e1f; --shal-glow: rgba(212,166,71,0.30);
    --hull-good: #4ad6ff; --hull-warn: #ffb547; --hull-crit: #ff5252;
    --grid-line: rgba(74,214,255,0.07);
    --grid-line-shal: rgba(212,166,71,0.07);
    --table-bg: #08100f;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Oswald', 'Impact', sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 12px; line-height: 1.4;
    background-image:
      radial-gradient(ellipse at top, rgba(74,214,255,0.04), transparent 60%),
      linear-gradient(to bottom, var(--bg), #060a0c);
    user-select: none;
  }

  /* ============== LAYOUT ============== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
  }
  /* During Setup the side panels are hidden; collapse their columns so the board
     area (and the centred scenario overlay) spans the full width. Panels keep
     visibility:hidden (not display:none) so the board stays in its centre track. */
  .app.panels-hidden { grid-template-columns: 0 1fr 0; }
  .app.panels-hidden .panel { visibility: hidden; }
  .topbar {
    grid-column: 1 / -1;
    background: linear-gradient(180deg, #0e1518 0%, #0a1014 100%);
    border-bottom: 1px solid var(--border-bright);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .brand {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .brand .vs { color: var(--text-mute); font-size: 11px; }
  .brand .shal-name { color: var(--shal); }
  .topbar-controls { display: flex; align-items: center; gap: 10px; }
  .btn {
    background: linear-gradient(180deg, #1a242a 0%, #11181c 100%);
    border: 1px solid var(--border-bright);
    color: var(--text); padding: 6px 12px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--ucm-dim); color: var(--ucm); }
  .btn:active { transform: scale(0.96); }
  .btn.shal:hover { border-color: var(--shal-dim); color: var(--shal); }
  .btn-icon {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; border-radius: 3px;
    font-size: 14px;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--border-bright); }
  .round-display {
    font-family: var(--display); font-size: 14px;
    color: var(--text-dim); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .round-display b { color: var(--text); font-weight: 700; }

  /* ============== PHASE NAV ============== */
  .phase-nav {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--display); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .phase-step {
    color: var(--text-mute);
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .phase-step.active {
    color: var(--ucm);
    border-color: var(--ucm-dim);
    background: rgba(74,214,255,0.06);
  }
  .phase-step.done { color: var(--text-dim); }
  .phase-arrow { color: var(--text-mute); font-size: 10px; }
  @media (max-width: 1100px) {
    .phase-nav { font-size: 10px; gap: 4px; }
    .phase-step { padding: 3px 5px; }
  }
  @media (max-width: 860px) {
    .phase-nav { display: none; }
  }

  /* ============== SETUP OVERLAY ============== */
  .setup-overlay {
    position: absolute; inset: 0;
    background: rgba(8,16,15,0.93);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; overflow-y: auto; padding: 20px;
  }
  .setup-card {
    width: 100%; max-width: 760px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    margin: auto;
  }
  .setup-header {
    padding: 12px 18px;
    background: linear-gradient(180deg, #142028 0%, #0d171c 100%);
    border-bottom: 1px solid var(--border-bright);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .setup-title {
    font-family: var(--display); font-weight: 700;
    font-size: 18px; letter-spacing: 0.15em;
    color: var(--ucm); text-transform: uppercase;
    margin: 0;
  }
  .setup-sub {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .setup-body { padding: 14px 18px; }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .faction-select {
    display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  @media (min-width: 600px) { .faction-select { grid-template-columns: 1fr 1fr; } }
  .faction-slot .faction-lbl { font-family: var(--display); font-size: 10px; letter-spacing: 2px; margin-bottom: 5px; }
  .faction-opts { display: flex; flex-wrap: wrap; gap: 4px; }
  .faction-btn {
    flex: 1 1 auto; padding: 6px 8px; font-size: 10px; font-family: var(--mono);
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; border-radius: 3px; letter-spacing: 1px;
  }
  .faction-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .faction-btn.sel.ucm { color: var(--ucm); border-color: var(--ucm); background: rgba(74,214,255,0.08); }
  .faction-btn.sel.shal { color: var(--shal); border-color: var(--shal); background: rgba(212,166,71,0.08); }
  .fleet-dropdown {
    width: 100%; padding: 8px 10px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border-bright); border-radius: 4px; font-family: var(--mono);
    font-size: 12px; cursor: pointer;
    color-scheme: dark;
  }
  .fleet-dropdown:hover { border-color: var(--text); }
  /* Theme the native popup list (the selectable items) to match the dark UI. */
  .fleet-dropdown option, .scen-dropdown option {
    background: var(--bg-elev); color: var(--text);
    font-family: var(--mono); font-size: 12px;
  }
  .fleet-dropdown option:checked, .scen-dropdown option:checked {
    background: var(--ucm-dim); color: var(--text);
  }
  .fleet-dropdown option:disabled, .scen-dropdown option:disabled {
    color: var(--text-mute);
  }
  .pl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pl-row .pl-name { flex: 0 0 45%; font-size: 11px; }
  .pl-row .pl-select { flex: 1 1 55%; }
  .ap-section { margin-bottom: 10px; }
  .ap-title { font-family: var(--display); font-size: 11px; letter-spacing: 1px; margin-bottom: 5px; color: var(--text); }
  .ap-ds { margin-bottom: 6px; }
  .ap-ds-name { font-size: 10px; color: var(--text-dim); font-weight: 700; }
  .ap-loc { display: flex; justify-content: space-between; font-size: 10px; padding: 1px 0 1px 8px; font-family: var(--mono); }
  .ap-log { font-size: 10px; color: var(--text-dim); padding: 2px 0; font-family: var(--mono); }
  .init-grid { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 8px 0 14px; }
  .init-slot { text-align: center; }
  .init-name { font-family: var(--display); font-size: 11px; letter-spacing: 1px; margin-bottom: 8px; }
  .init-die { width: 56px; height: 56px; border: 2px solid; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-family: var(--mono); font-size: 28px; font-weight: 700;
    background: var(--bg-elev); }
  .init-vs { color: var(--text-mute); font-size: 11px; font-family: var(--display); letter-spacing: 1px; }
  .init-result { text-align: center; font-family: var(--display); font-size: 14px; letter-spacing: 1px; font-weight: 700; }
  .init-choice { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .init-choice-lbl { font-size: 10px; color: var(--text-dim); text-align: center; margin-bottom: 6px; }
  .init-choice-btns { display: flex; gap: 6px; }
  .init-choice-btns .btn { flex: 1; font-size: 10px; }
  @media (min-width: 600px) {
    .setup-grid { grid-template-columns: 1fr 1fr; }
    .setup-grid .full-width { grid-column: 1 / -1; }
  }
  .scen-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ucm-dim);
    border-radius: 2px;
    padding: 9px 11px 9px 12px;
    position: relative;
    min-height: 96px;
  }
  .scen-row .scen-label {
    font-family: var(--display);
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--text-mute); text-transform: uppercase;
    margin-bottom: 3px;
  }
  .scen-row .scen-helper {
    font-size: 9px; color: var(--text-mute);
    line-height: 1.35; margin-bottom: 6px; font-style: italic;
  }
  .scen-row .scen-name {
    font-family: var(--display);
    font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
    padding-right: 38px;
  }
  .scen-row .scen-short {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px; line-height: 1.4;
  }
  .scen-row .scen-roll {
    position: absolute; top: 8px; right: 10px;
    font-family: var(--display); font-weight: 700;
    font-size: 16px; color: var(--ucm);
    width: 24px; height: 24px;
    display: grid; place-items: center;
    border: 1px solid var(--ucm-dim);
    border-radius: 50%;
    background: rgba(74,214,255,0.07);
  }
  .scen-row .scen-roll.none { color: var(--text-mute); border-color: var(--border); background: transparent; }
  .scen-row .reroll-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    margin-top: 8px;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .reroll-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .scen-controls {
    display: flex; gap: 6px;
    margin-top: 8px;
    align-items: stretch;
  }
  .scen-row .scen-controls .scen-dropdown { flex: 0 0 75%; }
  .scen-row .scen-controls .reroll-btn { flex: 1 1 25%; margin-top: 0; }
  .scen-row .scen-dropdown {
    background: var(--panel); border: 1px solid var(--border-bright);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer; width: 100%;
    color-scheme: dark;
  }
  .scen-row .scen-dropdown:hover { border-color: var(--text); }
  .scen-row .picker-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 9px; padding: 3px 8px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .scen-row .picker-btn:hover { color: var(--ucm); border-color: var(--ucm-dim); }
  .scen-row .picker-btn.expanded { color: var(--ucm); border-color: var(--ucm-dim); background: rgba(74,214,255,0.05); }

  .scen-picker {
    margin-top: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
  }
  .scen-pick-opt {
    padding: 8px 11px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.08s;
  }
  .scen-pick-opt:last-child { border-bottom: none; }
  .scen-pick-opt:hover { background: var(--bg-card-2); }
  .scen-pick-opt.selected { background: rgba(74,214,255,0.06); }
  .scen-pick-opt .pick-d6 {
    font-family: var(--display); font-weight: 700;
    font-size: 13px; color: var(--text-dim);
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .scen-pick-opt.selected .pick-d6 { color: var(--ucm); }
  .scen-pick-opt .pick-d6.none { color: var(--text-mute); }
  .scen-pick-opt .pick-body { flex: 1; min-width: 0; }
  .scen-pick-opt .pick-name {
    font-family: var(--display);
    font-size: 12px; font-weight: 600;
    color: var(--text); letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.15;
  }
  .scen-pick-opt.selected .pick-name { color: var(--ucm); }
  .scen-pick-opt .pick-desc {
    font-size: 9.5px; color: var(--text-dim);
    margin-top: 3px; line-height: 1.4;
  }

  .setup-footer {
    padding: 12px 18px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--ucm) 0%, var(--ucm-dim) 100%);
    border: 1px solid var(--ucm);
    color: #021018;
    padding: 8px 20px;
    font-family: var(--display); font-weight: 700;
    font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-finish-act {
    width: 100%; margin-top: 6px;
    background: linear-gradient(180deg, var(--hull-warn) 0%, #b87d1f 100%);
    border: 1px solid var(--hull-warn);
    color: #1a1108;
    padding: 10px 20px;
    font-family: var(--display); font-weight: 700;
    font-size: 13px; letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
    transition: all 0.12s;
  }
  .btn-finish-act:hover { filter: brightness(1.12); }
  .btn-finish-act:active { transform: scale(0.99); }
  .am-line { font-size: 12px; margin: 6px 0; line-height: 1.4; }
  .am-shot { font-size: 10px; color: var(--text-dim); margin: 3px 0; padding-left: 6px; border-left: 2px solid var(--hull-crit); }
  .am-step-head { font-family: var(--display); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hull-crit); margin-bottom: 6px; }
  .am-toggle { display: block; font-size: 11px; margin: 4px 0; cursor: pointer; }
  .am-dice { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin: 6px 0; font-size: 13px; }
  .am-die {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 4px; font-family: var(--mono);
    font-weight: 700; font-size: 12px; border: 1px solid var(--border-bright);
    background: var(--bg-card); color: var(--text-mute);
  }
  .am-die.hit { background: rgba(74,214,255,0.18); border-color: var(--ucm); color: var(--ucm); }
  .am-die.crit { background: rgba(255,181,71,0.22); border-color: var(--hull-warn); color: var(--hull-warn); }
  .am-die.miss { opacity: 0.5; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary.shal {
    background: linear-gradient(180deg, var(--shal) 0%, var(--shal-dim) 100%);
    border-color: var(--shal); color: #1a1108;
  }
  .scen-extra-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(255,181,71,0.05);
    border-left: 2px solid var(--hull-warn);
    color: var(--hull-warn);
    font-size: 10px;
    border-radius: 0 2px 2px 0;
  }

  /* ============== DEPLOY HINT BAR ============== */
  .deploy-hint {
    position: absolute; bottom: 12px;
    left: 50%; transform: translateX(-50%);
    background: rgba(8,16,15,0.92);
    border: 1px solid var(--border-bright);
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-align: center;
    backdrop-filter: blur(4px);
    z-index: 10;
    display: flex; align-items: center; gap: 12px;
  }
  .deploy-hint b { color: var(--text); }

  /* ============== SCENARIO MINI-BANNER (PLAY phase) ============== */
  .scen-banner {
    position: absolute; top: 8px; right: 8px;
    background: rgba(8,16,15,0.78);
    border: 1px solid var(--border);
    padding: 5px 9px;
    border-radius: 2px;
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    backdrop-filter: blur(4px);
    max-width: 240px;
    line-height: 1.5;
  }
  .scen-banner b { color: var(--text); }
  .scen-banner .scen-title-mini {
    font-family: var(--display); font-size: 11px;
    color: var(--ucm); letter-spacing: 0.14em;
    text-transform: uppercase;
    display: block; margin-bottom: 2px;
  }

  /* ============== SIDE PANELS ============== */
  .panel {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
  }
  .panel.right {
    border-right: none; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; padding: 0;
  }
  .panel.right #detail-panel {
    flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 8px 0;
  }
  #event-log-dock {
    flex: 0 0 auto;
    border-top: 1px solid var(--border-bright);
    background: rgba(8,12,11,0.6);
  }
  .panel-section {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--display);
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-dim); font-weight: 600;
    text-transform: uppercase;
    margin: 0 0 8px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title .count {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-mute);
  }
  .panel-title.ucm { color: var(--ucm); }
  .panel-title.shal { color: var(--shal); }

  /* Group cards in the side panels */
  .ap-chip {
    display: flex; align-items: center; gap: 6px;
    width: calc(100% - 16px);
    margin: 0 8px 8px 8px;
    padding: 6px 10px;
    background: rgba(10,14,13,0.6);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.1s;
  }
  .ap-chip:hover { border-color: var(--text); background: var(--bg-card-2); }
  .group-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 7px 9px;
    margin: 0 8px 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }
  .group-card.ucm { border-left-color: var(--ucm-dim); }
  .group-card.shal { border-left-color: var(--shal-dim); }
  .group-card:hover { background: var(--bg-card-2); }
  .group-card.active { background: #1f2d35; }
  .group-card.active.ucm { border-left-color: var(--ucm); box-shadow: inset 4px 0 12px -8px var(--ucm-glow); }
  .group-card.active.shal { border-left-color: var(--shal); box-shadow: inset 4px 0 12px -8px var(--shal-glow); }
  .group-card.activated { opacity: 0.5; }
  .group-card.off-turn { opacity: 0.4; }
  .group-card.off-turn::after { content: 'WAIT'; position: absolute; top: 4px; right: 6px; font-size: 7px; letter-spacing: 1px; color: var(--text-mute); font-family: var(--mono); }
  .group-card.activation-locked { opacity: 0.35; pointer-events: none; }

  ucm:        { name: 'UCM',        fleet: UCM_FLEET },
  shaltari:   { name: 'Shaltari',   fleet: SHAL_FLEET },
  phr:        { name: 'PHR',        fleet: PHR_FLEET },

  scourge:    { name: 'Scourge',    fleet: SCOURGE_FLEET },
  bioficer:   { name: 'Bioficer',   fleet: BIOFICER_FLEET }
};

/* Build a per-side clone of a faction's fleet, giving each def a unique,
   side-prefixed id (e.g. 'ucm:u1') and the correct side. This prevents id
   collisions in mirror matches (same faction on both sides) and avoids mutating
   the shared module fleet constants. */
function buildSideFleet(side) {
  const fk = (state.factions && state.factions[side]) || (side === 'ucm' ? 'ucm' : 'shaltari');
  const base = (FACTIONS[fk] && FACTIONS[fk].fleet) || (side === 'ucm' ? UCM_FLEET : SHAL_FLEET);
  return base.map(def => {
    const clone = Object.assign({}, def);
    clone.baseId = def.id;          // original id (for reference)
    clone.id = side + ':' + def.id; // unique per-side id
    clone.side = side;
    clone.faction = fk;
    // Deep-copy mutable nested arrays so the two sides never share references.
    if (def.weapons) clone.weapons = def.weapons.map(w => Object.assign({}, w));
    if (def.launch)  clone.launch  = def.launch.map(l => Object.assign({}, l));
    return clone;
  });
}

/* Resolve the active (cloned) fleet for a side. Built once per rebuild and
   cached on state so def identities are stable between renders. */
function fleetForSide(side) {
  if (!state.activeFleets) state.activeFleets = {};
  if (!state.activeFleets[side]) state.activeFleets[side] = buildSideFleet(side);
  return state.activeFleets[side];
}
function redFleet()  { return fleetForSide('ucm'); }
function blueFleet() { return fleetForSide('shal'); }

/* Display name of the faction occupying a colour slot ('ucm'=red, 'shal'=blue). */
function factionName(side) {
  const fk = state.factions && state.factions[side];
  return (fk && FACTIONS[fk]) ? FACTIONS[fk].name : (side === 'ucm' ? 'Red' : 'Blue');
}

/* ── PAYLOAD / PORTER (Bioficer) helpers ──
   A Payload ship is attached to a Porter ship-slot via ship.attachedTo = {gid, si}.
   Attached payloads cannot activate / be targeted / be selected and are hidden
   from the board (they ride inside the Porter). */
function fleetHasPayloads(fk) {
  const fleet = FACTIONS[fk] && FACTIONS[fk].fleet;
  return !!(fleet && fleet.some(d => d.payload) && fleet.some(d => d.porter));
}
function sideHasPayloads(side) {
  const fk = state.factions && state.factions[side];
  return fleetHasPayloads(fk);
}
/* Are all Payload ship-slots of a chosen fleet slot ('f1'|'f2') assigned to a
   Porter? True if the fleet has no payloads, or every payload ship-slot has a
   link in state.payloadLinks[slot]. Used to gate scenario setup. */
function payloadsReady(slot) {
  const fk = state.fleetChoices && state.fleetChoices[slot];
  if (!fleetHasPayloads(fk)) return true;
  const fleet = FACTIONS[fk].fleet;
  const links = (state.payloadLinks && state.payloadLinks[slot]) || {};
  let allAssigned = true;
  fleet.forEach(def => {
    if (!def.payload) return;
    const n = def.groupSize || 1;
    for (let si = 0; si < n; si++) {
      if (!links[`${def.id}:${si}`]) allAssigned = false;
    }
  });
  return allAssigned;
}
/* Are BOTH chosen fleets' payloads assigned (so scenario setup may proceed)? */
function allPayloadsReady() {
  return payloadsReady('f1') && payloadsReady('f2');
}
/* Individual Porter ship-slots on a side: [{gid, si, def}]. */
function porterShips(side) {
  const out = [];
  fleetForSide(side).forEach(def => {
    if (!def.porter) return;
    const grp = state.groups[def.id];
    if (!grp) return;
    grp.ships.forEach((s, si) => { if (!s.destroyed) out.push({ gid: def.id, si, def, ship: s }); });
  });
  return out;
}
/* Individual Payload ship-slots on a side: [{gid, si, def, ship}]. */
function payloadShips(side) {
  const out = [];
  fleetForSide(side).forEach(def => {
    if (!def.payload) return;
    const grp = state.groups[def.id];
    if (!grp) return;
    grp.ships.forEach((s, si) => { if (!s.destroyed) out.push({ gid: def.id, si, def, ship: s }); });
  });
  return out;
}
/* How much capacity a Porter ship-slot has used (sum of attached payload sizes). */
function porterUsed(side, porterGid, porterSi) {
  let used = 0;
  payloadShips(side).forEach(p => {
    const a = p.ship.attachedTo;
    if (a && a.gid === porterGid && a.si === porterSi) used += 1; // S-1 payloads each take 1
  });
  return used;
}
/* Is this payload ship currently attached (riding inside a Porter)? */
function payloadAttached(ship) { return !!ship.attachedTo; }

/* Detached payload ships of a side that are within 3" of `porterShip` and match
   the Porter's size letter — eligible to be reattached. Returns [{def,si,ship}]. */
function detachedReattachCandidates(side, porterShip, porterSize) {
  if (!porterShip) return [];
  return payloadShips(side).filter(p => {
    if (p.ship.attachedTo || p.ship.offTable || p.ship.destroyed) return false;
    if ((p.def.payload.size) !== porterSize) return false;
    return Math.hypot(p.ship.x - porterShip.x, p.ship.y - porterShip.y) <= 3 * INCH + 2;
  });
}

/* Sync attached payloads with their Porter: if the Porter ship is destroyed,
   any payload still attached to it is destroyed too (14.1.11). */
function syncPayloads() {
  ['ucm', 'shal'].forEach(side => {
    payloadShips(side).forEach(p => {
      const a = p.ship.attachedTo;
      if (a) {
        const porGrp = state.groups[a.gid];
        const porShip = porGrp && porGrp.ships[a.si];
        if (!porShip || porShip.destroyed) { p.ship.destroyed = true; p.ship.attachedTo = null; }
      } else if (!p.ship.destroyed && !p.ship.offTable) {
        // Detached payloads always follow General Quarters.
        p.ship.order = 'GQ';
      }
    });
  });
}

function rollD6() { return Math.floor(Math.random() * 6) + 1; }
function keyByD6(table, d6) { return Object.keys(table).find(k => table[k].d6 === d6); }

/* Generate a full scenario (rolls keys for each table). Pass overrides to lock rolls. */
function generateScenario(overrides = {}) {
  return {
    deployment: overrides.deployment || keyByD6(DEPLOYMENTS, rollD6()),
    approach:   overrides.approach   || keyByD6(APPROACHES,  rollD6()),
    layout:     overrides.layout     || keyByD6(LAYOUTS,     rollD6()),
    variant:    overrides.variant    || keyByD6(VARIANTS,    rollD6()),
    objective:  overrides.objective  || keyByD6(OBJECTIVES,  rollD6() || 1) // objectives are 1–6; never 'standard' from roll
  };
}

/* Apply scenario to produce concrete dropsites + features for the board. */
function buildScenarioState(scen) {
  const layout = LAYOUTS[scen.layout];
  const variant = VARIANTS[scen.variant];
  const result = variant.apply(layout.dropsites, scen.deployment);
  const dropsites = result.dropsites.map(d => {
    const base = DROPSITE_BASE[d.type];
    const features = (result.features[d.id] || []).slice();
    return {
      id: d.id,
      type: d.type,
      base,
      x: d.x,         // inches from top-left
      y: d.y,
      features,
      damage: 0,
      maxHull: base.hull
    };
  });
  // Resolve scenery target counts (a count may be a range like '4-6' → take max).
  const parseCount = (v) => {
    if (typeof v === 'number') return v;
    if (typeof v === 'string' && v.includes('-')) return parseInt(v.split('-')[1]);
    return parseInt(v) || 0;
  };
  const sc = layout.scenery || {};
  const bonus = result.scenery || {};
  const sceneryTargets = {
    micrometeor: parseCount(sc.micrometeor) + (bonus.micrometeorBonus || 0),
    dense:       parseCount(sc.dense)       + (bonus.denseBonus || 0)
  };
  return {
    dropsites,
    rings: layout.rings || [],
    largeObjects: layout.largeObjects || [],
    scenery: layout.scenery,
    sceneryBonus: result.scenery || {},
    sceneryTargets,         // {micrometeor, dense} — how many to place
    placedScenery: [],      // [{type, x, y, angle}] — player-placed clouds/fields
    variantNote: result.note || null
  };
}

/* Initial positions — UCM on south edge, Shaltari on north edge.
   Spread out across the deployment line. */
function initFleet(fleet, side) {
  fleet.forEach((def, gi) => {
    // def is already a per-side clone with .side and a unique .id set.
    const groupSize = def.groupSize || 1;
    const ships = [];
    // distribute along the deployment edge:
    // UCM south: y = BOARD_PX - 30, heading = -90 (pointing up / north)
    // Shaltari north: y = 30, heading = 90 (pointing down / south)
    const baseY = side === 'ucm' ? BOARD_PX - 30 : 30;
    const heading = side === 'ucm' ? -90 : 90; // -90 = up, 90 = down (SVG +y is down)
    // x distribution per side — spread groups left-to-right
    const sideFleet = fleet;
    const idx = sideFleet.indexOf(def);
    const totalGroups = sideFleet.length;
    const slot = (idx + 0.5) / totalGroups;
    const baseX = slot * BOARD_PX;
    // distribute ships within a group along a small arc on x
    for (let i = 0; i < groupSize; i++) {
      const offset = (i - (groupSize - 1) / 2) * 14;
      ships.push({
        x: baseX + offset,
        y: baseY,
        heading: heading, // degrees, 0 = +x (right), 90 = +y (down)
        hull: def.hull,
        maxHull: def.hull,
        destroyed: false,
        movedThisRound: false,
        layer: 'orbit',   // 'orbit' | 'atmosphere' — all ships deploy in Orbit
        launchedThisRound: 0  // count of fighters/bombers launched this round
      });
    }
    state.groups[def.id] = {
      def: def,
      order: null,
      spikes: 0,
      activated: false,
      ships: ships,
      moveTrail: [],
      leadShipIdx: 0   // nominated lead ship (weapons range/arcs, launching assets)
    };
  });
}

/* (Re)build all groups from the currently-selected factions. */
function rebuildFleets() {
  state.activeFleets = {}; // force fresh clones for the chosen factions
  state.groups = {};
  initFleet(redFleet(), 'ucm');
  initFleet(blueFleet(), 'shal');
}
rebuildFleets();

// All currently-active defs combined for lookup.
function allDefs() { return [...redFleet(), ...blueFleet()]; }
function getDef(id) { return allDefs().find(d => d.id === id); }
function getGroup(id) { return state.groups[id]; }

/* ==========================================================================
   RENDERING — SIDE PANELS
   ========================================================================== */
function renderPanels() {
  // Hide both side panels during Setup (the scenario overlay is the focus). Collapse
  // their grid columns via a class so the board stays centred and full-width; show them
  // for every other phase.
  const app = document.querySelector('.app');
  if (app) app.classList.toggle('panels-hidden', state.phase === 'setup');

  const ucmDiv = document.getElementById('ucm-groups');
  const shalDiv = document.getElementById('shal-groups');
  ucmDiv.innerHTML = '';
  shalDiv.innerHTML = '';

  // During SETUP, fleets/sides aren't finalised yet (sides randomise at commit),
  // so the ship list is empty until the scenario is confirmed.
  if (state.phase === 'setup') {
    const ucmTitleEl = document.getElementById('ucm-title');
    const shalTitleEl = document.getElementById('shal-title');
    if (ucmTitleEl) ucmTitleEl.childNodes[0].nodeValue = 'FLEET ';
    if (shalTitleEl) shalTitleEl.childNodes[0].nodeValue = 'FLEET ';
    const c1 = document.getElementById('ucm-count'); if (c1) c1.textContent = '';
    const c2 = document.getElementById('shal-count'); if (c2) c2.textContent = '';
    const bRed = document.getElementById('brand-red'); if (bRed) bRed.textContent = 'DFC';
    const bBlue = document.getElementById('brand-blue'); if (bBlue) bBlue.textContent = 'FLEET OPS';
    return;
  }

  let ucmPts = 0, shalPts = 0;
  const rf = redFleet(), bf = blueFleet();
  const renderSide = (fleet, container, side) => {
    let pts = 0, grpCount = 0;
    // Non-payload groups render as normal individual cards.
    fleet.filter(def => !def.payload).forEach(def => {
      pts += def.pts;
      grpCount++;
      container.appendChild(makeGroupCard(def));
    });
    // Payload (Bioficer Cell) groups: collapse into ONE "Cells" card, and only
    // show it once at least one Cell has been detached onto the table. Attached
    // (riding) Cells stay hidden until deployed from their Porter.
    const payloadDefs = fleet.filter(def => def.payload);
    if (payloadDefs.length) {
      payloadDefs.forEach(def => { pts += def.pts; });
      const anyDetached = payloadDefs.some(def => {
        const g = state.groups[def.id];
        return g && g.ships.some(s => !s.destroyed && !s.offTable && !s.attachedTo);
      });
      if (anyDetached) {
        grpCount++;
        container.appendChild(makeCellsCard(side, payloadDefs));
      }
    }
    return { pts, grpCount };
  };
  const rStat = renderSide(rf, ucmDiv, 'ucm');
  const bStat = renderSide(bf, shalDiv, 'shal');
  // AP chip at the top of each fleet list (play phase) — click to adjust that side's AP.
  if (state.phase === 'play' && state.planning) {
    const P = state.planning;
    const apChip = (side, container) => {
      const chip = document.createElement('button');
      chip.className = 'ap-chip';
      chip.dataset.apOpen = side;
      chip.title = 'Ability Points — click to adjust';
      chip.innerHTML = `<span style="font-size:8px;letter-spacing:0.12em;color:var(--text-mute);">AP</span>
        <b style="color:var(--${side});font-size:15px;">${P.ap[side]}</b>
        ${P.passTokens[side] ? `<span style="font-size:8px;color:var(--text-mute);">· ${P.passTokens[side]} PASS</span>` : ''}
        <span style="font-size:9px;color:var(--text-mute);margin-left:auto;">⊕</span>`;
      chip.addEventListener('click', () => { state.apEditOpen = side; renderAll(); });
      container.insertBefore(chip, container.firstChild);
    };
    apChip('ucm', ucmDiv);
    apChip('shal', shalDiv);
  }
  ucmPts = rStat.pts; shalPts = bStat.pts;
  const redName = factionName('ucm');
  const blueName = factionName('shal');
  document.getElementById('ucm-count').textContent = `${rStat.grpCount} GRPS · ${ucmPts} PTS`;
  document.getElementById('shal-count').textContent = `${bStat.grpCount} GRPS · ${shalPts} PTS`;
  // Faction names in the panel titles + topbar brand.
  const ucmTitle = document.getElementById('ucm-title');
  const shalTitle = document.getElementById('shal-title');
  if (ucmTitle) ucmTitle.childNodes[0].nodeValue = redName.toUpperCase() + ' ';
  if (shalTitle) shalTitle.childNodes[0].nodeValue = blueName.toUpperCase() + ' ';
  const bRed = document.getElementById('brand-red'); if (bRed) bRed.textContent = redName.toUpperCase();
  const bBlue = document.getElementById('brand-blue'); if (bBlue) bBlue.textContent = blueName.toUpperCase();
}

function makeGroupCard(def) {
  const grp = getGroup(def.id);
  const card = document.createElement('div');
  card.className = `group-card ${def.side}`;
  if (state.selectedGroupId === def.id) card.classList.add('active');
  if (grp.activated) card.classList.add('activated');
  // Alternating activation: dim the faction that isn't up this round.
  if (state.phase === 'play' && state.activeSide && def.side !== state.activeSide && !grp.activated) {
    card.classList.add('off-turn');
  }
  // Activation lock: once a group on this side has started activating (order set or
  // acted), all OTHER same-side groups are locked until FINISH ACTIVATION is pressed.
  const activatingGid = state.phase === 'play' ? activeGroupIdForSide(def.side) : null;
  if (activatingGid && activatingGid !== def.id && !grp.activated) {
    card.classList.add('activation-locked');
  }
  card.dataset.gid = def.id;

  const alive = grp.ships.filter(s => !s.destroyed).length;
  const total = grp.ships.length;
  const onTable = grp.ships.filter(s => !s.destroyed && !s.offTable).length;
  const undeployedCount = alive - onTable;
  // Payload ships still riding inside a Porter (not yet detached).
  const attachedCount = def.payload ? grp.ships.filter(s => !s.destroyed && s.attachedTo).length : 0;
  const sideApproach = state.scenario ? approachFor(def.side) : null;
  const isDirect = sideApproach === 'directly_deploy';
  const deployable = state.scenario ? canDeployNow(def) : false;
  // A non-Vanguard Group on a Close/Distant side waits for off-table activation.
  const isReserve = state.scenario && !deployable;

  // Play-phase activation eligibility (for undeployed Groups in play)
  let playBadgeHTML = '';
  if (state.phase === 'play' && undeployedCount > 0) {
    const elig = canActivateOffTable(def);
    if (elig.eligible) {
      // Eligible to deploy + activate this round — green/amber call to action.
      const label = undeployedCount === total ? 'DEPLOY NOW' : `${undeployedCount} TO PLACE`;
      playBadgeHTML = `<span class="gc-badge ready">${label}</span>`;
    } else {
      // Not yet eligible — show round when available.
      // Extract round number from the reason if present, else show generic.
      const m = elig.reason && elig.reason.match(/Round (\d)/);
      const lbl = m ? `AVAIL R${m[1]}` : 'OFF-TABLE';
      playBadgeHTML = `<span class="gc-badge undeployed">${lbl}</span>`;
    }
  }

  // Badge logic:
  //  - VANGUARD-X" if the Group has Vanguard (always)
  //  - In setup/deploy phase: DIRECT/RESERVE + UNDEPLOYED count
  //  - In play phase: round-aware DEPLOY-NOW / AVAIL-RX badge
  const inNetwork = def.openNetwork && grp.ships.some(s => shipInNetwork(def, s));
  const displayName = inNetwork ? 'Voidgate Network' : def.name;
  card.innerHTML = `
    <div class="gc-name">${displayName}</div>
    <div class="gc-role">${inNetwork ? 'Open Network · ' + def.pts + 'pts' : def.role + ' · ' + def.tonnage + ' · ' + def.pts + 'pts'}</div>
    <div class="gc-badges">
      ${def.vanguard && state.phase !== 'play' ? `<span class="gc-badge vanguard">VANGUARD-${def.vanguard}"</span>` : ''}
      ${state.phase !== 'play' && isDirect ? `<span class="gc-badge direct">DIRECT</span>` : ''}
      ${state.phase !== 'play' && isReserve ? `<span class="gc-badge reserve">RESERVE · ${sideApproach === 'close' ? 'CLOSE' : 'DISTANT'}</span>` : ''}
      ${state.phase === 'deploy' && deployable && undeployedCount > 0 && !deploySideAllowed(def.side) ? `<span class="gc-badge reserve">WAIT · RED FIRST</span>` : (state.phase === 'deploy' && deployable && undeployedCount > 0 ? `<span class="gc-badge undeployed">${undeployedCount === total ? 'UNDEPLOYED' : undeployedCount + ' OFF-TABLE'}</span>` : '')}
      ${playBadgeHTML}
      ${attachedCount > 0 ? `<span class="gc-badge reserve">${attachedCount} ATTACHED</span>` : ''}
    </div>
    <div class="gc-stats">
      <span><b>T</b>${def.thrust}"</span>
      <span><b>SC</b>${def.scan}"</span>
      <span><b>SIG</b>${(() => {
        const sil = grp.ships.some(s => !s.destroyed && s.sigSilent);
        const spk = grp.spikes || 0;
        const eff = (sil ? 0 : def.sig) + 3 * spk;
        return sil ? `<span style="color:var(--ucm)">${eff}"</span>` : eff + '"';
      })()}</span>
      <span><b>HP</b>${alive}/${total} ship${total>1?'s':''}</span>
      ${grp.order ? `<span style="color:var(--${def.side === 'ucm' ? 'ucm' : 'shal'})">${grp.order}</span>` : ''}
      ${grp.spikes > 0 ? `<span style="color:var(--hull-warn)">SPK ${grp.spikes}</span>` : ''}
    </div>
  `;
  card.addEventListener('click', () => selectGroup(def.id));
  return card;
}

/* Combined "Cells" card for Bioficer Payload groups. Represents all detached
   Cells (which from R2 count as a single Group). Clicking selects the first
   detached Cell's group so its detail/orders show. */
function makeCellsCard(side, payloadDefs) {
  const card = document.createElement('div');
  card.className = `group-card ${side}`;
  // Collect ONLY detached (deployed, on-table) cells. Attached cells are not
  // shown here — they activate as part of their Porter's activation.
  const detached = [];
  payloadDefs.forEach(def => {
    const g = state.groups[def.id];
    if (!g) return;
    g.ships.forEach((s, si) => { if (!s.destroyed && !s.offTable && !s.attachedTo) detached.push({ def, si, ship: s }); });
  });
  const first = detached.length ? detached[0] : null;
  if (first && state.selectedGroupId === first.def.id) card.classList.add('active');
  // Points reflect only the deployed cells.
  const deployedPts = detached.reduce((a, d) => a + d.def.pts, 0);
  card.innerHTML = `
    <div class="gc-name">Cells</div>
    <div class="gc-role">Detached Payload Group · ${deployedPts}pts</div>
    <div class="gc-badges">
      <span class="gc-badge reserve">${detached.length} DEPLOYED</span>
      ${state.round >= 2 ? `<span class="gc-badge vanguard">SINGLE GROUP</span>` : ''}
    </div>
    <div class="gc-stats">
      <span><b>FOLLOW</b> GQ</span>
      <span style="color:var(--text-mute)">ignore coherency</span>
    </div>
  `;
  if (first) {
    card.addEventListener('click', () => {
      selectGroup(first.def.id);
      state.selectedShipIdx = first.si; // target a real on-table cell
      renderAll();
    });
  }
  return card;
}

function selectGroup(gid) {
  if (state.selectedGroupId === gid) {
    state.selectedGroupId = null;
    state.selectedShipIdx = null;
  } else {
    state.selectedGroupId = gid;
    state.selectedShipIdx = null;
  }
  state.selectedDropsiteId = null;
  state.hoverPoint = null;
  state.layerToggle = false;
  state.launching = null;
  renderAll();
}

/* ==========================================================================
   RENDERING — RIGHT DETAIL PANEL
   ========================================================================== */
function turnLimitText(o) {
  if (!o.turnLimit) return ' Movement is <b>straight forward only</b> (no turn).';
  return ` Turn cone <b>±${o.turnLimit}°</b>.`;
}

/* Render the right-panel content for a selected Dropsite. */
function renderDropsiteDetail(ds) {
  const base = ds.base;
  const isStation = base.category === 'station';
  const accentCol = isStation ? '#a8b4bc' : '#7ec8ff';
  const accentVar = isStation ? '--text-dim' : '--ucm';

  // Compute best available saves from base + features (better = lower number).
  const saveBetter = (a, b) => {
    if (a === '—' || a == null) return b;
    if (b === '—' || b == null) return a;
    return parseInt(a) < parseInt(b) ? a : b;
  };
  let bestES = base.es, bestKS = base.ks;
  (ds.features || []).forEach(fk => {
    const f = FEATURES[fk];
    bestES = saveBetter(bestES, f.es);
    bestKS = saveBetter(bestKS, f.ks);
  });

  const remainingHull = Math.max(0, ds.maxHull - ds.damage);
  const hullPct = remainingHull / ds.maxHull;
  const ruined = hullPct < 0.5;
  const destroyed = remainingHull === 0;

  let html = `<div class="panel-section">
    <div class="detail-name" style="color:${accentCol}">${base.name}</div>
    <div class="detail-role">${base.layer} · Hull ${remainingHull}/${ds.maxHull}${ruined && !destroyed?' · <span style="color:var(--hull-warn)">RUINED</span>':''}${destroyed?' · <span style="color:var(--hull-crit)">LEVELLED</span>':''}</div>
    ${(() => {
      const ctrl = dropsiteController(ds), cont = dropsiteContested(ds);
      const nm = (s) => FACTIONS[state.factions[s]] ? FACTIONS[state.factions[s]].name : s.toUpperCase();
      if (cont) return `<div class="detail-role" style="color:var(--hull-warn)">⚔ CONTESTED</div>`;
      if (ctrl) return `<div class="detail-role" style="color:var(--${ctrl})">✓ Controlled — ${nm(ctrl)}</div>`;
      return '';
    })()}
    <div class="stat-grid">
      <div class="stat-cell"><div class="lbl">Scan</div><div class="val">${base.scan}"</div></div>
      <div class="stat-cell"><div class="lbl">Sig</div><div class="val">${base.sig}"</div></div>
      <div class="stat-cell"><div class="lbl">Hull</div><div class="val">${remainingHull}</div></div>
      <div class="stat-cell"><div class="lbl">ES</div><div class="val">${bestES}${bestES !== base.es?'*':''}</div></div>
      <div class="stat-cell"><div class="lbl">KS</div><div class="val">${bestKS}${bestKS !== base.ks?'*':''}</div></div>
      <div class="stat-cell"><div class="lbl">Size</div><div class="val">${base.size === 'small'?'S':base.size==='medium'?'M':'L'}</div></div>
    </div>
    ${(bestES !== base.es || bestKS !== base.ks) ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">* improved by Feature save</div>` : ''}
  </div>`;

  // When this Dropsite is being activated by the controlling side, its Feature cards
  // gain ENGAGE / LAUNCH buttons (added inline below) and a Finish button at the bottom.
  const daActive = state.dropsiteActivation && state.dropsiteActivation.dsId === ds.id;
  const daSide = daActive ? state.dropsiteActivation.side : null;

  // Battalion data + deploy mode (shared by ground block and feature cards).
  const bats = dsBattalions(ds);
  // Renders the per-side +/− battalion controls for one location key.
  // (Landing launched battalions is now done via the deploy modal, so these rows
  // are only for manual adjustment — not click-to-deploy targets.)
  const batControls = (key) => {
    const loc = bats[key];
    return `<div class="bat-counts">
      <span class="bat-side ucm">${factionName('ucm')}
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|ucm|-1">−</button>
        <b style="color:var(--ucm)">${loc.ucm}</b>
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|ucm|1">+</button>
      </span>
      <span class="bat-side shal">${factionName('shal')}
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|shal|-1">−</button>
        <b style="color:var(--shal)">${loc.shal}</b>
        <button class="hp-btn" data-bat-adj="${ds.id}|${key}|shal|1">+</button>
      </span>
    </div>`;
  };

  // Hull damage controls + Dropsite (ground) battalions.
  html += `<div class="panel-section">
    <div class="spike-row">
      <span class="label">Damage</span>
      <div class="spike-controls">
        <button class="spike-btn" data-ds-damage-d="${ds.id}">−</button>
        <div class="spike-val ${remainingHull <= ds.maxHull * 0.34 ? 'max' : remainingHull <= ds.maxHull * 0.6 ? 'warn' : ''}">${ds.damage}</div>
        <button class="spike-btn" data-ds-damage-u="${ds.id}">+</button>
      </div>
    </div>
    <div style="margin-top:8px;">
      <div class="bat-loc-label">Dropsite</div>
      ${batControls('ground')}
    </div>
  </div>`;

  // Features — each card shows its stats and its own battalion controls.
  if (ds.features && ds.features.length) {
    html += `<div class="panel-section">
      <div class="panel-title">Features <span class="count">${ds.features.length}</span></div>
      <div class="weapons-list">`;
    ds.features.forEach((fk, fi) => {
      const f = FEATURES[fk];
      const fcol = f.color || 'var(--text)';
      const bgTint = hexToRgba(fcol, 0.08);
      const fdestroyed = (ds.destroyedFeatures || []).includes(fi);
      // Activation buttons (only while this dropsite is being activated, not destroyed).
      let weaponCardHTML = '';
      let launchCardHTML = '';
      if (daActive && !fdestroyed) {
        if (f.weapon) {
          const fired = (ds.firedFeatures || []).includes(fi);
          // The weapon CARD itself is the activation control during dropsite activation
          // (mirrors ship weapon cards) — no separate ENGAGE button.
          const aiming = state.featureAttack && state.featureAttack.dsId === ds.id && state.featureAttack.fi === fi;
          const wpnClickable = daActive && !fired && !fdestroyed;
          const w = f.weapon;
          weaponCardHTML = `<div class="weapon-row${fired ? ' weapon-locked' : ''}${aiming ? ' weapon-aiming' : ''}"
              ${wpnClickable ? `data-da-fire="${ds.id}|${fi}" style="cursor:pointer;margin-top:6px;"` : `style="margin-top:6px;${(!daActive || fdestroyed) ? 'opacity:0.55;' : ''}"`}>
            <div class="weapon-name">${w.name}${fired ? ' <span style="color:var(--hull-crit);font-size:9px;">✓ fired</span>' : ''}</div>
            <div class="weapon-stats">${w.scan} scan · Att ${w.att} · Lock ${w.lock} · Dmg ${w.dmg} · ${w.type}</div>
            ${w.special && w.special !== '—' ? `<div class="weapon-special">${w.special}</div>` : ''}
            ${aiming ? `<div class="weapon-special" style="color:var(--hull-crit)">Click an enemy ship in range · right-click cancels</div>`
              : wpnClickable ? `<div class="weapon-special" style="color:var(--text-mute)">Click to ENGAGE ▸ then click a target ship</div>` : ''}
          </div>`;
        }
        if (f.launch && f.launch.length) {
          f.launch.forEach(l => {
            const meta = launchMeta(l.type);
            const lActive = state.launching && state.launching.fromDropsite === ds.id &&
              state.launching.fromFeature === fi && state.launching.type === l.type;
            launchCardHTML += `<div class="weapon-row" data-da-launch="${ds.id}|${fi}|${l.type}"
                style="cursor:pointer;margin-top:6px;${lActive ? 'border-left:3px solid var(--'+daSide+');background:rgba(74,214,255,0.06);' : ''}">
              <div class="weapon-name">${l.name}${lActive ? ' <span style="color:var(--'+daSide+')">◉</span>' : ''}</div>
              <div class="weapon-stats">Launch ${l.n} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
              ${lActive ? '' : `<div class="weapon-special" style="color:var(--text-mute);">Click to launch ▸ place on map ≤${meta.auraIn}"</div>`}
            </div>`;
          });
        }
      }
      // When NOT activating, still show the launch profile as a (disabled) card for unity.
      if (!launchCardHTML && f.launch && f.launch.length) {
        f.launch.forEach(l => {
          const meta = launchMeta(l.type);
          launchCardHTML += `<div class="weapon-row" style="margin-top:6px;opacity:0.55;">
            <div class="weapon-name">${l.name}</div>
            <div class="weapon-stats">Launch ${l.n} · ${meta.auraIn}" range · ${launchTargetLabel(meta.target)}</div>
          </div>`;
        });
      }
      // When NOT activating, still show the weapon as a (disabled) card for unity.
      if (!weaponCardHTML && f.weapon) {
        const w = f.weapon;
        weaponCardHTML = `<div class="weapon-row" style="margin-top:6px;opacity:0.55;">
          <div class="weapon-name">${w.name}</div>
          <div class="weapon-stats">${w.scan} scan · Att ${w.att} · Lock ${w.lock} · Dmg ${w.dmg} · ${w.type}</div>
          ${w.special && w.special !== '—' ? `<div class="weapon-special">${w.special}</div>` : ''}
        </div>`;
      }
      html += `<div class="weapon-row" style="border-left:3px solid ${fcol};background:${bgTint};${fdestroyed?'opacity:0.5;':''}">
        <div class="weapon-name"><span style="color:${fcol}">${f.glyph ? f.glyph + ' ' : ''}${f.name}${fdestroyed?' <span style="color:var(--hull-crit);font-size:9px;">DESTROYED</span>':''}</span></div>
        <div class="weapon-stats">ES ${f.es} · KS ${f.ks}</div>
        ${weaponCardHTML}
        ${launchCardHTML}
        ${f.note ? `<div class="weapon-special">${f.note}</div>` : ''}
        <div style="margin-top:5px;">${batControls('feat' + fi)}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="panel-section">
      <div class="panel-title">Features</div>
      <div style="font-size:10px;color:var(--text-mute);font-style:italic;">No Features on this Dropsite.</div>
    </div>`;
  }

  // Finish Activation — at the very bottom while this dropsite is being activated.
  if (daActive) {
    html += `<div class="panel-section">
      <button class="btn-primary" id="da-finish-ds" style="width:100%;">✓ FINISH ACTIVATION</button>
    </div>`;
  }

  return html;
}

/* Detail panel for a selected launched asset (Asset Phase): stats, movement, and —
   for bombers/fire ships/torpedoes that have moved into base contact — an attack button. */
function renderAssetDetail(a) {
  const side = a.side;
  const sideClass = side === 'ucm' ? 'ucm' : 'shal';
  const thr = a.t2t && a._t2tRange ? a._t2tRange : assetThrust(a);
  const max = a.count;
  const c = state.assetMove.count;
  const kindLabel = { fighter: 'Fighters', bomber: 'Bombers', fireship: 'Fire Ships', torpedo: 'Torpedoes', mine: 'Mines' }[a.kind] || a.kind;
  const cell = (lbl, val) => `<div class="stat-cell"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
  let statCells = cell('Thrust', thr + '"') + cell('In Stack', max);
  if (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo' || a.kind === 'mine') {
    const p = assetProfile(side, a.kind);
    statCells += cell('Att/ea', p.att) + cell('Lock', p.lock) + cell('Dmg', p.dmg + ' ' + p.type);
  } else if (a.kind === 'fighter') {
    /* fighters: base Thrust + In Stack cells suffice; Close Protection in the note. */
  }
  const specialNote = (() => {
    const p = assetProfile(side, a.kind);
    if (a.kind === 'fighter') return `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">Close Protection: friendly ships within ${assetProfile(side,'fighter').thrust}" may spend these to re-roll failed saves vs Close Action / Bomber / Fire-Ship hits.</div>`;
    return (p.special) ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">${p.special}</div>` : '';
  })();

  let html = `<div class="panel-section">
    <div class="detail-name ${sideClass}">${kindLabel} <span style="color:var(--text-mute);font-weight:400;font-size:11px;">· ${factionName(side)} asset</span></div>
    <div class="detail-role">${a.moved ? 'Moved this round' : 'Not yet moved'}</div>
    <div class="stat-grid">${statCells}</div>
    ${specialNote}
  </div>`;

  // Movement controls (split the stack, then click the board to move).
  if (!a.moved && a.kind !== 'mine') {
    html += `<div class="panel-section">
      <div class="panel-title">Move</div>
      <div class="bat-counts" style="justify-content:center;gap:8px;align-items:center;">
        <span style="font-size:10px;color:var(--text-dim);">Stack to move:</span>
        <button class="hp-btn" data-asm-adj="-1" ${c<=1?'disabled':''}>−</button>
        <b style="color:var(--${sideClass});font-size:13px;">${c}</b><span style="color:var(--text-mute);">/ ${max}</span>
        <button class="hp-btn" data-asm-adj="1" ${c>=max?'disabled':''}>+</button>
      </div>
      <div class="weapon-special" style="color:var(--text-mute);margin-top:4px;">Click a destination on the board ≤ ${thr}".${
        a.kind === 'fighter' ? ' Move onto an enemy Wing to dogfight.' :
        (a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo') ? ' Click an enemy ship to fly in & lock an attack.' :
        ' Split with −/+ to move part of the stack.'}</div>
    </div>`;
  } else if (a.kind === 'mine') {
    html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">Mines cannot move once launched.</div></div>`;
  }

  // Attack target: bombers/fire ships/torpedoes that have MOVED into base contact
  // LOCK a target (resolved later, pooled). Excludes Descent ships in atmosphere
  // (enemyShipsInBaseContact already excludes atmosphere-layer ships).
  if ((a.kind === 'bomber' || a.kind === 'fireship' || a.kind === 'torpedo')) {
    if (a.moved) {
      const contacts = enemyShipsInBaseContact(side, a.x, a.y);
      if (a.bomberTarget) {
        const td = getDef(a.bomberTarget.gid);
        const tn = td ? td.name + (state.groups[a.bomberTarget.gid].ships.length > 1 ? ` #${a.bomberTarget.si + 1}` : '') : '?';
        html += `<div class="panel-section">
          <div class="panel-title">Target Locked</div>
          <div class="weapon-special" style="color:var(--hull-crit);">▶ ${tn} — resolves when all assets have moved.</div>
          <button class="btn" id="asset-detail-untarget" style="width:100%;margin-top:4px;">✕ Clear Target</button>
        </div>`;
      } else if (contacts.length) {
        const verb = a.kind === 'torpedo' ? 'TORPEDO' : a.kind === 'fireship' ? 'FIRE SHIP' : 'BOMBER';
        html += `<div class="panel-section">
          <div class="panel-title">Attack Target</div>`;
        contacts.forEach(ct => {
          const tn = ct.def.name + (state.groups[ct.gid].ships.length > 1 ? ` #${ct.si + 1}` : '');
          html += `<button class="btn-finish-act" data-asset-target="${ct.gid}|${ct.si}" style="margin-top:4px;background:linear-gradient(180deg,var(--hull-crit) 0%,#a32020 100%);border-color:var(--hull-crit);color:#fff;">⊕ LOCK ${verb} ▸ ${tn}</button>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">No enemy ship in base contact.</div></div>`;
      }
    } else {
      html += `<div class="panel-section"><div class="weapon-special" style="color:var(--text-mute);">Move into base contact of an enemy ship to lock an attack.</div></div>`;
    }
  }

  // Time to Target (2 AP): move a moved fighter/bomber again up to 6".
  if ((a.kind === 'fighter' || a.kind === 'bomber') && a.moved && !a.t2t &&
      state.planning && state.planning.ap[side] >= 2) {
    html += `<div class="panel-section">
      <button class="btn" id="asset-detail-t2t" style="width:100%;">⚙ Time to Target (2 AP · move again ≤6")</button>
    </div>`;
  }

  // Reset Move: undo this asset's move so it can be re-activated this turn.
  if (a.moved && a.kind !== 'mine') {
    html += `<div class="panel-section">
      <button class="btn" id="asset-detail-reset" style="width:100%;">⟲ Reset Move</button>
      ${a._preMove ? '' : '<div class="weapon-special" style="color:var(--text-mute);margin-top:3px;">(stack was split/merged — resets in place)</div>'}
    </div>`;
  }

  html += `<div class="panel-section"><button class="btn" id="asset-detail-deselect" style="width:100%;">↩ Deselect</button></div>`;
  return html;
}

function renderDetail() {
  const div = document.getElementById('detail-panel');

  // ── ASSET DETAIL: a launched asset is selected in the Asset Phase. ──
  if (state.assetMove) {
    const a = (state.launchedAssets || []).find(x => x.id === state.assetMove.id);
    if (a) {
      div.innerHTML = renderAssetDetail(a);
      return;
    }
  }

  // If a dropsite is selected (and no ship/group is actively selected), show its info.
  if (state.selectedDropsiteId && state.scenarioData && !state.selectedGroupId) {
    const ds = state.scenarioData.dropsites.find(d => d.id === state.selectedDropsiteId);
    if (ds) {
      div.innerHTML = renderDropsiteDetail(ds);
      return;
    }
  }

  const gid = state.selectedGroupId;
  if (!gid) {
    div.innerHTML = `<div class="empty-state">
      Click a Group in the left panel,<br>
      then click a Ship on the board<br>
      to issue movement orders.<br><br>
      Or click a Dropsite to inspect it.
    </div>`;
    return;
  }
  const def = getDef(gid);
  const grp = getGroup(gid);
  const sideClass = def.side === 'ucm' ? 'ucm' : 'shal';

  // Stat grid
  // Silent Running: base Sig drops to 0", but Spikes still add 3" each.
  const grpSilent = grp.ships.some(s => !s.destroyed && s.sigSilent);
  const spikes = grp.spikes || 0;
  let sigDisplay;
  if (grpSilent) {
    const eff = 0 + 3 * spikes;
    sigDisplay = `<span style="color:var(--ucm)">${eff}"</span><span style="font-size:8px;color:var(--text-mute)"> SR${spikes>0 ? ' (0+'+spikes+'×3")' : ''}</span>`;
  } else {
    const eff = def.sig + 3 * spikes;
    sigDisplay = spikes > 0
      ? `${eff}"<span style="font-size:8px;color:var(--text-mute)"> (${def.sig}+${spikes}×3")</span>`
      : `${def.sig}"`;
  }
  let statsHTML = `
    <div class="panel-section">
      <div class="detail-name ${sideClass}">${def.name}</div>
      <div class="detail-role">${def.role} · ${def.tonnage} / ${def.pts}pts</div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="lbl">Thrust</div><div class="val">${def.thrust}"</div></div>
        <div class="stat-cell"><div class="lbl">Scan</div><div class="val">${def.scan}"</div></div>
        <div class="stat-cell"><div class="lbl">Sig</div><div class="val">${sigDisplay}</div></div>
        <div class="stat-cell"><div class="lbl">Hull</div><div class="val">${def.hull}</div></div>
        <div class="stat-cell"><div class="lbl">ES</div><div class="val">${def.es}</div></div>
        <div class="stat-cell"><div class="lbl">KS</div><div class="val">${def.ks}</div></div>
        <div class="stat-cell"><div class="lbl">BS</div><div class="val">${def.bs}</div></div>
        <div class="stat-cell"><div class="lbl">Side</div><div class="val">${def.side === 'ucm' ? 'UCMF' : 'SHAL'}</div></div>
      </div>
      ${def.special && def.special !== '—' ? `<div style="font-size:9.5px;color:var(--text-dim);margin-top:4px;font-style:italic;">${def.special}</div>` : ''}
    </div>
  `;

  // Spike control
  statsHTML += `
    <div class="panel-section">
      <div class="spike-row">
        <span class="label">Spikes</span>
        <div class="spike-controls">
          <button class="spike-btn" data-spike-d="${gid}">−</button>
          <div class="spike-val ${grp.spikes >= 4 ? 'max' : grp.spikes >= 2 ? 'warn' : ''}">${grp.spikes}</div>
          <button class="spike-btn" data-spike-u="${gid}">+</button>
        </div>
      </div>
    </div>
  `;

  // In play phase: if this Group has undeployed ships, show the deploy-and-activate
  // prompt before the Order selector.
  let deployPromptHTML = '';
  if (state.phase === 'play') {
    const undeployedIdx = nextUndeployedShipIdx(gid);
    if (undeployedIdx >= 0) {
      const elig = canActivateOffTable(def);
      const total = grp.ships.filter(s => !s.destroyed).length;
      const placed = total - (grp.ships.filter(s => !s.destroyed && s.offTable).length);
      if (elig.eligible) {
        deployPromptHTML = `<div class="panel-section">
          <div class="help-tip ${sideClass}">
            <b>Off-table activation.</b> ${placed === 0 ? 'This Group has not yet arrived.' : `Placed ${placed}/${total}.`}
            <br>Click in your DZ to place ship ${placed + 1} of ${total}.
            ${placed === total ? '<br>Then pick an Order to activate.' : ''}
          </div>
        </div>`;
      } else {
        deployPromptHTML = `<div class="panel-section">
          <div class="help-tip ${sideClass}" style="color:var(--text-mute)">
            <b>Off-table.</b> ${elig.reason}.
          </div>
        </div>`;
      }
    } else if (!grp.activated && !grp.order &&
               grp.ships.some(s => !s.destroyed && s.justArrived)) {
      // Ships arrived from off-table this activation, no Order yet.
      const hasUndoable = grp.ships.some(s => !s.destroyed && !s.offTable && s.justArrived && !s.movedThisRound);
      const undoButtons = hasUndoable ? `<button class="btn" data-undo-deploy="${gid}" style="width:100%;margin-top:4px;">↩ UNDO DEPLOY (return all ships off-table)</button>` : '';
      deployPromptHTML = `<div class="panel-section">
        <div class="help-tip ${sideClass}">
          <b>Arrived & angled.</b> Reposition by clicking a ship then a new spot, or <b>choose an Order below</b> to activate.
        </div>
        ${undoButtons}
      </div>`;
    }
  }

  // Order selector — show in play phase as soon as the Group has any ship on-table
  // (i.e. at least one ship has been deployed/arrived). This ensures orders appear
  // immediately once a ship is placed and angled.
  let ordersHTML = '';
  const hasOnTableShip = grp.ships.some(s => !s.destroyed && !s.offTable);
  // A Group still mid-deployment (some ships placed, others not) must finish
  // placing ALL its ships before any Order can be chosen — otherwise the first
  // ship gets order-locked while the click handler is still trying to place the rest.
  const undeployedInGroup = nextUndeployedShipIdx(def.id) >= 0;
  const showOrders = state.phase === 'play' && hasOnTableShip && !undeployedInGroup;
  // Show a helper when orders are withheld because deployment isn't complete.
  let deployGateHTML = '';
  if (state.phase === 'play' && hasOnTableShip && undeployedInGroup) {
    const left = grp.ships.filter(s => !s.destroyed && s.offTable && !s.attachedTo).length;
    deployGateHTML = `<div class="panel-section">
      <div class="panel-title">Group Order</div>
      <div class="help-tip ${sideClass}" style="color:var(--text-mute)">
        Place all ships in this Group first — <b>${left}</b> still to deploy. Click in the deployment zone to place the next ship, then Orders unlock.
      </div>
    </div>`;
  }
  // Open Network: from the round AFTER they deploy, each ship picks its own Order.
  const individualOrders = noFormation(def) && onIndividualOrders(def, grp);
  if (showOrders) {
    if (individualOrders) {
      // Per-ship orders. Buttons act on the selected ship.
      const si = state.selectedShipIdx;
      const selShip = si !== null ? grp.ships[si] : null;
      const canPick = selShip && !selShip.destroyed && !selShip.offTable;
      const shipOrder = selShip ? selShip.order : null;
      const shipLocked = shipOrder && selShip && selShip.movedThisRound;
      ordersHTML = `<div class="panel-section">
        <div class="panel-title">Individual Orders <span style="color:var(--shal);font-size:8.5px;">Open Network</span></div>`;
      if (!canPick) {
        ordersHTML += `<div class="help-tip ${sideClass}" style="color:var(--text-mute)">Select a Voidgate (ship) on the board — each picks its own Order.</div>`;
      } else {
        ordersHTML += `<div style="font-size:9.5px;color:var(--text-dim);margin-bottom:4px;">Ship #${si+1}${shipLocked ? ' · <span style="color:var(--text-mute)">locked</span>' : ''}</div>
          <div class="orders">`;
        Object.keys(ORDERS).forEach(k => {
          const o = ORDERS[k];
          const active = shipOrder === k;
          const dis = (shipLocked && !active) ? 'disabled' : '';
          ordersHTML += `<button class="order-btn ${active ? 'active ' + sideClass : ''}" data-ship-order="${gid}|${si}|${k}" ${dis}>${o.short}</button>`;
        });
        ordersHTML += `</div>`;
        if (shipOrder) {
          const o = ORDERS[shipOrder];
          ordersHTML += `<div class="order-info"><b>${o.label}</b><br>${o.canDo.map(t=>`• ${t}`).join('<br>')}
            ${o.cantDo.length ? '<br><span class="neg">' + o.cantDo.map(t=>`✗ ${t}`).join('<br>') + '</span>' : ''}
            <br><span class="spk">Spikes: ${o.spike}</span></div>`;
        }
      }
      // Per-ship order overview.
      const summ = grp.ships.map((s, i) => (s.destroyed||s.offTable) ? null : `#${i+1}: ${s.order || '—'}`).filter(Boolean);
      if (summ.length) ordersHTML += `<div style="font-size:9px;color:var(--text-mute);margin-top:5px;font-family:var(--mono)">${summ.join(' · ')}</div>`;
      ordersHTML += `</div>`;
    } else {
    // Once any ship in the Group has moved under the current Order, lock it —
    // the whole formation shares one Order for the activation.
    const orderLocked = grp.order && grp.ships.some(s => !s.destroyed && s.movedThisRound);
    ordersHTML = `<div class="panel-section">
      <div class="panel-title">Group Order ${grp.activated ? '· <span style="color:var(--text-mute)">activated</span>' : orderLocked ? '· <span style="color:var(--text-mute)">locked</span>' : ''}</div>
      <div class="orders">`;
    Object.keys(ORDERS).forEach(k => {
      const o = ORDERS[k];
      const active = grp.order === k;
      const dis = (orderLocked && !active) ? 'disabled' : '';
      ordersHTML += `<button class="order-btn ${active ? 'active ' + sideClass : ''}" data-order="${k}" ${dis}>${o.short}</button>`;
    });
    ordersHTML += `</div>`;
    if (grp.order) {
      const o = ORDERS[grp.order];
      ordersHTML += `<div class="order-info">
        <b>${o.label}</b>${orderLocked ? ' <span style="color:var(--text-mute)">(locked — formation committed)</span>' : ''}<br>
        ${o.canDo.map(t => `• ${t}`).join('<br>')}
        ${o.cantDo.length ? '<br><span class="neg">' + o.cantDo.map(t => `✗ ${t}`).join('<br>') + '</span>' : ''}
      <br><span class="spk">Spikes: ${o.spike}</span>
    </div>`;
    }
    ordersHTML += `</div>`;
    }
  }

  // Weapons
  // Formation status (needed for firing/launch restrictions).
  const oofSet = outOfFormationSet(def);
  const selShipOOF = state.selectedShipIdx !== null && oofSet.has(state.selectedShipIdx);

  let weaponsHTML = '';
  if (def.weapons && def.weapons.length) {
    const si = state.selectedShipIdx;
    const selShip = si !== null ? grp.ships[si] : null;
    const eo = selShip ? effectiveOrder(def, grp, si) : null;
    const limit = fireLimit(eo, def);
    const onTable = selShip && !selShip.destroyed && !selShip.offTable;
    const moved = selShip && selShip.movedThisRound;
    const weaponsOffline = selShip && selShip.crippling && selShip.crippling.includes('weapons');
    selShip && (selShip.weaponTargets = selShip.weaponTargets || {});
    const usedCost = selShip ? lockedWeaponCost(def, selShip, eo) : 0;
    const lockedCount = selShip ? Object.keys(selShip.weaponTargets).length : 0;
    const fired = selShip && selShip.firedThisActivation;
    // Movement-before-firing: for normal group orders the WHOLE group must finish moving
    // first; ships on individual orders (Open Network / individual) gate on their own move.
    const individualOrders = def.openNetwork || onIndividualOrders(def, grp);
    const moveGate = individualOrders ? moved : groupMovementComplete(def, grp);
    // Conditions under which weapons can be assigned this activation.
    const canFire = state.phase === 'play' && onTable && !selShipOOF && limit > 0 && !weaponsOffline && !fired && moveGate;
    // Is the ship currently firing any Close Action weapon (enables a free Low Power weapon)?
    const firingCA = selShip && Object.keys(selShip.weaponTargets).some(wi => parseWeaponSpecials(def.weapons[wi]).closeAction);
    weaponsHTML = `<div class="panel-section">
      <div class="panel-title">Weapons ${
        selShipOOF ? '· <span style="color:var(--hull-crit)">disabled (out of formation)</span>'
        : weaponsOffline ? '· <span style="color:var(--hull-crit)">OFFLINE</span>'
        : (!moveGate && limit > 0 && onTable && !fired) ? `· <span style="color:var(--text-mute)">${individualOrders ? 'move first' : 'move whole group first'}</span>`
        : limit > 0 ? `· <span style="color:var(--text-mute)">${usedCost}/${limit} used</span>` : ''}</div>
      <div class="weapons-list"${selShipOOF ? ' style="opacity:0.4;"' : ''}>`;
    def.weapons.forEach((w, wi) => {
      const isDetector = w.arc === 'LoS' || /^Detector$/i.test(w.name);
      const wsp = parseWeaponSpecials(w);
      const tgt = selShip && selShip.weaponTargets[wi];
      const tgtName = tgt ? (getDef(tgt.gid) ? getDef(tgt.gid).name + (state.groups[tgt.gid] && state.groups[tgt.gid].ships.length>1 ? ` #${tgt.si+1}` : '') : '?') : null;
      const isAiming = state.targeting && state.targeting.gid === state.selectedGroupId && state.targeting.si === si && state.targeting.wi === wi;
      const isCA = (w.special || '').includes('Close Action');
      const caBlocked = eo === 'DC' && !isCA; // DC only fires a Close Action weapon
      // Limited-X: weapon disabled once it has been fired X times this game.
      const limitedMax = wsp.limited;
      const limitedUsed = selShip && selShip.limitedUses && selShip.limitedUses[wi] || 0;
      const limitedBlocked = limitedMax && limitedUsed >= limitedMax;
      // High Power off Weapons Free costs 2; single-HP-weapon ships need WF to fire it.
      const thisCost = weaponSlotCost(def, wi, eo);
      const fitsLimit = wsp.lowPower ? firingCA : (usedCost + thisCost <= limit);
      const clickable = !isDetector && canFire && !tgt && fitsLimit && !caBlocked && !limitedBlocked;
      const detectorUsed = selShip && selShip.detectorUsed;
      const detectorAiming = state.detector && state.detector.gid === state.selectedGroupId && state.detector.si === si && state.detector.wi === wi;
      const canDetect = isDetector && state.phase === 'play' && onTable && !selShipOOF && !weaponsOffline && !fired && moveGate && !detectorUsed;
      const isAntiWing = /Anti.?Wing/i.test(w.special || '');
      const awAiming = state.antiWing && state.antiWing.gid === state.selectedGroupId && state.antiWing.si === si && state.antiWing.wi === wi;
      const enemyWingsExist = (state.launchedAssets || []).some(a => a.side !== def.side && (a.kind === 'fighter' || a.kind === 'bomber'));
      const canAntiWing = isAntiWing && canFire && !tgt && fitsLimit && !caBlocked && !limitedBlocked && enemyWingsExist;
      const extraTag = [wsp.highPower && eo!=='WF'?'High Power ×2':'', wsp.lowPower?'Low Power':'', wsp.linked?'Linked':'', limitedMax?`Limited ${limitedUsed}/${limitedMax}`:''].filter(Boolean).join(' · ');
      weaponsHTML += `<div class="weapon-row${tgt ? ' weapon-locked' : ''}${isAiming ? ' weapon-aiming' : ''}${detectorAiming ? ' weapon-aiming' : ''}${awAiming ? ' weapon-aiming' : ''}"
          ${clickable ? `data-weapon-target="${state.selectedGroupId}|${si}|${wi}" style="cursor:pointer;"` : canDetect ? `data-detector="${state.selectedGroupId}|${si}|${wi}" style="cursor:pointer;"` : ''}>
        <div class="weapon-name">${w.name}${tgt ? ` <span style="color:var(--hull-crit);font-size:9px;">▶ ${tgtName}</span>` : ''}${detectorUsed ? ` <span style="color:var(--text-mute);font-size:9px;">✓ used</span>` : ''}${limitedBlocked ? ` <span style="color:var(--hull-crit);font-size:9px;">spent</span>` : ''}</div>
        <div class="weapon-stats">${isDetector ? 'Line of Sight · place Spikes' : `${w.arc} · Att ${w.att} · Lock ${w.lock} · Dmg ${w.dmg} · ${w.type}`}${extraTag?` <span style="color:var(--text-mute)">· ${extraTag}</span>`:''}</div>
        ${w.special && w.special !== '—' ? `<div class="weapon-special">${w.special}</div>` : ''}
        ${isAiming ? `<div class="weapon-special" style="color:var(--hull-crit)">Click an enemy ship in arc & range · right-click cancels</div>` : ''}
        ${detectorAiming ? `<div class="weapon-special" style="color:#4ad6ff">Click an enemy ship in Line of Sight · right-click cancels</div>` : ''}
        ${canDetect && !detectorAiming ? `<div class="weapon-special" style="color:#4ad6ff">Click to use Detector (forgoes this weapon)</div>` : ''}
        ${awAiming ? `<div class="weapon-special" style="color:#ffb547">Click an enemy Wing (asset) in arc & range · right-click cancels</div>` : ''}
        ${canAntiWing ? `<button class="hp-btn" data-antiwing="${state.selectedGroupId}|${si}|${wi}" style="margin-top:3px;color:#ffb547;border-color:#ffb547;">${awAiming ? '✕ cancel' : '✦ ANTI-WING'}</button>` : ''}
        ${tgt ? `<button class="hp-btn" data-weapon-unlock="${state.selectedGroupId}|${si}|${wi}" style="margin-top:3px;">✕ clear target</button>` : ''}
      </div>`;
    });
    weaponsHTML += `</div>`;
    // Status / FIRE button.
    if (state.phase === 'play' && onTable) {
      if (selShipOOF) {}
      else if (weaponsOffline) weaponsHTML += `<div class="weapon-special" style="color:var(--hull-crit)">Weapons Offline (crippling effect).</div>`;
      else if (fired) weaponsHTML += `<div class="weapon-special" style="color:var(--text-mute)">Already fired this activation.</div>`;
      else if (!moved) weaponsHTML += `<div class="weapon-special" style="color:var(--text-mute)">Move this ship first, then assign weapon targets.</div>`;
      else if (limit === 0) weaponsHTML += `<div class="weapon-special" style="color:var(--text-mute)">This Order cannot fire weapons.</div>`;
      else if (lockedCount > 0) {
        weaponsHTML += `<button class="btn-finish-act" data-fire="${state.selectedGroupId}|${si}" style="background:linear-gradient(180deg,var(--hull-crit) 0%,#a32020 100%);border-color:var(--hull-crit);color:#fff;">🔥 ENGAGE (${lockedCount})</button>`;
      } else {
        weaponsHTML += `<div class="weapon-special" style="color:var(--text-mute)">Click a weapon, then click an enemy ship to lock a target.</div>`;
      }
    }
    weaponsHTML += `</div>`;
  }

  // Survey action: a Capital Ship within 6" of a Dropsite (with Survey scoring) may
  // forgo attacking/launching to Survey it (once per Dropsite per side per game).
  let surveyHTML = '';
  {
    const objKey = state.scenario && state.scenario.objective;
    const surveyActive = objKey === 'survey' || (state.secondaries && state.secondaries[def.side] && state.secondaries[def.side].includes('gather_intel'));
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
    if (surveyActive && selShip && !selShip.destroyed && !selShip.offTable && isCapital(def) && state.phase === 'play') {
      const near = surveyableDropsite(selShip, def.side);
      if (near) {
        surveyHTML = `<div class="panel-section">
          <div class="panel-title">Survey</div>
          <button class="btn-finish-act" data-survey="${state.selectedGroupId}|${state.selectedShipIdx}|${near.id}" style="background:linear-gradient(180deg,#3a7a8a 0%,#2a5a68 100%);border-color:#4a8a9a;color:#fff;">⌖ SURVEY ${near.base.name}</button>
          <div class="weapon-special" style="color:var(--text-mute)">Forgoes attacking/launching this round.</div>
        </div>`;
      }
    }
  }

  // Extract action (Extract objective): a Ship carrying a ground-transport Asset
  // (Dropship / Bulk Lander / Drop Pod / Boarding Pod) may Extract Recon Operatives
  // from a Dropsite within 6" — up to its transport VALUE (the Asset's launch n) —
  // taking them aboard instead of launching. Click Extract → click a target Dropsite.
  let extractHTML = '';
  {
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
    const canExtractObj = state.scenario && state.scenario.objective === 'extract';
    const tv = transportValue(def);
    if (canExtractObj && tv > 0 && selShip && !selShip.destroyed && !selShip.offTable && state.phase === 'play') {
      const k = targetKey(state.selectedGroupId, state.selectedShipIdx);
      const carried = (state.shipReconOps && state.shipReconOps[k]) || 0;
      const isExtracting = state.extracting && state.extracting.gid === state.selectedGroupId && state.extracting.si === state.selectedShipIdx;
      const acted = selShip.firedThisActivation || (selShip.launchedThisRound > 0);
      const moveOk = selShip.movedThisRound || !(ORDERS[effectiveOrder(def, grp, state.selectedShipIdx)] || {}).moveMax;
      extractHTML = `<div class="panel-section">
        <div class="panel-title">Extract${carried ? ` · <span style="color:#b59ad6">${carried} aboard</span>` : ''}</div>
        <div class="weapon-row" ${(!acted && moveOk) ? `data-extract-start="${state.selectedGroupId}|${state.selectedShipIdx}" style="cursor:pointer;${isExtracting?'border-left:3px solid #b59ad6;background:rgba(181,154,214,0.08);':''}"` : 'style="opacity:0.5;"'}>
          <div class="weapon-name">⬆ Extract Recon Operatives</div>
          <div class="weapon-stats">Transport value ${tv} · 6" range · ${carried} aboard</div>
          ${(!acted && moveOk) ? `<div class="weapon-special" style="color:var(--text-mute)">${isExtracting ? 'Click a Dropsite within 6" to extract · right-click cancels' : 'Click, then target a Dropsite. 2 VP per Operative at game end.'}</div>`
            : `<div class="weapon-special" style="color:var(--text-mute)">${acted ? 'Ship has already acted this activation.' : 'Move first.'}</div>`}
        </div>
      </div>`;
    }
  }

  // Launch
  let launchHTML = '';
  if (def.launch && def.launch.length) {
    const selShip = state.selectedShipIdx !== null ? grp.ships[state.selectedShipIdx] : null;
